）すること。\n・ディフェンスのプレーヤーがボールにプレーすることを妨げる、あるいはディフェンスのプレーヤーとの間隔（スペース）を広げようとして、相手を押しのけること（プッシュオフ）。\n・ドリブルをしているときに、ボールを取ろうとするディフェンスのプレーヤーの動きを前腕や手を使って妨げること。\nボールを持っていないオフェンスのプレーヤーが起こす、以下の触れ合い（プッシュオフ）はファウルである：\n・ボールを受け取りやすくしようとして、ディフェンスのプレーヤーを押しのけること。\n・ボールにプレーしようとするディフェンスのプレーヤーを妨げようとして、相手を押しのけること。\n・自分に有利になるように相手との間隔（スペース）を広げようとして、相手を押しのけること。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-12", "body": "33-12  ポストプレーバーティカリティ（シリンダーの概念）の考え方は、ポストプレーにも適用される。\nポストにいるオフェンスのプレーヤーもそのディフェンスのプレーヤーも、互いに相手の真上の空間（シリンダー）の権利を重んじなければならない。\nポストの位置を占めているオフェンスのプレーヤーあるいはディフェンスのプレーヤーによって、肩や尻で相手チームのプレーヤーを押し出すことや、伸ばした腕、肩、尻、脚、あるいはその他の体の部分を使って相手の自由な動き（フリーダムオブムーブメント）を妨げることはファウルになる。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-13", "body": "33-13  後方からの不当なガード後方からの不当なガードとは、ディフェンスのプレーヤーが、相手チームのプレーヤーの後ろから起こす不当な体の触れ合いのことをいう。\nボールにプレーしようとしても、後ろから相手と触れ合いを起こしてよいことにはならない。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-14", "body": "33-14  ホールディングホールディングとは、相手プレーヤーの自由な動き（フリーダムオブムーブメント）を妨げる不当な体の触れ合いのことをいう。この体の触れ合い（押さえること）はどの部分を使っていてもホールディングになる。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-15", "body": "33-15  プッシングプッシングとは、相手チームのプレーヤーがボールを持っていてもいなくても、手や体で相手を無理に押しのけたり押して動かそうとしたりする不当な体の触れ合いのことをいう。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-16", "body": "33-16  フェイク（ファウルをされたと欺くこと）\nフェイクとは、状況を有利にするためにファウルをされたふりをする、またはファウルをされたと判断されるために大げさな演技をすることをいう。"}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-1", "body": "34-１  定義"}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-1-1", "body": "34-１-１  パーソナルファウルとは、ボールのライブ、デッドにかかわらず、相手チームのプレーヤーとの不当な体の触れ合いによるプレーヤーファウルのことをいう。\nプレーヤーは、相手を押さえて動きの自由を妨げたり、押したり、叩いたり、突き当たったり、つまずかせることをしてはならない。手（腕）や足（脚）、膝などを伸ばしたり広げたり突き出したり、体を不自然に曲げたりして相手の進行や相手の動きを妨げる触れ合いを、自分のシリンダーの外で起こしてはならない。\nまた、その他乱暴な触れ合いを起こすこともしてはならない。"}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-1-2", "body": "34-１-２  スローインファウルとは、第4 クォーターや各オーバータイムで、ゲームクロックが2:00 あるいはそれ以下を表示していて、アウトオブバウンズからのスローインを行うときに、まだボールが審判あるいはスローインを行うプレーヤーの手にある間に、コート上のディフェンスのプレーヤーが相手プレーヤーに起こすパーソナルファウルである。"}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-2", "body": "34-２  罰則\nファウルをしたプレーヤーに１個のパーソナルファウルが記録される。"}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-2-1", "body": "34-２-１  ショットの動作（アクトオブシューティング）中ではないプレーヤーがファウルをされたとき：\n・ファウルが起こった場所に最も近いアウトオブバウンズから、ファウルをされたチームのスローインによってゲームを再開する。\n・ファウルをしたチームがチームファウルのペナルティシチュエーション（チームファウルの罰則が適用される状況）にある場合は、第41 条が適用される。"}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-2-2", "body": "34-２-２  ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされたときは、ファウルをされたプレーヤーに以下のとおりフリースローが与えられる：\n・そのショットが成功したときは得点が認められ、さらに１本のフリースローが与えられる。\n・そのショットがツーポイントゴールエリアからのショットで不成功だったときは、２本のフリースローが与えられる。\n・そのショットがスリーポイントゴールエリアからのショットで不成功だったときは、３本のフリースローが与えられる。"}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-2-3", "body": "34-２-３  スローインファウルが宣せられた場合：\n・ファウルをしたチームがすでにチームファウルのペナルティシチュエーションかどうかにかかわらず、ファウルをされたプレーヤーはフリースローを1 本のみ与えられる。ゲームはファウルが起きた場所に最も近いアウトオブバウンズからファウルをされたチームのスローインで再開される。"}, {"type": "rule", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-1", "body": "35-１  定義"}, {"type": "rule", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-1-1", "body": "35-１-１  ダブルファウルとは、両チームの２人のプレーヤーがほとんど同時に、互いにパーソナルファウル、あるいはアンスポーツマンライクファウルやディスクォリファイングファウルをした場合をいう。"}, {"type": "rule", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-1-2", "body": "35-１-２  ２つのファウルがダブルファウルであるとみなすためには、以下の条件が求められる：\n・両方のファウルが、プレーヤーのファウルであること。\n・両方のファウルが、体の触れ合いを伴うファウルであること。\n・両方のファウルが、同じ2 人の対戦プレーヤー間で起きること。\n・両方のファウルがともにパーソナルファウル、もしくはアンスポーツマンライクファウルとディスクォリファイングファウルのいずれかの組み合わせであること。\n【補足】この条件は２つのファウルが他の条件に当てはまるうえで、「パーソナルファウルとパーソナルファウル」「アンスポーツマンライクファウルとアンスポーツマンライクファウル」「ディスクォリファイングファウルとディスクォリファイングファウル」「アンスポーツマンライクファウルとディスクォリファイングファウル」のいずれかの場合にダブルファウルとすることを指す。"}, {"type": "rule", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-2", "body": "35-２  罰則\n両プレーヤーにパーソナルファウルが記録される。どちらのチームにもフリースローは与えられず、ゲームは、以下の方法で再開する：\nダブルファウルとほとんど同時に、\n・ゴールや最後のフリースローが成功してどちらかのチームに得点が認められた場合は、得点をされたチームが、エンドラインの任意の位置のアウトオブバウンズからスローインをしてゲームを再開する。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n・一方のチームがボールをコントロールしていたかボールが与えられることになっていた場合は、そのチームが、ダブルファウルが起こった場所に最も近いアウトオブバウンズからスローインをしてゲームを再開する。\n・どちらのチームもボールをコントロールしていなかったかボールが与えられることになっていなかった場合は、ジャンプボールシチュエーションになる。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-1", "body": "36-１  言動や振る舞いに関する規定"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-1-1", "body": "36-１-１  ゲームは、両チームのプレーヤー、ヘッドコーチ、アシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー、チーム関係者、審判、テーブルオフィシャルズ、コミッショナー（同席している場合）を含むこれら全ての人たちの完全な協力によって成立するものである。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-1-2", "body": "36-１-２  両チームは勝利を得るために全力を尽くさなければならないが、これはスポーツマンシップとフェアプレーの精神に基づいたものでなければならない。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-1-3", "body": "36-１-３  競技規則の精神と目的に対して、意図的にあるいは繰り返し行われる非協力的な行為は、テクニカルファウルとみなされる。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-1-4", "body": "36-１-４  審判は、明らかに意図的ではなくゲームに直接的に影響のない軽微な規則の違反（ファウルやバイオレーション）については、テクニカルファウルを科さずに警告を与えることがある。ただし、警告の後もその同じ違反が繰り返し続く場合はその限りではない。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-1-5", "body": "36-１-５  ボールがいったんライブになってから、前に起こったこの規則に該当する違反が見つかった場合は、見つかったときにテクニカルファウルがあったものとして処置をする。\nこの規則に該当する違反があってからそれが見つけられるまでに起こったことは、全て有効である。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-2", "body": "36-２  定義"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-2-1", "body": "36-２-１  テクニカルファウルは、相手チームのプレーヤーとの体の触れ合いのない振る舞いであり以下が該当するが、これらに限るものではない：\n・審判からの警告を無視する。\n・審判、コミッショナー（同席している場合）、テーブルオフィシャルズ、相手チーム、あるいはチームベンチに座ることを許された人物への敬意を欠く振る舞い、異論表現。\n【補足】ベンチで立ち上がり異論表現を行うなどの行為を含む。\n・観客に対して無作法に振る舞ったり挑発したりする、あるいは煽動するような言動をとる。\n・相手チームのプレーヤーを挑発したり侮辱したりする。\n・相手チームのプレーヤーの目の前で手を振ったり、手をかざしたりして視野を妨げる。\n・肘を激しく振り回す。\n・バスケットを通過したボールに故意に触れること、スローインやフリースローが遅延なく行われるのを妨げること、もしくはゲームや後半の開始前にコートに来るのが遅れることで、ゲームの進行を遅らせる。\n【補足】審判にボールを返さずにゲームの進行を遅らせるような行為等も上記項目に該当する。\n・フェイク（ファウルをされたと欺くこと）。\n・リングをつかんで体重をかける。ただし、ダンクショットのとき、または自身を含むプレーヤーが怪我をすることを避けるために、やむを得ず瞬間的にリングをつかむことはテクニカルファウルとはしない。\n・最後のフリースローでボールがリングに触れる前にゴールテンディングのバイオレーションをしたときは、オフェンスのチームに１点が与えられ、さらにそのディフェンスのプレーヤーにテクニカルファウルが宣せられる。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-2-2", "body": "36-２-２  チームベンチに座ることを許された人物によるテクニカルファウルは、審判、コミッショナー（同席している場合）、テーブルオフィシャルズ、相手チームに対して失礼な態度で接したり、体に触れたりする行為、またゲームの進行や運営に支障をもたらしたりする規則の違反のことをいう。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-2-3", "body": "36-２-３  テクニカルファウルを２個あるいはアンスポーツマンライクファウルを２個、もしくはテクニカルファウルとアンスポーツマンライクファウルを１個ずつ記録されたプレーヤーは失格・退場（ゲームディスクォリフィケーション）になる。\n【補足】「ゲームディスクォリフィケーション」とは、テクニカルファウルやアンスポーツマンライクファウルの累積による失格・退場を指し、ディスクォリファイングファウルでの失格・退場と区別される。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-2-4", "body": "36-２-４  ヘッドコーチは以下の場合、失格・退場（ゲームディスクォリフィケーション）になる。\n・ヘッドコーチ自身のスポーツマンらしくない振る舞いによるテクニカルファウル「C」が２個記録された場合。\n・チームベンチに座ることを許された人物のスポーツマンらしくない振る舞いによって、ヘッドコーチにテクニカルファウル「B」が３個記録された場合、あるいはそれらのテクニカルファウルとヘッドコーチ自身のテクニカルファウル「C」とを合わせて３個のファウルが記録された場合。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-2-5", "body": "36-２-５  プレーヤーもしくはヘッドコーチが、36-２-３あるいは36-２-４に則り失格・退場処分となる場合、テクニカルファウルによる罰則のみが与えられ、失格・退場による追加の罰則は与えられない。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-3", "body": "36-３  罰則"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-3-1", "body": "36-３-１  テクニカルファウルが宣せられたときは、次のように記録をする：\n・プレーヤーの場合は、そのプレーヤーに１個のテクニカルファウルが記録され、チームファウルに数える。\n・チームベンチに座ることを許された人物の場合は、ヘッドコーチに１個のテクニカルファウルが記録され、チームファウルに数えない。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-3-2", "body": "36-３-２  相手チームに１本のフリースローが与えられ、ゲームは次のように再開される：\n・フリースローは直ちに行う。フリースローの後、テクニカルファウルが宣せられたときにボールをコントロールしていたか、ボールが与えられることになっていたチームに、ゲームが止められたときにボールがあった場所から最も近いアウトオブバウンズでスローインが与えられる。\n・フリースローは、他のファウルによって適用される罰則の順序にとらわれることなく、さらにすでに行われている罰則の途中であっても、それらに関わらず直ちに行う。テクニカルファウルのフリースローの後は、テクニカルファウルが宣せられたときにボールをコントロールしていたか、ボールが与えられることになっていたチームよって、テクニカルファウルの罰則のためにゲームが止められた時点からゲームを再開する。\n・ゴールや最後のフリースローが成功して得点が認められた場合は、エンドラインの任意の位置のアウトオブバウンズからスローインをしてゲームを再開する。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n・どちらのチームにもボールのコントロールがない場合は、ジャンプボールシチュエーションになる。\n・第１クォーターを始める場合は、センターサークルでのジャンプボールになる。"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-1", "body": "37-１  定義"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-1-1", "body": "37-１-１  アンスポーツマンライクファウルは、プレーヤーによる体の触れ合いを伴うファウルであり、以下が該当する：\n・ボールに対するプレーではなく、かつ、正当なバスケットボールのプレーとは認められない相手プレーヤーとの触れ合い。\n・プレーヤーがボールや相手プレーヤーに正当にプレーしようと努力していたとしても、過度に激しい触れ合い（エクセシブハードコンタクト）。\n【補足】「相手プレーヤーへの正当なプレー」とはボールを持っていないオフェンスのプレーヤーに対するディフェンスなど、正当なバスケットボールのプレーを指す。\n・オフェンスが進行する中で、その進行を妨げることを目的としたディフェンスのプレーヤーによる必要のない触れ合い。これはオフェンスのプレーヤーがショットの動作（アクトオブシューティング）に入るまで適用される。\n・以下のいずれかの状況で、相手チームのバスケットに向かって進行しているプレーヤーとそのバスケットとの間に、進行しているプレーヤーの相手プレーヤーが全くおらず、進行しているプレーヤーの後ろあるいは横から起こす不当な触れ合い。これはオフェンスのプレーヤーがショットの動作（アクトオブシューティング）に入るまで適用される。\n− 進行しているプレーヤーがボールをコントロールしている状況、もしくは− 進行しているプレーヤーがボールをコントロールしようとしている状況、もしくは− 進行しているプレーヤーへのパスのボールが放たれている状況。\n【補足】パスされ空中にあるボールは、ファウルがなければ、進行しているプレーヤーによってコントロールされることが想定できる場合。"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-1-2", "body": "37-１-２  審判は、プレーヤーの起こしたアクションのみを基準として、ゲームをとおして一貫性を持ってアンスポーツマンライクファウルの判断を行わなければならない。"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-2", "body": "37-２  罰則"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-2-1", "body": "37-２-１  ファウルをしたプレーヤーに、１個のアンスポーツマンライクファウルが記録される。"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-2-2", "body": "37-２-２  ファウルをされたプレーヤーにフリースローが与えられたあと：\n・そのチームのフロントコートのスコアラーズテーブルの反対側にあるスローインラインからのスローインで再開する。\n・第１クォーターをはじめる場合は、センターサークルでのジャンプボールになる。\nフリースローは以下のとおり与えられる：\n・ショットの動作（アクトオブシューティング）中ではないプレーヤーがファウルをされたとき：２本のフリースロー。\n・ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされ、そのショットが成功したとき：得点が認められ、さらに１本のフリースロー。\n・ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされ、そのショットが不成功だったとき：２本または３本のフリースロー。"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-2-3", "body": "37-２-３  テクニカルファウルを２個あるいはアンスポーツマンライクファウルを２個、もしくはテクニカルファウルとアンスポーツマンライクファウルを１個ずつ記録されたプレーヤーは失格・退場（ゲームディスクォリフィケーション）になる。"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-2-4", "body": "37-２-４  プレーヤーが37-２-３に則り失格・退場になる場合、アンスポーツマンライクファウルによる罰則のみが与えられ、失格・退場による追加の罰則は与えられない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-1", "body": "38-１  定義"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-1-1", "body": "38-１-１  ディスクォリファイングファウルとは、プレーヤー、交代要員、ヘッドコーチ、アシスタントコーチ、5個のファウルを宣せられたチームメンバー、チーム関係者によって行われる、特に悪質でスポーツマンシップに反する行為に対するファウルのことをいう。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-1-2", "body": "38-１-２  ヘッドコーチにディスクォリファイングファウルが記録された場合は、スコアシートに記入されているファーストアシスタントコーチがヘッドコーチの役目を引き継ぐ。ファーストアシスタントコーチがスコアシートに記入されていない場合は、スコアシートに示されたキャプテン（CAP）がヘッドコーチの役目を引き継ぐ。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-2", "body": "38-２  暴力行為"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-2-1", "body": "38-２-１  ゲーム中に、スポーツマンシップとフェアプレーの精神に反する暴力行為が起きたときは、審判または必要に応じて警備担当者により、暴力行為を速やかに止めさせなければならない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-2-2", "body": "38-２-２  コート上もしくはその付近で、プレーヤーによる暴力行為が発生した場合は、審判は速やかにそれを止めさせる。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-2-3", "body": "38-２-３  審判やテーブルオフィシャルズあるいは相手チームに対し、暴行を加えたプレーヤー、交代要員、コーチ、アシスタントコーチ、５個のファウルを宣せられたチームメンバー、チーム関係者は、速やかに失格・退場させられる。クルーチーフは、その事象を大会主催者に報告しなければならない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-2-4", "body": "38-２-４  審判が許可をしたときのみ警備担当者はコートに入る。しかし、観客が明らかな暴力的な意図をもってコートに侵入する場合は、チームや審判、テーブルオフィシャルズを守るために、警備担当者は速やかにコートに入らなければならない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-2-5", "body": "38-２-５  コートやその周囲、出入口、通路、控室などの全てのエリアは、大会主催者の管理下にある。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-2-6", "body": "38-２-６  プレーヤー、チームベンチに座ることを許された人物による用具・器具を破損するおそれのある行為は、絶対に許してはならない。\nこのような行為があったときには、審判はそのチームのヘッドコーチにそのような行為をやめさせるように警告をする。\nその行為が繰り返された場合には、速やかにテクニカルファウルまたはさらにディスクォリファイングファウルを宣さなければならない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-3", "body": "38-３  罰則"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-3-1", "body": "38-３-１  ファウルをした当該者に１個のディスクォリファイングファウルが記録される。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-3-2", "body": "38-３-２  規則により失格・退場処分を受けた当該者は、ゲームが終わるまで自チームの控室にとどまるか、または建物から出なければならない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-3-3", "body": "38-３-３  フリースローが以下のとおり与えられる：\n・体の触れ合いをともなわないディスクォリファイングファウルが宣せられた場合のフリースローシューターは、ヘッドコーチが指定する。\n【補足】この場合のフリースローシューターはチームメンバーの中から選ばれる。\n・体の触れ合いをともなうディスクォリファイングファウルが宣せられた場合は、ファウルをされたプレーヤーがフリースローシューターになる。\nフリースローの後：\n・そのチームのフロントコートのスコアラーズテーブルの反対側のスローインラインからのスローインで再開する。\n・第１クォーターを始める場合は、センターサークルでのジャンプボールになる。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-3-4", "body": "38-３-４  与えられるフリースローの数は以下のとおりである：\n・体の触れ合いをともなわないファウル：２本のフリースロー。\n・ショットの動作（アクトオブシューティング）中ではないプレーヤーがファウルをされたとき：２本のフリースロー。\n・ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされ、そのショットが成功したとき：得点が認められ、さらに１本のフリースロー。\n・ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされ、そのショットが不成功だったとき：２本または３本のフリースロー。\n・ヘッドコーチが失格退場になるファウル：２本のフリースロー。\n・ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー、チーム関係者が失格退場になるファウル。このファウルはヘッドコーチのテクニカルファウルとして記録される：２本のフリースロー。\nさらに、ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー、チーム関係者がチームベンチエリアを離れ、積極的に抗争に参加した場合：\n−ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバーに対する１回のディスクォリファイングファウルごとに：２本のフリースロー。\n全てのディスクォリファイングファウルはそれぞれの違反者に対して記録される。\n−チーム関係者に対する1 回のディスクォリファイングファウルごとに：2 本のフリースロー。\n全てのディスクォリファイングファウルはヘッドコーチに対して記録される。\n相手チームと罰則が等しく相殺されない限り、全ての罰則に含まれるフリースローは行われる。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-1", "body": "39-１  定義\n抗争（Fight）とは、２人以上の対戦相手のプレーヤーやチームベンチに座ることを許された人物の間で発生する体の触れ合いを伴うやり取りをいう。\nこの規定は、コート上やその周囲で抗争が起こったときや起こりそうなときに、チームベンチエリアから出た交代要員、ヘッドコーチ、ファーストアシスタントコーチ、５個のファウルを宣せられたチームメンバーやチーム関係者のみに適用される。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-2", "body": "39-２  ルール"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-2-1", "body": "39-２-１  抗争が起こったときや起こりそうなときに、チームベンチエリアを離れた交代要員、５個のファウルを宣せられたチームメンバー、チーム関係者は失格・退場になる。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-2-2", "body": "39-２-２  ヘッドコーチとファーストアシスタントコーチだけは、審判に協力して争いを止めるためであれば、抗争が起こったときや起こりそうなときでもチームベンチエリアから出てもよい。この場合は、ヘッドコーチ、ファーストアシスタントコーチは失格・退場にはならない。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-2-3", "body": "39-２-３  ヘッドコーチやファーストアシスタントコーチがチームベンチエリアから出てコートに入ったのに争いを止めようとしなかったときは、失格・退場になる。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-3", "body": "39-３  罰則"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-3-1", "body": "39-３-１  チームベンチエリアを離れ失格・退場になった人数にかかわらず、罰則はそのチームのヘッドコーチに１個のテクニカルファウル「B」が記録される。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-3-2", "body": "39-３-２  両チームの者がファイティングの規定によって失格・退場になり、他に適用されるファウルの罰則がない場合は、以下の方法でゲームを再開する。\nファイティングによりゲームクロックが止まったのとほとんど同時に：\n・ゴールや最後のフリースローが成功してどちらかのチームに得点が認められた場合は、得点をされたチームがエンドラインの任意の位置のアウトオブバウンズからスローインをしてゲームを再開する。\n・一方のチームがボールをコントロールしていた、もしくはボールを与えられることになっていた場合は、抗争が始まったときにボールがあった場所に最も近いアウトオブバウンズからそのチームのスローインでゲームを再開する。\n・どちらのチームもボールをコントロールしていなかったかボールを与えられることになっていなかった場合は、ジャンプボールシチュエーションになる。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-3-3", "body": "39-３-３  全てのディスクォリファイングファウルは別添資料B８ー３に基づきスコアシートに記入される。ファイティングの規定によるディスクォリファイングファウルは、チームファウルに数えない。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-3-4", "body": "39-３-４  抗争が起こったときや起こりそうなときに、コート上にいたプレーヤーのファウルに対する罰則は全て有効であり、第42 条「特別な処置をする場合」に則り処置される。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-3-5", "body": "39-３-５  抗争が起こったときや起こりそうなときに、ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバーやチーム関係者の失格退場に対するファウルの罰則は全て有効であり、38-３-４の６項目に則り処置される。\n第章 総則（GENERAL PROVISIONS）"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-1", "body": "40-１  審判により５個のファウルを宣せられたプレーヤーは速やかにコートから離れなければならない。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-2", "body": "40-２  プレーヤー兼ヘッドコーチがプレーヤーとして５個のファウルを宣せられた場合、プレーをすることはできないが、ヘッドコーチの役割は継続できる。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-3", "body": "40-３  すでに５個のファウルを宣せられているプレーヤーにさらにファウルが宣せられた場合、ヘッドコーチのファウルとしてスコアシートに「B」が記録される。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-4", "body": "40-４  2 個のテクニカルファウル、あるいは2 個のアンスポーツマンライクファウル、もしくは1 個のテクニカルファウルと1個のアンスポーツマンライクファウルを記録されたプレーヤーは、タイマーによってゲームディスクォリフィケーション（GD）マーカーを示され、失格・退場となる。\n【補足】国内大会ではアシスタントスコアラーがゲームディスクォリフィケーションマーカーを示す。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-5", "body": "40-５  自身のスポーツマンらしくない振る舞いによる2個のテクニカルファウル「C」、あるいは3個の「B」、もしくは2個の「B」と1個の「C」が記録されたヘッドコーチは、タイマーによってゲームディスクォリフィケーション（GD）マーカーを示され、失格・退場となる。\n【補足】国内大会ではアシスタントスコアラーがゲームディスクォリフィケーションマーカーを示す。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-6", "body": "40-６  失格・退場となったプレーヤー、交代要員、ヘッドコーチ、アシスタントコーチ、５個のファウルを宣せられたプレーヤー、その他チームベンチに座ることを許されたメンバーは、直ちにゲームを離れ（30 秒以内）、ゲーム終了までチームの控室にとどまるか、または建物から出なければならない。"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則", "sec_no": "41-1", "body": "41-１  定義"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則", "sec_no": "41-1-1", "body": "41-１-１  チームファウルに数えるファウルとは、プレーヤーに記録されるパーソナルファウル、テクニカルファウル、アンスポーツマンライクファウル、ディスクォリファイングファウルのことをいう。１チームに対してクォーターごとに４個のチームファウルが記録された後は、チームファウルのペナルティシチュエーションになる。"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則", "sec_no": "41-1-2", "body": "41-１-２  プレーのインターバル中に起こった全てのチームファウルは、次のクォーターあるいはオーバータイムに起こったものとみなされる。"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則", "sec_no": "41-1-3", "body": "41-１-３  各オーバータイムに起こった全てのチームファウルは、第４クォーターに起こったものとみなされる。"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則", "sec_no": "41-2", "body": "41-２  ルール"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則", "sec_no": "41-2-1", "body": "41-２-１  チームファウルのペナルティシチュエーションにあるチームのプレーヤーが、ショットの動作（アクトオブシューティング）中ではない相手チームのプレーヤーにパーソナルファウルをしたときは、罰則としてスローインではなく２本のフリースローが与えられる。このとき、ファウルをされたプレーヤーがフリースローシューターになる。"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則", "sec_no": "41-2-2", "body": "41-２-２  ライブのボールをチームコントロールしている、あるいはボールを与えられることになっていたチームのプレーヤーがパーソナルファウルをしたときは、チームファウルの罰則は適用されず、相手チームのスローインになる。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-1", "body": "42-１  定義\n規則の違反（ファウルやバイオレーション）の後でゲームクロックが止められている間に、新たに別の事象が起きてファウルやバイオレーションが宣せられたり、ゲームクロックが止められる前に起きていた事象に対してファウルやバイオレーションが宣せられたりした場合は、特別な処置をする。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-2", "body": "42-２  手順"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-2-1", "body": "42-２-１  全てのファウルと罰則は記録される。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-2-2", "body": "42-２-２  全ての規則の違反（ファウルやバイオレーション）は起こった順序で処置される。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-2-3", "body": "42-２-３  両チームに記録された全ての等しい罰則やダブルファウルの罰則は、起きた順序に従って相殺される。一度全ての罰則がスコアシートに記入されると、相殺した罰則は適用されない。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-2-4", "body": "42-２-４  テクニカルファウルが宣せられたときは、罰則の順序にとらわれることなく、さらにすでに行われている罰則の途中であっても、それらに関わらず先にテクニカルファウルの罰則の処置を行う。\nファーストアシスタントコーチ、交代要員、5個のファウルを宣せられたプレーヤー、チーム関係者の失格・退場により、ヘッドコーチへのテクニカルファウルがスコアシートに記入された場合、その罰則は先に適用されない。ファウルやバイオレーションが相殺されない限り、それらの罰則は起こった順に適用される。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-2-5", "body": "42-２-５  最後に適用される罰則の一部であるボールのポゼッションの権利のみ適用され、それ以外の罰則にあるボールのポゼッションの権利は無効になる。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-2-6", "body": "42-２-６  最初のフリースロー、もしくはスローインによって一度ボールがライブになった後は、それらの罰則は残りの罰則との相殺の対象とはならない。\n【補足】相殺した結果、残ったフリースローの１本目またはスローインのボールがライブになった後で別のファウルがあったときは、一度ライブになったフリースローやスローインは相殺の対象とならず、スローインは取り消される。\nフリースローの場合は、残りのフリースローを終わらせてから別のファウルの処置をする。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-2-7", "body": "42-２-７  全ての残りの罰則は、宣せられた順序で処置される。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-2-8", "body": "42-２-８  両チームに記録された罰則が等しく、全て相殺された場合は、ゲームは次の方法で再開される。\n最初の規則の違反（ファウルやバイオレーション）とほとんど同時に：\n・ゴール、あるいは最後のフリースローが成功してどちらかのチームに得点が認められた場合は、得点をされたチームのエンドラインの任意の位置のアウトオブバウンズからのスローインでゲームを再開する。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n・一方のチームがボールをコントロールしていたかボールを与えられることになっていた場合は、最初の規則の違反（ファウルやバイオレーション）が起きた場所に最も近いアウトオブバウンズからのスローインのボールがそのチームに与えられる。\n・どちらのチームもボールをコントロールしておらずボールを与えられることになっていなかった場合は、ジャンプボールシチュエーションになる。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-1", "body": "43-１  定義"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-1-1", "body": "43-１-１  フリースローは、フリースローラインの後ろ、かつ半円の中から妨げられることなく１点を得ることができるように、プレーヤーに与えられる機会のことをいう。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-1-2", "body": "43-１-２  １個のファウルに対する罰則として与えられるフリースロー、あるいはフリースローとそれに続くスローインを、フリースローの「セット」という。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-2", "body": "43-２  ルール"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-2-1", "body": "43-２-１  パーソナルファウル、アンスポーツマンライクファウル、体の触れ合いをともなうディスクォリファイングファウルが宣せられたとき、フリースローは次のように与えられる：\n・ファウルをされたプレーヤーがフリースローシューターになる。\n・ファウルをされたプレーヤーとの交代が請求されたときは、交代をする前にフリースローを打たなければならない。\n・ファウルをされたプレーヤーが、怪我、５個のファウルあるいは失格・退場によりゲームを離れなければならない場合は、そのプレーヤーと交代したプレーヤーがフリースローシューターになる。交代できるプレーヤーがいない場合は、自チームのヘッドコーチが指定したプレーヤーがフリースローシューターになる。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-2-2", "body": "43-２-２  テクニカルファウルや体の触れ合いのないディスクォリファイングファウルが宣せられたときは、ファウルをされたチームのヘッドコーチが指定するプレーヤーがフリースローシューターになる。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-2-3", "body": "43-２-３  フリースローシューターは：\n・フリースローラインの後ろ、かつ半円の中に立つ。\n・ボールが上からバスケットに入る、あるいはリングに触れるようにするために、どのような方法でフリースローのショットを行ってもよい。\n・審判からボールを与えられたあと、５秒以内にボールを放たなければならない。\n・ボールがバスケットに入るかリングに触れるまでは、フリースローラインまたは制限区域内のフロアに触れてはならない。\n・フリースローをするふりをして途中でわざとやめてはならない。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-2-4", "body": "43-２-４  フリースローのとき、リバウンドの位置を占めるプレーヤーは奥行き１mのそれぞれのスペースに交互に位置する権利を有する。（図７参照）\nこれらのプレーヤーは、フリースローが行われている間、次のことをしてはならない：\n・自チームに認められていないリバウンドの位置に立つ。\n・ボールがフリースローシューターの手から離れる前に、制限区域やニュートラルゾーンに入ったりリバウンドの位置を離れたりする。\n・何らかの言動によってフリースローシューターの邪魔をする。\n図７ フリースロー時のプレーヤーのポジション"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-2-5", "body": "43-２-５  フリースローのときにリバウンドの位置を占めないプレーヤーは、フリースローが終わるまでフリースローラインの延長線上より後ろでスリーポイントラインの外側にいなければならない。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-2-6", "body": "43-２-６  あとにフリースローの「セット」が続く場合、あるいはフリースローの後スローインで再開することが決められている場合は、フリースローシューター以外のプレーヤーは、フリースローラインの延長線上より後ろでスリーポイントラインの外側にいなければならない。\n43-２-３、43-２-４、43-２-５、43-２-６に違反することはバイオレーションである。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-3", "body": "43-３  罰則"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-3-1", "body": "43-３-１  フリースローが成功し、フリースローシューターがバイオレーションを宣せられた場合、得点は認められない。\nあとにフリースローが続く場合、あるいはファウルの罰則によりスローインのボールが与えられることになっていた場合を除き、フリースローラインの延長線上からのスローインのボールが相手チームに与えられる。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-3-2", "body": "43-３-２  フリースローが成功し、フリースローシューター以外のプレーヤーがバイオレーションを宣せられた場合：\n・得点は認められる。\n・バイオレーションはなかったものとする。\n最後のフリースローの場合は、フリースローシューターの相手チームによりエンドラインの任意の位置からのスローインになる。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-3-3", "body": "43-３-３  フリースローが成功せず：\n・最後のフリースローで、フリースローシューターあるいはそのチームメイトがバイオレーションを宣せられた場合、それに続くスローインのボールが与えられることになっていた場合を除き、フリースローラインの延長線上からのスローインのボールが相手チームに与えられる。\n・フリースローシューターの相手チームのプレーヤーがバイオレーションを宣せられた場合、フリースローシューターにやり直しのフリースローが与えられる。\n・最後のフリースローで両チームのプレーヤーがバイオレーションを宣せられた場合、ジャンプボールシチュエーションになる。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-1", "body": "44-１  訂正のできる誤り - 基本的な手続き\n【補足】誤りは、誤りそのものや誤りが起きた時機について、審判に確信がある場合にのみ訂正される。特にインスタントリプレーシステム（IRS）が導入されていないゲームにおいて、審判に確信がない場合には誤りは訂正されない。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-1-1", "body": "44-１-１  審判は訂正できる誤りに気がついたら、どちらのチームにも不利にならない限り速やかにゲームを止めることができる。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-1-2", "body": "44-１-２  誤りが起きたあと、それが認識されるまでに起きた宣せられたファウルや経過した競技時間、その他起こった全てのことは有効である。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-1-3", "body": "44-１-３  誤りを訂正した後は、誤りを訂正するために審判が止めた時点からゲームを再開する。ボールは、誤りを訂正するためにゲームが止められた時点でボールの権利を有していたチームに与えられる。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-2", "body": "44-２  訂正のできる誤り カテゴリー1 - 定義以下の誤りをカテゴリー1 とし、規則が誤って適用された場合に、審判は訂正することができる。\n・与えてはいけないフリースローを与えたとき。\n・与えるべきフリースローを与えなかったとき。\n・審判による指定なく誤ったプレーヤーがフリースローを行ったと\n・審判が誤ったプレーヤーを指定してフリースローを行ったとき。\n・誤って得点を与えたり 、取り消したりしたとき。\n・誤ったプレーヤー、ヘッドコーチ、またはチームに対するファウルを伝達したとき。\n・スコアシートの記録に誤りが生じたとき：\n−得点を誤って記録しなかった、あるいは誤って記録したとき。\n−プレーヤー、ヘッドコーチ、またはチームに対するファウルを誤って記録しなかった、あるいは誤って記録したとき。\n−タイムアウトを誤って記録しなかった、あるいは誤ったチームに記録したとき。\n・ゲームクロックを正しくスタートまたはストップできなかったとき、あるいは誤った競技時間を設定してしまったとき（機材の故障を含む）。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-3", "body": "44-３  訂正のできる誤り カテゴリー1 - 基本的な手続き"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-3-1", "body": "44-３-１  誤りを訂正するには、審判、コミッショナー（同席している場合）、またはテーブルオフィシャルズが次のように誤りを特定しなければならない：\n・第４クォーターでゲームクロックが2:00あるいはそれ以下を示す前に誤りが起きた場合、その誤りはゲームクロックが2:00 あるいはそれ以下を示す前に訂正されなければならない。\n・第４クォーターでゲームクロックが2:00あるいはそれ以下を示す前に誤りが起き、ゲームクロックが2:00を示して審判が初めてゲームを止めた場合、その誤りはボールが再びライブとなる前に訂正されなければならない。\n・第４クォーターあるいはオーバータイムでゲームクロックが2:00あるいはそれ以下を示した後で誤りが起きた場合、誤りが起きてから何らかの理由により最初に審判がゲームを止めたあと、ボールがライブとなる前にその誤りは訂正されなければならない。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-3-2", "body": "44-３-２  これらの誤りはゲームの終了を知らせるゲームクロックのブザーが鳴り、ボールがデッドとなった後では訂正することはできない。ただし、誤りが、最後に審判が何らかの理由でゲームを止めたときからゲームの終了を知らせるゲームクロックのブザーが鳴るまでの間に起きた場合、この誤りはゲーム終了後速やかに訂正され、チームはコートもしくはチームベンチエリアにとどまらなければならない。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-3-3", "body": "44-３-３  まだ訂正可能な誤りが認識されたあと：\n・誤りの訂正に関わるチームメンバーが正当に交代した後チームベンチにいる場合、そのチームメンバーは誤りの訂正のためにコートに再び入らなければならず、その時点でそのチームメンバーはプレーヤーとなる。\n・訂正が完了したとき、再び正当な交代の申し出がない限り、そのプレーヤーはゲームにとどまることができる。正当な交代の申し出があった場合、プレーヤーはコートから離れることができる。\n・誤りの訂正に関わるチームメンバーが、5個のファウルを宣せられている場合、失格・退場となっている場合、負傷のためプレーできない場合、または特定できない場合、ヘッドコーチは誤りの訂正に対応するチームメンバーを指定する。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-4", "body": "44-４  訂正のできる誤り カテゴリー１- 特別な手続き"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-4-1", "body": "44-４-１  与えてはいけないフリースローを与えたとき：\n誤って与えられたフリースローは取り消され、ゲームは次のように再開される：\n・誤りが起きたあと、ゲームクロックが動いていない場合、フリースローを取り消されたチームはフリースローラインの延長線上のアウトオブバウンズからスローインを与えられる。\n・誤りが起きたあと、ゲームクロックがすでに動いていた場合、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-4-2", "body": "44-４-２  与えるべきフリースローを与えていなかった場合：\n・誤りが起きたあと、ボールのコントロールが一度も変わっていない場合、誤りの訂正のあと、ゲームは通常の最後のフリースローの後と同様に再開される。\n・誤ってスローインが与えられたあと、そのチームが得点した場合、その誤りはなかったものとする。\n・ゲームクロックがすでに動いていて、ボールのコントロールが変わっていた場合、誤りの訂正のあと、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-4-3", "body": "44-４-３  審判による指定なく誤ったプレーヤーがフリースローを行ったとき：\n行われたフリースローとともに、もし罰則の一部としてボールのポゼッションがあればそのポゼッションも取り消される。ゲームが再開されてこの誤りの訂正のために止められた場合を除いて、フリースローラインの延長線上のアウトオブバウンズから相手チームにスローインが与えられる。ゲームが再開されてこの誤りの訂正のために止められた場合、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-4-4", "body": "44-４-４  審判が誤ったプレーヤーを指定してフリースローを行ったとき：\n行われたフリースローは取り消され、正しいプレーヤーが代わりのフリースローを行う。ゲームが再開されてこの誤りの訂正のために止められた場合を除いて、ゲームは通常の最後のフリースローの後と同様に再開される。ゲームが再開されてこの誤りの訂正のために止められた場合、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-4-5", "body": "44-４-５  誤って得点を与えたり 、取り消したりしたとき：\n得点は訂正され、スコアシートも訂正される。ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-4-6", "body": "44-４-６  誤ったプレーヤー、ヘッドコーチ、またはチームに対するファウルを伝達したとき：\nスコアシートは訂正される。誤って5個のファウルを宣せられたプレーヤーまたは失格・退場となったプレーヤーやヘッドコーチは再びゲームに参加できる。本来5 個のファウルを宣せられるべきであったプレーヤーは失格となり、本来失格・退場となるべきであったプレーヤーやヘッドコーチは失格・退場となる。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-4-7", "body": "44-４-７  スコアシートの記録に誤りが生じたとき\n・得点を誤って記録しなかった、あるいは誤って記録したとき、\n・プレーヤー、ヘッドコーチ、またはチームに対するファウルを誤って記録しなかった、あるいは誤って記録したとき、\n・タイムアウトを誤って記録しなかった、あるいは誤ったチームに記録したとき、スコアシートは訂正され、ゲームからの失格・退場や再参加といった訂正の結果に基づく処置が適用される。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-4-8", "body": "44-４-８  ゲームクロックを正しくスタートまたはストップできなかったとき、あるいは誤った競技時間を設定してしまったとき（機材の故障を含む）：\nゲームクロックは、誤りを訂正するために必要な時間を増やしたり、減らしたりすることで訂正される。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-5", "body": "44-５  訂正のできる誤り カテゴリー2 - 定義以下の誤りをカテゴリー2 とし、規則が誤って適用された場合に審判は訂正することができる。\n機材の故障を含むショットクロックを正しくスタートまたはストップできなかった誤りや誤った秒数を設定してしまった誤り。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-6", "body": "44-６  訂正のできる誤り カテゴリー2 - 基本的な手続き"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-6-1", "body": "44-６-１  誤りを訂正するには、審判、コミッショナー（同席している場合）、またはテーブルオフィシャルズが誤りを特定しなければならない：\n・誤りが起きた直後、ボールがライブで誤りの訂正のために審判がゲームを止めたとき、あるいは\n・審判が何らかの理由で最初にゲームを止め、誤りが起きたときにボールをコントロールしていた、もしくはコントロールが与えられることになっていたチームが引き続きボールをコントロールしている、もしくはコントロールが与えられることになっているとき。\nショットクロックは正しい時間に訂正される。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-6-2", "body": "44-６-２  次の状況のあと、ショットクロックは訂正することはできない：\n・誤りのあと、ライブのボールのコントロールが変わった。\n・ボールをコントロールしているチームが得点した。\n・ゲームの終了を知らせるゲームクロックのブザーが鳴り、ボールがデッドになった。\n審判、テーブルオフィシャルズ、第章コミッショナー：任務と権限（OFFICIALS, TABLE OFFICIALS, COMMISSIONER：DUTIES AND POWERS）"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-1", "body": "45-１  審判は、クルーチーフ１人と１人または２人のアンパイアで構成される。その２人または３人を、テーブルオフィシャルズとコミッショナー（同席している場合）が、サポートする。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-2", "body": "45-２  テーブルオフィシャルズは、スコアラー、アシスタントスコアラー、タイマーおよびショットクロックオペレーター各１人とする。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-3", "body": "45-３  コミッショナー（同席している場合）は、スコアラーとタイマーの間に座る。\nコミッショナーのゲーム中の主な任務は、テーブルオフィシャルズの仕事を監督し、クルーチーフとアンパイアがゲームを円滑に進行できるようにサポートすることである。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-4", "body": "45-４  審判は、コート上のどちらのチームに対してもあらゆる面で中立であることが求められる。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-5", "body": "45-５  審判、テーブルオフィシャルズ、コミッショナー（同席している場合）は、競技規則に則りゲームを行わなければならず、それらを変える権限を持たない。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-6", "body": "45-６  審判のユニフォームは、審判用のシャツ、黒色の長ズボン、黒色のソックスおよび黒色のシューズとする。\n【補足】国内大会においては、\n①原則夏季のゲームに限り、（公財）日本バスケットボール協会公認の「セカンドユニフォーム上下」の着用を可とする。\n②原則都道府県大会ベスト１６以上の公式大会については、従来の（公財）日本バスケットボール協会公認ユニフォームを着用する。\n③「セカンドユニフォーム」着用の場合は上下ともセカンドユニフォームとし、審判クルーで同じユニフォームを着用する。\n④「セカンドユニフォーム」着用の際のソックスは黒色とする。\nただし、上記①～④について大会主催者の考えにより変更することができる。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-7", "body": "45-７  審判とテーブルオフィシャルズは、それぞれ服装を統一すること。\n【補足】国内の対応においては、テーブルオフィシャルズの服装に限り大会主催者の考えにより決定する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-1", "body": "46-１  ゲーム中に使用される全ての用具・器具を点検し、承認する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-2", "body": "46-２  公式のゲームクロック、ショットクロック、ストップウォッチを指定し、テーブルオフィシャルズを確認する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-3", "body": "46-３  ホームチームが用意した２つの使用済みボールから試合球を選ぶ。どちらも試合球として不適当な場合は、可能な限り質のよいボールを選ぶことができる。\n【補足】国内大会においては大会主催者の考えによって決定する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-4", "body": "46-４  他のプレーヤーに怪我をさせる可能性があると思われるものの着用を禁ずる。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-5", "body": "46-５  第１クォーターを始めるためにセンターサークルでジャンプボールを行う。また、それ以外のクォーターやオーバータイムを始めるためにスローインのボールをプレーヤーに与える。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-6", "body": "46-６  状況に応じてゲームを中断する権限を持つ。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-7", "body": "46-７  ゲームを没収する権限を持つ。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-8", "body": "46-８  ゲーム終了後あるいは必要と思われるときにはいつでも、スコアシートを綿密に点検する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-9", "body": "46-９  ゲーム終了後にスコアシートを承認しサインをする。クルーチーフがスコアシートを承認しサインをしたときに、審判とゲームの関係が終了する。\n審判が判定を下す権限は、ゲーム開始予定時刻の20 分前にコートに出たときから始まり、クルーチーフがゲームの終了を知らせるゲームクロックのブザーを承認したときに終わる。\n【補足】20 分前：国内大会においては、大会主催者の考えによって決定する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-10", "body": "46-10  控室でスコアシートにサインをする前に、スコアシートの裏面に以下の項目を記載する：\n・没収ゲーム、ディスクォリファイングファウル。\n・ゲーム開始予定時刻の20分以上前、またはゲーム終了後からスコアシートを承認しサインするまでの間の時間帯に発生した、チームメンバー、ヘッドコーチ、アシスタントコーチやチーム関係者による、スポーツマンらしくない行為の有無。\nそのような場合、クルーチーフ（同席していればコミッショナー）は、大会主催者宛てに報告しなければならない。\n【補足】20 分以上前：国内大会においては大会主催者の考えによって決定する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-11", "body": "46-11  審判の意見が一致しないときなど必要なときは、最終的な決定を下す。\nそのために、アンパイア、コミッショナー（同席している場合）あるいはテーブルオフィシャルズに意見を求めてもよい。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-12", "body": "46-12  インスタントリプレーシステム（IRS）が使用されるゲームについては、別添資料F を参照すること。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-13", "body": "46-13  第１クォーターおよび第３クォーターが始まる３分前と１分30 秒前であることをタイマーから知らされたあと、クルーチーフは笛を吹く。また、第２クォーター、第４クォーターおよびオーバータイムが始まる30 秒前も同様に、笛を吹く。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限", "sec_no": "46-14", "body": "46-14  競技規則に示されていないあらゆる事項に決定を下す権限を持つ。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限", "sec_no": "47-1", "body": "47-１  審判は、スコアラーズテーブル、チームベンチ、およびそのラインのすぐ後ろのエリアに近いフロアの範囲を含む、境界線の内外で起きた規則の違反（ファウルやバイオレーション）に対して判定を下す権限を持つ。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限", "sec_no": "47-2", "body": "47-２  規則の違反（ファウルやバイオレーション）が起こったとき、各クォーターまたはオーバータイムが終了したとき、あるいはその他必要と思われるときにゲームを止める場合は、審判は笛を鳴らす。ゴールやフリースローが成功した後あるいはボールがライブになったときには、審判は笛を鳴らさない。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限", "sec_no": "47-3", "body": "47-３  規則の違反（ファウルやバイオレーション）を判定するとき、審判は次の基本的な原則を考慮しなければならない。\n・ルールの精神と目的を理解し、公平にゲームを進行させる。\n・アドバンテージとディスアドバンテージを見極め、１ゲームをとおして相手のプレーを妨げた体の触れ合いだけにファウルを宣する。触れ合いを起こしたプレーヤーが有利にもならず相手チームのプレーヤーも不利になっていないような偶然の体の触れ合いにファウルを宣して、不必要にゲームを止めることは避けなければならない。\n・プレーヤーの能力や態度、ゲームの流れなどに気を配り、１ゲームをとおしてそのゲームにふさわしい判定を示す。\n・ゲームをとおして、ゲームのコントロール、ゲームの流れを考慮し、参加者それぞれの立場を感じとり、ゲームに何が大切なのかを考えながら判定を示す。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限", "sec_no": "47-4", "body": "47-４  どちらか一方のチームから抗議の申し立てがあった場合は、クルーチーフ（同席していればコミッショナー）は、申し立ての理由を受理した後で、その件について大会主催者まで書面で報告をする。\n【補足】国内の対応においては、大会主催者の考えによって決定する。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限", "sec_no": "47-5", "body": "47-５  審判の１人が怪我またはその他の理由で審判を続けられなくなり、その後５分を経過してもその審判が任務を遂行できない場合は、ゲームを再開する。\n怪我をした審判の代わりとなる審判がいない場合は、残りの審判だけでゲーム終了まで任務を遂行する。\n代わりの審判の起用については、コミッショナーが同席している場合はコミッショナーと協議したあと、残りの審判が決定する。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限", "sec_no": "47-6", "body": "47-６  国際ゲームにおいて、判定をより明確に伝える必要がある場合は、英語を使う。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限", "sec_no": "47-7", "body": "47-７  審判はそれぞれ独自に判定を下す権限を持ち、互いに定められた任務の範囲内で他の審判が下した判定に対しては、取り消したり異議を唱えたりする権限は持たない。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限", "sec_no": "47-8", "body": "47-８  競技規則に則った審判の判定や決定は、明確な判定がなされたかどうかにかかわらず抗議申し立てが認められている状況（Ｃ-抗議の手続き：参照）を除き、最終的なものであり、異議を唱えたり無視したりすることはできない。"}, {"type": "rule", "art_no": "48", "art_title": "スコアラー、アシスタントスコアラー：任務", "sec_no": "48-1", "body": "48-１  スコアラーは、スコアシートを用意して次のことを記録する：\n・ゲーム開始のときに出場するプレーヤーの氏名、番号、および交代要員全員の氏名、番号のチーム情報。ゲーム開始のときに出場する５人のプレーヤー、交代要員あるいは番号が違っているときは、速やかに近くにいる審判に知らせなければならない。\n・成功したゴールとフリースローによる得点の合計。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n・各プレーヤーに宣せられたファウル。また、ヘッドコーチのファウルを記録し、ヘッドコーチが失格・退場になる場合は速やかに審判に知らせる。同様に、同じプレーヤーに２個のテクニカルファウル、２個のアンスポーツマンライクファウル、あるいは１個のテクニカルファウルと１個のアンスポーツマンライクファウルが宣せられて失格・退場になる場合も速やかに審判に知らせる。\n・タイムアウト。チームからタイムアウトの請求があったときは、「タイムアウトが認められる時機」に審判に知らせなければならない。また、前後半や各オーバータイムでそのチームにタイムアウトが残っていない場合は、審判を通じてそのチームのコーチに知らせる。\n・オルタネイティングポゼッションアローを用いて次のオルタネイティングポゼッションを示す。後半からはチームの攻撃するバスケットが変わるので、スコアラーは前半が終了したときに速やかにオルタネイティングポゼッションアローの向きを変えなければならない。\n・認められたヘッドコーチチャレンジ。ヘッドコーチが誤って2 回目のチャレンジを請求したときは、速やかに近くにいる審判に知らせなければならない。"}, {"type": "rule", "art_no": "48", "art_title": "スコアラー、アシスタントスコアラー：任務", "sec_no": "48-2", "body": "48-２  アシスタントスコアラーは、スコアボードを操作しスコアラーとタイマーをサポートする。スコアボードの表示とスコアシートの記録に相違があり、解決することができない場合は、スコアシートを優先させ、それにしたがってスコアボードを訂正する。"}, {"type": "rule", "art_no": "48", "art_title": "スコアラー、アシスタントスコアラー：任務", "sec_no": "48-3", "body": "48-３  スコアシートの記録に誤りが見つかった場合は、次のように処置をする：\n・記録の誤りがゲーム中に見つかった場合、タイマーは、ブザーを鳴らして審判に知らせる前に、次にボールがデッドになるのを待たなければならない。\n【補足】国内大会においては、次にボールがデッドになったときにスコアラーがブザーを鳴らす。\n・スコアラーはクルーチーフと協議し、第44条「訂正のできる誤り」の範囲内で修正できる誤りは修正しなくてはならない。\n・記録の誤りが第44 条「訂正のできる誤り」で規定されている範囲内で発見されなかった場合、その誤りは訂正することができない。クルーチーフあるいはコミッショナー（同席している場合）は、その事実の詳細な報告を大会主催者に提出しなければならない。"}, {"type": "rule", "art_no": "49", "art_title": "タイマー：任務", "sec_no": "49-1", "body": "49-１  タイマーは、ゲームクロックとストップウォッチを操作し、次の任務を行う：\n・競技時間、タイムアウト、プレーのインターバルの時間をはかる。\n・各クォーター、各オーバータイムの終了時を、ゲームクロックと連動した大きな音のブザーで知らせる。\n・ブザーが鳴らなかったり聞こえなかったりした場合は、何らかの方法で速やかに審判に知らせる。\n・各プレーヤーに宣せられたファウルの数を、両方のヘッドコーチに見えるように、表示器具を上げて示す。\n【補足】国内大会においてはアシスタントスコアラーが行う。\n・プレーヤーまたはコーチが失格・退場になったときには、「ゲームディスクォリフィケーション・マーカー」\nを示す。\n【補足】国内大会においてはアシスタントスコアラーが行う。\n・いずれかのプレーヤーが5 個のファウルを宣せられたとき、速やかに審判に知らせる。\n【補足】国内大会においてはスコアラーが行う。\n・チームのベンチに最も近いスコアラーズテーブルの両側に配置されるチームファウルの表示器具を操作する。チームファウルの表示器具はその時点でのチームファウルの数を表示する。またクォーター内で4個目のチームファウルが発生し、ボールが再びライブになった後で、完全に赤く表示し、チームファウルの数は表示しない。\n【補足】国内大会においてはアシスタントスコアラーが行う。\n・交代の合図をする。\n【補足】国内大会においてはスコアラーが行う。\n・タイムアウトの合図をする。チームがタイムアウトを請求しているとき、タイムアウトが認められる時機であることを審判に知らせなければならない。\n【補足】国内大会においてはスコアラーが行う。\n・ブザーは、ボールがデッドになり再びボールがライブになる前までに鳴らす。タイマーのブザーはゲームクロックやゲームを止めるものではなく、ボールをデッドにするものでもない。\n【補足】国内大会においてはスコアラーが行う。スコアラーのブザーもゲームクロックやゲームを止めるものではなく、ボールをデッドにするものでもない。"}, {"type": "rule", "art_no": "49", "art_title": "タイマー：任務", "sec_no": "49-2", "body": "49-２  タイマーは、次のように競技時間をはかる：\n・次の瞬間にゲームクロックを動かし始める。\n−ジャンプボールの場合、正当にジャンパーがボールをタップしたとき。\n−最後のフリースローが成功せず、引き続きボールがライブの場合、ボールがコート上のプレーヤーに触れたとき。\n−スローインの場合、コート上のプレーヤーがスローインされたボールに正当に触れたとき。\n・次の瞬間にゲームクロックを止める。\n−各クォーター、各オーバータイムの競技時間が終了し、ゲームクロックが自動で止まらなかったとき。\n−ボールがライブで審判が笛を鳴らしたとき。\n−タイムアウトを請求していたチームの相手チームがゴールで得点したとき。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。ゴールが成功したあと、得点されたチームがボールをライブにする前にタイムアウトを請求したときも含まれる。\n−第４クォーター、各オーバータイムの２:00あるいはそれ以下を表示している場合、ゴールが成功したとき。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n−チームがボールをコントロールしている状態で、ショットクロックのブザーが鳴ったとき。\n−チームがボールをコントロールしている状態で、ショットクロックのブザーが鳴り、審判がバイオレーションを宣したとき。"}, {"type": "rule", "art_no": "49", "art_title": "タイマー：任務", "sec_no": "49-3", "body": "49-３  タイマーは、次のようにタイムアウトの時間をはかる：\n・審判が笛を鳴らしてタイムアウトのシグナルを示したときにストップウォッチを動かし始める。\n・50 秒が経過したときに、ブザーを鳴らして審判に知らせる。\n・タイムアウトが終了したときに、ブザーを鳴らす。\n【補足】60 秒が経過したとき。"}, {"type": "rule", "art_no": "49", "art_title": "タイマー：任務", "sec_no": "49-4", "body": "49-４  タイマーは、次のようにプレーのインターバルの時間をはかる：\n・前のクォーター、前のオーバータイムの競技時間が終了したあと、速やかにプレーのインターバルの時間をはかり始める。\n【補足】クォーター終了後すぐにフリースローを行う場合は、プレーのインターバルの時間はそのフリースローが終わってからはかり始める。\n・第１クォーターおよび第３クォーターが始まる３分前と１分30 秒前に審判に知らせる。\n【補足】国内大会ではブザーを鳴らすことを推奨する。\n・第２クォーター、第４クォーター、各オーバータイムが始まる30 秒前に、ブザーを鳴らす。\n・プレーのインターバルが終了したときに速やかにブザーを鳴らし、同時にインターバルの時間の計測を終了する。\n【補足】ゲームクロックを速やかに各クォーターの競技時間にセットする。"}, {"type": "rule", "art_no": "50", "art_title": "ショットクロックオペレーター：任務（Shot clock operator: Duties）", "sec_no": "50-1", "body": "50-１  次のとき、ショットクロックを動かし始める、あるいは再開する：\n・コート上でどちらかのチームがライブのボールを新たにコントロールしたとき。その後相手チームのプレーヤーがボールに触れても、引き続き同じチームのボールのコントロールが終わらない限り、ショットクロックは止めないしリセットもしない。\n【補足】新たにコントロールしたときは速やかにショットクロックをリセットし、改めて24秒をはかり始める。\n・スローインのときは、スローインされたボールがコート上のプレーヤーに正当に触れたとき。"}, {"type": "rule", "art_no": "50", "art_title": "ショットクロックオペレーター：任務（Shot clock operator: Duties）", "sec_no": "50-2", "body": "50-２  次のことが起こった結果、それまでボールをコントロールしていたチームに引き続きスローインが与えられるときは、残り時間がはっきりと表示されている状態でショットクロックは止めるがリセットはしない：\n・ボールがアウトオブバウンズになったとき。\n・ボールをコントロールしているチームのプレーヤーの怪我で審判がゲームを止めたとき。\n・ボールをコントロールしているチームにテクニカルファウルが宣せられたとき。\n・ジャンプボールシチュエーションになったとき（ただし、ボールがリングとバックボードの間に挟まったときを除く）。\n・ダブルファウルが宣せられたとき。\n・両チームに等しい罰則の相殺があったとき。\n【補足】特別な処置をする場合の規定やファイティングの規定を適用し、罰則を相殺したり取り消したりしたときを指す。\nファウルやバイオレーションの結果、それまでボールをコントロールしていたチームに引き続きフロントコートでスローインが与えられ、ショットクロックに14秒以上表示されている場合、残り時間がはっきりと表示されている状態でショットクロックは止めるが、リセットはしない。"}, {"type": "rule", "art_no": "50", "art_title": "ショットクロックオペレーター：任務（Shot clock operator: Duties）", "sec_no": "50-3", "body": "50-３  次のとき、ショットクロックを止めて24 秒にリセットし、秒数を表示しない：\n・ボールが正当にバスケットに入ったとき。\n・ボールが相手チームのバスケットのリングに触れ相手チームがそのボールをコントロールしたとき。\n・次のことが起こった結果、チームのバックコートからスローインが与えられるとき。\n−ファウルやバイオレーション（ボールがアウトオブバウンズになる場合は除く）。\n−ジャンプボールシチュエーションで、それまでボールをコントロールしていないチームにボールが与えられる。\n−ボールをコントロールしていないチームに原因がありゲームが中断する。\n−どちらのチームにも関係のない理由でゲームが中断する。ただし、相手チームが著しく不利になる場合を除く。\n【補足】ゲームクロックが動いているときに、ショットクロックが誤ってリセットされてしまった場合も含む。審判が相手チームにとって著しく不利になると判断した場合は、ショットクロックはリセットしない。\n・フリースローを行うとき。"}, {"type": "rule", "art_no": "50", "art_title": "ショットクロックオペレーター：任務（Shot clock operator: Duties）", "sec_no": "50-4", "body": "50-４  次のとき、ショットクロックははっきりと表示されている状態で14 秒にリセットする：\n・次のことが起こった結果、それまでボールをコントロールしていたチームに引き続きフロントコートからのスローインが与えられ、ショットクロックが表示している残りの秒数が13 秒以下であるとき：\n−ファウルやバイオレーション（ボールがアウトオブバウンズになる場合は除く）。\n−ボールをコントロールしていないチームに原因がありゲームが中断する。\n−どちらのチームにも関係のない理由でゲームが中断する。ただし、相手チームが著しく不利になる場合を除く。\n【補足】ゲームクロックが動いているときにショットクロックが誤ってリセットされてしまった場合も含む。審判が相手チームにとって著しく不利になると判断した場合は、ショットクロックはリセットしない。\n・次のことが起こった結果、それまでボールをコントロールしていなかったチームにフロントコートからのスローインが与えられるとき。\n−パーソナルファウルあるいはバイオレーション（ボールがアウトオブバウンズになる場合を含む）。\n−ジャンプボールシチュエーション。\n・アンスポーツマンライクファウルやディスクォリファイングファウルの結果、フロントコートのスローインラインからスローインが与えられるとき。\n・ボールがリングとバックボードの間に挟まったときを含めて、成功しなかったゴールや最後のフリースローのボール、あるいはパスのボールがリングに触れたあと、それまでボールをコントロールしていたチームが再びボールのコントロールを得るとき。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n・第４クォーターや各オーバータイムでゲームクロックが２:00あるいはそれ以下を表示しているときに、バックコートのアウトオブバンズからスローインが与えられたチームにタイムアウトが認められ、そのチームのヘッドコーチがフロントコートのスローインラインからゲームを再開することを決め、ショットクロックが表示している残りの秒数が14 秒以上であるとき。"}, {"type": "rule", "art_no": "50", "art_title": "ショットクロックオペレーター：任務（Shot clock operator: Duties）", "sec_no": "50-5", "body": "50-５  ボールがデッドでゲームクロックが止められ、そのとき各クォーターやオーバータイムの残りが14秒未満で、なおかつどちらかのチームにボールのコントロールが新たに始まるとき、ショットクロックの表示装置の表示を切る。\nショットクロックのブザーは、チームがボールをコントロールしているときを除いて、ゲームクロックやゲームを止めるものではないし、ボールをデッドにするものでもない。\n別添資料Ａ－審判のシグナル（OFFICIALS’ SIGNALS）\nＡ１ 図に示してあるシグナルだけが公式である。\nＡ２ スコアラーズテーブルにレポートするときには、声を使ってコミュニケーションをとることを強く勧める。\n（国際ゲームでは英語を用いる）\nＡ３ テーブルオフィシャルズがこれらのシグナルによく慣れていることが大切である。\n図８ 審判のシグナル\n図９ スコアシート別添資料Ｂ－スコアシート （THE SCORESHEET）\nＢ１  図９に示されているスコアシートは（公財）日本バスケットボール協会の承認を得たものである。\nＢ２  スコアシートは、それぞれ色の異なる４枚の用紙（１枚のオリジナルと３枚のコピー）からなっている。オリジナルは白色で（公財）日本バスケットボール協会用である。第１のコピーは青色で大会主催者用、第２のコピーはピンク色で勝ちチーム用、最後の（第３の）コピーは黄色で負けチーム用である。\n注：１．スコアラーは、異なる２色のペンを使用し、１色（赤色）は第１クォーターおよび第３クォーター用に、もう１色（青色または黒色）は第２クォーターおよび第４クォーター用にする。オーバータイムは、青色または黒色のペンを使用する（第２クォーターおよび第４クォーターと同色）。\n【補足】ゲーム開始前およびゲーム終了後に記入する各項目およびスコアシートの最上段の各項目は、全て青色または黒色で記入する。\n２．スコアシートは電子入力で作成することもできる。\nＢ３ スコアラーは、ゲーム開始予定時刻の遅くとも40分前までに、次の項目を記入したスコアシートを用意する：\n【補足】国内大会においては、ゲームに出場することのできるチームのメンバーリストの提出時間は、大会主催者の考えにより変更することができる。\nＢ３-１ スコアシート上部のスペースに両チームのチーム名を記入する。\nチームＡはホームチームとするが、大会や中立地域での開催の場合は、プログラムで先に記載されているチームをチームＡ、相手チームをチームＢとする。\nＢ３-２  次の事項も記入する：\n・大会名\n・ゲームナンバー\n・年月日、場所、開始時刻\n・クルーチーフとアンパイアの氏名および国籍\n【補足】国内大会においては、事前に記載することが望ましい。ただし国籍の記載は不要とする。\n図10 スコアシート上部Ｂ３-３ チームＡはスコアシートの上の枠を、チームＢは下の枠を使用する。\nＢ３-３-１ １列目に、スコアラーは、プレーヤーとヘッドコーチとファーストアシスタントコーチのライセンスナンバー（最後の３桁）を記入する。トーナメントでは、ライセンスナンバーはそのチームが最初に行うゲームのみ記される。\n【補足】国内大会においては、大会主催者の考えによりライセンスナンバー（最後の３桁）\n記載の有無、またトーナメントにおけるそのチームの２ゲーム目以降の記載について変更することができる。\nＢ３-３-２ ２列目には、ヘッドコーチあるいはその他チーム代表者により提出されたプレーヤーリストを使い、各プレーヤーの氏名をユニフォームの番号順に記入する。キャプテンには、氏名のすぐ横に（CAP）と記載する。\nＢ３-３-３ チームに18 人未満のプレーヤーしかいない場合は、最後に記載されたプレーヤーの下の行の氏名、背番号、プレーヤーインの空白に線を引く。プレーヤーが17 人未満の場合は、ファウルの欄に達するところまでは水平の横線を引き、そこから斜めに下まで斜線を引く。\n【補足】国内大会においては、ゲームに登録できるチームメンバーの人数は大会主催者の考えにより変更することができる。\n図11 スコアシートのチーム（ゲーム開始前）\nＢ３-４  各チームの下段のコーチの欄とアシスタントコーチの欄に、それぞれヘッドコーチ、ファーストアシスタントコーチの氏名を記入する。\n【補足】国際ゲームにおいては、各プレーヤー、ヘッドコーチ、ファーストアシスタントコーチの氏名は大文字・ブロック体で姓・名の順で記入する。（例 MAYER,F.）\nＢ３-5 スコアシートの下段に、スコアラー、アシスタントスコアラー、タイマー、ショットクロックオペレーターの氏名を記入する。\n【補足】国内大会においてはゲーム前の氏名の記入は省略し、ゲーム後のサインのみ行う。\nＢ４ ゲーム開始予定時刻の遅くとも10 分前までに、ヘッドコーチは次のことを行う：\nＢ４-１ 記入されたチームメンバーの氏名・番号を確認する。\nＢ４-２  ヘッドコーチ、ファーストアシスタントコーチの氏名を確認する。ヘッドコーチとファーストアシスタントコーチがいないときは、キャプテンがプレーヤー兼ヘッドコーチとしてコーチの役割を果たし、氏名の後に（CAP）と記載される。\nＢ４-３  ゲームの最初に出場する5 人のプレーヤーの、Player in 欄に小さい×印を記入する。\n【補足】キャプテンがゲームの最初に出場しない場合は、コート上でキャプテンの役目をするプレーヤーの番号をスコアラーに伝える。\nＢ４-４ スコアシートにサインをする。\nスコアシートの記載事項の確認とサインは、チームＡのヘッドコーチが先に行う。\n【補足】国内大会においては、チームメンバーリストを確認・同意する時間は、大会主催者の考えにより変更することができる。\nＢ５ スコアラーは、ゲーム開始時に、ゲームに最初に出場する両チームの５人のプレーヤーを確認したのちPlayer in 欄の×印を○で囲む。\n【補足】この○は赤色で記入する。\nＢ６ ゲーム中、交代要員がゲームに出場したときは、Player in 欄に×印を記入するが○では囲まない。\nＢ７ タイムアウトＢ７-１   認められたタイムアウトは、スコアシート上のチーム名の下にある所定の欄（前半はH1の横、後半はH2の横、オーバータイムはOTの横）に、タイムアウトが認められた時点での各クォーターまたはオーバータイムの経過時間（分）を数字で記入する。\nＢ７-２  各ハーフ、各オーバータイムに使用しなかった枠には２本の横線を引く。第４クォーターでゲームクロックが残り２:00を表示する前に、チームに後半の最初のタイムアウトが認められなかったときは、そのチームの後半の最初の枠（後半の左端の枠）に２本の横線を引く。\n【補足】例えば、「残り３分12秒」のときには「７」、「残り０分45秒」のときには「10」と記入する。それぞれの数字は、各クォーターで使用している色で記入する。すなわち、第１クォーターと第３クォーターは赤色、第２クォーターと第４クォーターおよび各オーバータイムは青色または黒色で記入する。\n図12 スコアシートのチーム（ゲーム終了後）\nＢ８ ファウルＢ８-１  プレーヤーのファウルには、パーソナル、テクニカル、アンスポーツマンライク、ディスクォリファイングのファウルがあり、その該当するプレーヤーに記入する。\n【補足】それぞれのファウルの枠に左から順に記入する。\nＢ８-２  ヘッドコーチ、ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー、チーム関係者のファウルには、テクニカルとディスクォリファイングがあり、そのチームのヘッドコーチに対して記入される。さらに、スコアシートに氏名が記入された人によるファイティングが起きたときのディスクォリファイングファウルは、これらの人に記入される。\n【補足】それぞれヘッドコーチの枠に左から順に記録する。ただし、プレーのインターバル中のチームメンバーのファウルについては、それぞれのチームメンバー（プレーヤー、交代要員）のファウルの枠に記入する。\nＢ８-３ ファウルは、次のように記入する。\nＢ８-３-１  パーソナルファウルは「P」と記入する。\nＢ８-３-２  プレーヤーのテクニカルファウルは「T」と記入する。\n２個目のテクニカルファウルが記録されてそのプレーヤーが失格・退場となった場合は、すぐ隣の枠に「GD」を記入する。\n【補足】そのテクニカルファウルがそのプレーヤーの５個目のファウルだった場合は、最後の枠の隣（欄外）に「GD」を記入する。\nＢ８-３-３  ヘッドコーチ自身のスポーツマンらしくない振る舞いに対して宣せられるテクニカルファウルは「C」\nと記入する。同様の２個目のテクニカルファウルは「C」を記入し、すぐ隣の枠に「GD」を記入する。\nＢ８-３-４  それ以外の理由でヘッドコーチに記録されるテクニカルファウルは「B」と記入する。３個目のテクニカルファウル（そのうちの１個は「C」でも可）は「B」または「C」と記入し、最後の枠の隣（欄外）に「GD」を記入する。\n【補足】ヘッドコーチに記録されるテクニカルファウル、ディスクォリファイングファウルは、チームファウルに数えない。\nＢ８-３-５ アンスポーツマンライクファウルは「U」と記入する。\n２個目のアンスポーツマンライクファウルが記録された場合は、すぐ隣の枠に「GD」を記入する。\nＢ８-３-６  すでにアンスポーツマンライクファウルを記録されたプレーヤーがテクニカルファウルを宣せられた場合、またはすでにテクニカルファウルを記録されたプレーヤーがアンスポーツマンライクファウルを宣せられた場合も同様に、「U」もしくは「T」を記入し、すぐ隣の枠に「GD」を記入する。\nＢ８-３-７ プレーヤー兼ヘッドコーチは以下のときに失格・退場となる：\n・コーチとしてテクニカルファウル（C）とプレーヤーとしてのアンスポーツマンライクファウルまたはテクニカルファウルが宣せられる。\n・コーチとしてテクニカルファウル（B）とコーチとしてテクニカルファウル（C）とプレーヤーとしてのアンスポーツマンライクファウルまたはテクニカルファウルが宣せられる。\n・コーチとして２個のテクニカルファウル（B）とプレーヤーとしてのアンスポーツマンライクファウルまたはテクニカルファウルが宣せられる。\n最後のテクニカルファウルまたはアンスポーツマンライクファウルが記録されたすぐ隣の枠に「GD」\nを記入する。\nＢ８-３-８ ディスクォリファイングファウルは「D」と記入する。\nＢ８-３-９  フリースローが与えられるファウルは、P、T、C、B、U、Dの後ろにそれぞれのフリースローの数（１、２、３）を小さくつける。\nＢ８-３-10  両チームに科される罰則の重さが等しくて第42 条「特別な処置をする場合」に従って罰則の適用が相殺され、それぞれのフリースローが与えられなくなったファウルは、P、T、C、B、U、Dの後ろに小さいc をつける。\nＢ８-３-11  ファイティングが起きたときにチームベンチエリアを離れたことを含む、ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー、チーム関係者に宣せられたディスクォリファイングファウルは、ヘッドコーチのテクニカルファウル「B」として記入する。\nＢ８-３-12  ファイティングが起きたときに失格・退場を宣せられたヘッドコーチ、ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバーは、「D」または「D」と記入し、残りの全ての枠に「F」と記入する。\nＢ８-３-13  ヘッドコーチ、ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー、チーム関係者のディスクォリファイングファウルの例：\nヘッドコーチに宣せられたディスクォリファイングファウルは、次のように記入する：\nファーストアシスタントコーチに宣せられたディスクォリファイングファウルは、次のように記入する：\n交代要員に宣せられたディスクォリファイングファウルは、次のように記入する：\nそしてすでに５個のファウルを宣せられていたチームメンバーに宣せられたディスクォリファイングファウルは、次のように記入する：\nそしてチーム関係者に宣せられたディスクォリファイングファウルは、次のように記入する：\nＢ８-３-14 ヘッドコーチ、ファーストアシスタントコーチ、交代要員、5 個のファウルを宣せられたチームメンバー、チーム関係者の、ファイティングが起きたときにチームベンチエリアを離れたことによるディスクォリファイングファウルの例：\nチームベンチから離れて失格・退場となった人数にかかわらず、ヘッドコーチに1個のテクニカルファウル「B」または「D」が宣せられる。\nヘッドコーチとファーストアシスタントコーチに宣せられたディスクォリファイングファウルは、次のように記入する：\nヘッドコーチだけが失格・退場を宣せられた場合：\nファーストアシスタントコーチだけが失格・退場を宣せられた場合：\nヘッドコーチとファーストアシスタントコーチの両者が失格・退場を宣せられた場合：\n交代要員に宣せられたディスクォリファイングファウルは、次のように記入する：\n交代要員のファウルが4個より少ない場合は、「D」を記入し、残りの全ての枠に「F」を記入する：\nそしてそのファウルがその交代要員の5個目のファウルだった場合は、「D」を記入し、最後の枠の隣（欄外）に「F」を記入する：\nそして５個のファウルを宣せられたチームメンバーに宣せられたディスクォリファイングファウルは、次のように記入する：\n５個のファウルを宣せられたチームメンバーはファウルの枠がないので、その場合は最後の枠の隣（欄外）に「D」を記入し、続けて「F」を記入する：\nそしてチーム関係者のディスクォリファイングファウルはヘッドコーチに宣せられ、次のように記入する：\nチーム関係者の失格・退場はヘッドコーチに宣せられ、Bと記入されるが、ヘッドコーチ自身の失格・退場の3 個のテクニカルファウルには数えない。\nＢ８-３-15  ヘッドコーチ、ファーストアシスタントコーチ、交代要員、5 個のファウルを宣せられたチームメンバー、チーム関係者の、ファイティングに積極的に関与したことによるディスクォリファイングファウルの例：\nチームベンチから離れて失格・退場となった人数にかかわらず、ヘッドコーチに1個のテクニカルファウル「B」または「D」が宣せられる。\nヘッドコーチが暴力行為に積極的に関与した場合、ヘッドコーチに1個のディスクォリファイングファウル「D」のみが宣せられる。\nヘッドコーチとファーストアシスタントコーチに宣せられたディスクォリファイングファウルは、次のように記入する：\nヘッドコーチだけが失格・退場を宣せられた場合：\nファーストアシスタントコーチだけが失格・退場を宣せられた場合：\nヘッドコーチとファーストアシスタントコーチの両者が失格・退場を宣せられた場合：\n交代要員に宣せられたディスクォリファイングファウルは、次のように記入する：\n交代要員のファウルが４個より少ない場合は、「D」を記入し、残りの全ての枠に「F」を記入する：\nそしてそのファウルがその交代要員の５個目のファウルだった場合は、「D」を記入し、最後の枠の隣（欄外）に「F」を記入する：\nそして５個のファウルを宣せられたチームメンバーに宣せられたディスクォリファイングファウルは、次のように記入する：\n５個のファウルを宣せられたチームメンバーはファウルの枠がないので、その場合は最後の枠の隣（欄外）に「D」を記入し、続けて「F」を記入する：\nそしてチーム関係者のディスクォリファイングファウルはヘッドコーチに宣せられ、次のように記入する：\nチーム関係者2 人のディスクォリファイングファウルはヘッドコーチに宣せられ、次にように記入する：\nチーム関係者の失格・退場はヘッドコーチに宣せられ、B と記入されるが、ヘッドコーチ自身の失格・退場の3 個のテクニカルファウルには数えない。\n注：第39条「ファイティング」によるテクニカルファウルやディスクォリファイングファウルは、チームファウルに数えない。\nＢ８-4   第2 クォーターの終わりに、スコアラーはプレーヤーとコーチのファウル欄のすでに使用した枠と未使用の枠の間に太線を引く。\nゲームの終わりに、ファウルの欄で使用しなかった枠に太く横線を引く。\n【補足】この横線は青色または黒色で記入する。\nＢ９ チームファウルＢ９-１  各クォーター（Q1、Q２、Q３、Q４）のチームファウルを記録するために、スコアシート上（チーム名の下でプレーヤーの氏名の上）に４つの枠がある。\nＢ９-２  プレーヤーがパーソナル、テクニカル、アンスポーツマンライク、ディスクォリファイングのいずれかのファウルを宣せられたときは、１から４までの枠に順番に大きい×印を記入する。\n【補足】プレーのインターバル中に宣せられたチームメンバーのファウルはチームファウルに数え、次のクォーターに起こったものとして記録される。４つの枠が埋められた後は、第41条「チームファウル：罰則」に従って罰則が適用される。\nＢ９-３  各クォーターの終わりに、ファウルの欄で使用しなかった枠に2 本の横線を引く。\nＢ10 ランニングスコアＢ10-１ スコアラーは、両チームのそのときどきの合計得点（ランニングスコア）を記録する。\nＢ10-２ スコアシートには、ランニングスコア用に大きな４列の欄がある。\nＢ10-３ 各欄はさらに４列からできている。左側の２列はチームA に、右側の２列はチームB に使用する。中央の２列は得点合計の数字で、各チーム160 点まで記録できる。\nスコアラーは：\n・まず、ゴールが成功したときは斜線（右利きは／、もしくは、左利きは＼）を、フリースローが成功したときは塗りつぶした丸印（●）を、そのときどきのそのチームの該当する得点合計の欄に記入していく。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n・次に、得点合計（／または＼または●）の隣の欄に得点したプレーヤーの番号を記入する。\nＢ11 ランニングスコア：そのほかの記入事項と注意点Ｂ11-１ ゴールで３点が認められたときは、得点したプレーヤーの番号を○で囲む。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\nＢ11-２ 誤って自チームのバスケットへ得点したゴールは、相手チームのそのときコート上にいるキャプテンが得点したものとして記入する。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\nＢ11-３ ボールがバスケットに入らなくても得点が認められたときは（第31条ゴールテンディング、インタフェアレンス）、そのショットをしたプレーヤーの得点として記入する。\nＢ11-４ 各クォーターやオーバータイムの終わりに、それぞれのチームの最後の得点を太い○で囲み、最後の得点と得点したプレーヤーの番号のすぐ下に太く横線を一本引く。\nＢ11-５ 各クォーターやオーバータイムが始まってからは、前のクォーターに続いて記録を継続する。\nＢ11-６ ゲーム中、スコアボードの得点とスコアシートのランニングスコアは常に照合しなければならない。\nもしも相違がありスコアシートが正しいときは、速やかにスコアボードを訂正させる。\nスコアシートに不審な箇所があったり、一方のチームから得点、ファウルやタイムアウトの数などについての疑義の申し出があったりしたときは、ボールがデッドでゲームクロックが止められたときにクルーチーフに知らせなければならない。\nＢ11-７ 審判、テーブルオフィシャルズは、得点、ファウルの数、タイムアウトの数に関するスコアシートの記録の修正を行うことが規則で認められている。クルーチーフはその修正を確認しサインをする。修正内容が長くなる場合は、スコアシート裏面に記述する。\n図13 ランニングスコアと               図14 スコアシートの下部その最終手続得点合計記入例：オーバータイムが行われなかった場合得点合計記入例：オーバータイムが行われた場合テーブルオフィシャルズと審判のサインＢ12 ランニングスコア：最終手続きＢ12-１ 各クォーター、最後のオーバータイムが終わったとき、両チームのそのクォーターと全てのオーバータイムの得点をスコアシートの下段の「スコア」の欄に記入する。\n【補足】得点は各クォーターで使用したペンで記入する。また、オーバータイムが何回行われても、オーバータイムの得点は1 行に合計して記入する。\nＢ12-２ ゲーム終了後、速やかに終了時刻を記入する。\nＢ12-３ ゲームが終わったときは、最後の得点と得点したプレーヤーの番号のすぐ下に太く横線を２本引く。\n各チームで使用しなかったその列のランニングスコアの欄に、左上から右下に向かって斜線を引く。\nＢ12-４ ゲームが終わったときは、両チームの最終得点合計を「最終スコア」の欄に記入し、勝ったチームのチーム名を「勝者チーム」の欄に記入する。\nＢ12-５ テーブルオフィシャルズは全員スコアシートの氏名の欄にサインをする。\nＢ12-６ アンパイアがサインをしたあと、クルーチーフが最後にスコアシートを点検・承認しサインをする。この行為をもって、そのゲームに対する審判、テーブルオフィシャルズの管理権限と関係が終了する。\nＢ13 ヘッドコーチチャレンジＢ13-１ インスタントリプレーシステムが使用されるゲームでは、それぞれのチームは一度だけヘッドコーチチャレンジ（HCC）を認められる。HCCが認められた場合、スコアシート上のチーム名の下のHCCの横の枠に記入する。スコアラーは、左側の枠にクォーターもしくはオーバータイム（Q１、Q２、Q３、Q４、OT）を記入し、右側の枠にはHCCが認められた時点での各クォーターまたはオーバータイムの経過時間（分）を数字で記入する。\nＢ13-２   ゲーム終了後、スコアラーは使われなかったヘッドコーチチャレンジの枠を二重線で消す。\n別添資料C－抗議の手続き （PROTEST PROCEDURE）\n【補足】本項を国内大会において採用しない。ただし、各種条件を満たし適切に抗議の対応を実施できる場合は、（公財）日本バスケットボール協会の承認により採用することができる。\nC１ チームは、以下の点について不利益を受けた場合は抗議を申し立てることができる。\nａ）審判によって訂正されなかったスコア、ゲームクロックの管理、ショットクロックの操作での誤りのうち、第44条に基づく誤りの訂正ができる客観的証拠があり、事象がおきた時点で審判が認識できた状況にも関わらず行わなかったもの。\nｂ）ゲームの没収、中止、延期、再開もしくはプレーをしないことについての決定。\nｃ）適用される出場資格に対する違反。\nＣ２ 抗議が受理されるためには、以下の手順に従わなければならない：\nａ）ゲーム終了後15分以内に、そのチームのキャプテンは、そのチームがゲーム結果に対して抗議を行うことをクルーチーフに知らせ、スコアシートの「Captain's signature in case ofprotest」欄にサインをしなければならない。\nｂ）ゲーム終了後１時間以内に、そのチームは抗議の理由を文書にてクルーチーフに提出しなければならない。\nｃ）１件の抗議に対し保証金として1,500 スイスフランを添えなければならず、抗議が棄却された場合はそれを支払わなければならない。\nＣ３ クルーチーフあるいはコミッショナー（同席している場合）は抗議の理由を受け取ったあと、抗議に至った事象をFIBAの代表者（大会主催者）もしくは裁定機関（裁定委員会等）に文書で提出しなければならない。また、クルーチーフあるいはコミッショナー（同席している場合）は抗議の理由を受け取った時刻について書面にて記録しなければならない。\nＣ４ 裁定機関は必要な手続き上の要求を行い、ゲーム終了後24 時間以内に速やかにその抗議に関する決定を下す。裁定機関はあらゆる確かな証拠に基づいて、一部あるいはフルゲームの再試合の実施を含め、適切な決定を下すことができる。裁定機関は、抗議の対象となった誤りに限らず、ゲームの結果が確実に変わるという明らかで決定的な証拠が存在しない限りゲームの結果を変える決定はできない。\nＣ５ 裁定機関の決定は現場での決定とみなされ、その後の再審査や抗議は受け付けない。例外として、出場資格に関する決定は規定に則り抗議することができる。\nＣ６ FIBA の大会や別途定めのないその他の大会での特別な規定:\nａ）トーナメント形式の大会では、全ての抗議の管轄機関はテクニカルコミッティー（技術委員会）とする（FIBA Internal Regurations, Book ２参照）。\n【補足】国内大会においては、大会主催者が設置した機関とする。\nｂ）ホーム&アウェーの大会では、出場資格に関する抗議の裁定機関はFIBA DisciplinaryPanel（FIBA 懲罰委員会）とする。その他の抗議に関する裁定機関はFIBA とし、競技規則の遂行と解釈に関する専門知識を有する１名以上が担当する（FIBA InternalRegurations, Book ２参照）。\n【補足】国内大会においては、大会主催者が設置した機関とする。\n別添資料D－チームの順位決定方法（CLASSIFICATION OF TEAMS）\n【補足】以下、本項を国内大会において採用するか否かについては、大会主催者の考えにより変更・決定することができる。\nＤ１ 手順Ｄ１-１  チームの順位は勝敗記録によって決定されなければならない。各ゲームに勝ったチームに勝ち点2、各ゲームに負けたチームに勝ち点1（ゲームの途中終了を含む）、各ゲームの没収によって負けたチームに勝ち点0 が与えられる。\nＤ１-２  この手順は、総当たり方式の大会に適用される。\nＤ１-３  グループ内で、全ゲームの勝敗記録が２チーム以上で同じ場合、その２チーム以上のチーム間での対戦成績によって順位を決定する。２チーム以上のチーム間での勝敗記録が同じ場合、次の順序で更なる基準が適用される：\n・当該チームの対戦での得失点差の大きい方。\n・当該チームの対戦での得点数の大きい方。\n・グループ内の全ゲームでの得失点差の大きい方。\n・グループ内の全ゲームでの得点数の大きい方。\nこれらの基準を適用してもグループフェーズの終了時に最終決定に至らない場合は、各国の代表チームの大会の最終順位は関連するFIBAランキングによって決定される。FIBAランキングが存在しないその他の全ての大会では最終順位は抽選で決定される。\nＤ１-４  これらの基準の各段階で順位を決定していき、まだ順位決定されていない当該チーム間の対戦成績でＤ１-３の手順を初めから繰り返すことで最終的な順位を決定する。\nＤ２ 例Ｄ２-１Ｄ２-２Ｄ２-３Ｄ２-４Ｄ２-５Ｄ２-６Ｄ２-７Ｄ３ 没収Ｄ３-１  正当な理由なく、予定されたゲームに現れなかったり、ゲームの終了前にコートから立ち去ったりしたチームは没収による負けとなり、勝ち点は0 ポイントになる。\nＤ３-２  チームが２回目の没収となった場合には、このチームの対戦結果は全て無効になる。\nＤ３-３  チームがグループ内で行われた対戦で2回目の没収となり、各グループの上位チームが次のラウンドに進む場合は、一方のグループ最下位チームの対戦成績は全て無効になる。\n例グループA のチーム4A は2 回目の没収となったため、全てのゲームは無効になる。\nＤ４ グループ間の順位決定方法Ｄ４-１  複数のグループでの２位や３位のチームの中で最も上位のチームを決定するなど、グループ間でチームの順位を決定するために、次の基準を適用する。\n全てのグループの全てのチームが同じゲーム数を行なっている場合、各グループの同じ順位のチームを１つのグループに編成し、次の基準が次の順序で適用される：\n・編成された最終グループの順位内で、行なった全てのゲームの勝敗記録が優れている方。\n・編成された最終グループの順位内で、全てのゲームの得失点差の大きい方。\n・編成された最終グループの順位内で、全てのゲームの得点数の大きい方。\n・これらの基準によっても順位が決定できない場合は、関連するFIBA ランキングによって最終順位を決定する。\n各グループの２位のチームの中で最も上位のチームを決定する方法：\nＤ４-２  それぞれのグループの同じ順位のチームを１つのグループに編成したあと、これらのチームがそれぞれのグループで異なる数のゲームを行なっている場合、グループ内での最下位のチームのゲーム、もしくは最もゲーム数の多いチームのグループが無効になる。この手順はゲーム数が全てのグループで同じになるまで全てのグループで繰り返される。その場合、次の基準が適用される：\n・編成された最終グループの順位内で、行なった全てのゲームの勝敗記録が優れている方\n・編成された最終グループの順位内で、全てのゲームの得失点差の大きい方。\n・編成された最終グループの順位内で、全てのゲームの得点数の大きい方。\n・これらの基準によっても順位が決定できない場合は、関連するFIBA ランキングによって最終順位を決定する。\n注：\n疑義を避けるための注として、上記のゲームの無効化はグループ間での順位決定の目的で行うものであり、特定のグループ内のチームの最初の順位を変更するものではない。\n例：\n各グループの３位のチームの中で最も上位のチームを決定するため、全ての３位チームを１つのグループとして編成する：\nしかしながら、３B と３A のチームは5 ゲーム、３D と３C のチームは４ゲームを行なっている。\n全ての３位チームのゲーム数を4 ゲームとするため、グループA とグループB の最下位のチームのゲームを無効とし、新たな表を編成する。\nグループA とグループB のゲームの結果は以下の通りとなる：\n６Aと６Bのチームのゲームの無効化し、各グループの３位のチームの中で最も上位のチームを決定するために編成されたグループの順位は以下の通りとなる：\nＤ５ 大会中のフェーズでのチームの順位決定方法Ｄ５-１ グループでのゲームの結果があるフェーズから他のフェーズへ持ち越される大会で、チームが大会から棄権となったり、あらゆる理由によって2回目の没収となったりすると、全ての関連するフェーズからそのチームの全てのゲームの結果が無効となる。その場合、次の基準が適用される：\n・編成された最終グループの順位内で、行った全てのゲームの勝敗記録が優れている方。\n・編成された最終グループの順位内で、全てのゲームの得失点差の大きい方。\n・編成された最終グループの順位内で、全てのゲームの得点数の大きい方。\n・これらの基準によっても順位が決定できない場合は、関連するFIBA ランキングによって最終順位を決定する。\n例：\n１次ラウンドホーム＆アウェーで行われる各4 チームの2 つのグループの順位が以下の場合：\n2 次ラウンドグループA とグループB の上位3 チームが、ゲームの結果と勝ち点を持ち越してグループC へと進出する。最初の順位は以下の通りとなる：\nチームがホーム＆アウェーでそれ以前に同じグループではなかったチームとゲームを行い、結果が以下の場合：\nチーム２Bが2回の没収によって、（両ラウンドでの）チーム２Bの全てのゲームの結果が、以下の通り無効となる：\n改訂された１次ラウンドの結果：\n改訂された２次ラウンドの結果：\n最終順位：\nＤ６ ホーム＆アウェーゲーム（総得点）\nＤ６-１  ２ゲームのホーム＆アウェー合計得点シリーズ（総得点）の大会形式では、２ゲームは80 分間の１ゲームであるとみなされる。\nＤ６-２  第１戦の終了時に得点が同点の場合、オーバータイムは行われない。\nＤ６-３  両ゲームの総得点が同点の場合、第２戦は同点ではなくなるまで５分のオーバータイムを必要な回数行う。\nＤ６-４  シリーズの勝者は：\n・両ゲームに勝ったチーム。\n・両チームが１ゲームずつ勝った場合、第２戦終了時に集計された得点がより大きかったチーム。\nＤ７ 例Ｄ７-１ 例１A vs B 80－75B vs A 72－73チームA がシリーズの勝者（両ゲームの勝者）\nＤ７-２ 例２A vs B 80－75B vs A 73－72チームA がシリーズの勝者（総得点 A152－B148）\nＤ７-３ 例３A vs B 80－80B vs A 92－85チームB がシリーズの勝者（総得点 A165－B172）。第１戦のオーバータイムは行わない。\nＤ７-４ 例４A vs B 80－85B vs A 75－75チームB がシリーズの勝者（総得点 A155－B160）。第２戦のオーバータイムは行わない。\nＤ７-５ 例５A vs B 83－81B vs A 79－77総得点 A160－B160。第２戦のオーバータイム後：\nB vs A 95－88チームB がシリーズの勝者（総得点 A171－B176）。\nＤ７-６ 例６A vs B 76－76B vs A 84－84総得点 A160－B160。第２戦のオーバータイム後：\nB vs A 94－91チームB がシリーズの勝者（総得点 A167－B170）。\n別添資料E－メディアタイムアウト（MEDIA TIME-OUTS）\nＥ１ 定義大会主催者はメディアタイムアウトを実施するかどうか、またその長さ（60秒、75秒、90 秒、100秒のいずれか）を決定することができる。\nＥ２ ルールＥ２-１  通常のタイムアウトに加えて、各クォーター１回ずつのメディアタイムアウトが認められる。オーバータイムのメディアタイムアウトは認められない。\nＥ２-２  各クォーターの最初のタイムアウト（通常のタイムアウトあるいはメディアタイムアウト）は60 秒、75 秒、90 秒、100 秒のいずれかの長さで行う。\nＥ２-３  その他全てのタイムアウトの長さは60 秒とする。\nＥ２-４  両チームともそれぞれ前半２回、後半３回のタイムアウトをとることができる。\nこれらのタイムアウトはゲーム中いつでも請求することができ、長さは以下のとおりになる：\n・メディアタイムアウトとみなされる場合、60 秒、75 秒、90 秒、あるいは100 秒のいずれかになる。例えばクォーターの最初のタイムアウトのとき。あるいは、\n・メディアタイムアウトとみなされない場合は60秒となる。例えば、メディアタイムアウトが認められたあとどちらかのチームによって請求されたとき。\nＥ３ 手順Ｅ３-１  理想的には、メディアタイムアウトは各クォーター残り時間５分より前にとられるべきである。ただし、その限りではない。\nＥ３-２  そのクォーター残り時間５分になるまでに両チームともタイムアウトを請求しない場合は、その後最初にボールがデッドになりゲームクロックが止まっているときに、メディアタイムアウトをとることになる。このタイムアウトはどちらのチームのタイムアウトにもカウントされない。\nＥ３-３  そのクォーター残り時間５分になるまでにどちらかのチームがタイムアウトを請求した場合は、そのタイムアウトがメディアタイムアウトとして使用される。\nこのタイムアウトは、メディアタイムアウトとそれを請求したチームのタイムアウトの両方としてカウントされる。\nＥ３-４  この手順により、各クォーター少なくとも１回のタイムアウト、前半最大６回、後半最大８回のタイムアウトがとられることになる。\n別添資料F－インスタントリプレーシステム（INSTANT REPLAY SYSTEM）\nF１ 定義インスタントリプレーシステム（IRS）レビューとは、承認されたビデオテクノロジーの画面でゲームの状況を見て、審判が判定を確認するために使用する作業方法である。\nF２ 手順F２-１ 審判はこの別添資料に記載されている制限の範囲内で、クルーチーフがスコアシートにサインするまでIRS を使用することが許可されている。\nF２-２ レビューは、審判がいずれかの理由でゲームを止めたときに行われる。ただし、第44条に基づく誤りの訂正が行われるときは、別途定められた手続きに則り行われる。\nF２-３ IRS の使用にあたっては次の手順が適用される：\n・IRS が用意されているゲームでは、クルーチーフはゲームの前にIRS 機器を承認する。\n・クルーチーフは、レビューを使用するかどうかを決定する。\n・審判の判定についてレビューを行う場合、審判は最初の判定をコート上で示さなければならない。\n・他の審判や、テーブルオフィシャル、コミッショナー（同席している場合）から全ての情報を収集したあと、クルーチーフはできる限り速やかにレビューを始める。\n・クルーチーフと少なくとも1 人の（判定を下した）アンパイアがレビューに参加する。クルーチーフが判定を下した場合、レビューのために同行するアンパイアの1 人を選択する。\n・レビューの間、クルーチーフは許可されていない人がIRS モニターを見られないことを確認する。\n・レビューは、タイムアウトや交代が行われる前、プレーのインターバルが始まる前、およびゲームが再開される前に行われる。\n・審判がレビューが必要だと判断したときにタイムアウトが始まっていたり、交代が行われていたりした場合、タイムアウトや交代は最終的な判定が示されるまで取り消される。\n・最終的な判定が示されたあと、いずれのヘッドコーチもタイムアウトを請求したり、取り下げたりすることができ、いずれのプレーヤーも交代を申し出ることができる。\n・レビューのあと、最初の判定を下した審判は最終的な判定を示し、それに応じてゲームを再開する。\n・審判の最初の判定は、審判がレビューによって明確で決定的な映像での証拠を確認できた場合にのみ修正することができる。\nF３ ルールゲーム中の次の状況でレビューを行うことができる：\nF３-１ クォーターもしくはオーバータイムの終了時で\n・成功したゴールのショットがクォーターやオーバータイムの終了を知らせるゲームクロックのブザーが鳴るよりも先に放たれていたかどうか。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n・次の状況でゲームクロックの残り時間に何秒が表示されるか：\n－シューターのアウトオブバウンズのバイオレーションが起こったとき。\n－ショットクロックのバイオレーションが起こったとき。\n－８秒のバイオレーションが起こったとき。\n－クォーターやオーバータイムの終了より先にファウルが起こったとき。\nIRS レビューによる判定が示されたあと、そのクォーターもしくはオーバータイムの残りの競技時間が修正された場合にはその競技時間が終了するまで、プレーのインターバルは始まらない。\nF３-２ 第４クォーター、各オーバータイムでゲームクロックに２:00 以下が表示されているとき\n・成功したゴールのショットがショットクロックのブザーが鳴るよりも先に放たれていたかどうか。\n－審判は、成功したゴールがショットクロックのブザーが鳴るよりも先に放たれていたかどうかをレビューするために速やかにゲームを止めることができる。\n－レビューは、ゴールのあと、審判がいずれかの理由により最初にゲームを止めたときに行われなければならず、審判はレビューが必要かどうかを判断しなければならない。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n・ファウルがショットの状況から離れた場所で起きたとき－ゲームクロックもしくはショットクロックが終了しているかどうか－シューターの相手チームのプレーヤーがファウルをしたとき、ショットの動作（アクトオブシューティング）が始まっていたかどうか－シューターのチームメイトがファウルをしたとき、ボールがまだシューターの手の中にあったかどうか\n・ゴールテンディングもしくはインタフェアレンスのバイオレーションが正しく宣せられたかどうか。\nレビューによって、ゴールテンディングもしくはインタフェアレンスのバイオレーションが誤って宣せられていたと判断されたとき、バイオレーションが宣せられたあと、－ボールが正当にバスケットに入った場合は、ゴールは認められ、ゲームはエンドラインからディフェンスであったチームのスローインで再開される。\n－いずれかのチームのプレーヤーが速やかかつ明らかにボールのコントロールを得られていた場合は、ゲームは誤ってバイオレーションが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからそのチームのスローインで再開される。\n－いずれのチームも速やかかつ明らかなボールのコントロールを得られていなかった場合、ジャンプボールシチュエーションになる。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n・ボールをアウトオブバウンズにしたプレーヤーを特定するため。\nF３-３ ゲーム中のあらゆる時間帯で\n・成功したゴールのショットが、ツーポイントエリアとスリーポイントエリアのどちらから放たれたか。\n－審判は、成功したゴールのショットが、ツーポイントエリアとスリーポイントエリアのどちらから放たれたかをレビューするために速やかにゲームを止めることができる。\n－レビューは、ゴールのあと、審判がいずれかの理由により最初にゲームを止めたときに行われなければならず、審判はレビューが必要かどうかを判断しなければならない。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n・成功しなかったゴールのシューターがファウルをされたあと、与えられるフリースローが2 本か3 本か。\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴールを指す。\n・パーソナルファウル、アンスポーツマンライクファウル、ディスクォリファイングファウルがそれぞれの判定基準を満たしているかどうか。あるいはアップグレードまたはダウングレードされるか、テクニカルファウルとみなされるかどうか。\n・テクニカルファウルと判定したものが、アンスポーツマンライクファウルまたはディスクォリファイングファウルに該当するかどうか\n・第44条「訂正のできる誤り」に基づき、カテゴリー１の誤りの訂正が発生したかどうかを確認し、まだその訂正が可能な時期であるかの確認。\n－カテゴリー１の誤りの訂正が発生したか否かを確認するため、審判は直ちにゲームを中断することができる。\n－その誤りは第44 条「訂正のできる誤り」に基づくものに限定される。\n・カテゴリー2に該当する誤りが起き、第44条「訂正のできる誤り」に定められた時間制限内に訂正できるかどうか。訂正できる場合、第44条「訂正のできる誤り」に定められたとおりにのみ訂正することができる。（2026 競技規則67 ページ参照のこと）\n・ゲームクロックもしくはショットクロックの誤操作が起こったあと、修正されそれぞれのクロックに表示される時間はどれだけか。\n・正しいフリースローシューターを特定するため。\n・あらゆる暴力行為や暴力行為の可能性のある事象の間のプレーヤーやチームベンチに座ることを許された人物の関与を特定するため。\n－審判は、あらゆる暴力行為や暴力行為の可能性のある事象をレビューするために速やかにゲームを止めることができる。\n－レビューは、暴力行為や暴力行為の可能性のある事象のあと、審判がいずれかの理由により最初にゲームを止めたときに行われなければならず、審判はレビューが必要かどうかを判断しなければならない。\nF４ ヘッドコーチチャレンジF４-１ インスタントリプレーシステムが使用される全てのゲームでは、ヘッドコーチは、最も近い審判にIRSを使用してゲームの状況をレビューし、審判の判定について確認を依頼するヘッドコーチチャレンジを請求することができる。\nF４-２ ヘッドコーチチャレンジには、次の手順が適用される：\n・チャレンジが成功するかどうかにかかわらず、ヘッドコーチは１ゲームで１度だけヘッドコーチチャレンジを認められる。\n・別添資料F3 に規定されているゲームの状況のみがチャレンジの対象となる。\n・別添資料F3-2 およびF3-３に規定されている時間帯の制限は適用しない。ヘッドコーチチャレンジはゲームのあらゆる時間帯で請求できる。\n【補足】ここでの「時間帯の制限」は、審判が主導するレビューにおいて時間帯ごとに定められているレビューの可否の制限を指す。例えば、審判が主導するレビューの場合、「ボールをアウトオブバウンズにしたプレーヤーを特定するため」のレビューは、「第４クォーター、各オーバータイムでゲームクロックに2:00もしくはそれ以下が表示されているとき」のみ認められるが、ヘッドコーチはゲーム中のあらゆる時間帯において、この状況についてのチャレンジを請求することができる。\n・ヘッドコーチは、最も近い審判と目で見えるように、はっきりとヘッドコーチチャレンジを依頼する。\n大きな声で英語で「チャレンジ」と言い、同時にヘッドコーチチャレンジシグナル（手で長方形を描く）を示す。請求は最終的なものであり、撤回することはできない。\n・ヘッドコーチによるチャレンジの請求は、審判がヘッドコーチチャレンジのシグナルを示し、認めるまでは取り消すことができる。\n・ヘッドコーチチャレンジの請求とそのレビューは、ルールの中で別途規定がある場合を除き、遅くとも判定の後で審判が最初にゲームを止めたときに行われなければならない。\n・ゲームが中断せずに続いている場合、どちらのチームも不利な状況にならない限り、ヘッドコーチチャレンジの請求を認識したときに審判は速やかにゲームを止めることができる。\n・ヘッドコーチは、最も近い審判にレビューを依頼するゲームの状況を示す。\n・審判は59 番のシグナルを使い、ヘッドコーチチャレンジが認められることをスコアラーに知らせる。\n・レビューの間、プレーヤーはコート上にとどまる。\n・レビューによって得られる判定が、コート上での判定と異なり、チャレンジを請求したチームの主張に沿ったものであった場合、最初の判定は覆される。\n・レビューによって得られる判定が、コート上での判定と同様で、チャレンジを請求したチームの主張とは異なるものであった場合、最初の判定は維持される。\n・審判はレビューの規則と同じ手順を使用する。\n・審判が最終的な判定を伝達したあと、ゲームは他のレビューの後と同様に再開される。\nルールの索引３秒ルール ········································································································ 41４個のチームファウル ······························································································ 63５個のファウル ································································································ 15,63５個のファウルを宣せられた（資格を失った）プレーヤー定義 ········································································································· 15５秒ルール近接してガードされたプレーヤー ············································································ 41スローイン ···································································································· 30８秒ルール ········································································································ 41IRS レビュー ····································································································· 112相手チームのバスケット ····························································································· 7相手チームのプレーヤーとの不当な体の触れ合い ······························· const IMPL_DATA=[{"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-1", "body": "４-１  条文：同じチームの全てのプレーヤーのアンダーシャツやアンダーショーツを含む腕や脚のコンプレッションウェア、ヘッドギア、リストバンド、ヘッドバンド、テーピングは全て同じ単色でなければならない。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-2", "body": "４-２  例：コート上でA１は白色のヘッドバンドを、A２は赤色のヘッドバンドを身につけている。\n解説：A１とA２が異なる色のヘッドバンドを身につけることは許されていない。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-3", "body": "４-３  例：コート上でA１は白色のヘッドバンドを、A２は赤色のリストバンドを身につけている。\n解説：A1が白色のヘッドバンドを身につけ、A2が赤色のリストバンドを身につけることは許されていない。\n【補足】全て同じ単色でなければならない。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-4", "body": "４-４  条文：スカーフスタイルのヘッドバンドを身につけることは認められない。\n図1 スカーフスタイルのヘッドバンドの例"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-5", "body": "４-５  例：A１はスカーフスタイルのヘッドバンドを身につけており、それはチームメイトが身につけている競技規則で認められたその他の装備と同じ単色である。\n解説：A１の身につけているスカーフスタイルのヘッドバンドは許されていない。ヘッドバンドは開閉する要素やその表面から突き出た部品を持たないものとする。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-6", "body": "４-６  例：A6 が交代を申し出た。審判はA6 がユニフォームのシャツの下にコンプレッション素材ではないT シャツを着用していることに気づいた。\n解説：交代は認められない。ユニフォームの下に着用することを認められているのは、コンプレッションウェアのみである。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-7", "body": "４-７  例：A6 はユニフォームのパンツの下にコンプレッションウェアを着用していて、そのウェアは\n⒜膝上まで伸びている。\n⒝くるぶしまで伸びている。\n解説：コンプレッションウェア（アンダーパンツ）を着用することは正当であり、いかなる長さでも着用することができる。同じチームの全てのプレーヤーは、同じ単色の、アンダーシャツやアンダーパンツを含むコンプレッションウェア、ヘッドギア、リストバンド、ヘッドバンド、テーピングを着用しなければならない。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-8", "body": "４-8  例：A6 はユニフォームのシャツの下にコンプレッションウェア（アンダーシャツ）を着用していて、そのウェアは\n⒜肩まで伸びている。\n⒝首まで伸びている。\n解説：コンプレッションウェア（アンダーシャツ）を着用することは正当であり、\n⒜肩の下のいかなる長さでも着用することができる。\n⒝首の下までの長さのものを着用することができる。\n同じチームの全てのプレーヤーは、同じ単色の、アンダーシャツやアンダーパンツを含むコンプレッションウェア、ヘッドギア、リストバンド、ヘッドバンド、テーピングを着用しなければならない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-1", "body": "５-１  条文：プレーヤーが怪我をした、怪我をしたように見られた、もしくは介助が必要だと見られ、結果として自チームのチームベンチに座ることを許されたいずれかの人物（自チームのヘッドコーチ、ファーストアシスタントコーチ、交代要員、5個のファウルを宣せられたチームメンバー、チーム関係者）\nがコート内に入った場合、実際に手当てや介助を受けたかどうかにかかわらず、そのプレーヤーは手当てや介助を受けたと見なされる。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-2", "body": "５-２  例：A１が足首を怪我したと見られたため、ゲームが中断された。\n⒜チームA のドクターがコート内に入り、怪我をしたA１の足首の手当てをした。\n⒝チームA のドクターがコート内に入ったが、すでにA１は回復していた。\n⒞チームA のヘッドコーチがコート内に入り、A１の怪我の程度を確認した。\n⒟チームAのファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバーあるいはその他のチーム関係者がコート内に入ったが、A１の手当てはしなかった。\n解説：全ての場合においてA１は手当てを受けたとみなされ、交代しなければならない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-3", "body": "５-３  例：チームA の理学療法士がコート内に入り、緩くなったテーピングの補強をA1 に行なった。\n解説：A１は介助を受けており、交代しなければならない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-4", "body": "５-４  例：チームA のドクターはA1 のコンタクトレンズを探すためにコート内に入った。\n解説：A１は介助を受けており、交代しなければならない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-5", "body": "５-５  条文：自チームのチームベンチに座ることを許された人物は、チームベンチエリアに留まっている間に自チームのプレーヤーを介助することができる。介助によって速やかなゲームの再開に遅延をきたさない場合、そのプレーヤーは介助を受けたとはみなされず、交代する必要はない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-6", "body": "５-６  例：チームAのチームベンチエリアの近くでB１がショットの動作（アクトオブシューティング）中のA１にファウルをした。ボールはバスケットに入らなかった。A１が2 本もしくは3 本のフリースローを行っている間に\n⒜チームA のマネージャーあるいはA 6 がチームベンチエリアから、コート上のいずれかの自チームのプレーヤーに、タオル、飲み物のボトルもしくはヘッドバンドを渡した。\n⒝チームAの理学療法士がチームベンチエリアから、コート上のいずれかの自チームのプレーヤーの緩くなったテーピングの補強、脚へのスプレー、もしくは首へのマッサージなどを行った。\n解説：どちらの場合においても、速やかなゲームの再開に遅延をきたしていないことから、チームAのプレーヤーは介助を受けたとはみなさない。このチームAのプレーヤーは交代する必要はない。A１は引き続き2 本もしくは3 本のフリースローを行う。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-7", "body": "５-７  例：チームAのチームベンチエリアの近くでB１がショットの動作（アクトオブシューティング）中のA１にファウルをした。ボールはバスケットに入らなかった。ファウルの後A１は自チームのチームベンチエリア内に倒れ込んだ。A６は立ち上がってA１が起き上がるのを助けた。A１は遅くとも約15秒以内で、速やかにプレーすることができた。\n解説：速やかなゲームの再開に遅延をきたしていないことから、A１は介助を受けたとはみなさない。A１は交代する必要はない。A１は2 本もしくは3 本のフリースローを行う。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-8", "body": "５-８  例：A１は2 本のフリースローを与えられた。審判がスコアラーズテーブルにファウルのレポートを行っている間に、A１はエンドライン側のチームのチームベンチエリアの前に行き、タオルもしくは飲み物のボトルを渡すように頼んだ。チームベンチエリアのいずれかの人物がA１にタオルもしくは飲み物のボトルを渡した。A１は手を乾かした、もしくは飲み物を飲んだ。A１は遅くとも約15 秒以内で、速やかにプレーすることができた。\n解説：速やかなゲームの再開に遅延をきたしていないことから、A１は介助を受けたとはみなさない。A１は交代する必要はない。A１は2 本のフリースローを行う。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-9", "body": "５-９  例：ゲームクロックが動いている状態でA1が得点した。スローインをするB１は審判にボールが濡れていることを伝えた。審判はゲームを止めた。チームBのチームベンチエリアのいずれかの人物がコートに入り、ボールを乾かした、もしくはB１がボールを乾かすためにタオルを渡した。\n解説：どちらの場合においても、速やかなゲームの再開に遅延をきたしていないことから、B１は介助を受けたとはみなさない。B１は交代する必要はない。ゲームはバックボードの真後ろを除いたエンドラインの外の任意のアウトオブバウンズからチームBのスローインで再開する。審判はスローインのためにチームB のプレーヤーにボールを渡す。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-10", "body": "５-10  例：A１はフロントコートからのスローインで、両手でボールを持っている。チームAの理学療法士はバックコートの自チームのチームベンチエリアを離れ、コートの外でA１のテーピングを補強した。\n解説：チームA の理学療法士は自チームのチームベンチエリアの外でA１を介助している。A１は交代しなければならない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-11", "body": "５-11  例：チームA のフロントコートからのスローインでA1はまだ手にボールを持っていない。チームAの理学療法士はフロントコートの自チームのチームベンチエリアにとどまったまま、A１のテーピングを補強した。\n解説：チームAの理学療法士は自チームのチームベンチエリアの中でA１を介助している。介助が15秒以内に完了した場合、A１は交代する必要はない。介助に15秒以上を要する場合、A１は交代しなければならない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-12", "body": "５-12  条文：ドクターが、重度の怪我をしたプレーヤーをコート外へ搬送することがそのプレーヤーにとって危険だと判断した場合、プレーヤーの搬送ついての時間制限はない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-13", "body": "５-13  例：A１が重度の怪我を負ったように見え、ドクターがA１を動かすことは危険だと判断したため、約15 分間ゲームが中断した。\n解説：怪我をしたプレーヤーのコート外への搬送に必要な時間はドクターの判断で決定される。\n交代のあと、特に罰則などはなくゲームは再開される。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-14", "body": "５-14  条文：プレーヤーが怪我をしたか出血をしている、あるいは傷口が開いていて速やかに（約15秒以内に）プレーを続行することができない、もしくは自チームのチームベンチに座ることを許されたいずれかの人物から介助を受けた場合、そのプレーヤーは交代をしなければならない。ゲームクロックが止まってから再び動き出すまでの間に、タイムアウトがいずれかのチームに認められ、怪我をしたプレーヤーがそのタイムアウト中に回復した、あるいは介助を完了した場合は、タイマーがタイムアウト終了のブザーを鳴らす前に審判が怪我をした、あるいは介助を受けたプレーヤーに代わる交代要員を招き入れていなければ、そのプレーヤーはプレーを続行することができる。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-15", "body": "５-15  例：A１が怪我をしてゲームは中断された。A１は速やかにプレーを続けることが難しく、審判は笛を吹き、通常の交代の合図をした。どちらかのチームが以下のときにタイムアウトを請求した。\n⒜A１と交代をする交代要員がプレーヤーになる前。\n⒝A１と交代をする交代要員がプレーヤーになった後。\nタイムアウト終了後、A１の手当てがすでに終わり引き続きプレーを続けようとした。\n解説：\n⒜A１がタイムアウト中に回復した場合、引き続きプレーを続けることができる。\n⒝A１と交代をする交代要員がすでにプレーヤーとなっている。よってA１は、ゲームが再開しゲームクロックが動いたあと再び交代が認められる時機になるまでは、コートに戻ることはできない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-16", "body": "５-16  条文：ヘッドコーチによってゲームの最初に出場すると指定されたプレーヤーが怪我をした場合、交代をすることができる。またあらゆる怪我によって複数のフリースローの間に処置を受けるプレーヤーは交代しなければならない。\nどちらの場合においても、相手チームも希望をすれば、同じ人数だけプレーヤーを交代することができる。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-17", "body": "５-17  例：A１がファウルをされ２本のフリースローを得た。１本目のフリースローの後で審判は\n⒜A１が出血していることを認識し、A１はA６と交代した。このときチームB は２人の交代を申し出た。\n⒝B１が出血していることを認識し、B１はB６と交代した。このときチームA は１人の交代を申し出た。\n解説：\n⒜では、チームB は１人のみ交代することができる。A６は２本目のフリースローを行う。\n⒝では、チームA は1 人交代することができる。A１は２本目のフリースローを行う。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチ", "sec_no": "7-1", "body": "７-１  条文：ゲーム開始予定時刻の遅くとも40分前に、各チームのヘッドコーチあるいは代理の関係者はスコアラーに、ゲームに出場するプレーヤーの氏名と番号、キャプテンとするプレーヤーの氏名、ヘッドコーチとファーストアシスタントコーチの氏名を提出しなければならない。\nヘッドコーチはそのリストの各プレーヤーの番号と実際のユニフォームの番号が合っているかに責任を負う。ゲーム開始予定時刻の遅くとも10分前には、ゲームに出場するプレーヤーの氏名と番号、キャプテンとするプレーヤーの氏名、ヘッドコーチとファーストアシスタントコーチの氏名がスコアシートに正しく記入されていることを確認し、スコアシートにサインをする。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチ", "sec_no": "7-2", "body": "７-２  例：チームA は所定の時間内にスコアラーにリストを提出した。２人のプレーヤーの番号が実際のユニフォームの番号と一致していない、あるいはそのプレーヤーの氏名がスコアシートに記載されていなかった。この不一致が、\n⒜ゲーム開始前に発見された。\n⒝ゲーム開始後に発見された。\n解説：\n⒜誤った番号は修正される、あるいは氏名が記載されていなかったプレーヤーはスコアシートに追加される。特に罰則は与えられない。\n⒝いずれのチームにも不利にならないタイミングで審判がゲームを中断し、誤った番号は罰則なしに修正される。しかし、記載されていなかったプレーヤーの氏名をスコアシートに追加することはできない。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチ", "sec_no": "7-3", "body": "７-３  例：チームAのヘッドコーチは、怪我をしたプレーヤーあるいはプレーすることのないプレーヤーがゲーム中にチームベンチに座ることを望んだ。\n解説：チームは、最大8名のチーム関係者に加え、試合に出場する資格のある最大12名のチームメンバーのうち、誰をスコアシートに記載し、試合中にチームベンチに座ることを許可するかを自由に決めることができる。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチ", "sec_no": "7-4", "body": "７-４  条文：遅くともゲーム開始予定時刻の10分前までに、各チームのヘッドコーチは最初に出場する５人のプレーヤーを申し出る。ゲーム開始までにスコアラーはその５人のプレーヤーに誤りがないかを確認し、もし誤りがある場合は速やかに近くにいる審判に報告する。ゲーム開始までに誤りが発見された場合は、正しいプレーヤーに入れ替えた上でゲームを開始する。ゲーム開始後に発見された場合は、誤りはなかったものとする。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチ", "sec_no": "7-5", "body": "７-５  例：事前に確認された最初に出場すると指定されていた５人のプレーヤーと異なるプレーヤーが１人、コート上にいることが、\n⒜ゲーム開始前に発見された。\n⒝ゲーム開始後に発見された。\n解説：\n⒜その１人のプレーヤーは本来出場するべきプレーヤーと交代し、特に罰則は与えられない。\n⒝誤りは無視されゲームを続ける。特に罰則は与えられない。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチ", "sec_no": "7-6", "body": "７-６  例：ヘッドコーチはスコアラーに、最初に出場する５人のプレーヤーのスコアシートに小さい「×」を記入するように依頼をした。\n解説：ヘッドコーチが自らスコアシートにあるプレーヤーの番号の隣のPlayer in欄に小さい「x」を記入することで最初に出場する5 人のプレーヤーの確認を行う。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチ", "sec_no": "7-7", "body": "７-７  例：チームA のヘッドコーチとファーストアシスタントコーチが失格・退場となった。\n解説：チームA のキャプテンがプレーヤー兼ヘッドコーチとしてその役割を担う。"}, {"type": "impl", "art_no": "8", "art_title": "競技時間", "sec_no": "8-1", "body": "８-１  条文：プレーのインターバルは：\n・ゲーム開始予定時刻の20分前に始まる\n・最後のクォーターやオーバータイムを除き、各クォーターやオーバータイムの終了を知らせるゲームクロックのブザーが鳴ったときに始まる。\n・バックボードの外枠が赤く点灯するように備えられているとき、ゲームクロックのブザーよりもその点灯が優先される。"}, {"type": "impl", "art_no": "8", "art_title": "競技時間", "sec_no": "8-2", "body": "８-２  例：クォーターの終了を知らせるゲームクロックのブザーが鳴る前に、B１はショットの動作（アクトオブシューティング）中のA１にファウルをし、ショットは\n⒜成功しなかった。\n⒝成功した。\n解説：審判は、B１のファウルがクォーターの終了を知らせるゲームクロックのブザーより前に起きたかどうかを速やかに相談し合い、決定する。\n審判がB１のファウルがゲームクロックのブザーより前に起きたと判断した場合、B1はパーソナルファウルを宣せられる。\n⒜2 本のフリースローがA1 に与えられる。\n⒝A1 の得点は認められ、さらに1 本のフリースローが与えられる。\nゲームクロックはファウルが起きたときの残り時間に戻される。ゲームは通常の最後のフリースローの後と同様に再開される。\n審判がB１のファウルがゲームクロックのブザーより後に起きたと判断した場合、ファウルはなかったものとし、得点が入っても認められない。B1のファウルがアンスポーツマンライクファウルもしくはディスクォリファイングファウルの判定基準に合致するもので、続いてクォーターやオーバータイムが行われる場合、B１のファウルはなかったことにはせず、次のクォーターやオーバータイムが始まる前にその状況に応じて罰せられる。このファウルは次のクォーターのチームB のチームファウルに数えられる。"}, {"type": "impl", "art_no": "8", "art_title": "競技時間", "sec_no": "8-3", "body": "８-３  例：A１はスリーポイントゴールのショットをした。ゲームの終了を知らせるゲームクロックのブザーが鳴ったとき、ボールは空中にあった。ブザーのあと、B１がまだ空中にいる A１にファウルをした。ボールはバスケットに入った。\n解説：A1 は3 点を与えられる。B1 のファウルがアンスポーツマンライクファウルもしくはディスクォリファイングファウルの判定基準に合致するもので、続いてクォーターやオーバータイムが行われる場合を除いて、A１に対するB1 のファウルは競技時間終了後に起きたものとしてなかったものとする。"}, {"type": "impl", "art_no": "9", "art_title": "ゲームの開始と終了", "sec_no": "9-1", "body": "９-１  条文：各チームが最低５人のプレーヤーをコート上に揃えなければゲームは開始されない。"}, {"type": "impl", "art_no": "9", "art_title": "ゲームの開始と終了", "sec_no": "9-2", "body": "９-２  例：後半開始の時点で、チームA が怪我や失格・退場などの理由でコート上に５人のプレーヤーを出場させることができなかった。\n解説：最低５人のプレーヤーを揃えるルールはゲーム開始時のみに適用されるため、チームAは５人未満のプレーヤーでゲームを続けることができる。"}, {"type": "impl", "art_no": "9", "art_title": "ゲームの開始と終了", "sec_no": "9-3", "body": "９-３  例：ゲーム終了間際にA１が５個目のファウルを宣せられプレーをする資格を失った。これ以上プレーができる交代要員がいないチームAは、４人のプレーヤーのみでゲームを続けることができる。チームBは大差でリードしており、ヘッドコーチBは公平にゲームを行うため、プレーヤーを１人コートから退かせ、自チームも4 人でプレーすることを希望した。\n解説：５人未満でゲームをするというヘッドコーチBの要求は認められない。ゲームをするのに十分なプレーヤーがいる限り、５人のプレーヤーがコート上にいなければならない。"}, {"type": "impl", "art_no": "9", "art_title": "ゲームの開始と終了", "sec_no": "9-4", "body": "９-４  条文：第9条は、チームがどちらのバスケットを防御しどちらのバスケットに攻撃するかを規定している。混乱によって、両チームが共に誤ったバスケットに攻撃あるいは防御をすることでいずれかのクォーターやオーバータイムが始まった場合、状況が発見されたら、どちらのチームにも不利にならない状況で、すぐに修正する。ゲームが止められるまでに認められた得点や動いた時間、宣せられたファウルなどは全て有効となる。"}, {"type": "impl", "art_no": "9", "art_title": "ゲームの開始と終了", "sec_no": "9-5", "body": "９-５  例：ゲーム開始後、審判が両チームともに誤った方向にプレーしていることに気がついた。\n解説：ゲームはどちらのチームにも不利にならない状況でできる限りすぐに止められる。両チームは攻める方向を正しく変え、ゲームはゲームが止められた場所の対称となる位置に最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "9", "art_title": "ゲームの開始と終了", "sec_no": "9-6", "body": "９-６  条文：ゲームはセンターサークルでジャンプボールによって開始される。"}, {"type": "impl", "art_no": "9", "art_title": "ゲームの開始と終了", "sec_no": "9-7", "body": "９-７  例：ゲームを開始するジャンプボールのトスで、ボールがクルーチーフの手を\n⒜離れる前に\n⒝離れた後にジャンパーのB1 がA1 にパーソナルファウルをした。\n解説：\n⒜第１クォーターはまだ始められていない。したがって、これはゲームの開始前のプレーのインターバル中に起きているファウルである。ゲームはジャンプボールで開始される。\n⒝第1 クォーターは始められている。したがって、これは第1 クォーターの最中でのファウルである。\nゲームはフロントコートのセンターラインに最も近いアウトオブバウンズからチームAのスローインで再開され、ショットクロックは14 秒となる。\nどちらの場合においても、ファウルはスコアシートに記録され、チームB の第1 クォーターのチームファウルに数えられる。"}, {"type": "impl", "art_no": "9", "art_title": "ゲームの開始と終了", "sec_no": "9-8", "body": "９-８  例：ゲーム開始前のインターバル中に、A１にテクニカルファウルが宣せられた。ヘッドコーチB は、B６を１本のフリースローを行うプレーヤーに指定したが、B６はチームB の最初に出場する５人のプレーヤーではなかった。\n解説：誰もリバウンドの位置に着かずにフリースローがチームBの最初に出場する5人のプレーヤーの中から指定された1 人に与えられる。競技時間の開始前に交代は認められない。\nそのあと、ゲームはジャンプボールによって開始される。"}, {"type": "impl", "art_no": "9", "art_title": "ゲームの開始と終了", "sec_no": "9-9", "body": "９-９  例：ゲーム開始前のインターバル中に、A１がB１にアンスポーツマンライクファウルをした。\n解説：ゲーム開始前に、誰もリバウンドの位置に着かずに２本のフリースローがB1 に与えられる。\nB１が、最初に出場すると確認されていた５人のプレーヤーのうちの１人であった場合、B１はコートに残らなければならない。\nB１が、最初に出場すると確認されていた５人のプレーヤーのうちの１人ではなかった場合、B１はコートに残ることはできない。\nゲームは、最初に出場すると確認されたチームBの５人をプレーヤーとして、ジャンプボールによって開始される。"}, {"type": "impl", "art_no": "9", "art_title": "ゲームの開始と終了", "sec_no": "9-10", "body": "９-10  条文：ゲーム開始前のインターバル中に、最初に出場する５人のプレーヤーのうちの１人がゲームを開始することができなくなった、もしくはその資格がなくなった場合、そのプレーヤーは別のプレーヤーと交代する。この場合、相手チームも必要に応じて最初に出場する５人のプレーヤーのうち１人を変更することができる。"}, {"type": "impl", "art_no": "9", "art_title": "ゲームの開始と終了", "sec_no": "9-11", "body": "９-11  例：A１はチームAから最初に出場する5人のプレーヤーのうちの１人であった。ゲーム開始７分前のインターバルの間に\n⒜A１が怪我をした。\n⒝A１がディスクォリファイングファウルを宣せられた。\n解説：どちらの場合においても、A１は別のプレーヤーと交代する。この場合、チームBも必要に応じて最初に出場する５人のプレーヤーのうち1 人を変更することができる。"}, {"type": "impl", "art_no": "10", "art_title": "ボールのステータス", "sec_no": "10-1", "body": "10-１  条文：ショットの動作（アクトオブシューティング）中で、シューターのひと続きの動作が始まった後で、ディフェンスのプレーヤーがいずれかの相手プレーヤーにファウルをし、シューターがそのひと続きの動作でショットを終えたとき、ボールはデッドにならず、ショットが成功した場合はその得点は認められる。この条文はディフェンスのプレーヤーもしくはそのチームのチームベンチに座ることを許された人物がテクニカルファウルを宣せられた場合にも同様に適用される。"}, {"type": "impl", "art_no": "10", "art_title": "ボールのステータス", "sec_no": "10-2", "body": "10-２  例：B２がA２にファウルをしたとき、A１はショットの動作（アクトオブシューティング）を始めていた。A１はひと続きの動作でショットを終えた。\n⒜これはチームB の３個目のチームファウルであった。\n⒝これはチームB の５個目のチームファウルであった。\n解説：どちらの場合においても、A１のショットが成功した場合はその得点は認められる。\n⒜では、ゲームはB2のファウルが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開される。\n⒝では、２本のフリースローがA２に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "10", "art_title": "ボールのステータス", "sec_no": "10-3", "body": "10-３  例：A２がB２にファウルをしたとき、A１はゴールのショットの動作（アクトオブシューティング）中であった。A１はひと続きの動作でショットを終えた。\n解説：A２がチームコントロールファウルをしたとき、ボールはデッドになる。A１のショットが成功した場合、そのゴールは認められない。このクォーターのチームA のチームファウルの数にかかわらず、ゲームはフリースローラインの延長線上からチームB のスローインで再開される。A1 のショットが成功しなかった場合、ゲームはバックボードの真後ろを除いたファウルが起きた場所に最も近いアウトオブバウンズからチームB のスローインでゲームが再開される。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-1", "body": "12-1  条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-2", "body": "12-２  例：ゲーム開始の2 分前にA１はテクニカルファウルを宣せられた。\n解説：誰もリバウンドの位置に着かずにフリースローがチームBの最初に出場する５人のプレーヤーのうち1人に与えられる。ゲームはまだ始まっていないため、オルタネイティングポゼッションアローはどちらのチームも示していない。ゲームはジャンプボールで始められる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-3", "body": "12-３  例：クルーチーフがゲーム開始のジャンプボールのためにボールをトスした。ボールが最高点に達する前にジャンパーのA１がボールに触れた。\n解説：A１のジャンプボールのバイオレーションである。チームB はセンターライン近くのフロントコートからスローインを与えられる。ショットクロックは14 秒となる。スローインをするチームB のプレーヤーにボールが与えられたらすぐに、チームAは最初のオルタネイティングポゼッションのスローインの権利を得る。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-4", "body": "12-４  例：クルーチーフがゲーム開始のジャンプボールのためにボールをトスした。ボールが最高点に達する前にジャンパーではないA２がセンターサークルに、チームA の\n⒜バックコートから入った。\n⒝フロントコートから入った。\n解説：どちらの場合においても、A２のジャンプボールのバイオレーションである。チームB は：\n⒜センターラインに近いフロントコートからスローインを与えられる。ショットクロックは14 秒となる。\n⒝センターラインに近いバックコートからスローインを与えられる。ショットクロックは24 秒となる。\nスローインをするチームBのプレーヤーがボールを受け取ったらすぐに、チームAは最初のオルタネイティングポゼッションのスローインの権利を得る。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-5", "body": "12-５  例：クルーチーフがゲーム開始のジャンプボールのためにボールをトスした。ジャンパーのA１によってボールが正当にタップされた直後に、\n⒜A２とB２の間でヘルドボールが起きた。\n⒝A２とB２の間でダブルファウルが起きた。\n解説：どちらの場合においても、ライブのボールのコントロールがまだ確立されていないため、審判はオルタネイティングポゼッションの手順を使用することができない。クルーチーフはA２とB２をジャンパーとして、センターサークルで再度ジャンプボールを行う。ゲームクロックはボールが正当にタップされたあと、ヘルドボールもしくはダブルファウルが起きた時点から継続される。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-6", "body": "12-６  例：クルーチーフがゲーム開始のジャンプボールのためにボールをトスした。ジャンパーのA１によって正当にタップされた直後、ボールは、\n⒜直接アウトオブバウ
