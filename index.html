  {id:166,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-17",q:"第３クォーターの終了を知らせるゲームクロックのブザーが鳴ったとき、B１がドリブルをしているA１にファウルをし、このクォーター６個目のチームファウルであった。審判はB１のファウルはゲームクロック残り0.3秒で起きたと判断した。２本のフリースローがA１に与えられた。審判はA１ではなく、A２をシューターに指定してフリースローを行った。この誤りが最初のフリースローでボールがA２の手を離れた後で認識された。A２の２本のフリースローは取り消される。２本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-17",ruleText:"インプリ 44-17\n誤ったプレーヤーがフリースローを行っていた誤りを訂正できる。"},
  {id:167,num:"第44条 訂正のできる誤り",level:"A",ref:"インプリ 44-18",q:"B１がショットの動作（アクトオブシューティング）中のA１にファウルをした。審判はA１ではなく、A２をシューターに指定してフリースローを行った。２本目のフリースローでボールがリングに触れたあと、A３がリバウンドのボールを取って２点を得点した。この誤りが、エンドラインの後ろのアウトオブバウンズでチームBにスローインのボールが与えられる前に認識された。成否にかかわらず、A２が行った２本のフリースローは取り消される。A３の得点も認めない。２本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。",ans:false,explanation:"A３の得点は有効なままとなる。誰もリバウンドの位置に着かずに２本のフリースローがA１に与えられる。ゲームは誤りの訂正のために止められた場所に最も近いところ（この場面ではエンドラインの後方のアウトオブバウンズ）から再開される。",ruleSrc:"インプリ 44-18",ruleText:"インプリ 44-18\nA３の得点は有効なままとなる。誰もリバウンドの位置に着かずに２本のフリースローがA１に与えられる。"},
  {id:168,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-20",q:"第４クォーター残り0:57で、ボールの無いところでA２がファウルをしたとき、ショットのボールがA１の手を離れていた。ボールは正当にバスケットに入ったが、審判は誤って得点を取り消した。この誤りが第４クォーター残り0:43で、誤りに続いて最初に審判がゲームを止めたときに認識された。誤りは訂正できる。スコアシートは訂正され、チームAに２点が追加される。ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-20",ruleText:"インプリ 44-20\n誤って得点が取り消された場合、訂正できる。スコアシートは訂正され、チームAに２点が追加される。"},
  {id:169,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-23",q:"第１クォーター残り5:47で、B１がA１にファウルをした。審判はB２のファウルとして伝達した。この誤りがハーフタイムの間に認識された。誤りは訂正され、スコアラーはクルーチーフと相談したあと、誤ってB２に記録されたファウルを削除し、B１に正しくファウルを記録することでスコアシートを訂正する。B２が誤って５個のファウルを宣せられたチームメンバーとなっていた場合、B２は再びゲームに参加できる。B１が本来早い時点で５個のファウルを宣せられたチームメンバーとなるべきであった場合、B１はこの時点で５個のファウルを宣せられたチームメンバーとなる。追加の罰則は適用されない。",ans:true,explanation:"誤ったプレーヤーのファウルを伝達した誤りは、第４クォーターでゲームクロックが2:00を示すまでは訂正できる。",ruleSrc:"インプリ 44-23",ruleText:"インプリ 44-23\n誤ったプレーヤーのファウルを伝達した誤りは、第４クォーターでゲームクロックが2:00を示すまでは訂正できる。"},
  {id:170,num:"第44条 訂正のできる誤り",level:"A",ref:"インプリ 44-25",q:"第４クォーター残り3:45で、チームAは後半２回目のタイムアウトを請求した。スコアラーはこのタイムアウトを誤ってチームBの後半２回目のタイムアウトとして記録した。第４クォーター残り2:44で、ボールがアウトオブバウンズに出て審判がゲームを止めた。 第４クォーター残り1:45で、チームBにタイムアウトが認められた。チームBはこのタイムアウトが後半３回目であることを伝えられ、チームBはタイムアウトが残っていない。チームBのヘッドコーチは誤りが起きていることを主張した。スコアラーはクルーチーフと相談し、誤りが認識されたが、審判は訂正できる時機を過ぎているため、誤りはなかったものとした。",ans:true,explanation:"第４クォーターでゲームクロックが2:00を示すまでに認識されなければならず、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。",ruleSrc:"インプリ 44-25",ruleText:"インプリ 44-25\n第４クォーターでゲームクロックが2:00を示すまでに認識されなければ訂正できない。"},
  {id:171,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-26",q:"第１クォーター残り3:34で、チームAのヘッドコーチはテクニカルファウルを宣せられた。スコアラーはこのテクニカルファウルを誤ってチームBのヘッドコーチに記録した。この誤りが、第４クォーター残り1:02にゲームが止められたときに認識された。本来であれば、誤りを訂正できる時機を過ぎている。しかしテクニカルファウルの場合は、コーチの失格・退場につながる恐れがあるため訂正できる。スコアラーはクルーチーフと相談したあと、誤ってチームBのヘッドコーチに記録されたテクニカルファウルを削除し、チームAのヘッドコーチに正しくテクニカルファウルを記録することでスコアシートを訂正する。罰則は適用されない。ゲームは誤りの訂正のためにゲームが止められたところから再開される。",ans:false,explanation:"誤ったチームに記録されたテクニカルファウルは、第４クォーターでゲームクロックに2:00が表示されるまでは訂正できる。この場合、誤りを訂正できる時機を過ぎているため誤りは訂正できず、なかったものとする。",ruleSrc:"インプリ 44-26",ruleText:"インプリ 44-26\n誤ったチームに記録されたテクニカルファウルは、第４クォーターでゲームクロックに2:00が表示されるまでは訂正できる。この場合は訂正できない。"},
  {id:172,num:"第44条 訂正のできる誤り",level:"A",ref:"インプリ 44-29",q:"第１クォーター残り2:43で、アウトオブバウンズのバイオレーションによってゲームクロックが止められた。スローインの前、ゲームクロックが何も表示されていない状態となった。タイマーは機材をリセットした。機材が再び動くようになったとき、ゲームクロックに誤って1:43が設定された。この誤りがハーフタイムの間に認識された。この場合ハーフタイムのインターバルのあと、ハーフタイムのためにゲームが止められたときから継続したチームファウルとタイムアウトで、前半で両チームがプレーしていた方向と同じ方向に１分間プレーする。ゲームクロックは1:00に設定され、オルタネイティングポゼッションのスローインが与えられることになっているチームのスローインで始められる。１分間のプレーのあと、次にオルタネイティングポゼッションのスローインが与えられることになっているチームのスローインで第３クォーターが始められる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-29",ruleText:"インプリ 44-29\nゲームクロックの誤設定がハーフタイムに発見された場合の処置。"},
  {id:173,num:"第44条 訂正のできる誤り",level:"C",ref:"インプリ 44-34",q:"チームAはバックコートでスローインを与えられた。ショットクロックは24秒に設定されるべきところ、誤って14秒に設定された。A１がコート上でボールをキャッチし、フロントコートへドリブルをして、ショットをした。ボールが空中にある間にショットクロックのブザーが鳴った。ボールはリングに触れず、すぐにA２がリバウンドのボールを取った。審判はショットクロックバイオレーションのためゲームを止めた。テーブルオフィシャルズはショットクロックが誤って設定されたことを認識した。審判はショットクロックのバイオレーションはなかったものとして、ゲームが止められた場所に最も近いアウトオブバウンズからスローインがチームAに与えられる。どちらのチームにも関係のない正当な理由でゲームを止めたため、ショットクロックは14秒にリセットしてゲームは再開される。",ans:false,explanation:"ショットクロックのバイオレーションはなかったものとして、ゲームが止められた場所に最も近いアウトオブバウンズからスローインがチームAに与えられ、ショットクロックは10秒となる。",ruleSrc:"インプリ 44-34",ruleText:"インプリ 44-34\nショットクロックが誤って設定された場合、バイオレーションはなかったものとし、ショットクロックは10秒（24秒から14秒を引いた残り）で再開される。"},

// ── 定数 ─────────────────────────────────────────────
const STORAGE_KEY = 'jba_rule_record_v3';

// ── 状態 ─────────────────────────────────────────────
let mode    = 'order';
let queue   = [];
let qIdx    = 0;
let session = { correct: 0, wrong: 0 };
let chosen  = null;
let recOpen = true;
let record  = {};   // { [id]: { correct, wrong, history: [{ans,correct,ts}] } }

// ── localStorage ─────────────────────────────────────
function loadRecord() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // 全問題分のキーを保証
      ALL.forEach(c => {
        if (!parsed[c.id]) parsed[c.id] = { correct: 0, wrong: 0, history: [] };
        if (!parsed[c.id].history) parsed[c.id].history = [];
      });
      return parsed;
    }
  } catch(e) { console.warn('load error', e); }
  // 初期値
  const r = {};
  ALL.forEach(c => { r[c.id] = { correct: 0, wrong: 0, history: [] }; });
  return r;
}

function saveRecord() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(record));
    showToast();
  } catch(e) {
    console.warn('save error', e);
    // QuotaExceededError対策：historyを削ってリトライ
    try {
      const slim = {};
      Object.keys(record).forEach(k => {
        slim[k] = { correct: record[k].correct, wrong: record[k].wrong, history: [] };
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(slim));
    } catch(e2) { console.error('save failed', e2); }
  }
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function clearRecord() {
  if (!confirm('学習記録をすべてリセットしますか？\nこの操作は元に戻せません。')) return;
  ALL.forEach(c => { record[c.id] = { correct: 0, wrong: 0, history: [] }; });
  saveRecord();
  renderRecord();
}

// ── モード・キュー ────────────────────────────────────
function getWeakIds() {
  return ALL
    .filter(c => {
      const r = record[c.id];
      const t = r.correct + r.wrong;
      return t > 0 && r.correct / t < 0.5;
    })
    .map(c => c.id);
}

function buildQueue() {
  if (mode === 'order')   queue = [...ALL];
  else if (mode === 'shuffle') queue = [...ALL].sort(() => Math.random() - 0.5);
  else queue = ALL.filter(c => getWeakIds().includes(c.id));
  qIdx    = 0;
  session = { correct: 0, wrong: 0 };
  chosen  = null;
}

function setMode(m) {
  mode = m;
  ['order','shuffle','wrong'].forEach(k => {
    document.getElementById('tab-' + k).classList.toggle('active', k === m);
  });
  buildQueue();
  render();
}

// ── 表示切替 ─────────────────────────────────────────
function showView(v) {
  ['quiz','done','empty','record'].forEach(id => {
    document.getElementById(id + '-area').style.display = 'none';
  });
  document.getElementById(v + '-area').style.display = '';
  if (v === 'record') renderRecord();
}

// ── 統計更新 ─────────────────────────────────────────
function updateStats() {
  document.getElementById('st-total').textContent   = ALL.length;
  document.getElementById('st-correct').textContent = session.correct;
  document.getElementById('st-wrong').textContent   = session.wrong;
  document.getElementById('st-left').textContent    = Math.max(0, queue.length - qIdx);
  const pct = queue.length > 0 ? Math.round(qIdx / queue.length * 100) : 0;
  document.getElementById('prog').style.width    = pct + '%';
  document.getElementById('nav-info').textContent = '問題 ' + (qIdx + 1) + ' / ' + queue.length;
  document.getElementById('nav-pct').textContent  = pct + '%';
}

// ── 問題レンダリング ──────────────────────────────────
function render() {
  updateStats();
  if (mode === 'wrong' && queue.length === 0) { showView('empty'); return; }
  if (qIdx >= queue.length) {
    showView('done');
    const t   = queue.length;
    const pct = t > 0 ? Math.round(session.correct / t * 100) : 0;
    document.getElementById('d-total').textContent   = t;
    document.getElementById('d-correct').textContent = session.correct;
    document.getElementById('d-wrong').textContent   = session.wrong;
    document.getElementById('d-pct').textContent     = pct + '%';
    return;
  }
  showView('quiz');

  const card = queue[qIdx];
  document.getElementById('q-meta').textContent = 'No.' + card.id + '　' + card.num + '　難易度 ' + card.level;
  document.getElementById('q-ref').textContent  = card.ref;
  document.getElementById('q-text').textContent = card.q;

  // 履歴チップ
  const r   = record[card.id] || { correct: 0, wrong: 0, history: [] };
  const tot = r.correct + r.wrong;
  const histEl = document.getElementById('q-hist');
  if (tot > 0) {
    const rate = Math.round(r.correct / tot * 100);
    histEl.innerHTML =
      '<span class="chip">累計 ' + tot + ' 回</span>'
      + '<span class="chip chip-ok">正解 ' + r.correct + ' 回</span>'
      + '<span class="chip chip-ng">不正解 ' + r.wrong + ' 回</span>'
      + '<span class="chip">正答率 ' + rate + '%</span>';
  } else {
    histEl.innerHTML = '<span class="chip">初挑戦</span>';
  }

  // ボタンリセット
  const bo = document.getElementById('btn-o');
  const bx = document.getElementById('btn-x');
  bo.className = 'cbtn'; bo.disabled = false;
  bx.className = 'cbtn'; bx.disabled = false;
  chosen = null;
  document.getElementById('result-area').style.display  = 'none';
  document.getElementById('choice-btns').style.display  = 'grid';
}

// ── 解答 ─────────────────────────────────────────────
function choose(userAns) {
  if (chosen !== null) return;
  chosen = userAns;

  const card    = queue[qIdx];
  const correct = (userAns === card.ans);

  // セッション集計
  if (correct) session.correct++; else session.wrong++;
  updateStats();

  // ── 記録に追記 ────────────────────────────────────
  if (!record[card.id]) record[card.id] = { correct: 0, wrong: 0, history: [] };
  const rec = record[card.id];
  if (correct) rec.correct++; else rec.wrong++;
  rec.history.push({
    ans:     userAns,
    correct: correct,
    ts:      new Date().toISOString()
  });
  // historyは直近50件だけ保持（容量節約）
  if (rec.history.length > 50) rec.history = rec.history.slice(-50);

  saveRecord();   // ← 必ず保存

  // ボタン色付け
  const bo = document.getElementById('btn-o');
  const bx = document.getElementById('btn-x');
  bo.disabled = true; bx.disabled = true;
  if (userAns === true) {
    bo.className = correct ? 'cbtn cbtn-correct' : 'cbtn cbtn-wrong';
    if (!correct) bx.className = 'cbtn cbtn-reveal';
  } else {
    bx.className = correct ? 'cbtn cbtn-correct' : 'cbtn cbtn-wrong';
    if (!correct) bo.className = 'cbtn cbtn-reveal';
  }

  // 結果カード
  const ansLabel   = card.ans ? '○' : '×';
  const badgeCls   = card.ans ? 'badge-o' : 'badge-x';
  const resultHtml = correct
    ? '<span class="res-lbl lbl-ok">✓ 正解！</span>'
    : '<span class="res-lbl lbl-ng">✗ 不正解</span>';

  document.getElementById('result-card').innerHTML =
    '<div class="res-head">'
      + '<div class="ans-badge ' + badgeCls + '">' + ansLabel + '</div>'
      + resultHtml
    + '</div>'
    + '<div class="sec"><div class="sec-ttl">解説</div>'
      + '<div class="sec-txt">' + esc(card.explanation) + '</div></div>'
    + '<div class="sec"><div class="sec-ttl">根拠条文</div>'
      + '<div class="rule-box">'
        + '<div class="rule-src">' + esc(card.ruleSrc) + '</div>'
        + '<div class="rule-txt">' + esc(card.ruleText).replace(/\n/g,'<br>') + '</div>'
      + '</div></div>';

  document.getElementById('choice-btns').style.display = 'none';
  document.getElementById('result-area').style.display = 'block';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function nextQ()   { qIdx++; render(); }
function restart() { buildQueue(); render(); }

// ── 記録パネル ────────────────────────────────────────
function toggleRec() {
  recOpen = !recOpen;
  document.getElementById('rec-body').style.display   = recOpen ? '' : 'none';
  document.getElementById('rec-toggle').textContent   = recOpen ? '▲ 閉じる' : '▼ 開く';
}

function renderRecord() {
  const totC   = Object.values(record).reduce((s,r) => s + r.correct, 0);
  const totW   = Object.values(record).reduce((s,r) => s + r.wrong,   0);
  const totAll = totC + totW;
  const totPct = totAll > 0 ? Math.round(totC / totAll * 100) : 0;

  document.getElementById('rec-totals').innerHTML =
    '<div class="rec-stat"><div class="rec-stat-n">' + totAll + '</div><div class="rec-stat-l">累計回答数</div></div>'
    + '<div class="rec-stat"><div class="rec-stat-n n-ok">' + totC + '</div><div class="rec-stat-l">累計正解数</div></div>'
    + '<div class="rec-stat"><div class="rec-stat-n">' + totPct + '%</div><div class="rec-stat-l">総正答率</div></div>';

  document.getElementById('q-list').innerHTML = ALL.map(card => {
    const r   = record[card.id] || { correct: 0, wrong: 0, history: [] };
    const t   = r.correct + r.wrong;
    if (t === 0) {
      return '<div class="q-item">'
        + '<span class="q-id">No.' + card.id + '</span>'
        + '<span style="flex:1;font-size:11px;color:#d0d5dd">未回答</span>'
        + '<span class="q-badge badge-new">未</span></div>';
    }
    const rate = Math.round(r.correct / t * 100);
    const isW  = rate < 50;
    return '<div class="q-item">'
      + '<span class="q-id">No.' + card.id + '</span>'
      + '<div class="bar-wrap">'
        + '<div class="bar-c" style="width:' + rate + '%"></div>'
        + '<div class="bar-w" style="width:' + (100-rate) + '%"></div>'
      + '</div>'
      + '<span class="q-nums">' + r.correct + '/' + t + '回</span>'
      + '<span class="q-badge ' + (isW ? 'badge-weak' : 'badge-good') + '">'
        + (isW ? '苦手' : '得意') + '</span></div>';
  }).join('');
}

// ── 起動 ─────────────────────────────────────────────
record = loadRecord();
buildQueue();
render();
</script>
