 "art_no": "8", "art_title": "競技時間、同点、オーバータイム", "sec_no": "7-7", "body": "７-７   例：チーム A のヘッドコーチとファーストアシスタントコーチが失格・退場となった。\n      解説：チーム A のキャプテンがプレーヤー兼ヘッドコーチとしてその役割を担う。\n\n\n第８条 競技時間、同点、オーバータイム\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "8", "art_title": "競技時間、同点、オーバータイム", "sec_no": "8-1", "body": "８-１   条文：プレーのインターバルは：\n      ・ゲーム開始予定時刻の20分前に始まる\n      ・最後のクォーターやオーバータイムを除き、各クォーターやオーバータイムの終了を知らせるゲームクロ\n      ックのブザーが鳴ったときに始まる。\n      ・バックボードの外枠が赤く点灯するように備えられているとき、ゲームクロックのブザーよりもその点\n      灯が優先される。"}, {"type": "impl", "art_no": "8", "art_title": "競技時間、同点、オーバータイム", "sec_no": "8-2", "body": "８-２   例：クォーターの終了を知らせるゲームクロックのブザーが鳴る前に、B１はショットの動作（アクトオ\n      ブシューティング）中の A１にファウルをし、ショットは\n      ⒜成功しなかった。\n\n⒝成功した。\n      解説：審判は、B１のファウルがクォーターの終了を知らせるゲームクロックのブザーより前に起きた\n      かどうかを速やかに相談し合い、決定する。\n\n      審判が B１のファウルがゲームクロックのブザーより前に起きたと判断した場合、B1 はパーソナルファ\n      ウルを宣せられる。\n      ⒜2 本のフリースローが A1 に与えられる。\n      ⒝A1 の得点は認められ、さらに 1 本のフリースローが与えられる。\n      ゲームクロックはファウルが起きたときの残り時間に戻される。ゲームは通常の最後のフリースローの\n      後と同様に再開される。\n\n      審判が B１のファウルがゲームクロックのブザーより後に起きたと判断した場合、ファウルはなかったも\n      のとし、得点が入っても認められない。B1 のファウルがアンスポーツマンライクファウルもしくはディスク\n      ォリファイングファウルの判定基準に合致するもので、続いてクォーターやオーバータイムが行われる場\n      合、B１のファウルはなかったことにはせず、次のクォーターやオーバータイムが始まる前にその状況に\n      応じて罰せられる。このファウルは次のクォーターのチーム B のチームファウルに数えられる。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "8-3", "body": "８-３   例：A１はスリーポイントゴールのショットをした。ゲームの終了を知らせるゲームクロックのブザーが\n      鳴ったとき、ボールは空中にあった。ブザーのあと、B１がまだ空中にいる A１にファウルをした。ボー\n      ルはバスケットに入った。\n      解説：A1 は 3 点を与えられる。B1 のファウルがアンスポーツマンライクファウルもしくはディスクォリフ\n      ァイングファウルの判定基準に合致するもので、続いてクォーターやオーバータイムが行われる場合を\n      除いて、A１に対する B1 のファウルは競技時間終了後に起きたものとしてなかったものとする。\n\n\n第９条 ゲーム、クォーター、オーバータイムの開始と終了\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-1", "body": "９-１   条文：各チームが最低５人のプレーヤーをコート上に揃えなければゲームは開始されない。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-2", "body": "９-２   例：後半開始の時点で、チーム A が怪我や失格・退場などの理由でコート上に５人のプレーヤー\n      を出場させることができなかった。\n      解説：最低５人のプレーヤーを揃えるルールはゲーム開始時のみに適用されるため、チーム A は\n      ５人未満のプレーヤーでゲームを続けることができる。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-3", "body": "９-３   例：ゲーム終了間際に A１が５個目のファウルを宣せられプレーをする資格を失った。これ以上プレ\n      ーができる交代要員がいないチーム A は、４人のプレーヤーのみでゲームを続けることができる。チー\n      ム B は大差でリードしており、ヘッドコーチ B は公平にゲームを行うため、プレーヤーを１人コートから\n      退かせ、自チームも 4 人でプレーすることを希望した。\n\n解説：５人未満でゲームをするというヘッドコーチ B の要求は認められない。ゲームをするのに十\n      分なプレーヤーがいる限り、５人のプレーヤーがコート上にいなければならない。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-4", "body": "９-４   条文：第9条は、チームがどちらのバスケットを防御しどちらのバスケットに攻撃するかを規定してい\n      る。混乱によって、両チームが共に誤ったバスケットに攻撃あるいは防御をすることでいずれかのクォ\n      ーターやオーバータイムが始まった場合、状況が発見されたら、どちらのチームにも不利にならない\n      状況で、すぐに修正する。ゲームが止められるまでに認められた得点や動いた時間、宣せられたファ\n      ウルなどは全て有効となる。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-5", "body": "９-５   例：ゲーム開始後、審判が両チームともに誤った方向にプレーしていることに気がついた。\n      解説：ゲームはどちらのチームにも不利にならない状況でできる限りすぐに止められる。両チームは\n      攻める方向を正しく変え、ゲームはゲームが止められた場所の対称となる位置に最も近いアウトオ\n      ブバウンズから再開される。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-6", "body": "９-６   条文：ゲームはセンターサークルでジャンプボールによって開始される。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-7", "body": "９-７   例：ゲームを開始するジャンプボールのトスで、ボールがクルーチーフの手を\n      ⒜離れる前に\n      ⒝離れた後に\n      ジャンパーの B1 が A1 にパーソナルファウルをした。\n      解説：\n      ⒜第１クォーターはまだ始められていない。したがって、これはゲームの開始前のプレーのインターバ\n       ル中に起きているファウルである。ゲームはジャンプボールで開始される。\n      ⒝第 1 クォーターは始められている。したがって、これは第 1 クォーターの最中でのフ ァ ウ ル で あ る 。\n       ゲームはフロントコートのセンターラインに最も近いアウトオブバウンズからチーム A のスローインで\n       再開され、ショットクロックは 14 秒となる。\n      どちらの場合においても、ファウルはスコアシートに記録され、チーム B の第 1 クォーターのチームファ\n      ウルに数えられる。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-8", "body": "９-８   例：ゲーム開始前のインターバル中に、A１にテクニカルファウルが宣せられた。ヘッドコーチ B は、B\n      ６を１本のフリースローを行うプレーヤーに指定したが、B６はチーム B の最初に出場する５人のプ\n      レーヤーではなかった。\n      解説：誰もリバウンドの位置に着かずにフリースローがチーム B の最初に出場する 5 人のプレーヤ\n      ーの中から指定された 1 人に与えられる。競技時間の開始前に交代は認められない。\n      そのあと、ゲームはジャンプボールによって開始される。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-9", "body": "９-９   例：ゲーム開始前のインターバル中に、A１が B１にアンスポーツマンライクファウルをした。\n\n解説：ゲーム開始前に、誰もリバウンドの位置に着かずに２本のフリースローが B1 に与えられる。\n       B１が、最初に出場すると確認されていた５人のプレーヤーのうちの１人であった場合、B１はコー\n       トに残らなければならない。\n       B１が、最初に出場すると確認されていた５人のプレーヤーのうちの１人ではなかった場合、B１\n       はコートに残ることはできない。\n       ゲームは、最初に出場すると確認されたチーム B の５人をプレーヤーとして、ジャンプボールによって\n       開始される。\n\n９-10 条文：ゲーム開始前のインターバル中に、最初に出場する５人のプレーヤーのうちの１人がゲー\n       ムを開始することができなくなった、もしくはその資格がなくなった場合、そのプレーヤーは別のプレー\n       ヤーと交代する。この場合、相手チームも必要に応じて最初に出場する５人のプレーヤーのうち１\n       人を変更することができる。"}, {"type": "impl", "art_no": "10", "art_title": "ボールのステータス", "sec_no": "9-11", "body": "９-11   例：A１はチーム A から最初に出場する 5 人のプレーヤーのうちの１人であった。ゲーム開始７\n       分前のインターバルの間に\n       ⒜A１が怪我をした。\n       ⒝A１がディスクォリファイングファウルを宣せられた。\n       解説：どちらの場合においても、A１は別のプレーヤーと交代する。この場合、チーム B も必要に\n       応じて最初に出場する５人のプレーヤーのうち 1 人を変更することができる。\n\n\n第 10 条 ボールのステータス（状態）\n――――――――――――――――――――――――――――――――――――――――――\n10-１ 条文：ショットの動作（アクトオブシューティング）中で、シューターのひと続きの動作が始まった後\n       で、ディフェンスのプレーヤーがいずれかの相手プレーヤーにファウルをし、シューターがそのひと続きの\n       動作でショットを終えたとき、ボールはデッドにならず、ショットが成功した場合はその得点は認めら\n       れる。この条文はディフェンスのプレーヤーもしくはそのチームのチームベンチに座ることを許された人\n       物がテクニカルファウルを宣せられた場合にも同様に適用される。"}, {"type": "impl", "art_no": "10", "art_title": "ボールのステータス", "sec_no": "10-2", "body": "10-２   例：B２が A２にファウルをしたとき、A１はショットの動作（アクトオブシューティング）を始めてい\n       た。A１はひと続きの動作でショットを終えた。\n       ⒜これはチーム B の３個目のチームファウルであった。\n       ⒝これはチーム B の５個目のチームファウルであった。\n       解説：どちらの場合においても、A１のショットが成功した場合はその得点は認められる。\n       ⒜では、ゲームは B2 のファウルが起きた場所に最も近いアウトオブバウンズからチーム A のスローイ\n       ンで再開される。\n\n⒝では、２本のフリースローが A２に与えられる。ゲームは通常の最後のフリースローの後と同様に\n       再開される。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "10-3", "body": "10-３   例：A２が B２にファウルをしたとき、A１はゴールのショットの動作（アクトオブシューティング）中\n       であった。A１はひと続きの動作でショットを終えた。\n       解説：A２がチームコントロールファウルをしたとき、ボールはデッドになる。A１のショットが成功した\n       場合、そのゴールは認められない。このクォーターのチーム A のチームファウルの数にかかわらず、ゲー\n       ムはフリースローラインの延長線上からチーム B のスローインで再開される。A1 のショットが成功しな\n       かった場合、ゲームはバックボードの真後ろを除いたファウルが起きた場所に最も近いアウトオブバウ\n       ンズからチーム B のスローインでゲームが再開される。\n\n\n第 12 条 ジャンプボール、オルタネイティングポゼッション\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-1", "body": "12-1   条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られな\n       かったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボ\n       ールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-2", "body": "12-２   例：ゲーム開始の 2 分前に A１はテクニカルファウルを宣せられた。\n       解説：誰もリバウンドの位置に着かずにフリースローがチーム B の最初に出場する５人のプレーヤ\n       ーのうち 1 人に与えられる。ゲームはまだ始まっていないため、オルタネイティングポゼッションアローは\n       どちらのチームも示していない。ゲームはジャンプボールで始められる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-3", "body": "12-３   例：クルーチーフがゲーム開始のジャンプボールのためにボールをトスした。ボールが最高点に達する\n       前にジャンパーの A１がボールに触れた。\n       解説：A１のジャンプボールのバイオレーションである。チーム B はセンターライン近くのフロントコート\n       からスローインを与えられる。ショットクロックは 14 秒となる。スローインをするチーム B のプレーヤーに\n       ボールが与えられたらすぐに、チーム A は最初のオルタネイティングポゼッションのスローインの権利を\n       得る。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-4", "body": "12-４   例：クルーチーフがゲーム開始のジャンプボールのためにボールをトスした。ボールが最高点に達する\n       前にジャンパーではない A２がセンターサークルに、チーム A の\n       ⒜バックコートから入った。\n       ⒝フロントコートから入った。\n       解説：どちらの場合においても、A２のジャンプボールのバイオレーションである。チーム B は：\n       ⒜センターラインに近いフロントコートからスローインを与えられる。ショットクロックは 14 秒となる。\n       ⒝センターラインに近いバックコートからスローインを与えられる。ショットクロックは 24 秒となる。\n\nスローインをするチーム B のプレーヤーがボールを受け取ったらすぐに、チーム A は最初のオルタネイ\n       ティングポゼッションのスローインの権利を得る。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-5", "body": "12-５   例：クルーチーフがゲーム開始のジャンプボールのためにボールをトスした。ジャンパーの A１によって\n       ボールが正当にタップされた直後に、\n       ⒜A２と B２の間でヘルドボールが起きた。\n       ⒝A２と B２の間でダブルファウルが起きた。\n       解説：どちらの場合においても、ライブのボールのコントロールがまだ確立されていないため、審判は\n       オルタネイティングポゼッションの手順を使用することができない。クルーチーフは A２と B２をジャンパ\n       ーとして、センターサークルで再度ジャンプボールを行う。ゲームクロックはボールが正当にタップされた\n       あと、ヘルドボールもしくはダブルファウルが起きた時点から継続される。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-6", "body": "12-６   例：クルーチーフがゲーム開始のジャンプボールのためにボールをトスした。ジャンパーの A１によって\n       正当にタップされた直後、ボールは、\n       ⒜直接アウトオブバウンズへ出た。\n       ⒝ジャンパー以外のプレーヤーあるいはコートに触れる前に A１にキャッチされた。\n       解説：どちらの場合においても、A１のバイオレーションの結果として、チーム B はスローインを与え\n       られる。ショットクロックはスローインがバックコートで行われる場合は 24 秒、フロントコートで行われ\n       る場合は 14 秒となる。スローインをするチーム B のプレーヤーにボールが与えられたらすぐに、チーム\n       A は最初のオルタネイティングポゼッションのスローインの権利を得る。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-7", "body": "12-７   例：クルーチーフはゲーム開始のジャンプボールをトスした。ジャンパーである A１がボールに正当に\n       触れた直後に、B１はテクニカルファウルを宣せられた。\n       解説：誰もリバウンドの位置に着かずに 1 本のフリースローがチーム A のいずれかのプレーヤーに与\n       えられる。チーム A のプレーヤーにフリースローのボールが与えられたらすぐにオルタネイティングポゼッ\n       ションアローはチーム B を示す。ゲームはテクニカルファウルが起きたときにボールがあった場所に最も\n       近いアウトオブバウンズからチーム B のオルタネイティングポゼッションのスローインで再開される。チー\n       ム B のバックコートからのスローインの場合、ショットクロックは 24 秒となる。チーム B のフロントコートか\n       らのスローインの場合、ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-8", "body": "12-８   例：クルーチーフがゲーム開始のジャンプボールをトスした。ジャンパーである A１がボールに正当に\n       触れた直後に、A２が B２にアンスポーツマンライクファウルをした。\n       解説：誰もリバウンドの位置に着かずに 2 本のフリースローが B２に与えられる。B２に最初のフリ\n       ースローのボールが与えられたらすぐにオルタネイティングポゼッションアローはチーム A を示す。ゲーム\n       は（アンスポーツマンライクファウルの罰則の一部として）フロントコートのスローインラインからチーム\n       B のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-9", "body": "12-９    例：チーム B はオルタネイティングポゼッションの手順によってスローインを与えられるはずが、審判あ\n        るいはスコアラー、もしくはその両方が誤ってスローインをチーム A に与えてしまった。\n        解説：ボールがコート上のプレーヤーに正当に触れた後は、誤りは訂正することができない。その誤\n        りの結果、チーム B は次のジャンプボールシチュエーションでのオルタネイティングポゼッションのスロー\n        インの権利を失うことはない。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-10", "body": "12-10   例：第１クォーター終了を知らせるゲームクロックのブザーと同時に、B１は A１に対してアンスポー\n        ツマンライクファウルをした。審判は B１のファウルが起きるよりも先にゲームクロックのブザーがなって\n        いたと判定した。チーム A は第２クォーターを開始するときにオルタネイティングポゼッションのスローイ\n        ンを与えられることになっていた。\n        解説：アンスポーツマンライクファウルはプレーのインターバルに起きている。第２クォーターの開始前\n        に、誰もリバウンドの位置に着かずに 2 本のフリースローが A１に与えられる。ゲームはフロントコート\n        のスローインラインからチーム A のスローインで再開される。ショットクロックは 14 秒となる。チーム A\n        は次のジャンプボールシチュエーションでのオルタネイティングポゼッションのスローインの権利を失うこと\n        はない。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-11", "body": "12-11   例：第３クォーター終了を知らせるゲームクロックのブザーが鳴った直後に B１はテクニカルファウルを\n        宣せられた。チーム A は第 4 クォーターを開始するときにオルタネイティングポゼッションのスローインを\n        与えられることになっていた。\n        解説：第４クォーターの開始前に誰もリバウンドの位置に着かずに 1 本のフリースローがチーム A\n        のいずれかのプレーヤーに与えられる。第 4 クォーターはセンターラインの延長線上からチーム A のス\n        ローインで開始される。ショットクロックは 24 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-12", "body": "12-12   例：A１はボールを持ってジャンプし、B１にブロックをされた。その後両プレーヤーは片手または両\n        手をしっかりとボールにかけている状態でコートに着地した。\n        解説：ジャンプボールシチュエーションとなる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-13", "body": "12-13   例：A１はボールを持ってジャンプし、B１に正当にブロックされた。そのあと、A１は片手または両\n        手でボールをしっかりと持ったままコートに着地したが、そのとき B１はすでにボールに触れていなかっ\n        た。\n        解説：A１のトラベリングのバイオレーションである。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-14", "body": "12-14   例：空中にいる A１と B１の手はしっかりとボールにかかっている。コートに着地したときに A１の片\n        足が境界線の上についた。\n        解説：ジャンプボールシチュエーションとなる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-15", "body": "12-15   例：A１はフロントコートからボールを持ってジャンプし、B１にそのボールをブロックされた。両プレー\n        ヤーが片手または両手をしっかりとボールにかけている状態で着地したときに A１の片足がバックコー\n\nトについた。\n        解説：ジャンプボールシチュエーションとなる。\n\n12-16 条文：ライブのボールがリングとバックボードの間に挟まったときは、複数のフリースローの間やファウル\n        の罰則の一部にボールのポゼッションがある場合を除いて、いかなるときもオルタネイティングポゼッショ\n        ンのスローインを伴うジャンプボールシチュエーションになる。ショットクロックは、オルタネイティングポゼッ\n        ションの手順によって、それまでオフェンスをしていたチームに継続してスローインが与えられるときは14\n        秒となり、相手チームにスローインが与えられるときは24秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-17", "body": "12-17   例：A１のショットでボールがリングとバックボードの間に挟まった。\n        ⒜チーム A は\n        ⒝チーム B は\n        オルタネイティングポゼッションの手順によってスローインを与えられることになっていた。\n        解説：チーム A のフロントコート、チーム B のバックコートのエンドラインからスローインが与えられ、\n        ⒜チーム A のショットクロックは 14 秒になる。\n        ⒝チーム B のショットクロックは 24 秒になる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-18", "body": "12-18   例：ショットクロックのブザーが鳴ったとき、A１のショットのボールは空中にあり、そのあとボールがリン\n        グとバックボードの間に挟まった。オルタネイティングポゼッションアローはチーム A を示している。\n        解説：ジャンプボールシチュエーションとなる。チーム A にフロントコートのエンドラインからスローインが\n        与えられるショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-19", "body": "12-19   例：B２はツーポイントゴールのショットの動作（アクトオブシューティング）中の A１にアンスポーツ\n        マンライクファウルをした。誰もリバウンドの位置に着いていない最後のフリースローで、\n        ⒜ボールがリングとバックボードの間に挟まった。\n        ⒝ボールを放つとき、A１がフリースローラインを踏んだ。\n        ⒞ボールがリングに触れなかった。\n        解説：全ての場合において、フリースローは失敗とみなされる。ゲームはフロントコートのスローインラ\n        インからチーム A のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-20", "body": "12-20   例：クォーター開始のセンターラインの延長線上からの A１のスローインのあと、ボールがチーム A の\n        フロントコートのリングとバックボードの間に挟まった。\n        解説：ジャンプボールシチュエーションとなる。オルタネイティングポゼッションアローは速やかに逆向き\n        になりチーム B を示す。ゲームはバックボードの真後ろを除いたエンドラインからチーム B のスローイン\n        で再開される。ショットクロックは 24 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-21", "body": "12-21   例：オルタネイティングポゼッションアローはチーム A を示している。第１クォーターの後のプレーのイ\n\nンターバル中に、B１は A１にアンスポーツマンライクファウルをした。誰もリバウンドの位置に着かず\n        に 2 本のフリースローが A１に与えられ、フロントコートのスローインラインからチーム A のスローインで\n        第２クォーターが始められた。オルタネイティングポゼッションアローは逆向きにならず、チーム A を示\n        したままとなっている。スローインのあと、ボールがチーム A のフロントコートのリングとバスケットの間に\n        挟まった。\n        解説：ジャンプボールシチュエーションとなる。ゲームはバックボードの真後ろを除いたエンドラインから\n        チーム A のスローインで再開される。ショットクロックは 14 秒となる。チーム A のスローインが終わっ\n        た直後に、オルタネイティングポゼッションアローは逆向きになる。\n\n12-22 条文：ヘルドボールは、両チームの１人あるいはそれ以上のプレーヤーがボールに片手または両\n        手をしっかりとかけて、どちらのプレーヤーも乱暴にしなければそのボールのコントロールを得られない\n        ときに宣せられる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-23", "body": "12-23   例：ボールを持っている A１は得点をするためにバスケットに向かってひと続きの動作をしている。こ\n        のとき B１が手をしっかりとボールにかけ、A１はトラベリングのルールで定められている範囲を超えて\n        ステップを踏んだ。\n        解説：ジャンプボールシチュエーションとなる。\n\n12-24 条文： オルタネイティングポゼッションのスローインの間にそのチームがバイオレーションを宣せられた\n        とき、そのチームはオルタネイティングポゼッションのスローインの権利を失う。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-25", "body": "12-25   例：あるクォーターのゲームクロック残り 4:17 で、オルタネイティングポゼッションのスローインの間に、\n        ⒜スローインをする A１が、ボールを持ったままコートに入った。\n        ⒝スローインのボールが境界線を越える前に、A２は手を動かして境界線を越えた。\n        ⒞スローインをする A１が、ボールを手離すまでに５秒以上が経過した。\n        解説：全ての場合において、A１もしくは A２のバイオレーションである。ゲームは元のスローインの\n        位置からチーム B のスローインで再開される。オルタネイティングポゼッションアローは速やかに逆向き\n        になり、チーム B を示す。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-26", "body": "12-26   条文：ショットクロックに時間が残っておらず、オルタネイティングポゼッションアローがチーム A を示\n        している状態でジャンプボールシチュエーションが起きたときはオルタネイティングポゼッションの手順\n        は適用できず、ショットクロックバイオレーションとなる。したがってスローインのボールがチーム B に与\n        えられる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-27", "body": "12-27   例：A1 のショットのボールが空中にある間にショットクロックのブザーが鳴った。その後ボールは\n        ⒜バスケットに入った。\n        ⒝リングに弾んだが、バスケットには入らなかった。\n        ⒞リングに触れなかった。\n\n(b)と(c)では直後にヘルドボールが宣せられた。\n        解説：\n        ⒜では、ショットクロックバイオレーションは起きていない。A1 の得点は認められる。ゲームはエンドラ\n        インの外側からチーム B のスローインで再開される。\n\n        ⒝では、オルタネイティングポゼッションアローがチーム A を示していた場合、ゲームはヘルドボールが\n        起きた場所に最も近いアウトオブバウンズからチーム A のスローインで再開される。ショットクロックは\n        14 秒となる。オルタネイティングポゼッションアローがチーム B を示していた場合、ゲームはヘルドボール\n        が起きた場所に最も近いアウトオブバウンズからチーム B のスローインで再開される。ショットクロック\n        は 24 秒となる。\n\n        ⒞では、ショットクロックバイオレーションとなる。オルタネイティングポゼッションアローの示す方向は関\n        係ない。ゲームはヘルドボールが起きた場所に最も近いアウトオブバウンズからチーム B のスローイン\n        で再開される。ショットクロックは 24 秒となる。"}, {"type": "impl", "art_no": "13", "art_title": "ボールの扱い方", "sec_no": "12-28", "body": "12-28   例：A1 のショットのボールが空中にある間にショットクロックのブザーが鳴った。ボールは\n        ⒜バスケットに入った。\n        ⒝リングに弾んだが、バスケットには入らなかった。\n        ⒞リングに触れなかった。\n        その直後に A2 もしくは B2 がテクニカルファウルを宣せられた。\n        解説：\n        全ての場合において、 誰もリバウンドの位置に着かずに、1 本のフリースローがチーム A のいずれか\n        のプレーヤー（B2 のテクニカルファウルの場合）も し く は チーム B のいずれかのプレーヤー（A2 の\n        テクニカルファウルの場合）に与えられる。\n\n        ⒜では、ショットクロックバイオレーションは起きていない。A1 の得点は認められる。ゲームはエンドラ\n        インの外側からチーム B のスローインで再開される。\n\n        ⒝では、オルタネイティングポゼッションアローがチーム A を示していた場合、ゲームはテクニカルファウ\n        ルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからチーム A のスローインで\n        再開される。ショットクロックは 14 秒となる。オルタネイティングポゼッションアローがチーム B を示して\n        いた場合、ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバ\n        ウンズからチーム B のスローインで再開される。ショットクロックは 24 秒となる。\n\n        ⒞では、ショットクロックバイオレーションとなる。オルタネイティングポゼッションアローの示す方向は関\n        係ない。ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウ\n        ンズからチーム B のスローインで再開される。ショットクロックは 24 秒となる。\n\n第 13 条 ボールの扱い方\n――――――――――――――――――――――――――――――――――――――――――\n13-１ 条文：ゲーム中、ボールは手で扱わなければならない。プレーヤーが不当に以下の行為を行うこと\n       はバイオレーションである。\n       ・ボールを脚の間に挟んでパスもしくはショットをする振りをすること。\n       ・故意に頭、拳、脚、足を使ってボールにプレーすること。"}, {"type": "impl", "art_no": "13", "art_title": "ボールの扱い方", "sec_no": "13-2", "body": "13-２   例：A１はドリブルを終えた。A１は足にボールを挟んでパスやショットをする振りをした。\n       解説：A１の脚で不当にボールを扱うバイオレーションである。"}, {"type": "impl", "art_no": "13", "art_title": "ボールの扱い方", "sec_no": "13-3", "body": "13-３   例：A１が、速攻で相手チームのバスケットに向かって走る A２にパスをした。ボールをキャッチする\n       前に、A２が意図的に頭でボールに触れた。\n       解説：A２の不当に頭を使ってボールにプレーするバイオレーションである。\n\n13-４ 条文：プレーヤーの身長や腕の長さを増やすための行為は許されていない。ボールにプレーするた\n       めにチームメイトを持ち上げることは、バイオレーションである。"}, {"type": "impl", "art_no": "14", "art_title": "ボールのコントロール", "sec_no": "13-5", "body": "13-５   例：A１は相手チームのバスケットの下でチームメイトの A２を抱き上げ、持ち上げた。A３は A２\n       にボールをパスし、A２はバスケットの中にボールをダンクした。\n       解説：チーム A のバイオレーションである。A２のゴールは認められない。ゲームはバックコートのサイ\n       ドラインのフリースローラインの延長線上からチーム B のスローインで再開される。\n\n\n第 14 条 ボールのコントロール\n――――――――――――――――――――――――――――――――――――――――――\n14-１ 条文：チームコントロールは、そのチームのプレーヤーがライブのボールを持つかドリブルをしたとき、\n       あるいはスローインやフリースローのためにボールを与えられたときに始まる。"}, {"type": "impl", "art_no": "14", "art_title": "ボールのコントロール", "sec_no": "14-2", "body": "14-２   例：ゲームクロックが止まっているかどうかにかかわらず、スローインもしくはフリースローで、プレーヤー\n       が意図的にボールを取ることを遅らせた。\n       解説：スローインを行う位置の最も近くのフロアやフリースローラインのコートに審判がボールを置い\n       たとき、ボールはライブとなり、チームコントロールは始まる。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "14-3", "body": "14-３   例：チーム A は 15 秒間ボールをコントロールしている。A１は A２にボールをパスし、ボールは境\n       界線を越えた。B１はボールをキャッチしようとコート内からジャンプをして境界線を越えた。B１はま\n       だ空中にいる間に、\n       ⒜片手、または両手でボールを弾き\n       ⒝ボールを両手でキャッチ、またはボールを片手で支え持ち\n       ボールをコートに戻し、A２がキャッチした。\n\n解説：\n       ⒜チーム A は引き続きボールをコントロールしている。ショットクロックは継続となる。\n       ⒝B１によってチーム B はボールのチームコントロールを得ている。その後 A２によってチーム A は再\n        びボールのチームコントロールを得たことになる。ショットクロックは新たに 24 秒となる。\n\n\n第 15 条 ショットの動作（アクトオブシューティング）中のプレーヤー\n――――――――――――――――――――――――――――――――――――――――――\n15-１ 条文：動きながらではないショットでのショットの動作（アクトオブシューティング）はプレーヤーが相\n       手チームのバスケットに向けて、ボールを上方に動かし始めたときに始まる。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-2", "body": "15-２   例：A１はバスケットへのドライブで、ボールを上方に動かさずにコート上に両足を着けて正当に止\n       まった。このとき、B１が A１にファウルをした。\n       解説：A１はまだボールをバスケットに向かって上方に動かし始めていないことから、B１のファウル\n       はショットの動作（アクトオブシューティング）中のプレーヤーに対して起こってはいない。\n\n15-３ 条文：バスケットへのドライブでのひと続きの動作でのショットの動作（アクトオブシューティング）と\n       は、ショットの動作に先立って、プレーヤーがドリブルを終え、もしくは空中でボールをキャッチし、片\n       手または両手でボールを支え持ったときに始まる。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-4", "body": "15-４   例：バスケットへのドライブで A１は両手でボールを持ってドリブルを終え、ショットの動作を始めた。\n       このとき、B１が A１にファウルをした。ボールはバスケットに入らなかった。\n       解説：B１のファウルはショットの動作（アクトオブシューティング）中のプレーヤーに対して起こって\n       いる。A１は 2 本のフリースローを与えられる。ゲームは通常の最後のフリースローの後と同様に再\n       開される。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-5", "body": "15-５   例：A１はジャンプして空中でスリーポイントゴールのショットを放った。A１の両足がコートに着く前\n       に B１が A１にファウルをした。ボールはバスケットに入らなかった。\n       解説：両足がコートに着くまで A１はショットの動作（アクトオブシューティング）中である。A１に\n       3 本のフリースローが与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-6", "body": "15-６   例：フロントコートで、両手でボールを持っている A1 が B1 にファウルをした。これはチームコントロー\n       ルファウルであった。A1 はひと続きの動作で進みながら、ボールをバスケットの中に投げた。\n       解説：A1 のゴールは認められない。ゲームはバックコートのフリースローラインの延長線上からチー\n       ム B のスローインで再開される。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-7", "body": "15-７   例：バスケットに向かってドライブしていて前に踏み出した足がまだコートに着いている A1 に B1 が\n       ファウルをした。A1 はショットの動作（アクトオブシューティング）を続けたが、B1 のファウルによって\n       ボールが一時的に A1 の手を離れた。A1 はそのボールを両手でキャッチし、ひと続きの動作で得点\n\nした。\n        【補足】B1 がファウルをしたときには、A1 はショットのためにボールを手に持って、ショットの動作（ア\n              クトオブシューティング）に入っている状態。\n        解説：B1 のファウルは A1 のショットの動作（アクトオブシューティング）に対して起きている。ボー\n        ルが一時的に A1 の手から離れたとしても、A1 はまだボールをコントロールしており、ひと続きのショッ\n        トの動作（アクトオブシューティング）は続いている。得点は認められ、1 本のフリースローが A1 に\n        与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。\n\n15-８ 条文：ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされた後にパスをした\n        ときは、もはやショットの動作中であるとはみなされない。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-9", "body": "15-９    例：B１がショットの動作（アクトオブシューティング）中の A１にファウルをし、このクォーター3 個\n        目のチームファウルであった。ファウルのあと、A１は A２にボールをパスした。\n        解説：A１が A２にボールをパスしたとき、ショットの動作（アクトオブシューティング）は終わる。ゲ\n        ームはファウルが起きた場所に最も近いアウトオブバウンズからチーム A のスローインで再開される。\n\n15-10 条文：プレーヤーがショットの動作（アクトオブシューティング）中にファウルをされたあと、トラベリン\n        グのバイオレーションをして得点した場合、ゴールは認められず、2本もしくは3本のフリースローを与\n        えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数", "sec_no": "15-11", "body": "15-11   例：ツーポイントゴールのために両手でボールを持った A１はバスケットに向かってドライブをした。B\n        １は A１にファウルし、その後 A１はトラベリングのバイオレーションをした。ボールはバスケットに入った。\n        解説：A１のゴールは認められない。A１は２本のフリースローを与えられる。\n\n\n第 16 条 得点：ゴールによる点数\n――――――――――――――――――――――――――――――――――――――――――\n16-１ 条文：ゴールの得点は、ショットが放たれたコート上の位置によって定義される。ツーポイントゴール\n        エリアから放たれたゴールには２点、スリーポイントゴールエリアから放たれたゴールには３点が認め\n        られる。攻撃する相手チームのバスケットにボールが入ると得点が与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数", "sec_no": "16-2", "body": "16-２    例：A１はスリーポイントゴールエリアからショットを放った。ボールが上昇している間にチーム A のツ\n        ーポイントゴールエリアにいるプレーヤーが正当に触れ、ボールはバスケットに入った。\n        解説：A１のショットはスリーポイントゴールエリアから放たれており、3 点がチーム A に与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数", "sec_no": "16-3", "body": "16-３    例：A１はツーポイントゴールエリアからショットを放った。ボールが上昇している間にチーム A のスリ\n        ーポイントゴールエリアから跳んだ B１が正当に触れ、ボールはバスケットに入った。\n        解説：A１のショットはツーポイントゴールエリアから放たれており、2 点がチーム A に与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数", "sec_no": "16-4", "body": "16-４    例：クォーターの始まりで、チーム A が自チームのバスケットをディフェンスしているとき、B１が誤って\n        自チームのバスケットに向かってドリブルをし、ゴールを得点した。\n        解説：チーム A のコート上のキャプテンに２点が与えられる。\n\n16-５ 条文：ボールが相手チームのバスケットに入った場合、ゴールの得点は、ボールが手から離れた際\n        のコート上の位置によって定義される。ボールは直接バスケットに入るか、バスケットに入る前にパス\n        のボールがいずれかのプレーヤーもしくはコートに触れてもよい。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数", "sec_no": "16-6", "body": "16-６    例：A１はスリーポイントゴールエリアからボールをパスした。\n        ⒜ボールは直接バスケットに入った。\n        ⒝ボールはチーム A のツーポイントゴールエリアもしくはスリーポイントゴールエリアのいずれかのプレーヤ\n         ーあるいはコートに触れ、その後バスケットに入った。\n        解説：どちらの場合においても A１のパスはスリーポイントゴールエリアから手放されており、3 点がチ\n        ーム A に与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数", "sec_no": "16-7", "body": "16-７    例：A１がスリーポイントゴールのショットをした。ボールは A１の手を離れたあと、チーム A のツーポ\n        イントゴールエリア内のコートに触れた。ボールはバスケットに入った。\n        解説：A１のゴールはスリーポインゴールエリアから放たれていることから、3 点が認められる。ゲーム\n        は通常のゲームクロックが動いていて、ボールがライブの状態でのゴールが成功した後と同様に再開\n        される。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数", "sec_no": "16-8", "body": "16-８    例：B１がスリーポイントゴールのショットの動作（アクトオブシューティング）中の A１にファウルをし\n        た。ボールはコートに触れ、その後でバスケットに入った。\n        解説：A１のゴールは認められない。ショットはボールがコートに触れたときに終わる。審判が笛を\n        吹いたあと、ボールはショットではなくなったことで、ボールは速やかにデッドになる。A１は 3 本のフリ\n        ースローを与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数", "sec_no": "16-9", "body": "16-９    例：A１がスリーポイントゴールのショットをした。ボールが A１の手を離れたあと、クォーターの終了\n        を知らせるゲームクロックのブザーが鳴った。ボールはコートに触れ、その後でバスケットに入った。\n        解説：A１のゴールは認めらない。ショットはボールがコートに触れたときに終わる。ボールはショット\n        ではなくなったことで、クォーターの終了を知らせるゲームクロックのブザーが鳴ったときにボールはデッド\n        になる。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数", "sec_no": "16-10", "body": "16-10   例：スローインをする A1 がフロントコートでボールをパスした。そ の 後 ボ ー ル はチーム A のフロント\n        コートでスリーポイントエリアにいるいずれかのプレーヤーに正当に触れられ、バスケットに入った。\n        解説：スローインのボールであるため、2 点が認められる。プレーヤーがボールに触れたこ\n        とは正当である。3 点が認められるのはショットもしくはパスのボールがコート上でスリーポイントライン\n\nの外側から放たれたときのみである。\n\n16-11 条文：スローインあるいは最後のフリースローのリバウンドでは、コート内のプレーヤーがボールに触れて\n        からショットを放つまでに常に時間を要する。これはクォーターやオーバータイムの終わり近くでは特に注\n        意を払わなくてはならない。競技時間が終了するまでに、このようなショットを放つためには最低限の\n        時間が必要である。ゲームクロックまたはショットクロックに0.3秒かそれ以上が表示されている場合、ク\n        ォーターやオーバータイム終了を知らせるゲームクロックやショットクロックのブザーが鳴る前にシューターが\n        ボールを放っていたかを決定することは審判の責務である。しかし、ゲームクロックまたはショットクロック\n        に0.2秒あるいは0.1秒が表示されている場合、プレーヤーが得点できる有効なゴールは、ボールをタ\n        ップするか直接ダンクするかのみで、その場合でもゲームクロックまたはショットクロックに0.0秒が表示さ\n        れたときにはプレーヤーの片手または両手はボールに触れていてはならない。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数", "sec_no": "16-12", "body": "16-12   例：チーム A にスローインが与えられ、ゲームクロックまたはショットクロックには、\n        ⒜0.3 秒\n        ⒝0.2 秒あるいは 0.1 秒\n        が表示されている。\n        解説：\n        審判は正確な残りの競技時間がクロックに表示されていることを確認する。\n        ⒜ショットを狙い、その最中にクォーターやオーバータイムの終了を知らせるゲームクロックのブザーま\n         たはショットクロックのブザーが鳴った場合、それらのブザーが鳴る前にボールが放たれたかどうかを\n         決定することは審判の責任である。\n        ⒝得点が認められるゴールは、スローインでパスされたボールが空中にある間に、タップされたか、直\n         接ダンクされた場合のみである。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数", "sec_no": "16-13", "body": "16-13   例：クォーターの終わりで、A１はバスケットへ直接ボールをダンクした。ゲームクロックに 0.0 秒が表\n        示されたとき、ボールはまだ A１の片手または両手に触れていた。\n        解説：A１のゴールは認められない。クォーターの終了を知らせるゲームクロックのブザーが鳴ったと\n        き、ボールはまだ A１の手に触れていた。\n\n16-14 条文：ゴールの得点は、ライブのボールが上からバスケットに入り、バスケットの中にとどまるか、完\n        全に通過したときに認められる。\n        ⒜ゲーム中のいずれかの時間帯にディフェンスのチームがタイムアウトを請求し、ゴールが認められた\n         とき、あるいは\n        ⒝第４クォーターやオーバータイムでゲームクロックに2:00あるいはそれ以下が表示されているとき。\n        図2に示すように、ゲームクロックはボールがバスケットにとどまったとき、あるいは完全にバスケットを\n        通過したときに止められる。\n\n図２ ゴールの得点"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "16-15", "body": "16-15   例：第 4 クォーター残り 2:02 で、A1 が得点し、ボールがバスケットを通過した。ゲームクロック残\n        り 2:00 で、B1 がエンドラインでスローインをしようとしている。\n        解説：得点されたとき、ゲームクロックは 2:01 以上を示している。したがって、ゲームクロックは止め\n        られない。\n\n\n第 17 条 スローイン\n――――――――――――――――――――――――――――――――――――――――――\n17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界\n        線を越えてはならない。\n        スローインをするプレーヤーがボールを手放す前、スローインの動作中にそのプレーヤーのボールを持\n        つ手がコートの内側と外側を分ける境界線上を越える可能性がある。その場合、スローインをする\n        プレーヤーの手の中にまだあるボールに触ってスローインを妨害しないようにするのは、ディフェンスの\n        プレーヤーの責任である。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-2", "body": "17-２    例：第３クォーターで、チーム A がバックコートでスローインを与えられた。ボールを持っている間に、\n        ⒜スローインをする A１が境界線上を越えて手を動かし、ボールが境界線の内側に入った。B１は\n         A１に触れることなく、A１の持っているボールをつかんだ、あるいはボールを弾き出した。\n        ⒝コート上の A２へのパスを止めるために、B１がスローインをする A１に向かって境界線を越えて手を\n         動かした。\n        解説：どちらの場合においても、B１がスローインを妨害しゲームの再開を遅らせている。審判はゲ\n        ームの遅延行為（ディレイオブゲーム）のバイオレーションを宣する。加えて、B１に口頭で警告が\n        与えられ、その旨はチーム B のヘッドコーチにも伝えられる。この警告はゲームの残り時間中、チーム\n        B の全てのプレーヤーに適用される。同様の行為がチーム B のプレーヤーによって繰り返された場\n        合、テクニカルファウルが宣せられる。チーム A のスローインが再度行われ、ショットクロックは 24 秒と\n        なる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-3", "body": "17-３    例：第３クォーターで、チーム A はフロントコートからのスローインを与えられた。スローインをする A\n        １がボールを持っているとき、B１は境界線を越えて手を動かした。ショットクロックは\n\n⒜7 秒であった。\n       ⒝17 秒であった。\n       解説：B1 のスローインのバイオレーションである。加えて、B1 に口頭で警告が与えられ、その旨は\n       チーム B のヘッドコーチにも伝えられる。この警告はゲームの残り時間中、チーム B の全てのプレー\n       ヤーに適用される。同様の行為がチーム B のプレーヤーによって繰り返された場合、テクニカルファウ\n       ルが宣せられる。スローインは再度行われる。ショットクロックは\n       ⒜14 秒となる。\n       ⒝17 秒となる。\n\n17-４ 条文：第４クォーター、各オーバータイムでゲームクロックに２:00あるいはそれ以下が表示されて\n       いるとき、ディフェンスのプレーヤーはスローインを妨害するために、体のどの部分も境界線を越えて\n       はならない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-5", "body": "17-５   例：第４クォーター残り 54 秒で、チーム A がスローインを与えられることになっている。スローインを\n       する A１にボールが与えられる前に審判は B１に「イリーガルバウンダリラインクロッシング」のシグナル\n       を行い、警告を示した。その後ボールが境界線を越えてスローインされる前に、B１が A１に向かっ\n       て境界線を越えて体を動かした。\n       解説：B１にテクニカルファウルが宣せられる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-6", "body": "17-６   例：第 4 クォーター残り 51 秒で、チーム A がスローインを与えられることになっている。スローインを\n       する A１にボールが与えられる前に審判は B１に「イリーガルバウンダリラインクロッシング」のシグナル\n       を行わず、警告を示さなかった。その後ボールが境界線を越えてスローインされる前に、B１が A１\n       に向かって境界線を越えて体を動かした。\n       解説：審判は A１にボールを手渡す前に「イリーガルバウンダリラインクロッシング」のシグナルを示し\n       ていないため、この時点で審判は笛を吹き、B１は警告を与えられる。この警告はチーム B のヘッド\n       コーチにも伝えられ、ゲームの残り時間中、全てのチーム B のチームメンバーによる同様の行為に適\n       用される。同様の行為がチーム B のプレーヤーによって繰り返された場合、テクニカルファウルが宣せ\n       られる。審判は「イリーガルバウンダリラインクロッシング」のシグナルを示し、スローインは再度行われる。\n\n17-７ 条文：スローインをするプレーヤーはボールを（手渡しではなく）パスでコート上のチームメイトに\n       渡さなければならない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-8", "body": "17-８   例：スローインで A１がコート上にいる A２にボールを手渡した。\n       解説：A１のスローインのバイオレーションである。スローインではボールは A１の手を離れなければ\n       ならない。チーム B は元のスローインと同じ場所からスローインを与えられる。\n\n17-９ 条文：スローインの間、ボールがコートに向かってパスされるまで、他のプレーヤーは体のいかなる\n        部分も境界線上を越えてはならない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-10", "body": "17-10   例：規則の違反（ファウルやバイオレーション）のあと、スローインをする A１が審判からボールを受\n        け取った。A１は、\n        ⒜ボールをフロアに置き、その後 A２がそのボールを取った。\n        ⒝ボールをアウトオブバウンズのエリアにいる A２に手渡した。\n        解説：どちらの場合においても、A１が境界線を越えてボールをパスする前に A２の体が境界線を\n        超えており、A２によるバイオレーションである。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-11", "body": "17-11   例：ゲームクロックが動いていて、ボールがライブの状態でのチーム A のゴール、あるいは最後のフリ\n        ースローが成功したあと、チーム B にタイムアウトが認められた。タイムアウトのあと、エンドラインから\n        スローインをする B１は審判からボールを受け取った。B１は、\n        ⒜ボールをフロアに置き、同じくエンドラインの外側にいる B２がボールを取った。\n        ⒝同じくエンドラインの外にいる B２にボールを手渡した。\n        解説：どちらの場合においても、B２の正当なプレーである。ゲームクロックが動いていて、ボールが\n        ライブの状態で成功したゴールもしくは成功した最後のフリースローの後のスローインでは、チーム B\n        のプレーヤーが５秒以内にボールをコートへパスしなければならないことが唯一の制限である。\n\n17-12 条文：第４クォーター、オーバータイムでゲームクロックが２:00あるいはそれ以下を表示していると\n        き、バックコートでボールを与えられることになっているチームにタイムアウトが認められた場合、そのチ\n        ームのヘッドコーチはタイムアウトのあとで、スローインをフロントコートのスローインラインから行うか、\n        バックコートから行うかを選択する権利を持つ。\n        成功したゴールや成功した最後のフリースローに続くタイムアウトの後では、ヘッドコーチはスローイン\n        をスコアラーズテーブル側のスローインラインから行うか、反対側のスローインラインから行うかを選択\n        することができる。\n        ファウルまたはアウトオブバウンズを含むバイオレーションの後のサイドラインまたはエ ン ド ラ イ ン からの\n        スローインでは、元のスローインと同じ側（スコアラーズテーブル側または反対側）のスローインライン\n        から、フロントコートで行う。\n        アンスポーツマンライクファウルやディスクォリファイングファウル、ファイティングに続くタイムアウトの後\n        は、フロントコートのスコアラーズテーブルの反対側のスローインラインからのスローインでゲームが再\n        開される。\n        ヘッドコーチが選択したあと、その選択は最終的なもので変更することはできない。ゲームクロックが\n        再び動き始める前に追加のタイムアウトが認められ、スローインの場所を変更するようにいずれかの\n        ヘッドコーチが更に要求しても、最初の選択は変更することはできない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-13", "body": "17-13   例：第 4 クォーター残り 35 秒で、A１がバックコートでドリブルをしていたとき、チーム B のプレーヤ\n        ーがボールをフリースローラインの延長線上のアウトオブバウンズに弾き出した。タイムアウトがチーム\n        A に認められた。\n        解説：遅くともタイムアウトの後で、クルーチーフはスローインをどこから行うかについてチーム A のヘッ\n        ドコーチの選択を聞く。チーム A のヘッドコーチは大きな声で英語を使って「フロントコート」あるいは\n        「バックコート」と言い、同時に腕でスローインが行われる場所（フロントコートあるいはバックコート）\n        を示す。クルーチーフはチーム B のヘッドコーチにチーム A のヘッドコーチの選択を知らせる。\n        ヘッドコーチがフロントコートを選択した場合、スローインはフロントコートのボールがアウトオブバウンズ\n        に弾かれた側と同じ側のスローインラインから行われる。\n        コート上の両チームのプレーヤーの位置によって、プレーヤーがどこからゲームが再開されるかを理解\n        していることがはっきりとわかる場合のみ、チーム A のスローインからゲームが再開される。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-14", "body": "17-14   例：第 4 クォーター残り 44 秒、ショットクロック残り 17 秒で、A１がバックコートでドリブルをしてい\n        るとき、チーム B のプレーヤーがボールをチーム A のバックコートのテーブルサイドもしくはオ ポ ジ ッ ト\n        サイドのスローインラインのアウトオブバウンズに弾き出した。その後タイムアウトが、\n        ⒜チーム B に認められた。\n        ⒝チーム A に認められた。\n        ⒞最初にチーム B に、すぐ後にチーム A に認められた。（あるいはその反対）\n        解説：\n        ⒜バックコートのボールがアウトオブバウンズに出たスローインラインからチーム A のスローインでゲーム\n         が再開される。チーム A のショットクロックは 17 秒となる。\n        ⒝,⒞チーム A のヘッドコーチがフロントコートからのスローインを選択した場合、ゲームはフロントコー\n          トのボールがアウトオブバウンズに弾かれた側と同じ側のスローインラインからチーム A のスロー\n          インで再開される。ショットクロックは 14 秒となる。バックコートからのスローインを選択した場合、\n          ショットクロックは 17 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-15", "body": "17-15   例：第４クォーター残り 57 秒で、A１は２本のフリースローを与えられた。２本目のフリースローの\n        ときに A１がフリースローラインを踏み、バイオレーションを宣せられた。タイムアウトがチーム B に認め\n        られた。\n        解説：タイムアウトのあと、チーム B のヘッドコーチが、\n        ⒜フロントコートを選択した場合、チーム B のスローインはオポジットサイドのスローインラインから行\n         われ、ショットクロックは 14 秒となる。\n        ⒝バ ッ ク コ ー ト を 選択した場合、チーム B のスローインはオポジットサイドのフリースローラインの延\n         長線上から行われ、ショットクロックは 24 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-16", "body": "17-16   例：第４クォーター残り 26 秒で、A１がバックコートで６秒間ドリブルをしているときに、\n        ⒜B１がボールをアウトオブバウンズに弾き出した。\n        ⒝B１がファウルをし、このクォーター3 個目のチームファウルであった。\n        そしてチーム A にタイムアウトが認められた。\n        解説：タイムアウトの後：\n        どちらの場合においても、チーム A のヘッドコーチがフロントコートのスローインラインからのスローインを\n        選択した場合、ショットクロックは 14 秒となる。\n        フロントコートからのスローインは、ゲームが止められたときにボールがあった側のスローインラインから\n        行われる。\n        チーム A のヘッドコーチがバックコートからのスローインを選択した場合、ショットクロックは、\n        ⒜18 秒となる。\n        ⒝24 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-17", "body": "17-17   例：第４クォーター残り１:24 で、A１がフロントコートでドリブルをしているとき、B１がチーム A の\n        バックコートへボールを弾き出し、チーム A のいずれかのプレーヤーが再びドリブルを始めた。このと\n        き、B２がボールをチーム A のバックコートのテーブルサイドのアウトオブバウンズに弾き出した。ショッ\n        トクロックは、\n        ⒜６秒であった。\n        ⒝17 秒であった。\n        タイムアウトがチーム A に認められた。\n        解説：\n        チーム A のヘッドコーチがフロントコートのスローインラインからのスローインを選択した場合、スローイン\n        はテーブルサイドで行われ、ショットクロックは、\n        ⒜６秒となる。\n        ⒝14 秒となる。\n        チーム A のヘッドコーチがバックコートからのスローインを選択した場合、スローインはボールがアウトオ\n        ブバウンズに出た元の位置から行われ、ショットクロックは、\n        ⒜６秒となる。\n        ⒝17 秒となる。テーブルサイドの"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-18", "body": "17-18   例：第４クォーター残り 48 秒で、A１がフロントコートでドリブルをしているとき、B１がチーム A の\n        バックコートへボールを弾き出し、A２が再びドリブルを始めた。このとき、B２は A２にテーブルサイドで\n        ファウルをし、このクォーター3 個目のチームファウルであった。ショットクロックは、\n        ⒜６秒であった。\n        ⒜17 秒であった。\n\nタイムアウトがチーム A に認められた。\n        解説：どちらの場合においても、タイムアウトの後、チーム A のヘッドコーチがフロントコートのスローイ\n        ンラインからのスローインを選択した場合、スローインはテーブルサイドから行われ、ショットクロックは\n        14 秒となる。バックコートからのスローインを選択した場合、ショットクロックは 24 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-19", "body": "17-19   例：第４クォーター残り１:32 で、チーム A が５秒間ボールをコントロールしていたとき、チーム A\n        のバックコートで A１と B１が互いに殴り合い、失格・退場となった。スローインが行われる前にタイ\n        ムアウトがチーム A に認められた。\n        解説：ディスクォリファイングファウルの罰則は互いに相殺される。ゲームはバックコートからチーム A\n        のスローインで再開される。ただし、タイムアウトのあと、チーム A のヘッドコーチがフロントコートのスロ\n        ーインラインからのスローインを選択した場合、ショットクロックは 14 秒となる。バックコートからのスロ\n        ーインを選択した場合、ショットクロックは 19 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-20", "body": "17-20   例：第 4 クォーター残り１:29、ショットクロック残り 19 秒で、チーム A がフロントコートでボールを\n        コントロールしていたとき、暴力行為の最中にコートに入ったことで A６と B６が失格・退場となっ\n        た。タイムアウトがチーム A に認められた。\n        解説：ディスクォリファイングファウルの罰則は互いに相殺される。タイムアウトのあと、ゲームはフロン\n        トコートの暴力行為が始まったときにボールがあった場所に最も近いアウトオブバウンズからチーム A\n        のスローインで再開される。ショットクロックは 19 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-21", "body": "17-21   例：第 4 クォーター残り１:18 で、チーム A はバックコートからのスローインを与えられた。このときタ\n        イムアウトがチーム A に認められた。タイムアウトのあと、チーム A のヘッドコーチはフロントコートのス\n        ローインラインからのスローインを選択した。スローインが行われる前に、チーム B のヘッドコーチがタイ\n        ムアウトを請求した。\n        解説：フロントコートからスローインを行うというチーム A のヘッドコーチの選択は最終的なものでゲ\n        ームクロックが再び動き始めるまでは変更することはできない。これは最初のタイムアウトのあと、チー\n        ム A のヘッドコーチが続けてタイムアウトを請求した場合でも有効である。\n\n17-22 条文：第１クォーター以外の全てのクォーターと全ての各オーバータイムを開始するとき、スコアラー\n        ズテーブルの反対側のセンターラインの延長線上からスローインが行われる。スローインをするプレー\n        ヤーは、センターラインをまたいでそれぞれのサイドに片足ずつ置かなければならない。スローインをす\n        るプレーヤーにバイオレーションが宣せられた場合、センターラインの延長線上から相手チームにスロ\n        ーインが与えられる。\n        ただし、ファウルやバイオレーションが直接コートのセンターライン上で宣せられた場合、センターライン\n        に最も近いフロントコートからスローインが行われる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-23", "body": "17-23   例：第２クォーターを開始するとき、センターラインの延長線上でスローインを行う A１が、バイオレ\n        ーションを宣せられた。\n        解説：ゲームはセンターラインの延長線上の最初のスローインの位置からチーム B のスローインで\n        再開され、ゲームクロックは 10:00、ショットクロックは 24 秒となる。スローインを行うプレーヤーはコ\n        ート上のどの位置にいるチームメイトにもパスをすることができる。オルタネイティングポゼッションアロー\n        は逆向きになりチーム B を示す。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-24", "body": "17-24   例：第３クォーターを開始するとき、センターラインの延長線上でスローインを行う A１がパスをし、\n        A２が触れたボールがチーム A の次の位置でアウトオブバウンズに出た。\n        ⒜フロントコート\n        ⒝バックコート\n        解説：ゲームは、\n        ⒜バックコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチーム B の\n         スローインで再開される。ショットクロックは 24 秒となる。\n        ⒝フロントコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチーム B\n         のスローインで再開される。ショットクロックは 14 秒となる。\n        チーム A のスローインは A２がボールに触れたときに終わる。オルタネイティングポゼッションアローは\n        逆向きになりチーム B を示す。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-25", "body": "17-25   例：以下の違反がコート上のセンターラインで起きた。\n        ⒜A１がボールをアウトオブバウンズにした。\n        ⒝A１がチームコントロールファウルを宣せられた。\n        ⒞A１がトラベリングを宣せられた。\n        解説：全ての場合において、ゲームはフロントコートのセンターラインに最も近いアウトオブバウンズ\n        からチーム B のスローインで再開される。ショットクロックは 14 秒となる。\n\n17-26 条文：アンスポーツマンライクファウルあるいはディスクォリファイングファウルの後のスローインは、い\n        つでもフロントコートのスローインラインから行われる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-27", "body": "17-27   例：第１クォーターと第２クォーターの間のプレーのインターバル中に、A１は B１にアンスポーツマ\n        ンライクファウルをした。\n        解説：第 2 クォーターの開始前に、誰もリバウンドの位置に着かずに 2 本のフリースローが B１に\n        与えられる。ゲームはフロントコートのスローインラインからチーム B のスローインで再開される。ショッ\n        トクロックは 14 秒となる。オルタネイティングポゼッションアローは逆向きにならない。\n\n17-28 条文：スローインのときには、次の状況が起こり得る。\n        ⒜ボールがバスケットの上を通過し、どちらかのチームのプレーヤーがバスケットの下から手を伸ばし\n         てボールに触れる。これはインタフェアレンスのバイオレーションである。\n        ⒝ボールがリングとバックボードの間に挟まる。これはジャンプボールシチュエーションである。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-29", "body": "17-29   例：スローインで、A１がバスケットの上を通過するようにボールをパスしたとき、どちらかのチームのプ\n        レーヤーがバスケットの下から手を伸ばしてボールに触れた。\n        解説：インタフェアレンスのバイオレーションである。ゲームは相手チームのフリースローラインの延長\n        線上からのスローインで再開される。ディフェンスのチームがバイオレーションをした場合、ボールはアウ\n        トオブバウンズから放たれているため、オフェンスのチームに得点は与えられない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-30", "body": "17-30   例：スローインを行う A１がチーム B のバスケットに向かってパスしたボールが、リングとバックボード\n        の間に挟まった。\n        解説：これはジャンプボールシチュエーションである。オルタネイティングポゼッションの手続きを適用し\n        てゲームが再開される。\n        ・チーム A にスローインが与えられることになっていた場合、ゲームはチーム A のフロントコートのバック\n        ボードの真後ろを除いたバックボード横のエンドラインから、チーム A のスローインで再開される。ショ\n        ットクロックは 14 秒となる。\n        ・チーム B にスローインが与えられることになっていた場合、ゲームはチーム B のバックコートのバックボ\n        ードの真後ろを除いたバックボード横のエンドラインから、チーム B のスローインで再開される。ショッ\n        トクロックは 24 秒となる。\n\n17-31 条文：スローインを行うプレーヤーは、ボールを与えられた後にコートの内側にボールを弾ませて、\n        ボールがコート上で他のプレーヤーに触れる前に再びボールに触れることはできない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-32", "body": "17-32   例：スローインを行う A１は、ボールを次の場所にバウンドさせた。\n        ⒜コートの内側\n        ⒝コートの外側\n        そして A１はボールを再びキャッチした。\n        解説：\n        ⒜A１のスローインのバイオレーションである。ボールが A１の手を離れ、ボールがコートの内側に触\n         れたあと、ボールがコート上で他のプレーヤーに触れる前に A１はボールに触れてはならない。\n        ⒝A１がボールを弾ませてからキャッチするまでの間に合計１メートル以上動いていない場合、A１\n         のこの行為は正当である。５秒ルールは継続してカウントされる。\n\n17-33 条文：スローインをするプレーヤーは、スローインとしてボールが手から離れた後に、ボールをコート\n        の外側に触れさせてはいけない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-34", "body": "17-34   例：スローインをする A１は、\n        ⒜フロントコートから\n        ⒝バックコートから\n        コート上の A２にボールをパスした。ボールはコート上のどのプレーヤーにも触れずにアウトオブバウン\n        ズに出た。\n        解説：A１のスローインのバイオレーションである。ゲームは、\n        ⒜バックコートの元のスローインと同じ場所からチーム B のスローインで再開され、ショットクロックは\n         24 秒となる。\n        ⒝フロントコートの元のスローインと同じ場所からチーム B のスローインで再開され、ショットクロックは\n         14 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-35", "body": "17-35   例：スローインをする A１は A２にボールをパスした。A２は片足が境界線に触れた状態でボール\n        をキャッチした。\n        解説：A２のアウトオブバウンズのバイオレーションである。ゲームは A２が境界線に触れた場所に\n        最も近いアウトオブバウンズからチーム B のスローインで再開される。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-36", "body": "17-36   例：スローインをする A１は、\n        ⒜センターライン近くのバックコートのサイドラインからスローインを与えられ、ボールをコート内のどこへ\n         でもパスをすることができ、\n        ⒝センターライン近くのフロントコートのサイドラインからスローインを与えられ、ボールをフロントコート\n         へのみパスすることができ、\n        ⒞クォーターあるいは各オーバータイムの開始時にスコアラーズテーブルの反対側のセンターラインの\n         延長線上からスローインを与えられ、ボールをコート内のどこへでもパスすることができ、\n        ボールを手に持ちながら、横方向に普通に 1 歩動き、フロントコートあるいはバックコートに位置を\n        変えた。\n        解説：全ての場合において、A１の正当なプレーである。A１は最初のスローインの位置にいるも\n        のとして、最初の位置で認められていたフロントコートあるいはバックコートにボールをパスする権利が\n        ある。\n\n17-37 条文：ゲームクロックが動いていて、ボールがライブの状態で成功したゴールもしくは成功した最後\n        のフリースローに続いてエンドラインからスローインを行うプレーヤーは、エンドラインと平行にあるいは\n        （加えて）後方に動くことができ、エンドラインの外側にいるチームメイトとボールをパスすることがで\n        きるが、スローインに要する時間が5秒を超えてはならない。これは不当にスローインを妨げたことで\n        ディフェンスのチームがバイオレーションを宣せられ、いずれかのチームによってタイムアウトが認められ\n        たあと、またはスローインが再度行われるときも適用される。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-38", "body": "17-38   例：第 2 クォーターでゲームクロックが動いている状態で成功した相手チームのゴール、あるいは相\n        手チームの最後のフリースローが成功したあと、A１はエンドラインでスローインのボールを持っている。\n        ⒜ボールがスローインされる前に、B２は境界線を越えて手を動かした。\n        ⒝A１が同じくエンドラインの外にいる A２にボールをパスした。B２は境界線を越えて手を動かし、\n         パスのボールに触れた。\n        解説：B２はゲームの遅延行為（ディレイオブゲーム）の警告を与えられる。その旨はチーム B の\n        ヘッドコーチにも伝えられる。この警告はゲームの残り時間中、チーム B の全てのプレーヤーに適用\n        される。同様の行為がチーム B のプレーヤーによって繰り返された場合、テクニカルファウルが宣せら\n        れる。チーム A のいずれのプレーヤーもボールを手放す前にエンドラインに沿って動く、あるいはエンド\n        ラインの外でチームメイトにパスする権利が継続する。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-39", "body": "17-39   例：相手チームのゴールが成功したあと、A１がエンドラインでスローインのボールを持った。ボール\n        がコート上へスローインされたあと、B２がエンドラインの近くでボールを蹴った。\n        解説：B２のキックボールのバイオレーションである。ゲームはバックボードの真後ろを除いたエンドラ\n        インからチーム A のスローインで再開される。スローインの後の B２のキックボールのバイオレーション\n        であるため、チーム A のスローインを行うプレーヤーはコート上へボールを手放す前に、指定されたス\n        ローインの位置からエンドラインに沿って移動する権利を持たない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-40", "body": "17-40   例：相手チームのゴールが成功したあと、A１がエンドラインでスローインのボールを持った。A２は\n        エンドラインの外側のアウトオブバウンズからジャンプして、空中にいる間に A１のスローインのボール\n        をキャッチした。そのあと、\n        ⒜A２がまだエンドラインの外側のアウトオブバウンズにいる A１にボールをパスした。\n        ⒝A２がコート上にいる A３にボールをパスした。\n        ⒞A２がエンドラインの外側のアウトオブバウンズに着地した。\n        ⒟A２がコート上に着地した。\n        ⒠A２がコート上に着地し、まだエンドラインの外側のアウトオブバウンズにいる A１にボールをパスした。\n        解説：\n        ⒜,⒝,⒞チーム A の正当なプレーである。\n        ⒟,⒠   A２のスローインのバイオレーションである。\n\n17-41 条文：テクニカルファウルによるフリースローの後は、ジャンプボールシチュエーションあるいは第１クォ\n        ーターの開始前を除いて、テクニカルファウルが宣せられたときにボールがあった場所に最も近いアウ\n        トオブバウンズからのスローインでゲームが再開される。\n        ディフェンスのチームがテクニカルファウルを宣せられ、スローインがバックコートで行われる場合、オフ\n        ェンスのチームのショットクロックは24秒となる。スローインがフロントコートで行われる場合、ショット\n        クロックは次のようになる。\n\n・14秒以上が表示されている場合、ショットクロックは継続となる。\n        ・13秒以下が表示されている場合、ショットクロックは14秒となる。\n        オフェンスのチームがテクニカルファウルを宣せられた場合、スローインがバックコートで行われるかフ\n        ロントコートで行われるかにかかわらず、ショットクロックは継続となる。\n        ゲームクロックが再び動き始める前にタイムアウトとテクニカルファウルが宣せられた場合、先にタイ\n        ムアウトが認められ、そのあとテクニカルファウルの罰則を行う。\n        アンスポーツマンライクファウルやディスクォリファイングファウルによるフリースローのあとは、ゲームはフロント\n        コートのスローインラインからのスローインで再開され、ショットクロックは14秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-42", "body": "17-42   例：A２が、\n        ⒜バックコートでドリブルをしているとき\n        ⒝フロントコートでドリブルをしているとき\n        A１がテクニカルファウルを宣せられた。\n        解説：誰もリバウンドの位置に着かずに 1 本のフリースローがチーム B のいずれかのプレーヤーに与\n        えられる。どちらの場合においても、ゲームはテクニカルファウルが宣せられたときにボールがあった場\n        所に最も近いアウトオブバウンズからチーム A のスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-43", "body": "17-43   例：A２が、\n        ⒜バックコートでドリブルをしているとき\n        ⒝フロントコートでドリブルをしているとき\n        B１がテクニカルファウルを宣せられた。\n        解説：誰もリバウンドの位置に着かずに 1 本のフリースローがチーム A のいずれかのプレーヤーに与\n        えられる。ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバ\n        ウンズからチーム A のスローインで再開される。スローインの位置が、\n        ⒜バックコートの場合、ショットクロックは 24 秒となる。\n        ⒝フロントコートの場合、ショットクロックに 14 秒以上が表示されていればショットクロックは継続とな\n         る。ショットクロックに 13 秒以下が表示されていればショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-44", "body": "17-44   例：第 4 クォーター残り１:47 で、A１はフロントコートでドリブルをしていて、テクニカルファウルを宣\n        せられた。タイムアウトがチーム A に認められた。\n        解説：タイムアウトの後、誰もリバウンドの位置に着かずに 1 本のフリースローがチーム B のいずれ\n        かのプレーヤーに与えられる。ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最\n        も近いアウトオブバウンズからチーム A のスローインで再開される。ショットクロックは継続となる。\n\n17-45 条文：第4クォーター、各オーバータイムでゲームクロックが２:00あるいはそれ以下を表示している\n        とき、オフェンスのチームがテクニカルファウルを宣せられた。タイムアウトがそのチームに認められ、スロ\n        ーインがバックコートから行われる場合、ショットクロックは継続となる。スローインがフロントコートから\n\n行われる場合、ショットクロックは次のようになる。\n        ・ショットクロックに14秒以上が表示されている場合、ショットクロックは14秒となる。\n        ・ショットクロックに13秒以下が表示されている場合、ショットクロックは継続となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-46", "body": "17-46   例：第 4 クォーター残り 1:45 で、A１はバックコートでドリブルをしていて、テクニカルファウルを宣せ\n        られた。タイムアウトがチーム A に認められた。\n        解説：遅くともタイムアウトの後で、チーム A のヘッドコーチはクルーチーフにスローインの位置（フロ\n        ントコートあるいはバックコート）を知らせる。タイムアウトのあと、誰もリバウンドの位置に着かずに 1\n        本のフリースローがチーム B のいずれかのプレーヤーに与えられる。ゲームはチーム A のヘッドコーチ\n        の選択に応じてチーム A のスローインで再開される。\n        チーム A のヘッドコーチがフロントコートのスローインラインからのスローインを選択し、ショットクロックに\n        14 秒以上が表示されている場合、ショットクロックは 14 秒となる。ショットクロックに 13 秒以下が\n        表示されている場合、ショットクロックは継続となる。\n        チーム A のヘッドコーチがバックコートからのスローインを選択した場合、ショットクロックは継続となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-47", "body": "17-47   例：第 4 クォーター残り 1:43 で、A１はバックコートでドリブルをしていて、テクニカルファウルを宣せ\n        られた。誰もリバウンドの位置に着かずに 1 本のフリースローがチーム B のいずれかのプレーヤーに与\n        えられた。タイムアウトがチーム A に認められた。\n        解説：遅くともタイムアウトの後で、チーム A のヘッドコーチはクルーチーフにスローインの位置（フロ\n        ントコートあるいはバックコート）を知らせる。ゲームはチーム A のヘッドコーチの選択に応じてチーム\n        A のスローインで再開される。\n        チーム A のヘッドコーチがフロントコートのスローインラインからのスローインを選択し、ショットクロックに\n        14 秒以上が表示されている場合、ショットクロックは 14 秒となる。ショットクロックに 13 秒以下が\n        表示されている場合、ショットクロックは継続となる。\n        チーム A のヘッドコーチがバックコートからのスローインを選択した場合、ショットクロックは継続となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-48", "body": "17-48   例：第 4 クォーター残り 1:41 で、A１はバックコートでドリブルをしているとき、B１がボールをアウト\n        オブバウンズに弾き出した。タイムアウトがチーム A に認められた。その直後に A１はテクニカルファウ\n        ルを宣せられた。\n        解説：遅くともタイムアウトの後で、チーム A のヘッドコーチはクルーチーフにスローインの位置（フロ\n        ントコートあるいはバックコート）を知らせる。誰もリバウンドの位置に着かずに 1 本のフリースローが\n        チーム B のいずれかのプレーヤーに与えられる。ゲームはチーム A のヘッドコーチの選択に応じてチー\n        ム A のスローインで再開される。\n        チーム A のヘッドコーチがフロントコートのスローインラインからのスローインを選択し、ショットクロックに\n        14 秒以上が表示されている場合、ショットクロックは 14 秒となる。ショットクロックに 13 秒以下が\n\n表示されている場合、ショットクロックは継続となる。\n        チーム A のヘッドコーチがバックコートからのスローインを選択した場合、ショットクロックは継続となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-49", "body": "17-49   例：第 4 クォーター残り 58 秒、ショットクロック残り 19 秒、A１のバックコートで、\n        ⒜B１が意図的にボールを蹴った。\n        ⒝B１が A１にファウルをし、このクォーター3 個目のチームファウルであった。\n        ⒞B１がボールをアウトオブバウンズに弾き出した。\n        タイムアウトがチーム A に認められた。\n        解説：チーム A のヘッドコーチは、ゲームをフロントコートのスローインラインからのスローインで再開\n        するか、バックコートからのスローインで再開するかを選択する。\n        全ての場合において、フロントコートのスローインラインからのスローインで再開する場合、ショットクロ\n        ックは 14 秒となる。\n        ⒜,⒝バックコートからのスローインで再開する場合、ショットクロックは 24 秒となる。\n        ⒞バックコートからのスローインで再開する場合、ショットクロックは 19 秒となる。\n\n17-50 条文：ボールがバスケットに入ったにもかかわらず、ゲームクロックが動いていて、ボールがライブの状\n        態でのゴールや最後のフリースローが認められないとき、ゲームはフリースローラインの延長線上から\n        のスローインで再開される。\n        最後のフリースローがフリースローシ ュ ー タ ー の バイオレーションによって無効となった場合、スローイ\n        ンはスコアラーズテーブルの反対側のフリースローラインの延長線上から行われる。\n        ゲームクロックが動いている状態でのゴールが無効となった場合、スローインは無効となったショットが\n        放たれた側のフリースローラインの延長線上から行われる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-51", "body": "17-51   例：ショットの動作（アクトオブシューティング）中の A１がトラベリングのバイオレーションをし、その\n        後ボールはバスケットに入った。\n        解説：A１のゴールは認められない。チーム B はバックコートのトラベリングのバイオレーションが起き\n        た側のフリースローラインの延長線上からスローインを与えられる。ショットクロックは 24 秒となる。"}, {"type": "impl", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ", "sec_no": "17-52", "body": "17-52   例：A１がショットをした。ボールが下降しているとき、A２がボールに触れ、ボールはバスケットに入った。\n        解説：A１のゴールは認められない。チーム B はバックコートの A2 が不当にボールに触 れ た 側 の\n        フリースローラインの延長線上からスローインを与えられる。ショットクロックは 24 秒となる。\n\n第 18/19 条 タイムアウト/交代\n――――――――――――――――――――――――――――――――――――――――――\n18/19-１   条文：タイムアウトは、各クォーターやオーバータイムの開始前と終了後には認められない。\n          交代は、第１クォーターの開始前とゲームの終了後には認められない。各クォーターやオーバ\n          ータイムの間のプレーのインターバル中の交代は認められる。\n\n18/19-２   例：ゲーム開始のジャンプボールでボールがクルーチーフの手を離れたあと正当にタップされる\n          前に、ジャンパーの A２がバイオレーションを宣せられ、チーム B にスローインのボールが与えら\n          れた。このときどちらかのチームがタイムアウトまたは交代を請求した。\n          解説：ゲームはすでに開始しているが、ゲームクロックがまだ動き始めていないため、タイムアウ\n          トも交代も認められない。\n\n18/19-３   条文：ショットで、ボールが空中にある間にショットクロックのブザーが鳴ったとしても、バイオレ\n          ーションではなくゲームクロックは止めない。ショットが成功し、ある特定の状況下では、両チー\n          ムにタイムアウトと交代が認められる。\n\n18/19-４   例：ショットで、ボールが空中にある間にショットクロックのブザーが鳴った。その後ボールはバス\n          ケットに入った。このとき、いずれかあるいは両チームが、\n          ⒜タイムアウトを請求した。\n          ⒝交代を請求した。「\n          解説：\n          ⒜得点をされたチームにのみタイムアウトが認められる。\n           得点をされたチームにタイムアウトが認められた場合は、請求があれば相手チームにもタイ\n           ムアウトが認められ、両チームとも交代を認められる。\n          ⒝第４クォーター、オーバータイムでゲームクロックが残り２:00 あるいはそれ以下を表示して\n           いるとき、得点をされたチームにのみ交代が認められる。得点をされたチームに交代が認め\n           られた場合は、請求があれば相手チームにも交代が認められ、両チームともタイムアウトも\n           認められる。\n\n18/19-５   条文：第18条と第19条はタイムアウトや交代が認められる時機の始まりと終わりについて\n          規定している。最初のフリースローのボールがフリースローシューターに与えられたあと、タイムア\n          ウトあるいは交代（フリースローシューターを含む全てのプレーヤー）の請求があった場合、以\n          下のときにのみタイムアウトあるいは交代が両チームに認められる。\n          ⒜最後のフリースローが成功したとき。あるいは、\n          ⒝最後のフリースローのあと、スローインが続くとき。あるいは、\n          ⒞何らかの理由で最後のフリースローの後にボールが引き続きデッドのとき。\n          同じファウルの罰則による2本もしくは3本のフリースローのうち、最初のフリースローのボールが\n          フリースローシューターに与えられた後は、最後のフリースローの後でボールがデッドになるまで\n\nはタイムアウトや交代は認められない。\n          それらのフリースローの間にテクニカルファウルが宣せられたとき、誰もリバウンドの位置に着かず\n          に速やかにフリースローを行う。テクニカルファウルの罰則のフリースローを行うために交代要員\n          がプレーヤーとなることを除いては、このフリースローの前後ではどちらのチームにもタイムアウト\n          や交代は認められない。テクニカルファウルの罰則のフリースローを行うために交代要員がプレ\n          ーヤーとなる場合、相手チームも必要に応じてプレーヤーのうち1人を交代することができる。\n\n18/19-６   例：A１は２本のフリースローを与えられた。以下のとき、チーム A またはチーム B がタイムア\n          ウトあるいは交代を請求した。\n          ⒜ボールがフリースローシューターの A１に与えられる前。\n          ⒝１本目のフリースローを打ったあと。\n          ⒞２本目のフリースローが成功したあと、スローインをするチーム B のプレーヤーがコートの外側\n           でボールを持つ前。\n          ⒟２本目のフリースローが成功し、かつスローインをするチーム B のプレーヤーがコートの外側\n           でボールを持ったあと。\n          解説：\n          ⒜１本目のフリースローが行われる前に、タイムアウトあるいは交代が速やかに認められる。\n          ⒝成功した場合でも、１本目のフリースローの後にはタイムアウトあるいは交代は認められない。\n          ⒞スローインが行われる前に、タイムアウトあるいは交代が速やかに認められる。\n          ⒟タイムアウトあるいは交代は認められない。\n\n18/19-７   例：A１は２本のフリースローを与えられた。最初のフリースローを行ったあと、いずれかのチー\n          ムがタイムアウトあるいは交代を請求した。最後のフリースローのとき、\n          ⒜ボールがリングから跳ね返り、ゲームが続行した。\n          ⒝フリースローが成功した。\n          ⒞ボールがリングに触れなかった。\n          ⒟ショットを打つ際に A１がフリースローラインを踏み、バイオレーションが宣せられた。\n          ⒠A１の手からボールが離れる前に B１が制限区域の中へ踏み込んだ。A１のフリースロー\n           は成功せず、B１のバイオレーションが宣せられた。\n          解説：\n          ⒜タイムアウトあるいは交代は認められない。\n          ⒝,⒞,⒟タイムアウトあるいは交代が速やかに認められる。\n          ⒠A１によってフリースローがやり直され、成功した場合は、タイムアウトあるいは交代が速やか\n           に認められる。\n\n18/19-８    例：交代が認められる時機がちょうど終わるときに、交代要員の A６がスコアラーズテーブルに\n           走り、大きな声で交代を申し出た。タイマー（国内大会ではスコアラー）が反応し誤ってブザ\n           ーを鳴らした。審判は笛を吹き、ゲームを止めた。\n           解説：審判がゲームを止めたことにより、ボールはデッドになりゲームクロックは止められたまま\n           になるので、通常は交代が認められる時機になる。しかしながら請求は遅すぎたので、交代は\n           認められない。ゲームは速やかに再開される。\n           【補足】この場合、交代の請求が遅すぎたため、両チームともに交代もタイムアウトも認められ\n               ない。またコーチのタイムアウトの請求が遅すぎたにもかかわらず、タイマー（国内大\n               会ではスコアラー）が誤ってブザーを鳴らした場合も同様に、両チームともに交代もタ\n               イムアウトも認められない。\n           【補足】ただし、第 4 クォーター、各オーバータイムでゲームクロックが 2：00 あるいはそれ以下\n               を表示しているときを除いて、審判やテーブルオフィシャルズの不注意（本条項のケー\n               スを除く）、会場備品や施設等の不具合、コート内に物などが入ったとき、またはボ\n               ールが遠くに転がったとき、モップなどコートの整備をやむなく入れるときなど、競技規則\n               で想定されていない状況でも審判が笛を鳴らしてゲームを止めた場合には、原則、タ\n               イムアウトや交代は認められる。\n\n18/19-９    例：ゲーム中にゴールテンディングあるいはインタフェアレンスのバイオレーションが起きた。どちら\n           かのコーチがタイムアウトを請求している、あるいはどちらかのチームが交代を申し出ている。\n           解説：バイオレーションによってゲームクロックは止められ、ボールはデッドになっている。タイムア\n           ウトあるいは交代は認められる。\n\n18/19-10   例：B１が A１のツーポイントゴールにファウルをし、ショットは成功しなかった。A１の 2 本のフ\n           リースローのうち、最初のフリースローのあと、A２がテクニカルファウルを宣せられた。ここでどちら\n           かのチームがタイムアウトを請求した、あるいは交代を申し出た。\n           解説：誰もリバウンドの位置に着かずに 1 本のフリースローがチーム B のいずれかのプレーヤ\n           ーに与えられる。フリースローを行うためにチーム B の交代要員がプレーヤーとなる場合、チー\n           ム A も必要に応じてプレーヤーのうち 1 人を交代することができる。プレーヤーとなったチーム B\n           の交代要員がフリースローを行う場合、あるいはチーム A もプレーヤーのうち 1 人を交代した\n           場合、それらのプレーヤーはゲームクロックが動いたあと再び交代が認められる時機になるまで\n           は、交代することはできない。チーム B のいずれかのプレーヤーが A２のテクニカルファウルのフリ\n           ースローを行ったあと、A１は 2 本目のフリースローを行う。ゲームは通常の最後のフリースロー\n           の後と同様に再開される。フリースローが成功し、タイムアウトあるいは更なる交代（ゲームク\n           ロックが止められた後で一度交代したプレーヤーや交代要員を除く）の請求があった場合は、\n           どちらのチームにも認められる。\n\n18/19-11   例：B１が A１のツーポイントゴールにファウルをし、ショットは成功しなかった。A１の 2 本のフ\n           リースローのうち、最初のフリースローのあと、A２がテクニカルファウルを宣せられた。誰もリバウ\n           ンドの位置に着かずに 1 本のフリースローがチーム B のいずれかのプレーヤーに与えられた。こ\n           こでどちらかのチームがタイムアウトを請求した、あるいは交代を申し出た。\n           解説：交代、タイムアウトともに請求は認められない。A１が２本目のフリースローを与えられ\n           たあと、ゲームは通常の最後のフリースローの後と同様に再開される。フリースローが成功し、タ\n           イムアウトあるいは更なる交代（ゲームクロックが止められた後で一度交代したプレーヤーや\n           交代要員を除く）の請求があった場合は、どちらのチームにも認められる。\n\n18/19-12   例：B１が A１のツーポイントゴールにファウルをし、ショットは成功しなかった。A１の 2 本のフ\n           リースローのうち、最初のフリースローのあと、A２がテクニカルファウルを宣せられた。これは A２\n           の 5 個目のファウルであった。ここでどちらかのチームがタイムアウトを請求した、あるいは交代を\n           申し出た。\n           解説：A２は速やかに交代となる。誰もリバウンドの位置に着かずに 1 本のフリースローがチ\n           ーム B のいずれかのプレーヤーに与えられる。フリースローを行うためにチーム B の交代要員が\n           プレーヤーとなる場合、チーム A も必要に応じてプレーヤーのうち 1 人を交代することができ\n           る。プレーヤーとなったチーム B の交代要員がフリースローを行う場合、あるいはチーム A もプ\n           レーヤーのうち 1 人を交代した場合、それらのプレーヤーはゲームクロックが動いたあと再び交\n           代が認められる時機になるまでは、交代することはできない。チーム B のいずれかのプレーヤー\n           が A２のテクニカルファウルのフリースローを行ったあと、A１は 2 本目のフリースローを行う。ゲ\n           ームは通常の最後のフリースローの後と同様に再開される。フリースローが成功し、タイムアウト\n           あるいは更なる交代（ゲームクロックが止められた後で一度交代したプレーヤーや交代要員\n           を除く）の請求があった場合は、どちらのチームにも認められる。\n\n18/19-13   例：ドリブルをしている A１がテクニカルファウルを宣せられた。フリースローを行うために B６が\n           交代を申し出た。\n           解説：どちらのチームにも交代が認められる時機である。プレーヤーとなったあと、B６は誰もリ\n           バウンドの位置に着かずに 1 本のフリースローを行うことができるが、ゲームクロックが動いたあと\n           再び交代が認められる時機になるまでは、交代要員となることはできない。\n\n18/19-14 条文：プレーヤーとなった交代要員は、ゲームクロックが動いたあと再び交代が認められる時\n           機になるまでは、交代することはできない。\n           【補足】交代要員となったプレーヤーについても同様とする。\n\n18/19-15   例：B１は B６と交代した。ゲームクロックが動き始める前に、B６はファウルを宣せられた。こ\n           れは B６の\n           ⒜３個目\n\n⒝５個目\n           のファウルであった。\n           解説：\n           ⒜B６はゲームクロックが動いたあと再び交代が認められる時機になるまでは、交代することは\n            できない。\n           ⒝B６は交代しなければならない。\n\n18/19-16 条文：タイムアウトの請求のあと、どちらかのチームがファウルを宣せられた場合、審判がスコア\n           ラーズテーブルとのそのファウルに関する全てのコミュニケーションを完了するまでタイムアウトは\n           始まらない。そのファウルがプレーヤーの５個目のファウルであった場合、このコミュニケーション\n           には必要な交代の手順を含む。全てのコミュニケーションが完了したあとで審判が笛を吹いて\n           タイムアウトのシグナルを示したとき、タイムアウトは始まる。\n\n18/19-17   例：ゲーム中、チーム A のヘッドコーチがタイムアウトを請求し、そのあと、\n           ⒜B1 が 5 個目のファウルを宣せられた。\n           ⒝いずれかのチームのプレーヤーがファウルを宣せられた。\n           解説：\n           ⒜では、スコアラーズテーブルとの全てのコミュニケーションを完了し、B１に代わる交代要員が\n            プレーヤーとなるまでタイムアウトは始まらない。\n           どちらの場合においても、タイムアウトが正式に始まっていなくても、プレーヤーはチームベンチに\n           向かうことを許される。\n\n18/19-18 条文：それぞれタイムアウトは１分間である。両チームは、審判が笛を吹きコートに招き入れ\n           たあと、速やかにコートに戻らなければならない。チームが１分間を超えてタイムアウトを引き\n           伸ばすことは、アドバンテージになるとともにゲームの遅延も引き起こしている。審判によってそ\n           のチームのヘッドコーチには警告が与えられる。そのヘッドコーチが警告に対応しない場合、追\n           加のタイムアウトが宣せられる。そのチームにタイムアウトが残っていない場合、ヘッドコーチにゲ\n           ームの遅延行為（ディレイオブゲーム）によるテクニカルファウルが宣せられ、スコアシートに\n           「B1」と記入される。\n           ハーフタイムのあと、チームが時間通りにコートに戻らなかったとき、そのチームにタイムアウトが\n           宣せられる。この場合に宣せられたタイムアウトは１分間与えられることはなく、ゲームは速や\n           かに再開される。\n           【補足】「この場合」とは、ハーフタイムのあとチームが時間通りにコートに戻らなかったときを指す。\n\n18/19-19   例：タイムアウトが終わり、審判がチーム A をコート上に戻るように招き入れた。チーム A のヘ\n           ッドコーチはチームベンチエリアに残っている自チームに指示を与え続けた。審判はチーム A を\n           再びコート上に招き入れ、\n\n⒜チーム A はようやくコートに入った。\n           ⒝チーム A はチームベンチエリアに残り続けた。\n           解説：\n           ⒜チーム A がコート上へ戻り始めたあと、審判はチーム A のヘッドコーチに同様の振る舞いが\n            繰り返される場合は追加のタイムアウトを宣せられる旨の警告を与える。\n           ⒝警告なくチーム A はタイムアウトを宣せられる。このタイムアウトは 1 分間とする。チーム A に\n            タイムアウトが残っていない場合、チーム A のヘッドコーチはゲームの遅延行為（ディレイオ\n            ブゲーム）によるテクニカルファウルを宣せられ、スコアシート上に「B１」と記入される。\n\n18/19-20   例：ハーフタイムのインターバルのあと、チーム A が控室から戻ってこないため、第３クォーター\n           の開始が遅れた。\n           解説：チーム A が最終的にコートに戻ったあと、警告なくチーム A はタイムアウトを宣せられ\n           る。このタイムアウトは 1 分間とせず、ゲームは速やかに再開される。\n\n18/19-21 条文：第４クォーターでゲームクロックが残り２:00を示すまでに、チームが後半に１回もタイ\n           ムアウトを認められていない場合、スコアラーはスコアシート上のそのチームの後半の最初の枠\n           に２本の横線を引く。スコアボード上では最初のタイムアウトは使われたものとして表示する。\n\n18/19-22   例：第４クォーターでゲームクロックに２:00 が表示された時点で、両チームとも後半に１回\n           もタイムアウトを使っていなかった。\n           解説：スコアラーはスコアシート上の両チームの後半の最初の枠に２本の横線を引く。スコア\n           ボード上では１回目のタイムアウトは使われたものとして表示する。\n\n18/19-23   例：第 4 クォーターでゲームクロックに 2:09 が表示されているとき、プレーが行われている最\n           中にチーム A のヘッドコーチが後半 1 回目のタイムアウトを請求した。ゲームクロックに 1:58\n           が表示されているとき、ボールがアウトオブバウンズに出てゲームクロックが止められた。タイムア\n           ウトがチーム A に認められた。\n           解説：スコアラーは、第４クォーターでゲームクロックに２:00 が表示される前にタイムアウトが\n           認められなかったとして、スコアシート上のチーム A の後半最初の枠に２本の横線を引く。タイ\n           ムアウトが１:58 に認められたとき、このタイムアウトはチーム A の２つ目の枠に記録されると\n           ともに、チーム A には１回のタイムアウトのみが残る。タイムアウトのあと、スコアボード上では２\n           回のタイムアウトが使われたものとして表示する。\n\n18/19-24 条文：タイムアウトが請求されたときはいつでも、テクニカルファウルやアンスポーツマンライクファ\n           ウル、ディスクォリファイングファウルが宣せられる前後かどうかにかかわらず、フリースローが行わ\n           れる前にタイムアウトが認められる。タイムアウトの間にテクニカルファウルやアンスポーツマンライ\n           クファウル、ディスクォリファイングファウルが宣せられた場合、フリースローはタイムアウトが終了し\n\nたあとで行われる。\n\n18/19-25   例：チーム B のヘッドコーチがタイムアウトを請求した。A１が B１にアンスポーツマンライクファ\n           ウルをし、続いて A２がテクニカルファウルを宣せられた。\n           解説：タイムアウトがチーム B に認められる。タイムアウトのあと、誰もリバウンドの位置に着か\n           ずに 1 本のフリースローがチーム B のいずれかのプレーヤーに与えられる。そのあと、誰もリバウ\n           ンドの位置に着かずに 2 本のフリースローが B１に与えられる。ゲームはフロントコートのスロー\n           インラインからチーム B のスローインで再開される。ショットクロックは 14 秒となる。\n\n18/19-26   例：チーム B のヘッドコーチはタイムアウトを請求した。A１が B１にアンスポーツマンライクファ\n           ウルをした。タイムアウトがチーム B に認められた。タイムアウトの間に A２はテクニカルファウル\n           を宣せられた。\n           解説：タイムアウトのあと、誰もリバウンドの位置に着かずに 1 本のフリースローがチーム B の\n           いずれかのプレーヤーに与えられる。そのあと、誰もリバウンドの位置に着かずに 2 本のフリース\n           ローが B１に与えられる。ゲームはフロントコートのスローインラインからチーム B のスローインで\n           再開される。ショットクロックは 14 秒となる。\n\n\n第 23 条 プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ\n――――――――――――――――――――――――――――――――――――――――――\n\n23-１ 条文：境界線上あるいは境界線の外側にいるプレーヤーにボールが触れたことでボールがアウトオ\n       ブバウンズとなった場合、このプレーヤーがボールをアウトオブバウンズに出したとみなす。"}, {"type": "impl", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ", "sec_no": "23-2", "body": "23-２   例：サイドラインの近くで、両手でボールを持った A１が B１に近接してガードされた。A１は片足\n       がアウトオブバウンズに触れている B１に体で触れた。\n       解説：A１の正当なプレーである。プレーヤーはプレーヤー以外の何かに体のいずれかの部分が触\n       れたとき、アウトオブバウンズとなる。ゲームは続行となる。\n       【補足】 ボールを持ったプレーヤーがアウトオブバウンズに触れているプレーヤーに触れてもバイオレー\n             ションにはならない。"}, {"type": "impl", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ", "sec_no": "23-3", "body": "23-３   例：サイドラインの近くで、両手でボールを持った A１が B１と B２に近接してガードされた。A１は\n       片足がアウトオブバウンズに触れている B１にボールで触れた。\n       解説：B１のアウトオブバウンズのバイオレーションである。アウトオブバウンズのプレーヤーに触れた\n       とき、ボールはアウトオブバウンズとなる。ゲームはボールがアウトオブバウンズに出た場所に最も近い\n       アウトオブバウンズからチーム A のスローインで再開される。チーム A のショットクロックは継続となる。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "23-4", "body": "23-４   例：A１はスコアラーズテーブルの前のサイドラインの近くでドリブルをしていた。ボールはコートから高\n       く跳ね上がり、交代席に座っている B６の膝に触れた。ボールはコート上の A１に戻った。\n       解説：ボールはアウトオブバウンズにいる B６に触れたとき、アウトオブバウンズとなる。ボールはアウ\n\nトオブバウンズに出る前に触れていた A１がアウトオブバウンズに出したとみなす。ゲームはボールがア\n       ウトオブバウンズに出た場所に最も近いアウトオブバウンズからチーム B のスローインで再開される。\n\n\n第 24 条 ドリブル\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-1", "body": "24-１   条文：プレーヤーが相手チームや自チームのバックボードをめがけて意図的にボールを投げた場\n       合、ドリブルとはみなされない。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-2", "body": "24-２   例：A１はまだドリブルをしておらず、立ち続けながらバックボードをめがけて意図的にボールを投\n       げ、他のプレーヤーが触れる前にボールをキャッチした、あるいはボールに触れた。\n       解説：A１の正当なプレーである。ボールをキャッチしたあと、A１はショットやパス、ドリブルを始める\n       ことができる。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-3", "body": "24-３   例：ドリブルを終えたあと、ひと続きの動きで、あるいは止まったうえで、A1 はバックボードをめがけて\n       意図的にボールを投げた。ボールが、\n       ⒜コートに弾んだあと、A1 は再びボールに触れた、あるいはキャッチし、ドリブルを始めた。\n       ⒝他のプレーヤーに触れる前に、A1 は再びボールに触れた、あるいはキャッチした。\n       解説：\n       ⒜は、A1 のダブルドリブルのバイオレーションである。最初のドリブルを終えたあと、A1 は 2 度目の\n        ドリブルをすることはできない。\n       ⒝は、A1 の正当なプレーである。ボールに触れたあと、あるいはキャッチしたあと、A1 はショットやパ\n        スをすることができるが、新たなドリブルを始めることはできない。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-4", "body": "24-４   例：ゲームクロックが動いていて、ボールがライブの状態での A1 のショットはリングに触れなかった。A\n       １はボールをキャッチし、バックボードをめがけて投げた。そのあと他のプレーヤーが触れる前にボール\n       をキャッチした、あるいはボールに触れた。\n       解説：A１の正当なプレーである。ボールをキャッチしたあと、A１はショットやパス、ドリブルを始める\n       ことができる。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-5", "body": "24-５   例：A１はドリブルをし、正当に止まった。そのあと、\n       ⒜A１はバランスを崩したが、ピボットフットを動かすことなくボールを手で持ったまま、その持っている\n        ボールでコートに１度あるいは２度触れた。\n       ⒝A１はピボットフットを動かすことなく、ボールを片方の手からもう片方にトスした。\n       解説：どちらの場合においても、A１の正当なプレーである。A１はピボットフットを動かしていない。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-6", "body": "24-６   例：A１は、\n       ⒜相手プレーヤーを越えてボールを投げてドリブルを始めた。\n       ⒝相手プレーヤーから数メートル離れた場所にボールを投げてドリブルを始めた。\n\nボールがコートに触れたあと、A１はドリブルを続けた。\n       解説：どちらの場合においても、A１の正当なプレーである。A１がドリブルで再びボールに触れる\n       前にボールはコートに触れている。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-7", "body": "24-７   例：A１ がドリブルを終え、B１ の脚に意図的にボールを投げた。A１ はボールをキャッチし、再び\n       ドリブルを始めた。\n       解説：A１のダブルドリブルのバイオレーションである。B１がボールに触れたわけではなく、ボールが\n       B１に触れたとみなし、A１のドリブルは終わっている。A１は再びドリブルをすることはできない。"}, {"type": "impl", "art_no": "25", "art_title": "トラベリング", "sec_no": "24-8", "body": "24-８   例：A1 がドリブルを終え、A2 にボールをパスした。ボールは偶然 B2 の体に触れたあと、フロアに\n       触れた。A1 はボールをキャッチし、再びドリブルを始めた。\n       解説：A1 の正当なプレーである。最初のドリブルのあと、ボールは他のプレーヤーに触れており、\n       A1 は再びドリブルをすることができる。\n\n\n第 25 条 トラベリング\n――――――――――――――――――――――――――――――――――――――――――\n25-１ 条文：コートに横たわっているプレーヤーがボールをコントロールすること、プレーヤーがボールを持っ\n       たままコートに倒れることは正当である。またそのプレーヤーがコートに倒れたあと、その勢いで滑るこ\n       とも正当である。ただし、そのプレーヤーがコートを転がったり、ボールを持ったまま立ち上がろうとした\n       りするとバイオレーションである。"}, {"type": "impl", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-2", "body": "25-２   例：両手でボールを持っている A１が\n       ⒜バランスを崩し、コート上に倒れた。\n       ⒝コート上に倒れ、その勢いで滑った。\n       解説：どちらの場合においても、A１の正当なプレーである。コートに倒れることはトラベリングのバイ\n       オレーションではない。ただし、ディフェンスを避けるために転がったり、ボールを持ったまま立ち上がろ\n       うとしたりした場合、トラベリングのバイオレーションである。"}, {"type": "impl", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-3", "body": "25-３   例：A１が、コートに横たわりながらボールをコントロールした。その後 A１は、\n       ⒜A２にボールをパスした。\n       ⒝コートに横たわったままドリブルを始めた。\n       ⒞ボールをドリブルしながら立ち上がろうとした。\n       ⒟ボールを持ったまま立ち上がろうとした。\n       解説：\n       ⒜,⒝,⒞A１の正当なプレーである。\n       ⒟A１のトラベリングのバイオレーションである。\n\n25-４ 条文：プレーヤーはドリブルを終えたあと、あるいはボールのコントロールを得たあとに、連続して同\n       じ足あるいは連続して両足でコートに触れることはできない。"}, {"type": "impl", "art_no": "26", "art_title": "３秒ルール", "sec_no": "25-5", "body": "25-５   例：A１は両手でボールを持ってドリブルを終え、ひと続きの動作で左足でジャンプし、左足、右足\n       の順で着地してショットをした。\n       解説：A１のトラベリングのバイオレーションである。プレーヤーはドリブルを終えたあと、連続して同\n       じ足でコートに触れることはできない。\n\n\n第 26 条 ３秒ルール\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "26", "art_title": "３秒ルール", "sec_no": "26-1", "body": "26-１   条文：プレーヤーが3秒のバイオレーションを避けるために、エンドラインからコートを離れ、その後\n       再び制限区域に入ることは、バイオレーションである。"}, {"type": "impl", "art_no": "26", "art_title": "３秒ルール", "sec_no": "26-2", "body": "26-２   例：制限区域に 3 秒未満いた A１は、3 秒のバイオレーションを避けるためにエンドラインからアウ\n       トオブバウンズに移動した。その後 A１は再び制限区域に入った。\n       解説：A１の 3 秒のバイオレーションである。"}, {"type": "impl", "art_no": "26", "art_title": "３秒ルール", "sec_no": "26-3", "body": "26-３   条文：フロントコート内でライブのボールをコントロールしているチームのプレーヤーは、ゲームクロッ\n       クが動いている間は、相手チームのバスケットに近い制限区域内に３秒以上とどまることはできない。"}, {"type": "impl", "art_no": "26", "art_title": "３秒ルール", "sec_no": "26-4", "body": "26-４   例：制限区域に 2.5 秒とどまっている A1 がショットのボールを放った。ボールはバックボードにもリン\n       グにも触れず、A1 はそのボールを再度コントロールした。\n       解説：A1 の正当なプレーである。A1 がショットのボールを放ったとき、チーム A のボールのコントロ\n       ールは終わる。A1 がそのボールを再び保持することで、チーム A は新たなボールのコントロールを得る。"}, {"type": "impl", "art_no": "27", "art_title": "近接してガードされたプレーヤー", "sec_no": "26-5", "body": "26-５   例：フロントコートからスローインをする A1 がボールを持っている間、A2 が制限区域に 3 秒以上\n       とどまった。\n       解説：A2 の正当なプレーである。チーム A はボールをコントロールしているが、ゲームクロックはまだ\n       動いていない。\n\n\n第 27 条 近接してガードされたプレーヤー\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "27", "art_title": "近接してガードされたプレーヤー", "sec_no": "27-1", "body": "27-１   条文：近接してガードされているプレーヤーは、5秒以内にパス、ショットあるいはドリブルをしなけ\n       ればならない。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "27-2", "body": "27-２   例：A1 は B1 に近接して 4 秒間ガードされた。その後 A1 はボールをファンブルし、再びキャッチした。\n       解説：A1 は 5 秒以内にパス、ショットあるいはドリブルをしていないため、5 秒のバイオレーションと\n       なる。ドリブルの始まりや終わりにボールをファンブルすることはドリブルではない。\n\n第 28 条 ８秒ルール\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-1", "body": "28-１   条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイテ\n       ィングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場\n       合、８秒は継続となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-2", "body": "28-２   例：A１がバックコートで５秒間ドリブルをしたあと、ヘルドボールが起きた。チーム A に次のオルタ\n       ネイティングポゼッションのスローインが与えられた。\n       解説：チーム A は３秒でボールをフロントコートに進めなければならない。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-3", "body": "28-３   条文：バックコートからフロントコートにドリブルをしているとき、ドリブラーの両足とボールが完全にフ\n       ロントコートに触れた時点で、ボールがフロントコートに進められたとみなされる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-4", "body": "28-４   例：A１がセンターラインをまたいでいたとき、バックコートにいる A２からボールを受けた。A１は\n       ⒜まだバックコートにいる A2 にボールをパスした。\n       ⒝センターラインをまたいでいる A2 にボールをパスした。\n       ⒞センターラインをまたいでいる A2 にボールをパスし、A2 はバックコートでドリブルを始めた。\n       解説：全ての場合において、チーム A の正当なプレーである。A１は両足が完全にフロントコート\n       に触れておらず、バックコートへボールをパスすることができる。8 秒は継続となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-5", "body": "28-５   例：A１がバックコートからドリブルをし、ドリブルをしながら以下のように止まった：\n       ⒜センターラインをまたいでいる。\n       ⒝両足がフロントコートにあるが、ボールはバックコートでドリブルされている。\n       ⒞両足がフロントコートにあり、ボールはバックコートでドリブルされているが、その後 A１は両足をバ\n        ックコートに戻した。\n       ⒟両足がバックコートにあるが、ボールはフロントコートでドリブルされている。\n       解説：全ての場合において、A１の正当なプレーである。ドリブルをしている A１は両足とボールの\n       全てが完全にフロントコートに触れるまでバックコートにいるとみなされる。8 秒は継続となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-6", "body": "28-６   条文：8秒が継続で、それまでボールをコントロールしていたチームがバックコートでスローインを与\n       えられる場合、スローインをするプレーヤーにボールを与える審判は、8秒のうち何秒が残っているか\n       をスローインをするプレーヤーに伝える。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-7", "body": "28-７   例：A１がバックコートで 6 秒間ドリブルをしたとき、\n       ⒜バックコートで\n       ⒝フロントコートで\n       ダブルファウルが起きた。\n\n解説：\n        ⒜ゲームはバックコートのダブルファウルが起きた場所に最も近いアウトオブバウンズからチーム A のス\n         ローインで再開される。審判はボールをフロントコートに進めるまでの残り時間が 2 秒であることを\n         スローインをするチーム A のプレーヤーに伝える。\n        ⒝ゲームはフロントコートのダブルファウルが起きた場所に最も近いアウトオブバウンズからチーム A の\n         スローインで再開される。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-8", "body": "28-８    例：A１がバックコートで 4 秒間ドリブルをしたとき、B１がボールをチーム A のバックコートのアウト\n        オブバウンズに弾き出した。\n        解説：ゲームはバックコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズ\n        からチーム A のスローインで再開される。審判はボールをフロントコートに進めるまでの残り時間が 4\n        秒であることをスローインをするチーム A のプレーヤーに伝える。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-9", "body": "28-９    条文：審判がどちらのチームにも関係のない正当な理由でゲームを止め、相手チームが不利な\n        状況になると判断した場合は、8秒は継続となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-10", "body": "28-10   例：第 4 クォーター残り 25 秒、得点が A 72 - B 72 で、チーム A がボールのコントロールを得た。\n        A１がバックコートで 5 秒間ドリブルをしたとき、\n        ⒜ゲームクロックまたはショットクロックが止まった、あるいは開始されなかったため、\n        ⒝コート上にボトルが投げ込まれたため、\n        ⒞ショットクロックが誤ってリセットされたため、\n        審判がゲームを止めた。\n        解説：全ての場合において、ゲームはバックコートからチーム A のスローインによって、8 秒のうち３\n        秒を残して再開される。新たに 8 秒がチーム A に与えられた場合、チーム B は不利な状況になる\n        と考えられる。\n\n28-11 条文：8秒のバイオレーションが起きた後のスローインの位置は、バイオレーションが起きたときのボ\n        ールの位置によって決定される。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-12", "body": "28-12   例：チーム A の 8 秒のバイオレーションが起きたとき、\n        ⒜チーム A は、バックコートでボールをコントロールしていた。\n        ⒝ボールは、バックコートにいる A１からフロントコートへのパスの途中で、空中にあった。\n        解説：チーム B のスローインはフロントコートの、\n        ⒜バックボードの真後ろを除いた 8 秒のバイオレーションが起きたときにボールがあった場所\n        ⒝センターライン\n        に最も近いアウトオブバウンズから行われ、ショットクロックは 14 秒となる。\n\n28-13 条文：チームコントロールはショットのボールがプレーヤーの手を離れたときに終わる。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "28-14", "body": "28-14   例：8 秒が経過する直前にバックコートからのショットのボールが A1 の手を離れた。ボールはバスケ\n        ットに入った。\n        解説：チーム A の正当なプレーである。ボールのコントロールはショットのボールが A1 の手を離れたと\n        きに終わる。A1 に 3 点が認められる。\n\n\n第 29/50 条 ショットクロック\n\n29/50-１   条文：ショットクロックの終了間際にショットが放たれ、ボールが空中にある間にショットクロック\n          のブザーが鳴った。\n          ・ボールがバスケットに入った場合、ゴールは認められる。\n          ・ボールがリングに触れた場合、そのリバウンドの結果、相手チームがボールをコントロールした\n            場合はショットクロックは24秒となり、ボールがリングに触れる前にボールをコントロールして\n            いたのと同じチームが再びボールをコントロールした場合は、ショットクロックは14秒となる。\n          ・ボールがリングに触れなかった場合、審判は相手チームのプレーヤーが速やかかつ明らかなボ\n           ールのコントロールを得られるかどうかを確認するために待つ。\n           −相手チームのプレーヤーが速やかかつ明らかなボールのコントロールを得られた場合、ショッ\n             トクロックのブザーはなかったものとする。\n           −相手チームのプレーヤーが速やかかつ明らかなボールのコントロールを得らなかった場合、\n             ショットクロックのバイオレーションである。バックボードの真後ろを除いたゲームが止められ\n             た場所に最も近いアウトオブバウンズから相手チームにスローインのボールが与えられる。\n\n29/50-２    例：A１のショットのボールが空中にあるときにショットクロックのブザーが鳴った。ボールはバック\n           ボードに触れたあと、コート上に転がり、最初に B１、次に A２に触れ、最終的に B２にコン\n           トロールされた。\n           解説：チーム A のショットクロックのバイオレーションである。A１のショットはリングに触れず、チ\n           ーム B は速やかかつ明らかにボールのコントロールを得られていない。\n\n29/50-３    例：A１のショットで、ボールはバックボードに触れたが、リングには触れなかった。そのボールに\n           B1 が触れたが、コントロールはできなかった。その後 A２がボールのコントロールを得た。そして\n           ショットクロックのブザーが鳴った。\n           解説：チーム A のショットクロックのバイオレーションである。\n\n29/50-４    例：ショットクロックの終了間際に A１がショットをして B１に正当にブロックされた。ショットクロ\n           ックのブザーが鳴ったあと、B１が A１にファウルをした。\n           解説：チーム A のショットクロックのバイオレーションである。B１の A１に対するファウルは、アン\n\nスポーツマンライクファウル、ディスクォリファイングファウルのいずれかでない限りなかったものとする。\n\n29/50-５   例：A１のショットのボールが空中にあるときにショットクロックのブザーが鳴った。ボールはリング\n          に触れず、そのあと、\n          ⒜A2 と B2 の間でヘルドボールが起きた。\n          ⒝B1 がボールをアウトオブバウンズに弾き出した。\n          解説：どちらの場合においても、チーム A のショットクロックのバイオレーションである。チーム B\n          は速やかかつ明らかなボールのコントロールを得られていない。\n\n29/50-６   例：B１はショットの動作（アクトオブシューティング）中の A１にファウルをし、ほとんど同時\n          にショットクロックのブザーが鳴った。ボールはバスケットに入った。\n          解説：\n          ⒜ボールがまだ A1 の手の中にあり、B1 のファウルがショットクロックのブザーが鳴る前に起きて\n           いた場合、あるいは\n          ⒝A1 のショットのボールがすでに空中にあり、B1 のファウルがショットクロックのブザーが鳴る前\n           に起きていた場合、あるいは\n          ⒞A1 のショットのボールがすでに空中にあり、B1 のファウルがショットクロックのブザーが鳴った\n           後に起きていた場合、\n          ショットクロックのバイオレーションではない。A1 のゴールは認められる。1 本のフリースローが A1\n          に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。\n          ⒟ボールがまだ A1 の手の中にあり、B1 のファウルがショットクロックのブザーが鳴った後に起き\n           ていた場合、\n          ショットクロックのバイオレーションである。A1 のゴールは認められない。B1 のファウルは、アンス\n          ポーツマンライクファウル、ディスクォリファイングファウルのいずれかでない限りなかったものとする。\n          ゲームはフリースローラインの延長線上からチーム B のスローインで再開される。\n\n29/50-７   例：ゲームクロック残り 25.2 秒で、チーム A がボールのコントロールを得た。ショットクロック残\n          り 1 秒で、A1 がショットをした。ボールが空中にある間にショットクロックのブザーが鳴った。ボー\n          ルはリングに触れず、\n          ⒜その 1.2 秒後にクォーターの終了を知らせるゲームクロックのブザーが鳴った。\n          ⒝A2 がリバウンドのボールを取った。審判はバイオレーションを宣し、ゲームクロックは 0.8 秒を示していた。\n          解説：\n          ⒜では、チーム A のショットクロックのバイオレーションではない。審判はチーム B が速やかかつ\n           明らかなボールのコントロールを得るかどうかを確認するために待っており、バイオレーションを\n           宣さなかった。クォーターは終了となる。\n          ⒝では、チーム A のショットクロックのバイオレーションである。ゲームクロック残り 0.8 秒で、ゲー\n\nムが止められた場所に最も近いアウトオブバウンズからチーム B のスローインで再開する。\n\n29/50-8    例：ゲームクロック残り 25.2 秒で、チーム A がボールのコントロールを得た。ゲームクロック残\n           り 1.2 秒で、A1 が手にボールを持っているとき、ショットクロックのブザーが鳴った。審判はバイ\n           オレーションを宣し、ゲームクロックは 0.8 秒を示していた。\n           解説：チーム A のショットクロックのバイオレーションである。ゲームクロック残り 1.2 秒でバイオ\n           レーションが起きており、審判はゲームクロックを修正する。ゲームクロックは 1.2 秒で、ゲームが\n           止められた場所に最も近いアウトオブバウンズからチーム B のスローインで再開する。\n\n29/50-９    条文：ショットクロックのブザーが鳴ったとしても、相手チームがボールを速やかかつ明らかにボ\n           ールのコントロールを得られる場合、ショットクロックのブザーはなかったものとし、ゲームは続行\n           する。\n\n29/50-10   例：ショットクロックの終了間際に A１のパスを A２がキャッチできず（2 人ともフロントコート\n           にいる）、ボールはチーム A のバックコートに転がった。B１がバスケットまで誰もいない状況で\n           ボールをコントロールしようとする前に、ショットクロックのブザーが鳴った。\n           解説：B１が速やかかつ明らかにボールのコントロールを得た場合、ショットクロックのブザーは\n           なかったものとし、ゲームは続行する。\n\n29/50-11   例：相手チームが得点をしたあと、ゲームクロック 25.3 秒で、チーム A はエンドラインの後方\n           からスローインを行った。ショットクロックの時限の終了間際に、A1 が A2 にパスをしたボールに\n           B1 が触れ、ショットクロックのブザーが鳴った。ゲームクロックに 0.8 秒が表示されている状態\n           で、審判はショットクロックのバイオレーションを宣した。\n           解説：ゲームクロックに 0.8 秒が表示されている状態で起きたチーム A のシ ョ ッ ト ク ロ ッ ク の\n           バイオレーションである。ゲームは止められた場所に最も近いアウトオブバウンズからチーム B の\n           スローインで再開され、ゲームクロックには引き続き 0.8 秒が表示される。\n\n29/50-12 条文：それまでボールをコントロールしていたチームがオルタネイティングポゼッションのスローイ\n           ンを与えられる場合、そのチームのショットクロックはジャンプボールシチュエーションが起きた時\n           点から継続となる。\n\n29/50-13   例：ショットクロック残り 10 秒で、チーム A がフロントコートでボールをコントロールしていると\n           き、ジャンプボールシチュエーションが起きた。オルタネイティングポゼッションのスローインが、\n           ⒜チーム A に与えられた。\n           ⒝チーム B に与えられた。\n           解説：\n           ⒜ショットクロックは 10 秒となる。\n\n⒝ショットクロックは 24 秒となる。\n\n29/50-14 条文：ボールをコントロールしていないチームのファウルあるいはバイオレーション（ボールがア\n           ウトオブバウンズになるバイオレーションを除く）により審判がゲームを止め、ボールのポゼッショ\n           ンがその前にボールをコントロールしていたチームにフロントコートで与えられる場合、\n           ・ゲームが止められた時点で、ショットクロックに14秒以上が表示されている場合、ショットクロ\n           ックは継続となる。\n           ・ゲームが止められた時点で、ショットクロックに13秒以下が表示されている場合、ショットクロ\n           ックは14秒となる。\n\n29/50-15   例：ショットクロック残り 8 秒で、A1 がフロントコートでドリブルをしているときに\n           ⒜B1 がチーム A のフロントコートのアウトオブバウンズにボールを弾き出した。\n           ⒝B1 が A1 にファウルをし、このクォーター2 個目のチームファウルであった。\n           解説：ゲームはチーム A のスローインで再開され、ショットクロックは\n           ⒜8 秒となる。\n           ⒝14 秒となる。\n\n29/50-16   例：ショットクロック残り 4 秒で、チーム A がフロントコートでボールをコントロールしているとき、\n           ⒜A１が\n           ⒝B１が\n           怪我をして、審判がゲームを止めた。\n           解説：ショットクロックは、\n           ⒜４秒となる。\n           ⒝14 秒となる。\n\n29/50-17   例：ショットクロック残り 6 秒で、A１のショットのボールが空中にあるときに A２と B２にダブル\n           ファウルが起きた。オルタネイティングポゼッションアローはチーム A を示している。ボールはリングに\n           ⒜触れなかった。\n           ⒝触れた。\n           解説：ショットクロックは\n           ⒜６秒となる。\n           ⒝14 秒となる。\n\n29/50-18   例：ショットクロック残り 5 秒で、A１がドリブルをしているときに、B１がテクニカルファウルを宣\n           せられた。その後チーム A のヘッドコーチにテクニカルファウルが宣せられた。\n           解説：等しい罰則を相殺したあと、ゲームはチーム A のスローインで再開される。ショットクロッ\n           クは 5 秒となる。\n\n29/50-19   例：\n           ⒜ショットクロック残り 16 秒で\n           ⒝ショットクロック残り 12 秒で\n           フロントコートにいる A１が A２にボールをパスしたとき、B１が意図的にボールを蹴った、もしく\n           は拳でボールを叩いた。\n           解説：どちらの場合においても、B１のボールを蹴るバイオレーションもしくは拳でボールを叩く\n           バイオレーションである。ゲームはフロントコートからチーム A のスローインで再開され、ショットク\n           ロックは、\n           ⒜16 秒となる。\n           ⒝14 秒となる。\n\n29/50-20   例：ショットクロック残り 6 秒で、A１がフロントコートでドリブルをしているとき、B２が A２にア\n           ンスポーツマンライクファウルをした。\n           解説：誰もリバウンドの位置に着かずに 2 本のフリースローが A２に与えられる。フリースロー\n           の成否にかかわらず、ゲームはフロントコートのスローインラインからチーム A のスローインで再開\n           される。ショットクロックは 14 秒となる。\n           同様の解釈が、ディスクォリファイングファウルにも適用される。\n\n29/50-21 条文：審判がどちらのチームにも関係のない正当な理由でゲームを止め、相手チームが不\n           利な状況になる場合は、ショットクロックは継続となる。\n\n29/50-22   例：第 4 クォーター残り 25 秒、得点が A 72 - B 72 で、チーム A がフロントコートでボール\n           のコントロールを得た。A１が 20 秒間ドリブルをしたとき、\n           ⒜ゲームクロックまたはショットクロックが止まった、あるいは開始されなかったため、\n           ⒝コート上にボトルが投げ込まれたため、\n           ⒞ショットクロックが誤ってリセットされたため、\n           審判がゲームを止めた。\n           解説：全ての場合において、ゲームは止められた場所に最も近いアウトオブバウンズからチー\n           ム A のスローインで再開され、ショットクロックは残り 4 秒となる。ゲームがショットクロックに何も\n           表示せずに再開された場合、チーム B は不利な状況になると考えられる。\n\n29/50-23   例：A１のショットのボールがリングに触れた。A２がリバウンドのボールを取り、その 9 秒後に\n           誤ってショットクロックのブザーが鳴った。審判がゲームを止めた。\n           解説：ショットクロックがリセットされなかったという操作の誤りである。コミッショナー（同席して\n           いる場合）、ショットクロックオペレーターと協議したあと、ゲームはチーム A のスローインで再開\n           され、ショットクロックは残り 5 秒となる。\n\n29/50-24   例：ショットクロック残り 4 秒で、A１がショットをした。ボールはリングに触れなかったが、ショット\n           クロックオペレーターは誤ってショットクロックをリセットしてしまった。A２がリバウンドのボールを取\n           り、しばらくして A３がゴールで得点した。このとき、審判が誤りを認識した。\n           解説：審判は、コミッショナー（同席している場合）と協議したあと、A１のショットの間にボ\n           ールがリングに触れなかったことを確認する。その上で、もしショットクロックが誤ってリセットされて\n           いなかった場合、A３のショットのボールはショットクロックのブザーがなる前に両手を離れていた\n           かを判断する。離れていた場合、A３のゴールは認められ、離れていなかった場合、ショットク\n           ロックのバイオレーションであり、A３のゴールは認められない。\n\n29/50-25 条文：ショットが放たれ、ディフェンスのチームのバックコートで、ディフェンスのプレーヤーがファウ\n           ルを宣せられた。ゲームがスローインで再開される場合、ショットクロックは、\n           ・ゲームが止められたとき、ショットクロックに14秒以上が表示されていた場合、ショットクロック\n           はリセットされず、継続となる。\n           ・ゲームが止められたとき、ショットクロックに13秒以下が表示されていた場合、ショットクロック\n           は14秒となる。\n\n29/50-26   例：A1 がショットをし、ボールはバスケットに入った。B2 がチーム B のバックコートで A2 にファ\n           ウルをし、このクォーター3 個目のチームファウルであった。\n           解説：A1 のゴールは認められる。ゲームは B2 のファウルが起きた場所に最も近いアウトオブ\n           バウンズからチーム A のスローインで再開される。ショットクロックは 14 秒となる。\n\n29/50-27   例：ショットクロック残り 17 秒で、A１のショットのボールが空中にあるときにチーム B のバック\n           コートにいる B２が A２にファウルをし、このクォーター2 個目のチームファウルであった。ボールは、\n           ⒜リングに触れたが、バスケットには入らなかった。\n           ⒝リングに触れなかった。\n           解説：\n           どちらの場合においても、ゲームはフロントコートの B２のファウルが起きた場所に最も近いアウ\n           トオブバウンズからチーム A のスローインで再開される。ショットクロックは 17 秒となる。\n\n29/50-28   例：ショットクロック残り 10 秒で、A１のショットのボールが空中にあるときにチーム B のバック\n           コートにいる B２が A２にファウルをし、このクォーター2 個目のチームファウルであった。ボールは、\n           ⒜バスケットに入った。\n           ⒝リングに触れたが、バスケットには入らなかった。\n           ⒞リングに触れなかった。\n           解説：\n           ⒜A１のゴールは認められる。\n           全ての場合において、ゲームはフロントコートの B２のファウルが起きた場所に最も近いアウトオ\n\nブバウンズからチーム A のスローインで再開される。ショットクロックは 14 秒となる。\n\n29/50-29   例：A１のショットのボールが空中にあるときに、ショットクロックのブザーが鳴った。チーム B の\n           バックコートにいる B２が A２にファウルをし、このクォーター2 個目のチームファウルであった。\n           ボールは、\n           ⒜バスケットに入った。\n           ⒝リングに触れたが、バスケットには入らなかった。\n           ⒞リングに触れなかった。\n           解説：\n           ⒜A１のゴールは認められる。\n           全ての場合において、チーム A のショットクロックのバイオレーションではない。ゲームはフロントコ\n           ートの B２のファウルが起きた場所に最も近いアウトオブバウンズからチーム A のスローインで再\n           開される。ショットクロックは 14 秒となる。\n\n29/50-30   例：ショットクロック残り 10 秒で、A１のショットのボールが空中にあるときにチーム B のバック\n           コートにいる B２が A２にファウルをし、このクォーター5 個目のチームファウルであった。ボールは、\n           ⒜バスケットに入った。\n           ⒝リングに触れたが、バスケットには入らなかった。\n           ⒞リングに触れなかった。\n           解説：\n           ⒜A１のゴールは認められる。\n           全ての場合において、2 本のフリースローが A２に与えられる。ゲームは通常の最後のフリース\n           ローの後と同様に再開される。\n\n29/50-31   例：A１のショットのボールが空中にあるときに、ショットクロックのブザーが鳴った。B２が A２\n           にファウルをしたあと、ボールは、\n           ⒜バスケットに入った。\n           ⒝リングに触れたが、バスケットには入らなかった。\n           ⒞リングに触れなかった。\n           B2 のファウルはチーム B のこのクォーター5 個目のチームファウルであった。\n           解説：\n           ⒜A１のゴールは認められる。\n           全ての場合において、チーム A のショットクロックのバイオレーションではない。2 本のフリースロ\n           ーが A２に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。\n\n29/50-32 条文：アンスポーツマンライクファウルあるいはディスクォリファイングファウルの後のスローイン\n           は、いつでもフロントコートのスコアラーズテーブルの反対側のスローインラインから行われる。シ\n           ョットクロックは14秒となる。\n\n29/50-33   例：第 4 クォーター残り 1:12、ショットクロック残り 6 秒で、A１がフロントコートでドリブルをし\n           ているときに B１が A１にアンスポーツマンライクファウルをした。A１の最初のフリースローのあ\n           と、チーム A もしくはチーム B のヘッドコーチがタイムアウトを請求した。\n           解説：誰もリバウンドの位置に着かずに 2 本目のフリースローが A１に与えられる。そのあと、\n           タイムアウトが認められる。タイムアウトのあと、ゲームはフロントコートのスコアラーズテーブルの\n           反対側のスローインラインからチーム A のスローインで再開される。ショットクロックは 14 秒となる。\n\n29/50-34   例：ショットクロック残り 19 秒で、A１がフロントコートでドリブルをしているときに B２が A２に\n           アンスポーツマンライクファウルをした。\n           解説：誰もリバウンドの位置に着かずに 2 本のフリースローが A２に与えられる。フリースロー\n           の成否にかかわらず、ゲームはフロントコートのスコアラーズテーブルの反対側のスローインライン\n           からチーム A のスローインで再開される。ショットクロックは 14 秒となる。\n           同様の解釈が、ディスクォリファイングファウルにも適用される。\n\n29/50-35 条文：ボールが何らかの理由で相手チームのバスケットのリングに触れたあと、ボールがリング\n           に触れる前にボールをコントロールしていたチームと同じチームが再びボールをコントロールした\n           場合は、ショットクロックは14秒となる。\n\n29/50-36   例：A１から A２へのパスのボールに B２が触れたあと、ボールがリングに触れ、A３がそのボ\n           ールをコントロールした。\n           解説：A３がコート上でボールのコントロールを得たとき、ショットクロックは 14 秒となる。\n\n29/50-37   例：ショットクロック残り、\n           ⒜４秒で\n           ⒝20 秒で\n           A１がショットをした。ボールはリングに触れ、A２がボールのコントロールを得た。\n           解説：どちらの場合においても、A２がコート上でボールのコントロールを得たとき、ショットクロ\n           ック
