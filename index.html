  {id:155,num:"別添資料F IRS F-4 ヘッドコーチチャレンジ",level:"A",ref:"インプリ F-4.14",q:"A１はスリーポイントゴールで得点した。このとき、チームBはタイムアウトを請求した。タイムアウトの最中でチームBのヘッドコーチはショットが放たれる前にA１はスリーポイントラインを踏んでいたと考え、適切な手続きでヘッドコーチチャレンジを請求した。チームBのヘッドコーチチャレンジは認められる。成功したゴールで２点あるいは３点のどちらが認められるかを判定するためにIRSレビューを行うことができる。タイムアウトは中断され、ヘッドコーチチャレンジのレビューの後にタイムアウトが継続される。",ans:false,explanation:"タイムアウトは中断せずに最後まで続けられる。ヘッドコーチチャレンジのレビューはタイムアウトの後で行われる。",ruleSrc:"インプリ F-4.14",ruleText:"インプリ F-4.14\nタイムアウトは中断せずに最後まで続けられる。ヘッドコーチチャレンジのレビューはタイムアウトの後で行われる。"},
  {id:156,num:"第12条 ジャンプボール",level:"B",ref:"インプリ 12-27",q:"A１のショットのボールが空中にある間にショットクロックのブザーが鳴った。その後ボールはリングに触れず直後にヘルドボールが宣せられた。チームAのショットクロックには時間が残っておらず、ショットクロックバイオレーションを適用した。オルタネイティングポゼッションアローの示す方向は関係なく、ゲームは最初に宣したヘルドボールが起きた場所に最も近いアウトオブバウンズからチームBのスローインで再開される。ショットクロックは24秒となる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 12-27",ruleText:"インプリ 12-27\nショットクロックバイオレーション後のヘルドボールでは、ショットクロックバイオレーションを優先し、チームBのスローインで再開される。"},
  {id:157,num:"第16条 得点",level:"B",ref:"インプリ 16-10",q:"スローインをするA１がフロントコートでボールをパスした。その後ボールはチームAのフロントコートでスリーポイントエリアにいるいずれかのプレーヤーに正当に触れられ、バスケットに入った。審判はチームAの２点を認めた。",ans:true,explanation:"ボールはスローインから放たれているため、２点が認められる。プレーヤーがボールに触れたことは正当である。３点が認められるのはショットもしくはパスのボールがコート上でスリーポイントラインの外側から放たれたときのみである。",ruleSrc:"インプリ 16-10",ruleText:"インプリ 16-10\nスローインから放たれたボールがバスケットに入った場合、２点が認められる。"},
  {id:158,num:"第17条 スローイン",level:"C",ref:"インプリ 17-21",q:"第４クォーター残り1:18で、チームAはバックコートからのスローインを与えられた。このときタイムアウトがチームAに認められた。タイムアウトのあと、チームAのヘッドコーチはフロントコートのスローインラインからのスローインを選択した。スローインが行われる前に、チームBのヘッドコーチがタイムアウトを請求した。フロントコートからスローインを行うというチームAのヘッドコーチの選択は最終的なものでゲームクロックが再び動き始めるまでは変更することはできない。",ans:true,explanation:"問題文のとおり。フロントコートからスローインを行うというチームAのヘッドコーチの選択は最終的なものでゲームクロックが再び動き始めるまでは変更することはできない。",ruleSrc:"インプリ 17-21",ruleText:"インプリ 17-21\nフロントコートからスローインを行うというヘッドコーチの選択は最終的なものでゲームクロックが再び動き始めるまでは変更することはできない。"},
  {id:159,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-13",q:"B１がドリブルをしているA１をディフェンスした。A１はB１を押した上で、あたかもB１にファウルをされたかのような印象を与えようと頭部を急に動かした。審判はA１にファウルを宣した。すでにA１のファウルを宣しているため、加えてフェイクの警告は与えない。",ans:false,explanation:"A１のファウルに加えて、審判はA１にフェイクの警告（これがチームAの最初のフェイクで、過度なフェイクではない場合）を与える、もしくはテクニカルファウル（チームAがすでにフェイクの警告を与えられている、もしくは最初でも過度なフェイクであった場合）を宣する。",ruleSrc:"インプリ 36-13",ruleText:"インプリ 36-13\nファウルを宣した場合でも、フェイクに対する警告またはテクニカルファウルを加えることができる。"},
  {id:160,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-16",q:"B１がドリブルをしているA１をディフェンスした。B１はあたかもA１にファウルをされたかのような印象を与えようとコート上に倒れた。ほとんど同時にA１はあたかもB１にファウルをされたかのような印象を与えようと頭部を急に動かした。審判はA１とB１の両方にフェイクの警告（これがチームの最初のフェイクで、過度なフェイクではない場合）を与える、もしくはテクニカルファウル（チームがすでにフェイクの警告を与えられている、もしくは最初でも過度なフェイクであった場合）を宣する。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 36-16",ruleText:"インプリ 36-16\n両方のプレーヤーにフェイクの警告またはテクニカルファウルを宣する。"},
  {id:161,num:"第44条 訂正のできる誤り",level:"B",ref:"ルール 44-3-2",q:"カテゴリー1の訂正のできる誤りはゲームの終了を知らせるゲームクロックのブザーが鳴り、ボールがデッドとなった後では訂正することはできない。ただし、誤りが、最後に審判が何らかの理由でゲームを止めたときからゲームの終了を知らせるゲームクロックのブザーが鳴るまでの間に起きた場合、この誤りはゲーム終了後速やかに訂正され、チームはコートもしくはチームベンチエリアにとどまらなければならない。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 44-3-2",ruleText:"ルール 44-3-2\nカテゴリー1の訂正のできる誤りは、最後に審判がゲームを止めてからゲーム終了までの間に起きた場合、ゲーム終了後速やかに訂正できる。"},
  {id:162,num:"第44条 訂正のできる誤り",level:"C",ref:"インプリ 44-5",q:"第４クォーター残り1:14で、B１がツーポイントゴールのショットの動作（アクトオブシューティング）中のA１にファウルをし、ショットは成功しなかった。審判は誤ってA１に２点と１本のフリースローを与えた。この誤りが第４クォーターと最初のオーバータイムの間のプレーのインターバル中に認識された。誤りは訂正できる。",ans:false,explanation:"誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。",ruleSrc:"インプリ 44-5",ruleText:"インプリ 44-5\n誤りを訂正できる時機を過ぎているため、誤りは訂正できない。"},
  {id:163,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-7",q:"第２クォーター残り3:37で、B１がA１にファウルをし、このクォーター４個目のチームファウルであった。審判は誤って２本のフリースローをA１に与えた。この誤りが、第４クォーター残り4:48で認識された。誤りは訂正できる。成否にかかわらず、フリースローは取り消される。ゲームは誤りの訂正のために止められた場所に最も近いところから再開される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-7",ruleText:"インプリ 44-7\n第２クォーターの誤りが第４クォーター残り4:48で認識された場合は訂正できる。フリースローは取り消される。"},
  {id:164,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-12",q:"第３クォーターで、B２がドリブルをしているA１にファウルをし、このクォーター５個目のチームファウルであった。２本のフリースローがA１に与えられたが、１本目のフリースローを失敗したあと、B１がリバウンドのボールを取り、ゲームは誤って続行された。この誤りが、第４クォーター残り2:54で認識された。審判は誤りを訂正するため、２本目のフリースローがA１に与えられる。しかしA１は５個のファウルを宣せられているため、チームAのヘッドコーチが指定したプレーヤーにフリースロー１本を与えることにした。フリースローは誰もリバウンドの位置に着かずに行われ、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。",ans:true,explanation:"A１が５個のファウルを宣せられていたり、失格・退場となっていたりした場合、チームAのヘッドコーチはフリースローシューターを指定する。",ruleSrc:"インプリ 44-12",ruleText:"インプリ 44-12\nA１が５個のファウルを宣せられていた場合、チームAのヘッドコーチはフリースローシューターを指定する。"},
  {id:165,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-15",q:"第３クォーター残り３秒で、B１がショットの動作（アクトオブシューティング）中のA１にファウルをした。２本のフリースローがA１に与えられたが、A１の代わりにA２がフリースローを行った。第３クォーターが終了し、この誤りが第４クォーターでボールがライブとなったあと、ゲームクロックに2:00が表示される前に認識された。誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。ゲームは続行される。",ans:false,explanation:"誤りは訂正できる。A２の２本のフリースローは取り消される。ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。",ruleSrc:"インプリ 44-15",ruleText:"インプリ 44-15\nゲームクロックに2:00が表示される前に認識された場合は訂正できる。"},
  {id:166,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-17",q:"第３クォーターの終了を知らせるゲームクロックのブザーが鳴ったとき、B１がドリブルをしているA１にファウルをし、このクォーター６個目のチームファウルであった。審判はB１のファウルはゲームクロック残り0.3秒で起きたと判断した。２本のフリースローがA１に与えられた。審判はA１ではなく、A２をシューターに指定してフリースローを行った。この誤りが最初のフリースローでボールがA２の手を離れた後で認識された。A２の２本のフリースローは取り消される。２本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-17",ruleText:"インプリ 44-17\n誤ったプレーヤーがフリースローを行っていた誤りを訂正できる。"},
  {id:167,num:"第44条 訂正のできる誤り",level:"A",ref:"インプリ 44-18",q:"B１がショットの動作（アクトオブシューティング）中のA１にファウルをした。審判はA１ではなく、A２をシューターに指定してフリースローを行った。２本目のフリースローでボールがリングに触れたあと、A３がリバウンドのボールを取って２点を得点した。この誤りが、エンドラインの後ろのアウトオブバウンズでチームBにスローインのボールが与えられる前に認識された。成否にかかわらず、A２が行った２本のフリースローは取り消される。A３の得点も認めない。２本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。",ans:false,explanation:"A３の得点は有効なままとなる。誰もリバウンドの位置に着かずに２本のフリースローがA１に与えられる。ゲームは誤りの訂正のために止められた場所に最も近いところ（この場面ではエンドラインの後方のアウトオブバウンズ）から再開される。",ruleSrc:"インプリ 44-18",ruleText:"インプリ 44-18\nA３の得点は有効なままとなる。誰もリバウンドの位置に着かずに２本のフリースローがA１に与えられる。"},
  {id:168,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-20",q:"第４クォーター残り0:57で、ボールの無いところでA２がファウルをしたとき、ショットのボールがA１の手を離れていた。ボールは正当にバスケットに入ったが、審判は誤って得点を取り消した。この誤りが第４クォーター残り0:43で、誤りに続いて最初に審判がゲームを止めたときに認識された。誤りは訂正できる。スコアシートは訂正され、チームAに２点が追加される。ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-20",ruleText:"インプリ 44-20\n誤って得点が取り消された場合、訂正できる。スコアシートは訂正され、チームAに２点が追加される。"},
  {id:169,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-23",q:"第１クォーター残り5:47で、B１がA１にファウルをした。審判はB２のファウルとして伝達した。この誤りがハーフタイムの間に認識された。誤りは訂正され、スコアラーはクルーチーフと相談したあと、誤ってB２に記録されたファウルを削除し、B１に正しくファウルを記録することでスコアシートを訂正する。B２が誤って５個のファウルを宣せられたチームメンバーとなっていた場合、B２は再びゲームに参加できる。B１が本来早い時点で５個のファウルを宣せられたチームメンバーとなるべきであった場合、B１はこの時点で５個のファウルを宣せられたチームメンバーとなる。追加の罰則は適用されない。",ans:true,explanation:"誤ったプレーヤーのファウルを伝達した誤りは、第４クォーターでゲームクロックが2:00を示すまでは訂正できる。",ruleSrc:"インプリ 44-23",ruleText:"インプリ 44-23\n誤ったプレーヤーのファウルを伝達した誤りは、第４クォーターでゲームクロックが2:00を示すまでは訂正できる。"},
  {id:170,num:"第44条 訂正のできる誤り",level:"A",ref:"インプリ 44-25",q:"第４クォーター残り3:45で、チームAは後半２回目のタイムアウトを請求した。スコアラーはこのタイムアウトを誤ってチームBの後半２回目のタイムアウトとして記録した。第４クォーター残り2:44で、ボールがアウトオブバウンズに出て審判がゲームを止めた。 第４クォーター残り1:45で、チームBにタイムアウトが認められた。チームBはこのタイムアウトが後半３回目であることを伝えられ、チームBはタイムアウトが残っていない。チームBのヘッドコーチは誤りが起きていることを主張した。スコアラーはクルーチーフと相談し、誤りが認識されたが、審判は訂正できる時機を過ぎているため、誤りはなかったものとした。",ans:true,explanation:"第４クォーターでゲームクロックが2:00を示すまでに認識されなければならず、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。",ruleSrc:"インプリ 44-25",ruleText:"インプリ 44-25\n第４クォーターでゲームクロックが2:00を示すまでに認識されなければ訂正できない。"},
  {id:171,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-26",q:"第１クォーター残り3:34で、チームAのヘッドコーチはテクニカルファウルを宣せられた。スコアラーはこのテクニカルファウルを誤ってチームBのヘッドコーチに記録した。この誤りが、第４クォーター残り1:02にゲームが止められたときに認識された。本来であれば、誤りを訂正できる時機を過ぎている。しかしテクニカルファウルの場合は、コーチの失格・退場につながる恐れがあるため訂正できる。スコアラーはクルーチーフと相談したあと、誤ってチームBのヘッドコーチに記録されたテクニカルファウルを削除し、チームAのヘッドコーチに正しくテクニカルファウルを記録することでスコアシートを訂正する。罰則は適用されない。ゲームは誤りの訂正のためにゲームが止められたところから再開される。",ans:false,explanation:"誤ったチームに記録されたテクニカルファウルは、第４クォーターでゲームクロックに2:00が表示されるまでは訂正できる。この場合、誤りを訂正できる時機を過ぎているため誤りは訂正できず、なかったものとする。",ruleSrc:"インプリ 44-26",ruleText:"インプリ 44-26\n誤ったチームに記録されたテクニカルファウルは、第４クォーターでゲームクロックに2:00が表示されるまでは訂正できる。この場合は訂正できない。"},
  {id:172,num:"第44条 訂正のできる誤り",level:"A",ref:"インプリ 44-29",q:"第１クォーター残り2:43で、アウトオブバウンズのバイオレーションによってゲームクロックが止められた。スローインの前、ゲームクロックが何も表示されていない状態となった。タイマーは機材をリセットした。機材が再び動くようになったとき、ゲームクロックに誤って1:43が設定された。この誤りがハーフタイムの間に認識された。この場合ハーフタイムのインターバルのあと、ハーフタイムのためにゲームが止められたときから継続したチームファウルとタイムアウトで、前半で両チームがプレーしていた方向と同じ方向に１分間プレーする。ゲームクロックは1:00に設定され、オルタネイティングポゼッションのスローインが与えられることになっているチームのスローインで始められる。１分間のプレーのあと、次にオルタネイティングポゼッションのスローインが与えられることになっているチームのスローインで第３クォーターが始められる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-29",ruleText:"インプリ 44-29\nゲームクロックの誤設定がハーフタイムに発見された場合の処置。"},
  {id:173,num:"第44条 訂正のできる誤り",level:"C",ref:"インプリ 44-34",q:"チームAはバックコートでスローインを与えられた。ショットクロックは24秒に設定されるべきところ、誤って14秒に設定された。A１がコート上でボールをキャッチし、フロントコートへドリブルをして、ショットをした。ボールが空中にある間にショットクロックのブザーが鳴った。ボールはリングに触れず、すぐにA２がリバウンドのボールを取った。審判はショットクロックバイオレーションのためゲームを止めた。テーブルオフィシャルズはショットクロックが誤って設定されたことを認識した。審判はショットクロックのバイオレーションはなかったものとして、ゲームが止められた場所に最も近いアウトオブバウンズからスローインがチームAに与えられる。どちらのチームにも関係のない正当な理由でゲームを止めたため、ショットクロックは14秒にリセットしてゲームは再開される。",ans:false,explanation:"ショットクロックのバイオレーションはなかったものとして、ゲームが止められた場所に最も近いアウトオブバウンズからスローインがチームAに与えられ、ショットクロックは10秒となる。",ruleSrc:"インプリ 44-34",ruleText:"インプリ 44-34\nショットクロックが誤って設定された場合、バイオレーションはなかったものとし、ショットクロックは10秒（24秒から14秒を引いた残り）で再開される。"},
  {id:174,num:"別添資料F IRS F-4 ヘッドコーチチャレンジ",level:"A",ref:"インプリ F-4.12",q:"第３クォーター残り43.4秒、ショットクロック残り1.2秒でA１はスリーポイントのショットをした。ショットは成功せず、ボールはリングに触れなかった。その後B１がバスケットの近くでボールに触れ、ボールはすぐにアウトオブバウンズに出た。審判はスローインのボールをチームBに与えるとき、ショットクロックに何も表示されていないことに気づいた。チームAのヘッドコーチはB１がボールをアウトオブバウンズに出したと考え、ヘッドコーチチャレンジを請求した。ゲーム中のいかなる時間帯でも、ボールをアウトオブバウンズにしたプレーヤーを特定するためにヘッドコーチチャレンジのレビューを行うことができる。そのとき、誤操作があった場合はショットクロックにどのくらいの時間が表示されるかを決定するためにさらにレビューを行うこともできる。レビューで、B１がボールをアウトオブバウンズに出していて、ボールがアウトオブバウンズに出る前にショットクロックの時限を過ぎていた場合、チームAのショットクロックに時間は残っておらず、ショットクロックバイオレーションとなる。ゲームはエンドラインのアウトオブバウンズからチームBのスローインで再開され、ショットクロックは24秒となる。チームAのヘッドコーチは請求を認められた１回のヘッドコーチチャレンジを使用したことにはならない。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ F-4.12",ruleText:"インプリ F-4.12\nショットクロックの時限を過ぎていた場合、ショットクロックバイオレーションとなる。"},
  {id:175,num:"別添資料F IRS F-4 ヘッドコーチチャレンジ",level:"A",ref:"インプリ F-4.2",q:"クルーチーフによって承認されたIRS機器を利用できるゲームの中で、チームBのヘッドコーチがヘッドコーチチャレンジを請求した。ヘッドコーチは、最も近い審判と目で見えるようにコミュニケーションを確立し、はっきりとヘッドコーチチャレンジを依頼した。大きな声で英語で「チャレンジ」と言い、ヘッドコーチチャレンジのシグナルを示した。ヘッドコーチからヘッドコーチチャレンジの依頼を受けたアンパイヤがクルーチーフに伝えた直後、チームBのヘッドコーチは請求の取り下げを申し出た。審判は最も近くにいたアンパイアによってヘッドコーチチャレンジの依頼をすでに受けたため、請求は最終的なものであり、撤回することはできない。",ans:false,explanation:"ヘッドコーチによるチャレンジの請求は、審判（クルーチーフ）がヘッドコーチチャレンジのシグナルを示し、認めるまでは取り消すことができる。",ruleSrc:"インプリ F-4.2",ruleText:"インプリ F-4.2\nヘッドコーチによるチャレンジの請求は、審判（クルーチーフ）がヘッドコーチチャレンジのシグナルを示し、認めるまでは取り消すことができる。"},
];

const RULE_DATA = [{"type": "rule", "art_no": "1", "art_title": "定義", "sec_no": "1-1", "body": "１-１　バスケットボールゲーム\nバスケットボールは、それぞれ５人ずつのプレーヤーからなる２チームによってプレーされる。\nそれぞれのチームの目的は「相手チームのバスケットに得点すること」および「相手チームが得点することを妨げること」である。\nゲームは、審判、テーブルオフィシャルズ、およびコミッショナー（同席している場合）によって進行される。"}, {"type": "rule", "art_no": "1", "art_title": "定義", "sec_no": "1-2", "body": "１-２　ゲームに関わる人々に求められる責任\nゲームに関わる全ての人物（テーブルオフィシャルズ、テクニカルデリゲート/コミッショナー（同席している場合）、プレーをすることができる全てのチームメンバー、ヘッドコーチおよびその他のチーム関係者）はゲームの円滑な運営に積極的に役割を果たす必要があり、常に倫理的な行動を示すことが求められる。\nゲームに関わる全ての人物は、得点、ファウル、タイムアウトを含む記録や、ゲームクロック、ショットクロックの操作に関わる訂正のできる誤りを認識した場合、本規則に従って誤りが訂正されるようただちに審判に知らせることが求められる。"}, {"type": "rule", "art_no": "1", "art_title": "定義", "sec_no": "1-3", "body": "１-３　相手チームのバスケット/自チームのバスケット\nチームが攻撃するバスケットを「相手チームのバスケット」といい、防御するバスケットを「自チームのバスケット」という。"}, {"type": "rule", "art_no": "1", "art_title": "定義", "sec_no": "1-4", "body": "１-４　ゲームの勝敗\nゲームの勝敗は、競技時間が終了した時点で得点の多いチームを勝ちとする。"}, {"type": "rule", "art_no": "4", "art_title": "チーム（Teams）", "sec_no": "4-1-2", "body": "４-１-２　チームメンバーは、ゲーム開始前にその氏名がスコアシートに記入されていれば、その\nゲームに出場することができる。ただし、失格・退場を宣せられるか５個のファウルを宣せられた場合は、それ以降そのゲームに出場することはできない。"}, {"type": "rule", "art_no": "4", "art_title": "チーム（Teams）", "sec_no": "4-1-4", "body": "４-１-４  プレーのインターバル中は、プレーをする資格があるチームメンバーは全てプレーヤーであるとみなされる。"}, {"type": "rule", "art_no": "4", "art_title": "チーム（Teams）", "sec_no": "4-2-2", "body": "４-２-２ 競技時間中は、各チーム５人のチームメンバーがコート上でプレーをし、交代することもできる。"}, {"type": "rule", "art_no": "4", "art_title": "チーム（Teams）", "sec_no": "4-3-2", "body": "４-３-２ 各チームメンバーはシャツの前面と背面に、シャツの色とはっきりと区別できる色で整数の番号をつける。"}, {"type": "rule", "art_no": "4", "art_title": "チーム（Teams）", "sec_no": "4-4-1", "body": "４-４-１　プレーヤーは、プレーをするのにふさわしくないもの、\nゲームに支障をもたらすものを身につけてはならない。身長や腕の長さを補ったり、その他どのような方法であれ、不当な利益をもたらすような用具・器具を使用したり着用したりしてはならない。"}, {"type": "rule", "art_no": "4", "art_title": "チーム（Teams）", "sec_no": "4-4-2", "body": "４-４-２ プレーヤーは、他のプレーヤーに怪我をさせる可能性があるものを着用してはならない。"}, {"type": "rule", "art_no": "4", "art_title": "チーム（Teams）", "sec_no": "4-4-3", "body": "４-４-３　ゲーム中、\nプレーヤーはどのような色の組み合わせのシューズを履いてもよい。点滅するライト、反射素材やその他の装飾物は認められない。"}, {"type": "rule", "art_no": "4", "art_title": "チーム（Teams）", "sec_no": "4-4-4", "body": "４-４-４　ゲーム中、\nプレーヤーはいかなる商業的、宣伝的、チャリティー目的の名前やマーク、ロゴやその他特定できるものを体、髪の毛、その他の場所に表示させてはならない。"}, {"type": "rule", "art_no": "4", "art_title": "チーム（Teams）", "sec_no": "4-4-5", "body": "４-４-５  本条に記載のない、その他の身につけるものについては、FIBA テクニカルコミッションによって承認されなければならない。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-1-2", "body": "12-１-２　ヘルドボールは、両\nチームの１人あるいはそれ以上のプレーヤーがボールに片手または両手をしっかりとかけて、どちらのプレーヤーも乱暴にしなければそのボールのコントロールを得られないときに宣せられる。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-2-2", "body": "12-２-２　同じ\nチームの２人のプレーヤーがサークルのまわりに隣り合わせて位置したときは、相手チームから要望があれば、一方の位置は譲らなければならない。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-2-3", "body": "12-２-３ 審判は、両プレーヤーの間で、両者がジャンプをしても届かない高さまでまっすぐ上にボールをトスする。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-2-4", "body": "12-２-４ ボールが下降を始めた後で、少なくともどちらかのジャンパーによって片手または両手でタップされなければならない。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-2-5", "body": "12-２-５　どちらのジャンパーも、\nボールが正当にタップされる前にそのポジション（位置）を離れてはならない。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-2-6", "body": "12-２-６　どちらのジャンパーも、ジャンパー以外のプレーヤーかコートに\nボールが触れるまで、ボールをキャッチしてはならないし、２回までしかタップすることはできない。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-2-7", "body": "12-２-７ ボールがどちらのジャンパーにもタップされなかった場合は、ジャンプボールはやり直しになる。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-2-8", "body": "12-２-８　ボールがタップされるまで、ジャンパー以外の\nプレーヤーは体のどの部分もサークルのラインに触れたり、越えたりしてはならない（ライン上のシリンダーを含む）。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-6-2", "body": "12-６-２　ジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかった\nチームが、最初のオルタネイティングポゼッションのスローインの権利を得る。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-6-3", "body": "12-６-３　それぞれのクォーターやオーバータイムの終了時点で、次のオルタネイティングポゼッションの権利を与えられる\nチームが、スコアラーズテーブルの反対側のセンターラインの延長線上からのスローインを行うことでその次のクォーターやオーバータイムを始める。ただし、フリースローやスローインの罰則が与えられる場合を除く。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-6-4", "body": "12-６-４　オルタネイティングポゼッションによって次にスローインの権利を与えられるチームは、オルタネイティングポゼッションアローが相手\nチームのバスケットを向いていることで示され る。オルタネイティングポゼッションアローの向きはオルタネイティングポゼッションのスローインが終わり次第、速やかに変えられる。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-6-5", "body": "12-６-５　オルタネイティングポゼッションのスローインの間にその\nチームがバイオレーションを宣せられたとき、そのチームはオルタネイティングポゼッションのスローインの権利を失う。オルタネイティングポゼッションアローの向きは速やかに変えられ、次のジャンプボールシチュエーションのときは、バイオレーションを宣せられたチームの相手チームがオルタネイティングポゼッションのスローインの権利を得ることが示される。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション（Jump ball and alternating possession）", "sec_no": "12-6-6", "body": "12-６-６ どちらかのチームによるファウルが以下の状況で起きたとき："}, {"type": "rule", "art_no": "14", "art_title": "ボールのコントロール（Control of the ball）", "sec_no": "14-1", "body": "14-１　定義14-１-１ チームコントロール（\nチームがボールをコントロールしていること）は、そのチームのプレーヤーがライブのボールを持つかドリブルをしたとき、あるいはライブのボールを与えられたときに始まる。"}, {"type": "rule", "art_no": "14", "art_title": "ボールのコントロール（Control of the ball）", "sec_no": "14-1-2", "body": "14-１-２ チームコントロールは以下のときに継続する："}, {"type": "rule", "art_no": "14", "art_title": "ボールのコントロール（Control of the ball）", "sec_no": "14-1-3", "body": "14-１-３ チームコントロールは以下のときに終了する："}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー（Player in the act of shooting）", "sec_no": "15-1", "body": "15-１　定義15-１-１ 「ショット」とは、プレーヤーが片手または両手でボールを持ち、その後、相手\nチームのバスケットに向けてボールを投げることをいう。"}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー（Player in the act of shooting）", "sec_no": "15-1-2", "body": "15-１-２　動きながらではない\nショットの動作（アクトオブシューティング）とは："}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー（Player in the act of shooting）", "sec_no": "15-1-3", "body": "15-１-３　バスケットへのドライブでのひと続きの動作あるいはその他の動きながらの\nショットの動作（アクトオブシューティング）とは："}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー（Player in the act of shooting）", "sec_no": "15-1-4", "body": "15-１-４　ボールを持ったプレーヤーが競技規則で許された範囲で踏んだ歩数と\nショットの動作（アクトオブシューティング）との間に関係はない。"}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー（Player in the act of shooting）", "sec_no": "15-1-5", "body": "15-１-５　ショットの動作（アクトオブシューティング）の最中にプレーヤーが相手プレーヤーによって片腕または両腕をつかまれることで、得点を妨げられることがある。このとき、\nボールがプレーヤーの片手または両手から離れることは必須ではない。"}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー（Player in the act of shooting）", "sec_no": "15-1-6", "body": "15-１-６　ショットの動作（アクトオブシューティング）中のプレーヤーが、ファウルをされた後でボールをパスしたとき、その\nプレーヤーはアクトオブシューティング中であるとは見なされなくなる。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-1-2", "body": "16-１-２ ボールの一部が少しでもリングの内側の上面より下にかかっている場合は、そのボールはバスケットの中にあるものとみなされる。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-2-2", "body": "16-２-２　誤ってでも偶然にでも自\nチームのバスケットにボールを入れてしまったゴールは、相手チームに２点が与えられ、相手チームのそのときコート上にいるキャプテンの得点として記録される。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-2-3", "body": "16-２-３　故意に自\nチームのバスケットにボールを入れるゴールはバイオレーションであり、得点は認められない。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-2-4", "body": "16-２-４ ボールが下からバスケットに入り完全に通過したときはバイオレーションになる。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-2-5", "body": "16-２-５ スローインあるいは最後のフリースローの後のリバウンドのときに、ボールをつかんでショットをするためには、最低でもゲームクロックあるいはショットクロックが0.3 秒以上を表示していなければならない。ゲームクロックまたはショットクロックに0.2 秒あるいは0.1 秒が表示されている場合、得点するために有効なゴールは、ボールをタップするか直接ダンクするかのみで、その場合でもゲームクロックまたはショットクロックに0.0 秒が表示されたときにプレーヤーの片手または両手はボールに触れていてはならない。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-1-2", "body": "17-１-２ スローインは："}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-2", "body": "17-２-２ プレーヤーは、バックボードの真後ろを除く、規則の違反（ファウルやバイオレーション）が起こった場所もしくはゲームが止められた場所に最も近いアウトオブバウンズからスローインを行う。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-3", "body": "17-２-３ 第１クォーター以外の全てのクォーターや全てのオーバータイムを始めるスローインを行う場合は、スコアラーズテーブルの反対側のセンターラインの延長線上から行う。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-4", "body": "17-２-４　第４クォーター、各オーバータイムでゲームクロックが２:00 あるいはそれ以下を表示しているとき、バックコートからスローインを与えられることになっているチームに認められたタイムアウトの後で、その\nチームのヘッドコーチは、フロントコートのスローインラインからのスローインでゲームを再開するか、バックコートのゲームが止められた場所に最も近いアウトオブバウンズからのスローインでゲームを再開するかを選択することができる。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-5", "body": "17-２-５　ライブのボールをコントロールしている\nチームのプレーヤーあるいはボールが与えられることになっていたチームのプレーヤーがパーソナルファウルを宣せられた場合、ファウルが起こった場所に最も近いアウトオブバウンズからのスローインで再開される。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-6", "body": "17-２-６　テクニカルファウルのあとはルールの中で別途規定がある場合を除き、\nゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからスローインで再開される。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-7", "body": "17-２-７　アンスポーツマンライクファウルまたはディスクォリファイングファウルのあとはルールの中で別途規定がある場合を除き、\nゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからスローインで再開される。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-8", "body": "17-２-８　ファイティングの場合は、\nゲームは第39 条に定められているとおりに再開される。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-9", "body": "17-２-９　ボールがバスケットに入ってもゴールや最後のフリースローの得点が認められない場合、\nゲームはフリースローラインの延長線上のアウトオブバウンズからスローインで再開される。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-10", "body": "17-２-10 ゴールあるいは最後のフリースローが成功した後のスローインは："}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-3-2", "body": "17-３-２　コート内の\nプレーヤーは、次のことをしてはならない："}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-3-3", "body": "17-３-３　第４クォーター、各オーバータイムでゲームクロックが２:00 あるいはそれ以下を表示しているときに、スローインが行われる場合、\n審判はスローインのボールを与えるときにイリーガルバウンダリラインクロッシングシグナル（プリベンティブシグナル）を使用して警告を与える。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-2", "body": "18-２-２ タイムアウトは、「タイムアウトが認められる時機」に与えることができる。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-3", "body": "18-２-３ 「タイムアウトが認められる時機」は、次のときに始まる："}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-4", "body": "18-２-４　「タイムアウトが認められる時機」は、スローインを行うプレーヤーに\nボールが与えられたとき、あるいは最初のフリースローでフリースローを行うプレーヤーにボールが与えられたときに終わる。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-5", "body": "18-２-５ それぞれのチームに認められるタイムアウトの回数は："}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-6", "body": "18-２-６ 使わなかったタイムアウトを、次のハーフまたはオーバータイムに持ち越すことはできない。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-7", "body": "18-２-７　両チームの\nヘッドコーチもしくはファーストアシスタントコーチがタイムアウトを請求したときは、先に請求したチームのタイムアウトとする。ただし、規則の違反（ファウルやバイオレーション）が宣せられていない状況で、相手チームがゴールで得点したときに認められるタイムアウトは、請求の後先に関係なく得点されたチームのタイムアウトとする。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-8", "body": "18-２-８ 第４クォーター、各オーバータイムでゲームクロックが２:00 あるいはそれ以下を表示しているときにゴールが成功してゲームクロックが止められた場合、得点したチームにタイムアウトは認められない。ただし、審判がゲームを中断させた場合を除く。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3-2", "body": "18-３-２ タイムアウトの請求は、タイマーが審判に知らせるためにブザーを鳴らす前であれば取り消すことができる。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3-3", "body": "18-３-３ タイムアウトの始まりと終わり："}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3-4", "body": "18-３-４　タイムアウトが認められる時機が始まったとき、タイマーはブザーを鳴らし、\nチームがタイムアウトを請求していることを審判に知らせる。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3-5", "body": "18-３-５　タイムアウト中、もしくは第２クォーター、第４クォーター、各オーバータイムの開始前のプレーのインターバル中、\nプレーヤーはコートから離れてチームベンチに座ってもよいし、チームベンチに座ることを許された人物はチームベンチエリアの近くであればコートに入ってもよい。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3-6", "body": "18-３-６　最初のフリースローの\nボールがフリースローシューターに与えられた後にタイムアウトの請求があった場合、以下のときにどちらのチームにもタイムアウトが認められる："}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-2-2", "body": "19-２-２ 「交代が認められる時機」は、次のときに始まる："}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-2-3", "body": "19-２-３　「交代が認められる時機」は、スローインを行うプレーヤーに\nボールが与えられたとき、あるいは最初のフリースローでフリースローを行うプレーヤーにボールが与えられたときに終わる。"}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-2-4", "body": "19-２-４　次の場合を除き、交代が認められたときは、ゲームクロックが一度動いたあと、次にゲームクロックが止められ、\nボールがデッドとなるまで、交代要員となったプレーヤーは再びプレーヤーとなることはできず、プレーヤーとなった交代要員は再び交代要員となることはできない："}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-2-5", "body": "19-２-５ 第４クォーター、各オーバータイムでゲームクロックが２:00 あるいはそれ以下を表示していてゴールが成功してゲームクロックが止められた場合、得点したチームに交代は認められない。"}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-2-6", "body": "19-２-６　プレーヤーが何らかの手当てや介助を受ける場合、その\nチームのコート上のプレーヤーの数が５人未満になってしまう場合を除いて、そのプレーヤーは交代をしなければならない。"}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-3", "body": "19-３　手順19-３-１ 交代を請求できるのは、交代要員自身のみである。\nヘッドコーチやファーストアシスタントコーチではなく、交代要員はスコアラーズテーブルへ行き、定められたシグナルを手で示す、あるいは交代席に座ることで、はっきりと交代の申し出を伝えなければならない。このとき交代要員はすぐにプレーをする準備ができていなければならない。"}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-3-2", "body": "19-３-２ 交代の申し出は、タイマーが審判に知らせるためにブザーを鳴らす前であれば取り消すことができる。"}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-3-3", "body": "19-３-３ 交代が認められる時機が始まったとき、タイマーはブザーを鳴らし、交代の申し出があることを審判に知らせる。"}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-3-4", "body": "19-３-４ 交代要員は、審判が笛を鳴らして交代のシグナルおよびコートに招き入れるシグナルをするまでは、境界線の外にいなければならない。"}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-3-5", "body": "19-３-５　交代要員となる\nプレーヤーは、審判やタイマーに知らせずに直接チームベンチに戻ることができる。"}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-3-6", "body": "19-３-６ 交代はできる限り速く行わなければならない。"}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-3-7", "body": "19-３-７　タイムアウトあるいはハーフタイムを除くプレーのインターバルの間に交代を申し出る場合、交代要員は\nゲームに加わる前にタイマーに知らせなければならない。"}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-3-8", "body": "19-３-８ 次の場合、フリースローシューターであっても交代しなければならない："}, {"type": "rule", "art_no": "19", "art_title": "交代（Substitutions）", "sec_no": "19-3-9", "body": "19-３-９　最初のフリースローの\nボールがフリースローシューターに与えられた後に交代の申し出があった場合、以下のときにどちらのチームにも交代が認められる："}, {"type": "rule", "art_no": "20", "art_title": "ゲームの没収（Game lost by forfeit）", "sec_no": "20-2-2", "body": "20-２-２　２ゲーム（ホーム＆アウェー）合計得点で競う場合や、２ゲーム先取（３ゲーム中）のプレーオフの場合は、第１ゲーム、第２ゲームあるいは第３\nゲームのいずれかが没収により負けとなったチームは、そのシリーズあるいはプレーオフ自体も没収により負けとなる。３ゲーム先取（５ゲーム中）や４ゲーム先取（７ゲーム中）のプレーオフにはこの規則は適用されない。"}, {"type": "rule", "art_no": "20", "art_title": "ゲームの没収（Game lost by forfeit）", "sec_no": "20-2-3", "body": "20-２-３　１つの大会で２回目の没収となったチームは、その大会から失格となり、その\nチームがそれまで行ったゲームの結果は無効になる。"}, {"type": "rule", "art_no": "21", "art_title": "ゲームの途中終了 （Game lost by default）", "sec_no": "21-2-2", "body": "21-２-２ ２ゲーム（ホーム＆アウェー）の合計得点で競う場合は、第１ゲームあるいは第２ゲームを途中終了で負けたチームはそのシリーズ自体も途中終了により敗退になる。"}, {"type": "rule", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ（Player out-of-bounds and ball out-of-bounds）", "sec_no": "23-1-2", "body": "23-１-２　ボールがアウトオブバウンズになるのは、\nボールが："}, {"type": "rule", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ（Player out-of-bounds and ball out-of-bounds）", "sec_no": "23-2-2", "body": "23-２-２ ボールが境界線に触れているプレーヤーまたは境界線の外にいるプレーヤーに触れてアウトオブバウンズになったときは、そのプレーヤーがボールをアウトオブバウンズにしたことになる。"}, {"type": "rule", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ（Player out-of-bounds and ball out-of-bounds）", "sec_no": "23-2-3", "body": "23-２-３ ヘルドボールの間にプレーヤーがアウトオブバウンズかバックコートに触れてしまった場合は、ジャンプボールシチュエーションとなる。"}, {"type": "rule", "art_no": "24", "art_title": "ドリブル（Dribbling）", "sec_no": "24-1-2", "body": "24-１-２ ドリブルが始まるのは、コート上でライブのボールをコントロールしたプレーヤーが、ボールをコートに投げたり叩いたり転がしたり、弾ませたりして、その後、他のプレーヤーが触れないうちに再びそのボールに触れたときである。"}, {"type": "rule", "art_no": "24", "art_title": "ドリブル（Dribbling）", "sec_no": "24-1-3", "body": "24-１-３ コート上でライブのボールをコントロールしているプレーヤーが、誤ってボールのコントロールを失い、再びそのボールをコントロールしたときは、ボールをファンブルしたことになる。"}, {"type": "rule", "art_no": "24", "art_title": "ドリブル（Dribbling）", "sec_no": "24-1-4", "body": "24-１-４ 以下の行為はドリブルではない："}, {"type": "rule", "art_no": "25", "art_title": "トラベリング（Travelling）", "sec_no": "25-1-2", "body": "25-１-２ ピボットとは、コート上でライブのボールを持ったプレーヤーが、片方の足（ピボットフット）はコートとの接点を変えずに、もう片方の足で任意の方向に何度でもステップを踏む正当な動きである。"}, {"type": "rule", "art_no": "25", "art_title": "トラベリング（Travelling）", "sec_no": "25-2-2", "body": "25-２-２ プレーヤーがコートに倒れること、横たわること、座ること："}, {"type": "rule", "art_no": "26", "art_title": "３秒ルール（３seconds）", "sec_no": "26-1-2", "body": "26-１-２ 以下のプレーヤーについてはバイオレーションにならない："}, {"type": "rule", "art_no": "26", "art_title": "３秒ルール（３seconds）", "sec_no": "26-1-3", "body": "26-１-３　制限区域内にいる\nプレーヤーは、制限区域の外のコートに両足をつけなければ、制限区域から出たことにはならない。"}, {"type": "rule", "art_no": "28", "art_title": "８秒ルール（8 seconds）", "sec_no": "28-1-2", "body": "28-１-２ ボールがフロントコートに進められたとは、以下のことをいう："}, {"type": "rule", "art_no": "28", "art_title": "８秒ルール（8 seconds）", "sec_no": "28-1-3", "body": "28-１-３ 以下のようなことが起こった結果、それまでボールをコントロールしていたチームに引き続きバックコートでのスローインが与えられた場合、８秒は継続される："}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック（Shot clock）", "sec_no": "29-1-2", "body": "29-１-２　ショットクロックの終了間際にショットがなされ、その\nボールが空中にある間にショットクロックのブザーが鳴った場合："}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック（Shot clock）", "sec_no": "29-2-2", "body": "29-２-２ 審判が次の理由でゲームを止めたときは、ショットクロックをリセットする："}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック（Shot clock）", "sec_no": "29-2-3", "body": "29-２-３　審判が、ボールをコントロールしている\nチームのファウルやバイオレーション（ボールがアウトオブバウンズになった場合も含む）でゲームを止め、スローインが相手チームに与えられる度に、ショットクロックはリセットされる。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック（Shot clock）", "sec_no": "29-2-4", "body": "29-２-４　ボールをコントロールしているチームにテクニカルファウルが宣せられたとき、\nゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからスローインで再開される。ショットクロックはリセットされることなく、継続される。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック（Shot clock）", "sec_no": "29-2-5", "body": "29-２-５　第４クォーター、オーバータイムでゲームクロックが２:00 あるいはそれ以下を表示しているとき、バックコートからスローインを与えられることになっているチームに認められたタイムアウトの後で、その\nチームのコーチは、フロントコートのスローインラインからのスローインでゲームを再開するか、バックコートのゲームが止められた場所に最も近いアウトオブバウンズからのスローインでゲームを再開するかを選択することができる。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック（Shot clock）", "sec_no": "29-2-6", "body": "29-２-６ アンスポーツマンライクファウルあるいはディスクォリファイングファウルに含まれる罰則で、スローインがフロントコートのスコアラーズテーブルの反対側のスローインラインから行われるとき、ショットクロックは14 秒にリセットされる。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック（Shot clock）", "sec_no": "29-2-7", "body": "29-２-７　ボールが相手\nチームのバスケットのリングに触れたとき、ショットクロックは以下のとおりにリセットされる："}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック（Shot clock）", "sec_no": "29-2-8", "body": "29-２-８　一方の\nチームがボールをコントロールしているとき、あるいはどちらのチームもボールのコントロールを得ていないときに、ショットクロックのブザーが誤って鳴った場合、ブザーはなかったものとし、ゲームは続行される。"}, {"type": "rule", "art_no": "30", "art_title": "ボールをバックコートに返すこと（Ball returned to the backcourt）", "sec_no": "30-1-2", "body": "30-１-２ 以下の場合、ボールは不当にバックコートに返されたことになる。"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス（Goaltending and Interference）", "sec_no": "31-2-2", "body": "31-２-２　フリースローのショットで、バスケットに向かっている\nボールがリングに触れる前にプレーヤーがボールに触れるとゴールテンディングになる。"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス（Goaltending and Interference）", "sec_no": "31-2-3", "body": "31-２-３ ゴールテンディングの規定は以下の状況になるまで適用される："}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス（Goaltending and Interference）", "sec_no": "31-2-4", "body": "31-２-４ 以下のときにインタフェアレンスになる："}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス（Goaltending and Interference）", "sec_no": "31-2-5", "body": "31-２-５ 次のいずれかのとき："}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス（Goaltending and Interference）", "sec_no": "31-3-2", "body": "31-３-２ ディフェンスのプレーヤーがバイオレーションをした場合、オフェンスのチームに以下の得点が与えられる："}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス（Goaltending and Interference）", "sec_no": "31-3-3", "body": "31-３-３ ディフェンスのプレーヤーが、最後のフリースローの間にバイオレーションをした場合は、オフェンスのチームに１点が与えられ、そのディフェンスのプレーヤーにテクニカルファウルが宣せられる。"}, {"type": "rule", "art_no": "32", "art_title": "ファウル（Fouls）", "sec_no": "32-1-2", "body": "32-１-２ １チームに記録されるファウルの数に制限はない。"}, {"type": "rule", "art_no": "32", "art_title": "ファウル（Fouls）", "sec_no": "32-1-3", "body": "32-１-３ ・クォーターやオーバータイムの終了を知らせるゲームクロックのブザーが鳴り、"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念（Contact: General principles）", "sec_no": "33-10", "body": "33-10　ノーチャージセミサークルエリアノーチャージセミサークル\nエリアは、バスケット近辺でのチャージングやブロッキングの特別な規則の適用のため、コート上に指定されたエリアのことをいう。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念（Contact: General principles）", "sec_no": "33-11", "body": "33-11　手や腕で相手\nチームのプレーヤーに触れることプレーヤーが相手チームのプレーヤーに手や腕で触れることがあっても、必ずしもファウルではない。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念（Contact: General principles）", "sec_no": "33-12", "body": "33-12 ポストプレーバーティカリティ（シリンダーの概念）の考え方は、ポストプレーにも適用される。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念（Contact: General principles）", "sec_no": "33-13", "body": "33-13　後方からの不当なガード後方からの不当なガードとは、ディフェンスのプレーヤーが、相手\nチームのプレーヤーの後ろから起こす不当な体の触れ合いのことをいう。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念（Contact: General principles）", "sec_no": "33-14", "body": "33-14 ホールディングホールディングとは、相手プレーヤーの自由な動き（フリーダムオブムーブメント）を妨げる不当な体の触れ合いのことをいう。この体の触れ合い（押さえること）はどの部分を使っていてもホールディングになる。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念（Contact: General principles）", "sec_no": "33-15", "body": "33-15　プッシングプッシングとは、相手\nチームのプレーヤーがボールを持っていてもいなくても、手や体で相手を無理に押しのけたり押して動かそうとしたりする不当な体の触れ合いのことをいう。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念（Contact: General principles）", "sec_no": "33-16", "body": "33-16 フェイク（ファウルをされたと欺くこと）"}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル（Personal foul）", "sec_no": "34-1-2", "body": "34-１-２　スローインファウルとは、第4 クォーターや各オーバータイムで、ゲームクロックが2:00 あるいはそれ以下を表示していて、アウトオブバウンズからのスローインを行うときに、まだ\nボールが審判あるいはスローインを行うプレーヤーの手にある間に、コート上のディフェンスのプレーヤーが相手プレーヤーに起こすパーソナルファウルである。"}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル（Personal foul）", "sec_no": "34-2-1", "body": "34-２-１ ショットの動作（アクトオブシューティング）中ではないプレーヤーがファウルをされたとき："}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル（Personal foul）", "sec_no": "34-2-2", "body": "34-２-２ ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされたときは、ファウルをされたプレーヤーに以下のとおりフリースローが与えられる："}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル（Personal foul）", "sec_no": "34-2-3", "body": "34-２-３ スローインファウルが宣せられた場合："}, {"type": "rule", "art_no": "35", "art_title": "ダブルファウル（Double foul）", "sec_no": "35-1-2", "body": "35-１-２ ２つのファウルがダブルファウルであるとみなすためには、以下の条件が求められる："}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル（TF：Technical foul）", "sec_no": "36-1-2", "body": "36-１-２ 両チームは勝利を得るために全力を尽くさなければならないが、これはスポーツマンシップとフェアプレーの精神に基づいたものでなければならない。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル（TF：Technical foul）", "sec_no": "36-1-3", "body": "36-１-３ 競技規則の精神と目的に対して、意図的にあるいは繰り返し行われる非協力的な行為は、テクニカルファウルとみなされる。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル（TF：Technical foul）", "sec_no": "36-1-4", "body": "36-１-４　審判は、明らかに意図的ではなく\nゲームに直接的に影響のない軽微な規則の違反（ファウルやバイオレーション）については、テクニカルファウルを科さずに警告を与えることがある。ただし、警告の後もその同じ違反が繰り返し続く場合はその限りではない。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル（TF：Technical foul）", "sec_no": "36-1-5", "body": "36-１-５ ボールがいったんライブになってから、前に起こったこの規則に該当する違反が見つかった場合は、見つかったときにテクニカルファウルがあったものとして処置をする。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル（TF：Technical foul）", "sec_no": "36-2-2", "body": "36-２-２　チームベンチに座ることを許された人物によるテクニカルファウルは、審判、コミッショナー（同席している場合）、テーブルオフィシャルズ、相手チームに対して失礼な態度で接したり、体に触れたりする行為、また\nゲームの進行や運営に支障をもたらしたりする規則の違反のことをいう。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル（TF：Technical foul）", "sec_no": "36-2-3", "body": "36-２-３　テクニカルファウルを２個あるいはアンスポーツマンライクファウルを２個、もしくはテクニカルファウルとアンスポーツマンライクファウルを１個ずつ記録された\nプレーヤーは失格・退場（ゲームディスクォリフィケーション）になる。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル（TF：Technical foul）", "sec_no": "36-2-4", "body": "36-２-４ ヘッドコーチは以下の場合、失格・退場（ゲームディスクォリフィケーション）になる。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル（TF：Technical foul）", "sec_no": "36-2-5", "body": "36-２-５　プレーヤーもしくは\nヘッドコーチが、36-２-３あるいは36-２-４に則り失格・退場処分となる場合、テクニカルファウルによる罰則のみが与えられ、失格・退場による追加の罰則は与えられない。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル（TF：Technical foul）", "sec_no": "36-3-2", "body": "36-３-２　相手チームに１本のフリースローが与えられ、\nゲームは次のように再開される："}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル（UF：Unsportsmanlike foul）", "sec_no": "37-1-2", "body": "37-１-２ 審判は、プレーヤーの起こしたアクションのみを基準として、ゲームをとおして一貫性を持ってアンスポーツマンライクファウルの判断を行わなければならない。"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル（UF：Unsportsmanlike foul）", "sec_no": "37-2-2", "body": "37-２-２ ファウルをされたプレーヤーにフリースローが与えられたあと："}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル（UF：Unsportsmanlike foul）", "sec_no": "37-2-3", "body": "37-２-３　テクニカルファウルを２個あるいはアンスポーツマンライクファウルを２個、もしくはテクニカルファウルとアンスポーツマンライクファウルを１個ずつ記録された\nプレーヤーは失格・退場（ゲームディスクォリフィケーション）になる。"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル（UF：Unsportsmanlike foul）", "sec_no": "37-2-4", "body": "37-２-４ プレーヤーが37-２-３に則り失格・退場になる場合、アンスポーツマンライクファウルによる罰則のみが与えられ、失格・退場による追加の罰則は与えられない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル（DQ：Disqualifying foul）", "sec_no": "38-1-2", "body": "38-１-２　ヘッドコーチにディスクォリファイングファウルが記録された場合は、スコアシートに記入されているファーストアシスタントコーチが\nヘッドコーチの役目を引き継ぐ。ファーストアシスタントコーチがスコアシートに記入されていない場合は、スコアシートに示されたキャプテン（CAP）がヘッドコーチの役目を引き継ぐ。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル（DQ：Disqualifying foul）", "sec_no": "38-2-2", "body": "38-２-２　コート上もしくはその付近で、プレーヤーによる暴力行為が発生した場合は、\n審判は速やかにそれを止めさせる。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル（DQ：Disqualifying foul）", "sec_no": "38-2-3", "body": "38-２-３ 審判やテーブルオフィシャルズあるいは相手チームに対し、暴行を加えたプレーヤー、交代要員、コーチ、アシスタントコーチ、５個のファウルを宣せられたチームメンバー、チーム関係者は、速やかに失格・退場させられる。クルーチーフは、その事象を大会主催者に報告しなければならない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル（DQ：Disqualifying foul）", "sec_no": "38-2-4", "body": "38-２-４ 審判が許可をしたときのみ警備担当者はコートに入る。しかし、観客が明らかな暴力的な意図をもってコートに侵入する場合は、チームや審判、テーブルオフィシャルズを守るために、警備担当者は速やかにコートに入らなければならない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル（DQ：Disqualifying foul）", "sec_no": "38-2-5", "body": "38-２-５　コートやその周囲、出入口、通路、控室などの全ての\nエリアは、大会主催者の管理下にある。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル（DQ：Disqualifying foul）", "sec_no": "38-2-6", "body": "38-２-６ プレーヤー、チームベンチに座ることを許された人物による用具・器具を破損するおそれのある行為は、絶対に許してはならない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル（DQ：Disqualifying foul）", "sec_no": "38-3-2", "body": "38-３-２　規則により失格・退場処分を受けた当該者は、ゲームが終わるまで自\nチームの控室にとどまるか、または建物から出なければならない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル（DQ：Disqualifying foul）", "sec_no": "38-3-3", "body": "38-３-３ フリースローが以下のとおり与えられる："}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル（DQ：Disqualifying foul）", "sec_no": "38-3-4", "body": "38-３-４ 与えられるフリースローの数は以下のとおりである："}, {"type": "rule", "art_no": "39", "art_title": "ファイティング（Fighting）", "sec_no": "39-2-2", "body": "39-２-２　ヘッドコーチとファーストアシスタントコーチだけは、審判に協力して争いを止めるためであれば、抗争が起こったときや起こりそうなときでもチームベンチエリアから出てもよい。この場合は、\nヘッドコーチ、ファーストアシスタントコーチは失格・退場にはならない。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング（Fighting）", "sec_no": "39-2-3", "body": "39-２-３ ヘッドコーチやファーストアシスタントコーチがチームベンチエリアから出てコートに入ったのに争いを止めようとしなかったときは、失格・退場になる。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング（Fighting）", "sec_no": "39-3-2", "body": "39-３-２ 両チームの者がファイティングの規定によって失格・退場になり、他に適用されるファウルの罰則がない場合は、以下の方法でゲームを再開する。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング（Fighting）", "sec_no": "39-3-3", "body": "39-３-３ 全てのディスクォリファイングファウルは別添資料B８ー３に基づきスコアシートに記入される。ファイティングの規定によるディスクォリファイングファウルは、チームファウルに数えない。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング（Fighting）", "sec_no": "39-3-4", "body": "39-３-４ 抗争が起こったときや起こりそうなときに、コート上にいたプレーヤーのファウルに対する罰則は全て有効であり、第42 条「特別な処置をする場合」に則り処置される。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング（Fighting）", "sec_no": "39-3-5", "body": "39-３-５ 抗争が起こったときや起こりそうなときに、ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバーやチーム関係者の失格退場に対するファウルの罰則は全て有効であり、38-３-４の６項目に則り処置される。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場（Foul limits by a player/head coach and game disqualifications）", "sec_no": "40-1", "body": "40-１　審判により５個のファウルを宣せられた\nプレーヤーは速やかにコートから離れなければならない。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場（Foul limits by a player/head coach and game disqualifications）", "sec_no": "40-2", "body": "40-２　プレーヤー兼\nヘッドコーチがプレーヤーとして５個のファウルを宣せられた場合、プレーをすることはできないが、ヘッドコーチの役割は継続できる。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場（Foul limits by a player/head coach and game disqualifications）", "sec_no": "40-3", "body": "40-３　すでに５個のファウルを宣せられているプレーヤーにさらにファウルが宣せられた場合、\nヘッドコーチのファウルとしてスコアシートに「B」が記録される。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場（Foul limits by a player/head coach and game disqualifications）", "sec_no": "40-4", "body": "40-４　2 個のテクニカルファウル、あるいは2 個のアンスポーツマンライクファウル、もしくは1 個のテクニカルファウルと1 個のアンスポーツマンライクファウルを記録された\nプレーヤーは、タイマーによってゲームディスクォリフィケーション（GD）マーカーを示され、失格・退場となる。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場（Foul limits by a player/head coach and game disqualifications）", "sec_no": "40-5", "body": "40-５　自身のスポーツマンらしくない振る舞いによる2 個のテクニカルファウル「C」、あるいは3 個の「B」、もしくは2 個の「B」と1 個の「C」が記録された\nヘッドコーチは、タイマーによってゲームディスクォリフィケーション（GD）マーカーを示され、失格・退場となる。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場（Foul limits by a player/head coach and game disqualifications）", "sec_no": "40-6", "body": "40-６　失格・退場となったプレーヤー、交代要員、\nヘッドコーチ、アシスタントコーチ、５個のファウルを宣せられたプレーヤー、その他チームベンチに座ることを許されたメンバーは、直ちにゲームを離れ（30 秒以内）、ゲーム終了までチームの控室にとどまるか、または建物から出なければならない。"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則（Team fouls：Penalty）", "sec_no": "41-1-2", "body": "41-１-２ プレーのインターバル中に起こった全てのチームファウルは、次のクォーターあるいはオーバータイムに起こったものとみなされる。"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則（Team fouls：Penalty）", "sec_no": "41-1-3", "body": "41-１-３ 各オーバータイムに起こった全てのチームファウルは、第４クォーターに起こったものとみなされる。"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則（Team fouls：Penalty）", "sec_no": "41-2-2", "body": "41-２-２　ライブのボールをチームコントロールしている、あるいはボールを与えられることになっていた\nチームのプレーヤーがパーソナルファウルをしたときは、チームファウルの罰則は適用されず、相手チームのスローインになる。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合（Special situations）", "sec_no": "42-2-2", "body": "42-２-２ 全ての規則の違反（ファウルやバイオレーション）は起こった順序で処置される。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合（Special situations）", "sec_no": "42-2-3", "body": "42-２-３ 両チームに記録された全ての等しい罰則やダブルファウルの罰則は、起きた順序に従って相殺される。一度全ての罰則がスコアシートに記入されると、相殺した罰則は適用されない。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合（Special situations）", "sec_no": "42-2-4", "body": "42-２-４ テクニカルファウルが宣せられたときは、罰則の順序にとらわれることなく、さらにすでに行われている罰則の途中であっても、それらに関わらず先にテクニカルファウルの罰則の処置を行う。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合（Special situations）", "sec_no": "42-2-5", "body": "42-２-５ 最後に適用される罰則の一部であるボールのポゼッションの権利のみ適用され、それ以外の罰則にあるボールのポゼッションの権利は無効になる。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合（Special situations）", "sec_no": "42-2-6", "body": "42-２-６　最初のフリースロー、もしくはスローインによって一度\nボールがライブになった後は、それらの罰則は残りの罰則との相殺の対象とはならない。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合（Special situations）", "sec_no": "42-2-7", "body": "42-２-７ 全ての残りの罰則は、宣せられた順序で処置される。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合（Special situations）", "sec_no": "42-2-8", "body": "42-２-８　両チームに記録された罰則が等しく、全て相殺された場合は、\nゲームは次の方法で再開される。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー（Free throws）", "sec_no": "43-1-2", "body": "43-１-２ １個のファウルに対する罰則として与えられるフリースロー、あるいはフリースローとそれに続くスローインを、フリースローの「セット」という。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー（Free throws）", "sec_no": "43-2-2", "body": "43-２-２　テクニカルファウルや体の触れ合いのないディスクォリファイングファウルが宣せられたときは、ファウルをされた\nチームのヘッドコーチが指定するプレーヤーがフリースローシューターになる。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー（Free throws）", "sec_no": "43-2-3", "body": "43-２-３ フリースローシューターは："}, {"type": "rule", "art_no": "43", "art_title": "フリースロー（Free throws）", "sec_no": "43-2-4", "body": "43-２-４　フリースローのとき、リバウンドの位置を占める\nプレーヤーは奥行き１m のそれぞれのスペースに交互に位置する権利を有する。（図７参照）"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー（Free throws）", "sec_no": "43-2-6", "body": "43-２-６　あとにフリースローの「セット」が続く場合、あるいはフリースローの後スローインで再開することが決められている場合は、フリースローシューター以外の\nプレーヤーは、フリースローラインの延長線上より後ろでスリーポイントラインの外側にいなければならない。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー（Free throws）", "sec_no": "43-3-2", "body": "43-３-２ フリースローが成功し、フリースローシューター以外のプレーヤーがバイオレーションを宣せられた場合："}, {"type": "rule", "art_no": "43", "art_title": "フリースロー（Free throws）", "sec_no": "43-3-3", "body": "43-３-３ フリースローが成功せず："}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-1-1", "body": "44-１-１ 審判は訂正できる誤りに気がついたら、どちらのチームにも不利にならない限り速やかにゲームを止めることができる。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-1-2", "body": "44-１-２ 誤りが起きたあと、それが認識されるまでに起きた宣せられたファウルや経過した競技時間、その他起こった全てのことは有効である。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-1-3", "body": "44-１-３ 誤りを訂正した後は、誤りを訂正するために審判が止めた時点からゲームを再開する。ボールは、誤りを訂正するためにゲームが止められた時点でボールの権利を有していたチームに与えられる。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-3-2", "body": "44-３-２　これらの誤りは\nゲームの終了を知らせるゲームクロックのブザーが鳴り、ボールがデッドとなった後では訂正することはできない。ただし、誤りが、最後に審判が何らかの理由でゲームを止めたときからゲームの終了を知らせるゲームクロックのブザーが鳴るまでの間に起きた場合、この誤りはゲーム終了後速やかに訂正され、チームはコートもしくはチームベンチエリアにとどまらなければならない。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-3-3", "body": "44-３-３ まだ訂正可能な誤りが認識されたあと："}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-4-2", "body": "44-４-２ 与えるべきフリースローを与えていなかった場合："}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-4-3", "body": "44-４-３ 審判による指定なく誤ったプレーヤーがフリースローを行ったとき："}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-4-4", "body": "44-４-４ 審判が誤ったプレーヤーを指定してフリースローを行ったとき："}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-4-5", "body": "44-４-５ 誤って得点を与えたり 、取り消したりしたとき："}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-4-6", "body": "44-４-６　誤ったプレーヤー、\nヘッドコーチ、またはチームに対するファウルを伝達したとき："}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-4-7", "body": "44-４-７ スコアシートの記録に誤りが生じたとき"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-4-8", "body": "44-４-８ ゲームクロックを正しくスタートまたはストップできなかったとき、あるいは誤った競技時間を設定してしまったとき（機材の故障を含む）："}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り（Correctable errors）", "sec_no": "44-6-2", "body": "44-６-２ 次の状況のあと、ショットクロックは訂正することはできない："}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー（Officials、table officials and commissioner）", "sec_no": "45-7", "body": "45-７  審判とテーブルオフィシャルズは、それぞれ服装を統一すること。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限（Crew chief：Duties and powers）", "sec_no": "46-10", "body": "46-10 控室でスコアシートにサインをする前に、スコアシートの裏面に以下の項目を記載する："}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限（Crew chief：Duties and powers）", "sec_no": "46-11", "body": "46-11 審判の意見が一致しないときなど必要なときは、最終的な決定を下す。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限（Crew chief：Duties and powers）", "sec_no": "46-12", "body": "46-12　インスタントリプレーシステム（IRS）が使用される\nゲームについては、別添資料F を参照すること。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限（Crew chief：Duties and powers）", "sec_no": "46-13", "body": "46-13 第１クォーターおよび第３クォーターが始まる３分前と１分30 秒前であることをタイマーから知らされたあと、クルーチーフは笛を吹く。また、第２クォーター、第４クォーターおよびオーバータイムが始まる30 秒前も同様に、笛を吹く。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限（Crew chief：Duties and powers）", "sec_no": "46-14", "body": "46-14 競技規則に示されていないあらゆる事項に決定を下す権限を持つ。"}];
const IMPL_DATA = [{"type": "impl", "art_no": "4", "art_title": "チーム４-１ 条文：同じチームの全てのプレーヤーのアンダーシャツやアンダーショーツを含む腕や脚のコンプレッションウェア、ヘッドギア、リストバンド、ヘッドバンド、テーピングは全て同じ単色でなければならない。", "sec_no": "4-4", "body": "４-４ 条文：スカーフスタイルのヘッドバンドを身につけることは認められない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助５-１ 条文：プレーヤーが怪我をした、怪我をしたように見られた、もしくは介助が必要だと見られ、結果として自チームのチームベンチに座ることを許されたいずれかの人物", "sec_no": "5-5", "body": "５-５ 条文：自チームのチームベンチに座ることを許された人物は、チームベンチエリアに留まっている間に自チームのプレーヤーを介助することができる。介助によって速やかなゲームの再開に遅延をきたさない場合、そのプレーヤーは介助を受けたとはみなされず、交代する必要はない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助５-１ 条文：プレーヤーが怪我をした、怪我をしたように見られた、もしくは介助が必要だと見られ、結果として自チームのチームベンチに座ることを許されたいずれかの人物", "sec_no": "5-12", "body": "５-12 条文：ドクターが、重度の怪我をしたプレーヤーをコート外へ搬送することがそのプレーヤーにとって危険だと判断した場合、プレーヤーの搬送ついての時間制限はない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助５-１ 条文：プレーヤーが怪我をした、怪我をしたように見られた、もしくは介助が必要だと見られ、結果として自チームのチームベンチに座ることを許されたいずれかの人物", "sec_no": "5-14", "body": "５-14 条文：プレーヤーが怪我をしたか出血をしている、あるいは傷口が開いていて速やかに（約15秒以内に）プレーを続行することができない、もしくは自チームのチームベンチに座ることを許されたいずれかの人物から介助を受けた場合、そのプレーヤーは交代をしなければならない。ゲームクロックが止まってから再び動き出すまでの間に、タイムアウトがいずれかのチームに認められ、怪我をしたプレーヤーがそのタイムアウト中に回復した、あるいは介助を完了した場合は、タイマーがタイムアウト終了のブザーを鳴らす前に審判が怪我をした、あるいは介助を受けたプレーヤーに代わる交代要員を招き入れていなければ、そのプレーヤーはプレーを続行することができる。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助５-１ 条文：プレーヤーが怪我をした、怪我をしたように見られた、もしくは介助が必要だと見られ、結果として自チームのチームベンチに座ることを許されたいずれかの人物", "sec_no": "5-16", "body": "５-16 条文：ヘッドコーチによってゲームの最初に出場すると指定されたプレーヤーが怪我をした場合、交代をすることができる。またあらゆる怪我によって複数のフリースローの間に処置を受けるプレーヤーは交代しなければならない。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限７-１ 条文：ゲーム開始予定時刻の遅くとも40分前に、各チームのヘッドコーチあるいは代理の関係者はスコアラーに、ゲームに出場するプレーヤーの氏名と番号、キャプテンとするプレーヤーの氏名、ヘッドコーチとファーストアシスタントコーチの氏名を提出しなければならない。", "sec_no": "7-4", "body": "７-４ 条文：遅くともゲーム開始予定時刻の10分前までに、各チームのヘッドコーチは最初に出場する５人のプレーヤーを申し出る。ゲーム開始までにスコアラーはその５人のプレーヤーに誤りがないかを確認し、もし誤りがある場合は速やかに近くにいる審判に報告する。ゲーム開始までに誤りが発見された場合は、正しいプレーヤーに入れ替えた上でゲームを開始する。ゲーム開始後に発見された場合は、誤りはなかったものとする。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了９-１ 条文：各チームが最低５人のプレーヤーをコート上に揃えなければゲームは開始されない。", "sec_no": "9-4", "body": "９-４ 条文：第9条は、チームがどちらのバスケットを防御しどちらのバスケットに攻撃するかを規定している。混乱によって、両チームが共に誤ったバスケットに攻撃あるいは防御をすることでいずれかのクォーターやオーバータイムが始まった場合、状況が発見されたら、どちらのチームにも不利にならない状況で、すぐに修正する。ゲームが止められるまでに認められた得点や動いた時間、宣せられたファウルなどは全て有効となる。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了９-１ 条文：各チームが最低５人のプレーヤーをコート上に揃えなければゲームは開始されない。", "sec_no": "9-6", "body": "９-６ 条文：ゲームはセンターサークルでジャンプボールによって開始される。"}, {"type": "impl", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了９-１ 条文：各チームが最低５人のプレーヤーをコート上に揃えなければゲームは開始されない。", "sec_no": "9-10", "body": "９-10 条文：ゲーム開始前のインターバル中に、最初に出場する５人のプレーヤーのうちの１人がゲームを開始することができなくなった、もしくはその資格がなくなった場合、そのプレーヤーは別のプレーヤーと交代する。この場合、相手チームも必要に応じて最初に出場する５人のプレーヤーのうち１人を変更することができる。"}, {"type": "impl", "art_no": "10", "art_title": "ボールのステータス", "sec_no": "10-1", "body": "10-１ 条文：ショットの動作（アクトオブシューティング）中で、シューターのひと続きの動作が始まった後で、ディフェンスのプレーヤーがいずれかの相手プレーヤーにファウルをし、シューターがそのひと続きの動作でショットを終えたとき、ボールはデッドにならず、ショットが成功した場合はその得点は認められる。この条文はディフェンスのプレーヤーもしくはそのチームのチームベンチに座ることを許された人物がテクニカルファウルを宣せられた場合にも同様に適用される。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-10", "body": "12-10 例：第１クォーター終了を知らせるゲームクロックのブザーと同時に、B１はA１に対してアンスポーツマンライクファウルをした。審判はB１のファウルが起きるよりも先にゲームクロックのブザーがなっていたと判定した。チームA は第２クォーターを開始するときにオルタネイティングポゼッションのスローインを与えられることになっていた。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-11", "body": "12-11 例：第３クォーター終了を知らせるゲームクロックのブザーが鳴った直後にB１はテクニカルファウルを宣せられた。チームA は第4 クォーターを開始するときにオルタネイティングポゼッションのスローインを与えられることになっていた。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-12", "body": "12-12 例：A１はボールを持ってジャンプし、B１にブロックをされた。その後両プレーヤーは片手または両手をしっかりとボールにかけている状態でコートに着地した。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-13", "body": "12-13 例：A１はボールを持ってジャンプし、B１に正当にブロックされた。そのあと、A１は片手または両手でボールをしっかりと持ったままコートに着地したが、そのときB１はすでにボールに触れていなかった。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-14", "body": "12-14 例：空中にいるA１とB１の手はしっかりとボールにかかっている。コートに着地したときにA１の片足が境界線の上についた。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-15", "body": "12-15 例：A１はフロントコートからボールを持ってジャンプし、B１にそのボールをブロックされた。両プレーヤーが片手または両手をしっかりとボールにかけている状態で着地したときにA１の片足がバックコートについた。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-16", "body": "12-16 条文：ライブのボールがリングとバックボードの間に挟まったときは、複数のフリースローの間やファウルの罰則の一部にボールのポゼッションがある場合を除いて、いかなるときもオルタネイティングポゼッションのスローインを伴うジャンプボールシチュエーションになる。ショットクロックは、オルタネイティングポゼッションの手順によって、それまでオフェンスをしていたチームに継続してスローインが与えられるときは14秒となり、相手チームにスローインが与えられるときは24秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-17", "body": "12-17 例：A１のショットでボールがリングとバックボードの間に挟まった。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-18", "body": "12-18 例：ショットクロックのブザーが鳴ったとき、A１のショットのボールは空中にあり、そのあとボールがリングとバックボードの間に挟まった。オルタネイティングポゼッションアローはチームA を示している。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-19", "body": "12-19 例：B２はツーポイントゴールのショットの動作（アクトオブシューティング）中のA１にアンスポーツマンライクファウルをした。誰もリバウンドの位置に着いていない最後のフリースローで、"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-20", "body": "12-20 例：クォーター開始のセンターラインの延長線上からのA１のスローインのあと、ボールがチームA のフロントコートのリングとバックボードの間に挟まった。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-21", "body": "12-21 例：オルタネイティングポゼッションアローはチームA を示している。第１クォーターの後のプレーのインターバル中に、B１はA１にアンスポーツマンライクファウルをした。誰もリバウンドの位置に着かずに2 本のフリースローがA１に与えられ、フロントコートのスローインラインからチームA のスローインで第２クォーターが始められた。オルタネイティングポゼッションアローは逆向きにならず、チームA を示したままとなっている。スローインのあと、ボールがチームA のフロントコートのリングとバスケットの間に挟まった。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-22", "body": "12-22 条文：ヘルドボールは、両チームの１人あるいはそれ以上のプレーヤーがボールに片手または両手をしっかりとかけて、どちらのプレーヤーも乱暴にしなければそのボールのコントロールを得られないときに宣せられる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-23", "body": "12-23 例：ボールを持っているA１は得点をするためにバスケットに向かってひと続きの動作をしている。このときB１が手をしっかりとボールにかけ、A１はトラベリングのルールで定められている範囲を超えてステップを踏んだ。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-24", "body": "12-24 条文： オルタネイティングポゼッションのスローインの間にそのチームがバイオレーションを宣せられたとき、そのチームはオルタネイティングポゼッションのスローインの権利を失う。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-25", "body": "12-25 例：あるクォーターのゲームクロック残り4:17 で、オルタネイティングポゼッションのスローインの間に、"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-26", "body": "12-26 条文：ショットクロックに時間が残っておらず、オルタネイティングポゼッションアローがチームA を示している状態でジャンプボールシチュエーションが起きたときはオルタネイティングポゼッションの手順は適用できず、ショットクロックバイオレーションとなる。したがってスローインのボールがチームB に与えられる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-27", "body": "12-27 例：A1 のショットのボールが空中にある間にショットクロックのブザーが鳴った。その後ボールは"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション12-1条文：ゲーム開始のジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームは、次のジャンプボールシチュエーションでは、バックボードの真後ろを除いたジャンプボールシチュエーションが起きた場所に最も近いアウトオブバウンズからスローインが与えられる。", "sec_no": "12-28", "body": "12-28 例：A1 のショットのボールが空中にある間にショットクロックのブザーが鳴った。ボールは"}, {"type": "impl", "art_no": "13", "art_title": "ボールの扱い方13-１ 条文：ゲーム中、ボールは手で扱わなければならない。プレーヤーが不当に以下の行為を行うことはバイオレーションである。", "sec_no": "13-4", "body": "13-４ 条文：プレーヤーの身長や腕の長さを増やすための行為は許されていない。ボールにプレーするためにチームメイトを持ち上げることは、バイオレーションである。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー15-１ 条文：動きながらではないショットでのショットの動作（アクトオブシューティング）はプレーヤーが相手チームのバスケットに向けて、ボールを上方に動かし始めたときに始まる。", "sec_no": "15-3", "body": "15-３ 条文：バスケットへのドライブでのひと続きの動作でのショットの動作（アクトオブシューティング）とは、ショットの動作に先立って、プレーヤーがドリブルを終え、もしくは空中でボールをキャッチし、片手または両手でボールを支え持ったときに始まる。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー15-１ 条文：動きながらではないショットでのショットの動作（アクトオブシューティング）はプレーヤーが相手チームのバスケットに向けて、ボールを上方に動かし始めたときに始まる。", "sec_no": "15-8", "body": "15-８ 条文：ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされた後にパスをしたときは、もはやショットの動作中であるとはみなされない。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー15-１ 条文：動きながらではないショットでのショットの動作（アクトオブシューティング）はプレーヤーが相手チームのバスケットに向けて、ボールを上方に動かし始めたときに始まる。", "sec_no": "15-10", "body": "15-10 条文：プレーヤーがショットの動作（アクトオブシューティング）中にファウルをされたあと、トラベリングのバイオレーションをして得点した場合、ゴールは認められず、2本もしくは3本のフリースローを与えられる。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー15-１ 条文：動きながらではないショットでのショットの動作（アクトオブシューティング）はプレーヤーが相手チームのバスケットに向けて、ボールを上方に動かし始めたときに始まる。", "sec_no": "15-11", "body": "15-11 例：ツーポイントゴールのために両手でボールを持ったA１はバスケットに向かってドライブをした。B１はA１にファウルし、その後A１はトラベリングのバイオレーションをした。ボールはバスケットに入った。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数16-１ 条文：ゴールの得点は、ショットが放たれたコート上の位置によって定義される。ツーポイントゴールエリアから放たれたゴールには２点、スリーポイントゴールエリアから放たれたゴールには３点が認められる。攻撃する相手チームのバスケットにボールが入ると得点が与えられる。", "sec_no": "16-4", "body": "16-４  例：クォーターの始まりで、チームA が自チームのバスケットをディフェンスしているとき、B１が誤って自チームのバスケットに向かってドリブルをし、ゴールを得点した。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数16-１ 条文：ゴールの得点は、ショットが放たれたコート上の位置によって定義される。ツーポイントゴールエリアから放たれたゴールには２点、スリーポイントゴールエリアから放たれたゴールには３点が認められる。攻撃する相手チームのバスケットにボールが入ると得点が与えられる。", "sec_no": "16-5", "body": "16-５ 条文：ボールが相手チームのバスケットに入った場合、ゴールの得点は、ボールが手から離れた際のコート上の位置によって定義される。ボールは直接バスケットに入るか、バスケットに入る前にパスのボールがいずれかのプレーヤーもしくはコートに触れてもよい。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数16-１ 条文：ゴールの得点は、ショットが放たれたコート上の位置によって定義される。ツーポイントゴールエリアから放たれたゴールには２点、スリーポイントゴールエリアから放たれたゴールには３点が認められる。攻撃する相手チームのバスケットにボールが入ると得点が与えられる。", "sec_no": "16-10", "body": "16-10 例：スローインをするA1 がフロントコートでボールをパスした。その後ボールはチームA のフロントコートでスリーポイントエリアにいるいずれかのプレーヤーに正当に触れられ、バスケットに入った。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数16-１ 条文：ゴールの得点は、ショットが放たれたコート上の位置によって定義される。ツーポイントゴールエリアから放たれたゴールには２点、スリーポイントゴールエリアから放たれたゴールには３点が認められる。攻撃する相手チームのバスケットにボールが入ると得点が与えられる。", "sec_no": "16-11", "body": "16-11 条文：スローインあるいは最後のフリースローのリバウンドでは、コート内のプレーヤーがボールに触れてからショットを放つまでに常に時間を要する。これはクォーターやオーバータイムの終わり近くでは特に注意を払わなくてはならない。競技時間が終了するまでに、このようなショットを放つためには最低限の時間が必要である。ゲームクロックまたはショットクロックに0.3秒かそれ以上が表示されている場合、クォーターやオーバータイム終了を知らせるゲームクロックやショットクロックのブザーが鳴る前にシューターがボールを放っていたかを決定することは審判の責務である。しかし、ゲームクロックまたはショットクロックに0.2秒あるいは0.1秒が表示されている場合、プレーヤーが得点できる有効なゴールは、ボールをタップするか直接ダンクするかのみで、その場合でもゲームクロックまたはショットクロックに0.0秒が表示されたときにはプレーヤーの片手または両手はボールに触れていてはならない。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数16-１ 条文：ゴールの得点は、ショットが放たれたコート上の位置によって定義される。ツーポイントゴールエリアから放たれたゴールには２点、スリーポイントゴールエリアから放たれたゴールには３点が認められる。攻撃する相手チームのバスケットにボールが入ると得点が与えられる。", "sec_no": "16-12", "body": "16-12 例：チームA にスローインが与えられ、ゲームクロックまたはショットクロックには、"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数16-１ 条文：ゴールの得点は、ショットが放たれたコート上の位置によって定義される。ツーポイントゴールエリアから放たれたゴールには２点、スリーポイントゴールエリアから放たれたゴールには３点が認められる。攻撃する相手チームのバスケットにボールが入ると得点が与えられる。", "sec_no": "16-13", "body": "16-13 例：クォーターの終わりで、A１はバスケットへ直接ボールをダンクした。ゲームクロックに0.0 秒が表示されたとき、ボールはまだA１の片手または両手に触れていた。"}, {"type": "impl", "art_no": "16", "art_title": "得点：ゴールによる点数16-１ 条文：ゴールの得点は、ショットが放たれたコート上の位置によって定義される。ツーポイントゴールエリアから放たれたゴールには２点、スリーポイントゴールエリアから放たれたゴールには３点が認められる。攻撃する相手チームのバスケットにボールが入ると得点が与えられる。", "sec_no": "16-14", "body": "16-14 条文：ゴールの得点は、ライブのボールが上からバスケットに入り、バスケットの中にとどまるか、完全に通過したときに認められる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-4", "body": "17-４ 条文：第４クォーター、各オーバータイムでゲームクロックに２:00あるいはそれ以下が表示されているとき、ディフェンスのプレーヤーはスローインを妨害するために、体のどの部分も境界線を越えてはならない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-7", "body": "17-７ 条文：スローインをするプレーヤーはボールを（手渡しではなく）パスでコート上のチームメイトに渡さなければならない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-9", "body": "17-９ 条文：スローインの間、ボールがコートに向かってパスされるまで、他のプレーヤーは体のいかなる部分も境界線上を越えてはならない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-10", "body": "17-10 例：規則の違反（ファウルやバイオレーション）のあと、スローインをするA１が審判からボールを受け取った。A１は、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-11", "body": "17-11 例：ゲームクロックが動いていて、ボールがライブの状態でのチームA のゴール、あるいは最後のフリースローが成功したあと、チームB にタイムアウトが認められた。タイムアウトのあと、エンドラインからスローインをするB１は審判からボールを受け取った。B１は、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-12", "body": "17-12 条文：第４クォーター、オーバータイムでゲームクロックが２:00あるいはそれ以下を表示しているとき、バックコートでボールを与えられることになっているチームにタイムアウトが認められた場合、そのチームのヘッドコーチはタイムアウトのあとで、スローインをフロントコートのスローインラインから行うか、バックコートから行うかを選択する権利を持つ。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-13", "body": "17-13 例：第4 クォーター残り35 秒で、A１がバックコートでドリブルをしていたとき、チームB のプレーヤーがボールをフリースローラインの延長線上のアウトオブバウンズに弾き出した。タイムアウトがチームA に認められた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-14", "body": "17-14 例：第4 クォーター残り44 秒、ショットクロック残り17 秒で、A１がバックコートでドリブルをしているとき、チームB のプレーヤーがボールをチームA のバックコートのテーブルサイドもしくはオポジットサイドのスローインラインのアウトオブバウンズに弾き出した。その後タイムアウトが、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-15", "body": "17-15 例：第４クォーター残り57 秒で、A１は２本のフリースローを与えられた。２本目のフリースローのときにA１がフリースローラインを踏み、バイオレーションを宣せられた。タイムアウトがチームB に認められた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-16", "body": "17-16 例：第４クォーター残り26 秒で、A１がバックコートで６秒間ドリブルをしているときに、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-17", "body": "17-17 例：第４クォーター残り１:24 で、A１がフロントコートでドリブルをしているとき、B１がチームA のバックコートへボールを弾き出し、チームA のいずれかのプレーヤーが再びドリブルを始めた。このとき、B２がボールをチームA のバックコートのテーブルサイドのアウトオブバウンズに弾き出した。ショットクロックは、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-19", "body": "17-19 例：第４クォーター残り１:32 で、チームA が５秒間ボールをコントロールしていたとき、チームAのバックコートでA１とB１が互いに殴り合い、失格・退場となった。スローインが行われる前にタイムアウトがチームA に認められた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-20", "body": "17-20 例：第4 クォーター残り１:29、ショットクロック残り19 秒で、チームA がフロントコートでボールをコントロールしていたとき、暴力行為の最中にコートに入ったことでA６とB６が失格・退場となった。タイムアウトがチームA に認められた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-21", "body": "17-21 例：第4 クォーター残り１:18 で、チームA はバックコートからのスローインを与えられた。このときタイムアウトがチームA に認められた。タイムアウトのあと、チームA のヘッドコーチはフロントコートのスローインラインからのスローインを選択した。スローインが行われる前に、チームB のヘッドコーチがタイムアウトを請求した。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-22", "body": "17-22 条文：第１クォーター以外の全てのクォーターと全ての各オーバータイムを開始するとき、スコアラーズテーブルの反対側のセンターラインの延長線上からスローインが行われる。スローインをするプレーヤーは、センターラインをまたいでそれぞれのサイドに片足ずつ置かなければならない。スローインをするプレーヤーにバイオレーションが宣せられた場合、センターラインの延長線上から相手チームにスローインが与えられる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-23", "body": "17-23 例：第２クォーターを開始するとき、センターラインの延長線上でスローインを行うA１が、バイオレーションを宣せられた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-24", "body": "17-24 例：第３クォーターを開始するとき、センターラインの延長線上でスローインを行うA１がパスをし、A２が触れたボールがチームA の次の位置でアウトオブバウンズに出た。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-25", "body": "17-25 例：以下の違反がコート上のセンターラインで起きた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-26", "body": "17-26 条文：アンスポーツマンライクファウルあるいはディスクォリファイングファウルの後のスローインは、いつでもフロントコートのスローインラインから行われる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-27", "body": "17-27 例：第１クォーターと第２クォーターの間のプレーのインターバル中に、A１はB１にアンスポーツマンライクファウルをした。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-28", "body": "17-28 条文：スローインのときには、次の状況が起こり得る。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-29", "body": "17-29 例：スローインで、A１がバスケットの上を通過するようにボールをパスしたとき、どちらかのチームのプレーヤーがバスケットの下から手を伸ばしてボールに触れた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-30", "body": "17-30 例：スローインを行うA１がチームB のバスケットに向かってパスしたボールが、リングとバックボードの間に挟まった。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-31", "body": "17-31 条文：スローインを行うプレーヤーは、ボールを与えられた後にコートの内側にボールを弾ませて、ボールがコート上で他のプレーヤーに触れる前に再びボールに触れることはできない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-32", "body": "17-32 例：スローインを行うA１は、ボールを次の場所にバウンドさせた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-33", "body": "17-33 条文：スローインをするプレーヤーは、スローインとしてボールが手から離れた後に、ボールをコートの外側に触れさせてはいけない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-34", "body": "17-34 例：スローインをするA１は、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-35", "body": "17-35 例：スローインをするA１はA２にボールをパスした。A２は片足が境界線に触れた状態でボールをキャッチした。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-36", "body": "17-36 例：スローインをするA１は、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-37", "body": "17-37 条文：ゲームクロックが動いていて、ボールがライブの状態で成功したゴールもしくは成功した最後のフリースローに続いてエンドラインからスローインを行うプレーヤーは、エンドラインと平行にあるいは（加えて）後方に動くことができ、エンドラインの外側にいるチームメイトとボールをパスすることができるが、スローインに要する時間が5秒を超えてはならない。これは不当にスローインを妨げたことでディフェンスのチームがバイオレーションを宣せられ、いずれかのチームによってタイムアウトが認められたあと、またはスローインが再度行われるときも適用される。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-38", "body": "17-38 例：第2 クォーターでゲームクロックが動いている状態で成功した相手チームのゴール、あるいは相手チームの最後のフリースローが成功したあと、A１はエンドラインでスローインのボールを持っている。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-39", "body": "17-39 例：相手チームのゴールが成功したあと、A１がエンドラインでスローインのボールを持った。ボールがコート上へスローインされたあと、B２がエンドラインの近くでボールを蹴った。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-40", "body": "17-40 例：相手チームのゴールが成功したあと、A１がエンドラインでスローインのボールを持った。A２はエンドラインの外側のアウトオブバウンズからジャンプして、空中にいる間にA１のスローインのボールをキャッチした。そのあと、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-41", "body": "17-41 条文：テクニカルファウルによるフリースローの後は、ジャンプボールシチュエーションあるいは第１クォーターの開始前を除いて、テクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからのスローインでゲームが再開される。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-42", "body": "17-42 例：A２が、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-43", "body": "17-43 例：A２が、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-44", "body": "17-44 例：第4 クォーター残り１:47 で、A１はフロントコートでドリブルをしていて、テクニカルファウルを宣せられた。タイムアウトがチームA に認められた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-45", "body": "17-45 条文：第4クォーター、各オーバータイムでゲームクロックが２:00あるいはそれ以下を表示しているとき、オフェンスのチームがテクニカルファウルを宣せられた。タイムアウトがそのチームに認められ、スローインがバックコートから行われる場合、ショットクロックは継続となる。スローインがフロントコートから行われる場合、ショットクロックは次のようになる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-46", "body": "17-46 例：第4 クォーター残り1:45 で、A１はバックコートでドリブルをしていて、テクニカルファウルを宣せられた。タイムアウトがチームA に認められた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-47", "body": "17-47 例：第4 クォーター残り1:43 で、A１はバックコートでドリブルをしていて、テクニカルファウルを宣せられた。誰もリバウンドの位置に着かずに1 本のフリースローがチームB のいずれかのプレーヤーに与えられた。タイムアウトがチームA に認められた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-48", "body": "17-48 例：第4 クォーター残り1:41 で、A１はバックコートでドリブルをしているとき、B１がボールをアウトオブバウンズに弾き出した。タイムアウトがチームA に認められた。その直後にA１はテクニカルファウルを宣せられた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-49", "body": "17-49 例：第4 クォーター残り58 秒、ショットクロック残り19 秒、A１のバックコートで、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-50", "body": "17-50 条文：ボールがバスケットに入ったにもかかわらず、ゲームクロックが動いていて、ボールがライブの状態でのゴールや最後のフリースローが認められないとき、ゲームはフリースローラインの延長線上からのスローインで再開される。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-51", "body": "17-51 例：ショットの動作（アクトオブシューティング）中のA１がトラベリングのバイオレーションをし、その後ボールはバスケットに入った。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "17-52", "body": "17-52 例：A１がショットをした。ボールが下降しているとき、A２がボールに触れ、ボールはバスケットに入った。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-2", "body": "18/19-２  例：ゲーム開始のジャンプボールでボールがクルーチーフの手を離れたあと正当にタップされる前に、ジャンパーのA２がバイオレーションを宣せられ、チームB にスローインのボールが与えられた。このときどちらかのチームがタイムアウトまたは交代を請求した。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-3", "body": "18/19-３  条文：ショットで、ボールが空中にある間にショットクロックのブザーが鳴ったとしても、バイオレーションではなくゲームクロックは止めない。ショットが成功し、ある特定の状況下では、両チームにタイムアウトと交代が認められる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-5", "body": "18/19-５  条文：第18条と第19条はタイムアウトや交代が認められる時機の始まりと終わりについて規定している。最初のフリースローのボールがフリースローシューターに与えられたあと、タイムアウトあるいは交代（フリースローシューターを含む全てのプレーヤー）の請求があった場合、以下のときにのみタイムアウトあるいは交代が両チームに認められる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-6", "body": "18/19-６  例：A１は２本のフリースローを与えられた。以下のとき、チームA またはチームB がタイムアウトあるいは交代を請求した。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-7", "body": "18/19-７  例：A１は２本のフリースローを与えられた。最初のフリースローを行ったあと、いずれかのチームがタイムアウトあるいは交代を請求した。最後のフリースローのとき、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-14", "body": "18/19-14  条文：プレーヤーとなった交代要員は、ゲームクロックが動いたあと再び交代が認められる時機になるまでは、交代することはできない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-16", "body": "18/19-16  条文：タイムアウトの請求のあと、どちらかのチームがファウルを宣せられた場合、審判がスコアラーズテーブルとのそのファウルに関する全てのコミュニケーションを完了するまでタイムアウトは始まらない。そのファウルがプレーヤーの５個目のファウルであった場合、このコミュニケーションには必要な交代の手順を含む。全てのコミュニケーションが完了したあとで審判が笛を吹いてタイムアウトのシグナルを示したとき、タイムアウトは始まる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-18", "body": "18/19-18  条文：それぞれタイムアウトは１分間である。両チームは、審判が笛を吹きコートに招き入れたあと、速やかにコートに戻らなければならない。チームが１分間を超えてタイムアウトを引き伸ばすことは、アドバンテージになるとともにゲームの遅延も引き起こしている。審判によってそのチームのヘッドコーチには警告が与えられる。そのヘッドコーチが警告に対応しない場合、追加のタイムアウトが宣せられる。そのチームにタイムアウトが残っていない場合、ヘッドコーチにゲームの遅延行為（ディレイオブゲーム）によるテクニカルファウルが宣せられ、スコアシートに「B1」と記入される。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-19", "body": "18/19-19  例：タイムアウトが終わり、審判がチームA をコート上に戻るように招き入れた。チームA のヘッドコーチはチームベンチエリアに残っている自チームに指示を与え続けた。審判はチームA を再びコート上に招き入れ、"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-20", "body": "18/19-20  例：ハーフタイムのインターバルのあと、チームA が控室から戻ってこないため、第３クォーターの開始が遅れた。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-21", "body": "18/19-21  条文：第４クォーターでゲームクロックが残り２:00を示すまでに、チームが後半に１回もタイムアウトを認められていない場合、スコアラーはスコアシート上のそのチームの後半の最初の枠に２本の横線を引く。スコアボード上では最初のタイムアウトは使われたものとして表示する。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン17-１ 条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。", "sec_no": "18/19-24", "body": "18/19-24  条文：タイムアウトが請求されたときはいつでも、テクニカルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルが宣せられる前後かどうかにかかわらず、フリースローが行われる前にタイムアウトが認められる。タイムアウトの間にテクニカルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルが宣せられた場合、フリースローはタイムアウトが終了したあとで行われる。"}, {"type": "impl", "art_no": "25", "art_title": "トラベリング25-１ 条文：コートに横たわっているプレーヤーがボールをコントロールすること、プレーヤーがボールを持ったままコートに倒れることは正当である。またそのプレーヤーがコートに倒れたあと、その勢いで滑ることも正当である。ただし、そのプレーヤーがコートを転がったり、ボールを持ったまま立ち上がろうとしたりするとバイオレーションである。", "sec_no": "25-4", "body": "25-４ 条文：プレーヤーはドリブルを終えたあと、あるいはボールのコントロールを得たあとに、連続して同じ足あるいは連続して両足でコートに触れることはできない。"}, {"type": "impl", "art_no": "26", "art_title": "３秒ルール26-１ 条文：プレーヤーが3秒のバイオレーションを避けるために、エンドラインからコートを離れ、その後再び制限区域に入ることは、バイオレーションである。", "sec_no": "26-3", "body": "26-３ 条文：フロントコート内でライブのボールをコントロールしているチームのプレーヤーは、ゲームクロックが動いている間は、相手チームのバスケットに近い制限区域内に３秒以上とどまることはできない。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "28-3", "body": "28-３ 条文：バックコートからフロントコートにドリブルをしているとき、ドリブラーの両足とボールが完全にフロントコートに触れた時点で、ボールがフロントコートに進められたとみなされる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "28-6", "body": "28-６ 条文：8秒が継続で、それまでボールをコントロールしていたチームがバックコートでスローインを与えられる場合、スローインをするプレーヤーにボールを与える審判は、8秒のうち何秒が残っているかをスローインをするプレーヤーに伝える。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "28-9", "body": "28-９ 条文：審判がどちらのチームにも関係のない正当な理由でゲームを止め、相手チームが不利な状況になると判断した場合は、8秒は継続となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "28-10", "body": "28-10   例：第4 クォーター残り25 秒、得点がA 72 - B 72 で、チームA がボールのコントロールを得た。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "28-11", "body": "28-11 条文：8秒のバイオレーションが起きた後のスローインの位置は、バイオレーションが起きたときのボールの位置によって決定される。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "28-12", "body": "28-12 例：チームA の8 秒のバイオレーションが起きたとき、"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "28-13", "body": "28-13 条文：チームコントロールはショットのボールがプレーヤーの手を離れたときに終わる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "28-14", "body": "28-14 例：8 秒が経過する直前にバックコートからのショットのボールがA1 の手を離れた。ボールはバスケットに入った。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "29/50-9", "body": "29/50-９  条文：ショットクロックのブザーが鳴ったとしても、相手チームがボールを速やかかつ明らかにボールのコントロールを得られる場合、ショットクロックのブザーはなかったものとし、ゲームは続行する。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "29/50-12", "body": "29/50-12  条文：それまでボールをコントロールしていたチームがオルタネイティングポゼッションのスローインを与えられる場合、そのチームのショットクロックはジャンプボールシチュエーションが起きた時点から継続となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "29/50-14", "body": "29/50-14  条文：ボールをコントロールしていないチームのファウルあるいはバイオレーション（ボールがアウトオブバウンズになるバイオレーションを除く）により審判がゲームを止め、ボールのポゼッションがその前にボールをコントロールしていたチームにフロントコートで与えられる場合、"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "29/50-21", "body": "29/50-21  条文：審判がどちらのチームにも関係のない正当な理由でゲームを止め、相手チームが不利な状況になる場合は、ショットクロックは継続となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルー
