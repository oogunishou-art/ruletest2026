  {id:155,num:"別添資料F IRS F-4 ヘッドコーチチャレンジ",level:"A",ref:"インプリ F-4.14",q:"A１はスリーポイントゴールで得点した。このとき、チームBはタイムアウトを請求した。タイムアウトの最中でチームBのヘッドコーチはショットが放たれる前にA１はスリーポイントラインを踏んでいたと考え、適切な手続きでヘッドコーチチャレンジを請求した。チームBのヘッドコーチチャレンジは認められる。成功したゴールで２点あるいは３点のどちらが認められるかを判定するためにIRSレビューを行うことができる。タイムアウトは中断され、ヘッドコーチチャレンジのレビューの後にタイムアウトが継続される。",ans:false,explanation:"タイムアウトは中断せずに最後まで続けられる。ヘッドコーチチャレンジのレビューはタイムアウトの後で行われる。",ruleSrc:"インプリ F-4.14",ruleText:"インプリ F-4.14\nタイムアウトは中断せずに最後まで続けられる。ヘッドコーチチャレンジのレビューはタイムアウトの後で行われる。"},
  {id:156,num:"第12条 ジャンプボール",level:"B",ref:"インプリ 12-27",q:"A１のショットのボールが空中にある間にショットクロックのブザーが鳴った。その後ボールはリングに触れず直後にヘルドボールが宣せられた。チームAのショットクロックには時間が残っておらず、ショットクロックバイオレーションを適用した。オルタネイティングポゼッションアローの示す方向は関係なく、ゲームは最初に宣したヘルドボールが起きた場所に最も近いアウトオブバウンズからチームBのスローインで再開される。ショットクロックは24秒となる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 12-27",ruleText:"インプリ 12-27\nショットクロックバイオレーション後のヘルドボールでは、ショットクロックバイオレーションを優先し、チームBのスローインで再開される。"},
  {id:157,num:"第16条 得点",level:"B",ref:"インプリ 16-10",q:"スローインをするA１がフロントコートでボールをパスした。その後ボールはチームAのフロントコートでスリーポイントエリアにいるいずれかのプレーヤーに正当に触れられ、バスケットに入った。審判はチームAの２点を認めた。",ans:true,explanation:"ボールはスローインから放たれているため、２点が認められる。プレーヤーがボールに触れたことは正当である。３点が認められるのはショットもしくはパスのボールがコート上でスリーポイントラインの外側から放たれたときのみである。",ruleSrc:"インプリ 16-10",ruleText:"インプリ 16-10\nスローインから放たれたボールがバスケットに入った場合、２点が認められる。"},
  {id:158,num:"第17条 スローイン",level:"C",ref:"インプリ 17-21",q:"第４クォーター残り1:18で、チームAはバックコートからのスローインを与えられた。このときタイムアウトがチームAに認められた。タイムアウトのあと、チームAのヘッドコーチはフロントコートのスローインラインからのスローインを選択した。スローインが行われる前に、チームBのヘッドコーチがタイムアウトを請求した。フロントコートからスローインを行うというチームAのヘッドコーチの選択は最終的なものでゲームクロックが再び動き始めるまでは変更することはできない。",ans:true,explanation:"問題文のとおり。フロントコートからスローインを行うというチームAのヘッドコーチの選択は最終的なものでゲームクロックが再び動き始めるまでは変更することはできない。",ruleSrc:"インプリ 17-21",ruleText:"インプリ 17-21\nフロントコートからスローインを行うというヘッドコーチの選択は最終的なものでゲームクロックが再び動き始めるまでは変更することはできない。"},
  {id:159,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-13",q:"B１がドリブルをしているA１をディフェンスした。A１はB１を押した上で、あたかもB１にファウルをされたかのような印象を与えようと頭部を急に動かした。審判はA１にファウルを宣した。すでにA１のファウルを宣しているため、加えてフェイクの警告は与えない。",ans:false,explanation:"A１のファウルに加えて、審判はA１にフェイクの警告（これがチームAの最初のフェイクで、過度なフェイクではない場合）を与える、もしくはテクニカルファウル（チームAがすでにフェイクの警告を与えられている、もしくは最初でも過度なフェイクであった場合）を宣する。",ruleSrc:"インプリ 36-13",ruleText:"インプリ 36-13\nファウルを宣した場合でも、フェイクに対する警告またはテクニカルファウルを加えることができる。"},
  {id:160,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-16",q:"B１がドリブルをしているA１をディフェンスした。B１はあたかもA１にファウルをされたかのような印象を与えようとコート上に倒れた。ほとんど同時にA１はあたかもB１にファウルをされたかのような印象を与えようと頭部を急に動かした。審判はA１とB１の両方にフェイクの警告（これがチームの最初のフェイクで、過度なフェイクではない場合）を与える、もしくはテクニカルファウル（チームがすでにフェイクの警告を与えられている、もしくは最初でも過度なフェイクであった場合）を宣する。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 36-16",ruleText:"インプリ 36-16\n両方のプレーヤーにフェイクの警告またはテクニカルファウルを宣する。"},
  {id:161,num:"第44条 訂正のできる誤り",level:"B",ref:"ルール 44-3-2",q:"カテゴリー1の訂正のできる誤りはゲームの終了を知らせるゲームクロックのブザーが鳴り、ボールがデッドとなった後では訂正することはできない。ただし、誤りが、最後に審判が何らかの理由でゲームを止めたときからゲームの終了を知らせるゲームクロックのブザーが鳴るまでの間に起きた場合、この誤りはゲーム終了後速やかに訂正され、チームはコートもしくはチームベンチエリアにとどまらなければならない。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 44-3-2",ruleText:"ルール 44-3-2\nカテゴリー1の訂正のできる誤りは、最後に審判がゲームを止めてからゲーム終了までの間に起きた場合、ゲーム終了後速やかに訂正できる。"},
  {id:162,num:"第44条 訂正のできる誤り",level:"C",ref:"インプリ 44-5",q:"第４クォーター残り1:14で、B１がツーポイントゴールのショットの動作（アクトオブシューティング）中のA１にファウルをし、ショットは成功しなかった。審判は誤ってA１に２点と１本のフリースローを与えた。この誤りが第４クォーターと最初のオーバータイムの間のプレーのインターバル中に認識された。誤りは訂正できる。",ans:false,explanation:"誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。",ruleSrc:"インプリ 44-5",ruleText:"インプリ 44-5\n誤りを訂正できる時機を過ぎているため、誤りは訂正できない。"},
  {id:163,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-7",q:"第２クォーター残り3:37で、B１がA１にファウルをし、このクォーター４個目のチームファウルであった。審判は誤って２本のフリースローをA１に与えた。この誤りが、第４クォーター残り4:48で認識された。誤りは訂正できる。成否にかかわらず、フリースローは取り消される。ゲームは誤りの訂正のために止められた場所に最も近いところから再開される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-7",ruleText:"インプリ 44-7\n第２クォーターの誤りが第４クォーター残り4:48で認識された場合は訂正できる。フリースローは取り消される。"},
  {id:164,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-12",q:"第３クォーターで、B２がドリブルをしているA１にファウルをし、このクォーター５個目のチームファウルであった。２本のフリースローがA１に与えられたが、１本目のフリースローを失敗したあと、B１がリバウンドのボールを取り、ゲームは誤って続行された。この誤りが、第４クォーター残り2:54で認識された。審判は誤りを訂正するため、２本目のフリースローがA１に与えられる。しかしA１は５個のファウルを宣せられているため、チームAのヘッドコーチが指定したプレーヤーにフリースロー１本を与えることにした。フリースローは誰もリバウンドの位置に着かずに行われ、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。",ans:true,explanation:"A１が５個のファウルを宣せられていたり、失格・退場となっていたりした場合、チームAのヘッドコーチはフリースローシューターを指定する。",ruleSrc:"インプリ 44-12",ruleText:"インプリ 44-12\nA１が５個のファウルを宣せられていた場合、チームAのヘッドコーチはフリースローシューターを指定する。"},
  {id:165,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-15",q:"第３クォーター残り３秒で、B１がショットの動作（アクトオブシューティング）中のA１にファウルをした。２本のフリースローがA１に与えられたが、A１の代わりにA２がフリースローを行った。第３クォーターが終了し、この誤りが第４クォーターでボールがライブとなったあと、ゲームクロックに2:00が表示される前に認識された。誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。ゲームは続行される。",ans:false,explanation:"誤りは訂正できる。A２の２本のフリースローは取り消される。ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。",ruleSrc:"インプリ 44-15",ruleText:"インプリ 44-15\nゲームクロックに2:00が表示される前に認識された場合は訂正できる。"},
  {id:166,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-17",q:"第３クォーターの終了を知らせるゲームクロックのブザーが鳴ったとき、B１がドリブルをしているA１にファウルをし、このクォーター６個目のチームファウルであった。審判はB１のファウルはゲームクロック残り0.3秒で起きたと判断した。２本のフリースローがA１に与えられた。審判はA１ではなく、A２をシューターに指定してフリースローを行った。この誤りが最初のフリースローでボールがA２の手を離れた後で認識された。A２の２本のフリースローは取り消される。２本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-17",ruleText:"インプリ 44-17\n誤ったプレーヤーがフリースローを行っていた誤りを訂正できる。"},
  {id:167,num:"第44条 訂正のできる誤り",level:"A",ref:"インプリ 44-18",q:"B１がショットの動作（アクトオブシューティング）中のA１にファウルをした。審判はA１ではなく、A２をシューターに指定してフリースローを行った。２本目のフリースローでボールがリングに触れたあと、A３がリバウンドのボールを取って２点を得点した。この誤りが、エンドラインの後ろのアウトオブバウンズでチームBにスローインのボールが与えられる前に認識された。成否にかかわらず、A２が行った２本のフリースローは取り消される。A３の得点も認めない。２本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。",ans:false,explanation:"A３の得点は有効なままとなる。誰もリバウンドの位置に着かずに２本のフリースローがA１に与えられる。ゲームは誤りの訂正のために止められた場所に最も近いところ（この場面ではエンドラインの後方のアウトオブバウンズ）から再開される。",ruleSrc:"インプリ 44-18",ruleText:"インプリ 44-18\nA３の得点は有効なままとなる。誰もリバウンドの位置に着かずに２本のフリースローがA１に与えられる。"},
  {id:168,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-20",q:"第４クォーター残り0:57で、ボールの無いところでA２がファウルをしたとき、ショットのボールがA１の手を離れていた。ボールは正当にバスケットに入ったが、審判は誤って得点を取り消した。この誤りが第４クォーター残り0:43で、誤りに続いて最初に審判がゲームを止めたときに認識された。誤りは訂正できる。スコアシートは訂正され、チームAに２点が追加される。ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-20",ruleText:"インプリ 44-20\n誤って得点が取り消された場合、訂正できる。スコアシートは訂正され、チームAに２点が追加される。"},
  {id:169,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-23",q:"第１クォーター残り5:47で、B１がA１にファウルをした。審判はB２のファウルとして伝達した。この誤りがハーフタイムの間に認識された。誤りは訂正され、スコアラーはクルーチーフと相談したあと、誤ってB２に記録されたファウルを削除し、B１に正しくファウルを記録することでスコアシートを訂正する。B２が誤って５個のファウルを宣せられたチームメンバーとなっていた場合、B２は再びゲームに参加できる。B１が本来早い時点で５個のファウルを宣せられたチームメンバーとなるべきであった場合、B１はこの時点で５個のファウルを宣せられたチームメンバーとなる。追加の罰則は適用されない。",ans:true,explanation:"誤ったプレーヤーのファウルを伝達した誤りは、第４クォーターでゲームクロックが2:00を示すまでは訂正できる。",ruleSrc:"インプリ 44-23",ruleText:"インプリ 44-23\n誤ったプレーヤーのファウルを伝達した誤りは、第４クォーターでゲームクロックが2:00を示すまでは訂正できる。"},
  {id:170,num:"第44条 訂正のできる誤り",level:"A",ref:"インプリ 44-25",q:"第４クォーター残り3:45で、チームAは後半２回目のタイムアウトを請求した。スコアラーはこのタイムアウトを誤ってチームBの後半２回目のタイムアウトとして記録した。第４クォーター残り2:44で、ボールがアウトオブバウンズに出て審判がゲームを止めた。 第４クォーター残り1:45で、チームBにタイムアウトが認められた。チームBはこのタイムアウトが後半３回目であることを伝えられ、チームBはタイムアウトが残っていない。チームBのヘッドコーチは誤りが起きていることを主張した。スコアラーはクルーチーフと相談し、誤りが認識されたが、審判は訂正できる時機を過ぎているため、誤りはなかったものとした。",ans:true,explanation:"第４クォーターでゲームクロックが2:00を示すまでに認識されなければならず、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。",ruleSrc:"インプリ 44-25",ruleText:"インプリ 44-25\n第４クォーターでゲームクロックが2:00を示すまでに認識されなければ訂正できない。"},
  {id:171,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-26",q:"第１クォーター残り3:34で、チームAのヘッドコーチはテクニカルファウルを宣せられた。スコアラーはこのテクニカルファウルを誤ってチームBのヘッドコーチに記録した。この誤りが、第４クォーター残り1:02にゲームが止められたときに認識された。本来であれば、誤りを訂正できる時機を過ぎている。しかしテクニカルファウルの場合は、コーチの失格・退場につながる恐れがあるため訂正できる。スコアラーはクルーチーフと相談したあと、誤ってチームBのヘッドコーチに記録されたテクニカルファウルを削除し、チームAのヘッドコーチに正しくテクニカルファウルを記録することでスコアシートを訂正する。罰則は適用されない。ゲームは誤りの訂正のためにゲームが止められたところから再開される。",ans:false,explanation:"誤ったチームに記録されたテクニカルファウルは、第４クォーターでゲームクロックに2:00が表示されるまでは訂正できる。この場合、誤りを訂正できる時機を過ぎているため誤りは訂正できず、なかったものとする。",ruleSrc:"インプリ 44-26",ruleText:"インプリ 44-26\n誤ったチームに記録されたテクニカルファウルは、第４クォーターでゲームクロックに2:00が表示されるまでは訂正できる。この場合は訂正できない。"},
  {id:172,num:"第44条 訂正のできる誤り",level:"A",ref:"インプリ 44-29",q:"第１クォーター残り2:43で、アウトオブバウンズのバイオレーションによってゲームクロックが止められた。スローインの前、ゲームクロックが何も表示されていない状態となった。タイマーは機材をリセットした。機材が再び動くようになったとき、ゲームクロックに誤って1:43が設定された。この誤りがハーフタイムの間に認識された。この場合ハーフタイムのインターバルのあと、ハーフタイムのためにゲームが止められたときから継続したチームファウルとタイムアウトで、前半で両チームがプレーしていた方向と同じ方向に１分間プレーする。ゲームクロックは1:00に設定され、オルタネイティングポゼッションのスローインが与えられることになっているチームのスローインで始められる。１分間のプレーのあと、次にオルタネイティングポゼッションのスローインが与えられることになっているチームのスローインで第３クォーターが始められる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-29",ruleText:"インプリ 44-29\nゲームクロックの誤設定がハーフタイムに発見された場合の処置。"},
  {id:173,num:"第44条 訂正のできる誤り",level:"C",ref:"インプリ 44-34",q:"チームAはバックコートでスローインを与えられた。ショットクロックは24秒に設定されるべきところ、誤って14秒に設定された。A１がコート上でボールをキャッチし、フロントコートへドリブルをして、ショットをした。ボールが空中にある間にショットクロックのブザーが鳴った。ボールはリングに触れず、すぐにA２がリバウンドのボールを取った。審判はショットクロックバイオレーションのためゲームを止めた。テーブルオフィシャルズはショットクロックが誤って設定されたことを認識した。審判はショットクロックのバイオレーションはなかったものとして、ゲームが止められた場所に最も近いアウトオブバウンズからスローインがチームAに与えられる。どちらのチームにも関係のない正当な理由でゲームを止めたため、ショットクロックは14秒にリセットしてゲームは再開される。",ans:false,explanation:"ショットクロックのバイオレーションはなかったものとして、ゲームが止められた場所に最も近いアウトオブバウンズからスローインがチームAに与えられ、ショットクロックは10秒となる。",ruleSrc:"インプリ 44-34",ruleText:"インプリ 44-34\nショットクロックが誤って設定された場合、バイオレーションはなかったものとし、ショットクロックは10秒（24秒から14秒を引いた残り）で再開される。"},
  {id:174,num:"別添資料F IRS F-4 ヘッドコーチチャレンジ",level:"A",ref:"インプリ F-4.12",q:"第３クォーター残り43.4秒、ショットクロック残り1.2秒でA１はスリーポイントのショットをした。ショットは成功せず、ボールはリングに触れなかった。その後B１がバスケットの近くでボールに触れ、ボールはすぐにアウトオブバウンズに出た。審判はスローインのボールをチームBに与えるとき、ショットクロックに何も表示されていないことに気づいた。チームAのヘッドコーチはB１がボールをアウトオブバウンズに出したと考え、ヘッドコーチチャレンジを請求した。ゲーム中のいかなる時間帯でも、ボールをアウトオブバウンズにしたプレーヤーを特定するためにヘッドコーチチャレンジのレビューを行うことができる。そのとき、誤操作があった場合はショットクロックにどのくらいの時間が表示されるかを決定するためにさらにレビューを行うこともできる。レビューで、B１がボールをアウトオブバウンズに出していて、ボールがアウトオブバウンズに出る前にショットクロックの時限を過ぎていた場合、チームAのショットクロックに時間は残っておらず、ショットクロックバイオレーションとなる。ゲームはエンドラインのアウトオブバウンズからチームBのスローインで再開され、ショットクロックは24秒となる。チームAのヘッドコーチは請求を認められた１回のヘッドコーチチャレンジを使用したことにはならない。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ F-4.12",ruleText:"インプリ F-4.12\nショットクロックの時限を過ぎていた場合、ショットクロックバイオレーションとなる。"},
  {id:175,num:"別添資料F IRS F-4 ヘッドコーチチャレンジ",level:"A",ref:"インプリ F-4.2",q:"クルーチーフによって承認されたIRS機器を利用できるゲームの中で、チームBのヘッドコーチがヘッドコーチチャレンジを請求した。ヘッドコーチは、最も近い審判と目で見えるようにコミュニケーションを確立し、はっきりとヘッドコーチチャレンジを依頼した。大きな声で英語で「チャレンジ」と言い、ヘッドコーチチャレンジのシグナルを示した。ヘッドコーチからヘッドコーチチャレンジの依頼を受けたアンパイヤがクルーチーフに伝えた直後、チームBのヘッドコーチは請求の取り下げを申し出た。審判は最も近くにいたアンパイアによってヘッドコーチチャレンジの依頼をすでに受けたため、請求は最終的なものであり、撤回することはできない。",ans:false,explanation:"ヘッドコーチによるチャレンジの請求は、審判（クルーチーフ）がヘッドコーチチャレンジのシグナルを示し、認めるまでは取り消すことができる。",ruleSrc:"インプリ F-4.2",ruleText:"インプリ F-4.2\nヘッドコーチによるチャレンジの請求は、審判（クルーチーフ）がヘッドコーチチャレンジのシグナルを示し、認めるまでは取り消すことができる。"},
];

const RULE_DATA=[{"type": "rule", "art_no": "1", "art_title": "定義", "sec_no": "1-1", "body": "１-１　バスケットボールゲーム\nバスケットボールは、それぞれ５人ずつのプレーヤーからなる２チームによってプレーされる。\nそれぞれのチームの目的は「相手チームのバスケットに得点すること」および「相手チームが得点することを妨げること」である。\nゲームは、審判、テーブルオフィシャルズ、およびコミッショナー（同席している場合）によって進行される。"}, {"type": "rule", "art_no": "1", "art_title": "定義", "sec_no": "1-2", "body": "１-２　ゲームに関わる人々に求められる責任\nゲームに関わる全ての人物（テーブルオフィシャルズ、テクニカルデリゲート/コミッショナー（同席している場合）、プレーをすることができる全てのチームメンバー、ヘッドコーチおよびその他のチーム関係者）はゲームの円滑な運営に積極的に役割を果たす必要があり、常に倫理的な行動を示すことが求められる。\nゲームに関わる全ての人物は、得点、ファウル、タイムアウトを含む記録や、ゲームクロック、ショットクロックの操作に関わる訂正のできる誤りを認識した場合、本規則に従って誤りが訂正されるようただちに審判に知らせることが求められる。"}, {"type": "rule", "art_no": "1", "art_title": "定義", "sec_no": "1-3", "body": "１-３　相手チームのバスケット/自チームのバスケット\nチームが攻撃するバスケットを「相手チームのバスケット」といい、防御するバスケットを「自チームのバスケット」という。"}, {"type": "rule", "art_no": "1", "art_title": "定義", "sec_no": "1-4", "body": "１-４　ゲームの勝敗\nゲームの勝敗は、競技時間が終了した時点で得点の多いチームを勝ちとする。"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-1", "body": "２-１  コート\nコートは、障害物のない水平で硬い表面とする。（図１）\nコートの大きさは、境界線の内側からはかり、縦28m、横15m とする。"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-2", "body": "２-２  フロア\nフロアには、障害物から最低でも２m 離れたバウンダリレーンに囲まれたコートのある範囲を含む。\n（図２）したがってフロアの寸法は最低でも縦32m、横19m とする。"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-3", "body": "２-３  バックコート\nバックコートとは、自チームのバスケットの後ろのエンドライン、サイドライン、センターラインで区切られたコートの部分をいい、自チームのバスケットとそのバックボードの内側の部分を含む。\n【補足】バックボードの内側とは、裏側以外の部分を指す。"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-4", "body": "２-４  フロントコート\nフロントコートとは、相手チームのバスケットの後ろのエンドライン、サイドライン、センターラインの相手バスケット側の端で区切られたコートの部分をいい、相手チームのバスケットとそのバックボードの内側の部分を含む。"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-5", "body": "２-５  ライン\n全てのラインは幅５㎝とし、白またはその他の対照的な色（１色）のみではっきりと見えるように描かれていなければならない。\n【補足】対照的な色とは、コートや制限区域などに対して対照的とし、ラインとはっきり認識できる色を指す。"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-5-1", "body": "２-５-１  境界線（バウンダリライン）\nコートは、境界線（エンドラインおよびサイドライン）で囲まれている。これらのラインはコートには含まれない。\n【補足】エンドラインはコートの短い側のラインを指し、サイドラインはコートの長い側のラインを指す。\nヘッドコーチ、ファーストアシスタントコーチ、交代要員、5個のファウルを宣せられたチームメンバー、チーム関係者の座っている席を含む全ての障害物は、コートから2ｍ以上離れていなければならない。"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-5-2", "body": "２-５-２  センターライン、センターサークル、フリースローセミサークル\nセンターラインは、両エンドラインと平行に両サイドラインの中央を結ぶ。センターラインはサイドラインより外側に0.15m 延長する。センターラインはバックコートの一部である。\nセンターサークルは、円周の外側までが半径1.80m である円をコートの中央に描く。\nフリースローセミサークルは、フリースローラインの中央を中心として円周の外側までが半径1.80m である半円を描く。（図３）\n図１ コートの全寸法\n図２ コートとフロア"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-5-3", "body": "２-５-３  フリースローライン、制限区域（リストリクティッドエリア）、フリースローのリバウンド位置\nフリースローラインは、エンドラインと平行で、エンドラインの内側からフリースローラインの遠い側の縁までの距離は5.80mとし、ラインの長さは3.60mとする。フリースローラインの中央は、両エンドラインの中央を結ぶ線上にあるものとする。\n制限区域は、エンドライン、フリースローラインおよびフリースローラインを両側0.65m ずつ延長したライン、エンドラインの中央から左右2.45mの点からフリースローラインを延長したラインとの交点で区画されたコートの長方形の部分をいう。\nエンドラインを除いて制限区域を区画するラインは、制限区域の一部である。\n【補足】フリースローラインを両側0.65m ずつ延長したラインの全体の長さは4.90m となる。\nフリースローのときにリバウンドに参加するプレーヤーが制限区域に沿って占めるリバウンドの位置を定めるラインは、図３に示すとおりとする。"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-5-4", "body": "２-５-４  スリーポイントゴールエリア\nチームのスリーポイントゴールエリア（図１・図４）は、以下のラインで区切られた相手チームのバスケットに近いエリアを除く、コートの全エリアをいう：\n・外側の縁までの距離がサイドラインの内側の縁から0.90m となるようにエンドラインと直角に描いた２本の平行な直線。\n・相手チームのバスケットの中心点から真下にフロアまで下りた地点を中心とする円周の外側までが半径6.75m の半円。エンドラインの内側の縁から半円の中心までの距離は1.575m とする。半円は２本の平行な直線と交わる。\nスリーポイントラインは、スリーポイントゴールエリアには含まれない。"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-5-5", "body": "２-５-５  チームベンチエリア\nチームベンチエリアとは、図１で示されているように、２本のラインで区画されたコート外の部分をいう。\nそれぞれのチームベンチエリアには、ヘッドコーチ、アシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー、アシスタントコーチを含めたチーム関係者のために16席が用意されていなければならない。\nそれ以外の人は、チームベンチから後ろに２m 以上離れていなければならない。\n【補足】国内大会においてチームベンチの席数は、大会主催者の考えにより変更することができる。"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-5-6", "body": "２-５-６  スローインライン\nスローインラインとは、コートの外側に向かってサイドラインと直角に引いた、長さ0.15mの４本のラインをいう。\n近い方のエンドラインの内側の縁から8.325mの距離に、そのエンドラインから遠い側の縁があたるように描く。"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-5-7", "body": "２-５-７  ノーチャージセミサークル\nノーチャージセミサークルのエリアはコート上に描かれ、以下のとおり区切られる：\n・バスケットの中心点から真下にコートまで下りた地点を中心とする外側の縁までが半径1.30m の半円。\n・その半円の端を起点として、エンドラインの内側の端から1.20mの位置まで伸ばされた長さ0.375m の2 本の平行なライン。各ラインはエンドラインに垂直で、ラインが半円とつながっている箇所は、バスケットの中心点から真下にコートまで下りた地点からラインの外側の縁までを1.30m とする。\nノーチャージセミサークルエリアは、上記の平行な２本のラインの両端を結ぶ、バックボードの表面を直接真下に投影した仮想のラインを加えて完成する。\nノーチャージセミサークルのラインは、ノーチャージセミサークルエリアの一部である。\n図３ 制限区域（リストリクティッドエリア）\n図４ ツーポイント/スリーポイントゴールエリア"}, {"type": "rule", "art_no": "2", "art_title": "コート", "sec_no": "2-6", "body": "２-６  スコアラーズテーブルおよび交代席の配置（図５）\n図５ スコアラーズテーブルと交代席"}, {"type": "rule", "art_no": "3", "art_title": "用具・器具", "sec_no": "3", "body": "第３条　用具・器具\nバスケットボールのゲームを行うときには、次の施設、用具・器具が用意されていなければならない：\n・バックストップユニット（バックボード、リング・ネット、サポート）\n・ボール\n・ゲームクロック\n・スコアボード\n・ショットクロック\n・タイムアウトの時間をはかるためのストップウォッチまたは表示装置\n・２種類以上の明瞭に異なる音色の大きな音の出るブザー\n・スコアシート\n・プレーヤー/ヘッドコーチのファウルの表示器具\n・チームファウルの表示器具\n・オルタネイティングポゼッションアローの表示器具\n・フロア・コート\n・十分な光量の照明"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-1", "body": "４-１  定義"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-1-1", "body": "４-１-１  チームメンバーとして認められるためには、大会主催者が定める大会規定に明記されている条件（年齢制限を含む）を満たしていなければならない。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-1-2", "body": "４-１-２  チームメンバーは、ゲーム開始前にその氏名がスコアシートに記入されていれば、そのゲームに出場することができる。ただし、失格・退場を宣せられるか５個のファウルを宣せられた場合は、それ以降そのゲームに出場することはできない。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-1-3", "body": "４-１-３  競技時間中、チームメンバーとは以下を指す：\n・プレーをする資格があり、コート上にいるプレーヤー。\n・プレーをする資格があり、コート上にいない交代要員。\n・５個のファウルを宣せられ、プレーをする資格を失ったチームメンバー。\n【補足】５個のファウルを宣せられプレーをする資格を失ったチームメンバーは、以降そのゲームに出場することはできないが、チームベンチに座ることは許される。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-1-4", "body": "４-１-４  プレーのインターバル中は、プレーをする資格があるチームメンバーは全てプレーヤーであるとみなされる。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-2", "body": "４-２  ルール"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-2-1", "body": "４-２-１  各チームの構成は、次のとおりとする：\n【補足】国内大会における以下の人数等は大会主催者の考えにより変更することができる。\n・キャプテンを含む、プレーをする資格のある12 人以内のチームメンバー。\n・1 人のヘッドコーチ。\n・チームベンチに座ることを許された、アシスタントコーチを含む最大8 人のチーム関係者。\n複数のアシスタントコーチを置く場合、スコアシートにはファーストアシスタントコーチが記入される。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-2-2", "body": "４-２-２  競技時間中は、各チーム５人のチームメンバーがコート上でプレーをし、交代することもできる。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-2-3", "body": "４-２-３  以下のとき、交代要員はプレーヤーとなり、プレーヤーは交代要員となる：\n・審判が交代要員をコートに招き入れる。\n・タイムアウトもしくはプレーのインターバル中、交代要員がタイマーに交代を申し出る。\n【補足】国内大会においてはスコアラーに交代を申し出る。\nクォーターとオーバータイムの間のインターバルにおいては、それぞれのインターバルが終了した時点で、プレーヤーは交代要員となる。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-3", "body": "４-３  ユニフォーム\n【補足】国内大会におけるユニフォームの規定は「（公財）日本バスケットボール協会ユニフォーム規則」に準じる。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-3-1", "body": "４-３-１  全てのチームメンバーのユニフォームの規定は、次のとおりとする：\n・シャツは、パンツと同様に前後同じ主となる色でデザインされたもの。\nシャツに袖がある場合は肘より上まででなければならない。長袖は認められない。\n全てのプレーヤーは、コート内ではシャツをパンツの中に入れなければならない。「オールインワン」は認められる。\n【補足】国内大会では、女子についてはシャツをパンツの外に出すようにデザインされたものを使用してもよい。\n・パンツは、シャツと同様に前後同じ主となる色でデザインされたもの。\nパンツの裾は膝より上まででなければならない。\n・ソックスは、全てのチームメンバーが同じ主となる色でデザインされたもの。\nソックスは見える状態でなければならない。\n【補足】国内大会においては大会主催者の考えにより変更することができる。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-3-2", "body": "４-３-２  各チームメンバーはシャツの前面と背面に、シャツの色とはっきりと区別できる色で整数の番号をつける。\n番号ははっきりと見えるもので、そのうえで：\n・背面の番号の高さは16 ㎝以上とする。\n・前面の番号の高さは8 ㎝以上とする。\n・番号の幅は２㎝以上とする。\n・番号は０、00 および１から99 のいずれかを用いる。\n【補足】同一チーム内において、「0」と「００」は同時に使用することができる。\n・チーム内で異なるプレーヤーが同じ番号を用いてはならない。\n・ユニフォームに広告や商標、ロゴマーク等をつける場合は、番号から4㎝以上離れていなければならない。\n【補足】国内大会においては大会主催者の考えにより変更することができる。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-3-3", "body": "４-３-３  各チームは、シャツを２セット以上用意しておかなければならない。\n【補足】「２セット以上」とは濃淡それぞれ２セットである。ただし国内大会においては、大会主催者の考えにより決定することができる。\nそのうえで：\n・プログラム上で最初に記載されているチーム（またはホームチーム）は淡色のシャツを着用する。\n（白色が望ましい）\n・プログラム上で２番目に記載のあるチーム（またはビジターチーム）は濃色のシャツを着用する。\n・ただし、両チームの話し合いで双方が了解した場合は、シャツの色の濃淡を交換することができる。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-4", "body": "４-４  その他\nの身につけるもの\n【補足】国内大会におけるその他の身につけるものについては「JBA ユニフォーム規則」に準じる。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-4-1", "body": "４-４-１  プレーヤーは、プレーをするのにふさわしくないもの、ゲームに支障をもたらすものを身につけてはならない。身長や腕の長さを補ったり、その他どのような方法であれ、不当な利益をもたらすような用具・器具を使用したり着用したりしてはならない。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-4-2", "body": "４-４-２  プレーヤーは、他のプレーヤーに怪我をさせる可能性があるものを着用してはならない。\n・次のものは身につけてはならない：\n−柔らかいパッドで覆われていても、指、手、手首、肘や前腕の防具、ヘルメット、固定具や支持具で、皮革、プラスティック、合成樹脂、金属、その他硬い素材でつくられているもの。\n−他のプレーヤーに切り傷やすり傷を与えるようなもの。（指の爪は短く切っておくこと）\n−ヘアアクセサリーや貴金属類。\n・次のものは身につけても差し支えない：\n−十分にパッドで覆われている上腕、大腿部や下腿部の防具。\n−コンプレッション素材のアンダーシャツやアンダーショーツを含む、腕用および脚用のウェア。\n−ヘッドギア。顔の一部（目、鼻、唇等）あるいは全部を覆うものではなく、着用するプレーヤーあるいはその他のプレーヤーに危険なものであってはならない。またヘッドギアは顔や首に開閉部分を持たず、表面に突起物があってはならない。\n−膝、肩および足首の装具。\n−負傷した鼻のプロテクター。（硬い素材でつくられたものを含む）\n−無色透明なマウスガード。\n−眼鏡で、他のプレーヤーに危険が及ばないもの。\n−リストバンドやヘッドバンドは、最大10cm の幅で、繊維素材のもの。\n−腕や肩、脚等のテーピング。\n同じチームの全てのプレーヤーの腕や脚のアンダーシャツやアンダーショーツを含むコンプレッションウェア、ヘッドギア、リストバンド、ヘッドバンド、テーピングは全て同じ単色でなければならない。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-4-3", "body": "４-４-３  ゲーム中、プレーヤーはどのような色の組み合わせのシューズを履いてもよい。点滅するライト、反射素材やその他の装飾物は認められない。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-4-4", "body": "４-４-４  ゲーム中、プレーヤーはいかなる商業的、宣伝的、チャリティー目的の名前やマーク、ロゴやその他特定できるものを体、髪の毛、その他の場所に表示させてはならない。"}, {"type": "rule", "art_no": "4", "art_title": "チーム", "sec_no": "4-4-5", "body": "４-４-５  本条に記載のない、その他の身につけるものについては、FIBA テクニカルコミッションによって承認されなければならない。\n【補足】国内大会においては、承認者は大会主催者となる。大会主催者は必要に応じて（公財）日本バスケットボール協会に確認する。"}, {"type": "rule", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-1", "body": "５-１  プレーヤーが怪我をした場合は、審判はゲームを止めることができる。"}, {"type": "rule", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-2", "body": "５-２  怪我が発生したときにボールがライブであれば、どちらのチームにも不利にならない限り、ボールをコントロールしているチームがショットを放つか、ボールのコントロールを失うか、プレーをすることを控えるか、もしくはボールがデッドになるまで審判は笛を吹かない。怪我をしたプレーヤーの保護が必要な場合は、審判は速やかにゲームを止める。"}, {"type": "rule", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-3", "body": "５-３  怪我をしたプレーヤーが速やかに（約15 秒以内で）プレーを継続できない場合、手当てを受ける場合、あるいは自チームのヘッドコーチ、アシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー、チーム関係者のいずれかから何らかの介助を受けた場合、そのチームのコート上のプレーヤーの数が５人未満になってしまう場合を除いて、そのプレーヤーは交代をしなければならない。\n【補足】「介助」とは、様子を見ることを含めて自チームのプレーヤーのためにチームベンチエリアを離れることをいう。ゲームの再開を滞らせない範囲で、コート内に入ることなく、自チームのチームベンチエリア付近にて、15秒以内で介助を終えることができる場合、その行為は「介助」\nに含まない。"}, {"type": "rule", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-4", "body": "５-４  ヘッドコーチ、アシスタントコーチ、交代要員、5個のファウルを宣せられたチームメンバー、チーム関係者は、審判が許可をしたときに限り、怪我をしたプレーヤーが交代する前に、そのプレーヤーを介抱するためにコート内に入ることができる。"}, {"type": "rule", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-5", "body": "５-５  ボールがデッドになったとき、ドクターの判断により怪我をしたプレーヤーが直ちに手当てを必要とする場合は、ドクターは審判の許可なしにコート内に入ることができる。"}, {"type": "rule", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-6", "body": "５-６  ゲーム中に出血したり傷口が開いたりしているプレーヤーは、交代をしなければならない。そのプレーヤーは、出血が止まり開いている傷口が完全かつ安全に覆われた後でのみ、コートに戻ることができる。"}, {"type": "rule", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-7", "body": "５-７  怪我をしたプレーヤーや、出血したり傷口が開いたりしているプレーヤーが、どちらかのチームに認められたタイムアウト中に回復した場合、タイマーの交代のブザーの前であれば、そのプレーヤーはプレーを続行することができる。\n【補足】国内大会においては交代のブザーはスコアラーが鳴らす。怪我をしたプレーヤーの交代を知らせるためにスコアラーがブザーを鳴らすよりも前にタイムアウトが認められ、そのタイムアウトの間に手当てが終わった場合を指す。"}, {"type": "rule", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-8", "body": "５-８  ヘッドコーチによってゲームの最初に出場すると指定されたプレーヤー、あるいはフリースローの間に手当てを受けるプレーヤーが怪我をした場合は、交代をすることができる。この場合、相手チームも希望をすれば、同じ人数だけプレーヤーを交代することができる。\n【補足】怪我をしたプレーヤーに手当てを受けさせる場合は、フリースローの１本目のボールがフリースローシューターに与えられた後であっても、１本目と２本目のフリースローの間、あるいは２本目と３本目のフリースローの間に当該プレーヤーを交代させることができる。"}, {"type": "rule", "art_no": "6", "art_title": "キャプテン：任務と権限", "sec_no": "6-1", "body": "６-１  キャプテンは、ヘッドコーチによって指定されたそのチームのコート上での代表者である。ゲーム中、ボールがデッドでゲームクロックが止められているときにのみ、キャプテンは礼儀正しく審判とコミュニケーションを取ることができる。\n【補足】スコアシートに示されたキャプテンがコート上にいないとき（プレーヤーではないとき）は、ヘッドコーチによって指定されたコート上のプレーヤーがキャプテンの役目をする。"}, {"type": "rule", "art_no": "6", "art_title": "キャプテン：任務と権限", "sec_no": "6-2", "body": "６-２  キャプテンは、自チームがゲームの結果に抗議しスコアシートの「抗議の場合のキャプテン署名欄」にサインをする場合、ゲーム終了後15 分以内にクルーチーフに知らせなければならない。\n【補足】国内大会においては「競技規則：Ｃ-抗議の手続き」を参照。"}, {"type": "rule", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-1", "body": "７-１  ゲーム開始予定時刻の遅くとも40分前に、各チームのヘッドコーチあるいは代理の関係者はスコアラーに、ゲームに出場するプレーヤーの氏名と番号、キャプテンとするプレーヤーの氏名、ヘッドコーチとファーストアシスタントコーチの氏名を提出しなければならない。もしゲーム開始後に到着しても、スコアシートに記載されている全てのチームメンバーはゲームに出場することができる。\n【補足】国内大会においては、ゲームに出場することのできるチームメンバーリストの提出時間は、大会主催者の考えにより変更することができる。"}, {"type": "rule", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-2", "body": "７-２  ゲーム開始予定時刻の10分前には、各ヘッドコーチはチームメンバーの氏名と番号、ヘッドコーチとファーストアシスタントコーチの氏名を確認・同意し、スコアシートにサインをしなければならない。また同時に最初に出場する５人のプレーヤーを明示しなければならない。チームAのヘッドコーチが先にこの情報を提供する。\n【補足】国内大会においては、チームメンバーリストを確認・同意する時間は、大会主催者の考えにより変更することができる。"}, {"type": "rule", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-3", "body": "７-３  チームベンチに座って、チームベンチエリア内にとどまることができるのは、ヘッドコーチ、アシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー、チーム関係者だけである。競技時間中、全ての交代要員、５個のファウルを宣せられたチームメンバー、チーム関係者は着席していなくてはならない。"}, {"type": "rule", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-4", "body": "７-４  ゲーム中、ヘッドコーチあるいはファーストアシスタントコーチは、ボールがデッドになりゲームクロックが止められているときのみ、スコアラーズテーブルに行きスタッツの情報を得ることができる。\n【補足】スタッツの情報とは、得点、競技時間、スコアボードの表示、残っているタイムアウトの数、ファウルの数等を指す。"}, {"type": "rule", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-5", "body": "７-５  ゲーム中、ヘッドコーチは、ボールがデッドになりゲームクロックが止められているときのみ、審判に礼儀正しくコミュニケーションをとることができる。"}, {"type": "rule", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-6", "body": "７-６  ヘッドコーチとファーストアシスタントコーチは、一度にどちらか１人であればゲーム中に立ち続けることを認められている。チームベンチエリア内であれば、ゲーム中にプレーヤーに話しかけることができる。\nファーストアシスタントコーチは審判とコミュニケーションをとってはならない。\n【補足】ヘッドコーチとファーストアシスタントコーチは、両者が同時に立ち続けることは認められない。"}, {"type": "rule", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-7", "body": "７-７  ファーストアシスタントコーチを置くときは、ゲーム開始前にその氏名がスコアシートに記載されていなければならない（サインは不要）。ヘッドコーチが何らかの理由で役目を続けられない場合は、ファーストアシスタントコーチがヘッドコーチの任務と権限を引き継ぐ。"}, {"type": "rule", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-8", "body": "７-８  キャプテンがコートから退くときは、ヘッドコーチはコート上でキャプテンの役目をするプレーヤーの番号を審判に伝えなければならない。"}, {"type": "rule", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-9", "body": "７-９  ヘッドコーチがいない、あるいはヘッドコーチが役目を継続できずスコアシートに記載されたファーストアシスタントコーチもいない場合（あるいはファーストアシスタントコーチも役目を継続できない場合）、キャプテンがプレーヤー兼ヘッドコーチとして役目を果たさなければならない。キャプテンは、自身がコートから退かなければならない場合もヘッドコーチとしての役目を継続できる。キャプテンがディスクォリファイングファウルによって失格・退場になったり、怪我によってヘッドコーチの役目ができなくなったりしたとき、キャプテンの役目を引き継ぐプレーヤーがプレーヤー兼ヘッドコーチとしての役目も引き継ぐことができる。"}, {"type": "rule", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-10", "body": "７-10  ルールによりフリースローシューターが決められていない全ての場合で、ヘッドコーチはフリースローシューターを指定しなければならない。\n第章 プレーの規定（PLAYING REGULATIONS）"}, {"type": "rule", "art_no": "8", "art_title": "競技時間、同点、オーバータイム （Playing time, tied score and overtime）", "sec_no": "8-1", "body": "８-１  ゲームは各10 分間の４クォーターからなる。\n【補足】国内大会においては、U15 カテゴリーのゲームでは８分のクォーターを４回行う。"}, {"type": "rule", "art_no": "8", "art_title": "競技時間、同点、オーバータイム （Playing time, tied score and overtime）", "sec_no": "8-2", "body": "８-２  ゲーム開始20 分前よりプレーのインターバルを設ける。\n【補足】国内大会においては、インターバルの時間は大会主催者の考えにより変更することができる。"}, {"type": "rule", "art_no": "8", "art_title": "競技時間、同点、オーバータイム （Playing time, tied score and overtime）", "sec_no": "8-3", "body": "８-３  第１クォーターと第２クォーター（前半）の間、第３クォーターと第４クォーター（後半）の間、および各オーバータイムの間にそれぞれ２分間のインターバルを設ける。"}, {"type": "rule", "art_no": "8", "art_title": "競技時間、同点、オーバータイム （Playing time, tied score and overtime）", "sec_no": "8-4", "body": "８-４  ハーフタイムのインターバルは15 分間とする。\n【補足】国内大会のハーフタイムのインターバルは、10分間を推奨する。ただし、大会主催者の考えにより変更することができる。"}, {"type": "rule", "art_no": "8", "art_title": "競技時間、同点、オーバータイム （Playing time, tied score and overtime）", "sec_no": "8-5", "body": "８-５  プレーのインターバルは、次のときに始まる：\n・ゲーム開始の20 分前。\n【補足】８-２と同様とする。\n・クォーターやオーバータイムの終了を知らせるゲームクロックのブザーが鳴ったとき。"}, {"type": "rule", "art_no": "8", "art_title": "競技時間、同点、オーバータイム （Playing time, tied score and overtime）", "sec_no": "8-6", "body": "８-６  プレーのインターバルは、次のときに終わる：\n・第１クォーターを始めるジャンプボールで、トスアップのボールがクルーチーフの手から離れたとき。\n・それ以外のクォーターやオーバータイムを始めるスローインで、スローインをするプレーヤーにボールが与えられたとき。"}, {"type": "rule", "art_no": "8", "art_title": "競技時間、同点、オーバータイム （Playing time, tied score and overtime）", "sec_no": "8-7", "body": "８-７  第４クォーターが終わったときに得点が同点だった場合、１回５分間のオーバータイムを決着がつくまで必要な回数行う。\n【補足】U15 カテゴリーのゲームではオーバータイムは１回３分間とする。\n２ゲームのホーム＆アウェーで行われるゲームの合計得点を競う大会システムで、２ゲーム目が終わったとき２ゲームの合計得点が同点だった場合、勝敗を決める（タイブレイク）ため１回５分間のオーバータイムを必要な回数行う。"}, {"type": "rule", "art_no": "8", "art_title": "競技時間、同点、オーバータイム （Playing time, tied score and overtime）", "sec_no": "8-8", "body": "８-８  各クォーターやオーバータイムの終了間際にファウルが宣せられた場合、審判は残りの競技時間を決定する。ゲームクロックには最低でも0.1 秒が表示される。"}, {"type": "rule", "art_no": "8", "art_title": "競技時間、同点、オーバータイム （Playing time, tied score and overtime）", "sec_no": "8-9", "body": "８-９  プレーのインターバル中にテクニカルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルが宣せられた場合、その罰則のフリースローは次のクォーターやオーバータイムの開始時に行われる。"}, {"type": "rule", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-1", "body": "９-１  第１クォーターは、ボールがセンターサークルでジャンプボールのトスのためにクルーチーフの手から離れたときに始まる。"}, {"type": "rule", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-2", "body": "９-２  それ以外のクォーターあるいは各オーバータイムは、ボールがスローインするプレーヤーに与えられたときに始まる。"}, {"type": "rule", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-3", "body": "９-３  片方もしくは両方のチームがプレーをできる状態の５人のプレーヤーをコート上に揃えることができない場合、ゲームを始めることはできない。"}, {"type": "rule", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-4", "body": "９-４  全てのゲームにおいて、プログラム上で最初に記載されているチーム（ホームチーム）は、スコアラーズテーブルからコートに向かって、スコアラーズテーブルの左側を自チームのチームベンチとし、ゲーム前のウォームアップを自チームのチームベンチ前のハーフコートで行う。\n【補足】前半はゲーム前のウォームアップを行ったバスケットを相手チームのバスケットとして攻撃を行う。\nしかし、両チームが合意する場合、チームベンチとゲーム前のウォームアップを行うハーフコートを交換することができる。"}, {"type": "rule", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-5", "body": "９-５  両チームは、後半にウォームアップを行うハーフコートとバスケットを交換する。"}, {"type": "rule", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-6", "body": "９-６  全てのオーバータイムでは、チームは第４クォーターと同じバスケットに向かってプレーをする。"}, {"type": "rule", "art_no": "9", "art_title": "ゲーム、クォーター、オーバータイムの開始と終了", "sec_no": "9-7", "body": "９-７  クォーター、オーバータイムまたはゲームは、クォーター、オーバータイムの終了を知らせるゲームクロックのブザーが鳴ったときに終了する。バックボードの外枠が赤く点灯するように備えられている場合は、ゲームクロックのブザーよりもその点灯を優先する。"}, {"type": "rule", "art_no": "10", "art_title": "ボールのステータス（状態）", "sec_no": "10-1", "body": "10-１  ボールのステータスは、ライブあるいはデッドのどちらかである。"}, {"type": "rule", "art_no": "10", "art_title": "ボールのステータス（状態）", "sec_no": "10-2", "body": "10-２  ボールは次のときにライブになる：\n・ジャンプボールの場合、トスアップのボールがクルーチーフの手から離れたとき。\n・フリースローの場合、フリースローシューターにボールが与えられたとき。\n・スローインの場合、スローインするプレーヤーにボールが与えられたとき。"}, {"type": "rule", "art_no": "10", "art_title": "ボールのステータス（状態）", "sec_no": "10-3", "body": "10-３  ボールは次のときにデッドになる：\n・ゴールあるいはフリースローが成功したとき。\n・ボールがライブで審判が笛を鳴らしたとき。\n・フリースローでボールがバスケットに入らないことが明らかになり、その後：\n−フリースローが続くとき。\n−別の罰則（フリースローやポゼッション）があるとき。\n・クォーターやオーバータイムの終了を知らせるゲームクロックのブザーが鳴ったとき。\n・チームがボールをコントロールしている間にショットクロックのブザーが鳴ったとき。\n【補足】ただし、ショットクロックのブザーが誤って鳴ったときは除く。\n・ショットされたボールが空中にある間に次のいずれかが起こった後で、どちらかのチームのプレーヤーがボールに触れたとき：\n−審判が笛を鳴らしたあと。\n−クォーターやオーバータイムの終了を知らせるゲームクロックのブザーが鳴ったあと。\n−ショットクロックのブザーが鳴ったあと。"}, {"type": "rule", "art_no": "10", "art_title": "ボールのステータス（状態）", "sec_no": "10-4", "body": "10-４  次のときボールはデッドにならず、ショットが成功したら得点が認められる：\n・ショットのボールが空中にある間に：\n−審判が笛を鳴らしたとき。\n−クォーターやオーバータイム終了のゲームクロックのブザーが鳴ったとき。\n−ショットクロックのブザーが鳴ったとき。\n・フリースローのボールが空中にあり、フリースローシューター以外の規則の違反（ファウルやバイオレーション）に対して審判が笛を鳴らしたとき。\n・シューターがゴールのためにひと続きの動作を始めてから、相手プレーヤー、もしくは相手のチームベンチに座ることを許された人物がファウルを宣せられ、シューターがそのひと続きの動作でショットを完了する場合に、シューターがゴールのためにボールをコントロールしているとき。\n審判が笛を鳴らした後で、明らかに新たなショットの動作（アクトオブシューティング）が起こされた場合、この条項は当てはまらず、得点も認められない。"}, {"type": "rule", "art_no": "11", "art_title": "プレーヤーと審判の位置", "sec_no": "11-1", "body": "11-１  プレーヤーの位置は、その触れているフロアによって決められる。\nプレーヤーが空中にいるときは、最後に触れていたフロアにいるものとみなされる。これは境界線、センターライン、スリーポイントライン、フリースローライン、制限区域を区画するラインやノーチャージセミサークルエリアを区画するラインを含む。"}, {"type": "rule", "art_no": "11", "art_title": "プレーヤーと審判の位置", "sec_no": "11-2", "body": "11-２  審判の位置も、プレーヤーと同じ方法で決められる。ボールが審判に触れたときは、その審判のいる位置のフロアに触れたものとする。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-1", "body": "12-１  ジャンプボールの定義"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-1-1", "body": "12-１-１  ジャンプボールは各チーム１人ずつのいずれかのプレーヤーの間に審判がボールをトスすることで行われる。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-1-2", "body": "12-１-２  ヘルドボールは、両チームの１人あるいはそれ以上のプレーヤーがボールに片手または両手をしっかりとかけて、どちらのプレーヤーも乱暴にしなければそのボールのコントロールを得られないときに宣せられる。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-2", "body": "12-２  ジャンプボールの手順"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-2-1", "body": "12-２-１  両ジャンパーは、センターサークルの自チームのバスケットに近い方の半円の中に両足が入るように立ち、片足はセンターラインの近くに置く。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-2-2", "body": "12-２-２  同じチームの２人のプレーヤーがサークルのまわりに隣り合わせて位置したときは、相手チームから要望があれば、一方の位置は譲らなければならない。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-2-3", "body": "12-２-３  審判は、両プレーヤーの間で、両者がジャンプをしても届かない高さまでまっすぐ上にボールをトスする。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-2-4", "body": "12-２-４  ボールが下降を始めた後で、少なくともどちらかのジャンパーによって片手または両手でタップされなければならない。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-2-5", "body": "12-２-５  どちらのジャンパーも、ボールが正当にタップされる前にそのポジション（位置）を離れてはならない。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-2-6", "body": "12-２-６  どちらのジャンパーも、ジャンパー以外のプレーヤーかコートにボールが触れるまで、ボールをキャッチしてはならないし、２回までしかタップすることはできない。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-2-7", "body": "12-２-７  ボールがどちらのジャンパーにもタップされなかった場合は、ジャンプボールはやり直しになる。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-2-8", "body": "12-２-８  ボールがタップされるまで、ジャンパー以外のプレーヤーは体のどの部分もサークルのラインに触れたり、越えたりしてはならない（ライン上のシリンダーを含む）。\n12-２-１、12-２-４、12-２-５、12-２-６、12-２-８に違反することはバイオレーションである。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-3", "body": "12-３  罰則\nバックボードの真後ろを除く、規則の違反（ファウルやバイオレーション）が起こった場所に最も近いアウトオブバウンズから行うスローインのボールが相手チームに与えられる。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-4", "body": "12-４  ジャンプボールシチュエーション\n次のとき、ジャンプボールシチュエーションになる：\n・ヘルドボールが宣せられたとき。\n・誰が最後に触れてボールがアウトオブバウンズになったか審判に確証がなかったとき、あるいは審判の意見が一致しなかったとき。\n・最後のフリースローが成功しなかったときに、両チームのプレーヤーがフリースローのバイオレーションをしたとき（ダブルフリースローバイオレーション）。\n・ライブのボールがリングとバックボードの間に挟まったり載ったりしたままになったとき。\n（ただし、以下の場合を除く）\n−次にフリースローが続く場合。\n−最後のフリースローの後、そのチームのフロントコートでスコアラーズテーブルの反対側のスローインラインからスローインが続く場合。\n・どちらのチームもボールをコントロールしていないかボールを与えられる権利がない状態でボールがデッドになったとき。\n・両チームに対する等しい罰則を相殺したあとで、ファウルによる罰則が残らず、最初のファウルもしくはバイオレーションが発生する前にどちらのチームもボールをコントロールしていなかったかボールを与えられる権利がないとき。\n・第１クォーター以外の全てのクォーターやオーバータイムが始まるとき。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-5", "body": "12-５  オルタネイティングポゼッションの定義\nオルタネイティングポゼッションとは、ゲーム中、ジャンプボールシチュエーションになったとき、両チームが交互にスローインをしてボールをライブにするゲーム再開の方法である。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-6", "body": "12-６  オルタネイティングポゼッションの手順"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-6-1", "body": "12-６-１  オルタネイティングポゼッションのスローインは、ジャンプボールシチュエーションになった場所に最も近いアウトオブバウンズから行う。ただし、バックボードの裏側からはスローインをしない。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-6-2", "body": "12-６-２  ジャンプボールのあと、最初のライブのボールのチームコントロールを得られなかったチームが、最初のオルタネイティングポゼッションのスローインの権利を得る。\n【補足】最初のライブのボールのチームコントロールは必ずしもコート上である必要はない。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-6-3", "body": "12-６-３  それぞれのクォーターやオーバータイムの終了時点で、次のオルタネイティングポゼッションの権利を与えられるチームが、スコアラーズテーブルの反対側のセンターラインの延長線上からのスローインを行うことでその次のクォーターやオーバータイムを始める。ただし、フリースローやスローインの罰則が与えられる場合を除く。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-6-4", "body": "12-６-４  オルタネイティングポゼッションによって次にスローインの権利を与えられるチームは、オルタネイティングポゼッションアローが相手チームのバスケットを向いていることで示され る。オルタネイティングポゼッションアローの向きはオルタネイティングポゼッションのスローインが終わり次第、速やかに変えられる。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-6-5", "body": "12-６-５  オルタネイティングポゼッションのスローインの間にそのチームがバイオレーションを宣せられたとき、そのチームはオルタネイティングポゼッションのスローインの権利を失う。オルタネイティングポゼッションアローの向きは速やかに変えられ、次のジャンプボールシチュエーションのときは、バイオレーションを宣せられたチームの相手チームがオルタネイティングポゼッションのスローインの権利を得ることが示される。\nその後ゲームはバイオレーションを宣せられたチームの相手チームによるスローインを元々のスローインの場所から行うことで再開される。"}, {"type": "rule", "art_no": "12", "art_title": "ジャンプボール、オルタネイティングポゼッション", "sec_no": "12-6-6", "body": "12-６-６  どちらかのチームによるファウルが以下の状況で起きたとき：\n・第１クォーター以外のクォーターやオーバータイムの開始前、あるいは、\n・オルタネイティングポゼッションのスローインの間。\n上記の状況では、与えられていたオルタネイティングポゼッションルールによるスローインの権利は取り消されない。"}, {"type": "rule", "art_no": "13", "art_title": "ボールの扱い方", "sec_no": "13-1", "body": "13-１  定義\nゲーム中、ボールは手で扱わなければならない。\nプレーヤーは、規則の定める範囲内であれば、どの方向へでもボールをパスしたり、スローしたり、タップしたり、転がしたり、あるいはドリブルしたりすることができる。"}, {"type": "rule", "art_no": "13", "art_title": "ボールの扱い方", "sec_no": "13-2", "body": "13-２  ルール\nボールを持って走ること、故意に足または脚（大腿部も含む）でボールを蹴ったり止めたりすること、ボールをこぶしでたたくことは、バイオレーションである。\nただし、ボールが偶然に足または脚に当たったり触れたりすることは、バイオレーションではない。\n13-２に違反することはバイオレーションである。"}, {"type": "rule", "art_no": "13", "art_title": "ボールの扱い方", "sec_no": "13-3", "body": "13-３  罰則\nバックボードの真後ろを除く、規則の違反（ファウルやバイオレーション）が起こった場所に最も近いアウトオブバウンズから行うスローインのボールが相手チームに与えられる。"}, {"type": "rule", "art_no": "14", "art_title": "ボールのコントロール", "sec_no": "14-1", "body": "14-１  定義"}, {"type": "rule", "art_no": "14", "art_title": "ボールのコントロール", "sec_no": "14-1-1", "body": "14-１-１  チームコントロール（チームがボールをコントロールしていること）は、そのチームのプレーヤーがライブのボールを持つかドリブルをしたとき、あるいはライブのボールを与えられたときに始まる。"}, {"type": "rule", "art_no": "14", "art_title": "ボールのコントロール", "sec_no": "14-1-2", "body": "14-１-２  チームコントロールは以下のときに継続する：\n・そのチームのプレーヤーがライブのボールをコントロールしているとき。\n・そのチームのプレーヤー同士でボールがパスされているとき。"}, {"type": "rule", "art_no": "14", "art_title": "ボールのコントロール", "sec_no": "14-1-3", "body": "14-１-３  チームコントロールは以下のときに終了する：\n・相手チームのプレーヤーがボールをコントロールしたとき。\n・ボールがデッドになったとき。\n・ショットをしてボールがプレーヤーの手から離れたとき。"}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-1", "body": "15-１  定義"}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-1-1", "body": "15-１-１  「ショット」とは、プレーヤーが片手または両手でボールを持ち、その後、相手チームのバスケットに向けてボールを投げることをいう。\n「タップ」とは、プレーヤーが片手または両手で相手チームのバスケットに向けてボールを弾くことをいう。\n「ダンク」とは、片手または両手で、ボールを相手チームのバスケットに向けて叩き込むことをいう。\nバスケットへのドライブでのひと続きの動作あるいはその他の「動きながらのショット」とは、動きながらボールをキャッチしたり、ドリブルを完了したりしてから、（通常は上方へ向かって）続けてショットの動作を行うプレーヤーの行為をいう。"}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-1-2", "body": "15-１-２  動きながらではないショットの動作（アクトオブシューティング）とは：\n・プレーヤーが相手チームのバスケットに向けて、ボールを上方に動かし始めたときに始まる。\n・ボールがそのプレーヤーの手を離れたとき、あるいは完全に新たなショットの動作（アクトオブシューティング）を行なったときに終わる。またシューターが空中にいる場合は両足がフロアに着地したときに終わる。\n【補足】「動きながらではないショット」はFIBA Official Basketball Rules では単に\"shot\"と表現しているが、日本語では「ショット」と訳すことで他の箇所と意味が混同してしまうため、本競技規則では「動きながらではないショット」とする。"}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-1-3", "body": "15-１-３  バスケットへのドライブでのひと続きの動作あるいはその他の動きながらのショットの動作（アクトオブシューティング）とは：\n・ショットの動作に先立って、プレーヤーがドリブルを終え、もしくは空中でボールをキャッチし、片手または両手でボールを支え持ったときに始まる。\n・ボールがそのプレーヤーの手を離れたとき、あるいは完全に新たなショットの動作（アクトオブシューティング）を行なったときに終わる。またシューターが空中にいる場合は両足がフロアに着地したときに終わる。"}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-1-4", "body": "15-１-４  ボールを持ったプレーヤーが競技規則で許された範囲で踏んだ歩数とショットの動作（アクトオブシューティング）との間に関係はない。"}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-1-5", "body": "15-１-５  ショットの動作（アクトオブシューティング）の最中にプレーヤーが相手プレーヤーによって片腕または両腕をつかまれることで、得点を妨げられることがある。このとき、ボールがプレーヤーの片手または両手から離れることは必須ではない。"}, {"type": "rule", "art_no": "15", "art_title": "ショットの動作（アクトオブシューティング）中のプレーヤー", "sec_no": "15-1-6", "body": "15-１-６  ショットの動作（アクトオブシューティング）中のプレーヤーが、ファウルをされた後でボールをパスしたとき、そのプレーヤーはアクトオブシューティング中であるとは見なされなくなる。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-1", "body": "16-１  定義"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-1-1", "body": "16-１-１  ライブのボールが上からバスケットに入り、バスケットの中にとどまるか完全に通過したときにゴールになる。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-1-2", "body": "16-１-２  ボールの一部が少しでもリングの内側の上面より下にかかっている場合は、そのボールはバスケットの中にあるものとみなされる。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-2", "body": "16-２  ルール"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-2-1", "body": "16-２-１  ゴールによる得点は、相手チームのバスケットを攻撃しているチームに次のように与えられる。\n・フリースローによるゴールは１点。\n・ツーポイントゴールエリアから放たれたゴールは２点。\n・スリーポイントゴールエリアから放たれたゴールは３点。\n最後のフリースローの場合、ボールがリングに触れた後でバスケットに入る前に、オフェンスのプレーヤーあるいはディフェンスのプレーヤーが正当にそのボールに触れ、その後そのボールがバスケットに入ったときは２点が認められる。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-2-2", "body": "16-２-２  誤ってでも偶然にでも自チームのバスケットにボールを入れてしまったゴールは、相手チームに２点が与えられ、相手チームのそのときコート上にいるキャプテンの得点として記録される。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-2-3", "body": "16-２-３  故意に自チームのバスケットにボールを入れるゴールはバイオレーションであり、得点は認められない。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-2-4", "body": "16-２-４  ボールが下からバスケットに入り完全に通過したときはバイオレーションになる。"}, {"type": "rule", "art_no": "16", "art_title": "得点：ゴールによる点数（Goal : When made and its value）", "sec_no": "16-2-5", "body": "16-２-５  スローインあるいは最後のフリースローの後のリバウンドのときに、ボールをつかんでショットをするためには、最低でもゲームクロックあるいはショットクロックが0.3秒以上を表示していなければならない。ゲームクロックまたはショットクロックに0.2 秒あるいは0.1 秒が表示されている場合、得点するために有効なゴールは、ボールをタップするか直接ダンクするかのみで、その場合でもゲームクロックまたはショットクロックに0.0秒が表示されたときにプレーヤーの片手または両手はボールに触れていてはならない。\n【補足】ここで示される0.2秒以下での「タップ」とは一瞬であってもボールを掴むことなくボールを弾く（チップ）のことをいう。0.2秒以下で一瞬でもボールを掴んだ場合、そのショットは認められない。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-1", "body": "17-１  定義"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-1-1", "body": "17-１-１  スローインとは、アウトオブバウンズにいるプレーヤーによってボールがコート内にパスされることをいう。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-1-2", "body": "17-１-２  スローインは：\n・ボールがスローインを行うプレーヤーに渡されたときに始まる。\n・次のときに終わる：\n- ボールがコート上のいずれかのプレーヤーに触れた、もしくは正当に触れられたとき。\n- スローインを行うチームがバイオレーションを宣せられたとき。\n- スローイン中にライブのボールがリングとバックボードの間に挟まったとき。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2", "body": "17-２  手順"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-1", "body": "17-２-１  審判は、スローインをするプレーヤーにボールを手渡すか、スローインをする位置にボールを置かなければならない。審判が、スローインをするプレーヤーにボールをトスあるいはバウンスパスをして与えてもよいのは以下の場合である：\n・審判がスローインをするプレーヤーから、４m 以内のところにいる。\n・スローインをするプレーヤーが、審判に指示されたスローインを行うアウトオブバウンズの位置にいる。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-2", "body": "17-２-２  プレーヤーは、バックボードの真後ろを除く、規則の違反（ファウルやバイオレーション）が起こった場所もしくはゲームが止められた場所に最も近いアウトオブバウンズからスローインを行う。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-3", "body": "17-２-３  第１クォーター以外の全てのクォーターや全てのオーバータイムを始めるスローインを行う場合は、スコアラーズテーブルの反対側のセンターラインの延長線上から行う。\nこのとき、スローインをするプレーヤーはセンターラインの延長線上をまたいで立ち、コート上のどこにいるチームメイトにパスをしてもよい。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-4", "body": "17-２-４  第４クォーター、各オーバータイムでゲームクロックが２:00あるいはそれ以下を表示しているとき、バックコートからスローインを与えられることになっているチームに認められたタイムアウトの後で、そのチームのヘッドコーチは、フロントコートのスローインラインからのスローインでゲームを再開するか、バックコートのゲームが止められた場所に最も近いアウトオブバウンズからのスローインでゲームを再開するかを選択することができる。\nヘッドコーチがフロントコートからのスローインを選択したとき、元のスローインをバックコートから始めることになっていた場合は以下のように対応する。\n・ゴール成功後または最後のフリースロー成功後のエンドラインからのスローインである場合、ヘッドコーチは、スローインをスコアラーズテーブル側のスローインラインから行うか、反対側のスローインラインから行うかを選択することができる。\n・ファウルまたはバイオレーションの後のサイドラインまたはエンドラインからのスローインは、元のスローインと同じ側（スコアラーズテーブル側または反対側）のスローインラインから、フロントコートで行う。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-5", "body": "17-２-５  ライブのボールをコントロールしているチームのプレーヤーあるいはボールが与えられることになっていたチームのプレーヤーがパーソナルファウルを宣せられた場合、ファウルが起こった場所に最も近いアウトオブバウンズからのスローインで再開される。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-6", "body": "17-２-６  テクニカルファウルのあとはルールの中で別途規定がある場合を除き、ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからスローインで再開される。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-7", "body": "17-２-７  アンスポーツマンライクファウルまたはディスクォリファイングファウルのあとはルールの中で別途規定がある場合を除き、ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからスローインで再開される。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-8", "body": "17-２-８  ファイティングの場合は、ゲームは第39 条に定められているとおりに再開される。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-9", "body": "17-２-９  ボールがバスケットに入ってもゴールや最後のフリースローの得点が認められない場合、ゲームはフリースローラインの延長線上のアウトオブバウンズからスローインで再開される。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-2-10", "body": "17-２-10  ゴールあるいは最後のフリースローが成功した後のスローインは：\n・得点されたチームのプレーヤーが、そのバスケットの後ろのエンドラインの任意の位置のアウトオブバウンズからスローインをする。ゴールあるいは最後のフリースローが成功した後であれば、タイムアウトやその他のプレーの中断の後に審判がスローインをするプレーヤーにボールを与えた場合でもこの規定が適用され、エンドラインの任意の位置のアウトオブバウンズからスローインをしてよい。\n・エンドラインの後ろからスローインをするプレーヤーは、エンドラインに沿って動いて位置を変えてもよいし、エンドライン側のアウトオブバウンズにいるチームメイトにボールをパスしてもよいが、スローインのボールがコート内に向けて投げられるまでに５秒を超えてはならない。このときの５秒は、そのチームのプレーヤーが最初にエンドラインのアウトオブバウンズでボールを持つかボールを与えられたときから数える。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-3", "body": "17-３  ルール"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-3-1", "body": "17-３-１  スローインをするプレーヤーは、次のことをしてはならない：\n・スローインのボールを手離すのに５秒を超えること。\n・スローインのボールを手に持ったままコートに足を踏み入れること。\n【補足】スローインをしようとしたときにコートに足を踏み入れてしまった場合にもこのルールが適用される。\n・スローインをしたボールがコート内のプレーヤーに触れる前にアウトオブバウンズになること。\n・他のプレーヤーが触れる前にコート上でボールに触れること。\n・スローインをしたボールが（コート内のプレーヤーに触れないで）直接バスケットに入ること。\n・スローインのボールを手離す前に、審判に指示された場所からライン沿いに１mを超えて移動すること。\n一度移動してから逆の方向に移動し直しても構わない。また、コートのまわりにゆとりがあれば、ラインから直角に１m の距離を超えて繰り返し遠ざかったり近づいたりしてスローインをしてもよい。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-3-2", "body": "17-３-２  コート内のプレーヤーは、次のことをしてはならない：\n・スローインされたボールがラインを超えるまで、体の一部を少しでも境界線を超えてコートの外に出すこと。\n・コートのまわりにゆとりがなくて障害物からラインまでの距離が２m未満のとき、スローインをするプレーヤーから１m 以内に近づくこと。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-3-3", "body": "17-３-３  第４クォーター、各オーバータイムでゲームクロックが２:00あるいはそれ以下を表示しているときに、スローインが行われる場合、審判はスローインのボールを与えるときにイリーガルバウンダリラインクロッシングシグナル（プリベンティブシグナル）を使用して警告を与える。\nディフェンスのプレーヤーが：\n・スローインを妨げるために境界線を越えて体の一部を出した場合。\n・障害物からラインまでの距離が２ｍ未満のとき、スローインをするプレーヤーから１ｍ以内に近づいた場合。\nこれらはバイオレーションであり、テクニカルファウルとする。\n17-３に違反することはバイオレーションである。"}, {"type": "rule", "art_no": "17", "art_title": "スローイン（Throw-in）", "sec_no": "17-4", "body": "17-４  罰則\n元のスローインを行う位置のアウトオブバウンズで相手チームにボールが与えられ、スローインでゲームを再開する。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-1", "body": "18-１  定義\nタイムアウトとは、ヘッドコーチまたはファーストアシスタントコーチの請求によって認められるゲームの中断のことをいう。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2", "body": "18-２  ルール"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-1", "body": "18-２-１  それぞれのタイムアウトは、１分間とする。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-2", "body": "18-２-２  タイムアウトは、「タイムアウトが認められる時機」に与えることができる。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-3", "body": "18-２-３  「タイムアウトが認められる時機」は、次のときに始まる：\n・ボールがデッドでゲームクロックが止められたとき。\nまたファウルの後は、審判がテーブルオフィシャルズに伝達を終えたとき（両チームとも請求することができる）。\n・最後のフリースローが成功してボールがデッドになったとき（両チームとも請求することができる）。\n・相手チームがゴールで得点したとき（得点されたチームは請求することができる）。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-4", "body": "18-２-４  「タイムアウトが認められる時機」は、スローインを行うプレーヤーにボールが与えられたとき、あるいは最初のフリースローでフリースローを行うプレーヤーにボールが与えられたときに終わる。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-5", "body": "18-２-５  それぞれのチームに認められるタイムアウトの回数は：\n・前半（第１クォーターと第２クォーター）に２回。\n・後半（第３クォーターと第４クォーター）に３回。\nただし、第４クォーターで、ゲームクロックが２:00あるいはそれ以下を表示しているときには２回までしかタイムアウトをとることはできない。\n・各オーバータイムに１回。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-6", "body": "18-２-６  使わなかったタイムアウトを、次のハーフまたはオーバータイムに持ち越すことはできない。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-7", "body": "18-２-７  両チームのヘッドコーチもしくはファーストアシスタントコーチがタイムアウトを請求したときは、先に請求したチームのタイムアウトとする。ただし、規則の違反（ファウルやバイオレーション）が宣せられていない状況で、相手チームがゴールで得点したときに認められるタイムアウトは、請求の後先に関係なく得点されたチームのタイムアウトとする。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-2-8", "body": "18-２-８  第４クォーター、各オーバータイムでゲームクロックが２:00あるいはそれ以下を表示しているときにゴールが成功してゲームクロックが止められた場合、得点したチームにタイムアウトは認められない。ただし、審判がゲームを中断させた場合を除く。\n【補足】ここでの審判がゲームを中断させた場合とは、得点されたチームにタイムアウトや交代が認められたときなどの競技規則で想定されている状況で審判が笛を鳴らしてゲームを止めたときを指す。国内大会においては、第4 クォーター、各オーバータイムでゲームクロックが2：00 あるいはそれ以下を表示しているときに、審判やテーブルオフィシャルズの不注意、会場備品や施設等の不具合、コート内に物などが入ったとき、またはボールが遠くに転がったとき、モップなどコートの整備をやむなく入れるときなど、競技規則で想定されていない状況で審判が笛を鳴らしてゲームを止めた場合には、タイムアウトや交代は認められない。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3", "body": "18-３  手順"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3-1", "body": "18-３-１  タイムアウトを請求できるのは、ヘッドコーチまたはファーストアシスタントコーチのみである。\nヘッドコーチまたはファーストアシスタントコーチは、スコアラーズテーブルから目視できるように、あるいはスコアラーズテーブルのところへ行き、定められたシグナルを手ではっきりと示して、タイムアウトの請求を伝えなければならない。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3-2", "body": "18-３-２  タイムアウトの請求は、タイマーが審判に知らせるためにブザーを鳴らす前であれば取り消すことができる。\n【補足】国内大会においては審判にタイムアウトを知らせるためのブザーはスコアラーが鳴らし、そのブザーを鳴らす前であればタイムアウトの請求を取り消すことができる。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3-3", "body": "18-３-３  タイムアウトの始まりと終わり：\n・タイムアウトは、審判が笛を吹いてタイムアウトのシグナルを示したときに始まる。\n・タイムアウトは、審判が笛を吹いて両チームをコートに招き入れたときに終わる。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3-4", "body": "18-３-４  タイムアウトが認められる時機が始まったとき、タイマーはブザーを鳴らし、チームがタイムアウトを請求していることを審判に知らせる。\n【補足】国内大会においては審判にタイムアウトを知らせるためのブザーはスコアラーが鳴らす。\nタイムアウトを請求しているチームが相手チームにゴールを決められた場合は、タイマーは速やかにゲームクロックを止め、ブザーを鳴らす。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3-5", "body": "18-３-５  タイムアウト中、もしくは第２クォーター、第４クォーター、各オーバータイムの開始前のプレーのインターバル中、プレーヤーはコートから離れてチームベンチに座ってもよいし、チームベンチに座ることを許された人物はチームベンチエリアの近くであればコートに入ってもよい。"}, {"type": "rule", "art_no": "18", "art_title": "タイムアウト（Time-out）", "sec_no": "18-3-6", "body": "18-３-６  最初のフリースローのボールがフリースローシューターに与えられた後にタイムアウトの請求があった場合、以下のときにどちらのチームにもタイムアウトが認められる：\n・最後のフリースローが成功したとき。\n・最後のフリースローの後にスローインが続く場合で、最後のフリースローが成功しなかったとき。\n・与えられたそれぞれのフリースローの間にファウルが宣せられたとき。\nこの場合、ルールの中で別途規定がある場合を除き、元々与えられていたフリースローのセットを行ったあと、タイムアウトは新しいファウルの罰則が行われる前に認められる。\n・最後のフリースローの後で、ボールがライブになる前にファウルが宣せられたときこの場合、タイムアウトが認められたあと、新しいファウルの罰則が行われる。\n・最後のフリースローの後で、ボールがライブになる前にバイオレーションが宣せられたときこの場合、タイムアウトが認められたあと、スローインとなる。\n２個以上のファウルに対してそれぞれの罰則に定められているフリースローの「セット」やボールのポゼッションが続けて適用される場合は、それぞれの「セット」は個別に扱われる。\n【補足】この場合、それぞれの「セット」やスローインの前にタイムアウトが認められる。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-1", "body": "19-１  定義\n交代とは、交代要員がプレーヤーになるための請求によるゲームの中断のことをいう。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-2", "body": "19-２  ルール"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-2-1", "body": "19-２-１  チームは、「交代が認められる時機」にプレーヤーを交代させることができる。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-2-2", "body": "19-２-２  「交代が認められる時機」は、次のときに始まる：\n・ボールがデッドでゲームクロックが止められたとき。\nただし、ファウルまたはバイオレーションの後は、審判がテーブルオフィシャルズに伝達を終えたとき（両チームとも交代することができる）。\n・最後のフリースローが成功してボールがデッドになったとき（両チームとも交代することができる）。\n・第４クォーター、各オーバータイムでゲームクロックが２:00あるいはそれ以下を表示していて相手チームがゴールで得点したとき（得点されたチームは交代することができる）。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-2-3", "body": "19-２-３  「交代が認められる時機」は、スローインを行うプレーヤーにボールが与えられたとき、あるいは最初のフリースローでフリースローを行うプレーヤーにボールが与えられたときに終わる。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-2-4", "body": "19-２-４  次の場合を除き、交代が認められたときは、ゲームクロックが一度動いたあと、次にゲームクロックが止められ、ボールがデッドとなるまで、交代要員となったプレーヤーは再びプレーヤーとなることはできず、プレーヤーとなった交代要員は再び交代要員となることはできない：\n・そのプレーヤーを除くとそのチームが５人のプレーヤーを出場させることができない場合。\n・誤りの訂正によってフリースローを与えられるプレーヤーが、通常の交代をしてチームベンチに戻っていた場合。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-2-5", "body": "19-２-５  第４クォーター、各オーバータイムでゲームクロックが２:00あるいはそれ以下を表示していてゴールが成功してゲームクロックが止められた場合、得点したチームに交代は認められない。\nただし、審判がゲームを中断させた場合を除く。\n【補足】ここでの審判がゲームを中断させた場合とは、得点されたチームにタイムアウトや交代が認められたときなどの競技規則で想定されている状況で審判が笛を鳴らしてゲームを止めたときを指す。国内大会においては、第4 クォーター、各オーバータイムでゲームクロックが2：00あるいはそれ以下を表示しているときに、審判やテーブルオフィシャルズの不注意、会場備品や施設等の不具合、コート内に物などが入ったとき、またはボールが遠くに転がったとき、モップなどコートの整備をやむなく入れるときなど、競技規則で想定されていない状況で審判が笛を鳴らしてゲームを止めた場合には、タイムアウトや交代は認められない。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-2-6", "body": "19-２-６  プレーヤーが何らかの手当てや介助を受ける場合、そのチームのコート上のプレーヤーの数が５人未満になってしまう場合を除いて、そのプレーヤーは交代をしなければならない。\n【補足】「介助」とは、様子を見ることを含めて自チームのプレーヤーのためにチームベンチエリアを離れることをいう。ゲームの再開を滞らせない範囲で、コート内に入ることなく、自チームのチームベンチエリア付近にて、15秒以内で介助を終えることができる場合、その行為は「介助」に含まない。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-3", "body": "19-３  手順"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-3-1", "body": "19-３-１  交代を請求できるのは、交代要員自身のみである。ヘッドコーチやファーストアシスタントコーチではなく、交代要員はスコアラーズテーブルへ行き、定められたシグナルを手で示す、あるいは交代席に座ることで、はっきりと交代の申し出を伝えなければならない。このとき交代要員はすぐにプレーをする準備ができていなければならない。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-3-2", "body": "19-３-２  交代の申し出は、タイマーが審判に知らせるためにブザーを鳴らす前であれば取り消すことができる。\n【補足】国内大会においては審判に交代の申し出があることを知らせるためのブザーはスコアラーが鳴らし、そのブザーを鳴らす前であれば交代の申し出を取り消すことができる。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-3-3", "body": "19-３-３  交代が認められる時機が始まったとき、タイマーはブザーを鳴らし、交代の申し出があることを審判に知らせる。\n【補足】国内大会においては審判に交代の申し出があることを知らせるためのブザーはスコアラーが鳴らす。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-3-4", "body": "19-３-４  交代要員は、審判が笛を鳴らして交代のシグナルおよびコートに招き入れるシグナルをするまでは、境界線の外にいなければならない。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-3-5", "body": "19-３-５  交代要員となるプレーヤーは、審判やタイマーに知らせずに直接チームベンチに戻ることができる。\n【補足】国内大会においては審判に交代の申し出があることを知らせるためのブザーはスコアラーが鳴らすが、スコアラーにも知らせずに直接チームベンチに戻ることができる。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-3-6", "body": "19-３-６  交代はできる限り速く行わなければならない。\n５個のファウルを宣せられたプレーヤーあるいは失格・退場になったプレーヤーの交代は直ちに行わなければならない。（30 秒以内）\n不必要に交代に時間をかけすぎた場合、そのチームのタイムアウトとなり記録される。そのチームにタイムアウトが残っていないときは、そのチームのヘッドコーチにテクニカルファウルが宣せられ「Ｂ」\nと記録される。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-3-7", "body": "19-３-７  タイムアウトあるいはハーフタイムを除くプレーのインターバルの間に交代を申し出る場合、交代要員はゲームに加わる前にタイマーに知らせなければならない。\n【補足】国内大会においてはスコアラーに知らせなければならない。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-3-8", "body": "19-３-８  次の場合、フリースローシューターであっても交代しなければならない：\n・怪我をした場合。\n・５個のファウルを宣せられた場合。\n・失格・退場になった場合。\nこれらの場合、そのフリースローはフリースローシューターと交代したプレーヤーが行わなければならない。交代して代わりにフリースローを行ったプレーヤーは、フリースローのあと、ゲームクロックが一度動いた後でなければ再び交代要員となることはできない。"}, {"type": "rule", "art_no": "19", "art_title": "交代", "sec_no": "19-3-9", "body": "19-３-９  最初のフリースローのボールがフリースローシューターに与えられた後に交代の申し出があった場合、以下のときにどちらのチームにも交代が認められる：\n・最後のフリースローが成功したとき。\n・最後のフリースローが成功しなかった場合は、あとにスローインが続くとき。\n・与えられたそれぞれのフリースローの間にファウルが宣せられたとき。この場合、ルールの中で別途規定がある場合を除き、元々与えられていたフリースローのセットを行ったあと、交代は新しいファウルの罰則が行われる前に認められる。\n・最後のフリースローのあと、ボールがライブになる前にファウルが宣せられたとき。この場合、交代が認められたあと、新しいファウルの罰則が行われる。\n・最後のフリースローのあと、ボールがライブになる前にバイオレーションが宣せられたとき。この場合、交代が認められたあと、スローインになる。\n２個以上のファウルに対してそれぞれの罰則に定められているフリースローの「セット」やボールのポゼッションが続けて適用される場合は、それぞれの「セット」は個別に扱われる。\n【補足】この場合、それぞれの「セット」やスローインの前に交代が認められる。"}, {"type": "rule", "art_no": "20", "art_title": "ゲームの没収", "sec_no": "20-1", "body": "20-１  ルール次の場合、ゲームの没収によりチームは負けになる：\n・ゲーム開始予定時刻から15分を過ぎてもチームがコートにいない、もしくはプレーをする準備の整ったプレーヤーが５人揃わなかった場合。\n・ゲームの進行を妨げる行為をした場合。\n・クルーチーフがすすめたにもかかわらず、なおプレーをすることを拒んだ場合。"}, {"type": "rule", "art_no": "20", "art_title": "ゲームの没収", "sec_no": "20-2", "body": "20-２  罰則"}, {"type": "rule", "art_no": "20", "art_title": "ゲームの没収", "sec_no": "20-2-1", "body": "20-２-１  ゲームは、20 対０で相手チームの勝ちとする。負けたチームは勝ち点を与えられない。"}, {"type": "rule", "art_no": "20", "art_title": "ゲームの没収", "sec_no": "20-2-2", "body": "20-２-２  ２ゲーム（ホーム＆アウェー）合計得点で競う場合や、２ゲーム先取（３ゲーム中）のプレーオフの場合は、第１ゲーム、第２ゲームあるいは第３ゲームのいずれかが没収により負けとなったチームは、そのシリーズあるいはプレーオフ自体も没収により負けとなる。３ゲーム先取（５ゲーム中）や４ゲーム先取（７ゲーム中）のプレーオフにはこの規則は適用されない。"}, {"type": "rule", "art_no": "20", "art_title": "ゲームの没収", "sec_no": "20-2-3", "body": "20-２-３  １つの大会で２回目の没収となったチームは、その大会から失格となり、そのチームがそれまで行ったゲームの結果は無効になる。"}, {"type": "rule", "art_no": "21", "art_title": "ゲームの途中終了", "sec_no": "21-1", "body": "21-１  ルールゲーム中、コート上でプレーをすることができるプレーヤーが１人以下になったチームは、ゲームの途中終了により負けになる。"}, {"type": "rule", "art_no": "21", "art_title": "ゲームの途中終了", "sec_no": "21-2", "body": "21-２  罰則"}, {"type": "rule", "art_no": "21", "art_title": "ゲームの途中終了", "sec_no": "21-2-1", "body": "21-２-１  ゲームの途中終了によって勝ったチームがゲームをリードしていた場合は、途中終了時の得点が最終スコアになる。逆に、リードされていたチームが勝った場合は、最終スコアは２−０となる。どちらも負けたチームには勝ち点１が与えられる。"}, {"type": "rule", "art_no": "21", "art_title": "ゲームの途中終了", "sec_no": "21-2-2", "body": "21-２-２  ２ゲーム（ホーム＆アウェー）の合計得点で競う場合は、第１ゲームあるいは第２ゲームを途中終了で負けたチームはそのシリーズ自体も途中終了により敗退になる。\n第章 バイオレーション（VIOLATIONS）"}, {"type": "rule", "art_no": "22", "art_title": "バイオレーション", "sec_no": "22-1", "body": "22-１  定義\nバイオレーションは、規則の違反である。"}, {"type": "rule", "art_no": "22", "art_title": "バイオレーション", "sec_no": "22-2", "body": "22-２  罰則\n規則の中で別途規定がある場合を除き、バックボードの真後ろを除く、規則の違反（ファウルやバイオレーション）が起こった場所に最も近いアウトオブバウンズから行うスローインのボールが相手チームに与えられる。"}, {"type": "rule", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ", "sec_no": "23-1", "body": "23-１  定義"}, {"type": "rule", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ", "sec_no": "23-1-1", "body": "23-１-１  プレーヤーがアウトオブバウンズになるのは、そのプレーヤーが境界線または境界線の外のフロアに触れたとき、および境界線または境界線の外のフロアに触れているプレーヤー以外の人や物に触れたときである。"}, {"type": "rule", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ", "sec_no": "23-1-2", "body": "23-１-２  ボールがアウトオブバウンズになるのは、ボールが：\n・アウトオブバウンズになっているプレーヤーやプレーヤー以外の人に触れたとき。\n・境界線や境界線の外のフロアに触れたとき、または境界線やその外のフロアに触れている物に触れたとき。\n・バックボードのサポート部分、バックボードの裏側またはコートの上方に設置された物に触れたとき。"}, {"type": "rule", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ", "sec_no": "23-2", "body": "23-２  ルール"}, {"type": "rule", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ", "sec_no": "23-2-1", "body": "23-２-１  ボールがプレーヤー以外の人や物に触れてアウトオブバウンズになったときは、アウトオブバウンズになる前に最後に触れたプレーヤーがボールをアウトオブバウンズにしたことになる。"}, {"type": "rule", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ", "sec_no": "23-2-2", "body": "23-２-２  ボールが境界線に触れているプレーヤーまたは境界線の外にいるプレーヤーに触れてアウトオブバウンズになったときは、そのプレーヤーがボールをアウトオブバウンズにしたことになる。"}, {"type": "rule", "art_no": "23", "art_title": "プレーヤーのアウトオブバウンズ、ボールのアウトオブバウンズ", "sec_no": "23-2-3", "body": "23-２-３  ヘルドボールの間にプレーヤーがアウトオブバウンズかバックコートに触れてしまった場合は、ジャンプボールシチュエーションとなる。"}, {"type": "rule", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-1", "body": "24-１  定義"}, {"type": "rule", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-1-1", "body": "24-１-１  ドリブルとは、ライブのボールをコントロールしたプレーヤーが、ボールをコートに投げたり叩いたり転がしたり、弾ませたりする動作である。"}, {"type": "rule", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-1-2", "body": "24-１-２  ドリブルが始まるのは、コート上でライブのボールをコントロールしたプレーヤーが、ボールをコートに投げたり叩いたり転がしたり、弾ませたりして、その後、他のプレーヤーが触れないうちに再びそのボールに触れたときである。\nドリブルの間、プレーヤーは手のどの部分であってもボールの下に入れて、ある地点から別の地点に運ぶことはできない。またはボールを一度止めてからドリブルを続けることはできない。\nドリブルの間、プレーヤーはボールを空中に投げることもできるが、ボールがコートや他のプレーヤーに触れる前に、ボールを投げたプレーヤーがもう一度自分の手でボールに触れることはできない。\nボールが手に触れていない間は、そのプレーヤーの踏むステップの数に制限はない。\nドリブルが終わるのは、ドリブラーの両手が同時にボールに触れるか、片手または両手でボールを支え持ったときである。"}, {"type": "rule", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-1-3", "body": "24-１-３  コート上でライブのボールをコントロールしているプレーヤーが、誤ってボールのコントロールを失い、再びそのボールをコントロールしたときは、ボールをファンブルしたことになる。"}, {"type": "rule", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-1-4", "body": "24-１-４  以下の行為はドリブルではない：\n・連続してショットをすること。\n・ドリブルを始めるときや終わるときにボールをファンブルすること。\n・他のプレーヤーの近くにあるボールをはじき出してコントロールしようとすること。\n・他のプレーヤーがコントロールしているボールをはじき出すこと。\n・パスされたボールをはじき落としてそのボールをコントロールしようとすること。\n・トラベリングにならない範囲で、コートにボールがつく前に、片手もしくは両手でボールを支え持って、手から手にボールをトスして移すこと。\n・バックボードを狙ってボールを投げ、再びボールをコントロールすること。"}, {"type": "rule", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-2", "body": "24-２  ルール\nプレーヤーは以下のことが起きたときを除き、一度ドリブルを終えたあと、新たなドリブルをすることはできない：\n・ショットによってライブのボールコントロールが失われる。\n・相手プレーヤーがボールに触れる。\n・パスまたはファンブルしたボールが、他のプレーヤーに触れる。"}, {"type": "rule", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-1", "body": "25-１  定義"}, {"type": "rule", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-1-1", "body": "25-１-１  トラベリングとは、コート上でライブのボールを持ったまま、片足または両足を方向に関係なく、本項に定められた範囲を超えて移動させることである。"}, {"type": "rule", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-1-2", "body": "25-１-２  ピボットとは、コート上でライブのボールを持ったプレーヤーが、片方の足（ピボットフット）はコートとの接点を変えずに、もう片方の足で任意の方向に何度でもステップを踏む正当な動きである。"}, {"type": "rule", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-2", "body": "25-２  ルール"}, {"type": "rule", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-2-1", "body": "25-２-１  コート上でライブのボールをキャッチしたプレーヤーのピボットフットの決め方：\n・コートに両足で立ったままボールをキャッチしたプレーヤーの場合：\n−片足を上げた瞬間、もう片方の足がピボットフットになる。\n−ドリブルを始めるためには、ボールが手から離れる前にピボットフットを上げてはならない。\n−パスもしくはゴールのショットをするためにピボットフットでジャンプすることはできるが、どちらかの足がコートに着地する前にボールを手から離さなくてはならない。\n・動きながらまたはドリブルを終えるときにボールをキャッチしたプレーヤーは、ストップしたりパスやショットをしたりするために、２歩までステップを踏むことができる：\n【補足】動きながら足がフロアについた状態でボールをコントロールした場合、フロアについている足は０歩目とし、その後２歩までステップを踏むことができる。その場合、１歩目がピボットフットになる。\n−ボールをキャッチした後ドリブルを始めるには、２歩目のステップを踏む前にボールを離さなければならない。\n−１歩目のステップは、ボールをコントロールした後にコートについた片足または両足である。\n−２歩目のステップは、１歩目のステップの後にコートについた反対の足または同時についた両足である。\n−プレーヤーの１歩目のステップがほぼ同時に両足でコートについたとき、ピボットをする場合はどちらの足でもピボットフットにすることができる。両足でジャンプした場合は、コートに着地するまでにボールを手から離さなくてはならない。\n−プレーヤーが片足でコートに着地したときには、その足しかピボットフットにすることができない。\n−プレーヤーは１歩目のステップで踏み切り、両足で同時に着地してもよいが、どちらの足でもピボットすることはできない。その後、片足または両足のいずれかがコートから離れたときには、足がコートにつく前にボールを手から離さなくてはならない。\n−両足がコートから離れた状態から両足を同時にコートについたときは、片方の足を離したときにもう片方の足がピボットフットになる。\n−ドリブルを終えたあと、あるいはボールをコントロールしたあとに、連続して同じ片足でコートに触れたり、連続して両足でコートに触れたりしてはならない。"}, {"type": "rule", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-2-2", "body": "25-２-２  プレーヤーがコートに倒れること、横たわること、座ること：\n・ボールを持ったままコートに倒れたり滑ったり、あるいはコートに横たわったり座ったりしている状態で、ボールをコントロールすることは正当である。\n・その後にボールを持ったまま転がるか、立ち上がることはバイオレーションである。"}, {"type": "rule", "art_no": "26", "art_title": "３秒ルール（３seconds）", "sec_no": "26-1", "body": "26-１  ルール"}, {"type": "rule", "art_no": "26", "art_title": "３秒ルール（３seconds）", "sec_no": "26-1-1", "body": "26-１-１  フロントコート内でライブのボールをコントロールしているチームのプレーヤーは、ゲームクロックが動いている間は、相手チームのバスケットに近い制限区域内に３秒以上とどまることはできない。"}, {"type": "rule", "art_no": "26", "art_title": "３秒ルール（３seconds）", "sec_no": "26-1-2", "body": "26-１-２  以下のプレーヤーについてはバイオレーションにならない：\n・制限区域から出ようとしている。\n・そのプレーヤーあるいはチームメイトがショットの動作（アクトオブシューティング）中で、ボールが手から離れたか離れようとしている。\n・制限区域内に３秒未満いたあと、ゴールのショットをするためにドリブルをしている。"}, {"type": "rule", "art_no": "26", "art_title": "３秒ルール（３seconds）", "sec_no": "26-1-3", "body": "26-１-３  制限区域内にいるプレーヤーは、制限区域の外のコートに両足をつけなければ、制限区域から出たことにはならない。"}, {"type": "rule", "art_no": "27", "art_title": "近接してガードされたプレーヤー", "sec_no": "27-1", "body": "27-１  定義コート上でライブのボールを持っているプレーヤーが、相手チームのプレーヤーに１m以内の距離で、正当な位置で積極的にガードされているとき、近接してガードされていることになる。"}, {"type": "rule", "art_no": "27", "art_title": "近接してガードされたプレーヤー", "sec_no": "27-2", "body": "27-２  ルール近接してガードされているプレーヤーは、５秒以内にパス、ショットあるいはドリブルをしなければならない。"}, {"type": "rule", "art_no": "28", "art_title": "８秒ルール（8 seconds）", "sec_no": "28-1", "body": "28-１  ルール"}, {"type": "rule", "art_no": "28", "art_title": "８秒ルール（8 seconds）", "sec_no": "28-1-1", "body": "28-１-１  以下の状況において：\n・プレーヤーがバックコート内でライブのボールをコントロールした。\n・スローインのとき、スローインされたボールがバックコート内のプレーヤーに正当に触れ、スローインしたチームのプレーヤーがバックコートでそのボールをコントロールした。\nそのチームは、８秒以内にボールをフロントコートに進めなければならない。"}, {"type": "rule", "art_no": "28", "art_title": "８秒ルール（8 seconds）", "sec_no": "28-1-2", "body": "28-１-２  ボールがフロントコートに進められたとは、以下のことをいう：\n・どのプレーヤーにもコントロールされていないボールが、フロントコートに触れる。\n・両足が完全にフロントコートに触れているオフェンスのプレーヤーに、ボールが正当に触れる。\n・体の一部がバックコートに触れているディフェンスのプレーヤーに、ボールが正当に触れる。\n・ボールをコントロールしているチームのフロントコートに体の一部が触れている審判に、ボールが触れる。\n・バックコートからフロントコートへドリブルをしている間に、ボールとドリブラーの両足が完全にフロントコートに触れる。"}, {"type": "rule", "art_no": "28", "art_title": "８秒ルール（8 seconds）", "sec_no": "28-1-3", "body": "28-１-３  以下のようなことが起こった結果、それまでボールをコントロールしていたチームに引き続きバックコートでのスローインが与えられた場合、８秒は継続される：\n・ボールがアウトオブバウンズになる。\n・そのチームのプレーヤーが怪我をする。\n・そのチームにテクニカルファウルが宣せられる。\n・ジャンプボールシチュエーションになる。\n・ダブルファウルが宣せられる。\n・両方のチームに与えられた等しい罰則が相殺される。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-1", "body": "29-１  ルール"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-1-1", "body": "29-１-１  以下の状況において：\n・コート上でプレーヤーがライブのボールをコントロールするとき。\n・スローインのときは、コート上のプレーヤーがスローインされたボールに正当に触れ、スローインしたチームのプレーヤーがそのボールをコントロールしたとき。\nそのチームは24 秒以内にショットをしなくてはならない。\n24 秒以内にショットをしたとみなされるためには、以下の２つのことが満たされなければならない：\n・ショットクロックのブザーが鳴る前に、ボールがプレーヤーの手から離れていること。\n・ボールがそのプレーヤーの手から離れたあと、リングに触れるかバスケットに入ること。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-1-2", "body": "29-１-２  ショットクロックの終了間際にショットがなされ、そのボールが空中にある間にショットクロックのブザーが鳴った場合：\n・ボールがバスケットに入った場合、バイオレーションにはならない。ブザーはなかったものとし、得点は認められる。\n・ボールがリングに触れるがバスケットに入らなかった場合、バイオレーションにはならない。ブザーはなかったものとし、ゲームは続行される。\n・ボールがリングに当たらなかった場合、バイオレーションになる。しかし相手チームが速やかかつ明らかにボールをコントロールした場合、ブザーはなかったものとし、ゲームは続行される。\nバックボードの外枠上部が黄色く点灯するように備えられている場合は、ショットクロックのブザーよりもその点灯を優先する。\nゴールテンディングとインタフェアレンスに関する規定は全て適用される。\n【補足】ショットクロックのブザーが鳴った後でも全て適用される。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-2", "body": "29-２  手順"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-2-1", "body": "29-２-１  ジャンプボールや、第１クォーター以外のクォーターやオーバータイムを始めるときにセンターラインから行うスローインのあと、プレーヤーがコート上でライブのボールのコントロールを得た場合、ボールを得た場所がフロントコートかバックコートかにかかわらず、ショットクロックは24秒から動かし始められる。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-2-2", "body": "29-２-２  審判が次の理由でゲームを止めたときは、ショットクロックをリセットする：\n・ボールをコントロールしていないチームのファウルあるいはバイオレーションの場合（ボールがアウトオブバウンズになる場合は除く）。\n・ボールをコントロールしていないチームに原因がありゲームを止めた場合。\n・どちらのチームにも関係のない正当な理由でゲームを止めた場合。\nこれらの場合、ボールのポゼッションはボールをその前にコントロールしていたチームに与えられる。\nそのチームのスローインが以下の場所で行われる場合：\n・バックコートの場合、ショットクロックは24 秒にリセットされる。\n・フロントコートの場合、ショットクロックは以下のとおりリセットされる：\n−ゲームが止められたときにショットクロックが14秒以上であった場合、ショットクロックはリセットされず、止められたときに残っていた秒数から継続される。\n−ゲームが止められたときにショットクロックが13秒以下であった場合、ショットクロックは14秒にリセットされる。\nただし、審判がどちらのチームにも関係のない正当な理由でゲームを止め、ショットクロックをリセットすることで相手チームが不利な状況になる場合は、ショットクロックは止められた時間から継続となる。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-2-3", "body": "29-２-３  審判が、ボールをコントロールしているチームのファウルやバイオレーション（ボールがアウトオブバウンズになった場合も含む）でゲームを止め、スローインが相手チームに与えられる度に、ショットクロックはリセットされる。\nオルタネイティングポゼッションにより新たなオフェンスチームにスローインのボールが与えられる場合も、ショットクロックはリセットされる。\nそのチームのスローインが以下の場所で行われる場合：\n・バックコートの場合、ショットクロックは24 秒にリセットされる。\n・フロントコートの場合、ショットクロックは14 秒にリセットされる。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-2-4", "body": "29-２-４  ボールをコントロールしているチームにテクニカルファウルが宣せられたとき、ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからスローインで再開される。ショットクロックはリセットされることなく、継続される。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-2-5", "body": "29-２-５  第４クォーター、オーバータイムでゲームクロックが２:00あるいはそれ以下を表示しているとき、バックコートからスローインを与えられることになっているチームに認められたタイムアウトの後で、そのチームのコーチは、フロントコートのスローインラインからのスローインでゲームを再開するか、バックコートのゲームが止められた場所に最も近いアウトオブバウンズからのスローインでゲームを再開するかを選択することができる。\nタイムアウトのあと、スローインは以下のとおり行われる：\n・ボールがアウトオブバウンズになった結果、そのチームのスローインが：\n−バックコートの場合、ショットクロックは継続される。\n−フロントコートの場合、ショットクロックが13 秒以下の場合は継続される。ショットクロックが14秒以上の場合は14 秒にリセットされる。\n・ファウルやバイオレーション（ボールがアウトオブバウンズになった場合は含まない）の結果、そのチームのスローインが：\n−バックコートの場合、ショットクロックは24 秒にリセットされる。\n−フロントコートの場合、ショットクロックは14 秒にリセットされる。\n・ボールを新たにコントロールしたチームがタイムアウトを取り、そのチームのスローインが：\n−バックコートの場合、ショットクロックは24 秒にリセットされる。\n−フロントコートの場合、ショットクロックは14 秒にリセットされる。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-2-6", "body": "29-２-６  アンスポーツマンライクファウルあるいはディスクォリファイングファウルに含まれる罰則で、スローインがフロントコートのスコアラーズテーブルの反対側のスローインラインから行われるとき、ショットクロックは14 秒にリセットされる。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-2-7", "body": "29-２-７  ボールが相手チームのバスケットのリングに触れたとき、ショットクロックは以下のとおりにリセットされる：\n・相手チームがボ―ルをコントロールした場合は、24 秒。\n・ボールがリングに触れる前にボールをコントロールしていたチームと同じチームがボールをコントロールした場合は、14 秒。"}, {"type": "rule", "art_no": "29", "art_title": "ショットクロック", "sec_no": "29-2-8", "body": "29-２-８  一方のチームがボールをコントロールしているとき、あるいはどちらのチームもボールのコントロールを得ていないときに、ショットクロックのブザーが誤って鳴った場合、ブザーはなかったものとし、ゲームは続行される。\nただし、ボールをコントロールしていたチームが不利な状況になってしまう場合、ゲームを止め、ショットクロックを訂正し、ボールのポゼッションはそのチームに与えられる。"}, {"type": "rule", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-1", "body": "30-１  定義"}, {"type": "rule", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-1-1", "body": "30-１-１  以下の状況の場合、チームはフロントコートでライブのボールをコントロールしていることになる。\n・両足がフロントコートに触れたそのチームのプレーヤーが、ボールを持っているかフロントコートでドリブルをしている。あるいは、\n・そのチームのフロントコートにいるプレーヤー同士で、ボールをパスしている。"}, {"type": "rule", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-1-2", "body": "30-１-２  以下の場合、ボールは不当にバックコートに返されたことになる。\nフロントコートでライブのボールをコントロールしているチームのプレーヤーが、フロントコートで最後にボールに触れ、次にボールが、\n・体の一部がバックコートに触れているそのチームのプレーヤーに最初に触れた場合。あるいは、\n・そのチームのバックコートに触れたあと、そのチームのプレーヤーに最初に触れた場合。\nこの規定は、スローインを含むそのチームのフロントコートで起こる全ての状況に適用される。ただし、プレーヤーがフロントコートからジャンプし、空中でそのチームが新たにボールをコントロールし、その後ボールとともにバックコートに着地した場合には適用されない。"}, {"type": "rule", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-2", "body": "30-２  ルール\nフロントコートでライブのボールをコントロールしているチームは、ルールに違反してバックコートにボールを返してはならない。"}, {"type": "rule", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-3", "body": "30-３  罰則\nバックボードの真後ろを除く、規則の違反（ファウルやバイオレーション）が起こった場所に最も近いフロントコートのアウトオブバウンズから行うスローインのボールが相手チームに与えられる。"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-1", "body": "31-１  定義"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-1-1", "body": "31-１-１  ゲームクロックが動いている状態でのショットもしくはフリースローのショットは：\n・ボールがショットの動作（アクトオブシューティング）中のプレーヤーの手から離れたときに始まる。\n・ボールが以下の状態になったときに終わる：\n−ボールがバスケットの上から直接入り、バスケットの中にとどまる、あるいはバスケットを完全に通り抜ける。\n−バスケットに入る可能性がなくなる。\n−リングに触れる。\n−フロアに触れる。\n−デッドになる。"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-2", "body": "31-２  ルール"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-2-1", "body": "31-２-１  ゲームクロックが動いている状態でのショットで、ボール全体がリングの高さより上にある間にプレーヤーがボールに触れた場合、以下のいずれかの条件を満たしているときにゴールテンディングになる：\n・ボールがバスケットに向かって落ち始めている。あるいは、\n・ボールがバックボードに触れた後。"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-2-2", "body": "31-２-２  フリースローのショットで、バスケットに向かっているボールがリングに触れる前にプレーヤーがボールに触れるとゴールテンディングになる。"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-2-3", "body": "31-２-３  ゴールテンディングの規定は以下の状況になるまで適用される：\n・ボールがバスケットに入る可能性がなくなる。\n・ボールがリングに触れる。"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-2-4", "body": "31-２-４  以下のときにインタフェアレンスになる：\n・ゲームクロックが動いている状態でのショットあるいは最後のフリースローのとき、ボールがリングに触れている間に、プレーヤーがバスケットあるいはバックボードに触れる。\n・あとにフリースローが続く場合、フリースローのボールがバスケットに入る可能性が残っているときに、プレーヤーがボール、バスケット、バックボードのいずれかに触れる。\n・プレーヤーがバスケットの下から手を入れてそのボールに触れる。\n・ディフェンスのプレーヤーが、ボールがバスケットの中にある間にそのボールやバスケットに触れ、ボールがバスケットを通過することを妨げる。\n・プレーヤーがバスケット（リングやネットを含む）を揺らしたりつかんだりした結果、ボールが不自然な弾み方や方向が変わることで、バスケットに入ることが妨げられた、またはバスケットに入る。\n・プレーヤーがバスケットをつかんでボールにプレーをする。"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-2-5", "body": "31-２-５  次のいずれかのとき：\n・審判が：\n−ショットの動作（アクトオブシューティング）中のプレーヤーの手にボールがある間に笛を吹いた。あるいは、−ショットされたボールが空中にある間に笛を吹いた。\n・クォーター、オーバータイムの終了を知らせるブザーが鳴った。\nボールがリングに触れたあと、バスケットに入る可能性が残っているときは、どのプレーヤーもボールに触れてはならない。\nゴールテンディングとインタフェアレンスに関する規定は全て適用される。"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-3", "body": "31-３  罰則"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-3-1", "body": "31-３-１  オフェンスのプレーヤーがバイオレーションをした場合、得点は認められない。ルールの中で別途規定がある場合を除き、ボールは相手チームにフリースローラインの延長線上からのスローインとして与えられる。"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-3-2", "body": "31-３-２  ディフェンスのプレーヤーがバイオレーションをした場合、オフェンスのチームに以下の得点が与えられる：\n・フリースローの場合は、１点。\n・ツーポイントゴールエリアからボールが放たれた場合は、２点。\n・スリーポイントゴールエリアからボールが放たれた場合は、３点。\n得点は、そのボールがバスケットに入った場合と同様に取り扱われる。"}, {"type": "rule", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-3-3", "body": "31-３-３  ディフェンスのプレーヤーが、最後のフリースローの間にバイオレーションをした場合は、オフェンスのチームに１点が与えられ、そのディフェンスのプレーヤーにテクニカルファウルが宣せられる。\n【補足】フリースローのショットはボールがリングに触れたときに終了するため、テクニカルファウルは、最後のフリースローのボールがリングに触れるまでにゴールテンディングあるいはインタフェアレンスのバイオレーションが起きた場合に宣せられる。\n第章 ファウル（FOULS）"}, {"type": "rule", "art_no": "32", "art_title": "ファウル", "sec_no": "32-1", "body": "32-１  定義"}, {"type": "rule", "art_no": "32", "art_title": "ファウル", "sec_no": "32-1-1", "body": "32-１-１  ファウルとは、規則の違反のうち、相手チームのプレーヤーとの不当な体の触れ合いおよびスポーツマンらしくない行為をいう。"}, {"type": "rule", "art_no": "32", "art_title": "ファウル", "sec_no": "32-1-2", "body": "32-１-２  １チームに記録されるファウルの数に制限はない。\nその罰則にかかわらず、それぞれのファウルは違反ごとに全てスコアシートに記録され、ルールに従って処置される。"}, {"type": "rule", "art_no": "32", "art_title": "ファウル", "sec_no": "32-1-3", "body": "32-１-３  ・クォーターやオーバータイムの終了を知らせるゲームクロックのブザーが鳴り、\n・規則の違反（ファウルやバイオレーション）が宣せられたとき、ボールがデッドになった後でファウルが宣せられた場合は、テクニカルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルである場合を除いて、そのファウルはなかったものとする。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-1", "body": "33-１  シリンダーの概念\nシリンダーとはコート上のプレーヤーが占める架空の円筒内の空間をいう。シリンダーの大きさ、あるいはプレーヤーの両足の間隔はプレーヤーの身長やサイズによって異なる。シリンダーにはプレーヤーの真上の空間が含まれ、ディフェンスのプレーヤーとボールを持っていないオフェンスのプレーヤーのシリンダーの境界は以下の通り制限される：\n・正面は手のひらの位置まで。\n・背面は尻の位置まで。\n・側面は腕と脚の外側の位置まで。\n手や腕は、前腕と手がリーガルガーディングポジションの範囲で上がるように、腕を肘の位置で曲げた状態で前に伸ばすことができるが、足や膝の位置を超えてはならない。\nオフェンスのプレーヤーが自身のシリンダーの範囲でノーマルバスケットボールプレーを試みているとき、ディフェンスのプレーヤーはボールを持っているオフェンスのプレーヤーのシリンダーの中に入って不当な触れ合いを起こしてはならない。ボールを持っているオフェンスのプレーヤーのシリンダーの境界は以下の通り制限される：\n・正面は両足、曲げられた膝、腰より上でボールを持っている腕の位置まで。\n・背面は尻の位置まで。\n・側面は肘と脚の外側の位置まで。\nボールを持っているオフェンスのプレーヤーには自身のシリンダーの範囲でノーマルバスケットボールプレーを行うための十分な空間が与えられなければならない。ノーマルバスケットボールプレーには、ドリブルの開始、ピボット、ショット、パスが含まれる。\nオフェンスのプレーヤーはさらなる空間を確保するために、自身のシリンダーを超えて脚や腕を広げて、ディフェンスのプレーヤーに不当な触れ合いを起こしてはならない。\n図６ シリンダーの概念"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-2", "body": "33-２  バーティカリティ（真上の空間の概念）\nゲーム中全てのプレーヤーは、相手チームのプレーヤーが占めていない位置であれば、コート上のどのような位置でも占めることができる。\nこの概念は、コート上にプレーヤーが占めた位置の権利およびそのプレーヤーが真上にジャンプする権利も含まれる。\n自分のシリンダーから外れた空間で、すでに自分のシリンダーを占めている相手チームのプレーヤーと触れ合いを起こしたときは、自分のシリンダーから外れているプレーヤーにその触れ合いの責任がある。\nディフェンスのプレーヤーが、自分のシリンダー内でジャンプしたり手や腕を上げたりしていて触れ合いが起こっても、そのプレーヤーに触れ合いの責任はなく、罰則が科されることはない。\nオフェンスのプレーヤーは、コート上にいるときでもジャンプをして空中にいるときでも、リーガルガーディングポジションを占めているディフェンスのプレーヤーと次のような触れ合いを起こしてはならない：\n・腕で相手チームのプレーヤーを払いのけたりして、自分に有利な空間をつくること。\n・ショットの動作（アクトオブシューティング）中やショットをした後に、脚や腕を広げること。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-3", "body": "33-３  リーガルガーディングポジションディフェンスのプレーヤーは以下の２つの条件を満たしたとき、リーガルガーディングポジションを占めたとみなされる：\n・相手チームのプレーヤーに正対する。\n・両足をコートにつける。\nリーガルガーディングポジションには真上の空間も含まれるので、真上の空間の内側であればまっすぐ上に手や腕を上げたり真上にジャンプしたりしてもよいが、シリンダーの外に外れてはならない。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-4", "body": "33-４  ボールをコントロールしているプレーヤーをガードすることボールをコントロールしている（ボールを持っているかドリブルをしている）プレーヤーに対しては、相手の速さと距離にとらわれずにガードをすることができる。\nボールをコントロールしているプレーヤーは、いつでもガードされることを予測し、相手チームのプレーヤーがどれだけ素早く最初にリーガルガーディングポジションを占めたときにも、止まったり方向を変えたりして、体の触れ合いを避ける用意をしていなければならない。\nディフェンスのプレーヤーも、その位置を占める前に体の触れ合いを起こさないように、相手より先にリーガルガーディングポジションを占めなければならない。\n先にリーガルガーディングポジションを占めたディフェンスのプレーヤーは、相手チームのプレーヤーをガードするために位置を変えてもよいが、腕を広げたり、肩、腰、脚などを使ったりして脇を通るドリブラーを妨げてはならない。\n審判は、ボールをコントロールしているプレーヤーとそのガードしているプレーヤーとの間に触れ合いが起こったとき、次の原則にしたがってチャージングかブロッキングかを判定する：\n・ディフェンスのプレーヤーは、ボールをコントロールしている相手チームのプレーヤーに向き、両足をコートにつけることで最初にリーガルガーディングポジションを占めなければならない。\n・ディフェンスのプレーヤーは、その場で止まる、真上にジャンプする、相手の動きと平行にあるいは後ろに動くことでリーガルガーディングポジションを維持する。\n・相手の動きに対して平行あるいは後ろに動くときに、片足または両足が瞬間的にコートから離れても、引き続きリーガルガーディングポジションを維持していることになるが、ボールを持っているプレーヤーに向かって動いたときは、両足をフロアにつけなければならない。\n・ディフェンスのプレーヤーが先に位置を占めていてそのトルソー（胴体）に触れ合いが起きたときには、ディフェンスのプレーヤーがリーガルガーディングポジションを占めていたとみなされる。\n・リーガルガーディングポジションを占めたディフェンスのプレーヤーは、怪我を避けるためにシリンダー内で体を回転してもよい。\n上記の状況では、ボールを持っているプレーヤーに触れ合いの責任がある。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-5", "body": "33-５  ボールをコントロールしていないプレーヤーをガードすることボールをコントロールしていないプレーヤーは、誰でもコート上を自由に動いて、他のプレーヤーが占めていないコート上のどの位置でも占めることができる。\nディフェンスのプレーヤーは、ボールをコントロールしていないプレーヤーをガードするときは相手の速さと距離を十分に考慮して位置を占めなければならない。動いている相手チームのプレーヤーが止まったり方向を変えたりして触れ合いを避けることができないほど、急にまた近くに位置を占めてはならない。\n位置を占めるときの距離は相手の速さによるが、通常の１歩の距離は必要である。\nディフェンスのプレーヤーが、相手の速さと距離の関係を考慮しないで位置を占めて触れ合いが起こったときは、そのディフェンスのプレーヤーに触れ合いの責任がある。\n一度リーガルガーディングポジションを占めたディフェンスのプレーヤーは、相手チームのプレーヤーをガードするために位置を変えてもよいが、腕を広げたり、肩、腰、脚などを使ったりして脇を通るプレーヤーを妨げてはならない。リーガルガーディングポジションを占めたディフェンスのプレーヤーは怪我を避けるためにシリンダー内で体を回転してもよい。\n【補足】リーガルガーディングポジションを占めたプレーヤーであっても、腕を広げたり、肩、腰、脚などを相手チームのプレーヤーの進路上に出したりして、脇を通る相手を妨げてはならない。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-6", "body": "33-６  空中にいるプレーヤーコート上でジャンプをしたプレーヤーには、元の位置に下りる権利がある。\nコート上でジャンプをしたプレーヤーには、元の位置と違うところでも、ジャンプをした時点でジャンプをした位置と着地する位置の間に相手チームのプレーヤーが位置を占めていなかった場所に下りる権利がある。\nジャンプをしたプレーヤーが元の位置と違うところに下りた勢いで、すでに近くにリーガルガーディングポジションを占めていた相手チームのプレーヤーと触れ合いを起こしたときは、ジャンプをしたプレーヤーに触れ合いの責任がある。\n相手チームのプレーヤーは、プレーヤーが空中にジャンプをした後からそのジャンプをしたプレーヤーの軌道に入ってはならない。\n空中にいるプレーヤーの足元に入って触れ合いを起こすことは、場合によってはアンスポーツマンライクファウルや、ディスクォリファイングファウルになる。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-7", "body": "33-７  正当なスクリーン、不当なスクリーンスクリーンとは、プレーヤーがあらかじめ任意の位置を占めることによって、ボールをコントロールしていない相手チームのプレーヤーが、コート上の望む位置に行くことを遅らせたり妨げたりしようとするプレーのことをいう。\n正当なスクリーンとは、スクリーンをかけるプレーヤーが：\n・止まっていて、シリンダー内で、体の触れ合いが起こる。\n・両足がコートについていて、体の触れ合いが起こる。\n不当なスクリーンとは、スクリーンをかけるプレーヤーが：\n・動きながらスクリーンをかけて、触れ合いが起こる。\n・止まっている相手チームのプレーヤーの後ろ（視野の外）から十分な距離をおかずにスクリーンをかけて、触れ合いが起こる。\n・動いている相手チームのプレーヤーに対して、時間と距離を考慮せずに触れ合いが起こる。\n止まっている相手チームのプレーヤーの前または横（視野の中）でスクリーンをかけるプレーヤーは、触れ合いを起こさない限り相手の近くに位置を占めてよい。\n止まっている相手チームのプレーヤーの後ろ（視野の外）からスクリーンをかけるプレーヤーは、相手が普通に動いても触れ合いが起こらない１歩の距離をおいて位置を占めなければならない。\n動いている相手チームのプレーヤーにスクリーンをかけるプレーヤーは、相手が止まったり方向を変えたりして触れ合いを避けられるだけの距離をおいて位置を占めなければならない。\n（スクリーンをかけようとする相手チームのプレーヤーとの間に）必要とされる距離は通常の１歩から２歩である。\n正当なスクリーンをかけられた場合、スクリーンをかけたプレーヤーとのいかなる触れ合いについても、スクリーンをかけられたプレーヤーに触れ合いの責任がある。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-8", "body": "33-８  チャージングチャージングとは、ボールを持っていてもいなくても、無理に進行して相手チームのプレーヤーのトルソー（胴体）に突き当たったり押しのけたりする不当な体の触れ合いのことをいう。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-9", "body": "33-９  ブロッキングブロッキングとは、相手がボールを持っているかいないかにかかわらず、相手チームのプレーヤーの進行を妨げる不当な体の触れ合いのことをいう。\n相手が止まっている、あるいはスクリーンを避けようとしているのに、スクリーンをかけようと動いているプレーヤーが触れ合いを起こしたときは、ブロッキングのファウルになる。\nプレーヤーがボールの位置に関係なく、相手チームのプレーヤーに向いて相手の動きに合わせて動くときは、別の理由がない限り、そのために生じた全ての触れ合いの責任はそのプレーヤーにある。\nここでいう「別の理由」とは、スクリーンをされるプレーヤーに責任があるプッシング、チャージング、ホールディングなどをいう。\nコート上で位置を占めているとき、腕を広げたり肘を張ったりすることは正当であるが、相手チームのプレーヤーが脇を通り抜けようとするときには、腕や肘を自身のシリンダーの中に収めなくてはならない。\n腕や肘をよけないで触れ合いが起こったときは、ブロッキングもしくはホールディングになる。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-10", "body": "33-10  ノーチャージセミサークルエリアノーチャージセミサークルエリアは、バスケット近辺でのチャージングやブロッキングの特別な規則の適用のため、コート上に指定されたエリアのことをいう。\nノーチャージセミサークルエリアにペネトレイトしてくるプレーにおいて、空中にいるオフェンスのプレーヤーがノーチャージセミサークルエリアにいるディフェンスのプレーヤーと触れ合いを起こしても、オフェンスのプレーヤーが手、腕、脚、その他の体の部位を不当に使って触れ合いを起こした場合を除き、チームコントロールファウルは宣せられない。この規則が適用されるのは以下の全ての条件を満たす場合である：\n・オフェンスのプレーヤーが空中でボールをコントロールしていること。\n・そのオフェンスのプレーヤーがショットあるいはパスをしようとすること。\n・そのオフェンスのプレーヤーとの間に触れ合いが生じたディフェンスのプレーヤーの片足あるいは両足が、ノーチャージセミサークルエリア内のフロアあるいはノーチャージセミサークルのラインに触れていること。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-11", "body": "33-11  手や腕で相手チームのプレーヤーに触れることプレーヤーが相手チームのプレーヤーに手や腕で触れることがあっても、必ずしもファウルではない。\n審判は、プレーヤーが相手チームのプレーヤーに手や腕で触れたり触れ続けたりしていることで、触れ合いを起こしたプレーヤーが有利になっているか否かを判断し、相手チームのプレーヤーの自由な動き（フリーダムオブムーブメント）を妨げているときには、ファウルの判定を下す。\n相手チームのプレーヤーがボールを持っていてもいなくても、ディフェンスのプレーヤーが突き出した手や伸ばした腕で、相手に触れ続けて相手の動きを妨げることはファウルである。\n相手チームのプレーヤーがボールを持っているかいないかにかかわらず、繰り返し触れたりする行為は、乱暴なプレーにつながる可能性があるためファウルである。\nボールを持っているオフェンスのプレーヤーが起こす、以下の触れ合いはファウルである：\n・自分が有利になるために、腕や肘でディフェンスのプレーヤーの体を押さえたり（フック）巻きつけるように回したり（ラップ
