ル28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "29/50-25", "body": "29/50-25  条文：ショットが放たれ、ディフェンスのチームのバックコートで、ディフェンスのプレーヤーがファウルを宣せられた。ゲームがスローインで再開される場合、ショットクロックは、"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "29/50-32", "body": "29/50-32  条文：アンスポーツマンライクファウルあるいはディスクォリファイングファウルの後のスローインは、いつでもフロントコートのスコアラーズテーブルの反対側のスローインラインから行われる。ショットクロックは14秒となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "29/50-35", "body": "29/50-35  条文：ボールが何らかの理由で相手チームのバスケットのリングに触れたあと、ボールがリングに触れる前にボールをコントロールしていたチームと同じチームが再びボールをコントロールした場合は、ショットクロックは14秒となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "29/50-47", "body": "29/50-47  条文：ゲーム中、ゲームクロックが動いている間に、チームがフロントコートあるいはバックコートで新たなライブのボールのポゼッションを得たとき、ショットクロックは24秒となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "29/50-50", "body": "29/50-50  条文：ボールをコントロールしているチームのファウルあるいはバイオレーション（ボールがアウトオブバウンズになるバイオレーションを含む）により審判がゲームを止めた。フロントコートからのスローインが相手チームに与えられる場合、ショットクロックは14秒となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール28-１ 条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。", "sec_no": "29/50-52", "body": "29/50-52  条文：ゲームクロック残り24秒未満で、チームがコート上でライブのボールのコントロールを得たり、取り戻したりした場合、ショットクロックには何も表示しない。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと30-１ 条文：プレーヤーが空中にいるときは、ジャンプをする前に最後に触れていたコートにいるものとみなされる。", "sec_no": "30-7", "body": "30-７ 条文：フロントコートにいるチームAのプレーヤーが明らかなボールのコントロールを得たあと、ボールをバックコートに触れさせ、チームAのプレーヤーがフロントコートまたはバックコートのいずれかでそのボールに最初に触った場合、ライブのボールが不当にバックコートに返ったとみなされる。しかし、バックコートにいるチームAのプレーヤーが、ボールをフロントコートに触れさせたあと、チームAのプレーヤーがフロントコートまたはバックコートのいずれかでそのボールに最初に触れることは正当である。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと30-１ 条文：プレーヤーが空中にいるときは、ジャンプをする前に最後に触れていたコートにいるものとみなされる。", "sec_no": "30-10", "body": "30-10  例：バックコートにいるA１がフロントコートに向かってボールをパスした。ボールはコート上でセンターラインをまたいで立っている審判に触れ、まだバックコートにいるA２がボールに触れた。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと30-１ 条文：プレーヤーが空中にいるときは、ジャンプをする前に最後に触れていたコートにいるものとみなされる。", "sec_no": "30-11", "body": "30-11  例：チームA がフロントコートでボールをコントロールしているとき、A１とB１が同時にボールに触れた。その後ボールはチームA のバックコートに転がり、A２が最初にボールに触れた。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと30-１ 条文：プレーヤーが空中にいるときは、ジャンプをする前に最後に触れていたコートにいるものとみなされる。", "sec_no": "30-12", "body": "30-12  例：A１はバックコートからフロントコートへドリブルをし、両足はフロントコートに入ったが、ボールはまだバックコートでドリブルをしていた。その後ボールはA１の脚に触れて転がり、バックコートでA２がドリブルを始めた。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと30-１ 条文：プレーヤーが空中にいるときは、ジャンプをする前に最後に触れていたコートにいるものとみなされる。", "sec_no": "30-13", "body": "30-13  例：バックコートにいるA１がフロントコートにいるA２にボールをパスした。A２はボールに触れたがコントロールせず、ボールはまだバックコートにいるA１に戻った。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと30-１ 条文：プレーヤーが空中にいるときは、ジャンプをする前に最後に触れていたコートにいるものとみなされる。", "sec_no": "30-14", "body": "30-14  例：フロントコートでスローインを行うA１がA２にボールをパスした。A２はフロントコートからジャンプして、空中にいる間にボールをキャッチし、右足をまだ空中に浮かせたまま左足でコート上のフロントコートに着地した。そのあと、A２は右足をバックコートに着いた。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと30-１ 条文：プレーヤーが空中にいるときは、ジャンプをする前に最後に触れていたコートにいるものとみなされる。", "sec_no": "30-15", "body": "30-15 例：A１がセンターライン近くのフロントコートでドリブルをしているとき、B１がボールをチームA のバックコートに弾いた。まだフロントコートに両足を着いているA１がバックコートでドリブルを続けた。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと30-１ 条文：プレーヤーが空中にいるときは、ジャンプをする前に最後に触れていたコートにいるものとみなされる。", "sec_no": "30-16", "body": "30-16 例：バックコートにいるA１がA２にボールをパスした。A２はフロントコートからジャンプして空中にいる間にボールをキャッチし、"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテン 全てのプレーヤーに適用される。", "sec_no": "33-13", "body": "33-13 例：ゲームクロックが動いていて、ボールがライブの状態でA1 はショットをした。B2 はA2 を押し、"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル35-１条文：ファウルには、パーソナルファウル、アンスポーツマンライクファウル、ディスクォリファイングファウル、テクニカルファウルがある。ダブルファウルとみなされるためには、2人の対戦プレーヤー間で互いにファウルをしていて、同じカテゴリー（ともにパーソナルファウル、もしくはアンスポーツマンライクファウルとディスクォリファイングファウルのいずれかの組み合わせ）でなければならない。チームファウルの数にかかわらずフリースローは与えられない。ダブルファウルには身体接触を伴わなければならないため、身体接触を伴わないテクニカルファウルはダブルファウルの一部ではない。", "sec_no": "35-10", "body": "35-10 例：A１がドリブルをしているとき、A１とB１がほとんど同時に互いにファウルを宣せられた。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル36-１条文：繰り返された場合にテクニカルファウルとなる行為や振る舞いには、オフィシャルワーニング（警告）が当該プレーヤーに与えられる。この警告は当該チームのヘッドコーチにも伝達され、そのゲームの残り時間、当該チームのいずれかのメンバーによる同様の行為に適用される。オフィシャルワーニングは、ボールがデッドになりゲームクロックが止められたときにのみ与えられる。", "sec_no": "36-10", "body": "36-10 例：ゲームクロックが動いている状態で、5 個のファウルを宣せられたチームメンバーであるA1 がコート上にいた。A１が不当にゲームに出ていることが、"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル36-１条文：繰り返された場合にテクニカルファウルとなる行為や振る舞いには、オフィシャルワーニング（警告）が当該プレーヤーに与えられる。この警告は当該チームのヘッドコーチにも伝達され、そのゲームの残り時間、当該チームのいずれかのメンバーによる同様の行為に適用される。オフィシャルワーニングは、ボールがデッドになりゲームクロックが止められたときにのみ与えられる。", "sec_no": "36-11", "body": "36-11 例：第4 クォーター残り7 秒、チームA 70 - チームB 70 で、A1 は5 個目のファウルを宣せられ「5 個のファウルを宣せられたチームメンバー」となった。タイムアウトのあと、チームA がボールのコントロールを得て、A1 が得点した。このときA1 が不当にコート上にいることが発見され、ゲームクロックは残り1 秒であった。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル36-１条文：繰り返された場合にテクニカルファウルとなる行為や振る舞いには、オフィシャルワーニング（警告）が当該プレーヤーに与えられる。この警告は当該チームのヘッドコーチにも伝達され、そのゲームの残り時間、当該チームのいずれかのメンバーによる同様の行為に適用される。オフィシャルワーニングは、ボールがデッドになりゲームクロックが止められたときにのみ与えられる。", "sec_no": "36-12", "body": "36-12  条文：プレーヤーがフェイクをしたときには、以下の手順を適用する。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル36-１条文：繰り返された場合にテクニカルファウルとなる行為や振る舞いには、オフィシャルワーニング（警告）が当該プレーヤーに与えられる。この警告は当該チームのヘッドコーチにも伝達され、そのゲームの残り時間、当該チームのいずれかのメンバーによる同様の行為に適用される。オフィシャルワーニングは、ボールがデッドになりゲームクロックが止められたときにのみ与えられる。", "sec_no": "36-13", "body": "36-13 例：B1 がドリブルをしているA1 をディフェンスした。A1 はB1 を押した上で、あたかもB1 にファウルをされたかのような印象を与えようと頭部を急に動かした。審判はA1 にファウルを宣した。"}, し、アンスポーツマンライクファウルの判定基準に合致する、ボールに対するプレーではなく、かつ、正当なバスケットボールのプレーとは認められないプレーでの触れ合いや過度に激しい触れ合いについてはゲーム中のいかなる状況においてもアンスポーツマンライクファウルが宣せられる。", "sec_no": "37-10", "body": "37-10 例：ドリブルをしているA１はB１にファウルをし、５個目のファウルを宣せられた。A１はチームベンチに向かう間に、審判を侮辱する発言を行ない、テクニカルファウルを宣せられた。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル37-１条文：相手チームのバスケットに向かって進行しているプレーヤーと、その相手チームのバスケットとの間に相手チームのプレーヤーが全くいない状況で、進行しているプレーヤーの後ろあるいは横から起こす不当な触れ合いに対しては、オフェンスのプレーヤーがショットの動作（アクトオブシューティング）を始める前であれば、アンスポーツマンライクファウルが宣せられる。しかし、アンスポーツマンライクファウルの判定基準に合致する、ボールに対するプレーではなく、かつ、正当なバスケットボールのプレーとは認められないプレーでの触れ合いや過度に激しい触れ合いについてはゲーム中のいかなる状況においてもアンスポーツマンライクファウルが宣せられる。", "sec_no": "37-11", "body": "37-11 例：A１はB１にファウルをし、５個目のファウルを宣せられた。これはチームA のこのクォーター２個目のチームファウルであった。A１はチームベンチに向かう間に、B１を突き飛ばした。このときB１もまたA１を突き飛ばしB１はアンスポーツマンライクファウルが宣せられた。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル38-１条文：失格・退場となった人物は、チームベンチに座ることを許された人物ではない。したがってその人物は、それ以上スポーツマンらしくない振る舞いがあっても罰則を受けない。", "sec_no": "38-10", "body": "38-10 例：A１は審判を侮辱する発言を行ない、ディスクォリファイングファウルを宣せられた。控室に戻る間に"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合42-１条文：ゲームクロックが止まっている間に複数の反則が起きて特別な処置をする場合、審判はバイオレーションやファウルが起きた順番を把握し、どの罰則を相殺し、どの罰則を適用するのか注意を払って決定しなければならない。", "sec_no": "42-10", "body": "42-10 例：ショットクロック残り8 秒で、チームB のバックコートにいるB１はA１にファウルをした。その後B２はテクニカルファウルを宣せられた。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合42-１条文：ゲームクロックが止まっている間に複数の反則が起きて特別な処置をする場合、審判はバイオレーションやファウルが起きた順番を把握し、どの罰則を相殺し、どの罰則を適用するのか注意を払って決定しなければならない。", "sec_no": "42-11", "body": "42-11 例：ショットクロック残り８秒で、B１はA１にアンスポーツマンライクファウルをした。そのあと、"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合42-１条文：ゲームクロックが止まっている間に複数の反則が起きて特別な処置をする場合、審判はバイオレーションやファウルが起きた順番を把握し、どの罰則を相殺し、どの罰則を適用するのか注意を払って決定しなければならない。", "sec_no": "42-12", "body": "42-12  条文：フリースローの最中に、ダブルファウルまたは等しい罰則のファウルが起きた場合は、ファウルはスコアシートに記入されるが罰則は与えられない。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合42-１条文：ゲームクロックが止まっている間に複数の反則が起きて特別な処置をする場合、審判はバイオレーションやファウルが起きた順番を把握し、どの罰則を相殺し、どの罰則を適用するのか注意を払って決定しなければならない。", "sec_no": "42-13", "body": "42-13 例：A１に２本のフリースローが与えられた。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合42-１条文：ゲームクロックが止まっている間に複数の反則が起きて特別な処置をする場合、審判はバイオレーションやファウルが起きた順番を把握し、どの罰則を相殺し、どの罰則を適用するのか注意を払って決定しなければならない。", "sec_no": "42-14", "body": "42-14  条文：テクニカルファウルが宣せられた場合、誰もリバウンドの位置に着かずにフリースローの罰則が速やかに行われる。チームベンチに座ることを許された人物の失格・退場によってヘッドコーチに宣せられたテクニカルファウルでは、この限りではない。そのようなテクニカルファウルの罰則（フリースロー２本とフロントコートのスコアラーズテーブルの反対側のスローインラインからのスローイン）"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合42-１条文：ゲームクロックが止まっている間に複数の反則が起きて特別な処置をする場合、審判はバイオレーションやファウルが起きた順番を把握し、どの罰則を相殺し、どの罰則を適用するのか注意を払って決定しなければならない。", "sec_no": "42-15", "body": "42-15 例：B１がA１にファウルをし、このクォーター５個目のチームファウルであった。コート上で抗争につながりそうな状況が起こった。A６がコートに入ったが積極的に抗争には関わらなかった。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合42-１条文：ゲームクロックが止まっている間に複数の反則が起きて特別な処置をする場合、審判はバイオレーションやファウルが起きた順番を把握し、どの罰則を相殺し、どの罰則を適用するのか注意を払って決定しなければならない。", "sec_no": "42-16", "body": "42-16  条文：ダブルファウルが起きて両チームへの等しい罰則の相殺のあと、適用する罰則が残っていなければ、ボールをコントロールしていたチームあるいは最初のファウルの前にボールを与えられることになっていたチームのスローインで再開される。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合42-１条文：ゲームクロックが止まっている間に複数の反則が起きて特別な処置をする場合、審判はバイオレーションやファウルが起きた順番を把握し、どの罰則を相殺し、どの罰則を適用するのか注意を払って決定しなければならない。", "sec_no": "42-17", "body": "42-17 例：第１クォーターと第２クォーターの間のインターバル中に、A１とB１がそれぞれディスクォリファイングファウルを宣せられた、あるいはヘッドコーチA とヘッドコーチB がそれぞれテクニカルファウルを宣せられた。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合42-１条文：ゲームクロックが止まっている間に複数の反則が起きて特別な処置をする場合、審判はバイオレーションやファウルが起きた順番を把握し、どの罰則を相殺し、どの罰則を適用するのか注意を払って決定しなければならない。", "sec_no": "42-18", "body": "42-18 例：チームコントロールファウルまたはダブルドリブルがA1 に宣せられた。チームB のスローインでゲームが再開されるとき、スローインのボールが"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-10", "body": "44-10 例：第2 クォーターで、B1 がA1 にファウルをし、このクォーター5 個目のチームファウルであった。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-11", "body": "44-11 例：第2 クォーターで、B1 がショットの動作（アクトオブシューティング）中のA1 にファウルをした。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-12", "body": "44-12 例：第3 クォーターで、B2 がドリブルをしているA1 にファウルをし、このクォーター5 個目のチームファウルであった。2 本のフリースローがA1 に与えられた。1 本目のフリースローを失敗したあと、B1がリバウンドのボールを取り、ゲームは誤って続行された。この誤りが"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-13", "body": "44-13  条文：審判による指定なく誤ったプレーヤーがフリースローを行っていたことが認められた場合、成否にかかわらずそのフリースローは取り消される。まだゲームが再開されていない場合、ゲームはスコアラーズテーブルの反対側のフリースローラインの延長線上から相手チームのスローインで再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-14", "body": "44-14 例：第3 クォーターの終了を知らせるゲームクロックのブザーが鳴ったとき、B1 がドリブルをしている"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-15", "body": "44-15 例：第3 クォーター残り3 秒で、B1 がショットの動作（アクトオブシューティング）中のA1 にファウルをした。2 本のフリースローがA1 に与えられたが、A1 の代わりにA2 がフリースローを行った。第3 クォーターが終了し、この誤りが"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-16", "body": "44-16  条文：審判が誤ったフリースローシューターを指定してフリースローを行っていたことが認められた場合、成否にかかわらずそのフリースローは取り消され、正しいプレーヤーが代わりのフリースローを行う。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-17", "body": "44-17 例：第3 クォーターの終了を知らせるゲームクロックのブザーが鳴ったとき、B1 がドリブルをしている"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-18", "body": "44-18 例：B1 がショットの動作（アクトオブシューティング）中のA1 にファウルをした。審判はA1 ではなく、A2 をシューターに指定してフリースローを行った。2 本目のフリースローでボールがリングに触れたあと、A3 がリバウンドのボールを取って2 点を得点した。この誤りが、エンドラインの後ろのアウトオブバウンズでチームB がスローインのボールを持つ前に認識された。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-19", "body": "44-19  条文：審判が誤って得点を与えたり、取り消したりしていたことが規則で定められた時間制限内に認められた場合、その誤りは次のように訂正されるものとする："}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-20", "body": "44-20 例：第4 クォーター残り0:57 で、ボールの無いところでA2 がファウルをしたとき、ショットのボールがA1 の手を離れていた。ボールは正当にバスケットに入ったが、審判は誤って得点を取り消した。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-21", "body": "44-21 例：第2 クォーター残り3:32 で、B1 がツーポイントショットの動作（アクトオブシューティング）中のA1 にファウルをした。ボールはバスケットに入らなかった。審判は誤ってA1 に2 点と1 本のフリースローを与えた。この誤りが"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-22", "body": "44-22  条文：審判が誤ったプレーヤー、ヘッドコーチ、またはチームに対するファウルを伝達していたことが規則で定められた時間制限内に認められた場合、その誤りは次のように訂正されるものとする："}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-23", "body": "44-23 例：第1 クォーター残り5:47 で、B1 がA1 にファウルをした。審判はB2 のファウルとして伝達した。この誤りが"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-24", "body": "44-24  条文：スコアシートの記録の誤りについて、"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-25", "body": "44-25 例：第4 クォーター残り3:45 で、チームA は後半2 個目のタイムアウトを請求した。スコアラーはこのタイムアウトを誤ってチームB の後半2 個目のタイムアウトとして記録した。第4 クォーター残り2:44 で、ボールがアウトオブバウンズに出て審判がゲームを止めた。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-26", "body": "44-26 例：第1 クォーター残り3:34 で、チームA のヘッドコーチはテクニカルファウルを宣せられた。スコアラーはこのテクニカルファウルを誤ってチームB のヘッドコーチに記録した。この誤りが"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-27", "body": "44-27  条文：機材の故障を含め、ゲームクロックのスタートまたはストップでの誤りがあったこと、あるいは誤った競技時間を設定する誤りがあった場合、その誤りは次のように訂正される："}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-28", "body": "44-28 例：第1 クォーター残り2:44 で、アウトオブバウンズのバイオレーションによってゲームクロックが止められた。ショットクロック24 秒からのスローインのあと、ゲームクロックが故障により、何も表示されていない状態となった。ショットクロックに15 秒が表示されたとき、審判はゲームを止めた。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-29", "body": "44-29 例：第1 クォーター残り2:43 で、アウトオブバウンズのバイオレーションによってゲームクロックが止められた。スローインの前、ゲームクロックが何も表示されていない状態となった。タイマーは機材をリセットした。機材が再び動くようになったとき、ゲームクロックに誤って1:43 が設定された。この誤りが"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-30", "body": "44-30  条文：ショットクロックに関するカテゴリー2の誤りを訂正するには、その誤りは審判、コミッショナー（同席している場合）、テーブルオフィシャルによって次のときに認識され、訂正されなければならない。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-31", "body": "44-31 例：ショットクロック残り20 秒で、フロントコートでA1 がドリブルをしているとき、ショットクロックが突然24 秒にリセットされた。この誤りがその4 秒後の"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-32", "body": "44-32 例：チームA はフロントコートでスローインを与えられた。ショットクロックは14 秒に設定されるべきところ、誤って24 秒に設定された。A1 がコート上でボールをキャッチし、フロントコートで10 秒間ドリブルをした。この誤りが"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-33", "body": "44-33 例：チームA はバックコートでスローインを与えられた。ショットクロックは24 秒に設定されるべきところ、誤って14 秒に設定された。A1 がコート上でボールをキャッチし、フロントコートへドリブルをした。この誤りがその8 秒後の"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-34", "body": "44-34 例：チームA はバックコートでスローインを与えられた。ショットクロックは24 秒に設定されるべきところ、誤って14 秒に設定された。A1 がコート上でボールをキャッチし、フロントコートへドリブルをして、ショットをした。ボールが空中にある間にショットクロックのブザーが鳴った。ボールは"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り44-１条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。", "sec_no": "44-35", "body": "44-35 例： チームA はバックコートでスローインを与えられた。ショットクロックは24 秒に設定されるべきところ、誤って14 秒に設定された。A1 がコート上でボールをキャッチし、フロントコートへドリブルをして、ショットをした。"}];

// ====== ストレージキー ======
var SK  = 'jba_v3';
var SKR = 'jba_rule_v1';

// ====== 状態 ======
var mode = 'order';
var queue = [];
var qi = 0;
var ses = {ok:0,ng:0};
var chosen = null;
var lf = 'all';
var rt = 'rule';
var rfilter = 'all';
var rec = {};
var rchk = {};

// ====== ストレージ ======
function LRec(){
  try{
    var r = JSON.parse(localStorage.getItem(SK)||'{}');
    for(var i=0;i<ALL.length;i++){
      var id=ALL[i].id;
      if(!r[id]) r[id]={c:0,w:0};
    }
    return r;
  }catch(e){
    var r={};
    for(var i=0;i<ALL.length;i++) r[ALL[i].id]={c:0,w:0};
    return r;
  }
}
function SRec(){
  try{ localStorage.setItem(SK,JSON.stringify(rec)); toast(); }catch(e){}
}
function LChk(){
  try{ return JSON.parse(localStorage.getItem(SKR)||'{}'); }catch(e){ return {}; }
}
function SChk(){
  try{ localStorage.setItem(SKR,JSON.stringify(rchk)); }catch(e){}
}
function CLR(){
  if(!confirm('学習記録をリセットしますか？')) return;
  for(var i=0;i<ALL.length;i++) rec[ALL[i].id]={c:0,w:0};
  SRec(); RRC();
}
function toast(){
  var t=document.getElementById('toast');
  t.className='toast show';
  setTimeout(function(){ t.className='toast'; },1500);
}

// ====== タブ切替 ======
function ST(t){
  var tabs=['quiz','list','rule','record'];
  for(var i=0;i<tabs.length;i++){
    document.getElementById('T-'+tabs[i]).style.display = tabs[i]===t?'':'none';
    document.getElementById('tn-'+tabs[i]).className = 'tnb'+(tabs[i]===t?' active':'');
  }
  if(t==='list')  { RLS(); RL(); }
  if(t==='rule')  RRT();
  if(t==='record') RRC();
}

// ====== 学習タブ ======
function GW(){
  var r=[];
  for(var i=0;i<ALL.length;i++){
    var d=rec[ALL[i].id]; var t=d.c+d.w;
    if(t>0 && d.c/t<0.5) r.push(ALL[i].id);
  }
  return r;
}
function BQ(){
  if(mode==='order') queue=ALL.slice();
  else if(mode==='shuffle') queue=ALL.slice().sort(function(){return Math.random()-.5;});
  else{ var w=GW(); queue=ALL.filter(function(c){return w.indexOf(c.id)>=0;}); }
  qi=0; ses={ok:0,ng:0}; chosen=null;
}
function SM(m){
  mode=m;
  ['order','shuffle','wrong'].forEach(function(k){
    document.getElementById('m-'+k).className='mode-tab'+(k===m?' active':'');
  });
  BQ(); RQ();
}
function SAV(v){
  ['quiz','done','empty'].forEach(function(x){
    document.getElementById('A-'+x).style.display=x===v?'':'none';
  });
}
function US(){
  document.getElementById('s-total').textContent=ALL.length;
  document.getElementById('s-ok').textContent=ses.ok;
  document.getElementById('s-ng').textContent=ses.ng;
  document.getElementById('s-left').textContent=Math.max(0,queue.length-qi);
  var p=queue.length>0?Math.round(qi/queue.length*100):0;
  document.getElementById('prog').style.width=p+'%';
  document.getElementById('n-info').textContent='問題 '+(qi+1)+'/'+queue.length;
  document.getElementById('n-pct').textContent=p+'%';
}
function RQ(){
  US();
  if(mode==='wrong'&&queue.length===0){SAV('empty');return;}
  if(qi>=queue.length){
    SAV('done');
    var t=queue.length, p=t>0?Math.round(ses.ok/t*100):0;
    document.getElementById('d-t').textContent=t;
    document.getElementById('d-ok').textContent=ses.ok;
    document.getElementById('d-ng').textContent=ses.ng;
    document.getElementById('d-p').textContent=p+'%';
    return;
  }
  SAV('quiz');
  var c=queue[qi];
  document.getElementById('q-meta').textContent='No.'+c.id+'　'+c.num+'　難易度 '+c.level;
  document.getElementById('q-ref').textContent=c.ref;
  document.getElementById('q-text').textContent=c.q;
  var d=rec[c.id]||{c:0,w:0}; var tot=d.c+d.w;
  var he=document.getElementById('q-hist');
  if(tot>0){
    var rate=Math.round(d.c/tot*100);
    he.innerHTML='<span class="chip">累計 '+tot+' 回</span><span class="chip chip-ok">正解 '+d.c+' 回</span><span class="chip chip-ng">不正解 '+d.w+' 回</span><span class="chip">正答率 '+rate+'%</span>';
  }else{
    he.innerHTML='<span class="chip">初挑戦</span>';
  }
  var bo=document.getElementById('b-o'); var bx=document.getElementById('b-x');
  bo.className='cbtn'; bo.disabled=false;
  bx.className='cbtn'; bx.disabled=false;
  chosen=null;
  document.getElementById('A-res').style.display='none';
  document.getElementById('c-btns').style.display='grid';
}
function CH(ua){
  if(chosen!==null) return;
  chosen=ua;
  var c=queue[qi]; var ok=(ua===c.ans);
  if(ok) ses.ok++; else ses.ng++;
  US();
  var d=rec[c.id]; if(ok) d.c++; else d.w++;
  SRec();
  var bo=document.getElementById('b-o'); var bx=document.getElementById('b-x');
  bo.disabled=true; bx.disabled=true;
  if(ua===true){
    bo.className='cbtn '+(ok?'cbtn-ok':'cbtn-ng');
    if(!ok) bx.className='cbtn cbtn-rv';
  }else{
    bx.className='cbtn '+(ok?'cbtn-ok':'cbtn-ng');
    if(!ok) bo.className='cbtn cbtn-rv';
  }
  var al=c.ans?'○':'×'; var bc=c.ans?'bdg-o':'bdg-x';
  document.getElementById('r-card').innerHTML=
    '<div class="res-hd"><div class="ans-bdg '+bc+'">'+al+'</div>'+(ok?'<span class="res-lbl lbl-ok">✓ 正解！</span>':'<span class="res-lbl lbl-ng">✗ 不正解</span>')+'</div>'
    +'<div class="rsec"><div class="rsec-t">解説</div><div class="rsec-b">'+E(c.explanation)+'</div></div>'
    +'<div class="rsec"><div class="rsec-t">根拠条文</div><div class="rl-box"><div class="rl-src">'+E(c.ruleSrc)+'</div><div class="rl-txt">'+E(c.ruleText).replace(/\n/g,'<br>')+'</div></div></div>';
  document.getElementById('c-btns').style.display='none';
  document.getElementById('A-res').style.display='block';
}
function NQ(){ qi++; RQ(); }
function RS(){ BQ(); RQ(); }

// ====== 一覧タブ ======
function LF(f){
  lf=f;
  ['all','weak','new'].forEach(function(k){
    document.getElementById('lf-'+k).className='fbtn'+(k===f?' active':'');
  });
  RL();
}
function RLS(){
  var tc=0,tw=0; for(var k in rec){ tc+=rec[k].c; tw+=rec[k].w; }
  var tot=tc+tw;
  var ans=0; for(var i=0;i<ALL.length;i++){ var d=rec[ALL[i].id]; if(d.c+d.w>0) ans++; }
  document.getElementById('ls-a').textContent=ans;
  document.getElementById('ls-w').textContent=GW().length;
  document.getElementById('ls-r').textContent=tot>0?Math.round(tc/tot*100)+'%':'0%';
}
function RL(){
  var kw=(document.getElementById('l-srch').value||'').toLowerCase();
  var items=ALL.slice();
  var wids=GW();
  if(lf==='weak') items=items.filter(function(c){return wids.indexOf(c.id)>=0;});
  if(lf==='new')  items=items.filter(function(c){var d=rec[c.id];return !d||(d.c+d.w)===0;});
  if(kw) items=items.filter(function(c){return c.q.toLowerCase().indexOf(kw)>=0||c.num.toLowerCase().indexOf(kw)>=0||String(c.id).indexOf(kw)>=0;});
  var w=document.getElementById('l-wrap');
  if(!items.length){w.innerHTML='<div style="text-align:center;padding:24px;color:#98a2b3;font-size:13px">該当なし</div>';return;}
  w.innerHTML=items.map(function(c){
    var d=rec[c.id]||{c:0,w:0}; var tot=d.c+d.w;
    var isN=tot===0; var rate=isN?-1:Math.round(d.c/tot*100); var isW=!isN&&rate<50;
    var nc=isN?'no-n':isW?'no-w':'no-g';
    var rc=isN?'rt-nw':isW?'rt-ng':'rt-ok';
    var rs=isN?'未回答':rate+'%';
    var cb=isN?0:rate; var wb=isN?0:100-rate;
    return '<div class="ql-c" id="lc-'+c.id+'">'
      +'<div class="ql-hd" onclick="TD('+c.id+')">'
        +'<span class="ql-no '+nc+'">No.'+c.id+'</span>'
        +'<span class="ql-ch">'+E(c.num)+'　'+E(c.ref)+'</span>'
        +'<span class="ql-rt '+rc+'">'+rs+'</span>'
      +'</div>'
      +'<div class="ql-br"><div class="ql-b"><div class="b-c" style="width:'+cb+'%"></div><div class="b-w" style="width:'+wb+'%"></div></div><span class="ql-bn">'+(isN?'—':d.c+'/'+tot+'回')+'</span></div>'
      +'<div class="ql-dt" id="ld-'+c.id+'">'
        +'<div class="q-hist">'+(isN?'<span class="chip">初挑戦</span>':'<span class="chip">累計 '+tot+' 回</span><span class="chip chip-ok">正解 '+d.c+' 回</span><span class="chip chip-ng">不正解 '+d.w+' 回</span><span class="chip">正答率 '+rate+'%</span>')+'</div>'
        +'<div class="ql-qt">'+E(c.q)+'</div>'
        +'<div class="ql-ar"><div class="ql-ab '+(c.ans?'bdg-o':'bdg-x')+'">'+(c.ans?'○':'×')+'</div><div class="ql-al">正解：'+(c.ans?'○ 正しい':'× 誤り')+'</div></div>'
        +'<div class="ql-s"><div class="ql-st">解説</div><div class="ql-sb">'+E(c.explanation)+'</div></div>'
        +'<div class="ql-s"><div class="ql-st">根拠条文</div><div class="ql-rb"><div class="ql-rs">'+E(c.ruleSrc)+'</div><div class="ql-rt2">'+E(c.ruleText).replace(/\n/g,'<br>')+'</div></div></div>'
        +'<button class="ql-sb2" onclick="SFQ('+c.id+')">この問題から学習を始める</button>'
      +'</div>'
    +'</div>';
  }).join('');
}
function TD(id){ var el=document.getElementById('ld-'+id); if(el) el.classList.toggle('open'); }
function SFQ(id){
  mode='order';
  ['order','shuffle','wrong'].forEach(function(k){document.getElementById('m-'+k).className='mode-tab'+(k==='order'?' active':'');});
  queue=ALL.slice(); qi=0;
  for(var i=0;i<ALL.length;i++){ if(ALL[i].id===id){qi=i;break;} }
  ses={ok:0,ng:0}; chosen=null;
  ST('quiz'); RQ();
}

// ====== 競技規則タブ ======
function SRT(t){
  rt=t;
  document.getElementById('rsw-r').className='rswb'+(t==='rule'?' active':'');
  document.getElementById('rsw-i').className='rswb'+(t==='impl'?' active':'');
  RF('all');
}
function RF(f){
  rfilter=f;
  document.getElementById('rf-all').className='rfb'+(f==='all'?' active':'');
  document.getElementById('rf-weak').className='rfb'+(f==='weak'?' wactive':'');
  document.getElementById('rf-unc').className='rfb'+(f==='unc'?' active':'');
  RRT();
}
function RK(item){ return (rt)+':'+item.sec_no; }
function TCK(key,field,val){
  if(!rchk[key]) rchk[key]={checked:false,weak:false};
  rchk[key][field]=val;
  SChk(); URS();
}
function GI(){ return rt==='rule'?RULE_DATA:IMPL_DATA; }
function URS(){
  var items=GI();
  var tc=0,tw=0;
  for(var i=0;i<items.length;i++){
    var k=RK(items[i]);
    if(rchk[k]&&rchk[k].checked) tc++;
    if(rchk[k]&&rchk[k].weak) tw++;
  }
  document.getElementById('rs-t').textContent=items.length;
  document.getElementById('rs-c').textContent=tc;
  document.getElementById('rs-w').textContent=tw;
}
function RRT(){
  URS();
  var items=GI().slice();
  if(rfilter==='weak') items=items.filter(function(i){var k=RK(i);return rchk[k]&&rchk[k].weak;});
  if(rfilter==='unc')  items=items.filter(function(i){var k=RK(i);return !rchk[k]||!rchk[k].checked;});
  var w=document.getElementById('rule-wrap');
  if(!items.length){
    w.innerHTML='<div style="text-align:center;padding:24px;color:#98a2b3;font-size:13px">'+(rfilter==='weak'?'苦手マークの項目がありません':'該当なし')+'</div>';
    return;
  }
  var groups={}; var gorder=[];
  for(var i=0;i<items.length;i++){
    var it=items[i]; var g=it.art_no+'§'+it.art_title;
    if(!groups[g]){groups[g]=[];gorder.push(g);}
    groups[g].push(it);
  }
  w.innerHTML=gorder.map(function(g){
    var parts=g.split('§');
    var an=parts[0]; var at=parts.slice(1).join('§');
    var gi=groups[g];
    return '<div class="grp-hd">第'+E(an)+'条　'+E(at)+'</div>'
      +gi.map(function(item){
        var k=RK(item);
        var ch=rchk[k]&&rchk[k].checked;
        var wk=rchk[k]&&rchk[k].weak;
        var eid='rb-'+k.replace(/[:.]/g,'_');
        return '<div class="rc">'
          +'<div class="rc-hd" onclick="TRD(\''+eid+'\')">'
            +'<span class="rc-no'+(wk?' wk':'')+'">'+E(item.sec_no)+'</span>'
            +'<span class="rc-at">'+E(item.art_title||'')+'</span>'
            +'<div class="rc-cks" onclick="event.stopPropagation()">'
              +'<div class="rc-cw"><span class="rc-cl">確認</span><input type="checkbox" class="rc-cb" '+(ch?'checked':'')+' onchange="TCK(\''+k+'\',\'checked\',this.checked)"></div>'
              +'<div class="rc-cw"><span class="rc-cl">苦手</span><input type="checkbox" class="rc-cb rc-wb" '+(wk?'checked':'')+' onchange="TCK(\''+k+'\',\'weak\',this.checked)"></div>'
            +'</div>'
          +'</div>'
          +'<div class="rc-bd" id="'+eid+'">'
            +'<div class="rc-tx">'+E(item.body)+'</div>'
          +'</div>'
        +'</div>';
      }).join('');
  }).join('');
}
function TRD(id){
  var el=document.getElementById(id);
  if(el) el.classList.toggle('open');
}

// ====== 記録タブ ======
function RRC(){
  var tc=0,tw=0;
  for(var k in rec){tc+=rec[k].c;tw+=rec[k].w;}
  var tot=tc+tw; var rate=tot>0?Math.round(tc/tot*100):0;
  document.getElementById('rc-t').textContent=tot;
  document.getElementById('rc-ok').textContent=tc;
  document.getElementById('rc-r').textContent=rate+'%';
  document.getElementById('rc-wrap').innerHTML=ALL.map(function(c){
    var d=rec[c.id]||{c:0,w:0}; var t=d.c+d.w;
    var isN=t===0; var rate=isN?-1:Math.round(d.c/t*100); var isW=!isN&&rate<50;
    var nc=isN?'no-n':isW?'no-w':'no-g';
    var rc=isN?'rt-nw':isW?'rt-ng':'rt-ok';
    var cb=isN?0:rate; var wb=isN?0:100-rate;
    return '<div class="ql-c"><div class="ql-hd">'
      +'<span class="ql-no '+nc+'">No.'+c.id+'</span>'
      +'<span class="ql-ch">'+E(c.num)+'</span>'
      +'<span class="ql-rt '+rc+'">'+(isN?'未回答':rate+'%')+'</span>'
    +'</div><div class="ql-br"><div class="ql-b"><div class="b-c" style="width:'+cb+'%"></div><div class="b-w" style="width:'+wb+'%"></div></div><span class="ql-bn">'+(isN?'—':d.c+'/'+t+'回')+'</span></div></div>';
  }).join('');
}

// ====== ユーティリティ ======
function E(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ====== 起動 ======
rec  = LRec();
rchk = LChk();
BQ();
RQ();




</script>
</body>
</html>
