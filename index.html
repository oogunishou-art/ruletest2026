:00あるいはそれ以下を示す前に認識、訂正されなければならない。\n       ・第4クォーターでゲームクロックが2:00あるいはそれ以下を示す前に誤りが起き、ゲームクロックが\n        2:00を示して審判が初めてゲームを止めた場合、その誤りはボールが再びライブとなる前に認\n        識、訂正されなければならない。\n       ・第4クォーターあるいはオーバータイムでゲームクロックが2:00あるいはそれ以下を示した後で誤\n        りが起きた場合、誤りが起きてから何らかの理由により最初に審判がゲームを止めたあと、ボー\n        ルがライブとなる前にその誤りは認識、訂正されなければならない。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-3", "body": "44-３   例：第 2 クォーター残り 3:37 で、B1 が A1 にファウルをし、このクォーター4 個目のチームファウル\n       であった。誤って 2 本のフリースローが A1 に与えられた。この誤りが\n       ⒜第 4 クォーター残り 4:48 に認識された。\n       ⒝第 4 クォーター残り 0:39 に認識された。\n       解説：\n       ⒜では、誤りは訂正できる。\n       ⒝では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-4", "body": "44-４   例：第 4 クォーター残り 2:13 で、B1 が A1 にファウルをし、このクォーター6 個目のチームファウル\n       であった。2 本のフリースローが A1 に与えられた。審判は A1 ではなく A2 にフリースローを行うよう\n       に指示した。この誤りが\n       ⒜第 4 クォーター残り 1:49 で、ゲームが止められたときに認識された。（これは当該フリースローの\n        あと、最初にゲームが止められたタイミングであった。）\n       ⒝第 4 クォーター残り 1:23 で、ゲームが止められたときに認識された。（これは当該フリースローの\n        あと、3 度目にゲームが止められたタイミングであった。）\n       解説：\n       ⒜では、誤りは訂正できる。\n\n⒝では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-5", "body": "44-５   例：第 4 クォーター残り 1:14 で、B1 がツーポイントゴールのショットの動作（アクトオブシューティ\n       ング）中の A1 にファウルをし、ショットは成功しなかった。審判は誤って A1 に 2 点と 1 本のフリー\n       スローを与えた。この誤りが\n       ⒜フリースローのあと、ゲームが再開される前に認識された。\n       ⒝フリースローに続いてゲームが再開されたあと、第 4 クォーター残り 0:59 で最初に止められたとき\n        に認識された。\n       ⒞第 4 クォーターと最初のオーバータイムの間のプレーのインターバル中に認識された。\n       ⒟オーバータイム残り 3:59 で認識された。\n       解説：\n       ⒜と⒝では、誤りは訂正できる。\n       ⒞と⒟では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-6", "body": "44-６   条文：審判がフリースローを誤 っ て 与 え た こ と が 規則で定められた時間制限内に認められた\n       場合、その誤りは次のように訂正されるものとする：\n       誤って与えられたフリースローは取り消され、ゲームは次のように再開される：\n       ・誤りが起きたあと、ゲームクロックが動いていない場合、フリースローを取り消されたチームはフリー\n        スローラインの延長線上のアウトオブバウンズからスローインを与えられる。\n       ・誤りが起きたあと、ゲームクロックがすでに動いていた場合、ゲームは誤りの訂正のために止めら\n        れた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-7", "body": "44-７   例：第 2 クォーター残り 3:37 で、B1 が A1 にファウルをし、このクォーター4 個目のチームファウル\n       であった。審判は誤って 2 本のフリースローを A1 に与えた。この誤りが\n       ⒜最初のフリースローのボールが A1 に与えられた後に認識された。\n       ⒝A1 が両方のフリースローを終えたあと、ゲームクロックが動き始める前に認識された。\n       ⒞第 4 クォーター残り 4:48 で認識された。\n       解説：\n       全ての場合において、誤りは訂正できる。成否にかかわらず、フリースローは取り消される。\n       ⒜と⒝では、ゲームはスコアラーズテーブルの反対側のフリースローラインの延長線上のアウトオブバ\n        ウンズからチーム A のスローインで再開され、ショットクロックは 14 秒となる。\n       ⒞では、誤りの訂正のあと、ゲームは誤りの訂正のために止められた場所に最も近いところから再開\n        される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-8", "body": "44-８   条文：審判が与えるべきフリースローを誤って与えていなかったことが規則で定められた時間制限\n       内に認められた場合、その誤りは次のように訂正されるものとする：\n       ・誤りが起きたあと、ボールのコントロールが一度も変わっていない場合、誤りの訂正のあと、ゲームは\n\n通常の最後のフリースローの後と同様に再開される。\n        ・誤ってスローインが与えられたあと、そのチームが得点した場合、その誤りはなかったものとする。\n        ・ゲ ー ム ク ロ ッ ク が す で に 動いていて、ボールのコントロールが変わっていた場合、誤りの訂正の\n         あと、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-9", "body": "44-９    例：第 2 クォーターで、B1 が A1 にファウルをし、このクォーター5 個目のチ ー ム フ ァ ウ ル であった。\n        チーム A は誤ってスローインを与えられた。A2 が\n        ⒜フロントコートでドリブルをした直後に\n        ⒝フロントコートでドリブルをし、B2 がボールをアウトオブバウンズに弾き出した直後に\n        ⒞ドリブルをし、得点した直後に\n        2 本のフリースローが A1 に与えられていない誤りが認識された。\n        解説：\n        ⒜と⒝では、誤りは訂正できる。2 本のフリースローが A1 に与えられ、ゲームは通常の最後のフリー\n         スローの後と同様に再開される。\n        ⒞では、誤りに続いてチーム A が得点している。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-10", "body": "44-10   例：第 2 クォーターで、B1 が A1 にファウルをし、このクォーター5 個目のチ ー ム フ ァ ウ ル であった。\n        チームAは誤ってスローインを与えられた。誤ってスローインが与えられたあと、A2 が得点した。この誤りが\n        ⒜A2 の得点のあと、エンドラインからのスローインのボールを B1 が持ったときに認識された。\n        ⒝3 分間プレーした後で、審判がゲームを止めたときに認識された。\n        ⒞ハーフタイムの間に認識された。\n        ⒟第 4 クォーター残り 2:54 で認識された。\n        解説：\n        全ての場合において、誤ってスローインが与えられたあと、チーム A が得点しているため、誤りはなか\n        ったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-11", "body": "44-11   例：第 2 クォーターで、B1 がショットの動作（アクトオブシューティング）中の A1 にファウルをした。\n        その後、チーム B のヘッドコーチがテクニカルファウルを宣せられた。チーム A は誤って B1 のファウル\n        による 2 本のフリースローのみを与えられた。2 本のフリースローが A1 に与えられ、2 本目を成功さ\n        せた。この誤りが\n        ⒜A1 の 2 本目のフリースローのあと、エンドラインからのスローインのボールを B２が持ったときに認\n         識された。\n        ⒝3 分間プレーした後で、審判がゲームを止めたときに認識された。\n        ⒞ハーフタイムの間に認識された。\n        ⒟第 4 クォーター残り 1:54 で認識された。\n\n解説：\n        ⒜と⒝、⒞では、誤りは訂正できる。\n        誰もリバウンドの位置に着かずに A1 にフリースローが与えられる。ゲームは誤りの訂正のために止め\n        られた場所に最も近いアウトオブバウンズから再開される。\n        ⒟では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-12", "body": "44-12   例：第 3 クォーターで、B2 がド リ ブ ル を し て いる A1 にファウルをし、このクォーター5 個目のチーム\n        ファウルであった。2 本のフリースローが A1 に与えられた。1 本目のフリースローを失敗したあと、B1\n        がリバウンドのボールを取り、ゲームは誤って続行された。この誤りが\n        ⒜B2 がコート上でドリブルをしているときに認識された。\n        ⒝第 4 クォーター残り 2:54 で認識された。\n        ⒞第 4 クォーター残り 0:39 で認識された。\n        ⒟オーバータイム残り 4:32 で認識された。\n        解説：\n        ⒜と⒝では、誤 り は 訂 正 できる。2 本目のフリースローが A1 に与えられる。A1 がチームベンチに\n         いて、プレーをする資格がある場合、A1 は再びコートに入り、フリースローを行わなければならな\n         い。A1 が 5 個のファウルを宣せられていたり、失 格 ・ 退 場 と なっていたりした場合、チーム A の\n         ヘッドコーチはフリースローシューターを指定する。\n        フリースローは誰もリバウンドの位置に着かずに行われる。ゲームは誤りの訂正のために止められた\n        場所に最も近いアウトオブバウンズから再開される。\n        ⒞と⒟では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-13", "body": "44-13   条文：審判による指 定 な く 誤 っ た プレーヤーがフリースローを行っていたことが認められた場合、\n        成否にかかわらずそのフリースローは取り消される。まだゲームが再開されていない場合、ゲームは\n        スコアラーズテーブルの反対側のフリースローラインの延長線上から相手チームのスローインで再開\n        される。\n        ゲームがすでに再開されていた場合、誤りの訂正のために止められる。誤りの訂正のあと、ゲーム\n        は止められた場所に最も近いアウトオブバウンズから再開される。\n        最初のフリースローのボールがシューターの手を離れる前に誤ったシューターがフリースローを行おう\n        としていることを審判が認識した場合、罰則を与えられることなく、誤ったシューターは正しいシュー\n        ターに速やかに交代させられる。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-14", "body": "44-14   例：第 3 クォーターの終了を知らせるゲームクロックのブザーが鳴ったとき、B1 がドリブルをしている\n        A1 にファウルをし、このクォーター6 個目のチームファウルで あ っ た 。 審 判 は B1 のファウルはゲーム\n        クロック残り 0.3 秒で起きたと判断した。2 本のフリースローが A1 に与えられたが、A1 ではなく、A2\n        がフリースローを行おうとした。この誤りが最初のフリースローでボールが A2 の手を離れた後で認識\n\nされた。\n        解説：A2 の 2 本のフリースローは取り消される。ゲ ー ム は バ ッ ク コ ー ト のスコアラーズテーブルの\n        反対側のフリースローラインの延長線上のアウトオブバウンズからチーム B のスローインで再開され、\n        ゲームクロックは 0.3 秒となる。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-15", "body": "44-15   例：第 3 クォーター残り 3 秒で、B1 がショットの動作（アクトオブシューティング）中の A1 にファウル\n        をした。2 本のフリースローが A1 に与えられたが、A1 の代わりに A2 がフ リ ー ス ロ ー を 行 っ た 。第\n        3 クォーターが終了し、この誤りが\n        ⒜第 3 クォーターと第 4 クォーターの間のプレーのインターバル中に認識された。\n        ⒝第 4 クォーターでボールがライブとなったあと、ゲームクロックに 2:00 が表示される前に認識された。\n        ⒞第 4 クォーターでゲームクロックに 2:00 が表示された後で認識された。\n        解説：\n        ⒜と⒝では、誤りは訂正できる。A2 の 2 本のフリースローは取り消される。\n        ⒜では、第 4 クォーターはセンターラインの延長線上のアウトオブバウンズからオルタネイティングポゼ\n         ッションのスローインで開始される。\n        ⒝では、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。\n        ⒞では、誤りを訂正できる時機を過ぎている。誤 り は 訂 正 で き ず 、なかったものとする。ゲームは\n         続行される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-16", "body": "44-16   条文：審判が誤ったフリースローシューターを指定してフリースローを行っていたことが認められた\n        場合、成否にかかわらずそのフリースローは取り消され、正しいプレーヤーが代わりのフリースローを\n        行う。\n        ゲームが再開されてこの誤 り の 訂 正 の ために止められた場合を除いて、ゲームは通常の最後の\n        フリースローの後と同様に再開される。ゲームが再開されてこ の 誤 り の 訂 正 のために止められた\n        場合、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-17", "body": "44-17   例：第 3 クォーターの終了を知らせるゲームクロックのブザーが鳴ったとき、B1 がドリブルをしている\n        A1 にファウルをし、このクォーター6 個目のチ ー ム フ ァ ウ ル であった。審判は B1 のファウルはゲーム\n        ク ロ ッ ク 残 り 0.3 秒で起きたと判断した。2 本のフリースローが A1 に与えられた。審判は A1 では\n        なく、A2 をシューターに指定してフリースローを行った。この誤りが最初のフリースローでボールが A2\n        の手を離れた後で認識された。\n        解説：A2 の 2 本のフリースローは取り消される。2 本のフリースローが A1 に与えられる。ゲームは\n        通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-18", "body": "44-18   例：B1 がシ ョ ッ ト の 動 作 （アクトオブシューティング）中の A1 にファウルをした。審判は A1 では\n        なく、A2 をシューターに指定してフリースローを行った。2 本目のフリースローでボールがリングに触れ\n        たあと、A3 がリバウンドのボールを取って 2 点を得点した。この誤りが、エンドラインの後ろのアウトオ\n\nブバウンズでチーム B がスローインのボールを持つ前に認識された。\n        解説：成否にかかわらず、A2 が行った 2 本のフリースローは取 り 消 さ れ る 。A3 の得点は有効な\n        ままとなる。誰もリバウンドの位置に着かずに 2 本のフリースローが A1 に与えられる。ゲームは誤り\n        の訂正のために止められた場所に最も近いアウトオブバウンズ（この場面ではエンドラインの後方の\n        アウトオブバウンズ）から再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-19", "body": "44-19   条文：審判が誤って得点を与えたり、取り消したりしていたことが規則で定められた時間制限内\n        に認められた場合、その誤りは次のように訂正されるものとする：\n        ・得点は状況に応じて取り消される、もしくは与えられる。\n        ・フリースローが誤って与えられ、成功した場合、誤りの訂正の結果としてそのフリースローは取り\n         消される。\n        ・フリースローが誤って与えられなかった場合、誤 り の 訂 正 の結果として、フリースローが本来のフ\n         リースローシューターに与えられる。\n          【補足】規則の中で別途規定がある場合を除く。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-20", "body": "44-20   例：第 4 クォーター残り 0:57 で、ボールの無いところで A2 がファウルをしたとき、ショットのボール\n        が A1 の手を離れていた。ボールは正当にバスケットに入ったが、審判は誤って得点を取り消した。\n        この誤りが\n        ⒜第 4 クォーター残り 0:43 で、誤りに続いて最初に審判がゲームを止めたときに認識された。\n        ⒝第 4 クォーター残り 0:43 でゲームが止められ、再びボールがライブとなった後で認識された。\n        解説：\n        ⒜では、誤りは訂正できる。スコアシートは訂正され、チーム A に 2 点が追加される。ゲームは誤り\n         の訂正のために止められた場所に最も近いアウトオブバウンズから再開される。\n        ⒝では、誤りを訂正できる時機を過ぎている。誤 り は 訂 正 で き ず 、なかったものとする。ゲームは\n         続行される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-21", "body": "44-21   例：第 2 クォーター残り 3:32 で、B1 がツーポイントショットの動作（アクトオブシューティング）中\n        の A1 にファウルをした。ボールはバスケットに入らなかった。審判は誤って A1 に 2 点と 1 本のフリー\n        スローを与えた。この誤りが\n        ⒜第 3 クォーター残り 5:21 で、ゲームが止められたときに認識された。\n        ⒝第 4 クォーター残り 1:02、もしくはオーバータイムのいずれかの時間帯で認識された。\n        解説： 第 2 クォーターで誤って与えられたツーポイントゴールは、第 4 クォーターでゲームクロックが\n        2:00 を示すまではいつでも訂正できる。\n        ⒜では、誤りは訂正できる。スコアラーはクルーチーフと相談したあと、誤って与えられた得点を取り\n         消す。第 2 クォーターでの 1 本目のフリースローの成否にかかわらず、1 本のフリースローが A1 に\n         与えられる。\n\n5 個のファウルを宣せられていない、もしくは失格・退場となっていない限り、A1 は 1 本のフリースロー\n        を行うためにコートに入らなければならない。A1 が 5 個のファウルを宣せられている、もしくは失格・\n        退場となっている場合、チーム A のヘッドコーチに指定されたプレーヤーあるいは交代要員がフリー\n        スローを行う。\n        ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。\n        ⒝では、誤りを訂正できる時機を過ぎている。誤 り は 訂 正 で き ず 、なかったものとする。ゲームは\n         続行される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-22", "body": "44-22   条文：審判が誤ったプレーヤー、ヘッドコーチ、またはチームに対するファウルを伝達していたことが\n        規則で定められた時間制限内に認められた場合、その誤りは次のように訂正されるものとする：\n        スコアシートは訂正され、誤った伝達の結果として意図せず５個のファウルを宣せられていた、ま\n        たは失格・退場となっていたプレーヤーやコーチは、再びゲームに参加できる。訂 正 に よ っ て 失\n        格・退場となったプレーヤーやコーチは失格・退場となる。罰則は適用されない。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-23", "body": "44-23   例：第 1 クォーター残り 5:47 で、B1 が A1 にファウルをした。審判は B2 のフ ァ ウ ル と し て 伝達\n        した。この誤りが\n        ⒜ハーフタイムの間に認識された。\n        ⒝第 4 クォーター残り 2:21 でゲームが止められたときに認識された。\n        ⒞第 4 クォーター残り 2:00、もしくはオーバータイムのいずれかの時間帯でゲームが止められたとき\n         に認識された。\n        解説：誤ったプレーヤーのファウルを伝 達 し た 誤 り は、第 4 クォーターでゲームクロックが 2:00 を\n        示すまではいつでも訂正できる。\n        ⒜と⒝では、誤 り は 訂 正 できる。スコアラーはクルーチーフと相談したあと、誤って B2 に記録された\n         ファウルを削除し、B1 に正しくフ ァ ウ ル を 記 録 することでスコアシートを訂正する。B2 が誤って 5\n         個のファウルを宣せられたチームメンバーとなっていた場合、B2 は再びゲームに参加できる。B1\n         が本 来 早 い 時 点 で 5 個のファウルを宣せられたチームメンバーとなるべきであった場合、B1 は\n         この時点で 5 個のファウルを宣せられたチームメンバーとなる。追加の罰則は適用されない。\n        ⒞では、誤りを訂正できる時機を過ぎている。誤 り は 訂 正 で き ず 、なかったものとする。ゲームは\n         続行される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-24", "body": "44-24   条文：スコアシートの記録の誤りについて、\n        ・得点が誤って記録されていたこと\n        ・誤ったプレーヤーやコーチ、チームにファウルが記録されていたこと\n        ・誤ったチームにタイムアウトが記録されていたこと\n        あるいは、これらが誤って記録されていなかったことが規則で定められた時間制限内に認められた\n        場合、スコアシートは訂正され、誤った記録の結果として意図せず5個のファウルを宣せられてい\n\nた、または失格・退場となっていたプレーヤーやコーチは、再びゲームに参加できる。訂正によって\n        失格・退場となったプレーヤーやコーチは失格・退場となる。罰則は適用されない。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-25", "body": "44-25   例：第 4 クォーター残り 3:45 で、チーム A は後半 2 個目のタイムアウトを請求した。スコアラーは\n        このタイムアウトを誤ってチーム B の後半 2 個目のタイムアウトとして記録した。第 4 クォーター残り\n        2:44 で、ボールがアウトオブバウンズに出て審判がゲームを止めた。\n        ⒜第 4 クォーター残り 2:02 で、チーム B にタイムアウトが認められた。\n        ⒝第 4 クォーター残り 1:45 で、チーム B にタイムアウトが認められた。\n        チーム B はこのタイムアウトが後半 3 個目であることを伝えられ、チーム B はタイムアウトが残ってい\n        ない。チーム B のヘッドコーチは誤りが起きていることを主張した。スコアラーはクルーチーフと相談し、\n        誤りが認識された。\n        解説：\n        ⒜では、誤りは訂正できる。スコアラーはクルーチーフと相談したあと、誤ってチーム B に記録された\n         タイムアウトを削除し、チーム A に正しくタイムアウトを記録することでスコアシートを訂正する。\n        ⒝では、誤ったチームにタイムアウトが記録されたことは、第 4 クォーターでゲームクロックが 2:00 を\n         示すまでに認識されなければならず、誤りを訂正できる時機を過ぎている。誤りは訂正できず、\n         なかったものとする。\n        タイムアウトが始まっていた場合、チーム B は後 半 最 後 の タイムアウトを消費する。タイムアウトが\n        始まっていなかった場合、チーム B のヘッドコーチはタイムアウトの請求を取り下げることができる。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-26", "body": "44-26   例：第 1 クォーター残り 3:34 で、チーム A のヘッドコーチはテクニカルファウルを宣せられた。スコア\n        ラーはこのテクニカルファウルを誤ってチーム B のヘッドコーチに記録した。この誤りが\n        ⒜ハーフタイムの間に認識された。\n        ⒝第 4 クォーター残り 3:31 でゲームが止められたときに認識された。\n        ⒞第 4 クォーター残り 1:02、もしくはオーバータイムのいずれかの時間帯でゲームが止められたとき\n         に認識された。\n        解説：誤ったチームに記録されたテクニカルファウルは、第 4 クォーターでゲームクロックに 2:00 が\n        表示されるまでは訂正できる。\n        ⒜と⒝では、誤 り は 訂 正 で き る 。スコアラーはクルーチーフと相談したあと、誤ってチーム B のヘッド\n         コーチに記録されたテクニカルファウルを削除し、チーム A のヘッドコーチに正しくテクニカルファウル\n         を記録することでスコアシートを訂正する。罰則は適用されない。\n        ⒞では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。\n        ゲームは誤りの訂正のためにゲームが止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-27", "body": "44-27   条文：機材の故障を含め、ゲームクロックのスタートまたはストップでの誤りがあったこと、あるいは\n        誤った競技時間を設定する誤りがあった場合、その誤りは次のように訂正される：\n        誤りが規則で定められた時間制限内に認められた場合、ゲームクロックは誤りを訂正するために\n        必要な時間を増やしたり、減らしたりすることで訂正される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-28", "body": "44-28   例：第 1 クォーター残り 2:44 で、ア ウ ト オ ブ バ ウ ン ズ のバイオレーションによってゲームクロックが\n        止められた。ショットクロック 24 秒からのスローインのあと、ゲームクロックが故障により、何も表示され\n        ていない状態となった。ショットクロックに 15 秒が表示されたとき、審判はゲームを止めた。\n        解説：ゲームクロックが正常に動かなかった誤 り は 訂 正 で き る 。ゲームは止められた場所に最も\n        近いアウトオブバウンズから再開され、ゲームクロックは残り 2:35、ショットクロックは 15 秒となる。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-29", "body": "44-29   例：第 1 クォーター残り 2:43 で、ア ウ ト オ ブ バ ウ ン ズ のバイオレーションによってゲームクロックが\n        止められた。スローインの前、ゲームクロックが何も表示されていない状態となった。タイマーは機材を\n        リセットした。機材が再び動くようになったとき、ゲームクロックに誤って 1:43 が設定された。この誤りが\n        ⒜第 1 クォーター残り 0:27 でゲームが止められたときに認識された。\n        ⒝ハーフタイムの間に認識された。\n        ⒞第 3 クォーターと第 4 クォーターの間のプレーのインターバル中に認識された。\n        ⒟第 4 クォーター残り 2:21 でゲームが止められたときに認識された。\n        ⒠第 4 クォーター残り 1:15、もしくはオーバータイムのいずれかの時間帯でゲームが止められたとき\n         に認識された。\n        解説：⒜、⒝、⒞、⒟では、誤って設定されたゲームクロックは訂正できる。\n        ⒜では、ゲームクロックに 1 分が加えられる。ゲームは止められた場所に最も近いアウトオブバウンズ\n         から再開され、ゲームクロックは残り 1:27 となる。\n        ⒝では、ハーフタイムのインターバルのあと、ハーフタイムのためにゲームが止められたときから継続した\n         チームファウルとタイムアウトで、前半で両チームがプレーしていた方向と同じ方向に 1 分間プレー\n         する。ゲームクロックは 1:00 に設定され、オルタネイティングポゼッションのスローインが与えられる\n         ことになっているチームのスローインで始められる。1 分間のプレーのあと、次にオルタネイティングポ\n         ゼッションのスローインが与えられることになっているチームのスローインで第 3 クォーターが始められ\n         る。\n        ⒞では、第 4 クォーターは 11 分間でプレーされる。\n        ⒟では、ゲームクロックに 1 分が加えられる。ゲームは止められた場所に最も近いアウトオブバウンズ\n         から再開され、ゲームクロックは残り 3:21 となる。\n        ⒠では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-30", "body": "44-30   条文：ショットクロックに関するカテゴリー2の誤りを訂正するには、その誤りは審判、コミッショナー\n        （同席している場合）、テーブルオフィシャルによって次のときに認識され、訂正されなければなら\n        ない。\n        ・誤りが起きた直後、ボールがライブで誤りの訂正のために審判がゲームを止めたとき、あるいは\n        ・審判が何らかの理由で最初にゲームを止め、誤りが起きたときにボールをコントロールしていたチ\n         ームが、ゲームが止められたときにもボールをコントロールしている、もしくはコントロールが与え\n         られることになっているとき。\n        ショットクロックは正しい時間に訂正される。\n\n        次の状況のあと、ショットクロックは訂正することはできない：\n        ・誤りのあと、ライブのボールのコントロールが変わった。\n        ・ボールをコントロールしているチームが得点した。\n        ・ゲームの終了を知らせるゲームクロックのブザーが鳴り、ボールがデッドになった。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-31", "body": "44-31   例：ショットクロック残り 20 秒で、フロントコートで A1 がドリブルをしているとき、シ ョ ッ ト ク ロ ッ ク が\n        突然 24 秒にリセットされた。この誤りがその 4 秒後の\n        ⒜審判がゲームを止めたときに認識された。\n        ⒝B3 がボールをアウトオブバウンズに弾き出して、ゲームが止められたときに認識された。\n        解説：どちらの場合においても、ゲームが止められた場所に最も近いアウトオブバウンズからチーム A\n        にスローインが与えられる。ショットクロックは 16 秒に訂正される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-32", "body": "44-32   例：チーム A はフロントコートでスローインを与えられた。ショットクロックは 14 秒に設 定 さ れ る べき\n        ところ、誤って 24 秒に設 定 さ れ た 。A1 がコート上でボールをキャッチし、フロントコートで 10 秒間\n        ドリブルをした。この誤りが\n        ⒜審判がゲームを止めたときに認識された。\n        ⒝B3 がボールをアウトオブバウンズに弾き出して、ゲームが止められたときに認識された。\n        解説：どちらの場合においても、ゲームが止 め ら れ た 場 所 に最も近いアウトオブバウンズからチー\n        ム A にスローインが与えられる。ショットクロックは 4 秒に訂正される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-33", "body": "44-33   例：チーム A はバックコートでスローインを与えられた。ショットクロックは 24 秒に設 定 さ れ る べ き\n        ところ、誤って 14 秒に設定された。A1 がコート上でボールをキャッチし、フロントコートへド リ ブ ル を\n        した。この誤りがその 8 秒後の\n        ⒜審判がゲームを止めたときに認識された。\n        ⒝B1 がボールをアウトオブバウンズに弾き出して、ゲームが止められたときに認識された。\n        解説：どちらの場合においても、ゲームが止められた場所に最も近いアウトオブバウンズからチーム A\n        にスローインが与えられる。ショットクロックは 16 秒に訂正される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-34", "body": "44-34   例：チーム A はバックコートでスローインを与えられた。ショットクロックは 24 秒に設 定 さ れ る べ き\n        ところ、誤って 14 秒に設定された。A1 がコート上でボールをキャッチし、フロントコートへド リ ブ ル を\n        して、ショットをした。ボールが空中にある間にショットクロックのブザーが鳴った。ボールは\n        ⒜リングに触れず、すぐに A2 がリバウンドのボールを取った。審判はショットクロックバイオレーションの\n         ためゲームを止めた。\n        ⒝リングに触れず、すぐに B2 がリバウンドのボールを取った。審判はショットクロックバイオレーションの\n         ためゲームを止めた。\n        テーブルオフィシャルズはショットクロックが誤って設定されたことを認識した。\n        解説：\n        どちらの場合においても、ショットクロックのバイオレーションはなかったものとする。\n        ⒜では、ゲームが止められた場所に最も近いアウトオブバウンズからスローインがチーム A に与えら\n         れ、ショットクロックは 10 秒となる。\n        ⒝では、チーム B が新たなボールのポ ゼ ッ シ ョ ン を得ているため、ゲームが止められた場所に最も\n         近いアウトオブバウンズからスローインがチーム B に与えられ、ショットクロックは 24 秒となる。"}, {"type": "impl", "art_no": "B－スコアシート－ディスクォリファイングファウル", "art_title": "B－スコアシート－ディスクォリファイングファウル", "sec_no": "44-35", "body": "44-35   例： チーム A はバックコートでスローインを与えられた。ショットクロックは 24 秒に設 定 さ れ る べ き\n        ところ、誤って 14 秒に設 定 さ れ た 。A1 がコート上でボールをキャッチし、フロントコートへドリブルを\n        して、ショットをした。\n        ⒜A1 のショットは成功せず、B2 がボールのコントロールを得てドリブルを始めた。\n        ⒝A1 のショットは成功した。\n        審判は誤りを認識し、ショットクロックを訂正するためにゲームを止めた。\n        解説：どちらの場合においても、誤りのあと、\n        ⒜ライブのボールのコントロールが変わっているため\n        ⒝同じチームが得点をしたため\n        この誤りは訂正できない。\n\n別添資料 B－スコアシート－ディスクォリファイングファウル\n――――――――――――――――――――――――――――――――――――――――――\nB-１ 様々な人物のディスクォリファイングファウルの例：\n\nB-２ ヘッドコーチ自身のスポーツマンらしくない振る舞い、もしくはその他の理由によるテクニカルファウル\n   と、抗争の最中にチームベンチエリアを離れたチーム関係者の失格・退場の組み合わせの例：\n\n\n\n\nB-３ プレーヤー兼ヘッドコーチにそれぞれプレーヤーとして、ヘッドコーチとして 記録されるファウルの例：\n\n別添資料 F－インスタントリプレーシステム（IRS）\n――――――――――――――――――――――――――――――――――――――――――\nF-１ 定義\n\nF-1.１   条文：ゲームの前にクルーチーフは IRS 機器を承認し、その可用性を両チームのヘッドコーチに\n        知らせる。クルーチーフによって承認された IRS 機器のみがレビューに使用することができる。\n\nF-1.２   例：A1 がショットを成功させたとき、ゲームの終了を知らせるゲームクロックのブザーが鳴った。承認\n        された IRS 機器はなかったが、チーム B のマネージャーが高い位置からチームのビデオカメラでゲー\n        ムを撮影しており、レビューのために審判にビデオ素材を提出すると申し出た。\n        解説：レビューのためにチームのビデオを使用するというチーム B のマネージャーの申し出は認められ\n        ない。\n\n\nF-２ 基本原則\n\nF-2.１   条文：IRS レビューがクォーターやオーバータイムの終わりに行 わ れ る 場合、審判は両チームを\n        コートにとどめておく。クォーター間やオーバータイム開始前のプレーのインターバルは審判が最終\n        的な判定を示した後に始まる。\n\nF-2.２   例：A１がショットを成功させた。ほとんど同時にクォーターの終了を知らせるゲームクロックのブザー\n        が鳴った。審判はショットが競技時間の間に放たれたかどうかに確証がなくレビューを行うことを決め\n        た。両チームは自チームのチームベンチに移動している。\n        解説：審判は両チームをコートにとどめておく。インターバルは審判が最終的な判定を示した後で\n        始まる。\n\nF-2.３   条文：IRS レビューはその状況が起きたあと、最初のレビュー可能な機会に審判によって行われ\n        る。この機会は、ゲームクロックが止められて、ボールがデッドとなったときであるが、ゲームクロックが\n        動いている状態でのゴールが成功した後で審判がゲームを止めなかった場合、どちらのチームも不\n        利にならない状況で審判が最初にゲームを止めたときも含まれる。\n\nF-2.４   例：A１がスリーポイントゴールのショットを成功させた。B1 がすぐにスローインをし、チーム B は速\n        攻を始めた。審判は A１のショットがスリーポイントゴールエリアから放たれたかどうかに確証がなく、\n        IRS レビューを行うことを決めた。\n        解説：レビューのためにゲームが止められる最初の機会はゴールの後でボールがデッドとなったときで\n        ある。ゲーム中、審判がレビューのためにゲームを止める十分な時間がないことがある。今回のケー\n        スでは、審判はチーム B が不利にならないよう、速攻が終ったらすぐにゲームを止めるか、ゴールのあ\n        と、最初にゲームが止められたときにレビューを行う。\n\nF-2.５   条文：IRS レビューが終わり、審判が最終的な判定を示した後、タイムアウトや交代の申し出は\n        取り消すことができる。\n\nF-2.６   例：A１がゲームクロックが動いていて、ボールがライブの状態でショットを成功させた。チーム B のヘ\n        ッドコーチがタイムアウトを請求した。審判は A１のショットがスリーポイントゴールエリアから放たれた\n        かどうかに確証がなく、レビューを行うことを決めた。レビューの間にチーム B のヘッドコーチはタイムア\n        ウトの請求を取り消したいと考えた。\n        解説：チーム B のタイムアウトは、審判が IRS を使った最終的な判定を示すまで始まらない。レビ\n        ューの間、審判が IRS を使った最終的な判定を示し、タイムアウトを開始する準備が整うまで、タ\n        イムアウトの請求をいつでも取り下げることができる。\n\nF-2.７   例：B１はアンスポーツマンライクファウルを宣せられた。チーム B のヘッドコーチはタイムアウトを申\n        請した。審判は B１のファウルがアンスポーツマンライクファウルであったかどうかに確証がなかった。B\n        ６は B１との交代を申し出た。レビューの間に B６はチームベンチに戻った。\n        解説：B6 の交代や、チーム B のヘッドコーチのタイムアウトの申請は、審判が IRS の最終的な判\n        定を示すまで認められない。レビューの間、審判が IRS の最終的な判定を示し、タイムアウトが認\n        められるまでは、交代の申し出をいつでも取り下げることができる。\n\n\nF-3.１ クォーターや各オーバータイムの終わりでレビューを行うことができるもの\n\nF-3.1.1 例：A１がショットを成功させたとき、クォーターの終了を知らせるゲームクロックのブザーが鳴った。\n        審判は A１のショットが競技時間が終了する前に放たれたかどうかに確証がなかった。\n        解説：クォーターの終わりでは、A１の成功したショットのボールがクォーターの終了を知らせるゲー\n        ムクロックのブザーが鳴る前に放たれたかどうかを判定するために IRS レビューを行うことができる。\n        レビューで、ボールがクォーターの競技時間が終了する前に放たれていた場合、クルーチーフは A1\n        のゴールを認める。\n        レビューで、ボールがクォーターの競技時間が終了した後に放たれていた場合、A１のゴールは取り\n        消される。\n\nF-3.1.2 例：チーム B は 2 点リードしている。最初のオーバータイムの終了を知らせるゲームクロックのブザー\n        が鳴ったとき、B1 が A1 にファウルをし、第 4 クォーターの 5 個目のチームファウルであった。審判は\n        B1 のファウルが最初のオーバータイムが終了する前に起きたかどうかに確証がなかった。\n        解説：各オーバータイムの終わりでは、B1 のファウルが最初のオーバータイムの終了を知らせるゲー\n        ムクロックのブザーが鳴る前に起きたかどうかを判定するために IRS レビューを行うことができる。\n        レビューで、B1 のファウルがゲームクロックのブザーが鳴る前に起きていた場合、2 本のフリースローが\n        A1 に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。ゲームクロックはフ\n        ァウルが起きたときに表示されていた残り時間となる。\n        レビューで、B1 のファウルがゲームクロックのブザーが鳴った後に起きていた場合、B1 のファウルはな\n        かったものとする。著しくスポーツマンらしくない行為については、大会主催者に対してのみ報告される。\n\nF-3.1.3 例：2 度目のオーバータイムの終了を知らせるゲームクロックのブザーが鳴ったとき、B1 は A1 にファ\n        ウルをし、ツーポイントゴールのショットは成功しなかった。\n        解説：2 度目のオーバータイムの終わりでは、B1 のファウルが 2 度目のオーバータイムの終了を知\n\nらせるゲームクロックのブザーが鳴る前に起きたかどうかを判定するために IRS レビューを行うことがで\n     きる。\n     レビューで、B1 のファウルがゲームクロックのブザーが鳴る前に起きていた場合、2 本のフリースローが\n     A1 に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。ゲームクロックはフ\n     ァウルが起きたときに表示されていた残り時間となる。\n     レビューで、B1 のファウルがゲームクロックのブザーが鳴った後に起きていた場合、B1 のファウルがア\n     ンスポーツマンライクファウルもしくはディスクォリファイングファウルの判定基準に合致するもので、続い\n     て 3 度目のオーバータイムが行われる場合を除いて、B1 のファウルはなかったものとする。\n\nF-3.1.4 例：A1 がスリーポイントゴールのショットを成功させたとき、クォーターの終了を知らせるゲームクロッ\n     クのブザーが鳴った。審判は A1 がショットで境界線に触れたかどうかに確証がなかった。\n     解説：クォーターの終わりでは、A1 の成功したショットのボールがクォーターの終了を知らせるゲーム\n     クロックのブザーが鳴る前に放たれたかどうかを判定するために IRS レビューを行うことができる。ボー\n     ルが放たれていた場合、更にシューターのアウトオブバウンズのバイオレーションが起きたかどうかを判\n     定するためにレビューを行うことができ、アウトオブバウンズのバイオレーションが起きていた場合、ゲー\n     ムクロックに表示される時間を確認するためにレビューを行うことができる。\n\nF-3.1.5 例：A１がツーポイントゴールのショットを成功させたとき、クォーターの終了を知らせるゲームクロック\n     のブザーが鳴った。審判はチーム A のショットクロックのバイオレーションが起きたかどうかに確証がなか\n     った。\n     解説：クォーターの終わりでは、A1 の成功したショットのボールがクォーターの終了を知らせるゲーム\n     クロックのブザーが鳴る前に放たれたかどうかを判定するために IRS レビューを行うことができる。ボー\n     ルが放たれていた場合、更にチーム A のショットクロックのバイオレーションが起きたかどうかを判定す\n     るためにレビューを行うことができる。\n     レビューで、A1 の成功したショットが、クォーターの終了を知らせるゲームクロックのブザーが鳴る 0.4\n     秒前に放たれており、更にそのショットが放たれる 0.2 秒前にショットクロックのブザーが鳴っていたと\n     き、A1 のゴールは認められない。ゲームはショットクロックのバイオレーションが起きた場所に最も近い\n     アウトオブバウンズからチーム B のスローインで再開される。ゲームクロックは 0.6 秒となり、ショットク\n     ロックは消灯される。\n\nF-3.1.6 例：A1 がショットを成功させたとき、第 2 クォーターの終了を知らせるゲームクロックのブザーが鳴っ\n     た。審判は A1 のショットのボールがクォーターの終了を知らせるゲームクロックのブザーが鳴る前に放\n     たれたかどうか確証がなく、また放たれていた場合チーム A の 8 秒のバイオレーションが起きたかどう\n     かについても確証がなかった。\n     解説：クォーターの終わりでは、A1 の成功したショットのボールがクォーターの終了を知らせるゲーム\n     クロックのブザーが鳴る前に放たれたかどうかを判定するために IRS レビューを行うことができる。ボー\n     ルが放たれていた場合、更にチーム A の 8 秒のバイオレーションが起きたどうかを判定するためにレ\n     ビューを行うことができる。\n     レビューで、A1 の成功したショットが、クォーターの終了を知らせるゲームクロックのブザーが鳴る前に\n     放たれており、更にそのショットが放たれる前、ゲームクロックに 3.4 秒が表示されているときに、チー\n\nム A が 8 秒のバイオレーションをしていたことが確認できた場合、A1 のゴールは認められない。ゲー\n     ムは 8 秒のバイオレーションが起きた場所に最も近いアウトオブバウンズからチーム B のスローインで\n     再開される。ゲームクロックは 3.4 秒となり、ショットクロックは消灯される。\n\n     レビューで、チーム A が 8 秒のバイオレーションをしていなかった場合、A1 のゴールは認められる。第\n     2 クォーターは終了となる。後半はセンターラインの延長線上のアウトオブバウンズからオルタネイティ\n     ングポゼッションのスローインで開始される。\n\nF-3.1.7 例：ゲームクロック残り 2.5 秒で、A1 がショットをした。ボールがリングに触れ、B1 がリバウンドのボ\n     ールを取り、ドリブルを始めた。このとき、ゲームの終了を知らせるゲームクロックのブザーが鳴った。審\n     判は B1 がボールを持ってコート上に着地したとき、アウトオブバウンズに踏み出たかどうかに確証が\n     なかった。\n     解説：ショットをしていないプレーヤーのアウトオブバウンズのバイオレーションが起きたかどうかを判定\n     するために IRS レビューを行うことはできない。\n\n\nF-3.２ 第 4 クォーターや各オーバータイムでゲームクロックに２:00 あるいはそれ以下が表示されてい\n     るときにレビューを行うことができるもの\n\nF-3.2.1 例：第 4 クォーター残り 1:41 で、A１がショットをしたとき、ショットクロックのブザーが鳴った。ショッ\n     トはゴールに入った。審判は、次のときにボールがショットクロックのブザーが鳴る前に放たれたかどうか\n     に確証がなかった。\n     ⒜ゴールのあと、チーム B のスローインでボールがライブとなる前。\n     ⒝ゴールのあと、チーム B のスローインでボールがライブとなり、審判がいずれかの理由により最初に\n       ゲームを止めたとき。\n     ⒞審判が最初にゲームを止めた後でボールがライブとなったあと。\n     ボールがショットクロックのブザーが鳴る前に放たれたかどうかに確証がなかった。\n     解説：第 4 クォーターでゲームクロックに２:00 あるいはそれ以下が表示されているときには A１の\n     成功したショットのボールがショットクロックのブザーが鳴る前に放たれたかどうかを判定するために\n     IRS レビューを行うことができる。\n     審判はボールがバスケットに入り、ゲームクロックが止められたときに、成功したゴールがショットクロッ\n     クのブザーが鳴る前に放たれていたかどうかをレビューするために速やかにゲームを止めることができる。\n     レビューは審判が最初にゲームを止めた後でボールがライブになるまで行うことができる。\n     ⒜では、審判は速やかにゲームを止め、ゲームを再開する前にレビューを行う。\n     ⒝では、審判はレビューされる状況が起きたあと、いずれかの理由によりゲームを止めたときにレビュ\n       ーを行う。\n     ⒞では、最初に審判がゲームを止めた後でボールがライブとなったとき、レビューを行うことができる制\n       限時間が終わっている。最初の判定がそのまま有効となる。\n     ⒜と⒝では、レビューでショットクロックのブザーが鳴ったとき、ボールがまだ A1 の手の中にあった場合、\n       チーム A のショットクロックのバイオレーションとなる。A1 のゴールは認められない。\n\n⒜では、ゲームはフリースローラインの延長線上のアウトオブバウンズからチーム B のスローインで再\n       開される。\n     ⒝では、ゲームは止められたときにボールがあった場所に最も近いアウトオブバウンズから、ボールをコ\n       ントロールしていた、あるいはボールを与えられることになっていたチームのスローインで再開される\n       か、もしくはフリースローが与えられていた場合にはフリースローで再開される。\n     ⒜と⒝では、レビューでボールがショットクロックのブザーが鳴る前に A1 の手を離れていた場合、チー\n       ム A のショットクロックのバイオレーションではない。ショットクロックのブザーはなかったものとし、A1\n       のゴールは認められる。\n     ⒜では、ゲームは通常のゲームクロックが動いていて、ボールがライブの状態でのゴールが成功した\n       後と同様にエンドラインのアウトオブバウンズからチーム B のスローインで再開される。\n     ⒝では、ゲームは止められたときにボールがあった場所に最も近いアウトオブバウンズから、ボールをコ\n       ントロールしていた、あるいはボールを与えられることになっていたチームのスローインで再開される\n       か、もしくはフリースローが与えられていた場合にはフリースローで再開される。\n\nF-3.2.2 例：第 4 クォーター残り 1:39 で、A1 がショットの動作（アクトオブシューティング）中のとき、ショ\n     ットから離れた場所でファウルが起きた。\n     ⒜B2 は A2 にパーソナルファウルをして、このクォーター3 個目のチームファウルであった。\n     ⒝B2 は A2 にパーソナルファウルをして、このクォーター5 個目のチームファウルであった。\n     ⒞A2 は B2 にパーソナルファウルをした\n     解説：第 4 クォーターでゲームクロックに 2:00 あるいはそれ以下が表示されているときには、次の\n       ことを判定するために IRS レビューを使うことができる。\n     (i)シューターの相手チームのプレーヤーがファウルを宣せられたとき、ショットの動作（アクトオブシュ\n       ーティング）が始まっていたかどうか。\n     (ii)シューターのチームメイトがファウルを宣せられたとき、ボールがまだシューターの手の中にあったか\n       どうか。\n\n     ⒜では、レビューで A1 はショットの動作（アクトオブシューティング）中ではなかった場合、B2 のフ\n       ァウルが起きたときにボールはデッドとなり、成功しても A1 のゴールは認められない。A1 がショット\n       の動作（アクトオブシューティング）中であった場合、成功すれば A1 のゴールは認められる。ど\n       ちらの場合においても、ゲームは B2 のファウルが起きた場所に最も近いアウトオブバウンズからチ\n       ーム A のスローインで再開される。\n     ⒝では、レビューで A1 はショットの動作（アクトオブシューティング）中ではなかった場合、B2 のフ\n       ァウルが起きたときにボールはデッドとなり、成功しても A1 のゴールは認められない。A1 がショット\n       の動作（アクトオブシューティング）中であった場合、成功すれば A1 のゴールは認められる。ど\n       ちらの場合においても、B2 のファウルの罰則として 2 本のフリースローが A2 に与えられる。ゲーム\n       は通常の最後のフリースローの後と同様に再開される。\n     ⒞では、レビューでボールがシューターの手を離れていた場合、成功すればゴールは認められる。ゲ\n       ームは A2 のファウルが起きた場所に最も近いアウトオブバウンズからチーム B のスローインで再開\n       される。レビューでボールがまだシューターの手の中にあった場合、A2 のファウルが起きたときにボ\n\nールはデッドとなり、成功しても A1 のゴールは認められない。ゲームはフリースローラインの延長線\n       上のアウトオブバウンズからチーム B のスローインで再開される。\n\nF-3.2.3 例：第 4 クォーター残り 1:37 で、ショットクロックのブザーが鳴った。ほとんど同時に A１がフロント\n     コートから得点し、ボールから離れたチーム A のフロントコートで A２が B２にファウルをし、このクォ\n     ーター3 個目のチームファウルであった。審判はショットクロックのブザーが鳴ったとき、また A２のファウ\n     ルが起きたときに、ボールが A１の手の中にあったかどうかに確証がなかった。\n      解説：第 4 クォーターでゲームクロックに２:00 あるいはそれ以下が表示されているときには、ショッ\n      トクロックのブザーが鳴ったとき、またショットから離れた場所でファウルが起きたとき、ボールがシュータ\n      ーの手の中にあったかどうかを判定するために IRS レビューを行うことができる。\n     ⒜レビューで、ボールがショットクロックのブザーが鳴る前、かつ A2 のファウルが起きる前に A1 の手を\n       離れていた場合、A2 はファウルを宣せられ、A1 のゴールは認められる。ショットクロックのブザーは\n       なかったものとする。\n     ⒝レビューで、A2 のファウルがボールが A１の手を離れる前、かつショットクロックのブザーが鳴る前に\n       起きていた場合、A２はファウルを宣せられ、A１のゴールは認められない。ショットクロックのブザ\n       ーはなかったものとする。\n     ⒞レビューで、ショットクロックのブザーが、ボールが A1 の手を離れる前、かつ A2 のファウルが起きる\n       前に鳴っていた場合、チーム A のショットクロックのバイオレーションである。A１のゴールは認めら\n       れない。A２のファウルはアンスポーツマンライクファウルもしくはディスクォリファイングファウルの判定\n       基準に合致するものでない限り、なかったものとする。\n     ⒜では、ゲームは A2 のファウルが起きた場所に最も近いアウトオブバウンズからチーム B のスローイ\n       ンで再開する。\n     ⒝と⒞では、ゲームはバックコートのフリースローラインの延長線上からチーム B のスローインで再開さ\n       れる。\n\nF-3.2.4 例：第 4 クォーター残り 1:3４で、ショットクロックのブザーが鳴った。ほとんど同時に A１がフロント\n     コートから得点し、ボールから離れたチーム A のフロントコートで B２が A２にファウルをし、このクォ\n     ーター3 個目のチームファウルであった。審判はショットクロックのブザーが鳴ったとき、また B２のファウ\n     ルが起きたときに、ボールが A１の手の中にあったかどうかに確証がなかった。\n     解説：第 4 クォーターでゲームクロックに２:00 あるいはそれ以下が表示されているときには、ショッ\n     トクロックのブザーが鳴ったとき、またショットから離れた場所でファウルが起きたとき、ボールがシュータ\n     ーの手の中にあったかどうかを判定するために IRS レビューを行うことができる。\n     レビューで、B２のファウルがショットクロックのブザーが鳴る前、かつ A１のショットの動作（アクトオブ\n     シューティング）中に起きていた場合、B2 はファウルを宣せられ、A1 のゴールは認められる。ショット\n     クロックのブザーはなかったものとする。ゲームはフロントコートの B２のファウルが起きた場所に最も\n     近いアウトオブバウンズからチーム A のスローインで再開される。ゲームクロックには残り時間を表示\n     し、ショットクロックは 14 秒となる。\n     レビューで、ボールがまだ A1 の手の中にあり、かつ B2 のファウルが起きる前にショットクロックのブザ\n     ーが鳴っていた場合、チーム A のショットクロックのバイオレーションである。B２のファウルはアンスポー\n\nツマンライクファウルもしくはディスクォリファイングファウルの判定基準に合致するものでない限りなかっ\n      たものとし、A1 のゴールは認められない。ゲームはバックコートのフリースローラインの延長線上のアウ\n      トオブバウンズからチーム B のスローインで再開される。\n\nF-3.2.5 例：第 4 クォーター残り 1:39 で、B1 はショットの動作（アクトオブシューティング）中の A1 にファ\n      ウルをした。ほとんど同時にショットから離れた場所で B2 が A2 にファウルをし、このクォーター3 個目\n      のチームファウルであった。\n      解説：第 4 クォーターでゲームクロックに 2:00 あるいはそれ以下が表示されているときには、B1 の\n      ファウルが起きたとき、また B2 のファウルがショットから離れた場所で起きたとき、ショットの動作（ア\n      クトオブシューティング）が始まっていたかどうかを判定するために IRS レビューを行うことができる。\n      レビューで、B1 のファウルが最初に起きていて、B2 のファウルが起きたときに A1 がショットの動作\n      （アクトオブシューティング）中でなかった場合、B1 のファウルが起きたときにボールはデッドとなり、\n      成功しても A1 のゴールは認められない。ゲームは B1 のファウルが起きた場所に最も近いアウトオ\n      ブバウンズからチーム A のスローインで再開される。B2 のファウルはボールがデッドになった後で起き\n      ているため、アンスポーツマンライクファウルもしくはディスクォリファイングファウルの判定基準に合致す\n      るものでない限り、なかったものとする。\n      レビューで、B1 のファウルが最初に起きていて、B1 のファウルが起きたときに A1 がショットの動作\n      （アクトオブシューティング）中であった場合、成功すれば A1 のゴールは認められる。1 本のフリー\n      スローが A1 に与えられる。A1 のゴールが成功しなかった場合、2 本または 3 本のフリースローが\n      A1 に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。B2 のファウルはボ\n      ールがデッドになった後で起きているため、アンスポーツマンライクファウルもしくはディスクォリファイング\n      ファウルの判定基準に合致するものでない限り、なかったものとする。\n      レビューで、B2 のファウルが最初に起きていて、B2 のファウルが起きたときに A1 がショットの動作\n      （アクトオブシューティング）中であった場合、成功すれば A1 のゴールは認められる。B2 のファウル\n      がチーム B のこのクォーター3 個目のチームファウルであった場合、ゲームは B2 のファウルが起きた\n      場所に最も近いアウトオブバウンズからチーム A のスローインで再開される。B2 のファウルがチーム B\n      のこのクォーター5 個目のチームファウルであった場合、2 本のフリースローが A2 に与えられる。ゲー\n      ムは通常の最後のフリースローの後と同様に再開される。B1 のファウルはボールがデッドになった後\n      で起きているため、アンスポーツマンライクファウルもしくはディスクォリファイングファウルの判定基準に\n      合致するものでない限り、なかったものとする。\n\nF-3.2.6 例：第 4 クォーター残り 7.5 秒で、フロントコートでスローインを行う A１がボールを手放す直前\n      に、B１がテクニカルファウルを宣せられた。ほとんど同時に B２が他の審判から A２に対するアンス\n      ポーツマンライクファウルを宣せられた。審判はどの順序でファウルが起きたかに確証がなかった。\n      解説：ファウルが起きた順序を判定するために IRS レビューを行うことはできない。両方のファウル\n      は有効なままとなり、テクニカルファウルの罰則が先に行われる。誰もリバウンドの位置に着かずに 1\n      本のフリースローがチーム A のいずれかのプレーヤーに与えられる。そのあと、2 本のフリースローが A\n      ２に与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチーム\n      A のスローインで再開される。\n\nF-3.2.7 条文：第 4 クォーターでゲームクロックに 2:00 あるいはそれ以下が表示されているときには、ゴー\n      ルテンディングもしくはインタフェアレンスのバイオレーションが正しく宣せられたかどうかを判定するた\n      めに IRS レビューを行うことができる。レビューで、ゴールテンディングもしくはインタフェアレンスのバイ\n      オレーションが誤って宣せられていた場合、ゲームは以下のとおり再開される。バイオレーションが宣\n      せられたあと、\n      ・ボールが正当にバスケットに入っていた場合、ゴールは認められ、ゲームはエンドラインのアウトオ\n       ブバウンズから新たなオフェンスのチームのスローインで再開される。\n      ・どちらかのチームのプレーヤーが速やかかつ明らかなボールのコントロールを得ていた場合、ゲーム\n       はバイオレーションが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからその\n       チームのスローインで再開される。\n      ・どちらのチームのプレーヤーも速やかかつ明らかなボールのコントロールを得ていなかった場合、ジ\n       ャンプボールシチュエーションとなる。\n      バイオレーションが宣せられたあと、プレーヤーがコート上で直接ボールの権利を得たとき、速やか\n      かつ明らかなボールのコントロールとみなす。\n      速やかかつ明らかなボールのコントロールは笛が鳴ったあとの最初のアクションでなければならな\n      い。ボールのポゼッションを得るための不当な触れ合いが起きたり、複数のプレーヤーがボールに触\n      れたりした場合は速やかかつ明らかなボールのコントロールとはみなさない。\n      どちらのチームのプレーヤーもボールのコントロールを得ないままボールがアウトオブバウンズに出たと\n      き、ボールをアウトオブバウンズに出したチームの相手チームが速やかかつ明らかなボールのコントロ\n      ールを得ているとみなす。\n\nF-3.2.8 例：第 4 クォーター残り 1:33 で、B1 のゴールテンディングのバイオレーションが宣せられた。審判\n     はボールがすでにバスケットに向かって下降していたかどうかに確証がなかった。ボールはバスケットに\n     入らなかった。\n     解説：第 4 クォーターでゲームクロックに２:00 あるいはそれ以下が表示されているときには、ゴー\n     ルテンディングのバイオレーションが正しく宣せられたかどうかを判定するために IRS レビューを行うこと\n     ができる。\n     レビューで、ボールがバスケットに向かって下降していた場合、ゴールテンディングのバイオレーションは\n     有効なままとなる。\n     レビューで、ボールがまだバスケットに向かって下降していなかった場合、ゴールテンディングのバイオレ\n     ーションは取り下げられる。ボールはバスケットに入らなかったため、\n     ・ゲームはバイオレーションが宣せられたときにボールがあった場所に最も近いアウトオブバウンズから、\n       速やかかつ明らかなボールのコントロールを得ていたチームのスローインで再開される。\n     ・どちらのチームのプレーヤーも速やかかつ明らかなボールのコントロールを得ていなかった場合、ジャ\n       ンプボールシチュエーションとなる。\n     スローインがチーム A に与えられる場合、ショットクロックはバイオレーションが宣せられたときに表示さ\n     れていた秒数が表示される。\n     スローインがチーム B に与えられる場合、バックコートからのスローインではショットクロックは 24 秒と\n     なり、フロントコートからのスローインではショットクロックは 14 秒となる。\n\nF-3.2.9 例：第 4 クォーター残り 1:27 で、B1 のインタフェアレンスのバイオレーションが宣せられた。ボール\n      はバスケットに入った。\n      解説：ボールはバスケットに入っていることから、インタフェアレンスのバイオレーションの判定をレビュ\n      ーする必要はなく、ゴールは認められる。ゲームはエンドラインのアウトオブバウンズからチーム B のス\n      ローインで再開される。ショットクロックは 24 秒となる。\n\nF-3.2.10 例：第 4 クォーター残り 1:23 で、B1 または A1 のゴールテンディングのバイオレーションが宣せら\n      れた。そのあと、更なるインタフェアレンスのバイオレーションが\n      ⒜B２\n      ⒝A２\n      に宣せられ、ボールはバスケットに入った。\n      解説：IRS レビューで、B1 または A1 のゴールテンディングのバイオレーションは起きておらず、更\n      にレビューで、B2 または A2 のインタフェアレンスのバイオレーションは起きていた場合、インタフェア\n      レンスの罰則が行われる。\n      バイオレーションが\n      ⒜B２に宣せられた場合、ゴールは認められる。ゲームはエンドラインのアウトオブバウンズからチー\n        ム B のスローインで再開される。ショットクロックは 24 秒となる。\n      ⒝A２に宣せられた場合、ゴールは認められない。ゲームはフリースローラインの延長線上のアウト\n        オブバウンズからチーム B のスローインで再開される。ショットクロックは 24 秒となる。\n\nF-3.2.11 例：第 4 クォーター残り 1:19 で、インタフェアレンスのバイオレーションが\n      ⒜B１\n      ⒝A１\n      に宣せられた。ボールはバスケットに入らなかった、またはリングに触れなかった。いずれかのチームの\n      プレーヤーが速やかかつ明らかなボールのコントロールを得た。\n      解説：IRS レビューで、インタフェアレンスのバイオレーションは起きていなかった場合、どちらの場合\n      においても、ゲームはバイオレーションが宣せられたときにボールがあった場所に最も近いアウトオブ\n      バウンズから、速やかかつ明らかなボールのコントロールを得ていたチームのスローインで再開される。\n      スローインがチーム A に与えられる場合、ショットクロックはバイオレーションが宣せられたときに表示\n      されていた秒数が表示される。\n      スローインがチーム B に与えられる場合、ショットクロックは 24 秒となる。\n\nF-3.2.12 例：第 4 クォーター残り 1:15 で、ゴールテンディングのバイオレーションが\n       ⒜B１\n       ⒝A１\n       に宣せられた。ボールはバスケットに入らなかったが、リングに触れた。いずれかのチームのプレーヤ\n       ーが速やかかつ明らかなボールのコントロールを得た。\n       解説：IRS レビューで、ゴールテンディングのバイオレーションは起きていなかった場合、どちらの場\n       合においても、ゲームはバイオレーションが宣せられたときにボールがあった場所に最も近いアウトオ\n       ブバウンズから、速やかかつ明らかなボールのコントロールを得ていたチームのスローインで再開される。\n\nスローインがチーム A に与えられる場合、ショットクロックは 14 秒となる。\n       スローインがチーム B に与えられる場合、ショットクロックは 24 秒となる。\n\nF-3.2.13 例：第 4 クォーター残り 1:11 で、インタフェアレンスのバイオレーションが\n      ⒜B１\n      ⒝A１\n      に宣せられた。ボールはバスケットに入らず、どちらのチームのプレーヤーもボールのコントロールを得\n      ないまま直接アウトオブバウンズに出た。\n      解説：IRS レビューで、インタフェアレンスのバイオレーションは起きていなかった場合、どちらの場合\n      においても、スローインがボールをアウトオブバウンズに出したチームの相手チームに与えられる。\n      スローインがチーム A に与えられる場合、ショットクロックはバイオレーションが宣せられたときに表示\n      されていた秒数が表示される。\n      スローインがチーム B に与えられる場合、ショットクロックは 24 秒となる。\n\nF-3.2.14 例：第 4 クォーター残り 1:07 で、ゴールテンディングのバイオレーションが\n      ⒜B１\n      ⒝A１\n      に宣せられた。ボールはバスケットに入らなかった、またはリングに触れなかった。バイオレーションが\n      宣せられたあと、ボールは A2、B2、B3 によって弾かれ、最終的に A4 にキャッチされた。\n      解説：IRS レビューで、ゴールテンディングのバイオレーションは起きていなかった場合、どちらの場\n      合においても、どちらのチームも速やかかつ明らかなボールのコントロールを得ていない。ジャンプボ\n      ールシチュエーションとなる。\n      スローインがチーム A に与えられる場合、ショットクロックはバイオレーションが宣せられたときに表示\n      されていた秒数が表示される。\n      スローインがチーム B に与えられる場合、バックコートからのスローインではショットクロックは 24 秒と\n      なり、フロントコートからのスローインではショットクロックは 14 秒となる。\n\nF-3.2.15 例：第 4 クォーター残り 1:03 で、インタフェアレンスのバイオレーションが\n       ⒜B１\n       ⒝A１\n       に宣せられた。ボールはバスケットに入らなかった、またはリングに触れなかった。いずれのチームのプ\n       レーヤーも速やかかつ明らかなボールのコントロールを得る前に、リバウンドの間に B2 または A2 に\n       ファウルが宣せられた。\n       解説：IRS レビューで、インタフェアレンスのバイオレーションは起きていなかった場合、どちらの場\n       合においても、B2 または A2 のファウルが罰せられる。\n\nF-3.2.16 例：第 4 クォーター残り 1:03 で、ゴールテンディングのバイオレーションが\n      ⒜B１\n      ⒝A１\n      に宣せられた。ボールはバスケットに入らなかった、またはリングに触れなかった。いずれのチームのプ\n\nレーヤーも速やかかつ明らかなボールのコントロールを得る前に、リバウンドの間に B2 または A2 に\n      ファウルが宣せられた。\n      解説：IRS レビューで、ゴールテンディングのバイオレーションが起きていた場合、どちらの場合にお\n      いても、B2 または A2 のファウルはアンスポーツマンライクファウルもしくはディスクォリファイングファウ\n      ルの判定基準に合致するものでない限り、ボールがデッドになった後で起きているため、なかったも\n      のとする。\n      ⒜では、ゴールは認められる。ゲームは通常のゲームクロックが動いていて、ボールがライブの状態\n        でのゴールが成功した後と同様にエンドラインのアウトオブバウンズからチーム B のスローインで再\n       開される。\n      ⒝では、得点は認められず、ゲームはバックボードの真後ろを除いた A1 のバイオレーションが起き\n       た場所に最も近いアウトオブバウンズからチーム B のスローインで再開される。\n\nF-3.2.17 例：第 4 クォーター残り 38 秒で、A１がショットをした。ボールがリングより高い位置のバックボード\n      に触れたあと、B１がボールに触れた。審判は B１が正当にボールに触れたと判定し、ゴールテン\n      ディングのバイオレーションを宣さなかった。\n      解説：審判がゴールテンディングのバイオレーションを宣した場合のみ IRS レビューを行うことがで\n      きる。\n\nF-3.2.18 例：第 4 クォーター残り 36 秒で、B１がショットの動作（アクトオブシューティング）中の A１に\n      ファウルをした。ボールがリングより高い位置のバックボードに触れたあと、B２がボールに触れた。審\n      判はゴールテンディングのバイオレーションを宣さなかったが、B２が正当にボールに触れたかどうかに\n      確証がなかった。\n      解説：審判がゴールテンディングのバイオレーションを宣した場合のみ IRS レビューを行うことがで\n      きる。\n\nF-3.2.19 例：第 4 クォーター残り 28 秒で、B１がツーポイントゴールのショットの動作（アクトオブシューテ\n      ィング）中の A１にファウルをした。ボールがバスケットに向かう間に B２がボールに触れ、審判はゴ\n      ールテンディングのバイオレーションを宣した。ボールはバスケットに入らなかった。審判は B２が不\n      当にボールに触れたかどうかに確証がなかった。\n      解説：第 4 クォーターでゲームクロックに２:00 あるいはそれ以下が表示されているときには、B２\n      のゴールテンディングのバイオレーションが正しく宣せられたかどうかを判定するために IRS レビューを\n      行うことができる。\n      レビューで、B２がバスケットに向かって下降しているボールに触れていた場合、ゴールテンディング\n      のバイオレーションは有効なままとなる。2 点が A１に与えられる。更に 1 本のフリースローが A１\n      に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。\n      レビューで、B２が上昇しているボールに触れていた場合、ゴールテンディングのバイオレーションは\n      取り下げられる。2 本のフリースローが A１に与えられ、ゲームは通常の最後のフリースローの後と\n      同様に再開される。\n\nF-3.2.20 例：第 4 クォーター残り 1:37 で、ボールがアウトオブバウンズに出た。スローインがチーム A に与\n\nえられ、チーム A がタイムアウトを請求した。審判は誰がボールをアウトオブバウンズに出したかに確\n      証がなかった。\n      解説：第４クォーターでゲームクロックに２:00 あるいはそれ以下が表示されているときには、ボー\n      ルをアウトオブバウンズに出したプレーヤーを特定するためにレビューを行うことができる。タイムアウト\n      はレビューが終了し、審判が最終的な判定を示すまで開始しない。\n\nF-3.2.21 例：第 1 クォーター残り 5:53 で、サイドライン近くのコート上をボールが転がったとき、A１と B１\n      がボールのコントロールを得ようとして、ボールがアウトオブバウンズに出た。スローインがチーム A に\n      与えられたが、審判は誰がボールをアウトオブバウンズ出したかに確証がなかった。\n      解説：この時間帯では IRS レビューを行うことはできない。ボールをアウトオブバウンズに出したプ\n      レーヤーを特定するためにレビューを行うことができるのは、第 4 クォーターや各オーバータイムでゲ\n      ームクロックに２:00 あるいはそれ以下が表示されているときである。\n\nF-3.2.22 例：オーバータイム残り 1:45 で、A１がサイドライン近くで A２にボールをパスした。パスの間に B\n      １がボールをアウトオブバウンズに弾き出した。審判は A１が A２にボールをパスしたとき、すでにア\n      ウトオブバウンズにいたかどうかに確証がなかった。\n      解説：ショットしていないプレーヤーがアウトオブバウンズに出たかどうかを判定するために IRS レビ\n      ューを行うことはできない。\n\n\nF-3.３ ゲーム中のいかなる時間帯でもレビューを行うことができるもの\n\nF-3.3.1 例：B１がショットの動作（アクトオブシューティング）中の A１にファウルをした。ボールはバスケッ\n      トに入った。審判は\n     ⒜B1 のファウルが起きたとき、A1 がショットの動作（アクトオブシューティング）を始めていたかどうか\n     ⒝A1 の両足がフロアに着地する前に B1 のファウルが起きたかどうか\n      に確証がなかった。\n      解説：ゲーム中のいかなる時間帯でも、B1 の A1 に対するファウルがシューターに対するものであっ\n      たかどうかを判定するためにレビューを行うことはできない。\n\nF-3.3.2 例：第 2 クォーター残り 3:47 で、A1 はスリーポイントゴールのショットをし、成功した。\n      ⒜ショットが成功したあと、チーム B のスローインでボールがライブになる前に\n      ⒝ショットが成功し、チーム B のスローインでボールがライブになったあと、スローインがすぐに行なわれ\n       たことで審判が IRS レビューのためにゲームを止めることができなかったとき\n      ⒞ショットが成功し、チーム B のスローインのボールがライブになったあと、ゲームがチーム B のタイム\n       アウトのために止められたとき\n      審判はショットのボールがツーポイントゴールエリアとスリーポイントゴールエリアのどちらから放たれたか\n      に確証がなかった。\n      解説：ゲーム中のいかなる時間帯でも、A1 の成功したゴールで 2 点あるいは 3 点のどちらが認め\n      られるかを判定するためにレビューを行うことができる。レビューはゲームクロックが止められて、ボール\n      がデッドとなった最初の機会に行われる。しかしながら、審判はレビューのために速やかにゲームを止\n\nめることができる。審判は\n     ⒜ボールがライブとなる前にゲームを止めレビューを行う。\n     ⒝どちらのチームも不利にならない状況で、ゲームを速やかに止めてレビューを行う。レビューはゴー\n       ルのあと、審判がいずれかの理由により最初にゲームを止めたとき、再びボールがライブとなる前に\n       行われなければならない。これは第 4 クォーターあるいはオーバータイムの最後の 2 分間も有効\n       である。\n      ⒞タイムアウトが認められる前にレビューを行う。ボールがライブとなる前にゲームを止め、レビューを\n       行う。最終的な判定が示されたあと、ヘッドコーチからタイムアウトの取り下げ請求がない限りタイ\n       ムアウトを開始する。\n     全ての場合において、最終的な判定が示され、(c)ではタイムアウトの後で、ゲームは通常のゲーム\n     クロックが動いている状態でゴールが成功した後と同様にエンドラインからチーム B のスローインで再\n     開される。\n\nF-3.3.3 例：第 2 クォーター残り 3:44 で、A1 はスリーポイントゴールのショットをし、成功した。ゴールのあ\n     と、チーム B のスローインでボールがライブとなり、A2 がショットの動作（アクトオブシューティング）\n     中の B2 にファウルをして、審判がゲームを止めたとき、審判はショットのボールがツーポイントゴール\n     エリアとスリーポイントゴールエリアのどちらから放たれたかに確証がなかった。\n     解説：ゲーム中のいかなる時間帯でも、A1 の成功したゴールで 2 点あるいは 3 点のどちらが認め\n     られるかを判定するために IRS レビューを行うことができる。レビューはゲームクロックが止められて、ボ\n     ールがデッドとなった最初の機会に行われる。または、審判はレビューのために速やかにゲームを止め\n     ることもできる。\n     ゴールの後で最初にゲームが止められたため、審判は A2 のファウルでゲームを止めたときにレビュー\n     を行う。最終的な判定が示されたあと、ゲームは B2 のフリースローで再開される。\n\nF-3.3.4 例：第 2 クォーター残り 3:43 で、A1 はスリーポイントゴールのショットをし、成功した。ゴールのあ\n     と、チーム B のスローインでボールがライブとなり、A2 がショットの動作（アクトオブシューティング）\n     中の B2 にファウルをし、B2 の最初のフリースローでボールがライブとなったとき、審判はショットのボー\n     ルがツーポイントゴールエリアとスリーポイントゴールエリアのどちらから放たれたかに確証がなかった。\n     解説：B2 の最初のフリースローでボールがライブとなったとき、レビューを行うことができる制限時間\n     が終わっている。最初の判定がそのまま有効となる。\n\nF-3.3.5 例：B１がショットの動作（アクトオブシューティング）中の A１にファウルをし、ボールはバスケット\n     に入らなかった。3 本のフリースローが A１に与えられたが、審判は A１のショットがスリーポイントゴ\n     ールエリアから放たれたかどうかに確証がなかった。\n     解説：ゲーム中のいかなる時間帯でも、2 本あるいは 3 本のどちらのフリースローがシューターに与\n     えられるかを判定するために IRS レビューを行うことができる。レビューは最初のフリースローでボール\n     がライブとなる前に行われる。\n\nF-3.3.6 例：第 4 クォーター残り 40 秒で、スローインを行う A１がボールを持っている、あるいはボールを与\n     えられることになっているとき、コート上でアンスポーツマンライクファウルが B2 に宣せられた。審判は\n\nB2 の触れ合いがアンスポーツマンライクファウルの判定基準に合致しているかどうかに確証がなかった。\n     解説：ゲーム中のいかなる時間帯でも、B２のアンスポーツアマンライクファウルがパーソナルファウル\n     にダウングレードされるかどうかを判定するために IRS レビューを行うことができる。\n     レビューで、ファウルがアンスポーツマンライクファウルの判定基準に合致していた場合、B２のファウル\n     はアンスポーツマンライクファウルのままとなる。\n     レビューで、ファウルがアンスポーツマンライクファウルの判定基準に合致していなかった場合、B２の\n     ファウルはパーソナルファウルにダウングレードされ、スローインファウルが宣せられる。\n\nF-3.3.7 例：B１が A１に肘打ちをして、アンスポーツマンライクファウルを宣せられた。審判は B１の肘が\n     A1 に当たったかどうかに確証がなかった。\n     解説：ゲーム中のいかなる時間帯でも、パーソナルファウルやアンスポーツマンライクファウル、ディス\n     クォリファイングファウルがテクニカルファウルとみなされるかどうかを判定するために IRS レビューを行う\n     ことができる。\n     レビューで、振り回した B１の肘が A１に当たっていなかった場合、B１のファウルはテクニカルファウ\n     ルに変更される。\n\nF-3.3.8 例：B１はパーソナルファウルを宣せられた。審判はファウルがアンスポーツマンライクファウルにアップ\n     グレードされるかどうか、あるいは触れ合いが起きたかどうかに確証がなかった。\n     解説：ゲーム中のいかなる時間帯でも、パーソナルファウルがアンスポーツマンライクファウルにアップ\n     グレードされるかどうかを判定するために IRS レビューを行うことができる。しかしながら、レビューで、\n     触れ合いがなかった場合でもパーソナルファウルを取り消すことはできない。\n\nF-3.3.9 例：A１は速攻で相手チームのバスケットに向かってドリブルをし、A１とそのバスケットの間にディフ\n     ェンスのプレーヤーがいない状況であった。B１が腕を使ってボールに手を伸ばして A１に横から触\n     れ合いを起こした。B１はアンスポーツマンライクファウルを宣せられたが、審判は B１のアンスポーツ\n     マンライクファウルが正しく宣せられたかどうかに確証がなかった。\n     解説：ゲーム中のいかなる時間帯でも、アンスポーツマンライクファウルがパーソナルファウルにダウン\n     グレードされるかどうか、あるいはディスクォリファイングファウルにアップグレードされるかどうかを判定す\n     るために IRS レビューを行うことができる。しかしながら、レビューで、A１が B１の腕を叩いていて、\n     触れ合いの責任が A１にあった場合、B１のディフェンスのアンスポーツマンライクファウルをパーソナ\n     ルファウルにダウングレードすることができるが、B1 のディフェンスファウルを取り消すこと、または A１の\n     チームコントロールファウルに変更することはできない。\n\nF-3.3.10 例：B１がドリブルをしている A１にファウルをした。審判は B１のファウルがアンスポーツマンライク\n      ファウルにアップグレードされるかどうかに確証がなかった。\n      解説：ゲーム中のいかなる時間帯でも、パーソナルファウルがアンスポーツマンライクファウルにアップ\n      グレードされるかどうかを判定するために IRS レビューを行うことができる。しかしながら、レビューで、\n      A１から B１にぶつかっていて、触れ合いの責任が A１にあった場合でも、B１のディフェンスファウ\n      ルを取り消すこと、または A１のチームコントロールファウルに変更することはできない。\n\nF-3.3.11 例：ドリブルをしている A１がトラベリングのバイオレーションをし、続いて B１が A１にアンスポーツ\n      マンライクファウルをした。審判は B１のアンスポーツマンライクファウルが正しく宣せられたかどうかに\n      確証がなかった。\n      解説：ゲーム中のいかなる時間帯でも、アンスポーツマンライクファウルがパーソナルファウルにダウ\n      ングレードされるかどうか、あるいはディスクォリファイングファウルにアップグレードされるかどうかを判定\n      するために IRS レビューを行うことができる。\n      レビューで、B１のファウルがアンスポーツマンライクファウルであった場合、ファウルはアンスポーツマン\n      ライクファウルのままとなる。\n      レビューで、B１のファウルがパーソナルファウルであった場合、そのファウルはトラベリングの後で起き\n      ているため、なかったものとする。\n\nF-3.3.12 例：B１がツーポイントゴールのショットをしている A１にファウルをし、続いて B２がまだショットの\n      動作（アクトオブシューティング）中の A１にアンスポーツマンライクファウルをした。ボールはバスケ\n      ットに入らなかった。審判は B２のアンスポーツマンライクファウルが正しく宣せられたかどうかに確証\n      がなかった。\n      解説：ゲーム中のいかなる時間帯でも、アンスポーツマンライクファウルがパーソナルファウルにダウ\n      ングレードされるかどうか、あるいはディスクォリファイングファウルにアップグレードされるかどうかを判\n      定するために IRS レビューを行うことができる。\n      レビューで、B２のファウルがアンスポーツマンライクファウルであった場合、ファウルはアンスポーツマン\n      ライクファウルのままとなる。B１のパーソナルファウルの罰則として、誰もリバウンドの位置に着かず\n      に 2 本のフリースローが A１に与えられ、さらに B２のアンスポーツマンライクファウルの罰則として、\n      誰もリバウンドの位置に着かずに 2 本のフリースローが A１に与えられる。ゲームはフロントコートの\n      スコアラーズテーブルの反対側のスローインラインからチーム A のスローインで再開される。ショットク\n      ロックは 14 秒となる。\n      レビューで、B２のファウルがパーソナルファウルであった場合、そのファウルは最初のファウルの後で\n      起きているため、なかったものとする。B１のファウルの罰則として、2 本のフリースローが A１に与え\n      られ、ゲームは通常の最後のフリースローの後と同様に再開される。\n\nF-3.3.13 例：第 3 クォーターで、B１が A２にアンスポーツマンライクファウルをした。第 4 クォーターで、B１\n      がショットの動作（アクトオブシューティング）中の A1 にファウルをし、ショットは成功した。審判は\n      B１のファウルがアンスポーツマンライクファウルにアップグレードされるかどうかに確証がなかった。IRS\n      レビューの間に B１はテクニカルファウルを宣せられた。\n      解説：レビューで、B１の A１へのファウルがアンスポーツマンライクファウルであった場合、B１は 2\n      個目のアンスポーツマンライクファウルにより自動的に失格・退場となる。B１のテクニカルファウルは\n      なかったものとし、B１あるいはチーム B のヘッドコーチのいずれにも宣せられない。B１のアンスポー\n      ツマンライクファウルの罰則として、誰もリバウンドの位置に着かずに 1 本のフリースローが A１に与\n      えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチーム A の\n      スローインで再開される。ショットクロックは 14 秒となる。\n\nレビューで、B1 の A1 へのファウルがパーソナルファウルであった場合、A1 のゴールは認められる。\n       B1 は 1 個のテクニカルファウルと 1 個のアンスポーツマンライクファウルにより失格・退場となる。誰\n       もリバウンドの位置に着かずに 1 本のフリースローがチーム A のいずれかのプレーヤーに与えられる。\n       そのあと、1 本のフリースローが A1 に与えられる。ゲームは通常の最後のフリースローの後と同様に\n       再開される。\n\nF-3.3.14 条文：IRS レビューは、ゲームクロックあるいはシ ョ ッ ト ク ロ ッ ク の誤操作（誤作動）のあと、\n        それらにどのくらいの時間を表示するべきかを決定するためにゲ ー ム 中 の い か な る 時間帯でも\n        使用できる。\n        ショットクロックに表示される正しい時間を決定する場合、審判はシ ョ ッ ト の ボ ー ル が リングに\n        触れたかどうか、またゲームが止められる前に新たなチームコントロールが確立されていたかどう\n        かを確認するものとする。\n\nF-3.3.15 例：第 2 クォーター残り 57.8 秒、ショットクロック残り 0.7 秒で、A1 はスリーポイントのショットを\n        し、成功しなかった。そのあと、\n        ⒜A2 がバスケットの近くで新たなボールのコントロールを得た。\n        ⒝B1 がボールをアウトオブバウンズに弾き出した。\n        ⒞A2 がバスケットの近くで新たなボールのコントロールを得た直後に B1 がボールをアウトオブバ\n         ウンズに弾き出した。\n        審判はショットクロックに何も表示されていないことに気づいた。\n        解説：IRS レビューはショットクロックの誤操作のあと、どのくらいの時間を表示するべきかを決定\n        するためにゲーム中のいかなる時間帯でも使用できる。\n        ⒜では、審判は速やかにゲームを止める。\n        全ての場合において、レビューで、ボ ー ル が リ ン グ に 触れておらず、またゲームが止められる前に\n        ショットクロックの時限を過ぎていたと審判が判断した場合、ショットクロックバイオレーションとなる。\n        ゲームはエンドラインの外側のアウトオブバウンズからチーム B のスローインで再開される。シ ョ ッ ト\n        クロックは 24 秒となる。\n        全ての場合において、レビューで、ボールがリングに触れていた場合、ショットクロックバイオレーション\n        は起きていない。ゲームはフロントコートのエンドラインの外側のアウトオブバウンズからチーム A の\n        スローインで再開される。ショットクロックは 14 秒となる。\n\nF-3.3.16 例：第 2 クォーター残り 57.8 秒、ショットクロック残り 0.7 秒で、A1 はスリーポイントのショットをし、\n        成功しなかった。そのあと、\n        ⒜B1 がバスケットの近くで新たなボールのコントロールを得た。\n        ⒝B1 がバスケットの近くで新たなボールのコントロールを得た直後にボールをアウトオブバウンズに\n         出した。\n        審判はショットクロックに何も表示されていないことに気づいた。\n        解説：IRS レビューはショットクロックの誤操作のあと、どのくらいの時間を表示するべきかを決定\n        するためにゲーム中のいかなる時間帯でも使用できる。\n        ⒜では、審判は速やかにゲームを止める。\n\nどちらの場合においても、レビューで、ボールがリングに触れておらず、またゲームが止められる前に\n       ショットクロックの時限を過ぎていたと審判が判断した場合、ショットクロックバイオレーションとなる。\n       ゲームはエンドラインの外側のアウトオブバウンズからチーム B のスローインで再開される。シ ョ ッ ト\n       クロックは 24 秒となる。\n       ⒜では、レビューで、ボールがリングに触れていた場合、ショットクロックバイオレーションは起きてい\n        ない。ゲームはエンドラインの外側のアウトオブバウンズからチーム B のスローインで再開される。\n        ショットクロックは 24 秒となる。\n       ⒝では、レビューで、ボールがリングに触れていた場合、ショットクロックバイオレーションは起きてい\n        ない。ゲームはフロントコートのエンドラインの外側のアウ ト オ ブ バ ウ ン ズ からチーム A のスロー\n        インで再開される。ショットクロックは 14 秒となる。\n\nF-3.3.17 例：ショットクロック残り 7 秒で、A1 のショットのボールはリングに触れなかった。A2 がボールをキ\n       ャッチしたとき、ショットクロックオペレーターは誤ってショットクロックを 14 秒にリセットした。いくらかの\n       ドリブルやパスの後で、まだチーム A がボールをコントロールしていて、A3 が得点した。このとき、\n       誤りが認識され、審判はゲームを止めた。\n       解説：\n       レビューで、A3 の得点の前にショットクロックの時限を過ぎていた場合、ショットクロックバイオレー\n       ションとなり、A3 の得点は認められない。ゲームはフリースローラインの延長線上からチーム B の\n       スローインで再開され、ショットクロックは 24 秒となる。\n       レビューで、A3 の得点の前にショットクロックの時限を過ぎていなかった場合、ショットクロックバイ\n       オレーションは起きておらず、A3 の得点は認められる。ゲームはエンドラインからチーム B のスロー\n       インで再開され、ショットクロックは 24 秒となる。\n\nF-3.3.18 例：第 2 クォーター残り 42.2 秒で、A１がフロントコートに向かってドリブルをした。このとき審判\n      がゲームクロックとショットクロックに何も表示されていないことに気づいた。\n      解説：ゲームは速やかに止められる。ゲーム中のいかなる時間帯でも、両方のクロックに表示する\n      時間を確認するために IRS レビューを行うことができる。レビューのあと、ゲームは止められたときに\n      ボールがあった場所に最も近いアウトオブバウンズからチーム A のスローインで再開される。ゲーム\n      クロックとショットクロックには確認された時間を表示する。\n\nF-3.3.19 例：A２は 2 本目のフリースローを行い、ボールはバスケットに入った。このとき審判は A２は正し\n      いフリースローシューターかどうかに確証がなかった。\n      解説：ゲーム中のいかなる時間帯でも、フリースローシューターの誤りが起きたあと、ゲームクロック\n      が動き始め、最初にボールがデッドとなり、次にボールがライブとなる前であれば、正しいフリースロ\n      ーシューターを特定するために IRS レビューを行うことができる。\n      レビューで、フリースローシューターを誤っていたことが明らかになった場合、「訂正のできる誤り」のう\n      ち、「誤ったプレーヤーにフリースローを与えていた場合」に該当する。成功したかどうかにかかわらず、\n      A２のフリースローは取り消される。ゲームはバックコートのフリースローラインの延長線上のアウトオ\n      ブバウンズからチーム B のスローインで再開される。ショットクロックは 24 秒となる。\n\nF-3.3.20 例：A１と B１が互いに殴り始め、他のプレーヤーやチームベンチに座ることを許された人物がコー\n      トに入り、全員が抗争に関わった。数分後、審判はコート上の事態を収拾させた。\n      解説：事態が収拾されたあと、ゲーム中のいかなる時間帯でも、あらゆる暴力行為の間の他のプ\n      レーヤーやチームベンチに座ることを許された人物の関与を特定するために IRS レビューを行うこと\n      ができる。明確で決定的な抗争の証拠を集めたあと、クルーチーフは最終的な決定をスコアラーズ\n      テーブルの前で示し、両チームのヘッドコーチに伝達する。\n\nF-3.3.21 例：2 人の対戦相手が攻撃的に話し始め、互いにわずかに押し合った。審判はゲームを止め\n      た。コート上の事態が収拾されたあと、審判は抗争に関わったプレーヤーや人物に確証がなかっ\n      た。\n      解説：事態が収拾されたあと、ゲーム中のいかなる時間帯でも、あらゆる暴力行為の間のプレー\n      ヤーやチームベンチに座ることを許された人物の関与を特定するために IRS レビューを行うことがで\n      きる。明確で決定的な抗争の証拠を集めたあと、クルーチーフは最終的な決定をスコアラーズテー\n      ブルの前で示し、両チームのヘッドコーチに伝達する。\n\nF-3.3.22 例：審判は B1 のファウルを宣した。スコアラーズテーブルにファウルを伝達する前に、審判はファウ\n      ルが宣せられた後でコート上で暴力行為が発生していたかどうかに確証がなかった。\n      解説：ゲーム中のいかなる時間帯でも、あらゆる暴力行為の間のプレーヤーの関与を特定する\n      ために IRS レビューを行うことができる。審判はスコアラーズテーブルにファウルの伝達をする前にレ\n      ビューを行うことができる。\n      レビューの結果、暴力行為が発生していた場合、審判は B1 のファウルに続いて暴力行為につい\n      て伝達し、ゲームはその罰則で再開される。\n\nF-3.3.23 条文：審判によって速やかにファウルを宣されなかった暴力行為が起きたとき、審判はあらゆる\n       暴力行為や暴力行為の可能性のある事象をレビューするためにいかなる時間帯でもゲームを\n       止めることができる。IRS レビューは、暴力行為や暴力行為の可能性のある事象のあと、審判\n       がいずれかの理由により最初にゲームを止めたときに行われなければならず、審判はレビューが\n       必要かどうかを判断しなければならない。\n       レビューで、暴力行為が起きていた場合、審判は規則の違反を宣し、暴力行為を含む、全て\n       のすでに宣せられた違反を違反が起きた順番に罰する。暴力行為が起きてから、ゲームが止め\n       られるまでの間に起きた全ての事象はそのまま有効となる。\n       レビューで、暴力行為が起きていなかった場合、最初の判定がそのまま有効となる。ゲームはレ\n       ビューのために止められた場所に最も近いアウトオブバウンズから再開される。\n       暴力行為とは、相手を傷つけたり、傷つけることを意図して力を行使したりする行為、あるいは\n       相手に怪我を負わせる、または負わせる可能性のあるリスクを伴う行為である。ディスクォリファイ\n       ングファウル、アンスポーツマンライクファウル、テクニカルファウルの判定基準に合致しない行為\n       や、暴力的な脅迫行為の判定基準に合致しない行為は暴力行為ではない。\n\nF-3.3.24 例：A1 がドリブルをしているとき、A2 が B2 に肘打ちをした。審判は A2 のファウルを宣さず、その\n      15 秒後に\n\n⒜A1 がドリブルをし続けているときにゲームを止めた。\n      ⒝チーム B がボールをアウトオブバウンズに出したときにゲームを止めた。\n      解説：どちらの場合においても、ゲーム中のいかなる時間帯でも、あらゆる暴力行為の間のチー\n      ムメンバーの関与を特定するために IRS レビューを行うことができる。審判はどちらのチームも不利\n      にならない状況で速やかにゲームを止めることができる。もしくはゲームが止められている間にレビュ\n      ーを行うことができる。\n      レビューで、A2 が B2 に肘打ちをしていた場合、審判は A2 にアンスポーツマンライクファウルを宣\n      することができる。誰もリバウンドの位置につかずに 2 本のフリースローが B2 に与えられる。\n      レビューで、A2 が B2 に暴力行為に該当しないパーソナルファウルやテクニカルファウルをしていた\n      場合、もしくは何もしていなかった場合、パーソナルファウルやテクニカルファウルを宣することはでき\n      ない。\n      全ての場合において、ゲームは止められた場所に最も近いアウトオブバウンズからチーム A のスロー\n      インで再開される。アンスポーツマンライクファウルの罰則の一部であるスローインは、A2 のファウル\n      の後で起きた更なる事象によって取り消される。\n      ゲームクロックとチーム A のショットクロックは止められた時点から継続となる。\n\nF-3.3.25 例：B1 はツーポイントゴールのショットの動作（アクトオブシューティング）中の A1 にファウルをし\n      た。A1 が\n      ⒜ショットを放つ前に\n      ⒝ショットを放った後に\n      B1 に肘打ちをした。審判は A1 のファウルを宣さなかった。ボールはバスケットに入った。\n      解説：どちらの場合においても、ゲーム中のいかなる時間帯でも、あらゆる暴力行為の間のチー\n      ムメンバーの関与を特定するために IRS レビューを行うことができる。\n      レビューで、B1 のファウルの前に A1 が肘打ちをしていることが明らかになった場合、審判は A1 に\n      アンスポーツマンライクファウルを宣することができ、B1 のファウルも宣せられる。どちらの場合におい\n      ても、A1 の得点は認められる。\n      それぞれの罰則は起きた順序に従って行われる。A1 のアンスポーツマンライクファウルの罰則として\n      誰もリバウンドの位置に着かずに 2 本のフリースローが B1 に与えられる。アンスポーツマンライクファ\n      ウルの罰則の一部であるスローインは、B1 のファウルの罰則によって取り消される。\n      1 本のフリースローが A1 に与えられ、ゲームは通常の最後のフリースローの後と同様に再開され\n      る。ゲームクロックは止められた時点から継続となる。\n\nF-3.3.26 例：A1 がドリブルをしているとき、A2 が B2 に肘打ちをした。審判は A2 のファウルを宣さなかっ\n      た。その 5 秒後に B3 がドリブルをしている A1 にファウルをし\n      ⒜このクォーター3 個目のチームファウルであった。\n      ⒝このクォーター5 個目のチームファウルであった。\n      解説：ゲーム中のいかなる時間帯でも、あらゆる暴力行為の間のチームメンバーの関与を特定\n      するために IRS レビューを行うことができる。\n      レビューで、A2 が B2 に肘打ちをしていた場合、審判は A2 にアンスポーツマンライクファウルを宣\n\nすることができ、B3 のファウルも宣せられる。\n      それぞれの罰則は起 き た 順 序 に従って行われる。誰もリバウンドの位置につかずに 2 本のフリー\n      スローが B2 に与えられる。アンスポーツマンライクファウルの罰則の一部であるスローインは、B3 の\n      ファウルの罰則によって取り消される。\n      ⒜では、ゲームは止められた場所に最も近いアウトオブバウンズからチーム A のス ロ ー イ ン で 再開\n        される。\n      ⒝では、2 本のフリースローが A1 に与えられる。ゲームは通常の最後のフリースローの後と同様に\n        再開される。\n      ゲームクロックは止められた時点から継続となる。\n\nF-3.3.27 例：A1 がドリブルをしているとき、A2 が B2 に肘打ちをした。審判は A2 のファウルを宣さなかっ\n      た。その 5 秒後にドリブルをしている A1 が\n      ⒜フロントコートで\n      ⒝バックコートで\n      パーソナルファウルを宣せられた。\n      解説：ゲーム中のいかなる時間帯でも、あらゆる暴力行為の間のチームメンバーの関与を特定\n      するために IRS レビューを行うことができる。\n      レビューで、A2 が B2 に肘打ちをしていた場合、審判は A2 にアンスポーツマンライクファウルを宣\n      することができ、A1 のファウルも宣せられる。\n      それぞれの罰則は起 き た 順 序 に従って行われる。誰もリバウンドの位置につかずに 2 本のフリー\n      スローが B2 に与えられる。アンスポーツマンライクファウルの罰則の一部であるスローインは、A1 の\n      ファウルの罰則によって取り消される。\n      ゲームは止められた場所に最も近いアウトオブバウンズからチーム B のスローインで再開される。\n      ⒜では、チーム B のショットクロックは 24 秒となる。\n      ⒝では、チーム B のショットクロックは 14 秒となる。\n      ゲームクロックは止められた時点から継続となる。\n\nF-3.3.28 例：A1 が B1 に肘打ちをした。審判は A1 のファウルを宣さなかった。その 4 秒後に B1 が\n      ⒜ツーポイントゴールの\n      ⒝スリーポイントゴールの\n      ショットの動作（アクトオブシューティング）中の A1 にアンスポーツマンライクファウルをし、ボールは\n      バスケットに入った。\n      解説：ゲーム中のいかなる時間帯でも、あらゆる暴力行為の間のチームメンバーの関与を特定\n      するためにレビューを行うことができる。\n      レビューで、A1 が B1 に肘 打 ち を し て い た 場合、審判は A1 にアンスポーツマンライクファウルを\n      宣することができる。\n      A1 の得点は認められる。\n      どちらの場合においても、それぞれのアンスポーツマンライクファウルの罰則は等しくなく、起きた順序\n      に従って行われる。\n\n誰もリバウンドの位置に着かずに 2 本のフリースローが B1 に与えられる。アンスポーツマンライクファ\n        ウルの罰則の一部であるスローインは、それに続く B1 のアンスポーツマンライクファウルの罰則によっ\n        て取り消される。\n        1 本のフリースローが A1 に与えられ、ゲームはフロントコートのスコアラーズテーブルの反対側のスロー\n        インラインからチーム A のスローインで再開される。ショットクロックは 14 秒となる。\n        ゲームクロックは止められた時点から継続となる。\n\nF-3.3.29 例：A1 がドリブルをしているとき、A2 が B2 に肘打ちをした。審判は A2 のファウルを宣さなかっ\n        た。その 5 秒後に A1 または B1 がテクニカルファウルを宣せられた。\n        解説：ゲーム中のいかなる時間帯でも、あらゆる暴力行為の間のチームメンバーの関与を特定\n        するために IRS レビューを行うことができる。\n        レビューで、A2 が B2 に肘打ちをしていた場合、審判は A2 にアンスポーツマンライクファウルを宣\n        することができる。テクニカルファウルの罰則が最初に行われる。誰もリバウンドの位置につかずに 1\n        本のフリースローがチーム B またはチーム A のいずれかのプレーヤーに与えられ、誰もリバウンドの\n        位置に着かずに 2 本のフリースローが B2 に与えられる。アンスポーツマンライクファウルの罰則の\n        一部であるスローインは、A2 のファウルの後で起きた更なる事象によって取り消される。\n        ゲームは止められた場所に最も近いアウトオブバウンズからチーム A のスローインで再 開 さ れ る 。\n        ショットクロックは、A1 にテクニカルファウルが宣せられた場合は継続となる。B1 にテクニカルファウル\n        が宣せられたとき、A1 がフロントコートでドリブルをしていて、チーム A のショットクロックが 13 秒以\n        下であった場合、ショットクロックは 14 秒となり、チーム A のショットクロックが 14 秒以上であった\n        場合は継続となる。B1 にテクニカルファウルが宣せられたとき、A1 がバックコートでド リ ブ ル を し て\n        いた場合、ショットクロックは 24 秒となる。\n        どちらの場合においてもゲームクロックは止められた時点から継続となる。\n\n\nF-４ ヘッドコーチチャレンジ（HCC）\n\nF-4.１   条文：ヘッドコーチは、最も近い審判と目で見えるように、はっきりとヘッドコーチチャレンジを依頼\n        する。大きな声で英語で「チャレンジ」と言い、同時にヘッドコーチチャレンジシグナル（手で長方\n        形を描く）を示す。\n        ヘッドコーチは審判がシ グ ナ ル を 示して認めるまでは、ヘッドコーチチャレンジの請求を取り下げる\n        ことができる。\n        ヘッドコーチは、競技規則の別添資料 F.3 に規定されているゲームの状況にのみ、チャレンジを\n        請求することができる。\n        ヘッドコーチチャレンジは、IRS レビューを行うことができるすべての状況について、ゲーム中のあらゆ\n        る時間帯で請求することができ、これには、第 4 クォーターまたは各オーバータイムでゲームクロック\n        が 2:00 もしくはそれ以下を示しているときのみにレビューを行うことができる状況も含まれる。\n\nF-4.２   例：チーム B のヘッドコーチがヘッドコーチチャレンジを請求した。ヘッドコーチは、最も近い審判と目\n        を合わせ、大きな声で英語で「チャレンジ」と言い、ヘッドコーチチャレンジのシグナルを示した。その\n\n直後、審判がシグナルを示してその請求を認める前に、チーム B のヘッドコーチは請求の取り下げを\n        申し出た。\n        解説：チーム B のヘッドコーチは、審判がシグナルを示してその請求を認める前に、ヘッドコーチチャ\n        レンジの請求の取り消しを申し出ている。請求は取り下げられる。チーム B のヘッドコーチは、請求\n        を認められた 1 回のヘッドコーチチャレンジを使用したことにはならない。\n\nF-4.３   例：第 2 クォーター残り 22 秒で、A1 がショットをした。ボールがリングより高い位置のバックボード\n        に触れたあと、B1 がボールに触れた。審判は B1 が正当にボールに触れたと判定し、ゴールテンディ\n        ングのバイオレーションを宣さなかった。チーム A のヘッドコーチは、判定は正しくないと考え、適切な\n        手続きでヘッドコーチチャレンジを請求した。\n        解説：ゴールテンディングまたはインタフェアレンスのバイオレーションに対しては、審判がバイオレーシ\n        ョンを宣した場合のみヘッドコーチチャレンジを請求することができる。ヘッドコーチのチャレンジの請求\n        は認められない。\n\nF-4.４   例：第 3 クォーター残り 4:16 で、A1 はバスケットに向かってドライブし、得点した。チーム B のヘ\n        ッドコーチは、A1 が得点する前に明らかなトラベリングのバイオレーションがあったと考えた。チーム B\n        のヘッドコーチは、適切な手続きでヘッドコーチチャレンジを請求した。\n        解説：チーム B のヘッドコーチチャレンジは認められない。競技規則の別添資料 F.3 に規定され\n        ているゲームの状況にのみ、チャレンジを請求することができる。バイオレーションが宣せられたかどう\n        かにかかわらず、トラベリングのバイオレーションに対しては、ヘッドコーチチャレンジを請求することはで\n        きない。\n\nF-4.５   例：第 4 クォーター残り 9 秒で、A1 がツーポイントゴールで得点し、得点はチーム A 82 - チーム\n        B 80 となった。エンドラインのアウトオブバウンズからのチーム B のスローインのあと、チーム A のヘッ\n        ドコーチは A1 の得点は 3 点であったと考え、ヘッドコーチチャレンジを請求した。B1 がフロントコー\n        トでドリブルをしているとき、審判はヘッドコーチチャレンジの請求を認識した。\n        解説：チーム A のヘッドコーチチャレンジは認められる。審判は、どちらのチームも不利にならない状\n        況で速やかにゲームを止める。\n        レビューで、A1 のショットがツーポイントゴールエリアから放たれていた場合、ゲームはチーム A 82 -\n        チーム B 80 で再開される。\n        レビューで、A1 のショットがスリーポイントゴールエリアから放たれていた場合、ゲームはチーム A 83\n        - チーム B 80 で再開される。\n        どちらの場合においても、ゲームはフロントコートの B1 がドリブルをしている間に止められた場所に最\n        も近いアウトオブバウンズから再開される。ゲームクロック、ショットクロックともに止められた時点から\n        継続となる。\n\nF-4.６   例：第 4 クォーター残り 8 秒で、A1 がツーポイントゴールで得点し、得点はチーム A 82 - チーム\n        B 80 となった。エンドラインのアウトオブバウンズからのチーム B のスローインのあと、チーム A のヘッ\n        ドコーチは A1 の得点は 3 点であったと考え、ヘッドコーチチャレンジを請求した。残り 1 秒で、B1\n\nがツーポイントゴールで得点し、得点はチーム A 82 - チーム B 82 となったあと、審判はヘッドコー\n        チチャレンジの請求を認識した。\n        解説：チーム A のヘッドコーチチャレンジは認められる。審判は速やかにゲームを止める。\n        レビューで、A1 のショットがツーポイントゴールエリアから放たれていた場合、ゲームはエンドラインのア\n        ウトオブバウンズからチーム A のスローインで、チーム A 82 - チーム B 82 で再開される。ゲームク\n        ロックは残り 1 秒となる。\n        レビューで、A1 のショットがスリーポイントゴールエリアから放たれていた場合、ゲームはエンドラインの\n        アウトオブバウンズからチーム A のスローインで、チーム A 83 - チーム B 82 で再開される。ゲーム\n        クロックは残り 1 秒となる。\n\nF-4.７   例：第 4 クォーター残り 7 秒で、A1 がツーポイントゴールで得点し、得点はチーム A 82 - チーム\n        B 80 となった。エンドラインのアウトオブバウンズからのチーム B のスローインのあと、チーム A のヘッ\n        ドコーチは A1 の得点は 3 点であったと考え、ヘッドコーチチャレンジを請求した。B1 がツーポイント\n        ゴールで得点し、ボールが空中にある間にゲームの終了を知らせるゲームクロックのブザーが鳴ったあ\n        と、審判はヘッドコーチチャレンジの請求を認識した。得点はチーム A 82 - チーム B 82 であった。\n        解説：チーム A のヘッドコーチチャレンジは認められる。審判はスコアシートにサインをするまで IRS\n        レビューを行うことができる。\n        レビューで、A1 のショットがツーポイントゴールエリアから放たれていた場合、オーバータイムを行う。ゲ\n        ームはオルタネイティングポゼッションの手順に従って再開される。\n        レビューで、A1 のショットがスリーポイントゴールエリアから放たれていた場合、最終得点をチーム A\n        83 - チーム B 82 として、ゲームは終了となる。\n\nF-4.８   例：第 4 クォーター残り 6 秒で、A1 がツーポイントゴールで得点し、得点はチーム A 82 - チーム\n        B 80 となった。そのあと、B1 がツーポイントゴールのショットを放ち、ボールが空中にある間にゲーム\n        の終了を知らせるゲームクロックのブザーが鳴り、ボールはバスケットに入った。得点はチーム A 82 -\n        チーム B 82 となった。チーム A のヘッドコーチは A1 の得点は 3 点であったと考え、速やかに適切\n        な手続きでヘッドコーチチャレンジを請求した。\n        解説：チーム A のヘッドコーチチャレンジは認められる。クルーチーフは、ゲーム中のいかなる時間帯\n        でも、成功したゴールで 2 点あるいは 3 点のどちらが認められるかを判定するためにヘッドコーチチャ\n        レンジの IRS レビューを行うことができる。\n        レビューで、A1 のショットがツーポイントゴールエリアから放たれていた場合、オーバータイムを行う。ゲ\n        ームはオルタネイティングポゼッションの手順に従って再開される。\n        レビューで、A1 のショットがスリーポイントゴールエリアから放たれていた場合、最終得点をチーム A\n        83 - チーム B 82 として、ゲームは終了となる。\n\nF-4.９   例：第 4 クォーター残り 6:36 で、ボールがアウトオブバウンズに出て、審判はスローインをチーム A\n        に与えた。チーム A はタイムアウトを認められた。チーム B のヘッドコーチは、判定は正しくないと考\n        え、適切な手続きでヘッドコーチチャレンジを請求した。\n\n解説：チーム B のヘッドコーチチャレンジは認められる。クルーチーフは、ゲーム中のいかなる時間帯\n      でも、ボールをアウトオブバウンズにしたプレーヤーを特定するためにヘッドコーチチャレンジの IRS レ\n      ビューを行うことができる。\n      タイムアウトは、レビューが終わり、審判が最終的な判定を示すまで始まらない。チーム A のタイムア\n      ウトの請求は審判による最終的な IRS レビューの判定が示されるまでのレビューの間は、いつでも\n      取り下げることができる。\n\nF-4.10 例：第 2 クォーター残り 5:28 で、A1 はサイドライン近くでドリブルして A2 にボールをパスをし、A2\n      はショットを成功させた。チーム B のヘッドコーチは、A2 が得点する前にチーム A は 8 秒のバイオレ\n      ーションをしていたと考え、適切な手続きでヘッドコーチチャレンジを請求した。\n      解説：チーム B のヘッドコーチチャレンジは認められない。競技規則の別添資料 F.3 に規定され\n      ているゲームの状況にのみ、チャレンジを請求することができる。8 秒のバイオレーションはクォーター\n      もしくはオーバータイムの終わりの特定のゲームの状況でのみレビューすることができる。ゴールは認め\n      られ、チーム B のヘッドコーチは請求を認められた 1 回のヘッドコーチチャレンジを使用したことにはな\n      らない。\n\nF-4.11 例：第 3 クォーター残り 2:30 で、B1 が A1 にファウルをした。このとき、B1 はテクニカルファウルを\n      宣せられ、さらに B1 は審判を侮辱する更なる発言によってディスクォリファイングファウルを宣せられ\n      た。チーム A のヘッドコーチは、B1 のパーソナルファウルはアンスポーツマンライクファウルにアップグレ\n      ードされるべきであると考え、ヘッドコーチチャレンジを請求した。\n      解説：チーム A のヘッドコーチチャレンジは認められる。ゲーム中のいかなる時間帯でも、パーソナ\n      ルファウルがアンスポーツマンライクファウルにアップグレードされるかどうかを判定するためにレビューを\n      行うことができる。\n      レビューで、B1 のパーソナルファウルがアンスポーツマンライクファウルであった場合、テクニカルファウル\n      によって B1 は自動的に失格・退場となる。ゲームの中の B1 の審判を侮辱する更なる発言による\n      ディスクォリファイングファウルを宣することはできず、大会主催者に報告される。誰 も リ バ ウ ン ド の\n      位置に着かずに 1 本のフリースローがチーム A のいずれかのプレーヤーに与えられる。そのあと、誰も\n      リバウンドの位置に着かずに 2 本のフリースローが A1 に与えられる。ゲームはフロントコートのスコア\n      ラーズテーブルの反対側のスローインラインからチーム A のスローインで再開される。\n\nF-4.12 例：第 3 クォーター残り 43.4 秒、ショットクロック残り 1.2 秒で A1 はス リ ー ポ イ ン ト のショットを\n      した。ショットは成功せず、ボールはリングに触れなかった。その後 B1 がバスケットの近くでボールに\n      触れ、ボールはすぐにアウトオブバウンズに出た。審判はスローインのボールをチーム B に与えるとき、\n      ショットクロックに何も表示されていないことに気づいた。\n      チーム A のヘッドコーチは B1 がボールをアウトオブバウンズに出したと考え、ヘッドコーチチャレンジを\n      請求した。\n      解説：ゲーム中のいかなる時間帯でも、ボールをアウトオブバウンズにしたプ レ ー ヤ ー を 特定する\n      ためにヘッドコーチチャレンジの IRS レビューを行うことができる。そのとき、誤操作があった場合はショ\n      ットクロックにどのくらいの時間が表示されるかを決定するためにさらにレビューを行うこともできる。\n\nレビューで、B 1 が ボ ー ル を アウトオブバウンズに出していて、ボールがアウトオブバウンズに出る前に\n     ショットクロックの時限を過ぎていた場合、チーム A のショットクロックに時間は残っておらず、ショットク\n     ロックバイオレーションとなる。ゲームはエンドラインのアウトオブバウンズからチーム B のスローインで再\n     開され、ショットクロックは 24 秒となる。\n     チーム A のヘッドコーチは請求を認められた 1 回のヘッドコーチチャレンジを使用したことにはならない。\n     レビューで、A1 がボールをアウトオブバウンズに出していて、ボールがアウトオブバウンズに出る前にシ\n     ョットクロックの時限を過ぎていなかった場合、ゲームはエンドラインのアウトオブバウンズからチーム B の\n     スローインで再開され、ショットクロックは 24 秒となる。\n     チーム A のヘッドコーチは請求を認められた 1 回のヘッドコーチチャレンジを使用したこととなる。\n     レビューで、B1 がボールをアウトオブバウンズに出していて、ボールがアウトオブバウンズに出る前にシ\n     ョットクロックの時限を過ぎていなかった場合、ゲームはフロントコートのエンドラインのアウトオブバウン\n     ズからチーム A のスローインで再開され、ショットクロックは継続となる。\n     チーム A のヘッドコーチは請求を認められた 1 回のヘッドコーチチャレンジを使用したこととなる。\n\nF-4.13 条文：ヘッドコーチチャレンジがいずれかのチームのタイムアウトが始まった後で請求されたとき、そ\n      のタイムアウトは中断せずに最後まで続けられる。ヘッドコーチチャレンジの請求を取り消すことは\n      できず、IRS レビューはタイムアウトの後で行われる。\n\nF-4.14 例：A1 はスリーポイントゴールで得点した。このとき、チーム B はタイムアウトを請求した。タイムア\n     ウトの最中でチーム B のヘッドコーチはショットが放たれる前に A1 はスリーポイントラインを踏んでい\n     たと考え、適切な手続きでヘッドコーチチャレンジを請求した。\n     解説：チーム B のヘッドコーチチャレンジは認められる。成功したゴールで 2 点あるいは 3 点のどち\n     らが認められるかを判定するために IRS レビューを行うことができる。タイムアウトは中断せずに最後\n     まで続けられる。ヘッドコーチチャレンジのレビューはタイムアウトの後で行われる。\n\nF-4.15 条文：インスタントリプレーシステム（IRS）が使用される全てのゲームで、ヘッドコーチは 1 度だ\n      けヘッドコーチチャレンジを認められる。競技規則の別添資料 F.3 に規定されている時間帯の制\n      限は適用しない。\n\nF-4.16 例：第 2 クォーター残り 3:23 で、ボールがアウトオブバウンズに出て、審判はスローインをチーム A\n     に与えた。チーム B のヘッドコーチは、判定は正しくないと考え、適切な手続きでヘッドコーチチャレン\n     ジを請求した。これはチーム B のヘッドコーチによる\n     ⒜最初のヘッドコーチチャレンジの請求であった。\n     ⒝2 度目のヘッドコーチチャレンジの請求であった。\n     解説：\n     ⒜ヘッドコーチチャレンジは認められる。クルーチーフは、ゲーム中のいかなる時間帯でも、ボールをア\n       ウトオブバウンズにしたプレーヤーを特定するためにヘッドコーチチャレンジの IRS レビューを行うこ\n       とができる。\n     レビューで、ボールがチーム B のプレーヤーによってアウトオブバウンズに出されていた場合、ゲームは\n     チーム A のスローインで再開される。\n\nレビューで、ボールがチーム A のプレーヤーによってアウトオブバウンズに出されていた場合、判定は\n     正される。ゲームはチーム B のスローインで再開される。\n     どちらの場合においても、チーム B のヘッドコーチは、請求を認められた 1 回のヘッドコーチチャレンジ\n     を使用したこととなる。\n     ⒝チーム B のヘッドコーチは、請求を認められた 1 回のヘッドコーチチャレンジをすでに使用している。\n       請求は認められない。\n\nF-4.17 例：第 2 クォーター残り 3:21 で、ボールがアウトオブバウンズに出て、審判はスローインをチーム A\n     に与えた。チーム B のヘッドコーチは、判定は正しくないと考え、適切な手続きでヘッドコーチチャレン\n     ジを請求した。ヘッドコーチチャレンジは認められた。その直後にチーム B のヘッドコーチは考えを改\n     め、ヘッドコーチチャレンジの請求を取り下げることを依頼した。\n     解説：一度認められたヘッドコーチチャレンジの請求は最終的なものであり、撤回することはできない。\n\nF-4.18 例：第 2 クォーター残り 2:35 で、ショットクロックのブザーが鳴る間近に A1 が得点し、ゲームは止\n     められることなく続けられた。\n     チーム B のヘッドコーチは、ショットクロックのブザーは、ショットが放たれる前に鳴っていたと考えた。B1\n     がドリブルをしているとき、適切な手続きでヘッドコーチチャレンジを請求した。\n     解説：チーム B のヘッドコーチチャレンジは認められる。ゲーム中のいかなる時間帯でも、成功した\n     ショットがショットクロックのブザーが鳴る前に放たれていたかどうかを判定するために IRS レビューを行う\n     ことができる。ヘッドコーチはゲーム中のいかなる時間帯でもヘッドコーチチャレンジを請求することがで\n     きる。\n     審判は速やかにゲームを止め、レビューを行うことができる。\n     レビューで、ボールがショットクロックのブザーが鳴る前に放たれていた場合、ゴールは認められる。ゲ\n     ームは止められたときにボールがあった場所に最も近いアウトオブバウンズからチーム B のスローイン\n     で再開される。ショットクロックは継続となる。\n     レビューで、ボールがショットクロックのブザーが鳴った後に放たれていた場合、ゴールは認められない。\n     ゲームは止められたときにボールがあった場所に最も近いアウトオブバウンズからチーム B のスローイ\n     ンで再開される。ショットクロックは継続となる。\n     どちらの場合においても、チーム B のヘッドコーチは、請求を認められた 1 回のヘッドコーチチャレンジ\n     を使用したこととなる。\n\nF-4.19 例：第 2 クォーター残り 2:29 で、ショットクロックのブザーが鳴る間近に A1 が得点し、ゲームは止\n     められることなく続けられた。\n     A2 がボールをアウトオブバウンズに弾き出したとき、審判はチーム B のフロントコートでゲームを止め\n     た。このとき、チーム B のヘッドコーチは、ショットクロックのブザーは、ショットが放たれる前に鳴ってい\n     たと考え、適切な手続きでヘッドコーチチャレンジを請求した。\n     解説：ヘッドコーチは、判定のあと、審判が最初にゲームを止めているときまで、ゲーム中のいかな\n     る時間帯でもヘッドコーチチャレンジを請求することができる。チーム B のヘッドコーチチャレンジは認\n     められる。A1 の成功したショットのボールがショットクロックのブザーが鳴る前に放たれていたかどうか\n     を判定するために IRS レビューを行うことができる。\n\nレビューで、ボールがショットクロックのブザーが鳴る前に放たれていた場合、ゴールは認められる。\n      レビューで、ボールがショットクロックのブザーが鳴った後に放たれていた場合、ゴールは認めらない。\n      どちらの場合においても、ゲームはボールがアウトオブバウンズに出た場所に最も近いアウトオブバウ\n      ンズからチーム B のスローインで再開される。ショットクロックは継続となる。チーム B のヘッドコーチは、\n      請求を認められた 1 回のヘッドコーチチャレンジを使用したこととなる。\n\nF-4.20 例：第 3 クォーター残り 7:22 で、B1 はドリブルをしている A1 にファウルをし、このクォーター2 個\n      目のチームファウルであった。\n      チーム A のヘッドコーチは、B1 がボールに対して正当にプレーしておらず、B1 のパーソナルファウル\n      はアンスポーツマンライクファウルにアップグレードされるべきであると考えた。チーム A のヘッドコーチは、\n      適切な手続きでヘッドコーチチャレンジを請求した。\n      解説：チーム A のヘッドコーチチャレンジは認められる。ゲーム中のいかなる時間帯でも、パーソナ\n      ルファウル、アンスポーツマンライクファウル、ディスクォリファイングファウルがそれぞれの判定基準に合\n      致しているどうか、あるいはアップグレードまたはダウングレードされるか、テクニカルファウルとみなされ\n      るかどうかを判定するために IRS レビューを行うことができる。\n      レビューで、ファウルがパーソナルファウルであった場合、ゲームは B1 のファウルが起きた場所に最も\n      近いアウトオブバウンズからチーム A のスローインで再開される。\n      レビューで、ファウルがアンスポーツマンライクファウルであった場合、パーソナルファウルはアップグレード\n      される。誰もリバウンドの位置に着かずに 2 本のフリースローが A1 に与えられる。ゲームはフロントコ\n      ートのスコアラーズテーブルの反対側のスローインラインのアウトオブバウンズからチーム A のスローイン\n      で再開される。\n      どちらの場合においても、チーム A のヘッドコーチは、請求を認められた 1 回のヘッドコーチチャレンジ\n      を使用したこととなる。\n\nF-4.21 例：第 3 クォーター残り 7:16 で、\n      ⒜B1 がドリブルをしている A1 にファウルをし、このクォーター2 個目のチームファウルであった。ゲーム\n       はチーム A のスローインで再開され、そのあと、A2 がツーポイントゴールで得点した。\n      ⒝B1 がショットの動作（アクトオブシューティング）中の A1 にファウルをした。ボールはバスケットに\n       入らなかった。A1 は最初のフリースローのボールを与えられている。\n      このとき、チーム A のヘッドコーチは、B1 がボールに対して正当にプレーしておらず、B1 のパーソナル\n      ファウルはアンスポーツマンライクファウルにアップグレードされるべきであると考えた。チーム A のヘッド\n      コーチは、適切な手続きでヘッドコーチチャレンジを請求した。\n      解説：チーム A のヘッドコーチチャレンジは認められない。ボールがチーム A のプレーヤーに\n      ⒜スローインで与えられたとき、\n      ⒝最初のフリースローで与えられたとき、\n      ヘッドコーチチャレンジが認められる時機が終わっている。ヘッドコーチチャレンジの請求とその IRS レ\n      ビューは、遅くとも判定の後で審判が最初にゲームを止め、次に再びボールがライブになる前までに\n      行われなければならない。\n      チーム A のヘッドコーチは、請求を認められた 1 回のヘッドコーチチャレンジを使用したことにはならない。\n\nF-4.22 例：ショットクロックのブザーが鳴る間近に A1 が得点し、ゲームは止められることなく続けられた。\n     チーム B のファーストアシスタントコーチは、ショットクロックのブザーは、ショットが放たれる前に鳴って\n     いたと考え、適切な手続きでヘッドコーチチャレンジを請求した。\n     解説：チーム B のファーストアシスタントコーチの請求は認められない。チーム B のヘッドコーチのみ\n     がヘッドコーチチャレンジによる IRS レビューを請求することができる。\n\nF-4.23 例：スコアラーが、ヘッドコーチが請求した全てのヘッドコーチチャレンジをスコアシートに記入した。\n     解説：スコアラーは認められたヘッドコーチチャレンジのみをスコアシート上のチーム名の下の HCC\n     の横の枠に記入する。左側の枠にクォーターもしくはオーバータイム（Q１、Q２、Q３、Q４、OT）\n     を記入し、右側の枠には HCC が認められた時点での各クォーターまたはオーバータイムの経過時\n     間（分）を数字で記入する。"}];


const SK  = 'jba_rule_record_v3';
const SKR = 'jba_rule_checks_v1';  // 競技規則チェック用

let record   = {};  // クイズ回答記録
let rChecks  = {};  // {key: {checked:bool, weak:bool}}
let listFilter = 'all';
let ruleTab  = 'rule';
let ruleFilter = 'all';
let mode     = 'order';
let queue    = [], qIdx=0, session={correct:0,wrong:0}, chosen=null;

function loadRecord() {
  try {
    const r = JSON.parse(localStorage.getItem(SK)||'{}');
    ALL.forEach(c => { if(!r[c.id]) r[c.id]={correct:0,wrong:0,history:[]}; if(!r[c.id].history) r[c.id].history=[]; });
    return r;
  } catch(e) { const r={}; ALL.forEach(c=>{ r[c.id]={correct:0,wrong:0,history:[]}; }); return r; }
}
function saveRecord() {
  try { localStorage.setItem(SK, JSON.stringify(record)); showToast(); } catch(e) {}
}
function loadRChecks() {
  try { return JSON.parse(localStorage.getItem(SKR)||'{}'); } catch(e) { return {}; }
}
function saveRChecks() {
  try { localStorage.setItem(SKR, JSON.stringify(rChecks)); } catch(e) {}
}
function clearRecord() {
  if(!confirm('クイズの学習記録をリセットしますか？')) return;
  ALL.forEach(c => { record[c.id]={correct:0,wrong:0,history:[]}; });
  saveRecord(); renderRecordTab();
}
function showToast() {
  const t=document.getElementById('toast'); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1600);
}

// ══════════════════════════════════════════
// タブ切替
// ══════════════════════════════════════════
function switchTab(t) {
  ['quiz','list','rule','record'].forEach(id=>{
    document.getElementById('tab-'+id).style.display = id===t?'':'none';
    document.getElementById('tnav-'+id).classList.toggle('active', id===t);
  });
  if(t==='list')  { renderListSummary(); renderList(); }
  if(t==='rule')  { renderRuleTab(); }
  if(t==='record'){ renderRecordTab(); }
}

// ══════════════════════════════════════════
// 学習タブ
// ══════════════════════════════════════════
function getWeakIds() {
  return ALL.filter(c=>{ const r=record[c.id]; const t=r.correct+r.wrong; return t>0&&r.correct/t<0.5; }).map(c=>c.id);
}
function buildQueue() {
  if(mode==='order') queue=[...ALL];
  else if(mode==='shuffle') queue=[...ALL].sort(()=>Math.random()-.5);
  else queue=ALL.filter(c=>getWeakIds().includes(c.id));
  qIdx=0; session={correct:0,wrong:0}; chosen=null;
}
function setMode(m) {
  mode=m;
  ['order','shuffle','wrong'].forEach(k=>document.getElementById('tab-'+k).classList.toggle('active',k===m));
  buildQueue(); renderQuiz();
}
function showQV(v) {
  ['quiz','done','empty'].forEach(id=>document.getElementById(id+'-area').style.display='none');
  document.getElementById(v+'-area').style.display='';
}
function updateStats() {
  document.getElementById('st-total').textContent=ALL.length;
  document.getElementById('st-correct').textContent=session.correct;
  document.getElementById('st-wrong').textContent=session.wrong;
  document.getElementById('st-left').textContent=Math.max(0,queue.length-qIdx);
  const pct=queue.length>0?Math.round(qIdx/queue.length*100):0;
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('nav-info').textContent='問題 '+(qIdx+1)+'/'+queue.length;
  document.getElementById('nav-pct').textContent=pct+'%';
}
function renderQuiz() {
  updateStats();
  if(mode==='wrong'&&queue.length===0){showQV('empty');return;}
  if(qIdx>=queue.length){
    showQV('done');
    const t=queue.length,pct=t>0?Math.round(session.correct/t*100):0;
    document.getElementById('d-total').textContent=t;
    document.getElementById('d-correct').textContent=session.correct;
    document.getElementById('d-wrong').textContent=session.wrong;
    document.getElementById('d-pct').textContent=pct+'%';
    return;
  }
  showQV('quiz');
  const c=queue[qIdx];
  document.getElementById('q-meta').textContent='No.'+c.id+'　'+c.num+'　難易度 '+c.level;
  document.getElementById('q-ref').textContent=c.ref;
  document.getElementById('q-text').textContent=c.q;
  const r=record[c.id]||{correct:0,wrong:0}; const tot=r.correct+r.wrong;
  const he=document.getElementById('q-hist');
  if(tot>0){const rate=Math.round(r.correct/tot*100); he.innerHTML='<span class="chip">累計 '+tot+' 回</span><span class="chip chip-ok">正解 '+r.correct+' 回</span><span class="chip chip-ng">不正解 '+r.wrong+' 回</span><span class="chip">正答率 '+rate+'%</span>';}
  else he.innerHTML='<span class="chip">初挑戦</span>';
  const bo=document.getElementById('btn-o'),bx=document.getElementById('btn-x');
  bo.className='cbtn';bo.disabled=false;bx.className='cbtn';bx.disabled=false;
  chosen=null;
  document.getElementById('result-area').style.display='none';
  document.getElementById('choice-btns').style.display='grid';
}
function choose(ua) {
  if(chosen!==null)return; chosen=ua;
  const c=queue[qIdx]; const ok=(ua===c.ans);
  if(ok)session.correct++;else session.wrong++;
  updateStats();
  const rec=record[c.id]; if(ok)rec.correct++;else rec.wrong++;
  rec.history.push({ans:ua,correct:ok,ts:new Date().toISOString()});
  if(rec.history.length>50)rec.history=rec.history.slice(-50);
  saveRecord();
  const bo=document.getElementById('btn-o'),bx=document.getElementById('btn-x');
  bo.disabled=true;bx.disabled=true;
  if(ua===true){bo.className=ok?'cbtn cbtn-correct':'cbtn cbtn-wrong';if(!ok)bx.className='cbtn cbtn-reveal';}
  else{bx.className=ok?'cbtn cbtn-correct':'cbtn cbtn-wrong';if(!ok)bo.className='cbtn cbtn-reveal';}
  const al=c.ans?'○':'×',bc=c.ans?'badge-o':'badge-x';
  document.getElementById('result-card').innerHTML=
    '<div class="res-head"><div class="ans-badge '+bc+'">'+al+'</div>'+(ok?'<span class="res-lbl lbl-ok">✓ 正解！</span>':'<span class="res-lbl lbl-ng">✗ 不正解</span>')+'</div>'
    +'<div class="rsec"><div class="rsec-ttl">解説</div><div class="rsec-txt">'+esc(c.explanation)+'</div></div>'
    +'<div class="rsec"><div class="rsec-ttl">根拠条文</div><div class="rule-box"><div class="rule-src">'+esc(c.ruleSrc)+'</div><div class="rule-txt">'+esc(c.ruleText).replace(/\n/g,'<br>')+'</div></div></div>';
  document.getElementById('choice-btns').style.display='none';
  document.getElementById('result-area').style.display='block';
}
function nextQ(){qIdx++;renderQuiz();}
function restart(){buildQueue();renderQuiz();}

// ══════════════════════════════════════════
// 一覧タブ
// ══════════════════════════════════════════
function setListFilter(f){
  listFilter=f;
  ['all','weak','new'].forEach(k=>document.getElementById('f-'+k).classList.toggle('active',k===f));
  renderList();
}
function renderListSummary(){
  const totC=Object.values(record).reduce((s,r)=>s+r.correct,0);
  const totW=Object.values(record).reduce((s,r)=>s+r.wrong,0);
  const tot=totC+totW;
  const ans=ALL.filter(c=>(record[c.id].correct+record[c.id].wrong)>0).length;
  document.getElementById('ls-answered').textContent=ans;
  document.getElementById('ls-weak').textContent=getWeakIds().length;
  document.getElementById('ls-rate').textContent=tot>0?Math.round(totC/tot*100)+'%':'0%';
}
function renderList(){
  const kw=(document.getElementById('list-search').value||'').toLowerCase();
  let items=[...ALL];
  if(listFilter==='weak') items=items.filter(c=>getWeakIds().includes(c.id));
  if(listFilter==='new')  items=items.filter(c=>(record[c.id].correct+record[c.id].wrong)===0);
  if(kw) items=items.filter(c=>c.q.toLowerCase().includes(kw)||c.explanation.toLowerCase().includes(kw)||c.num.toLowerCase().includes(kw)||String(c.id).includes(kw));
  const wrap=document.getElementById('q-list-wrap');
  if(!items.length){wrap.innerHTML='<div style="text-align:center;padding:28px;color:#98a2b3;font-size:13px">該当なし</div>';return;}
  wrap.innerHTML=items.map(c=>{
    const r=record[c.id]||{correct:0,wrong:0}; const tot=r.correct+r.wrong;
    const isNew=tot===0; const rate=isNew?-1:Math.round(r.correct/tot*100); const isW=!isNew&&rate<50;
    const nc=isNew?'no-new':isW?'no-weak':'no-good';
    const rc=isNew?'ql-rate-new':isW?'ql-rate-ng':'ql-rate-ok';
    const rs=isNew?'未回答':rate+'%';
    const cb=isNew?0:rate,wb=isNew?0:100-rate;
    return `<div class="ql-card" id="qlc-${c.id}">
      <div class="ql-hdr" onclick="toggleDetail(${c.id})">
        <span class="ql-no ${nc}">No.${c.id}</span>
        <span class="ql-chapter">${esc(c.num)}　${esc(c.ref)}</span>
        <span class="ql-rate ${rc}">${rs}</span>
      </div>
      <div class="ql-bar-row"><div class="ql-bar"><div class="ql-bar-c" style="width:${cb}%"></div><div class="ql-bar-w" style="width:${wb}%"></div></div><span class="ql-bar-nums">${isNew?'—':r.correct+'/'+tot+'回'}</span></div>
      <div class="ql-detail" id="qld-${c.id}">
        <div class="ql-hist-chips">${isNew?'<span class="chip">初挑戦</span>':'<span class="chip">累計 '+tot+' 回</span><span class="chip chip-ok">正解 '+r.correct+' 回</span><span class="chip chip-ng">不正解 '+r.wrong+' 回</span><span class="chip">正答率 '+rate+'%</span>'}</div>
        <div class="ql-q-text">${esc(c.q)}</div>
        <div class="ql-ans-row"><div class="ql-ans-badge ${c.ans?'badge-o':'badge-x'}">${c.ans?'○':'×'}</div><div class="ql-ans-label">正解：${c.ans?'○ 正しい':'× 誤り'}</div></div>
        <div class="ql-section"><div class="ql-sec-ttl">解説</div><div class="ql-sec-txt">${esc(c.explanation)}</div></div>
        <div class="ql-section"><div class="ql-sec-ttl">根拠条文</div><div class="ql-rule-box"><div class="ql-rule-src">${esc(c.ruleSrc)}</div><div class="ql-rule-txt">${esc(c.ruleText).replace(/\n/g,'<br>')}</div></div></div>
        <button class="ql-start-btn" onclick="startFromQ(${c.id})">この問題から学習を始める</button>
      </div></div>`;
  }).join('');
}
function toggleDetail(id){document.getElementById('qld-'+id).classList.toggle('open');}
function startFromQ(id){
  mode='order';
  ['order','shuffle','wrong'].forEach(k=>document.getElementById('tab-'+k).classList.toggle('active',k==='order'));
  queue=[...ALL]; qIdx=Math.max(0,ALL.findIndex(c=>c.id===id));
  session={correct:0,wrong:0}; chosen=null;
  switchTab('quiz'); renderQuiz();
}

// ══════════════════════════════════════════
// 競技規則タブ
// ══════════════════════════════════════════
function switchRuleTab(t){
  ruleTab=t;
  document.getElementById('rsw-rule').classList.toggle('active',t==='rule');
  document.getElementById('rsw-impl').classList.toggle('active',t==='impl');
  setRuleFilter('all');
}
function setRuleFilter(f){
  ruleFilter=f;
  ['all','weak','uncheck'].forEach(k=>document.getElementById('rf-'+k).classList.toggle('active',k===f));
  document.getElementById('rf-weak').classList.toggle('weak-active',f==='weak');
  renderRuleTab();
}

function rKey(item){ return (item.type||ruleTab)+':'+item.sec_no; }

function toggleCheck(key,field,val){
  if(!rChecks[key]) rChecks[key]={checked:false,weak:false};
  rChecks[key][field]=val;
  saveRChecks();
  updateRuleSummary();
}

function getItems(){
  return ruleTab==='rule' ? RULE_DATA : IMPL_DATA;
}

function updateRuleSummary(){
  const items=getItems();
  const total=items.length;
  const checked=items.filter(i=>{ const k=rKey(i); return rChecks[k]&&rChecks[k].checked; }).length;
  const weak=items.filter(i=>{ const k=rKey(i); return rChecks[k]&&rChecks[k].weak; }).length;
  document.getElementById('rs-total').textContent=total;
  document.getElementById('rs-checked').textContent=checked;
  document.getElementById('rs-weak').textContent=weak;
}

function renderRuleTab(){
  updateRuleSummary();
  let items=getItems();
  if(ruleFilter==='weak')    items=items.filter(i=>{ const k=rKey(i); return rChecks[k]&&rChecks[k].weak; });
  if(ruleFilter==='uncheck') items=items.filter(i=>{ const k=rKey(i); return !rChecks[k]||!rChecks[k].checked; });

  const wrap=document.getElementById('rule-list-wrap');
  if(!items.length){
    wrap.innerHTML='<div style="text-align:center;padding:28px;color:#98a2b3;font-size:13px">'+(ruleFilter==='weak'?'苦手マークが付いた項目はありません':'該当する項目がありません')+'</div>';
    return;
  }

  // 条ごとにグループ化
  const groups={};
  const groupOrder=[];
  items.forEach(item=>{
    const g=item.art_no+'|'+item.art_title;
    if(!groups[g]){groups[g]=[];groupOrder.push(g);}
    groups[g].push(item);
  });

  wrap.innerHTML=groupOrder.map(g=>{
    const [art_no,art_title]=g.split('|');
    const gitems=groups[g];
    return `<div style="margin-bottom:10px">
      <div style="font-size:12px;font-weight:700;color:#3b5bdb;padding:7px 4px;border-bottom:2px solid #3b5bdb;margin-bottom:6px">
        第${art_no}条　${esc(art_title)}
      </div>
      ${gitems.map(item=>{
        const k=rKey(item);
        const ch=rChecks[k]&&rChecks[k].checked;
        const wk=rChecks[k]&&rChecks[k].weak;
        const numCls=wk?'rc-num rc-weak':'rc-num';
        return `<div class="rule-card" id="rc-${k.replace(/[:.]/g,'_')}">
          <div class="rc-header" onclick="toggleRuleDetail('${k}')">
            <span class="${numCls}">${esc(item.sec_no)}</span>
            <span class="rc-art">${esc(item.art_title||'')}</span>
            <div class="rc-checks" onclick="event.stopPropagation()">
              <div class="rc-check-wrap">
                <span class="rc-check-lbl">確認</span>
                <input type="checkbox" class="rc-cb" ${ch?'checked':''} onchange="toggleCheck('${k}','checked',this.checked)">
              </div>
              <div class="rc-check-wrap">
                <span class="rc-check-lbl">苦手</span>
                <input type="checkbox" class="rc-cb weak-cb" ${wk?'checked':''} onchange="toggleCheck('${k}','weak',this.checked)">
              </div>
            </div>
          </div>
          <div class="rc-body" id="rb-${k.replace(/[:.]/g,'_')}">
            <div class="rc-text">${esc(item.body)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

function toggleRuleDetail(k){
  const el=document.getElementById('rb-'+k.replace(/[:.]/g,'_'));
  if(el) el.classList.toggle('open');
}

// ══════════════════════════════════════════
// 記録タブ
// ══════════════════════════════════════════
function renderRecordTab(){
  const totC=Object.values(record).reduce((s,r)=>s+r.correct,0);
  const totW=Object.values(record).reduce((s,r)=>s+r.wrong,0);
  const tot=totC+totW; const rate=tot>0?Math.round(totC/tot*100):0;
  document.getElementById('rec-total-ans').textContent=tot;
  document.getElementById('rec-total-ok').textContent=totC;
  document.getElementById('rec-total-rate').textContent=rate+'%';
  document.getElementById('rec-list-wrap').innerHTML=ALL.map(c=>{
    const r=record[c.id]||{correct:0,wrong:0}; const t=r.correct+r.wrong;
    const isNew=t===0; const rate=isNew?-1:Math.round(r.correct/t*100); const isW=!isNew&&rate<50;
    const nc=isNew?'no-new':isW?'no-weak':'no-good';
    const rc=isNew?'ql-rate-new':isW?'ql-rate-ng':'ql-rate-ok';
    const cb=isNew?0:rate,wb=isNew?0:100-rate;
    return `<div class="ql-card"><div class="ql-hdr">
      <span class="ql-no ${nc}">No.${c.id}</span>
      <span class="ql-chapter">${esc(c.num)}</span>
      <span class="ql-rate ${rc}">${isNew?'未回答':rate+'%'}</span>
    </div><div class="ql-bar-row"><div class="ql-bar"><div class="ql-bar-c" style="width:${cb}%"></div><div class="ql-bar-w" style="width:${wb}%"></div></div><span class="ql-bar-nums">${isNew?'—':r.correct+'/'+t+'回'}</span></div></div>`;
  }).join('');
}

// ══════════════════════════════════════════
// ユーティリティ
// ══════════════════════════════════════════
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════
// 起動
// ══════════════════════════════════════════
record  = loadRecord();
rChecks = loadRChecks();
buildQueue();
renderQuiz();

</script>
</body>
</html>
