ンズへ出た。\n⒝ジャンパー以外のプレーヤーあるいはコートに触れる前にA１にキャッチされた。\n解説：どちらの場合においても、A１のバイオレーションの結果として、チームBはスローインを与えられる。ショットクロックはスローインがバックコートで行われる場合は24秒、フロントコートで行われる場合は14 秒となる。スローインをするチームB のプレーヤーにボールが与えられたらすぐに、チームA は最初のオルタネイティングポゼッションのスローインの権利を得る。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-7", "body": "12-７  例：クルーチーフはゲーム開始のジャンプボールをトスした。ジャンパーであるA１がボールに正当に触れた直後に、B１はテクニカルファウルを宣せられた。\n解説：誰もリバウンドの位置に着かずに1 本のフリースローがチームA のいずれかのプレーヤーに与えられる。チームAのプレーヤーにフリースローのボールが与えられたらすぐにオルタネイティングポゼッションアローはチームBを示す。ゲームはテクニカルファウルが起きたときにボールがあった場所に最も近いアウトオブバウンズからチームBのオルタネイティングポゼッションのスローインで再開される。チームB のバックコートからのスローインの場合、ショットクロックは24 秒となる。チームB のフロントコートからのスローインの場合、ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-8", "body": "12-８  例：クルーチーフがゲーム開始のジャンプボールをトスした。ジャンパーであるA１がボールに正当に触れた直後に、A２がB２にアンスポーツマンライクファウルをした。\n解説：誰もリバウンドの位置に着かずに2本のフリースローがB２に与えられる。B２に最初のフリースローのボールが与えられたらすぐにオルタネイティングポゼッションアローはチームAを示す。ゲームは（アンスポーツマンライクファウルの罰則の一部として）フロントコートのスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-9", "body": "12-９  例：チームB はオルタネイティングポゼッションの手順によってスローインを与えられるはずが、審判あるいはスコアラー、もしくはその両方が誤ってスローインをチームA に与えてしまった。\n解説：ボールがコート上のプレーヤーに正当に触れた後は、誤りは訂正することができない。その誤りの結果、チームBは次のジャンプボールシチュエーションでのオルタネイティングポゼッションのスローインの権利を失うことはない。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-10", "body": "12-10  例：第１クォーター終了を知らせるゲームクロックのブザーと同時に、B１はA１に対してアンスポーツマンライクファウルをした。審判はB１のファウルが起きるよりも先にゲームクロックのブザーがなっていたと判定した。チームA は第２クォーターを開始するときにオルタネイティングポゼッションのスローインを与えられることになっていた。\n解説：アンスポーツマンライクファウルはプレーのインターバルに起きている。第２クォーターの開始前に、誰もリバウンドの位置に着かずに2 本のフリースローがA１に与えられる。ゲームはフロントコートのスローインラインからチームAのスローインで再開される。ショットクロックは14秒となる。チームAは次のジャンプボールシチュエーションでのオルタネイティングポゼッションのスローインの権利を失うことはない。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-11", "body": "12-11  例：第３クォーター終了を知らせるゲームクロックのブザーが鳴った直後にB１はテクニカルファウルを宣せられた。チームAは第4クォーターを開始するときにオルタネイティングポゼッションのスローインを与えられることになっていた。\n解説：第４クォーターの開始前に誰もリバウンドの位置に着かずに1本のフリースローがチームAのいずれかのプレーヤーに与えられる。第4 クォーターはセンターラインの延長線上からチームA のスローインで開始される。ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-12", "body": "12-12  例：A１はボールを持ってジャンプし、B１にブロックをされた。その後両プレーヤーは片手または両手をしっかりとボールにかけている状態でコートに着地した。\n解説：ジャンプボールシチュエーションとなる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-13", "body": "12-13  例：A１はボールを持ってジャンプし、B１に正当にブロックされた。そのあと、A１は片手または両手でボールをしっかりと持ったままコートに着地したが、そのときB１はすでにボールに触れていなかった。\n解説：A１のトラベリングのバイオレーションである。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-14", "body": "12-14  例：空中にいるA１とB１の手はしっかりとボールにかかっている。コートに着地したときにA１の片足が境界線の上についた。\n解説：ジャンプボールシチュエーションとなる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-15", "body": "12-15  例：A１はフロントコートからボールを持ってジャンプし、B１にそのボールをブロックされた。両プレーヤーが片手または両手をしっかりとボールにかけている状態で着地したときにA１の片足がバックコートについた。\n解説：ジャンプボールシチュエーションとなる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-16", "body": "12-16  条文：ライブのボールがリングとバックボードの間に挟まったときは、複数のフリースローの間やファウルの罰則の一部にボールのポゼッションがある場合を除いて、いかなるときもオルタネイティングポゼッションのスローインを伴うジャンプボールシチュエーションになる。ショットクロックは、オルタネイティングポゼッションの手順によって、それまでオフェンスをしていたチームに継続してスローインが与えられるときは14秒となり、相手チームにスローインが与えられるときは24秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-17", "body": "12-17  例：A１のショットでボールがリングとバックボードの間に挟まった。\n⒜チームA は\n⒝チームB はオルタネイティングポゼッションの手順によってスローインを与えられることになっていた。\n解説：チームA のフロントコート、チームB のバックコートのエンドラインからスローインが与えられ、\n⒜チームA のショットクロックは14 秒になる。\n⒝チームB のショットクロックは24 秒になる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-18", "body": "12-18  例：ショットクロックのブザーが鳴ったとき、A１のショットのボールは空中にあり、そのあとボールがリングとバックボードの間に挟まった。オルタネイティングポゼッションアローはチームA を示している。\n解説：ジャンプボールシチュエーションとなる。チームA にフロントコートのエンドラインからスローインが与えられるショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-19", "body": "12-19  例：B２はツーポイントゴールのショットの動作（アクトオブシューティング）中のA１にアンスポーツマンライクファウルをした。誰もリバウンドの位置に着いていない最後のフリースローで、\n⒜ボールがリングとバックボードの間に挟まった。\n⒝ボールを放つとき、A１がフリースローラインを踏んだ。\n⒞ボールがリングに触れなかった。\n解説：全ての場合において、フリースローは失敗とみなされる。ゲームはフロントコートのスローインラインからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-20", "body": "12-20  例：クォーター開始のセンターラインの延長線上からのA１のスローインのあと、ボールがチームA のフロントコートのリングとバックボードの間に挟まった。\n解説：ジャンプボールシチュエーションとなる。オルタネイティングポゼッションアローは速やかに逆向きになりチームB を示す。ゲームはバックボードの真後ろを除いたエンドラインからチームB のスローインで再開される。ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-21", "body": "12-21  例：オルタネイティングポゼッションアローはチームAを示している。第１クォーターの後のプレーのインターバル中に、B１はA１にアンスポーツマンライクファウルをした。誰もリバウンドの位置に着かずに2 本のフリースローがA１に与えられ、フロントコートのスローインラインからチームA のスローインで第２クォーターが始められた。オルタネイティングポゼッションアローは逆向きにならず、チームAを示したままとなっている。スローインのあと、ボールがチームAのフロントコートのリングとバスケットの間に挟まった。\n解説：ジャンプボールシチュエーションとなる。ゲームはバックボードの真後ろを除いたエンドラインからチームAのスローインで再開される。ショットクロックは14秒となる。チームAのスローインが終わった直後に、オルタネイティングポゼッションアローは逆向きになる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-22", "body": "12-22  条文：ヘルドボールは、両チームの１人あるいはそれ以上のプレーヤーがボールに片手または両手をしっかりとかけて、どちらのプレーヤーも乱暴にしなければそのボールのコントロールを得られないときに宣せられる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-23", "body": "12-23  例：ボールを持っているA１は得点をするためにバスケットに向かってひと続きの動作をしている。このときB１が手をしっかりとボールにかけ、A１はトラベリングのルールで定められている範囲を超えてステップを踏んだ。\n解説：ジャンプボールシチュエーションとなる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-24", "body": "12-24  条文： オルタネイティングポゼッションのスローインの間にそのチームがバイオレーションを宣せられたとき、そのチームはオルタネイティングポゼッションのスローインの権利を失う。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-25", "body": "12-25  例：あるクォーターのゲームクロック残り4:17 で、オルタネイティングポゼッションのスローインの間に、\n⒜スローインをするA１が、ボールを持ったままコートに入った。\n⒝スローインのボールが境界線を越える前に、A２は手を動かして境界線を越えた。\n⒞スローインをするA１が、ボールを手離すまでに５秒以上が経過した。\n解説：全ての場合において、A１もしくはA２のバイオレーションである。ゲームは元のスローインの位置からチームB のスローインで再開される。オルタネイティングポゼッションアローは速やかに逆向きになり、チームB を示す。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-26", "body": "12-26  条文：ショットクロックに時間が残っておらず、オルタネイティングポゼッションアローがチームAを示している状態でジャンプボールシチュエーションが起きたときはオルタネイティングポゼッションの手順は適用できず、ショットクロックバイオレーションとなる。したがってスローインのボールがチームB に与えられる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-27", "body": "12-27  例：A1 のショットのボールが空中にある間にショットクロックのブザーが鳴った。その後ボールは\n⒜バスケットに入った。\n⒝リングに弾んだが、バスケットには入らなかった。\n⒞リングに触れなかった。\n(b)と(c)では直後にヘルドボールが宣せられた。\n解説：\n⒜では、ショットクロックバイオレーションは起きていない。A1 の得点は認められる。ゲームはエンドラインの外側からチームB のスローインで再開される。\n⒝では、オルタネイティングポゼッションアローがチームA を示していた場合、ゲームはヘルドボールが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは14 秒となる。オルタネイティングポゼッションアローがチームB を示していた場合、ゲームはヘルドボールが起きた場所に最も近いアウトオブバウンズからチームB のスローインで再開される。ショットクロックは24 秒となる。\n⒞では、ショットクロックバイオレーションとなる。オルタネイティングポゼッションアローの示す方向は関係ない。ゲームはヘルドボールが起きた場所に最も近いアウトオブバウンズからチームB のスローインで再開される。ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "12", "art_title": "ジャンプボール", "sec_no": "12-28", "body": "12-28  例：A1 のショットのボールが空中にある間にショットクロックのブザーが鳴った。ボールは\n⒜バスケットに入った。\n⒝リングに弾んだが、バスケットには入らなかった。\n⒞リングに触れなかった。\nその直後にA2 もしくはB2 がテクニカルファウルを宣せられた。\n解説：\n全ての場合において、 誰もリバウンドの位置に着かずに、1 本のフリースローがチームA のいずれかのプレーヤー（B2 のテクニカルファウルの場合）もしくはチームB のいずれかのプレーヤー（A2 のテクニカルファウルの場合）に与えられる。\n⒜では、ショットクロックバイオレーションは起きていない。A1 の得点は認められる。ゲームはエンドラインの外側からチームB のスローインで再開される。\n⒝では、オルタネイティングポゼッションアローがチームA を示していた場合、ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは14 秒となる。オルタネイティングポゼッションアローがチームB を示していた場合、ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからチームB のスローインで再開される。ショットクロックは24 秒となる。\n⒞では、ショットクロックバイオレーションとなる。オルタネイティングポゼッションアローの示す方向は関係ない。ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからチームB のスローインで再開される。ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "13", "art_title": "ボールの扱い方", "sec_no": "13-1", "body": "13-１  条文：ゲーム中、ボールは手で扱わなければならない。プレーヤーが不当に以下の行為を行うことはバイオレーションである。\n・ボールを脚の間に挟んでパスもしくはショットをする振りをすること。\n・故意に頭、拳、脚、足を使ってボールにプレーすること。"}, {"type": "impl", "art_no": "13", "art_title": "ボールの扱い方", "sec_no": "13-2", "body": "13-２  例：A１はドリブルを終えた。A１は足にボールを挟んでパスやショットをする振りをした。\n解説：A１の脚で不当にボールを扱うバイオレーションである。"}, {"type": "impl", "art_no": "13", "art_title": "ボールの扱い方", "sec_no": "13-3", "body": "13-３  例：A１が、速攻で相手チームのバスケットに向かって走るA２にパスをした。ボールをキャッチする前に、A２が意図的に頭でボールに触れた。\n解説：A２の不当に頭を使ってボールにプレーするバイオレーションである。"}, {"type": "impl", "art_no": "13", "art_title": "ボールの扱い方", "sec_no": "13-4", "body": "13-４  条文：プレーヤーの身長や腕の長さを増やすための行為は許されていない。ボールにプレーするためにチームメイトを持ち上げることは、バイオレーションである。"}, {"type": "impl", "art_no": "13", "art_title": "ボールの扱い方", "sec_no": "13-5", "body": "13-５  例：A１は相手チームのバスケットの下でチームメイトのA２を抱き上げ、持ち上げた。A３はA２にボールをパスし、A２はバスケットの中にボールをダンクした。\n解説：チームA のバイオレーションである。A２のゴールは認められない。ゲームはバックコートのサイドラインのフリースローラインの延長線上からチームB のスローインで再開される。"}, {"type": "impl", "art_no": "14", "art_title": "ボールのコントロール", "sec_no": "14-1", "body": "14-１  条文：チームコントロールは、そのチームのプレーヤーがライブのボールを持つかドリブルをしたとき、あるいはスローインやフリースローのためにボールを与えられたときに始まる。"}, {"type": "impl", "art_no": "14", "art_title": "ボールのコントロール", "sec_no": "14-2", "body": "14-２  例：ゲームクロックが止まっているかどうかにかかわらず、スローインもしくはフリースローで、プレーヤーが意図的にボールを取ることを遅らせた。\n解説：スローインを行う位置の最も近くのフロアやフリースローラインのコートに審判がボールを置いたとき、ボールはライブとなり、チームコントロールは始まる。"}, {"type": "impl", "art_no": "14", "art_title": "ボールのコントロール", "sec_no": "14-3", "body": "14-３  例：チームAは15秒間ボールをコントロールしている。A１はA２にボールをパスし、ボールは境界線を越えた。B１はボールをキャッチしようとコート内からジャンプをして境界線を越えた。B１はまだ空中にいる間に、\n⒜片手、または両手でボールを弾き\n⒝ボールを両手でキャッチ、またはボールを片手で支え持ちボールをコートに戻し、A２がキャッチした。\n解説：\n⒜チームA は引き続きボールをコントロールしている。ショットクロックは継続となる。\n⒝B１によってチームB はボールのチームコントロールを得ている。その後A２によってチームA は再びボールのチームコントロールを得たことになる。ショットクロックは新たに24 秒となる。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作", "sec_no": "15-1", "body": "15-１  条文：動きながらではないショットでのショットの動作（アクトオブシューティング）はプレーヤーが相手チームのバスケットに向けて、ボールを上方に動かし始めたときに始まる。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作", "sec_no": "15-2", "body": "15-２  例：A１はバスケットへのドライブで、ボールを上方に動かさずにコート上に両足を着けて正当に止まった。このとき、B１がA１にファウルをした。\n解説：A１はまだボールをバスケットに向かって上方に動かし始めていないことから、B１のファウルはショットの動作（アクトオブシューティング）中のプレーヤーに対して起こってはいない。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作", "sec_no": "15-3", "body": "15-３  条文：バスケットへのドライブでのひと続きの動作でのショットの動作（アクトオブシューティング）とは、ショットの動作に先立って、プレーヤーがドリブルを終え、もしくは空中でボールをキャッチし、片手または両手でボールを支え持ったときに始まる。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作", "sec_no": "15-4", "body": "15-４  例：バスケットへのドライブでA１は両手でボールを持ってドリブルを終え、ショットの動作を始めた。\nこのとき、B１がA１にファウルをした。ボールはバスケットに入らなかった。\n解説：B１のファウルはショットの動作（アクトオブシューティング）中のプレーヤーに対して起こっている。A１は2本のフリースローを与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作", "sec_no": "15-5", "body": "15-５  例：A１はジャンプして空中でスリーポイントゴールのショットを放った。A１の両足がコートに着く前にB１がA１にファウルをした。ボールはバスケットに入らなかった。\n解説：両足がコートに着くまでA１はショットの動作（アクトオブシューティング）中である。A１に3 本のフリースローが与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作", "sec_no": "15-6", "body": "15-６  例：フロントコートで、両手でボールを持っているA1 がB1 にファウルをした。これはチームコントロールファウルであった。A1 はひと続きの動作で進みながら、ボールをバスケットの中に投げた。\n解説：A1のゴールは認められない。ゲームはバックコートのフリースローラインの延長線上からチームB のスローインで再開される。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作", "sec_no": "15-7", "body": "15-７  例：バスケットに向かってドライブしていて前に踏み出した足がまだコートに着いているA1にB1がファウルをした。A1はショットの動作（アクトオブシューティング）を続けたが、B1のファウルによってボールが一時的にA1 の手を離れた。A1 はそのボールを両手でキャッチし、ひと続きの動作で得点した。\n【補足】B1がファウルをしたときには、A1はショットのためにボールを手に持って、ショットの動作（アクトオブシューティング）に入っている状態。\n解説：B1のファウルはA1のショットの動作（アクトオブシューティング）に対して起きている。ボールが一時的にA1 の手から離れたとしても、A1 はまだボールをコントロールしており、ひと続きのショットの動作（アクトオブシューティング）は続いている。得点は認められ、1本のフリースローがA1に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作", "sec_no": "15-8", "body": "15-８  条文：ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされた後にパスをしたときは、もはやショットの動作中であるとはみなされない。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作", "sec_no": "15-9", "body": "15-９  例：B１がショットの動作（アクトオブシューティング）中のA１にファウルをし、このクォーター3個目のチームファウルであった。ファウルのあと、A１はA２にボールをパスした。\n解説：A１がA２にボールをパスしたとき、ショットの動作（アクトオブシューティング）は終わる。ゲームはファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作", "sec_no": "15-10", "body": "15-10  条文：プレーヤーがショットの動作（アクトオブシューティング）中にファウルをされたあと、トラベリングのバイオレーションをして得点した場合、ゴールは認められず、2本もしくは3本のフリースローを与えられる。"}, {"type": "impl", "art_no": "15", "art_title": "ショットの動作", "sec_no": "15-11", "body": "15-11  例：ツーポイントゴールのために両手でボールを持ったA１はバスケットに向かってドライブをした。B１はA１にファウルし、その後A１はトラベリングのバイオレーションをした。ボールはバスケットに入った。\n解説：A１のゴールは認められない。A１は２本のフリースローを与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-1", "body": "16-１  条文：ゴールの得点は、ショットが放たれたコート上の位置によって定義される。ツーポイントゴールエリアから放たれたゴールには２点、スリーポイントゴールエリアから放たれたゴールには３点が認められる。攻撃する相手チームのバスケットにボールが入ると得点が与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-2", "body": "16-２  例：A１はスリーポイントゴールエリアからショットを放った。ボールが上昇している間にチームAのツーポイントゴールエリアにいるプレーヤーが正当に触れ、ボールはバスケットに入った。\n解説：A１のショットはスリーポイントゴールエリアから放たれており、3 点がチームA に与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-3", "body": "16-３  例：A１はツーポイントゴールエリアからショットを放った。ボールが上昇している間にチームAのスリーポイントゴールエリアから跳んだB１が正当に触れ、ボールはバスケットに入った。\n解説：A１のショットはツーポイントゴールエリアから放たれており、2 点がチームA に与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-4", "body": "16-４  例：クォーターの始まりで、チームAが自チームのバスケットをディフェンスしているとき、B１が誤って自チームのバスケットに向かってドリブルをし、ゴールを得点した。\n解説：チームA のコート上のキャプテンに２点が与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-5", "body": "16-５  条文：ボールが相手チームのバスケットに入った場合、ゴールの得点は、ボールが手から離れた際のコート上の位置によって定義される。ボールは直接バスケットに入るか、バスケットに入る前にパスのボールがいずれかのプレーヤーもしくはコートに触れてもよい。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-6", "body": "16-６  例：A１はスリーポイントゴールエリアからボールをパスした。\n⒜ボールは直接バスケットに入った。\n⒝ボールはチームA のツーポイントゴールエリアもしくはスリーポイントゴールエリアのいずれかのプレーヤーあるいはコートに触れ、その後バスケットに入った。\n解説：どちらの場合においてもA１のパスはスリーポイントゴールエリアから手放されており、3点がチームA に与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-7", "body": "16-７  例：A１がスリーポイントゴールのショットをした。ボールはA１の手を離れたあと、チームA のツーポイントゴールエリア内のコートに触れた。ボールはバスケットに入った。\n解説：A１のゴールはスリーポインゴールエリアから放たれていることから、3点が認められる。ゲームは通常のゲームクロックが動いていて、ボールがライブの状態でのゴールが成功した後と同様に再開される。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-8", "body": "16-８  例：B１がスリーポイントゴールのショットの動作（アクトオブシューティング）中のA１にファウルをした。ボールはコートに触れ、その後でバスケットに入った。\n解説：A１のゴールは認められない。ショットはボールがコートに触れたときに終わる。審判が笛を吹いたあと、ボールはショットではなくなったことで、ボールは速やかにデッドになる。A１は3本のフリースローを与えられる。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-9", "body": "16-９  例：A１がスリーポイントゴールのショットをした。ボールがA１の手を離れたあと、クォーターの終了を知らせるゲームクロックのブザーが鳴った。ボールはコートに触れ、その後でバスケットに入った。\n解説：A１のゴールは認めらない。ショットはボールがコートに触れたときに終わる。ボールはショットではなくなったことで、クォーターの終了を知らせるゲームクロックのブザーが鳴ったときにボールはデッドになる。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-10", "body": "16-10  例：スローインをするA1がフロントコートでボールをパスした。その後ボールはチームAのフロントコートでスリーポイントエリアにいるいずれかのプレーヤーに正当に触れられ、バスケットに入った。\n解説：スローインのボールであるため、2 点が認められる。プレーヤーがボールに触れたことは正当である。3 点が認められるのはショットもしくはパスのボールがコート上でスリーポイントラインの外側から放たれたときのみである。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-11", "body": "16-11  条文：スローインあるいは最後のフリースローのリバウンドでは、コート内のプレーヤーがボールに触れてからショットを放つまでに常に時間を要する。これはクォーターやオーバータイムの終わり近くでは特に注意を払わなくてはならない。競技時間が終了するまでに、このようなショットを放つためには最低限の時間が必要である。ゲームクロックまたはショットクロックに0.3秒かそれ以上が表示されている場合、クォーターやオーバータイム終了を知らせるゲームクロックやショットクロックのブザーが鳴る前にシューターがボールを放っていたかを決定することは審判の責務である。しかし、ゲームクロックまたはショットクロックに0.2秒あるいは0.1秒が表示されている場合、プレーヤーが得点できる有効なゴールは、ボールをタップするか直接ダンクするかのみで、その場合でもゲームクロックまたはショットクロックに0.0秒が表示されたときにはプレーヤーの片手または両手はボールに触れていてはならない。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-12", "body": "16-12  例：チームA にスローインが与えられ、ゲームクロックまたはショットクロックには、\n⒜0.3 秒\n⒝0.2 秒あるいは0.1 秒が表示されている。\n解説：\n審判は正確な残りの競技時間がクロックに表示されていることを確認する。\n⒜ショットを狙い、その最中にクォーターやオーバータイムの終了を知らせるゲームクロックのブザーまたはショットクロックのブザーが鳴った場合、それらのブザーが鳴る前にボールが放たれたかどうかを決定することは審判の責任である。\n⒝得点が認められるゴールは、スローインでパスされたボールが空中にある間に、タップされたか、直接ダンクされた場合のみである。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-13", "body": "16-13  例：クォーターの終わりで、A１はバスケットへ直接ボールをダンクした。ゲームクロックに0.0 秒が表示されたとき、ボールはまだA１の片手または両手に触れていた。\n解説：A１のゴールは認められない。クォーターの終了を知らせるゲームクロックのブザーが鳴ったとき、ボールはまだA１の手に触れていた。"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-14", "body": "16-14  条文：ゴールの得点は、ライブのボールが上からバスケットに入り、バスケットの中にとどまるか、完全に通過したときに認められる。\n⒜ゲーム中のいずれかの時間帯にディフェンスのチームがタイムアウトを請求し、ゴールが認められたとき、あるいは\n⒝第４クォーターやオーバータイムでゲームクロックに2:00あるいはそれ以下が表示されているとき。\n図2に示すように、ゲームクロックはボールがバスケットにとどまったとき、あるいは完全にバスケットを通過したときに止められる。\n図２ ゴールの得点"}, {"type": "impl", "art_no": "16", "art_title": "得点", "sec_no": "16-15", "body": "16-15  例：第4クォーター残り2:02で、A1が得点し、ボールがバスケットを通過した。ゲームクロック残り2:00 で、B1 がエンドラインでスローインをしようとしている。\n解説：得点されたとき、ゲームクロックは2:01 以上を示している。したがって、ゲームクロックは止められない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-1", "body": "17-１  条文：スローインの間、スローインをするプレーヤー以外のプレーヤーは体のいかなる部分も境界線を越えてはならない。\nスローインをするプレーヤーがボールを手放す前、スローインの動作中にそのプレーヤーのボールを持つ手がコートの内側と外側を分ける境界線上を越える可能性がある。その場合、スローインをするプレーヤーの手の中にまだあるボールに触ってスローインを妨害しないようにするのは、ディフェンスのプレーヤーの責任である。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-2", "body": "17-２  例：第３クォーターで、チームA がバックコートでスローインを与えられた。ボールを持っている間に、\n⒜スローインをするA１が境界線上を越えて手を動かし、ボールが境界線の内側に入った。B１はA１に触れることなく、A１の持っているボールをつかんだ、あるいはボールを弾き出した。\n⒝コート上のA２へのパスを止めるために、B１がスローインをするA１に向かって境界線を越えて手を動かした。\n解説：どちらの場合においても、B１がスローインを妨害しゲームの再開を遅らせている。審判はゲームの遅延行為（ディレイオブゲーム）のバイオレーションを宣する。加えて、B１に口頭で警告が与えられ、その旨はチームB のヘッドコーチにも伝えられる。この警告はゲームの残り時間中、チームBの全てのプレーヤーに適用される。同様の行為がチームBのプレーヤーによって繰り返された場合、テクニカルファウルが宣せられる。チームA のスローインが再度行われ、ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-3", "body": "17-３  例：第３クォーターで、チームAはフロントコートからのスローインを与えられた。スローインをするA１がボールを持っているとき、B１は境界線を越えて手を動かした。ショットクロックは\n⒜7 秒であった。\n⒝17 秒であった。\n解説：B1のスローインのバイオレーションである。加えて、B1に口頭で警告が与えられ、その旨はチームBのヘッドコーチにも伝えられる。この警告はゲームの残り時間中、チームBの全てのプレーヤーに適用される。同様の行為がチームB のプレーヤーによって繰り返された場合、テクニカルファウルが宣せられる。スローインは再度行われる。ショットクロックは\n⒜14 秒となる。\n⒝17 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-4", "body": "17-４  条文：第４クォーター、各オーバータイムでゲームクロックに２:00あるいはそれ以下が表示されているとき、ディフェンスのプレーヤーはスローインを妨害するために、体のどの部分も境界線を越えてはならない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-5", "body": "17-５  例：第４クォーター残り54 秒で、チームA がスローインを与えられることになっている。スローインをするA１にボールが与えられる前に審判はB１に「イリーガルバウンダリラインクロッシング」のシグナルを行い、警告を示した。その後ボールが境界線を越えてスローインされる前に、B１がA１に向かって境界線を越えて体を動かした。\n解説：B１にテクニカルファウルが宣せられる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-6", "body": "17-６  例：第4 クォーター残り51 秒で、チームA がスローインを与えられることになっている。スローインをするA１にボールが与えられる前に審判はB１に「イリーガルバウンダリラインクロッシング」のシグナルを行わず、警告を示さなかった。その後ボールが境界線を越えてスローインされる前に、B１がA１に向かって境界線を越えて体を動かした。\n解説：審判はA１にボールを手渡す前に「イリーガルバウンダリラインクロッシング」のシグナルを示していないため、この時点で審判は笛を吹き、B１は警告を与えられる。この警告はチームB のヘッドコーチにも伝えられ、ゲームの残り時間中、全てのチームB のチームメンバーによる同様の行為に適用される。同様の行為がチームB のプレーヤーによって繰り返された場合、テクニカルファウルが宣せられる。審判は「イリーガルバウンダリラインクロッシング」のシグナルを示し、スローインは再度行われる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-7", "body": "17-７  条文：スローインをするプレーヤーはボールを（手渡しではなく）パスでコート上のチームメイトに渡さなければならない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-8", "body": "17-８  例：スローインでA１がコート上にいるA２にボールを手渡した。\n解説：A１のスローインのバイオレーションである。スローインではボールはA１の手を離れなければならない。チームB は元のスローインと同じ場所からスローインを与えられる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-9", "body": "17-９  条文：スローインの間、ボールがコートに向かってパスされるまで、他のプレーヤーは体のいかなる部分も境界線上を越えてはならない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-10", "body": "17-10  例：規則の違反（ファウルやバイオレーション）のあと、スローインをするA１が審判からボールを受け取った。A１は、\n⒜ボールをフロアに置き、その後A２がそのボールを取った。\n⒝ボールをアウトオブバウンズのエリアにいるA２に手渡した。\n解説：どちらの場合においても、A１が境界線を越えてボールをパスする前にA２の体が境界線を超えており、A２によるバイオレーションである。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-11", "body": "17-11  例：ゲームクロックが動いていて、ボールがライブの状態でのチームAのゴール、あるいは最後のフリースローが成功したあと、チームBにタイムアウトが認められた。タイムアウトのあと、エンドラインからスローインをするB１は審判からボールを受け取った。B１は、\n⒜ボールをフロアに置き、同じくエンドラインの外側にいるB２がボールを取った。\n⒝同じくエンドラインの外にいるB２にボールを手渡した。\n解説：どちらの場合においても、B２の正当なプレーである。ゲームクロックが動いていて、ボールがライブの状態で成功したゴールもしくは成功した最後のフリースローの後のスローインでは、チームBのプレーヤーが５秒以内にボールをコートへパスしなければならないことが唯一の制限である。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-12", "body": "17-12  条文：第４クォーター、オーバータイムでゲームクロックが２:00あるいはそれ以下を表示しているとき、バックコートでボールを与えられることになっているチームにタイムアウトが認められた場合、そのチームのヘッドコーチはタイムアウトのあとで、スローインをフロントコートのスローインラインから行うか、バックコートから行うかを選択する権利を持つ。\n成功したゴールや成功した最後のフリースローに続くタイムアウトの後では、ヘッドコーチはスローインをスコアラーズテーブル側のスローインラインから行うか、反対側のスローインラインから行うかを選択することができる。\nファウルまたはアウトオブバウンズを含むバイオレーションの後のサイドラインまたはエンドラインからのスローインでは、元のスローインと同じ側（スコアラーズテーブル側または反対側）のスローインラインから、フロントコートで行う。\nアンスポーツマンライクファウルやディスクォリファイングファウル、ファイティングに続くタイムアウトの後は、フロントコートのスコアラーズテーブルの反対側のスローインラインからのスローインでゲームが再開される。\nヘッドコーチが選択したあと、その選択は最終的なもので変更することはできない。ゲームクロックが再び動き始める前に追加のタイムアウトが認められ、スローインの場所を変更するようにいずれかのヘッドコーチが更に要求しても、最初の選択は変更することはできない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-13", "body": "17-13  例：第4 クォーター残り35 秒で、A１がバックコートでドリブルをしていたとき、チームB のプレーヤーがボールをフリースローラインの延長線上のアウトオブバウンズに弾き出した。タイムアウトがチームA に認められた。\n解説：遅くともタイムアウトの後で、クルーチーフはスローインをどこから行うかについてチームA のヘッドコーチの選択を聞く。チームAのヘッドコーチは大きな声で英語を使って「フロントコート」あるいは「バックコート」と言い、同時に腕でスローインが行われる場所（フロントコートあるいはバックコート）\nを示す。クルーチーフはチームB のヘッドコーチにチームA のヘッドコーチの選択を知らせる。\nヘッドコーチがフロントコートを選択した場合、スローインはフロントコートのボールがアウトオブバウンズに弾かれた側と同じ側のスローインラインから行われる。\nコート上の両チームのプレーヤーの位置によって、プレーヤーがどこからゲームが再開されるかを理解していることがはっきりとわかる場合のみ、チームA のスローインからゲームが再開される。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-14", "body": "17-14  例：第4クォーター残り44秒、ショットクロック残り17秒で、A１がバックコートでドリブルをしているとき、チームBのプレーヤーがボールをチームAのバックコートのテーブルサイドもしくはオポジットサイドのスローインラインのアウトオブバウンズに弾き出した。その後タイムアウトが、\n⒜チームB に認められた。\n⒝チームA に認められた。\n⒞最初にチームB に、すぐ後にチームA に認められた。（あるいはその反対）\n解説：\n⒜バックコートのボールがアウトオブバウンズに出たスローインラインからチームA のスローインでゲームが再開される。チームA のショットクロックは17 秒となる。\n⒝,⒞チームAのヘッドコーチがフロントコートからのスローインを選択した場合、ゲームはフロントコートのボールがアウトオブバウンズに弾かれた側と同じ側のスローインラインからチームAのスローインで再開される。ショットクロックは14秒となる。バックコートからのスローインを選択した場合、ショットクロックは17 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-15", "body": "17-15  例：第４クォーター残り57 秒で、A１は２本のフリースローを与えられた。２本目のフリースローのときにA１がフリースローラインを踏み、バイオレーションを宣せられた。タイムアウトがチームB に認められた。\n解説：タイムアウトのあと、チームB のヘッドコーチが、\n⒜フロントコートを選択した場合、チームBのスローインはオポジットサイドのスローインラインから行われ、ショットクロックは14 秒となる。\n⒝バックコートを選択した場合、チームBのスローインはオポジットサイドのフリースローラインの延長線上から行われ、ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-16", "body": "17-16  例：第４クォーター残り26 秒で、A１がバックコートで６秒間ドリブルをしているときに、\n⒜B１がボールをアウトオブバウンズに弾き出した。\n⒝B１がファウルをし、このクォーター3 個目のチームファウルであった。\nそしてチームA にタイムアウトが認められた。\n解説：タイムアウトの後：\nどちらの場合においても、チームA のヘッドコーチがフロントコートのスローインラインからのスローインを選択した場合、ショットクロックは14 秒となる。\nフロントコートからのスローインは、ゲームが止められたときにボールがあった側のスローインラインから行われる。\nチームA のヘッドコーチがバックコートからのスローインを選択した場合、ショットクロックは、\n⒜18 秒となる。\n⒝24 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-17", "body": "17-17  例：第４クォーター残り１:24 で、A１がフロントコートでドリブルをしているとき、B１がチームA のバックコートへボールを弾き出し、チームAのいずれかのプレーヤーが再びドリブルを始めた。このとき、B２がボールをチームAのバックコートのテーブルサイドのアウトオブバウンズに弾き出した。ショットクロックは、\n⒜６秒であった。\n⒝17 秒であった。\nタイムアウトがチームA に認められた。\n解説：\nチームAのヘッドコーチがフロントコートのスローインラインからのスローインを選択した場合、スローインはテーブルサイドで行われ、ショットクロックは、\n⒜６秒となる。\n⒝14 秒となる。\nチームA のヘッドコーチがバックコートからのスローインを選択した場合、スローインはボールがアウトオブバウンズに出た元の位置から行われ、ショットクロックは、\n⒜６秒となる。\n⒝17 秒となる。テーブルサイドの"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-18", "body": "17-18  例：第４クォーター残り48秒で、A１がフロントコートでドリブルをしているとき、B１がチームAのバックコートへボールを弾き出し、A２が再びドリブルを始めた。このとき、B２はA２にテーブルサイドでファウルをし、このクォーター3 個目のチームファウルであった。ショットクロックは、\n⒜６秒であった。\n⒜17 秒であった。\nタイムアウトがチームA に認められた。\n解説：どちらの場合においても、タイムアウトの後、チームA のヘッドコーチがフロントコートのスローインラインからのスローインを選択した場合、スローインはテーブルサイドから行われ、ショットクロックは14 秒となる。バックコートからのスローインを選択した場合、ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-19", "body": "17-19  例：第４クォーター残り１:32で、チームAが５秒間ボールをコントロールしていたとき、チームAのバックコートでA１とB１が互いに殴り合い、失格・退場となった。スローインが行われる前にタイムアウトがチームA に認められた。\n解説：ディスクォリファイングファウルの罰則は互いに相殺される。ゲームはバックコートからチームAのスローインで再開される。ただし、タイムアウトのあと、チームAのヘッドコーチがフロントコートのスローインラインからのスローインを選択した場合、ショットクロックは14秒となる。バックコートからのスローインを選択した場合、ショットクロックは19 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-20", "body": "17-20  例：第4クォーター残り１:29、ショットクロック残り19秒で、チームAがフロントコートでボールをコントロールしていたとき、暴力行為の最中にコートに入ったことでA６とB６が失格・退場となった。タイムアウトがチームA に認められた。\n解説：ディスクォリファイングファウルの罰則は互いに相殺される。タイムアウトのあと、ゲームはフロントコートの暴力行為が始まったときにボールがあった場所に最も近いアウトオブバウンズからチームAのスローインで再開される。ショットクロックは19 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-21", "body": "17-21  例：第4 クォーター残り１:18 で、チームA はバックコートからのスローインを与えられた。このときタイムアウトがチームAに認められた。タイムアウトのあと、チームAのヘッドコーチはフロントコートのスローインラインからのスローインを選択した。スローインが行われる前に、チームBのヘッドコーチがタイムアウトを請求した。\n解説：フロントコートからスローインを行うというチームAのヘッドコーチの選択は最終的なものでゲームクロックが再び動き始めるまでは変更することはできない。これは最初のタイムアウトのあと、チームA のヘッドコーチが続けてタイムアウトを請求した場合でも有効である。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-22", "body": "17-22  条文：第１クォーター以外の全てのクォーターと全ての各オーバータイムを開始するとき、スコアラーズテーブルの反対側のセンターラインの延長線上からスローインが行われる。スローインをするプレーヤーは、センターラインをまたいでそれぞれのサイドに片足ずつ置かなければならない。スローインをするプレーヤーにバイオレーションが宣せられた場合、センターラインの延長線上から相手チームにスローインが与えられる。\nただし、ファウルやバイオレーションが直接コートのセンターライン上で宣せられた場合、センターラインに最も近いフロントコートからスローインが行われる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-23", "body": "17-23  例：第２クォーターを開始するとき、センターラインの延長線上でスローインを行うA１が、バイオレーションを宣せられた。\n解説：ゲームはセンターラインの延長線上の最初のスローインの位置からチームBのスローインで再開され、ゲームクロックは10:00、ショットクロックは24秒となる。スローインを行うプレーヤーはコート上のどの位置にいるチームメイトにもパスをすることができる。オルタネイティングポゼッションアローは逆向きになりチームB を示す。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-24", "body": "17-24  例：第３クォーターを開始するとき、センターラインの延長線上でスローインを行うA１がパスをし、A２が触れたボールがチームA の次の位置でアウトオブバウンズに出た。\n⒜フロントコート\n⒝バックコート解説：ゲームは、\n⒜バックコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームB のスローインで再開される。ショットクロックは24 秒となる。\n⒝フロントコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームBのスローインで再開される。ショットクロックは14 秒となる。\nチームAのスローインはA２がボールに触れたときに終わる。オルタネイティングポゼッションアローは逆向きになりチームB を示す。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-25", "body": "17-25  例：以下の違反がコート上のセンターラインで起きた。\n⒜A１がボールをアウトオブバウンズにした。\n⒝A１がチームコントロールファウルを宣せられた。\n⒞A１がトラベリングを宣せられた。\n解説：全ての場合において、ゲームはフロントコートのセンターラインに最も近いアウトオブバウンズからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-26", "body": "17-26  条文：アンスポーツマンライクファウルあるいはディスクォリファイングファウルの後のスローインは、いつでもフロントコートのスローインラインから行われる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-27", "body": "17-27  例：第１クォーターと第２クォーターの間のプレーのインターバル中に、A１はB１にアンスポーツマンライクファウルをした。\n解説：第2クォーターの開始前に、誰もリバウンドの位置に着かずに2本のフリースローがB１に与えられる。ゲームはフロントコートのスローインラインからチームBのスローインで再開される。ショットクロックは14 秒となる。オルタネイティングポゼッションアローは逆向きにならない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-28", "body": "17-28  条文：スローインのときには、次の状況が起こり得る。\n⒜ボールがバスケットの上を通過し、どちらかのチームのプレーヤーがバスケットの下から手を伸ばしてボールに触れる。これはインタフェアレンスのバイオレーションである。\n⒝ボールがリングとバックボードの間に挟まる。これはジャンプボールシチュエーションである。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-29", "body": "17-29  例：スローインで、A１がバスケットの上を通過するようにボールをパスしたとき、どちらかのチームのプレーヤーがバスケットの下から手を伸ばしてボールに触れた。\n解説：インタフェアレンスのバイオレーションである。ゲームは相手チームのフリースローラインの延長線上からのスローインで再開される。ディフェンスのチームがバイオレーションをした場合、ボールはアウトオブバウンズから放たれているため、オフェンスのチームに得点は与えられない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-30", "body": "17-30  例：スローインを行うA１がチームBのバスケットに向かってパスしたボールが、リングとバックボードの間に挟まった。\n解説：これはジャンプボールシチュエーションである。オルタネイティングポゼッションの手続きを適用してゲームが再開される。\n・チームA にスローインが与えられることになっていた場合、ゲームはチームA のフロントコートのバックボードの真後ろを除いたバックボード横のエンドラインから、チームA のスローインで再開される。ショットクロックは14 秒となる。\n・チームB にスローインが与えられることになっていた場合、ゲームはチームB のバックコートのバックボードの真後ろを除いたバックボード横のエンドラインから、チームBのスローインで再開される。ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-31", "body": "17-31  条文：スローインを行うプレーヤーは、ボールを与えられた後にコートの内側にボールを弾ませて、ボールがコート上で他のプレーヤーに触れる前に再びボールに触れることはできない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-32", "body": "17-32  例：スローインを行うA１は、ボールを次の場所にバウンドさせた。\n⒜コートの内側\n⒝コートの外側そしてA１はボールを再びキャッチした。\n解説：\n⒜A１のスローインのバイオレーションである。ボールがA１の手を離れ、ボールがコートの内側に触れたあと、ボールがコート上で他のプレーヤーに触れる前にA１はボールに触れてはならない。\n⒝A１がボールを弾ませてからキャッチするまでの間に合計１メートル以上動いていない場合、A１のこの行為は正当である。５秒ルールは継続してカウントされる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-33", "body": "17-33  条文：スローインをするプレーヤーは、スローインとしてボールが手から離れた後に、ボールをコートの外側に触れさせてはいけない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-34", "body": "17-34  例：スローインをするA１は、\n⒜フロントコートから\n⒝バックコートからコート上のA２にボールをパスした。ボールはコート上のどのプレーヤーにも触れずにアウトオブバウンズに出た。\n解説：A１のスローインのバイオレーションである。ゲームは、\n⒜バックコートの元のスローインと同じ場所からチームBのスローインで再開され、ショットクロックは24 秒となる。\n⒝フロントコートの元のスローインと同じ場所からチームBのスローインで再開され、ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-35", "body": "17-35  例：スローインをするA１はA２にボールをパスした。A２は片足が境界線に触れた状態でボールをキャッチした。\n解説：A２のアウトオブバウンズのバイオレーションである。ゲームはA２が境界線に触れた場所に最も近いアウトオブバウンズからチームB のスローインで再開される。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-36", "body": "17-36  例：スローインをするA１は、\n⒜センターライン近くのバックコートのサイドラインからスローインを与えられ、ボールをコート内のどこへでもパスをすることができ、\n⒝センターライン近くのフロントコートのサイドラインからスローインを与えられ、ボールをフロントコートへのみパスすることができ、\n⒞クォーターあるいは各オーバータイムの開始時にスコアラーズテーブルの反対側のセンターラインの延長線上からスローインを与えられ、ボールをコート内のどこへでもパスすることができ、ボールを手に持ちながら、横方向に普通に1歩動き、フロントコートあるいはバックコートに位置を変えた。\n解説：全ての場合において、A１の正当なプレーである。A１は最初のスローインの位置にいるものとして、最初の位置で認められていたフロントコートあるいはバックコートにボールをパスする権利がある。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-37", "body": "17-37  条文：ゲームクロックが動いていて、ボールがライブの状態で成功したゴールもしくは成功した最後のフリースローに続いてエンドラインからスローインを行うプレーヤーは、エンドラインと平行にあるいは（加えて）後方に動くことができ、エンドラインの外側にいるチームメイトとボールをパスすることができるが、スローインに要する時間が5秒を超えてはならない。これは不当にスローインを妨げたことでディフェンスのチームがバイオレーションを宣せられ、いずれかのチームによってタイムアウトが認められたあと、またはスローインが再度行われるときも適用される。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-38", "body": "17-38  例：第2クォーターでゲームクロックが動いている状態で成功した相手チームのゴール、あるいは相手チームの最後のフリースローが成功したあと、A１はエンドラインでスローインのボールを持っている。\n⒜ボールがスローインされる前に、B２は境界線を越えて手を動かした。\n⒝A１が同じくエンドラインの外にいるA２にボールをパスした。B２は境界線を越えて手を動かし、パスのボールに触れた。\n解説：B２はゲームの遅延行為（ディレイオブゲーム）の警告を与えられる。その旨はチームB のヘッドコーチにも伝えられる。この警告はゲームの残り時間中、チームBの全てのプレーヤーに適用される。同様の行為がチームBのプレーヤーによって繰り返された場合、テクニカルファウルが宣せられる。チームA のいずれのプレーヤーもボールを手放す前にエンドラインに沿って動く、あるいはエンドラインの外でチームメイトにパスする権利が継続する。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-39", "body": "17-39  例：相手チームのゴールが成功したあと、A１がエンドラインでスローインのボールを持った。ボールがコート上へスローインされたあと、B２がエンドラインの近くでボールを蹴った。\n解説：B２のキックボールのバイオレーションである。ゲームはバックボードの真後ろを除いたエンドラインからチームAのスローインで再開される。スローインの後のB２のキックボールのバイオレーションであるため、チームAのスローインを行うプレーヤーはコート上へボールを手放す前に、指定されたスローインの位置からエンドラインに沿って移動する権利を持たない。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-40", "body": "17-40  例：相手チームのゴールが成功したあと、A１がエンドラインでスローインのボールを持った。A２はエンドラインの外側のアウトオブバウンズからジャンプして、空中にいる間にA１のスローインのボールをキャッチした。そのあと、\n⒜A２がまだエンドラインの外側のアウトオブバウンズにいるA１にボールをパスした。\n⒝A２がコート上にいるA３にボールをパスした。\n⒞A２がエンドラインの外側のアウトオブバウンズに着地した。\n⒟A２がコート上に着地した。\n⒠A２がコート上に着地し、まだエンドラインの外側のアウトオブバウンズにいるA１にボールをパスした。\n解説：\n⒜,⒝,⒞チームA の正当なプレーである。\n⒟,⒠  A２のスローインのバイオレーションである。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-41", "body": "17-41  条文：テクニカルファウルによるフリースローの後は、ジャンプボールシチュエーションあるいは第１クォーターの開始前を除いて、テクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからのスローインでゲームが再開される。\nディフェンスのチームがテクニカルファウルを宣せられ、スローインがバックコートで行われる場合、オフェンスのチームのショットクロックは24秒となる。スローインがフロントコートで行われる場合、ショットクロックは次のようになる。\n・14秒以上が表示されている場合、ショットクロックは継続となる。\n・13秒以下が表示されている場合、ショットクロックは14秒となる。\nオフェンスのチームがテクニカルファウルを宣せられた場合、スローインがバックコートで行われるかフロントコートで行われるかにかかわらず、ショットクロックは継続となる。\nゲームクロックが再び動き始める前にタイムアウトとテクニカルファウルが宣せられた場合、先にタイムアウトが認められ、そのあとテクニカルファウルの罰則を行う。\nアンスポーツマンライクファウルやディスクォリファイングファウルによるフリースローのあとは、ゲームはフロントコートのスローインラインからのスローインで再開され、ショットクロックは14秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-42", "body": "17-42  例：A２が、\n⒜バックコートでドリブルをしているとき\n⒝フロントコートでドリブルをしているときA１がテクニカルファウルを宣せられた。\n解説：誰もリバウンドの位置に着かずに1 本のフリースローがチームB のいずれかのプレーヤーに与えられる。どちらの場合においても、ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからチームAのスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-43", "body": "17-43  例：A２が、\n⒜バックコートでドリブルをしているとき\n⒝フロントコートでドリブルをしているときB１がテクニカルファウルを宣せられた。\n解説：誰もリバウンドの位置に着かずに1 本のフリースローがチームA のいずれかのプレーヤーに与えられる。ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからチームA のスローインで再開される。スローインの位置が、\n⒜バックコートの場合、ショットクロックは24 秒となる。\n⒝フロントコートの場合、ショットクロックに14秒以上が表示されていればショットクロックは継続となる。ショットクロックに13 秒以下が表示されていればショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-44", "body": "17-44  例：第4 クォーター残り１:47 で、A１はフロントコートでドリブルをしていて、テクニカルファウルを宣せられた。タイムアウトがチームA に認められた。\n解説：タイムアウトの後、誰もリバウンドの位置に着かずに1本のフリースローがチームBのいずれかのプレーヤーに与えられる。ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-45", "body": "17-45  条文：第4クォーター、各オーバータイムでゲームクロックが２:00あるいはそれ以下を表示しているとき、オフェンスのチームがテクニカルファウルを宣せられた。タイムアウトがそのチームに認められ、スローインがバックコートから行われる場合、ショットクロックは継続となる。スローインがフロントコートから行われる場合、ショットクロックは次のようになる。\n・ショットクロックに14秒以上が表示されている場合、ショットクロックは14秒となる。\n・ショットクロックに13秒以下が表示されている場合、ショットクロックは継続となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-46", "body": "17-46  例：第4 クォーター残り1:45 で、A１はバックコートでドリブルをしていて、テクニカルファウルを宣せられた。タイムアウトがチームA に認められた。\n解説：遅くともタイムアウトの後で、チームAのヘッドコーチはクルーチーフにスローインの位置（フロントコートあるいはバックコート）を知らせる。タイムアウトのあと、誰もリバウンドの位置に着かずに1本のフリースローがチームBのいずれかのプレーヤーに与えられる。ゲームはチームAのヘッドコーチの選択に応じてチームA のスローインで再開される。\nチームA のヘッドコーチがフロントコートのスローインラインからのスローインを選択し、ショットクロックに14秒以上が表示されている場合、ショットクロックは14秒となる。ショットクロックに13秒以下が表示されている場合、ショットクロックは継続となる。\nチームA のヘッドコーチがバックコートからのスローインを選択した場合、ショットクロックは継続となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-47", "body": "17-47  例：第4 クォーター残り1:43 で、A１はバックコートでドリブルをしていて、テクニカルファウルを宣せられた。誰もリバウンドの位置に着かずに1 本のフリースローがチームB のいずれかのプレーヤーに与えられた。タイムアウトがチームA に認められた。\n解説：遅くともタイムアウトの後で、チームAのヘッドコーチはクルーチーフにスローインの位置（フロントコートあるいはバックコート）を知らせる。ゲームはチームAのヘッドコーチの選択に応じてチームA のスローインで再開される。\nチームA のヘッドコーチがフロントコートのスローインラインからのスローインを選択し、ショットクロックに14秒以上が表示されている場合、ショットクロックは14秒となる。ショットクロックに13秒以下が表示されている場合、ショットクロックは継続となる。\nチームA のヘッドコーチがバックコートからのスローインを選択した場合、ショットクロックは継続となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-48", "body": "17-48  例：第4 クォーター残り1:41 で、A１はバックコートでドリブルをしているとき、B１がボールをアウトオブバウンズに弾き出した。タイムアウトがチームA に認められた。その直後にA１はテクニカルファウルを宣せられた。\n解説：遅くともタイムアウトの後で、チームAのヘッドコーチはクルーチーフにスローインの位置（フロントコートあるいはバックコート）を知らせる。誰もリバウンドの位置に着かずに1本のフリースローがチームB のいずれかのプレーヤーに与えられる。ゲームはチームA のヘッドコーチの選択に応じてチームA のスローインで再開される。\nチームA のヘッドコーチがフロントコートのスローインラインからのスローインを選択し、ショットクロックに14秒以上が表示されている場合、ショットクロックは14秒となる。ショットクロックに13秒以下が表示されている場合、ショットクロックは継続となる。\nチームA のヘッドコーチがバックコートからのスローインを選択した場合、ショットクロックは継続となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-49", "body": "17-49  例：第4 クォーター残り58 秒、ショットクロック残り19 秒、A１のバックコートで、\n⒜B１が意図的にボールを蹴った。\n⒝B１がA１にファウルをし、このクォーター3 個目のチームファウルであった。\n⒞B１がボールをアウトオブバウンズに弾き出した。\nタイムアウトがチームA に認められた。\n解説：チームAのヘッドコーチは、ゲームをフロントコートのスローインラインからのスローインで再開するか、バックコートからのスローインで再開するかを選択する。\n全ての場合において、フロントコートのスローインラインからのスローインで再開する場合、ショットクロックは14 秒となる。\n⒜,⒝バックコートからのスローインで再開する場合、ショットクロックは24 秒となる。\n⒞バックコートからのスローインで再開する場合、ショットクロックは19 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-50", "body": "17-50  条文：ボールがバスケットに入ったにもかかわらず、ゲームクロックが動いていて、ボールがライブの状態でのゴールや最後のフリースローが認められないとき、ゲームはフリースローラインの延長線上からのスローインで再開される。\n最後のフリースローがフリースローシューターのバイオレーションによって無効となった場合、スローインはスコアラーズテーブルの反対側のフリースローラインの延長線上から行われる。\nゲームクロックが動いている状態でのゴールが無効となった場合、スローインは無効となったショットが放たれた側のフリースローラインの延長線上から行われる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-51", "body": "17-51  例：ショットの動作（アクトオブシューティング）中のA１がトラベリングのバイオレーションをし、その後ボールはバスケットに入った。\n解説：A１のゴールは認められない。チームBはバックコートのトラベリングのバイオレーションが起きた側のフリースローラインの延長線上からスローインを与えられる。ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "17", "art_title": "スローイン", "sec_no": "17-52", "body": "17-52  例：A１がショットをした。ボールが下降しているとき、A２がボールに触れ、ボールはバスケットに入った。\n解説：A１のゴールは認められない。チームB はバックコートのA2 が不当にボールに触れた側のフリースローラインの延長線上からスローインを与えられる。ショットクロックは24 秒となる。\n第18/19 条 タイムアウト/交代"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-1", "body": "18/19-１  条文：タイムアウトは、各クォーターやオーバータイムの開始前と終了後には認められない。\n交代は、第１クォーターの開始前とゲームの終了後には認められない。各クォーターやオーバータイムの間のプレーのインターバル中の交代は認められる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-2", "body": "18/19-２  例：ゲーム開始のジャンプボールでボールがクルーチーフの手を離れたあと正当にタップされる前に、ジャンパーのA２がバイオレーションを宣せられ、チームBにスローインのボールが与えられた。このときどちらかのチームがタイムアウトまたは交代を請求した。\n解説：ゲームはすでに開始しているが、ゲームクロックがまだ動き始めていないため、タイムアウトも交代も認められない。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-3", "body": "18/19-３  条文：ショットで、ボールが空中にある間にショットクロックのブザーが鳴ったとしても、バイオレーションではなくゲームクロックは止めない。ショットが成功し、ある特定の状況下では、両チームにタイムアウトと交代が認められる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-4", "body": "18/19-４  例：ショットで、ボールが空中にある間にショットクロックのブザーが鳴った。その後ボールはバスケットに入った。このとき、いずれかあるいは両チームが、\n⒜タイムアウトを請求した。\n⒝交代を請求した。「解説：\n⒜得点をされたチームにのみタイムアウトが認められる。\n得点をされたチームにタイムアウトが認められた場合は、請求があれば相手チームにもタイムアウトが認められ、両チームとも交代を認められる。\n⒝第４クォーター、オーバータイムでゲームクロックが残り２:00 あるいはそれ以下を表示しているとき、得点をされたチームにのみ交代が認められる。得点をされたチームに交代が認められた場合は、請求があれば相手チームにも交代が認められ、両チームともタイムアウトも認められる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-5", "body": "18/19-５  条文：第18条と第19条はタイムアウトや交代が認められる時機の始まりと終わりについて規定している。最初のフリースローのボールがフリースローシューターに与えられたあと、タイムアウトあるいは交代（フリースローシューターを含む全てのプレーヤー）の請求があった場合、以下のときにのみタイムアウトあるいは交代が両チームに認められる。\n⒜最後のフリースローが成功したとき。あるいは、\n⒝最後のフリースローのあと、スローインが続くとき。あるいは、\n⒞何らかの理由で最後のフリースローの後にボールが引き続きデッドのとき。\n同じファウルの罰則による2本もしくは3本のフリースローのうち、最初のフリースローのボールがフリースローシューターに与えられた後は、最後のフリースローの後でボールがデッドになるまではタイムアウトや交代は認められない。\nそれらのフリースローの間にテクニカルファウルが宣せられたとき、誰もリバウンドの位置に着かずに速やかにフリースローを行う。テクニカルファウルの罰則のフリースローを行うために交代要員がプレーヤーとなることを除いては、このフリースローの前後ではどちらのチームにもタイムアウトや交代は認められない。テクニカルファウルの罰則のフリースローを行うために交代要員がプレーヤーとなる場合、相手チームも必要に応じてプレーヤーのうち1人を交代することができる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-6", "body": "18/19-６  例：A１は２本のフリースローを与えられた。以下のとき、チームAまたはチームBがタイムアウトあるいは交代を請求した。\n⒜ボールがフリースローシューターのA１に与えられる前。\n⒝１本目のフリースローを打ったあと。\n⒞２本目のフリースローが成功したあと、スローインをするチームB のプレーヤーがコートの外側でボールを持つ前。\n⒟２本目のフリースローが成功し、かつスローインをするチームBのプレーヤーがコートの外側でボールを持ったあと。\n解説：\n⒜１本目のフリースローが行われる前に、タイムアウトあるいは交代が速やかに認められる。\n⒝成功した場合でも、１本目のフリースローの後にはタイムアウトあるいは交代は認められない。\n⒞スローインが行われる前に、タイムアウトあるいは交代が速やかに認められる。\n⒟タイムアウトあるいは交代は認められない。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-7", "body": "18/19-７  例：A１は２本のフリースローを与えられた。最初のフリースローを行ったあと、いずれかのチームがタイムアウトあるいは交代を請求した。最後のフリースローのとき、\n⒜ボールがリングから跳ね返り、ゲームが続行した。\n⒝フリースローが成功した。\n⒞ボールがリングに触れなかった。\n⒟ショットを打つ際にA１がフリースローラインを踏み、バイオレーションが宣せられた。\n⒠A１の手からボールが離れる前にB１が制限区域の中へ踏み込んだ。A１のフリースローは成功せず、B１のバイオレーションが宣せられた。\n解説：\n⒜タイムアウトあるいは交代は認められない。\n⒝,⒞,⒟タイムアウトあるいは交代が速やかに認められる。\n⒠A１によってフリースローがやり直され、成功した場合は、タイムアウトあるいは交代が速やかに認められる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-8", "body": "18/19-８  例：交代が認められる時機がちょうど終わるときに、交代要員のA６がスコアラーズテーブルに走り、大きな声で交代を申し出た。タイマー（国内大会ではスコアラー）が反応し誤ってブザーを鳴らした。審判は笛を吹き、ゲームを止めた。\n解説：審判がゲームを止めたことにより、ボールはデッドになりゲームクロックは止められたままになるので、通常は交代が認められる時機になる。しかしながら請求は遅すぎたので、交代は認められない。ゲームは速やかに再開される。\n【補足】この場合、交代の請求が遅すぎたため、両チームともに交代もタイムアウトも認められない。またコーチのタイムアウトの請求が遅すぎたにもかかわらず、タイマー（国内大会ではスコアラー）が誤ってブザーを鳴らした場合も同様に、両チームともに交代もタイムアウトも認められない。\n【補足】ただし、第4 クォーター、各オーバータイムでゲームクロックが2：00 あるいはそれ以下を表示しているときを除いて、審判やテーブルオフィシャルズの不注意（本条項のケースを除く）、会場備品や施設等の不具合、コート内に物などが入ったとき、またはボールが遠くに転がったとき、モップなどコートの整備をやむなく入れるときなど、競技規則で想定されていない状況でも審判が笛を鳴らしてゲームを止めた場合には、原則、タイムアウトや交代は認められる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-9", "body": "18/19-９  例：ゲーム中にゴールテンディングあるいはインタフェアレンスのバイオレーションが起きた。どちらかのコーチがタイムアウトを請求している、あるいはどちらかのチームが交代を申し出ている。\n解説：バイオレーションによってゲームクロックは止められ、ボールはデッドになっている。タイムアウトあるいは交代は認められる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-10", "body": "18/19-10  例：B１がA１のツーポイントゴールにファウルをし、ショットは成功しなかった。A１の2 本のフリースローのうち、最初のフリースローのあと、A２がテクニカルファウルを宣せられた。ここでどちらかのチームがタイムアウトを請求した、あるいは交代を申し出た。\n解説：誰もリバウンドの位置に着かずに1本のフリースローがチームBのいずれかのプレーヤーに与えられる。フリースローを行うためにチームBの交代要員がプレーヤーとなる場合、チームA も必要に応じてプレーヤーのうち1 人を交代することができる。プレーヤーとなったチームBの交代要員がフリースローを行う場合、あるいはチームAもプレーヤーのうち1人を交代した場合、それらのプレーヤーはゲームクロックが動いたあと再び交代が認められる時機になるまでは、交代することはできない。チームB のいずれかのプレーヤーがA２のテクニカルファウルのフリースローを行ったあと、A１は2本目のフリースローを行う。ゲームは通常の最後のフリースローの後と同様に再開される。フリースローが成功し、タイムアウトあるいは更なる交代（ゲームクロックが止められた後で一度交代したプレーヤーや交代要員を除く）の請求があった場合は、どちらのチームにも認められる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-11", "body": "18/19-11  例：B１がA１のツーポイントゴールにファウルをし、ショットは成功しなかった。A１の2 本のフリースローのうち、最初のフリースローのあと、A２がテクニカルファウルを宣せられた。誰もリバウンドの位置に着かずに1本のフリースローがチームBのいずれかのプレーヤーに与えられた。ここでどちらかのチームがタイムアウトを請求した、あるいは交代を申し出た。\n解説：交代、タイムアウトともに請求は認められない。A１が２本目のフリースローを与えられたあと、ゲームは通常の最後のフリースローの後と同様に再開される。フリースローが成功し、タイムアウトあるいは更なる交代（ゲームクロックが止められた後で一度交代したプレーヤーや交代要員を除く）の請求があった場合は、どちらのチームにも認められる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-12", "body": "18/19-12  例：B１がA１のツーポイントゴールにファウルをし、ショットは成功しなかった。A１の2 本のフリースローのうち、最初のフリースローのあと、A２がテクニカルファウルを宣せられた。これはA２の5 個目のファウルであった。ここでどちらかのチームがタイムアウトを請求した、あるいは交代を申し出た。\n解説：A２は速やかに交代となる。誰もリバウンドの位置に着かずに1本のフリースローがチームB のいずれかのプレーヤーに与えられる。フリースローを行うためにチームB の交代要員がプレーヤーとなる場合、チームAも必要に応じてプレーヤーのうち1人を交代することができる。プレーヤーとなったチームBの交代要員がフリースローを行う場合、あるいはチームAもプレーヤーのうち1人を交代した場合、それらのプレーヤーはゲームクロックが動いたあと再び交代が認められる時機になるまでは、交代することはできない。チームBのいずれかのプレーヤーがA２のテクニカルファウルのフリースローを行ったあと、A１は2本目のフリースローを行う。ゲームは通常の最後のフリースローの後と同様に再開される。フリースローが成功し、タイムアウトあるいは更なる交代（ゲームクロックが止められた後で一度交代したプレーヤーや交代要員を除く）の請求があった場合は、どちらのチームにも認められる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-13", "body": "18/19-13  例：ドリブルをしているA１がテクニカルファウルを宣せられた。フリースローを行うためにB６が交代を申し出た。\n解説：どちらのチームにも交代が認められる時機である。プレーヤーとなったあと、B６は誰もリバウンドの位置に着かずに1本のフリースローを行うことができるが、ゲームクロックが動いたあと再び交代が認められる時機になるまでは、交代要員となることはできない。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-14", "body": "18/19-14  条文：プレーヤーとなった交代要員は、ゲームクロックが動いたあと再び交代が認められる時機になるまでは、交代することはできない。\n【補足】交代要員となったプレーヤーについても同様とする。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-15", "body": "18/19-15  例：B１はB６と交代した。ゲームクロックが動き始める前に、B６はファウルを宣せられた。これはB６の\n⒜３個目\n⒝５個目のファウルであった。\n解説：\n⒜B６はゲームクロックが動いたあと再び交代が認められる時機になるまでは、交代することはできない。\n⒝B６は交代しなければならない。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-16", "body": "18/19-16  条文：タイムアウトの請求のあと、どちらかのチームがファウルを宣せられた場合、審判がスコアラーズテーブルとのそのファウルに関する全てのコミュニケーションを完了するまでタイムアウトは始まらない。そのファウルがプレーヤーの５個目のファウルであった場合、このコミュニケーションには必要な交代の手順を含む。全てのコミュニケーションが完了したあとで審判が笛を吹いてタイムアウトのシグナルを示したとき、タイムアウトは始まる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-17", "body": "18/19-17  例：ゲーム中、チームA のヘッドコーチがタイムアウトを請求し、そのあと、\n⒜B1 が5 個目のファウルを宣せられた。\n⒝いずれかのチームのプレーヤーがファウルを宣せられた。\n解説：\n⒜では、スコアラーズテーブルとの全てのコミュニケーションを完了し、B１に代わる交代要員がプレーヤーとなるまでタイムアウトは始まらない。\nどちらの場合においても、タイムアウトが正式に始まっていなくても、プレーヤーはチームベンチに向かうことを許される。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-18", "body": "18/19-18  条文：それぞれタイムアウトは１分間である。両チームは、審判が笛を吹きコートに招き入れたあと、速やかにコートに戻らなければならない。チームが１分間を超えてタイムアウトを引き伸ばすことは、アドバンテージになるとともにゲームの遅延も引き起こしている。審判によってそのチームのヘッドコーチには警告が与えられる。そのヘッドコーチが警告に対応しない場合、追加のタイムアウトが宣せられる。そのチームにタイムアウトが残っていない場合、ヘッドコーチにゲームの遅延行為（ディレイオブゲーム）によるテクニカルファウルが宣せられ、スコアシートに「B1」と記入される。\nハーフタイムのあと、チームが時間通りにコートに戻らなかったとき、そのチームにタイムアウトが宣せられる。この場合に宣せられたタイムアウトは１分間与えられることはなく、ゲームは速やかに再開される。\n【補足】「この場合」とは、ハーフタイムのあとチームが時間通りにコートに戻らなかったときを指す。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-19", "body": "18/19-19  例：タイムアウトが終わり、審判がチームA をコート上に戻るように招き入れた。チームA のヘッドコーチはチームベンチエリアに残っている自チームに指示を与え続けた。審判はチームAを再びコート上に招き入れ、\n⒜チームA はようやくコートに入った。\n⒝チームA はチームベンチエリアに残り続けた。\n解説：\n⒜チームAがコート上へ戻り始めたあと、審判はチームAのヘッドコーチに同様の振る舞いが繰り返される場合は追加のタイムアウトを宣せられる旨の警告を与える。\n⒝警告なくチームA はタイムアウトを宣せられる。このタイムアウトは1 分間とする。チームA にタイムアウトが残っていない場合、チームAのヘッドコーチはゲームの遅延行為（ディレイオブゲーム）によるテクニカルファウルを宣せられ、スコアシート上に「B１」と記入される。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-20", "body": "18/19-20  例：ハーフタイムのインターバルのあと、チームA が控室から戻ってこないため、第３クォーターの開始が遅れた。\n解説：チームAが最終的にコートに戻ったあと、警告なくチームAはタイムアウトを宣せられる。このタイムアウトは1 分間とせず、ゲームは速やかに再開される。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-21", "body": "18/19-21  条文：第４クォーターでゲームクロックが残り２:00を示すまでに、チームが後半に１回もタイムアウトを認められていない場合、スコアラーはスコアシート上のそのチームの後半の最初の枠に２本の横線を引く。スコアボード上では最初のタイムアウトは使われたものとして表示する。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-22", "body": "18/19-22  例：第４クォーターでゲームクロックに２:00が表示された時点で、両チームとも後半に１回もタイムアウトを使っていなかった。\n解説：スコアラーはスコアシート上の両チームの後半の最初の枠に２本の横線を引く。スコアボード上では１回目のタイムアウトは使われたものとして表示する。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-23", "body": "18/19-23  例：第4クォーターでゲームクロックに2:09が表示されているとき、プレーが行われている最中にチームAのヘッドコーチが後半1回目のタイムアウトを請求した。ゲームクロックに1:58が表示されているとき、ボールがアウトオブバウンズに出てゲームクロックが止められた。タイムアウトがチームA に認められた。\n解説：スコアラーは、第４クォーターでゲームクロックに２:00 が表示される前にタイムアウトが認められなかったとして、スコアシート上のチームA の後半最初の枠に２本の横線を引く。タイムアウトが１:58 に認められたとき、このタイムアウトはチームA の２つ目の枠に記録されるとともに、チームA には１回のタイムアウトのみが残る。タイムアウトのあと、スコアボード上では２回のタイムアウトが使われたものとして表示する。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-24", "body": "18/19-24  条文：タイムアウトが請求されたときはいつでも、テクニカルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルが宣せられる前後かどうかにかかわらず、フリースローが行われる前にタイムアウトが認められる。タイムアウトの間にテクニカルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルが宣せられた場合、フリースローはタイムアウトが終了したあとで行われる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-25", "body": "18/19-25  例：チームBのヘッドコーチがタイムアウトを請求した。A１がB１にアンスポーツマンライクファウルをし、続いてA２がテクニカルファウルを宣せられた。\n解説：タイムアウトがチームBに認められる。タイムアウトのあと、誰もリバウンドの位置に着かずに1本のフリースローがチームBのいずれかのプレーヤーに与えられる。そのあと、誰もリバウンドの位置に着かずに2本のフリースローがB１に与えられる。ゲームはフロントコートのスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "18/19", "art_title": "タイムアウトと交代", "sec_no": "18/19-26", "body": "18/19-26  例：チームB のヘッドコーチはタイムアウトを請求した。A１がB１にアンスポーツマンライクファウルをした。タイムアウトがチームBに認められた。タイムアウトの間にA２はテクニカルファウルを宣せられた。\n解説：タイムアウトのあと、誰もリバウンドの位置に着かずに1本のフリースローがチームBのいずれかのプレーヤーに与えられる。そのあと、誰もリバウンドの位置に着かずに2本のフリースローがB１に与えられる。ゲームはフロントコートのスローインラインからチームBのスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "23", "art_title": "アウトオブバウンズ", "sec_no": "23-1", "body": "23-１  条文：境界線上あるいは境界線の外側にいるプレーヤーにボールが触れたことでボールがアウトオブバウンズとなった場合、このプレーヤーがボールをアウトオブバウンズに出したとみなす。"}, {"type": "impl", "art_no": "23", "art_title": "アウトオブバウンズ", "sec_no": "23-2", "body": "23-２  例：サイドラインの近くで、両手でボールを持ったA１がB１に近接してガードされた。A１は片足がアウトオブバウンズに触れているB１に体で触れた。\n解説：A１の正当なプレーである。プレーヤーはプレーヤー以外の何かに体のいずれかの部分が触れたとき、アウトオブバウンズとなる。ゲームは続行となる。\n【補足】 ボールを持ったプレーヤーがアウトオブバウンズに触れているプレーヤーに触れてもバイオレーションにはならない。"}, {"type": "impl", "art_no": "23", "art_title": "アウトオブバウンズ", "sec_no": "23-3", "body": "23-３  例：サイドラインの近くで、両手でボールを持ったA１がB１とB２に近接してガードされた。A１は片足がアウトオブバウンズに触れているB１にボールで触れた。\n解説：B１のアウトオブバウンズのバイオレーションである。アウトオブバウンズのプレーヤーに触れたとき、ボールはアウトオブバウンズとなる。ゲームはボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームA のスローインで再開される。チームA のショットクロックは継続となる。"}, {"type": "impl", "art_no": "23", "art_title": "アウトオブバウンズ", "sec_no": "23-4", "body": "23-４  例：A１はスコアラーズテーブルの前のサイドラインの近くでドリブルをしていた。ボールはコートから高く跳ね上がり、交代席に座っているB６の膝に触れた。ボールはコート上のA１に戻った。\n解説：ボールはアウトオブバウンズにいるB６に触れたとき、アウトオブバウンズとなる。ボールはアウトオブバウンズに出る前に触れていたA１がアウトオブバウンズに出したとみなす。ゲームはボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームB のスローインで再開される。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-1", "body": "24-１  条文：プレーヤーが相手チームや自チームのバックボードをめがけて意図的にボールを投げた場合、ドリブルとはみなされない。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-2", "body": "24-２  例：A１はまだドリブルをしておらず、立ち続けながらバックボードをめがけて意図的にボールを投げ、他のプレーヤーが触れる前にボールをキャッチした、あるいはボールに触れた。\n解説：A１の正当なプレーである。ボールをキャッチしたあと、A１はショットやパス、ドリブルを始めることができる。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-3", "body": "24-３  例：ドリブルを終えたあと、ひと続きの動きで、あるいは止まったうえで、A1はバックボードをめがけて意図的にボールを投げた。ボールが、\n⒜コートに弾んだあと、A1 は再びボールに触れた、あるいはキャッチし、ドリブルを始めた。\n⒝他のプレーヤーに触れる前に、A1 は再びボールに触れた、あるいはキャッチした。\n解説：\n⒜は、A1のダブルドリブルのバイオレーションである。最初のドリブルを終えたあと、A1は2度目のドリブルをすることはできない。\n⒝は、A1の正当なプレーである。ボールに触れたあと、あるいはキャッチしたあと、A1はショットやパスをすることができるが、新たなドリブルを始めることはできない。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-4", "body": "24-４  例：ゲームクロックが動いていて、ボールがライブの状態でのA1 のショットはリングに触れなかった。A１はボールをキャッチし、バックボードをめがけて投げた。そのあと他のプレーヤーが触れる前にボールをキャッチした、あるいはボールに触れた。\n解説：A１の正当なプレーである。ボールをキャッチしたあと、A１はショットやパス、ドリブルを始めることができる。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-5", "body": "24-５  例：A１はドリブルをし、正当に止まった。そのあと、\n⒜A１はバランスを崩したが、ピボットフットを動かすことなくボールを手で持ったまま、その持っているボールでコートに１度あるいは２度触れた。\n⒝A１はピボットフットを動かすことなく、ボールを片方の手からもう片方にトスした。\n解説：どちらの場合においても、A１の正当なプレーである。A１はピボットフットを動かしていない。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-6", "body": "24-６  例：A１は、\n⒜相手プレーヤーを越えてボールを投げてドリブルを始めた。\n⒝相手プレーヤーから数メートル離れた場所にボールを投げてドリブルを始めた。\nボールがコートに触れたあと、A１はドリブルを続けた。\n解説：どちらの場合においても、A１の正当なプレーである。A１がドリブルで再びボールに触れる前にボールはコートに触れている。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-7", "body": "24-７  例：A１ がドリブルを終え、B１ の脚に意図的にボールを投げた。A１ はボールをキャッチし、再びドリブルを始めた。\n解説：A１のダブルドリブルのバイオレーションである。B１がボールに触れたわけではなく、ボールがB１に触れたとみなし、A１のドリブルは終わっている。A１は再びドリブルをすることはできない。"}, {"type": "impl", "art_no": "24", "art_title": "ドリブル", "sec_no": "24-8", "body": "24-８  例：A1 がドリブルを終え、A2 にボールをパスした。ボールは偶然B2 の体に触れたあと、フロアに触れた。A1 はボールをキャッチし、再びドリブルを始めた。\n解説：A1 の正当なプレーである。最初のドリブルのあと、ボールは他のプレーヤーに触れており、A1 は再びドリブルをすることができる。"}, {"type": "impl", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-1", "body": "25-１  条文：コートに横たわっているプレーヤーがボールをコントロールすること、プレーヤーがボールを持ったままコートに倒れることは正当である。またそのプレーヤーがコートに倒れたあと、その勢いで滑ることも正当である。ただし、そのプレーヤーがコートを転がったり、ボールを持ったまま立ち上がろうとしたりするとバイオレーションである。"}, {"type": "impl", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-2", "body": "25-２  例：両手でボールを持っているA１が\n⒜バランスを崩し、コート上に倒れた。\n⒝コート上に倒れ、その勢いで滑った。\n解説：どちらの場合においても、A１の正当なプレーである。コートに倒れることはトラベリングのバイオレーションではない。ただし、ディフェンスを避けるために転がったり、ボールを持ったまま立ち上がろうとしたりした場合、トラベリングのバイオレーションである。"}, {"type": "impl", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-3", "body": "25-３  例：A１が、コートに横たわりながらボールをコントロールした。その後A１は、\n⒜A２にボールをパスした。\n⒝コートに横たわったままドリブルを始めた。\n⒞ボールをドリブルしながら立ち上がろうとした。\n⒟ボールを持ったまま立ち上がろうとした。\n解説：\n⒜,⒝,⒞A１の正当なプレーである。\n⒟A１のトラベリングのバイオレーションである。"}, {"type": "impl", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-4", "body": "25-４  条文：プレーヤーはドリブルを終えたあと、あるいはボールのコントロールを得たあとに、連続して同じ足あるいは連続して両足でコートに触れることはできない。"}, {"type": "impl", "art_no": "25", "art_title": "トラベリング", "sec_no": "25-5", "body": "25-５  例：A１は両手でボールを持ってドリブルを終え、ひと続きの動作で左足でジャンプし、左足、右足の順で着地してショットをした。\n解説：A１のトラベリングのバイオレーションである。プレーヤーはドリブルを終えたあと、連続して同じ足でコートに触れることはできない。"}, {"type": "impl", "art_no": "26", "art_title": "３秒ルール", "sec_no": "26-1", "body": "26-１  条文：プレーヤーが3秒のバイオレーションを避けるために、エンドラインからコートを離れ、その後再び制限区域に入ることは、バイオレーションである。"}, {"type": "impl", "art_no": "26", "art_title": "３秒ルール", "sec_no": "26-2", "body": "26-２  例：制限区域に3 秒未満いたA１は、3 秒のバイオレーションを避けるためにエンドラインからアウトオブバウンズに移動した。その後A１は再び制限区域に入った。\n解説：A１の3 秒のバイオレーションである。"}, {"type": "impl", "art_no": "26", "art_title": "３秒ルール", "sec_no": "26-3", "body": "26-３  条文：フロントコート内でライブのボールをコントロールしているチームのプレーヤーは、ゲームクロックが動いている間は、相手チームのバスケットに近い制限区域内に３秒以上とどまることはできない。"}, {"type": "impl", "art_no": "26", "art_title": "３秒ルール", "sec_no": "26-4", "body": "26-４  例：制限区域に2.5 秒とどまっているA1 がショットのボールを放った。ボールはバックボードにもリングにも触れず、A1 はそのボールを再度コントロールした。\n解説：A1 の正当なプレーである。A1 がショットのボールを放ったとき、チームA のボールのコントロールは終わる。A1 がそのボールを再び保持することで、チームA は新たなボールのコントロールを得る。"}, {"type": "impl", "art_no": "26", "art_title": "３秒ルール", "sec_no": "26-5", "body": "26-５  例：フロントコートからスローインをするA1がボールを持っている間、A2が制限区域に3秒以上とどまった。\n解説：A2 の正当なプレーである。チームA はボールをコントロールしているが、ゲームクロックはまだ動いていない。"}, {"type": "impl", "art_no": "27", "art_title": "近接してガードされたプレーヤー", "sec_no": "27-1", "body": "27-１  条文：近接してガードされているプレーヤーは、5秒以内にパス、ショットあるいはドリブルをしなければならない。"}, {"type": "impl", "art_no": "27", "art_title": "近接してガードされたプレーヤー", "sec_no": "27-2", "body": "27-２  例：A1 はB1 に近接して4 秒間ガードされた。その後A1 はボールをファンブルし、再びキャッチした。\n解説：A1 は5 秒以内にパス、ショットあるいはドリブルをしていないため、5 秒のバイオレーションとなる。ドリブルの始まりや終わりにボールをファンブルすることはドリブルではない。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-1", "body": "28-１  条文：ジャンプボールシチュエーションによってショットクロックが止められた。その結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-2", "body": "28-２  例：A１がバックコートで５秒間ドリブルをしたあと、ヘルドボールが起きた。チームA に次のオルタネイティングポゼッションのスローインが与えられた。\n解説：チームA は３秒でボールをフロントコートに進めなければならない。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-3", "body": "28-３  条文：バックコートからフロントコートにドリブルをしているとき、ドリブラーの両足とボールが完全にフロントコートに触れた時点で、ボールがフロントコートに進められたとみなされる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-4", "body": "28-４  例：A１がセンターラインをまたいでいたとき、バックコートにいるA２からボールを受けた。A１は\n⒜まだバックコートにいるA2 にボールをパスした。\n⒝センターラインをまたいでいるA2 にボールをパスした。\n⒞センターラインをまたいでいるA2 にボールをパスし、A2 はバックコートでドリブルを始めた。\n解説：全ての場合において、チームAの正当なプレーである。A１は両足が完全にフロントコートに触れておらず、バックコートへボールをパスすることができる。8 秒は継続となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-5", "body": "28-５  例：A１がバックコートからドリブルをし、ドリブルをしながら以下のように止まった：\n⒜センターラインをまたいでいる。\n⒝両足がフロントコートにあるが、ボールはバックコートでドリブルされている。\n⒞両足がフロントコートにあり、ボールはバックコートでドリブルされているが、その後A１は両足をバックコートに戻した。\n⒟両足がバックコートにあるが、ボールはフロントコートでドリブルされている。\n解説：全ての場合において、A１の正当なプレーである。ドリブルをしているA１は両足とボールの全てが完全にフロントコートに触れるまでバックコートにいるとみなされる。8 秒は継続となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-6", "body": "28-６  条文：8秒が継続で、それまでボールをコントロールしていたチームがバックコートでスローインを与えられる場合、スローインをするプレーヤーにボールを与える審判は、8秒のうち何秒が残っているかをスローインをするプレーヤーに伝える。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-7", "body": "28-７  例：A１がバックコートで6 秒間ドリブルをしたとき、\n⒜バックコートで\n⒝フロントコートでダブルファウルが起きた。\n解説：\n⒜ゲームはバックコートのダブルファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。審判はボールをフロントコートに進めるまでの残り時間が2秒であることをスローインをするチームA のプレーヤーに伝える。\n⒝ゲームはフロントコートのダブルファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-8", "body": "28-８  例：A１がバックコートで4秒間ドリブルをしたとき、B１がボールをチームAのバックコートのアウトオブバウンズに弾き出した。\n解説：ゲームはバックコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームA のスローインで再開される。審判はボールをフロントコートに進めるまでの残り時間が4秒であることをスローインをするチームA のプレーヤーに伝える。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-9", "body": "28-９  条文：審判がどちらのチームにも関係のない正当な理由でゲームを止め、相手チームが不利な状況になると判断した場合は、8秒は継続となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-10", "body": "28-10  例：第4 クォーター残り25 秒、得点がA 72 - B 72 で、チームA がボールのコントロールを得た。\nA１がバックコートで5 秒間ドリブルをしたとき、\n⒜ゲームクロックまたはショットクロックが止まった、あるいは開始されなかったため、\n⒝コート上にボトルが投げ込まれたため、\n⒞ショットクロックが誤ってリセットされたため、審判がゲームを止めた。\n解説：全ての場合において、ゲームはバックコートからチームAのスローインによって、8秒のうち３秒を残して再開される。新たに8 秒がチームA に与えられた場合、チームB は不利な状況になると考えられる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-11", "body": "28-11  条文：8秒のバイオレーションが起きた後のスローインの位置は、バイオレーションが起きたときのボールの位置によって決定される。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-12", "body": "28-12  例：チームA の8 秒のバイオレーションが起きたとき、\n⒜チームA は、バックコートでボールをコントロールしていた。\n⒝ボールは、バックコートにいるA１からフロントコートへのパスの途中で、空中にあった。\n解説：チームB のスローインはフロントコートの、\n⒜バックボードの真後ろを除いた8 秒のバイオレーションが起きたときにボールがあった場所\n⒝センターラインに最も近いアウトオブバウンズから行われ、ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-13", "body": "28-13  条文：チームコントロールはショットのボールがプレーヤーの手を離れたときに終わる。"}, {"type": "impl", "art_no": "28", "art_title": "８秒ルール", "sec_no": "28-14", "body": "28-14  例：8 秒が経過する直前にバックコートからのショットのボールがA1 の手を離れた。ボールはバスケットに入った。\n解説：チームA の正当なプレーである。ボールのコントロールはショットのボールがA1 の手を離れたときに終わる。A1 に3 点が認められる。\n第29/50 条 ショットクロック"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-1", "body": "29/50-１  条文：ショットクロックの終了間際にショットが放たれ、ボールが空中にある間にショットクロックのブザーが鳴った。\n・ボールがバスケットに入った場合、ゴールは認められる。\n・ボールがリングに触れた場合、そのリバウンドの結果、相手チームがボールをコントロールした場合はショットクロックは24秒となり、ボールがリングに触れる前にボールをコントロールしていたのと同じチームが再びボールをコントロールした場合は、ショットクロックは14秒となる。\n・ボールがリングに触れなかった場合、審判は相手チームのプレーヤーが速やかかつ明らかなボールのコントロールを得られるかどうかを確認するために待つ。\n−相手チームのプレーヤーが速やかかつ明らかなボールのコントロールを得られた場合、ショットクロックのブザーはなかったものとする。\n−相手チームのプレーヤーが速やかかつ明らかなボールのコントロールを得らなかった場合、ショットクロックのバイオレーションである。バックボードの真後ろを除いたゲームが止められた場所に最も近いアウトオブバウンズから相手チームにスローインのボールが与えられる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-2", "body": "29/50-２  例：A１のショットのボールが空中にあるときにショットクロックのブザーが鳴った。ボールはバックボードに触れたあと、コート上に転がり、最初にB１、次にA２に触れ、最終的にB２にコントロールされた。\n解説：チームAのショットクロックのバイオレーションである。A１のショットはリングに触れず、チームB は速やかかつ明らかにボールのコントロールを得られていない。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-3", "body": "29/50-３  例：A１のショットで、ボールはバックボードに触れたが、リングには触れなかった。そのボールにB1が触れたが、コントロールはできなかった。その後A２がボールのコントロールを得た。そしてショットクロックのブザーが鳴った。\n解説：チームA のショットクロックのバイオレーションである。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-4", "body": "29/50-４  例：ショットクロックの終了間際にA１がショットをしてB１に正当にブロックされた。ショットクロックのブザーが鳴ったあと、B１がA１にファウルをした。\n解説：チームAのショットクロックのバイオレーションである。B１のA１に対するファウルは、アンスポーツマンライクファウル、ディスクォリファイングファウルのいずれかでない限りなかったものとする。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-5", "body": "29/50-５  例：A１のショットのボールが空中にあるときにショットクロックのブザーが鳴った。ボールはリングに触れず、そのあと、\n⒜A2 とB2 の間でヘルドボールが起きた。\n⒝B1 がボールをアウトオブバウンズに弾き出した。\n解説：どちらの場合においても、チームAのショットクロックのバイオレーションである。チームBは速やかかつ明らかなボールのコントロールを得られていない。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-6", "body": "29/50-６  例：B１はショットの動作（アクトオブシューティング）中のA１にファウルをし、ほとんど同時にショットクロックのブザーが鳴った。ボールはバスケットに入った。\n解説：\n⒜ボールがまだA1の手の中にあり、B1のファウルがショットクロックのブザーが鳴る前に起きていた場合、あるいは\n⒝A1のショットのボールがすでに空中にあり、B1のファウルがショットクロックのブザーが鳴る前に起きていた場合、あるいは\n⒞A1のショットのボールがすでに空中にあり、B1のファウルがショットクロックのブザーが鳴った後に起きていた場合、ショットクロックのバイオレーションではない。A1 のゴールは認められる。1 本のフリースローがA1に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。\n⒟ボールがまだA1の手の中にあり、B1のファウルがショットクロックのブザーが鳴った後に起きていた場合、ショットクロックのバイオレーションである。A1のゴールは認められない。B1のファウルは、アンスポーツマンライクファウル、ディスクォリファイングファウルのいずれかでない限りなかったものとする。\nゲームはフリースローラインの延長線上からチームB のスローインで再開される。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-7", "body": "29/50-７  例：ゲームクロック残り25.2秒で、チームAがボールのコントロールを得た。ショットクロック残り1秒で、A1がショットをした。ボールが空中にある間にショットクロックのブザーが鳴った。ボールはリングに触れず、\n⒜その1.2 秒後にクォーターの終了を知らせるゲームクロックのブザーが鳴った。\n⒝A2がリバウンドのボールを取った。審判はバイオレーションを宣し、ゲームクロックは0.8秒を示していた。\n解説：\n⒜では、チームAのショットクロックのバイオレーションではない。審判はチームBが速やかかつ明らかなボールのコントロールを得るかどうかを確認するために待っており、バイオレーションを宣さなかった。クォーターは終了となる。\n⒝では、チームA のショットクロックのバイオレーションである。ゲームクロック残り0.8 秒で、ゲームが止められた場所に最も近いアウトオブバウンズからチームB のスローインで再開する。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-8", "body": "29/50-8  例：ゲームクロック残り25.2秒で、チームAがボールのコントロールを得た。ゲームクロック残り1.2秒で、A1が手にボールを持っているとき、ショットクロックのブザーが鳴った。審判はバイオレーションを宣し、ゲームクロックは0.8 秒を示していた。\n解説：チームAのショットクロックのバイオレーションである。ゲームクロック残り1.2秒でバイオレーションが起きており、審判はゲームクロックを修正する。ゲームクロックは1.2 秒で、ゲームが止められた場所に最も近いアウトオブバウンズからチームB のスローインで再開する。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-9", "body": "29/50-９  条文：ショットクロックのブザーが鳴ったとしても、相手チームがボールを速やかかつ明らかにボールのコントロールを得られる場合、ショットクロックのブザーはなかったものとし、ゲームは続行する。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-10", "body": "29/50-10  例：ショットクロックの終了間際にA１のパスをA２がキャッチできず（2人ともフロントコートにいる）、ボールはチームAのバックコートに転がった。B１がバスケットまで誰もいない状況でボールをコントロールしようとする前に、ショットクロックのブザーが鳴った。\n解説：B１が速やかかつ明らかにボールのコントロールを得た場合、ショットクロックのブザーはなかったものとし、ゲームは続行する。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-11", "body": "29/50-11  例：相手チームが得点をしたあと、ゲームクロック25.3秒で、チームAはエンドラインの後方からスローインを行った。ショットクロックの時限の終了間際に、A1がA2にパスをしたボールにB1が触れ、ショットクロックのブザーが鳴った。ゲームクロックに0.8秒が表示されている状態で、審判はショットクロックのバイオレーションを宣した。\n解説：ゲームクロックに0.8 秒が表示されている状態で起きたチームA のショットクロックのバイオレーションである。ゲームは止められた場所に最も近いアウトオブバウンズからチームB のスローインで再開され、ゲームクロックには引き続き0.8 秒が表示される。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-12", "body": "29/50-12  条文：それまでボールをコントロールしていたチームがオルタネイティングポゼッションのスローインを与えられる場合、そのチームのショットクロックはジャンプボールシチュエーションが起きた時点から継続となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-13", "body": "29/50-13  例：ショットクロック残り10秒で、チームAがフロントコートでボールをコントロールしているとき、ジャンプボールシチュエーションが起きた。オルタネイティングポゼッションのスローインが、\n⒜チームA に与えられた。\n⒝チームB に与えられた。\n解説：\n⒜ショットクロックは10 秒となる。\n⒝ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-14", "body": "29/50-14  条文：ボールをコントロールしていないチームのファウルあるいはバイオレーション（ボールがアウトオブバウンズになるバイオレーションを除く）により審判がゲームを止め、ボールのポゼッションがその前にボールをコントロールしていたチームにフロントコートで与えられる場合、\n・ゲームが止められた時点で、ショットクロックに14秒以上が表示されている場合、ショットクロックは継続となる。\n・ゲームが止められた時点で、ショットクロックに13秒以下が表示されている場合、ショットクロックは14秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-15", "body": "29/50-15  例：ショットクロック残り8 秒で、A1 がフロントコートでドリブルをしているときに\n⒜B1 がチームA のフロントコートのアウトオブバウンズにボールを弾き出した。\n⒝B1 がA1 にファウルをし、このクォーター2 個目のチームファウルであった。\n解説：ゲームはチームA のスローインで再開され、ショットクロックは\n⒜8 秒となる。\n⒝14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-16", "body": "29/50-16  例：ショットクロック残り4 秒で、チームA がフロントコートでボールをコントロールしているとき、\n⒜A１が\n⒝B１が怪我をして、審判がゲームを止めた。\n解説：ショットクロックは、\n⒜４秒となる。\n⒝14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-17", "body": "29/50-17  例：ショットクロック残り6 秒で、A１のショットのボールが空中にあるときにA２とB２にダブルファウルが起きた。オルタネイティングポゼッションアローはチームA を示している。ボールはリングに\n⒜触れなかった。\n⒝触れた。\n解説：ショットクロックは\n⒜６秒となる。\n⒝14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-18", "body": "29/50-18  例：ショットクロック残り5秒で、A１がドリブルをしているときに、B１がテクニカルファウルを宣せられた。その後チームA のヘッドコーチにテクニカルファウルが宣せられた。\n解説：等しい罰則を相殺したあと、ゲームはチームA のスローインで再開される。ショットクロックは5 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-19", "body": "29/50-19  例：\n⒜ショットクロック残り16 秒で\n⒝ショットクロック残り12 秒でフロントコートにいるA１がA２にボールをパスしたとき、B１が意図的にボールを蹴った、もしくは拳でボールを叩いた。\n解説：どちらの場合においても、B１のボールを蹴るバイオレーションもしくは拳でボールを叩くバイオレーションである。ゲームはフロントコートからチームAのスローインで再開され、ショットクロックは、\n⒜16 秒となる。\n⒝14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-20", "body": "29/50-20  例：ショットクロック残り6秒で、A１がフロントコートでドリブルをしているとき、B２がA２にアンスポーツマンライクファウルをした。\n解説：誰もリバウンドの位置に着かずに2本のフリースローがA２に与えられる。フリースローの成否にかかわらず、ゲームはフロントコートのスローインラインからチームA のスローインで再開される。ショットクロックは14 秒となる。\n同様の解釈が、ディスクォリファイングファウルにも適用される。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-21", "body": "29/50-21  条文：審判がどちらのチームにも関係のない正当な理由でゲームを止め、相手チームが不利な状況になる場合は、ショットクロックは継続となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-22", "body": "29/50-22  例：第4 クォーター残り25 秒、得点がA 72 - B 72 で、チームA がフロントコートでボールのコントロールを得た。A１が20 秒間ドリブルをしたとき、\n⒜ゲームクロックまたはショットクロックが止まった、あるいは開始されなかったため、\n⒝コート上にボトルが投げ込まれたため、\n⒞ショットクロックが誤ってリセットされたため、審判がゲームを止めた。\n解説：全ての場合において、ゲームは止められた場所に最も近いアウトオブバウンズからチームAのスローインで再開され、ショットクロックは残り4秒となる。ゲームがショットクロックに何も表示せずに再開された場合、チームB は不利な状況になると考えられる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-23", "body": "29/50-23  例：A１のショットのボールがリングに触れた。A２がリバウンドのボールを取り、その9秒後に誤ってショットクロックのブザーが鳴った。審判がゲームを止めた。\n解説：ショットクロックがリセットされなかったという操作の誤りである。コミッショナー（同席している場合）、ショットクロックオペレーターと協議したあと、ゲームはチームA のスローインで再開され、ショットクロックは残り5 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-24", "body": "29/50-24  例：ショットクロック残り4 秒で、A１がショットをした。ボールはリングに触れなかったが、ショットクロックオペレーターは誤ってショットクロックをリセットしてしまった。A２がリバウンドのボールを取り、しばらくしてA３がゴールで得点した。このとき、審判が誤りを認識した。\n解説：審判は、コミッショナー（同席している場合）と協議したあと、A１のショットの間にボールがリングに触れなかったことを確認する。その上で、もしショットクロックが誤ってリセットされていなかった場合、A３のショットのボールはショットクロックのブザーがなる前に両手を離れていたかを判断する。離れていた場合、A３のゴールは認められ、離れていなかった場合、ショットクロックのバイオレーションであり、A３のゴールは認められない。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-25", "body": "29/50-25  条文：ショットが放たれ、ディフェンスのチームのバックコートで、ディフェンスのプレーヤーがファウルを宣せられた。ゲームがスローインで再開される場合、ショットクロックは、\n・ゲームが止められたとき、ショットクロックに14秒以上が表示されていた場合、ショットクロックはリセットされず、継続となる。\n・ゲームが止められたとき、ショットクロックに13秒以下が表示されていた場合、ショットクロックは14秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-26", "body": "29/50-26  例：A1 がショットをし、ボールはバスケットに入った。B2 がチームB のバックコートでA2 にファウルをし、このクォーター3 個目のチームファウルであった。\n解説：A1のゴールは認められる。ゲームはB2のファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-27", "body": "29/50-27  例：ショットクロック残り17秒で、A１のショットのボールが空中にあるときにチームBのバックコートにいるB２がA２にファウルをし、このクォーター2 個目のチームファウルであった。ボールは、\n⒜リングに触れたが、バスケットには入らなかった。\n⒝リングに触れなかった。\n解説：\nどちらの場合においても、ゲームはフロントコートのB２のファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは17 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-28", "body": "29/50-28  例：ショットクロック残り10秒で、A１のショットのボールが空中にあるときにチームBのバックコートにいるB２がA２にファウルをし、このクォーター2 個目のチームファウルであった。ボールは、\n⒜バスケットに入った。\n⒝リングに触れたが、バスケットには入らなかった。\n⒞リングに触れなかった。\n解説：\n⒜A１のゴールは認められる。\n全ての場合において、ゲームはフロントコートのB２のファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-29", "body": "29/50-29  例：A１のショットのボールが空中にあるときに、ショットクロックのブザーが鳴った。チームBのバックコートにいるB２がA２にファウルをし、このクォーター2 個目のチームファウルであった。\nボールは、\n⒜バスケットに入った。\n⒝リングに触れたが、バスケットには入らなかった。\n⒞リングに触れなかった。\n解説：\n⒜A１のゴールは認められる。\n全ての場合において、チームA のショットクロックのバイオレーションではない。ゲームはフロントコートのB２のファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-30", "body": "29/50-30  例：ショットクロック残り10秒で、A１のショットのボールが空中にあるときにチームBのバックコートにいるB２がA２にファウルをし、このクォーター5 個目のチームファウルであった。ボールは、\n⒜バスケットに入った。\n⒝リングに触れたが、バスケットには入らなかった。\n⒞リングに触れなかった。\n解説：\n⒜A１のゴールは認められる。\n全ての場合において、2本のフリースローがA２に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-31", "body": "29/50-31  例：A１のショットのボールが空中にあるときに、ショットクロックのブザーが鳴った。B２がA２にファウルをしたあと、ボールは、\n⒜バスケットに入った。\n⒝リングに触れたが、バスケットには入らなかった。\n⒞リングに触れなかった。\nB2 のファウルはチームB のこのクォーター5 個目のチームファウルであった。\n解説：\n⒜A１のゴールは認められる。\n全ての場合において、チームAのショットクロックのバイオレーションではない。2本のフリースローがA２に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-32", "body": "29/50-32  条文：アンスポーツマンライクファウルあるいはディスクォリファイングファウルの後のスローインは、いつでもフロントコートのスコアラーズテーブルの反対側のスローインラインから行われる。ショットクロックは14秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-33", "body": "29/50-33  例：第4 クォーター残り1:12、ショットクロック残り6 秒で、A１がフロントコートでドリブルをしているときにB１がA１にアンスポーツマンライクファウルをした。A１の最初のフリースローのあと、チームA もしくはチームB のヘッドコーチがタイムアウトを請求した。\n解説：誰もリバウンドの位置に着かずに2 本目のフリースローがA１に与えられる。そのあと、タイムアウトが認められる。タイムアウトのあと、ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-34", "body": "29/50-34  例：ショットクロック残り19 秒で、A１がフロントコートでドリブルをしているときにB２がA２にアンスポーツマンライクファウルをした。\n解説：誰もリバウンドの位置に着かずに2本のフリースローがA２に与えられる。フリースローの成否にかかわらず、ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームA のスローインで再開される。ショットクロックは14 秒となる。\n同様の解釈が、ディスクォリファイングファウルにも適用される。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-35", "body": "29/50-35  条文：ボールが何らかの理由で相手チームのバスケットのリングに触れたあと、ボールがリングに触れる前にボールをコントロールしていたチームと同じチームが再びボールをコントロールした場合は、ショットクロックは14秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-36", "body": "29/50-36  例：A１からA２へのパスのボールにB２が触れたあと、ボールがリングに触れ、A３がそのボールをコントロールした。\n解説：A３がコート上でボールのコントロールを得たとき、ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-37", "body": "29/50-37  例：ショットクロック残り、\n⒜４秒で\n⒝20 秒でA１がショットをした。ボールはリングに触れ、A２がボールのコントロールを得た。\n解説：どちらの場合においても、A２がコート上でボールのコントロールを得たとき、ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-38", "body": "29/50-38  例：A１がショットをし、ボールはリングに触れた。そのあと\n⒜B1 がボールに触れた。\n⒝A2 がボールをタップした。\nそして、A3 がボールのコントロールを得た。\n解説：どちらの場合においても、A３がコート上のいずれかの場所でボールのコントロールを得たとき、ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-39", "body": "29/50-39  例：A１がショットをし、ボールはリングに触れた。B１がボールに触れ、ボールはアウトオブバウンズに出た。\n解説：ゲームはボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームA のスローインで再開される。スローインが行われる場所にかかわらず、ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-40", "body": "29/50-40  例：ショットクロック残り4秒で、A１がショットクロックをリセットするためにボールをリングに向かって投げた。ボールはリングに触れ、その後B１がボールに触れて、ボールはチームA のバックコートのアウトオブバウンズに出た。\n解説：ゲームはバックコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-41", "body": "29/50-41  例：ショットクロック残り6秒で、A1がショットをした。ボールはリングに触れ、A2がボールのコントロールを得た。リバウンドの間にB２がA２にファウルをし、このクォーター3個目のチームファウルであった。\n解説：ゲームはB２のファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-42", "body": "29/50-42  例：A１がショットをした。ボールはリングに触れ、リバウンドでA２とB２の間でヘルドボールが起きた。オルタネイティングポゼッションアローはチームA を示している。\n解説：ゲームはヘルドボールが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-43", "body": "29/50-43  例：ショットクロック残り、\n⒜８秒で\n⒝17 秒でA１がショットをし、ボールがリングとバックボードの間に挟まった。オルタネイティングポゼッションアローはチームA を示している。\n解説：どちらの場合においても、ゲームはフロントコートのバックボードに最も近いエンドラインからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-44", "body": "29/50-44  例：フロントコートにいるA１がA２にアリウープのパスをしたがA２はボールをキャッチできなかった。ボールはリングに触れ、その後A３がチームA の\n⒜フロントコートで\n⒝バックコートでボールのコントロールを得た。\n解説：\n⒜チームA のショットクロックは14 秒となる。\n⒝チームA はボールのコントロールを失っていないため、チームA のバックコートバイオレーションとなる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-45", "body": "29/50-45  例：A１のショットのボールがリングに触れた。B１がリバウンドのボールを取り、コートに着地した。A２がB１の手からボールを弾き、A３がボールをキャッチした。\n解説：チームB(B1)がリバウンドの間に明らかなボールのコントロールを得て、そのあとチームA(A3)が新たにコントロールを得ている。チームA のショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-46", "body": "29/50-46  例：ショットクロック残り5 秒で、スローインを行うA１がチームB のバスケットに向かってボールをパスした。ボールはリングに触れ、その後A２あるいはB２、もしくはその両方がボールに触れたが、どちらもコントロールできなかった。\n解説：ゲームクロックとショットクロックは、ボールがコート上でどちらかのプレーヤーに触れた、もしくは触れられたとき、動かし始められる。\nその後チームA がコート上でボールのコントロールを得た場合、ショットクロックは14 秒となる。\nその後チームB がコート上でボールのコントロールを得た場合、ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-47", "body": "29/50-47  条文：ゲーム中、ゲームクロックが動いている間に、チームがフロントコートあるいはバックコートで新たなライブのボールのポゼッションを得たとき、ショットクロックは24秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-48", "body": "29/50-48  例：ゲームクロックが動いている間に、A１がコート上で新たにボールのポゼッションを得たのは、\n⒜バックコートであった。\n⒝フロントコートであった。\n解説：どちらの場合においても、ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-49", "body": "29/50-49  例：チームBのスローインのあと、A１がコート上で速やかかつ明らかに新たなボールのポゼッションを得た。それはチームA の\n⒜バックコートであった。\n⒝フロントコートであった。\n解説：どちらの場合においても、ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-50", "body": "29/50-50  条文：ボールをコントロールしているチームのファウルあるいはバイオレーション（ボールがアウトオブバウンズになるバイオレーションを含む）により審判がゲームを止めた。フロントコートからのスローインが相手チームに与えられる場合、ショットクロックは14秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-51", "body": "29/50-51  例：バックコートでA１がA２にボールをパスした。A２はボールに触れたがキャッチできず、ボールはチームA のバックコートのアウトオブバウンズに出た。\n解説：ゲームはチームBのフロントコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-52", "body": "29/50-52  条文：ゲームクロック残り24秒未満で、チームがコート上でライブのボールのコントロールを得たり、取り戻したりした場合、ショットクロックには何も表示しない。\nボールが相手チームのバスケットのリングに触れたあと、ゲームクロックの残り時間が24秒未満および14秒以上で、オフェンスのチームがコート上でライブのボールのコントロールを取り戻した場合、ショットクロックは14秒となる。ゲームクロックが14秒以下の場合、ショットクロックには何も表示しない。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-53", "body": "29/50-53  例：ゲームクロック残り12 秒で、スローインをするA1 が新たにボールのポゼッションを得た。\n解説：ショットクロックには何も表示しない。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-54", "body": "29/50-54  例：ゲームクロック残り23秒で、A１がコート上で新たなボールのコントロールを得た。ゲームクロック残り18 秒で、チームB のバックコートにいるB１が意図的にボールを蹴った。\n解説：ゲームはチームAのフロントコートのB１がボールを蹴った場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ゲームクロックには18 秒が表示され、ショットクロックには何も表示しない。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-55", "body": "29/50-55  例：ゲームクロック残り23秒で、A１がコート上で新たなボールのコントロールを得た。ショットクロックには何も表示されていない。ゲームクロック残り19秒で、A１がショットをし、ボールはリングに触れた。ゲームクロック残り16 秒で、A２がリバウンドのボールを取り、チームA がボールのコントロールを取り戻した。\n解説：ゲームはゲームクロック残り16 秒で続行となる。ショットクロックは表示される。チームAがボールのコントロールを取り戻したとき、ゲームクロックは14秒を超えていたため、ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-56", "body": "29/50-56  例：ゲームクロック残り23秒で、A１がコート上で新たなボールのコントロールを得た。ショットクロックには何も表示されていない。ゲームクロック残り15 秒で、A１がショットをした。ボールはリングに触れ、チームB のバックコートでB1 がボールをアウトオブバウンズに弾き出した。ゲームクロックは残り12 秒であった。\n解説：ゲームクロック残り12秒で、ゲームはチームAのフロントコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームAのスローインで再開される。チームA がボールのコントロールを取り戻したとき、ゲームクロックは14 秒未満であったため、ショットクロックには引き続き何も表示しない。"}, {"type": "impl", "art_no": "29/50", "art_title": "ショットクロック", "sec_no": "29/50-57", "body": "29/50-57  例：ゲームクロック残り22秒で、A１がコート上で新たなボールのコントロールを得た。ショットクロックには何も表示されていない。ゲームクロック残り18 秒で、A１がショットをした。ボールはリングに触れず\n⒜ゲームクロック残り15.5 秒で\n⒝ゲームクロック残り12 秒でチームB のバックコートでB1 がボールをアウトオブバウンズに弾き出した。\n解説：ゲームはチームAのフロントコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームA のスローインで再開され、ゲームクロックは継続となる。チームAはゲームクロック残り24 秒未満で新たなボールのチームコントロールを得ており、ショットクロックには引き続き何も表示しない。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-1", "body": "30-１  条文：プレーヤーが空中にいるときは、ジャンプをする前に最後に触れていたコートにいるものとみなされる。\nしかし、プレーヤーがフロントコートからジャンプして空中にいる間に新たなボールのチームコントロールを得たとき、その後プレーヤーはコート上のどこにでもボールを持って着地することができる。ただし、着地する前にバックコートにいるチームメイトにボールをパスすることはできない。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-2", "body": "30-２  例：バックコートにいるA１がフロントコートにいるA２にボールをパスした。B１は自チームのフロントコートからジャンプして空中にいる間にボールをキャッチし、\n⒜両足でバックコートに着地した。\n⒝センターラインをまたいで着地した。\n⒞センターラインをまたいで着地したあと、バックコートに向かってドリブルあるいはパスをした。\n解説：チームB のバックコートバイオレーションではない。B１は空中にいる間に新たなボールのチームコントロールを確立し、コート上のどこにでも着地することができる。全ての場合において、B１は正当にバックコートにいる。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-3", "body": "30-３  例：A１とB１の間でのゲーム開始のジャンプボールでボールは正当にタップされた。A２はフロントコートからジャンプして空中にいる間にボールをキャッチし、\n⒜両足でバックコートに着地した。\n⒝センターラインをまたいで着地した。\n⒞センターラインをまたいで着地したあと、バックコートに向かってドリブルあるいはパスをした。\n解説：A２のバックコートバイオレーションではない。A２は空中にいる間に最初のボールのチームコントロールを確立し、コート上のどこにでも着地することができる。全ての場合において、A２は正当にバックコートにいるとみなされる。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-4", "body": "30-４  例：フロントコートでスローインを行うA１がA２にボールをパスした。A２はフロントコートからジャンプして空中にいる間にボールをキャッチし、\n⒜両足でバックコートに着地した。\n⒝センターラインをまたいで着地した。\n⒞センターラインをまたいで着地したあと、バックコートに向かってドリブルあるいはパスをした。\n解説：チームA のバックコートバイオレーションである。A２が空中にいる間にボールをキャッチしてバックコートに着地する前に、スローインを行うA１はフロントコートでボールのチームコントロールを確立している。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-5", "body": "30-５  例：バックコートでスローインを行うA１がA２にボールをパスした。B１はフロントコートからジャンプして空中にいる間にボールをキャッチし、バックコートに着地する前にバックコートにいるB２にボールをパスした。\n解説：チームB のバックコートバイオレーションである。B１がフロントコートからジャンプして空中にいる間に新たなボールのチームコントロールを得たとき、コート上のどこにでも着地することができる。しかし、着地する前にバックコートにいるチームメイトにボールをパスすることはできない。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-6", "body": "30-６  例：A１とB１の間でのゲーム開始のジャンプボールでボールはフロントコートにいるA２に向けて正当にタップされた。A２はジャンプして空中にいる間にボールをキャッチし、コート上に着地する前にバックコートにいるA１にボールをパスした。\n解説：チームA のバックコートバイオレーションである。空中にいるA２は両手にボールを持ったままバックコートに着地することができるが、バックコートにいるチームメイトにボールをパスすることはできない。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-7", "body": "30-７  条文：フロントコートにいるチームAのプレーヤーが明らかなボールのコントロールを得たあと、ボールをバックコートに触れさせ、チームAのプレーヤーがフロントコートまたはバックコートのいずれかでそのボールに最初に触った場合、ライブのボールが不当にバックコートに返ったとみなされる。しかし、バックコートにいるチームAのプレーヤーが、ボールをフロントコートに触れさせたあと、チームAのプレーヤーがフロントコートまたはバックコートのいずれかでそのボールに最初に触れることは正当である。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-8", "body": "30-８  例：A１とA２がセンターライン近くのフロントコートに両足を着けて立っている。A１はA２にバウンスパスをした。パスされたボールはチームA のバックコートに触れたあと、フロントコートにいるA２に触れた。\n解説：チームA のバックコートバイオレーションである。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-9", "body": "30-９  例：センターラインの近くでバックコートに両足を着けて立っているA１が、同じくセンターラインの近くでバックコートに両足を着けて立っているA２にバウンスパスをした。パスされたボールはチームA のフロントコートに触れたあと、A２に触れた。\n解説：チームAのプレーヤーは誰もフロントコートでボールをコントロールしていないため、チームAのバックコートバイオレーションではない。しかし、ボールがチームAのフロントコートに触れたとき、8秒は数え終わる。バックコートにいるA２がボールに触れたらすぐに新たな8 秒が数え始められる。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-10", "body": "30-10  例：バックコートにいるA１がフロントコートに向かってボールをパスした。ボールはコート上でセンターラインをまたいで立っている審判に触れ、まだバックコートにいるA２がボールに触れた。\n解説：チームAのプレーヤーは誰もフロントコートでボールをコントロールしていないため、チームAのバックコートバイオレーションではない。しかし、ボールがセンターラインをまたいでいる審判に触れたとき、8 秒は数え終わる。バックコートにいるA２がボールに触れたらすぐに新たな8 秒が数え始められる。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-11", "body": "30-11  例：チームAがフロントコートでボールをコントロールしているとき、A１とB１が同時にボールに触れた。その後ボールはチームA のバックコートに転がり、A２が最初にボールに触れた。\n解説：チームA のバックコートバイオレーションである。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-12", "body": "30-12  例：A１はバックコートからフロントコートへドリブルをし、両足はフロントコートに入ったが、ボールはまだバックコートでドリブルをしていた。その後ボールはA１の脚に触れて転がり、バックコートでA２がドリブルを始めた。\n解説：チームAの正当なプレーである。A１はまだフロントコートでボールのコントロールを確立していない。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-13", "body": "30-13  例：バックコートにいるA１がフロントコートにいるA２にボールをパスした。A２はボールに触れたがコントロールせず、ボールはまだバックコートにいるA１に戻った。\n解説：チームAの正当なプレーである。A２はまだフロントコートでボールのコントロールを確立していない。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-14", "body": "30-14  例：フロントコートでスローインを行うA１がA２にボールをパスした。A２はフロントコートからジャンプして、空中にいる間にボールをキャッチし、右足をまだ空中に浮かせたまま左足でコート上のフロントコートに着地した。そのあと、A２は右足をバックコートに着いた。\n解説：チームAのバックコートバイオレーションである。スローインを行うA１はすでにフロントコートでボールのチームコントロールを確立している。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-15", "body": "30-15  例：A１がセンターライン近くのフロントコートでドリブルをしているとき、B１がボールをチームAのバックコートに弾いた。まだフロントコートに両足を着いているA１がバックコートでドリブルを続けた。\n解説：チームAの正当なプレーである。A１はフロントコートでボールに触れた最後のプレーヤーではない。A１は完全にバックコートに入ってドリブルを続けることもでき、新たな8 秒が数え始められる。"}, {"type": "impl", "art_no": "30", "art_title": "バックコート", "sec_no": "30-16", "body": "30-16  例：バックコートにいるA１がA２にボールをパスした。A２はフロントコートからジャンプして空中にいる間にボールをキャッチし、\n⒜両足でバックコートに着地した。\n⒝センターラインに触れて着地した。\n⒞センターラインをまたいで着地した。\n解説：全ての場合において、チームA のバックコートバイオレーションである。A２は空中にいる間にフロントコートでボールのチームコントロールを確立している。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-1", "body": "31-１  条文：ゲームクロックが動いていて、ボールがライブの状態でのショットあるいはフリースローの間にボールがリングよりも上にあるとき、プレーヤーがバスケットの下から手を入れてボールに触れることは、インタフェアレンスである。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-2", "body": "31-２  例：A１の最後のフリースローで、\n⒜ボールがリングに触れる前に、\n⒝ボールがリングに触れたあと、まだバスケットに入る可能性を残している状況で、B１がバスケットの下から手を入れてボールに触れた。\n解説：どちらの場合においても、B１のインタフェアレンスのバイオレーションである。A１は1点を与えられる。\n⒜B１はテクニカルファウルを宣せられる。\n⒝B１はテクニカルファウルを宣せられない。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-3", "body": "31-３  条文：パスの間あるいはボールがリングに触れた後で、ボールがリングよりも上にあるとき、プレーヤーがバスケットの下から手を入れてボールに触れることは、インタフェアレンスである。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-4", "body": "31-４  例：コート上のA１がパスをしたボールがリングよりも上にあり、B１がバスケットの下から手を入れてボールに触れた。\n解説：B１のインタフェアレンスのバイオレーションである。2 点もしくは3 点がA１に与えられる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-5", "body": "31-５  条文：最後のフリースローが不成功でボールがリングに触れた。その後いずれかのプレーヤーが正当にボールに触れ、ボールがバスケットに入った場合、フリースローはツーポイントゴールとなる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-6", "body": "31-６  例：A１の最後のフリースローで、ボールはリングから跳ね返った。B１がボールを弾き出そうとしたが、ボールはバスケットに入った。\n解説：自チームのバスケットにボールを誤ってタップすることは正当なプレーである。2点がチームAのコート上のキャプテンに与えられる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-7", "body": "31-７  条文：\n・ゲームクロックが動いていて、ボールがライブの状態でのショットで\n・不成功の最後のフリースローで\n・クォーターやオーバータイムの終了を知らせるゲームクロックのブザーが鳴ったあとボールがリングに触れ、まだバスケットに入る可能性を残している状況でファウルが宣せられた。\nその後いずれかのプレーヤーがボールに触れた場合、バイオレーションである。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-8", "body": "31-８  例：A１の最後のフリースローのあと、ボールはリングから跳ね返った。リバウンドでB２がA２にファウルをし、このクォーター3個目のチームファウルであった。ボールはまだバスケットに入る可能性を残している状況で、\n⒜A３がボールに触れた。\n⒝B３がボールに触れた。\n解説：どちらの場合においても、A３あるいはB３のインタフェアレンスのバイオレーションである。\n⒜得点は与えられない。両方のスローインの罰則は互いに相殺される。ゲームはバックボードの真後ろを除いたファウルが起きた場所に最も近いエンドラインからオルタネイティングポゼッションのスローインで再開される。\n⒝1点がA１に与えられる。B２のファウルの結果として、ゲームはバックボードの真後ろを除いたファウルが起きた場所に最も近いエンドラインからチームA のスローインで再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-9", "body": "31-９  例：A１の最後のフリースローのあと、ボールはリングから跳ね返った。リバウンドでB２がA２にファウルをし、このクォーター5個目のチームファウルであった。ボールはまだバスケットに入る可能性を残している状況で、\n⒜A３がボールに触れた。\n⒝B３がボールに触れた。\n解説：どちらの場合においても、A３あるいはB３のインタフェアレンスのバイオレーションである。\n⒜得点は与えられない。\n⒝1 点がA１に与えられる。\nどちらの場合においても、B2 のファウルの罰則として2 本のフリースローがA2 に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-10", "body": "31-10  例：A１の最後のフリースローのあと、ボールはリングから跳ね返った。リバウンドでA２がB２にファウルをし、このクォーター5個目のチームファウルであった。ボールはまだバスケットに入る可能性を残している状況で、\n⒜A３がボールに触れた。\n⒝B３がボールに触れた。\n解説：どちらの場合においても、A３あるいはB３のインタフェアレンスのバイオレーションである。\n⒜得点は与えられない。\n⒝1 点がA１に与えられる。\nどちらの場合においても、A２のファウルの結果として、2本のフリースローがB２に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-11", "body": "31-11  例：A１の最後のフリースローのあと、ボールはリングから跳ね返った。リバウンドでA２とB２の間でダブルファウルが起きた。ボールはまだバスケットに入る可能性を残している状況で、\n⒜A３
