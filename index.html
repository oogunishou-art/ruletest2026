がボールに触れた。\n⒝B３がボールに触れた。\n解説：どちらの場合においても、A３あるいはB３のインタフェアレンスのバイオレーションである。ファウルはスコアシートの各プレーヤーに記入される。\n⒜得点は与えられない。ゲームはバックボードの真後ろを除いたファウルが起きた場所に最も近いエンドラインからオルタネイティングポゼッションのスローインで再開される。\n⒝1点がA１に与えられる。ゲームは通常の最後のフリースローが成功した後と同様にエンドラインの後方の任意のアウトオブバウンズからチームB のスローインで再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-12", "body": "31-12  例：ゲームクロックが動いていて、ボールがライブの状態でA１がショットをした。ボールがリングから跳ね返り、まだバスケットに入る可能性を残しているときに第3クォーターの終了を知らせるゲームクロックのブザーが鳴った。その後、\n⒜A２がボールに触れ、ボールはバスケットに入った。\n⒝B２がボールに触れ、ボールはバスケットに入った。\n⒞A２がボールに触れ、ボールはバスケットに入らなかった。\n⒟B２がボールに触れ、ボールはバスケットに入らなかった。\n解説：全ての場合において、A２あるいはB２のインタフェアレンスのバイオレーションである。クォーターの終了を知らせるゲームクロックのブザーが鳴った後は、ボールがリングに触れた後でもまだバスケットに入る可能性を残している間はいずれのプレーヤーもボールに触れてはならない。\n⒜A１のゴールは認められない。\n⒝2 点もしくは3 点がA１に与えられる。\n⒞クォーターは終了となる。\n⒟2 点もしくは3 点がA１に与えられる。\n全ての場合において、第3 クォーターは終了となる。ゲームはセンターラインの延長線上からオルタネイティングポゼッションのスローインで再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-13", "body": "31-13  条文：ゲームクロックが動いていて、ボールがライブの状態でのショットでバスケットに向かって飛んでいるボールにプレーヤーが触れた場合は、ゴールテンディングとインタフェアレンスに関する全ての規定が適用される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-14", "body": "31-14  例：A１はツーポイントゴールのショットをした。上昇しているボールにA２あるいはB２が触れた。\nその後バスケットへ下降しているボールに、\n⒜A３が触れた。\n⒝B３が触れた。\n解説：A２あるいはB２が上昇しているボールに触れることは正当なプレーである。A３あるいはB３が下降しているボールに触れることはゴールテンディングのバイオレーションである。\n⒜チームB はフリースローラインの延長線上からスローインを与えられる。\n⒝2 点がA１に与えられる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-15", "body": "31-15  例：A1 のショットのボールが空中にあるときにB1 がA1 にファウルをした。その後、ボールが上昇している間にB2 が正当に触れ、ボールはバスケットに入った。\n解説：得点は認められない。審判が笛を吹いたあと、B2 がボールに触れたことでボールは速やかにデッドとなる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-16", "body": "31-16  例：ゲームクロックが動いていて、ボールがライブの状態でA1がショットをした。ボールがリングよりも上の最高点にあるとき、A２あるいはB２がボールに触れた。\n解説：A２あるいはB２の正当なプレーである。ボールが最高点に到達し、下降を開始した後でのみ不当に触れられたとみなす。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-17", "body": "31-17  条文：プレーヤーがバスケットを揺らしたり、バスケット（リングまたはネットあるいはその両方）を掴んだりして、ボールに不自然な跳ね返りやその方向の変化を生じさせ、その結果ボールがバスケットに入ることを妨げる、あるいはバスケットに入るようにした場合、インタフェアレンスのバイオレーションである。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-18", "body": "31-18  例：ゲームの終了間際にA１がスリーポイントゴールのショットをした。ボールが空中にあるときにゲームの終了を知らせるゲームクロックのブザーが鳴った。ブザーのあと、\n⒜B1がバスケットを揺らしたことで、ボールが不自然に弾み、あるいはその方向が変わり、バスケットに入ることが妨げられた。\n⒝A2 がバスケットを揺らしたことで、ボールの方向が変わり、バスケットに入った。\n解説：ゲームの終了を知らせるゲームクロックのブザーが鳴った後であってもボールはライブのままである。\n⒜B1 のインタフェアレンスのバイオレーションである。3 点がA1 に与えられる。\n⒝A2 のインタフェアレンスのバイオレーションである。A1 のゴールは認められない。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-19", "body": "31-19  条文：ゲームクロックが動いていて、ボールがライブの状態でのショットで、ボールがリングに触れていて、まだバスケットに入る可能性を残している間に、プレーヤーがバスケット（リングあるいはネット）もしくはバックボードに触れた場合、そのディフェンスあるいはオフェンスのプレーヤーのインタフェアレンスのバイオレーションである。\n図３ リングに触れているボール"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-20", "body": "31-20  例：ゲームクロックが動いていて、ボールがライブの状態でA1がショットをしたあと、ボールがリングから跳ね返り、リングの上に乗った。ボールがリングの上に乗っている間に、B１がバスケットあるいはバックボードに触れた。\n解説：B１のインタフェアレンスのバイオレーションである。ボールがまだバスケットに入る可能性を残しているとき、インタフェアレンスの制限が適用される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-21", "body": "31-21  例：ゲームクロックが動いていて、ボールがライブの状態でA1 のショットのボールが下降していて、完全にリングよりも上にあるときにA２とB２が同時にボールに触れた。ボールは、\n⒜バスケットに入った。\n⒝バスケットに入らなかった。\n解説：A２とB２のゴールテンディングのバイオレーションである。どちらの場合においても、得点は与えられない。ゲームはオルタネイティングポゼッションのスローインで再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-22", "body": "31-22  条文：プレーヤーがバスケット（リングあるいはネット）をつかんでボールにプレーしたとき、インタフェアレンスのバイオレーションである。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-23", "body": "31-23  例：ゲームクロックが動いていて、ボールがライブの状態でA1 がショットをした。ボールがリングから跳ね返ったとき、\n⒜A２がリングをつかみ、ボールをタップしてバスケットに入れた。\n⒝ボールがまだバスケットに入る可能性を残している状態でA２がリングをつかんだ。ボールはバスケットに入った。\n⒞B２がリングをつかみ、ボールをタップしてバスケットに入らないようにした。\n⒟ボールがまだバスケットに入る可能性を残している状態でB２がリングをつかんだ。ボールはバスケットに入らなかった。\n解説：全ての場合において、A２あるいはB２のインタフェアレンスのバイオレーションである。\n⒜,⒝得点は与えられない。ゲームはフリースローラインの延長線上からチームBのスローインで再開される。\n⒞,⒟2 点もしくは3 点がA１に与えられる。ゲームは通常のゲームクロックが動いていて、ボールがライブの状態でのゴールが成功した後と同様にエンドラインからチームB のスローインで再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-24", "body": "31-24  条文：ボールがバスケットの中にある間にディフェンスのプレーヤーがボールに触れた場合、インタフェアレンスのバイオレーションである。\n図４ バスケットの中にあるボール"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-25", "body": "31-25  例：A１がツーポイントゴールのショットをした。ボールはわずかな部分がバスケットの中にあり、リングの周りを回転しているとき、\n⒜B１がボールに触れた。\n⒝A２がボールに触れた。\n解説：ボールのわずかな部分がリングの中かつリングよりも下にあるとき、ボールはリングの中にあるとみなす。\n⒜B1 のインタフェアレンスのバイオレーションである。2 点がA1 に与えられる。\n⒝A2 の正当なプレーである。オフェンスのプレーヤーはボールに触れることができる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-26", "body": "31-26  例：A1がツーポイントゴールのショットをした。ボールはわずかな部分がバスケットの中にあり、リングの周りを回転している間に、クォーターの終了を知らせるゲームクロックのブザーが鳴った。ゲームクロックのブザーのあと、\n⒜A２が\n⒝B２がボールに触れた。\n解説：これはインタフェアレンスのバイオレーションである。\n⒜A２がボールに触れた場合、得点は認められない。\n⒝B２がボールに触れた場合、2 点が認められる。\nクォーターの終了を知らせるゲームクロックのブザーが鳴ったあと、ボールはいずれかのチームのプレーヤーに触れられたとき、速やかにデッドとなる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング・インタフェアレンス", "sec_no": "31-27", "body": "31-27  例：A1が最後のフリースローを行った。ボールはリングに弾んでバックボードに触れたあと、リングの周りを回っていて、わずかな部分がバスケットの中にあった。このとき、\n⒜B２が\n⒝A２がまだリングの上にあるボールに触れた。\n解説：\n⒜これはB2 のインタフェアレンスのバイオレーションである。\n⒝これはA2 の正当なプレーである。\nどちらの場合においても、A1 に1 点が与えられる。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-1", "body": "33-１  条文：シリンダーの概念はプレーヤーがオフェンスかディフェンスかにかかわらず、全てのプレーヤーに適用される。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-2", "body": "33-２  例：A１はスリーポイントゴールのショットで空中にいる。A１が脚を広げ、ディフェンスのB１に触れ合いを起こした。\n解説：自身のシリンダーの境界の外に脚を動かし、ディフェンスのB１に触れ合いを起こしたA１のファウルである。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-3", "body": "33-３  条文：ノーチャージセミサークルルール（競技規則33.10）は、ボールをコントロールしてバスケットに向かってドライブするオフェンスのプレーヤーからチャージングのファウルを引き出すために、ディフェンスのプレーヤーが自チームのバスケットの真下でポジションを取ることを防ぐためのものである。\nノーチャージセミサークルルールが適用されるためには、以下の基準を満たさなくてはならない。\n⒜ディフェンスのプレーヤーの片足あるいは両足が、セミサークルエリア（図5）に触れていること。セミサークルのラインはセミサークルエリアの一部とみなす。\n⒝オフェンスのプレーヤーが、セミサークルラインを越えてバスケットにドライブしており、空中にいる間にショットやパスをすること。\n以下の場合にはノーチャージセミサークルルールの基準は適用されず、触れ合いは規則によって判断される。（例：シリンダーの概念、チャージング／ブロッキングの原則）\n⒜ノーチャージセミサークルエリアの外で起きた全てのプレー、また、セミサークルエリアとエンドラインの間のエリアから展開された全てのプレー。\n【補足】セミサークルエリアとエンドラインの間とはバックボードの裏側のエリアのことをいう。\n⒝ショットのあと、ボールがリングから跳ね返り、不当なコンタクトが起きた全てのリバウンドのプレー。\n⒞オフェンスあるいはディフェンスのプレーヤーによる手、腕、脚、体によるファウル。\n図5 ノーチャージセミサークルエリアの内側/外側のプレーヤー"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-4", "body": "33-4  例：A１がセミサークルエリアの外側からジャンプショットをした。A１はセミサークルエリアに触れているB１にぶつかった。\n解説：A１の正当なプレーである。ノーチャージセミサークルルールが適用される。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-5", "body": "33-５  例：A１がエンドラインに沿ってドリブルし、バックボードの裏側のエリアからコート上をフリースローラインに向かってジャンプした。A１はセミサークルエリアに触れていて、リーガルガーディングポジションを占めているB１にぶつかった。\n解説：A１のチームコントロールファウルである。ノーチャージセミサークルルールは適用されない。A１はバックボードとそこから延長された仮想のラインの真後ろのコートからノーチャージセミサークルエリアに入っている。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-6", "body": "33-６  例：ゲームクロックが動いていて、ボールがライブの状態でのA1 のショットのボールがリングから跳ね返った。A２はジャンプしてボールをキャッチし、その後セミサークルエリアに触れていて、リーガルガーディングポジションを占めているB１にぶつかった。\n解説：A２のチームコントロールファウルである。ノーチャージセミサークルルールは適用されない。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-7", "body": "33-７  例：A１がバスケットに向かってドライブし、ショットの動作（アクトオブシューティング）をした。A１はショットでドライブを終えるかわりに真後ろにいるA２にボールをパスした。その後A１はノーチャージセミサークルエリアに触れているB１に無理にぶつかっていった。ほとんど同時に、ボールを持っているA２は得点するために直接バスケットにドライブをした。\n解説：A１のチームコントロールファウルである。ノーチャージセミサークルルールは適用されない。A２のバスケットへの進路をあけるためにA１は不当に体を使っている。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-8", "body": "33-８  例：A１がバスケットに向かってドライブし、ショットの動作（アクトオブシューティング）をした。A１はショットでドライブを終えるかわりに空中にいる間にコートのコーナーに立っているA２にボールをパスした。その後A１はノーチャージセミサークルエリアに触れているB１にぶつかった。\n解説：A１の正当なプレーである。ノーチャージセミサークルルールが適用される。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-9", "body": "33-９  例：A1 がバスケットに向かってドライブし、ショットの動作（アクトオブシューティング）をした。A1 はショットのボールを手放す前にノーチャージセミサークルエリアに触れているB1 を腕を使って押しのけた。\n解説：A1 のチームコントロールファウルである。A1 は不当に腕を使っており、ノーチャージセミサークルルールは適用されない。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-10", "body": "33-10  例：A1 がノーチャージセミサークルの外からジャンプショットをしようとし、ノーチャージセミサークルから垂直に飛んだB1 に触れ合いを起こした。\n解説：B1 の正当なプレーであり、ノーチャージセミサークルルールは適用されない。B1 とA1 が触れ合いを起こしたとき、B1は空中におり、セミサークルエリアに片足、または両足を触れていない。\n触れ合いは通常の規則によって判定される。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-11", "body": "33-11  条文：パーソナルファウルとはプレーヤーによる相手プレーヤーとの不当な触れ合いである。相手プレーヤーと不当な触れ合いを起こしたプレーヤーはその状況に応じて罰せられる。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-12", "body": "33-12  例：ゲームクロックが動いていて、ボールがライブの状態でA1 はショットをした。B１はチームメイトのB２を押し、B２はショットの動作（アクトオブシューティング）中のA1に不当な触れ合いを起こした。ボールはバスケットに入った。\n解説：2 点もしくは3 点がA1 に与えられる。A1 に触れ合いを起こしたのはB２であり、B２にファウルが宣せられる。1本のフリースローがA1に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト：基本概念", "sec_no": "33-13", "body": "33-13  例：ゲームクロックが動いていて、ボールがライブの状態でA1はショットをした。B2はA2を押し、A2はチームメイトのA1に不必要な触れ合いを起こした。ボールはバスケットに入った。これはチームB のこのクォーター3 個目のチームファウルであった。\n解説：2 点あるいは3 点がA1 に与えられる。チームA はB2 のパーソナルファウルが起きた場所に最も近いアウトオブバウンズからスローインを与えられる。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-1", "body": "34-１  条文：第4クォーターや各オーバータイムで、ゲームクロックに2:00あるいはそれ以下が表示されていて、ボールがまだ審判の手の中にある、あるいはスローインを行うプレーヤーに手渡されている。このとき、コート上のディフェンスのプレーヤーがオフェンスのプレーヤーに不当に触れ合いを起こした場合、触れ合いがアンスポーツマンライクファウルの判定基準に合致しない限り、スローインファウルとなる。第4クォーターのチームファウルの数にかかわらず、誰もリバウンドの位置に着かずに、1本のフリースローがファウルをされたプレーヤーに与えられる。ゲームはファウルが起きた場所に最も近いアウトオブバウンズからファウルをされたチームのスローインで再開される。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-2", "body": "34-２  例：第4 クォーター残り1:31 で、スローインをするA1 がボールを手放す前に、コート上でB2 がA2 に不当に触れ合いを起こした。スローインファウルがB2 に宣せられた。\n解説：第4クォーターのチームBのチームファウルの数にかかわらず、誰もリバウンドの位置に着かずに1 本のフリースローがA2 に与えられる。ゲームはB2 のファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開され、\n⒜バックコートから再開される場合、ショットクロックは24 秒となる。\n⒝フロントコートから再開される場合、ショットクロックは14秒以上が表示されていた場合は継続となり、13 秒以下が表示されていた場合は14 秒となる。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-3", "body": "34-３  例：第4 クォーター残り1:24 で、ゲームクロックが動いている状態でのB1 のショットまたはB1 の最後のフリースローが成功したあと、スローインをするA1はエンドラインの外側でボールを持っている。A1 がボールを手放す前にコート上でB2 がA2 に不当に触れ合いを起こした。これはチームBのこのクォーター５個目のファウルだった。\n解説：B2の不当な触れ合いがアンスポーツマンライクファウルの基準に当てはまらない限り、スローインファウルとなる。第4 クォーターのチームB のチームファウルの数にかかわらず、誰もリバウンドの位置に着かずに1 本のフリースローがA2 に与えられる。ゲームはバックボードの真後ろを除いたB2 のファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。このスローインでチームAは、ゲームクロックが動いている状態でのショットまたは最後のフリースローが成功した後のように、コート上にボールを投げ入れる前に、指定されたスローインの位置からエンドラインに沿って動いて位置を変えたり、エンドライン側のアウトオブバウンズにいるチームメイトにボールをパスしたりする権利を持たない。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-4", "body": "34-４  例：第4 クォーター残り58 秒で、スローインをするA1 がボールを手放す前に、コート上でB2 はA2 に不当に触れ合いを起こした。\n解説：A2に対するB2の触れ合いがアンスポーツマンライクファウルの判定基準に合致しない限り、スローインファウルとなる。誰もリバウンドの位置に着かずに1本のフリースローがA2に与えられる。ゲームはB2のファウルが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開される。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-5", "body": "34-５  例：第4 クォーター残り55 秒で、スローインをするA1がボールを手放す前に、コート上でB2 がA2にアンスポーツマンライクファウルの判定基準に合致する方法で触れ合いを起こした。アンスポーツマンライクファウルがB2 に宣せられた。\n解説：誰もリバウンドの位置に着かずに2 本のフリースローがA2 に与えられる。ゲームはフロントコートのスローインラインからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-6", "body": "34-６  例：第4 クォーター残り54 秒で、スローインをするA1がボールを手放す前に、コート上でB2 がA2 に不当な触れ合いを起こした。スローインファウルがB2 に宣せられたあと、A1 にテクニカルファウルが宣せられた。\n解説：1本のフリースローがチームBのいずれかのプレーヤーに与えられたあと、1本のフリースローがA2に与えられる。ゲームはB2のファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。バックコートからのスローインの場合、ショットクロックは24 秒となる。フロントコートからのスローインの場合、ショットクロックは14 秒以上が表示されていた場合は継続となり、13 秒以下が表示されていた場合は14 秒となる。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-7", "body": "34-７  例：第4 クォーター残り53 秒で、スローインをするA1がボールを手放す前に、コート上でA2 がB2 に触れ合いを起こした。チームコントロールファウルがA2 に宣せられた。\n解説：チームAはA2のチームコントロールファウルによって有利となっていない。触れ合いがアンスポーツマンライクファウルあるいはディスクォリファイングファウルの判定基準に合致しない限り、A2はパーソナルファウルを宣せられる。ゲームはA2 のファウルが起きた場所に最も近いアウトオブバウンズからチームB のスローインで再開される。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-8", "body": "34-８  例：第4 クォーター残り51 秒、チームA 83 - チームB 80 で、スローインをするA1 がボールを持っているとき、コート上のスローインが行われている場所とは別の場所でB2がA2に触れ合いを起こした。B2 はA2 に対するファウルを宣せられた。\n解説：A2に対するB2の触れ合いがアンスポーツマンライクファウルの判定基準に合致しない限り、スローインファウルとなる。誰もリバウンドの位置に着かずに1本のフリースローがA2に与えられる。ゲームはB2のファウルが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開される。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-9", "body": "34-９  例：第4 クォーター残り48 秒、チームA 83 - チームB 80 で、スローインをするA1 の手からボールが離れたとき、コート上のスローインが行われている場所とは別の場所でB2 がA2 に触れ合いを起こした。B2 はA2 に対するファウルを宣せられた。\n解説：ボールはスローインをするA1の手からすでに離れているため、スローインファウルではない。\nA2に対するB2の触れ合いがアンスポーツマンライクファウルあるいはディスクォリファイングファウルの判定基準に合致しない限り、パーソナルファウルとなり、その状況に応じて罰せられる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-1", "body": "35-１  条文：ファウルには、パーソナルファウル、アンスポーツマンライクファウル、ディスクォリファイングファウル、テクニカルファウルがある。ダブルファウルとみなされるためには、2人の対戦プレーヤー間で互いにファウルをしていて、同じカテゴリー（ともにパーソナルファウル、もしくはアンスポーツマンライクファウルとディスクォリファイングファウルのいずれかの組み合わせ）でなければならない。チームファウルの数にかかわらずフリースローは与えられない。ダブルファウルには身体接触を伴わなければならないため、身体接触を伴わないテクニカルファウルはダブルファウルの一部ではない。\nほとんど同時に起きた両方のファウルが同じカテゴリー（ともにパーソナルファウル、もしくはアンスポーツマンライクファウルとディスクォリファイングファウルのいずれかの組み合わせ）でない場合、ダブルファウルではなく、罰則は互いに相殺されない。パーソナルファウルはいつでも最初に起き、アンスポーツマンライクファウルあるいはディスクォリファイングファウルは2番目に起きたと考えられる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-2", "body": "35-２  例：A１がドリブルをしているとき、A２とB２がテクニカルファウルを宣せられた。\n解説：テクニカルファウルはダブルファウルの一部ではない。罰則は互いに相殺される。ゲームは最初のテクニカルファウルが起きたとき、ボールがあった場所に最も近いアウトオブバウンズからチームAのスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-3", "body": "35-３  例：ドリブルをしているA１とB１がほとんど同時に互いにファウルをし、チームAのこのクォーター2個目、チームB のこのクォーター5 個目のチームファウルであった。\n解説：両方のファウルは同じカテゴリーである（パーソナルファウル）ため、ダブルファウルである。このクォーターでのチームファウルの数の違いは関係しない。ゲームはダブルファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-4", "body": "35-４  例：ショットの動作（アクトオブシューティング）中に両手でボールを持っているA１とB１がほとんど同時に互いにファウル（どちらもパーソナルファウル）を宣せられた。\n解説：両方のファウルは同じカテゴリーであるため、ダブルファウルである。\nA１のショットが成功した場合、ゴールは認められない。ゲームはフリースローラインの延長線上のアウトオブバウンズからチームA のスローインで再開される。\nA１のショットが成功しなかった場合、ゲームはダブルファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは継続となる。\nどちらの場合においても、チームA のショットクロックは継続となる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-5", "body": "35-５  例：ゲームクロックが動いていて、ボールがライブの状態でのA1のショットのボールが空中にあるとき、A１とB１がほとんど同時に互いにファウル（どちらもパーソナルファウル）を宣せられた。\n解説：両方のファウルは同じカテゴリーであるため、ダブルファウルである。\nA1のショットが成功した場合、ゴールは認められる。ゲームは通常のゲームクロックが動いていて、ボールがライブの状態でのゴールが成功した後と同様にエンドラインからチームBのスローインで再開される。\nA1のショットが成功しなかった場合、ジャンプボールシチュエーションとなる。ゲームはオルタネイティングポゼッションのスローインで再開される。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-6", "body": "35-６  例：チームA のこのクォーターのチームファウルが2 個、チームB のこのクォーターのチームファウルが3 個であるとき、\n⒜A２がドリブルをしている間に、A１とB１がポストの位置で互いに押し合った。\n⒝リバウンドの間に、A１とB１が互いに押し合った。\n⒞A１がA２からパスを受け取る間に、A１とB１が互いに押し合った。\n解説：全ての場合において、ダブルファウルである。\n⒜,⒞ゲームはダブルファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。\n⒝ゲームはオルタネイティングポゼッションのスローインで再開される。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-7", "body": "35-７  例：B１がドリブルをしているA１を押し、パーソナルファウルを宣せられ、チームBのこのクォーター3 個目のチームファウルであった。ほとんど同時にA１がB１に肘打ちをしてアンスポーツマンライクファウルを宣せられた。\n解説：2つのファウルは同じカテゴリーではない（パーソナルファウルとアンスポーツマンライクファウル）ため、ダブルファウルではない。罰則は互いに相殺されない。パーソナルファウルはいつでも先に起きたとみなされる。更なるファウルの罰則があるため、チームAのスローインの罰則は取り消される。誰もリバウンドの位置に着かずに2 本のフリースローがB１に与えられる。ゲームはフロントコートのスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-8", "body": "35-８  例：B１がドリブルをしているA１を押し、パーソナルファウルを宣せられ、チームBのこのクォーター5 個目のチームファウルであった。ほとんど同時にA１がB１に肘打ちをしてアンスポーツマンライクファウルを宣せられた。\n解説：2つのファウルは同じカテゴリーではない（パーソナルファウルとアンスポーツマンライクファウル）ため、ダブルファウルではない。罰則は互いに相殺されない。パーソナルファウルはいつでも最初に起きたと考えられる。誰もリバウンドの位置に着かずに2本のフリースローがA１に与えられたあと、誰もリバウンドの位置に着かずに2 本のフリースローがB１に与えられる。ゲームはフロントコートのスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-9", "body": "35-９  例：ドリブルをしているA１がB１にチームコントロールファウルをし、このクォーター5 個目のチームファウルであった。ほとんど同時にB１がA１に肘打ちをしてアンスポーツマンライクファウルを宣せられた。\n解説：2つのファウルは同じカテゴリーではない（パーソナルファウルとアンスポーツマンライクファウル）ため、ダブルファウルではない。罰則は互いに相殺されない。パーソナルファウルはいつでも最初に起きたと考えられる。更なるファウルの罰則があるため、チームBのスローインの罰則は取り消される。誰もリバウンドの位置に着かずに2 本のフリースローがA１に与えられる。ゲームはフロントコートのスローインラインからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-10", "body": "35-10  例：A１がドリブルをしているとき、A１とB１がほとんど同時に互いにファウルを宣せられた。\n⒜両方のファウルはパーソナルファウルであった。\n⒝両方のファウルはアンスポーツマンライクファウルであった。\n⒞A１のファウルはアンスポーツマンライクファウル、B１のファウルはディスクォリファイングファウルであった。\n⒟A１のファウルはディスクォリファイングファウル、B１のファウルはアンスポーツマンライクファウルであった。\n解説：全ての場合において、2つのファウルは同じカテゴリーである（パーソナルファウルあるいはアンスポーツマンライクファウル／ディスクォリファイングファウル）ため、ダブルファウルである。ゲームはダブルファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-1", "body": "36-１  条文：繰り返された場合にテクニカルファウルとなる行為や振る舞いには、オフィシャルワーニング（警告）が当該プレーヤーに与えられる。この警告は当該チームのヘッドコーチにも伝達され、そのゲームの残り時間、当該チームのいずれかのメンバーによる同様の行為に適用される。オフィシャルワーニングは、ボールがデッドになりゲームクロックが止められたときにのみ与えられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-2", "body": "36-２  例：A１はスローインを妨げたこと、あるいはその他の繰り返された場合にテクニカルファウルとなる行為で警告を与えられた。\n解説：A１の警告はチームAのヘッドコーチにも伝達され、そのゲームの残り時間、チームAの全てのメンバーによる同様の行為に適用される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-3", "body": "36-３  条文：プレーヤーがショットの動作（アクトオブシューティング）をしている間に相手プレーヤーは手をシューターの目の近くにかざしたり、大声で叫んだり、両足を強く踏み鳴らしたり、シューターの近くで両手を叩いたりしてシューターを当惑させることはできない。そのような行為によってシューターが不利になった場合はテクニカルファウルとなり、シューターが不利にならなかった場合は警告が与えられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-4", "body": "36-４  例：A１はショットの動作（アクトオブシューティング）中で、まだボールを手に持っているとき、B１がA1の顔（目）の前で手を振ったり、コート上で大声で叫んだり、あるいは両足を強く踏み鳴らしてA１の気を逸らしたりした。A１のショットは、\n⒜成功した。\n⒝成功しなかった。\n解説：\n⒜A１のゴールは認められる。B１は警告を与えられ、その警告はチームBのヘッドコーチにも伝達される。ゲームはエンドラインからチームB のスローインで再開される。\nチームBのいずれかのメンバーがすでに同様の振る舞いへの警告を与えられていた場合、B１はテクニカルファウルを宣せられる。誰もリバウンドの位置に着かずにチームAのいずれかのプレーヤーに1 本のフリースローが与えられる。\n⒝B１はテクニカルファウルを宣せられる。誰もリバウンドの位置に着かずに1 本のフリースローがチームAのいずれかのプレーヤーに与えられる。ゲームはB１のテクニカルファウルが起きたときにボールがあった場所に最も近いアウトオブバウンズからチームA のスローインで再開される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-5", "body": "36-５  条文：ゲームクロックが動いている間に同じチームの6 人以上のプレーヤーが同時にコート上にいることを審判が発見したとき、少なくとも1人のプレーヤーは不当にコート上に戻ってきたか、あるいはとどまったことになる。\n相手チームに不利にならない状況で、できる限りすぐにその誤りは訂正されなければならない。\n6人以上のプレーヤーが不当にゲームに出てから、そのことが発見されてゲームが止められるまでの間に起きた全ての事象は有効なままとなる。\n少なくとも1人のプレーヤーはチームベンチに戻される。テクニカルファウルがそのチームのヘッドコーチに宣せられ、スコアシートに「B１」と記入される。ヘッドコーチは交代が正しく行われたかを確認する責任がある。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-6", "body": "36-６  例：ゲームクロックが動いている状態で、6 人のチームA のプレーヤーがコート上にいた。\nそのことが発見されたとき、\n⒜チームB（プレーヤー5 人）がボールをコントロールしていた。\n⒝チームA（プレーヤー6 人以上）がボールをコントロールしていた。\n解説：チームB が不利にならない状況で、ゲームは速やかに止められる。ヘッドコーチに指名された1 人のプレーヤーはチームベンチに戻される。チームA のヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B１」と記入する。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-7", "body": "36-７  例：ゲームクロックが動いている状態で、6 人のチームA のプレーヤーがコート上にいた。これは、\n⒜A１がチームコントロールファウルを宣せられた後で発見された。\n⒝A１が得点をした後で発見された。\n⒞B1 がショットの動作（アクトオブシューティング）中のA1 にファウルをした後で発見された。ショットは成功しなかった。\n⒟チームA の6 人目のプレーヤーがコートを離れた後で発見された。\n解説：\n全ての場合において、チームAのヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B1」と記入される。\n⒜,⒝,⒞では、ヘッドコーチが指名したチームAのプレーヤーはチームベンチに戻される。誰もリバウンドの位置に着かずに1 本のフリースローがチームB のいずれかのプレーヤーに与えられる。\nゲームは\n⒜A1 のファウルが起きた場所に最も近いアウトオブバウンズからチームB のスローインで再開される。\n⒝通常のショットが成功した後と同様にエンドラインの後方からチームB のスローインで再開される。\n⒞A1 の2 本もしくは3 本のフリースローで再開される。\n⒟止められた場所に最も近いところから再開される。どちらのチームもボールのコントロールがなかった、あるいはボールが与えられることになっていなかった場合はジャンプボールとなる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-8", "body": "36-８  条文：5 個目のファウルを宣せられたあと、そのプレーヤーは「5 個のファウルを宣せられたチームメンバー」となり、チームベンチに座ることができる。\nゲームクロックが動いている間に5個のファウルを宣せられたチームメンバーがコート上にいることを審判が発見したとき、そのチームメンバーは不当にコート上に戻ってきたか、あるいはとどまったことになる。\n相手チームに不利にならない状況で、できる限り速やかにその誤りは訂正されなければならない。\n5個のファウルを宣せられたチームメンバーが不当にゲームに出てから、そのことが発見されてゲームが止められるまでの間に起きた全ての事象は有効なままとなる。\n5個のファウルを宣せられたチームメンバーはチームベンチに戻される。テクニカルファウルがそのチームのヘッドコーチに宣せられ、スコアシートに「B1」と記入される。ヘッドコーチはプレーをする資格のあるプレーヤーだけが、ゲームクロックが動いている間にコート上でプレーしていることを確認する責任がある。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-9", "body": "36-９  例：ゲームクロックが動いている状態で、5個のファウルを宣せられたチームメンバーであるB1がコート上にいた。B１が不当にゲームに出ていることが、\n⒜ボールが再びライブになったあと、チームA がボールをコントロールしている間に発見された。\n⒝ボールが再びライブになったあと、チームB がボールをコントロールしている間に発見された。\n⒞B１がまだコート上にいて、ボールが再びデッドになったあとに発見された。\n解説：\nチームAが不利にならない状況で、ゲームは速やかに止められる。B1はチームベンチに戻される。\nチームB のヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B1」と記入する。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-10", "body": "36-10  例：ゲームクロックが動いている状態で、5個のファウルを宣せられたチームメンバーであるA1がコート上にいた。A１が不当にゲームに出ていることが、\n⒜A１が得点した後に発見された。\n⒝A１がB１にファウルをした後に発見された。\n⒞B１がドリブルをしているA１にファウルをした後に発見された。これはチームBのこのクォーター5個目のチームファウルであった。\n解説：\nチームBが不利にならない状況で、ゲームは速やかに止められる。A1はチームベンチに戻される。\nチームA のヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B1」と記入する。\n⒜A１のゴールは認められる。\n⒝A１のファウルはプレーヤーとしてのファウルである。このファウルはスコアシートのA１の5 個目のファウルの横のスペースに記入される。\n⒞2 本のフリースローがA１と交代したプレーヤーに与えられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-11", "body": "36-11  例：第4 クォーター残り7 秒、チームA 70 - チームB 70 で、A1 は5 個目のファウルを宣せられ「5 個のファウルを宣せられたチームメンバー」となった。タイムアウトのあと、チームA がボールのコントロールを得て、A1が得点した。このときA1が不当にコート上にいることが発見され、ゲームクロックは残り1 秒であった。\n解説：A1のゴールは認められる。チームAのヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B1」と記入される。誰もリバウンドの位置に着かずに、1 本のフリースローがチームB のいずれかのプレーヤーに与えられる。ゲームはエンドラインからチームBのスローインで再開され、ゲームクロックは残り1 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-12", "body": "36-12  条文：プレーヤーがフェイクをしたときには、以下の手順を適用する。\n・ゲームを止めずに「前腕を上にあげる（ローワー・ザ・フォアアーム）」シグナルを2 回示す。\n・いずれかの理由でゲームが止められたとき、警告が当該プレーヤーとそのチームのヘッドコーチに伝達される。両チームはそれぞれ1 度まで警告を与えられる。\n・次にそのチームのプレーヤーがフェイクをしたとき、テクニカルファウルが宣せられる。これはゲームが止まらず、最初の警告が当該プレーヤーあるいはそのチームのヘッドコーチに伝達される前であっても適用される。\n・体の触れ合いのない過度なフェイクを行った場合、警告は与えられず、速やかにテクニカルファウルが宣せられる。\n・同じシチュエーションでファウルやバイオレーションが宣せられたかどうかにかかわらず、プレーヤーがフェイクをした状況は対処される。\n・ファウルを宣せられたプレーヤーがあわせてフェイクの警告を与えられることや、ファウルをされたプレーヤーがフェイクの警告を与えられることもある。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-13", "body": "36-13  例：B1がドリブルをしているA1 をディフェンスした。A1はB1を押した上で、あたかもB1にファウルをされたかのような印象を与えようと頭部を急に動かした。審判はA1 にファウルを宣した。\n解説：A１のファウルに加えて、審判はA1 にフェイクの警告（これがチームA の最初のフェイクで、過度なフェイクではない場合）を与える、もしくはテクニカルファウル（チームAがすでにフェイクの警告を与えられている、もしくは最初でも過度なフェイクであった場合）を宣する。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-14", "body": "36-14  例：B1 がドリブルをしているA1 をディフェンスした。B1 がA1 を押したとき、A1 はあたかもB1 にファウルをされたかのような印象を与えようと頭部を急に動かした。審判はB1 にファウルを宣した。\n解説：B１のファウルに加えて、審判はA1 にフェイクの警告（これがチームA の最初のフェイクで、過度なフェイクではない場合）を与える、もしくはテクニカルファウル（チームAがすでにフェイクの警告を与えられている、もしくは最初でも過度なフェイクであった場合）を宣する。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-15", "body": "36-15  例：B１がドリブルをしているA１をディフェンスした。A１はあたかもB１にファウルをされたかのような印象を与えようと頭部を急に動かした。審判はA1に「ローワー・ザ・フォアアーム」のシグナルを2回示した。その後ゲームクロックが1 度も止められずに動き続けている状態で、\n⒜A1 があたかもB1 に押されたかのような印象を与えようとコート上に倒れた。\n⒝B2 があたかもA2 に押されたかのような印象を与えようとコート上に倒れた。\n解説：\n⒜審判はA1 の頭部での最初のフェイクに対して、「ローワー・ザ・フォアアーム」シグナルを2 回示してすでに警告を与えている。ゲームが止められず、A1 あるいはチームA のヘッドコーチにA1 の最初のフェイクの警告が伝達されていなかった場合でも、コート上に倒れた2 度目のフェイクによってA1 はテクニカルファウルを宣せられる。\n⒝審判はB2 のフェイクに対して、「ローワー・ザ・フォアアーム」シグナルを2 回示して最初の警告を与える。いずれかの理由で次にゲームが止められたとき、警告がB2とチームBのヘッドコーチに伝達される。A1のフェイクのあと、これが最初にゲームが止められた時点であるため、その警告もA1 とチームA のヘッドコーチに伝達される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-16", "body": "36-16  例：B1 がドリブルをしているA1 をディフェンスした。B1 はあたかもA1 にファウルをされたかのような印象を与えようとコート上に倒れた。ほとんど同時にA1 はあたかもB1 にファウルをされたかのような印象を与えようと頭部を急に動かした。\n解説：審判はA1 とB1 の両方にフェイクの警告（これがチームの最初のフェイクで、過度なフェイクではない場合）を与える、もしくはテクニカルファウル（チームがすでにフェイクの警告を与えられている、もしくは最初でも過度なフェイクであった場合）を宣する。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-17", "body": "36-17  条文：特にリバウンド争いやディフェンスがオフェンスに近接してガードしている場合などで、過度に肘を振り回すことは、重大な怪我につながる可能性がある。そのような行為で体の触れ合いがあった場合、パーソナルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルが宣せられる。触れ合いがない場合、テクニカルファウルが宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-18", "body": "36-18  例：A１がリバウンドのボールを取ってコートに着地した。その後B１がA1を近接してガードした。\nA１がB１を威嚇するため、またはピボットやパス、ドリブルをするための十分なスペースを確保するために、過度に肘を振り回したがB１には当たらなかった。\n解説：A１の行為はルールの精神や目的に反するものである。A１にテクニカルファウルが宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-19", "body": "36-19  条文：2個のテクニカルファウル、あるいは2個のアンスポーツマンライクファウル、もしくは1個のテクニカルファウルと1個のアンスポーツマンライクファウルを記録されたプレーヤーは、自動的に失格・退場となる。\n自身のスポーツマンらしくない振る舞いによる2 個のテクニカルファウル「C」、あるいは3 個の「B」、もしくは2 個の「B」と1 個の「C」が記録されたヘッドコーチは、自動的に失格・退場となる。\n失格・退場となった人物は、直ちにゲームを離れ（30秒以内）、ゲーム終了までチームの控室にとどまるか、または建物から出なければならない。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-20", "body": "36-20  例：A１は前半にリングにぶらさがった行為で1 個目のテクニカルファウルを宣せられた。そして後半にスポーツマンらしくない行為があったとして２個目のテクニカルファウルを宣せられた。\n解説：A１は自動的に失格・退場となる。2個目のテクニカルファウルではテクニカルファウルの罰則のみが与えられ、失格・退場への追加の罰則は与えられない。スコアラーはプレーヤーが2 個のテクニカルファウルを宣せられ、自動的に失格・退場となることを速やかに審判に知らせなければならない。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-21", "body": "36-21  条文：5 個目のファウルを宣せられたあと、そのプレーヤーは「5 個のファウルを宣せられたチームメンバー」となる。5個目のファウルのあと、そのプレーヤーの行為に対する更なるテクニカルファウルはヘッドコーチに宣せられ「B1」と記入される。\n5 個のファウルを宣せられたプレーヤーは失格・退場となるプレーヤーではなく、チームベンチエリアにとどまることを許される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-22", "body": "36-22  例：第1 クォーターで、B1 は\n⒜テクニカルファウル\n⒝アンスポーツマンライクファウルを宣せられた。第4 クォーターでB1 は5 個目のファウルを宣せられ、このクォーター2 個目のチームファウルであった。チームベンチに向かう間に、B1 に対してテクニカルファウルが宣せられた。\n解説：どちらの場合においても、B1 は退場とはならない。5 個目のファウルによって、B1 は5 個のファウルを宣せられたチームメンバーとなる。B1による更なるテクニカルファウルはヘッドコーチに宣せられ「B1」と記入される。誰もリバウンドの位置に着かずに1 本のフリースローがチームA のいずれかのプレーヤーに与えられる。ゲームはB１の最後のテクニカルファウルが起きたときにボールがあった場所に最も近いアウトオブバウンズからチームA のスローインで再開される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-23", "body": "36-23  例：B１がドリブルをしているA１にファウルをした。これはB１の５個目のパーソナルファウル、チームB の２個目のチームファウルであった。チームベンチに向かう間に、B１がディスクォリファイングファウルを宣せられた。\n解説：B１は失格・退場となり、自チームの控室に戻るか、あるいは建物から出なければならない。B１のディスクォリファイングファウルはスコアシートのB１の5個目のファウルの横のスペースに「D」、チームBのヘッドコーチに「B２」と記入される。誰もリバウンドの位置に着かずに2本のフリースローがチームA のいずれかのプレーヤーに与えられる。ゲームはフロントコートのスローインラインからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-24", "body": "36-24  例：B１がドリブルをしているA１にファウルをした。これはB１の５個目のパーソナルファウル、チームBのこのクォーターの５個目のチームファウルであった。チームベンチに向かう間に、B１がディスクォリファイングファウルを宣せられた。\n解説：B１は失格・退場となり、自チームの控室に戻るか、あるいは建物から出なければならない。B１のディスクォリファイングファウルはスコアシートのB１の5個目のファウルの横のスペースに「D」、チームBのヘッドコーチに「B２」と記入される。誰もリバウンドの位置に着かずに2本のフリースローがA１に与えられる。そのあと、誰もリバウンドの位置に着かずに2本のフリースローがチームA のいずれかのプレーヤーに与えられる。ゲームはフロントコートのスローインラインからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-25", "body": "36-25  例：前半にA１がゲームの遅延行為（ディレイオブゲーム）によるテクニカルファウルを宣せられた。後半にA１はB１に対するアンスポーツマンライクファウルの判定基準に合致する触れ合いでアンスポーツマンライクファウルを宣せられた。\n解説：タイマー（国内大会ではスコアラー）はプレーヤーが1個のテクニカルファウルと1個のアンスポーツマンライクファウルを宣せられ、自動的に失格・退場となることを速やかに審判に知らせなければならない。A1 のアンスポーツマンライクファウルの罰則のみが与えられ、A1 の失格・退場への追加の罰則は与えられない。誰もリバウンドの位置に着かずに2本のフリースローがB1に与えられる。ゲームはフロントコートのスローインラインからチームBのスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-26", "body": "36-26  例：A１は前半にオフェンスの進行を妨げるための不必要なファウルによりアンスポーツマンライクファウルを宣せられた。後半にA２がバックコートでドリブルをしているとき、A１はボールの無い場所でファウルをされたとみせかけるフェイクにより、テクニカルファウルを宣せられた。\n解説：タイマー（国内大会ではスコアラー）はプレーヤーが1個のアンスポーツマンライクファウルと1個のテクニカルファウルを宣せられ、自動的に失格・退場となることを速やかに審判に知らせなければならない。A1のテクニカルファウルの罰則のみが与えられ、A1の失格・退場への追加の罰則は与えられない。誰もリバウンドの位置に着かずに1 本のフリースローがチームB のいずれかのプレーヤーに与えられる。ゲームはA１のテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-27", "body": "36-27  条文：プレーヤー兼ヘッドコーチが自動的に失格・退場となるのは以下のファウルを宣せられたときである。\n・プレーヤーとして２個のテクニカルファウル\n・プレーヤーとして２個のアンスポーツマンライクファウル\n・プレーヤーとして１個のテクニカルファウルと１個のアンスポーツマンライクファウル\n・ヘッドコーチとして１個のテクニカルファウル「Ｃ１」とプレーヤーとして１個のテクニカルファウルまたはアンスポーツマンライクファウル\n・ヘッドコーチとして１個のテクニカルファウル「B１」または「B２」と、ヘッドコーチとして１個のテクニカルファウル「Ｃ１」、そしてプレーヤーとして１個のアンスポーツマンライクファウルまたはテクニカルファウル\n・ヘッドコーチとして２個のテクニカルファウル「B１」または「B２」とプレーヤーとして１個のテクニカルファウルまたはアンスポーツマンライクファウル\n・ヘッドコーチとして２個のテクニカルファウル「Ｃ１」\n・ヘッドコーチとして１個のテクニカルファウル「Ｃ１」と、ヘッドコーチとして２個のテクニカルファウル「B１」または「B２」\n・ヘッドコーチとして３個のテクニカルファウル「B１」または「B２」\nプレーヤー兼ヘッドコーチが失格・退場となった場合は、スコアシートの自動的な失格・退場の原因となったファウルの後に「GD」と記入される。新たにキャプテンに指名されたプレーヤーが新たなプレーヤー兼ヘッドコーチとなる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-28", "body": "36-28  例：プレーヤー兼ヘッドコーチのA１が、第１クォーターにプレーヤーとしてフェイクによるテクニカルファウルを宣せられた。第４クォーターでA２がドリブルをしているとき、A１自身のスポーツマンらしくない振る舞いによって、ヘッドコーチとしてA１にテクニカルファウルが宣せられ「Ｃ1」と記入された。\n解説：プレーヤー兼ヘッドコーチのA１は自動的に失格・退場となる。A１の2 個目のテクニカルファウルの罰則のみが与えられ、失格・退場への追加の罰則は与えられない。タイマー（国内大会ではスコアラー）はプレーヤー兼ヘッドコーチのA１がプレーヤーとして1個のテクニカルファウル、その後ヘッドコーチとして自身の振る舞いによって1個のテクニカルファウルを宣せられ、自動的に失格・退場となることを速やかに審判に知らせなければならない。誰もリバウンドの位置に着かずに1本のフリースローがチームB のいずれかのプレーヤーに与えられる。ゲームはA１のテクニカルファウルが起きたとき、ボールがあった場所に最も近いアウトオブバウンズからチームAのスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-29", "body": "36-29  例：プレーヤー兼ヘッドコーチのA１が、第２クォーターにプレーヤーとしてB１に対するアンスポーツマンライクファウルを宣せられた。第３クォーターでA２がドリブルをしているとき、チームAの理学療法士のスポーツマンらしくない振る舞いによってヘッドコーチとしてテクニカルファウルが宣せられ「B１」と記入された。更に第４クォーターでA２がドリブルをしているとき、A６がテクニカルファウルを宣せられた。A６のテクニカルファウルはA１ にヘッドコーチとして「B１」と記入された。\n解説：プレーヤー兼ヘッドコーチのA１は自動的に失格・退場となる。（A６の行為による）A１の2個目のテクニカルファウルの罰則のみが与えられ、失格・退場への追加の罰則は与えられない。タイマー（国内大会ではスコアラー）はプレーヤー兼ヘッドコーチのA１がプレーヤーとして1 個のアンスポーツマンライクファウル、その後ヘッドコーチとしてチームメンバーの振る舞いの結果による2個のテクニカルファウルを宣せられ、自動的に失格・退場となることを速やかに審判に知らせなければならない。誰もリバウンドの位置に着かずに1 本のフリースローがチームB のいずれかのプレーヤーに与えられる。ゲームはA６のテクニカルファウルが起きたとき、ボールがあった場所に最も近いアウトオブバウンズからチームA のスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-30", "body": "36-30  例：プレーヤー兼ヘッドコーチのA１が、第２クォーターにA１自身のスポーツマンらしくない振る舞いによってヘッドコーチとしてテクニカルファウルを宣せられ「C1」と記録された。第４クォーターでA１にプレーヤーとしてB１に対するアンスポーツマンライクファウルが宣せられた。\n解説：プレーヤー兼ヘッドコーチのA１は自動的に失格・退場となる。A１のアンスポーツマンライクファウルの罰則のみが与えられ、失格・退場への追加の罰則は与えられない。タイマー（国内大会ではスコアラー）はプレーヤー兼ヘッドコーチのA１が自身の振る舞いによってヘッドコーチとして1 個のテクニカルファウル、その後プレーヤーとして１個のアンスポーツマンライクファウルを宣せられ、自動的に失格・退場となることを速やかに審判に知らせなければならない。誰もリバウンドの位置に着かずに2本のフリースローがB１に与えられる。ゲームはフロントコートのスローインラインからチームBのスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-31", "body": "36-31  例：プレーヤー兼ヘッドコーチのA1がコート上でプレーしているとき、交代要員のA6がテクニカルファウルを宣せられた。\n解説：チームベンチに座ることを許された人物のスポーツマンらしくない振る舞いによるテクニカルファウルは、ファーストアシスタントコーチがスコアシートに記入されていたとしても、プレーヤー兼ヘッドコーチに宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-32", "body": "36-32  例：プレーのインターバル中に、\n⒜交代要員のA6\n⒝プレーヤー兼ヘッドコーチのA1\n⒞チームA のドクターがテクニカルファウルを宣せられた。\n解説：テクニカルファウルは、ファーストアシスタントコーチがスコアシートに記入されていたとしても、\n⒜プレーヤーとしてA6\n⒝プレーヤーとしてのA1\n⒞プレーヤー兼ヘッドコーチとしてA1に宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-33", "body": "36-33  例：プレーヤー兼ヘッドコーチのA1が４個のプレーヤーとしてのファウルと１個のヘッドコーチとしてのテクニカルファウルを宣せられた。\n解説：プレーヤー兼ヘッドコーチのA1は、あわせて5個のファウルを宣せられており、プレーを続けることはできない。A1 はヘッドコーチとして役割を続けることができる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-34", "body": "36-34  例：プレーヤー兼ヘッドコーチのA1が1個のプレーヤーとしてのテクニカルファウルと1個のヘッドコーチとしてのテクニカルファウルを宣せられた。\n解説：プレーヤー兼ヘッドコーチは個人として2 個のテクニカルファウルを宣せられているため、自動的に失格・退場となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-35", "body": "36-35  条文：第４クォーター、各オーバータイムでゲームクロックが２:00 あるいはそれ以下を表示していて、審判がスローインのボールを与えるとき、スローインをするプレーヤーがディフェンスをされている場合は次の手順が適用される。\n・審判はスローインのボールを与える前に、ディフェンスのプレーヤーへの警告として「イリーガルバウンダリラインクロッシング」のシグナルを示す。\n・その後、スローインを妨げようとしてディフェンスプレーヤーの体の一部が境界線を越えた場合、それ以上の警告はなくテクニカルファウルが宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-36", "body": "36-36  例：第４クォーター残り１:08 で、\n⒜フロントコート\n⒝バックコートのサイドラインにいるA1がスローインのボールを持っていた。審判はB1に警告として「イリーガルバウンダリラインクロッシング」のシグナルを示した。B1がA1のスローインを妨げようと境界線を越えて手を動かした。\n解説：審判はA１にボールを与える前にB１に警告のシグナルを示しており、B１はスローインを妨げたとしてテクニカルファウルを宣せられる。誰もリバウンドの位置に着かずに1本のフリースローがチームA のいずれかのプレーヤーに与えられる。ゲームはB１のテクニカルファウルが起きたときにボールがあった場所に最も近いアウトオブバウンズから、チームA のスローインで再開される。ショットクロックは\n⒜14 秒以上が表示されていた場合は継続となり、13 秒以下が表示されていた場合は14 秒\n⒝24 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-37", "body": "36-37  条文：最初の3 クォーターと、第4 クォーター、各オーバータイムでゲームクロックが2:01 以上を表示していている間のスローインで、スローインを妨げようとしてディフェンスプレーヤーの体の一部が境界線を越えた場合、次の手順が適用される：\n・審判は速やかにゲームを止め、そのディフェンスのプレーヤーとそのチームのヘッドコーチに口頭で警告を与える。この警告はゲームの残り時間中、そのチームの全てのプレーヤーに適用される。\n・その後、スローインを妨げようとしてディフェンスプレーヤーの体の一部が境界線を越えた場合、それ以上の警告はなくテクニカルファウルが宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-38", "body": "36-38  例：第2 クォーター残り4:27 で、B1 のゴールのあと、A1 がエンドラインの外側でスローインのボールを持っている。B1 がA1 のスローインを妨げようと境界線を越えて手を動かした。\n解説：\n⒜チームBのプレーヤーがゲーム中で初めてスローインを妨げた場合、審判は速やかにゲームを止め、B1とチームBのヘッドコーチに口頭で警告を与える。この警告はゲームの残り時間中、チームB の全てのプレーヤーに適用される。\n⒝いずれかのチームBのプレーヤーがスローインを妨げたことで、ゲーム中に審判がすでに口頭で警告を与えていた場合、B1はテクニカルファウルを宣せられる。誰もリバウンドの位置に着かずに1本のフリースローがチームAのいずれかのプレーヤーに与えられる。ゲームはエンドラインからチームA のスローインで再開され、ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-39", "body": "36-39  条文：テクニカルファウルが宣せられたとき、罰則として誰もリバウンドの位置に着かずに1 本のフリースローが速やかに行われる。フリースローが行われたあと、ゲームはテクニカルファウルが起きたときにボールがあった場所に最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-40", "body": "36-40  例：ショットクロックが残り21 秒で、A１がバックコートでドリブルをしているとき、B１がテクニカルファウルを宣せられた。\n解説：誰もリバウンドの位置に着かずに1 本のフリースローがチームA のいずれかのプレーヤーに与えられる。B１のテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズから、チームA のスローインでゲームが再開される。チームA に新たな８秒が与えられ、ショットクロックは24 秒にリセットされる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-41", "body": "36-41  例：ショットクロックが残り21 秒で、A１がバックコートでドリブルをしているとき、A２がテクニカルファウルを宣せられた。\n解説：誰もリバウンドの位置に着かずに1 本のフリースローがチームB のいずれかのプレーヤーに与えられる。A2 のテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズから、チームA のスローインでゲームが再開される。チームA は５秒でボールをフロントコートに進めなければならず、ショットクロックは21 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-42", "body": "36-42  例：A１がツーポイントショットを打とうとしたとき、B１にファウルをされた。ボールはバスケットに入らなかった。\n⒜A1 の2 本のフリースローのうち、最初のフリースローが行われる前にA2 がテクニカルファウルを宣せられた。\n⒝A1 の2 本のフリースローのうち、最初のフリースローが行われた後にA2 がテクニカルファウルを宣せられた。\n解説：\n⒜誰もリバウンドの位置に着かずに1本のフリースローが、チームBのいずれかのプレーヤーに与えられたあと、2 本のフリースローがA1 に与えられる。\n⒝誰もリバウンドの位置に着かずに1本のフリースローが、チームBのいずれかのプレーヤーに与えられたあと、2 本目のフリースローがA1 に与えられる。\nどちらの場合においても、ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-43", "body": "36-43  例：タイムアウトの間にテクニカルファウルがA２に宣せられた。\n解説：タイムアウトは最後まで終えられる。タイムアウト後、誰もリバウンドの位置に着かずに1本のフリースローが、交代要員を含めたチームBのいずれかのプレーヤーに与えられる。ゲームはタイムアウトでゲームが中断されたところに最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-44", "body": "36-44  例：ゲームクロックが動いている状態でA1 のショットのボールが空中にあるとき、テクニカルファウルが、\n⒜B１またはチームB のドクターに宣せられた。\n⒝A２またはチームA のドクターに宣せられた。\n解説：\n⒜1 本のフリースローがチームA のいずれかのプレーヤーに与えられる。\n⒝1 本のフリースローがチームB のいずれかのプレーヤーに与えられる。\nA１のショットのボールがバスケットに入った場合、ゴールは認められる。ゲームはエンドラインの外の任意のアウトオブバウンズから、チームB のスローインでゲームが再開される。\nA1のショットのボールがバスケットに入らなかった場合、ゲームはテクニカルファウルが起きたときにボールがあった場所に最も近いアウトオブバウンズからオルタネイティングポゼッションのスローインでゲームが再開される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-45", "body": "36-45  例：A１がショットの動作（アクトオブシューティング）中にボールを手に持ったとき、テクニカルファウルが、\n⒜B１またはチームB のドクターに宣せられた。\n⒝A２またはチームA のドクターに宣せられた。\n解説：\n⒜1 本のフリースローがチームA のいずれかのプレーヤーに与えられる。A1のショットのボールがバスケットに入った場合、ゴールは認められる。ゲームはエンドラインの任意のアウトオブバウンズからチームB のスローインで再開される。\n⒝1 本のフリースローがチームB のいずれかのプレーヤーに与えられる。A1のショットのボールがバスケットに入った場合、ゴールは認められない。ゲームはフリースローラインの延長線上のアウトオブバウンズからチームA のスローインで再開される。\nどちらの場合においても、A1のショットのボールがバスケットに入らなかった場合、ゲームはテクニカルファウルが起きたときにボールがあった場所に最も近いアウトオブバウンズからチームAのスローインで再開される。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-1", "body": "37-１  条文：相手チームのバスケットに向かって進行しているプレーヤーと、その相手チームのバスケットとの間に相手チームのプレーヤーが全くいない状況で、進行しているプレーヤーの後ろあるいは横から起こす不当な触れ合いに対しては、オフェンスのプレーヤーがショットの動作（アクトオブシューティング）を始める前であれば、アンスポーツマンライクファウルが宣せられる。しかし、アンスポーツマンライクファウルの判定基準に合致する、ボールに対するプレーではなく、かつ、正当なバスケットボールのプレーとは認められないプレーでの触れ合いや過度に激しい触れ合いについてはゲーム中のいかなる状況においてもアンスポーツマンライクファウルが宣せられる。\n【補足】「相手チームのプレーヤーが全くいない状況」とは、速攻などで確実にその後得点をできる状況（クリアパス）を指す。また「相手チームのバスケットとの間」には、バスケットの真下は含まれない。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-2", "body": "37-２  例：A１が速攻でバスケットに向かってドリブルをしているとき、A１とそのチームが攻めるバスケットの間に相手のプレーヤーが全くいない状況で、B１はA１に後ろから触れ合いを起こし、ファウルを宣せられた。\n解説：B１のアンスポーツマンライクファウルである。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-3", "body": "37-３  例：速攻の終わりでA１がショットの動作（アクトオブシューティング）を始めるためにボールを持つ前に、B１がA１の腕に後ろから、\n⒜ボールをスティールしようとして触れ合いを起こした。\n⒝アンスポーツマンライクファウルの判定基準に合致する触れ合いを起こした。\n【補足】この項目での「速攻」とはクリアパスの状況を指す。\n解説：どちらの場合においても、B１のアンスポーツマンライクファウルが宣せられる。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-4", "body": "37-４  例：速攻の終わりでA１がショットの動作（アクトオブシューティング）中にボールを持ったとき、B1がA1 の腕に後ろから：\n⒜ボールをブロックしようとして触れ合いを起こした。\n⒝アンスポーツマンライクファウルの判定基準に合致する触れ合いを起こした。\n【補足】この項目での「速攻」とはクリアパスの状況を指す解説：\n⒜B１のパーソナルファウルである。\n⒝B１のアンスポーツマンライクファウルである。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-5", "body": "37-５  例：A1はバックコートから、フロントコートで相手チームのバスケットに向かって進行しているA2にボールをパスした。A2 と相手チームのバスケットの間にはチームB のプレーヤーはいなかった。A2 は空中にジャンプをしたが、ボールをキャッチする前に、B1が後ろから触れ合いを起こし、B1はファウルを宣せられた。\n解説：A2 へのパスのボールが放たれたあと、A2 とチームB のバスケットとの間にチームB のプレーヤーが全くいない状況で、進行しているプレーヤーの後ろあるいは横から起こす不当な触れ合いであるため、B1 のアンスポーツマンライクファウルである。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-6", "body": "37-６  例：A1 はバックコートでボールを持っている。フロントコートにいるA2 は、相手チームのバスケットに向かって進行していて、A2と相手チームのバスケットの間にはチームBのプレーヤーはいなかった。\nA1 からA2 へのパスのボールが放たれる前に、B1 がA2 に後ろから触れ合いを起こした。\n解説：A1 からA2 へのパスのボールがまだ放たれていないことから、A2 とチームB のバスケットとの間にチームBのプレーヤーが全くいない状況で、進行しているプレーヤーの後ろあるいは横から起こす不当な触れ合いという判定基準では、B1 のアンスポーツマンライクファウルではない。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-7", "body": "37-７  例：バックコートにいるB1はドリブルをしているA1のボールを弾き出した。そのあと、B1はボールのコントロールを得ようとした。B1 とチームA のバスケットの間にチームA のプレーヤーがいない状況で、A2 が後ろあるいは横からB1 に触れ合いを起こした。\n解説：B1とチームAのバスケットの間にチームAのプレーヤーがいない状況で、B1がボールのコントロールを得ようとしているときに、後ろあるいは横からB1に触れ合いを起こしているため、B1に対するA2 のアンスポーツマンライクファウルである。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-8", "body": "37-８  条文：5 個目のファウルを宣せられたあと、そのプレーヤーは「5 個のファウルを宣せられたチームメンバー」となる。更にこのプレーヤーに生じたテクニカルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルは、ヘッドコーチに対し宣せられ、その状況に応じて罰せられる。スコアシートには「B」と記入される。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-9", "body": "37-９  例：B１はドリブルをしていたA１にファウルをし、５個目のファウルを宣せられた。これはチームB のこのクォーター２個目のファウルであった。B１はチームベンチに向かう間に、B１はA２を突き飛ばした。\n解説：5 個目のファウルでB１は5 個のファウルを宣せられたチームメンバーとなる。B１のスポーツマンらしくない振る舞いはチームB のヘッドコーチにテクニカルファウルとして宣せられ「B１」と記入される。誰もリバウンドの位置に着かずに1 本のフリースローがチームA のいずれかのプレーヤーに与えられる。ゲームはB１のスポーツマンらしくない振る舞いが起きたときにボールがあった場所に最も近いアウトオブバウンズからチームA のスローインで再開される。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-10", "body": "37-10  例：ドリブルをしているA１はB１にファウルをし、５個目のファウルを宣せられた。A１はチームベンチに向かう間に、審判を侮辱する発言を行ない、テクニカルファウルを宣せられた。\n解説：5個目のファウルでA１は5個のファウルを宣せられたチームメンバーとなる。A１のテクニカルファウルはチームA のヘッドコーチに宣せられ「B１」と記入される。誰もリバウンドの位置に着かずに1本のフリースローがチームBのいずれかのプレーヤーに与えられる。ゲームはA１のチームコントロールファウルが起きた場所に最も近いアウトオブバウンズからチームB のスローインで再開される。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-11", "body": "37-11  例：A１はB１にファウルをし、５個目のファウルを宣せられた。これはチームA のこのクォーター２個目のチームファウルであった。A１はチームベンチに向かう間に、B１を突き飛ばした。このときB１もまたA１を突き飛ばしB１はアンスポーツマンライクファウルが宣せられた。\n解説：5 個目のファウルでA１は5 個のファウルを宣せられたチームメンバーとなる。A１のスポーツマンらしくない振る舞いはチームA のヘッドコーチにテクニカルファウルとして宣せられ「B１」と記入される。B１のアンスポーツマンライクファウルはB１自身に宣せられ「U２」と記入される。誰もリバウンドの位置に着かずに1 本のフリースローがチームB のいずれかのプレーヤーに与えられ、誰もリバウンドの位置に着かずに2本のフリースローがA１と交代したプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームAのスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-1", "body": "38-１  条文：失格・退場となった人物は、チームベンチに座ることを許された人物ではない。したがってその人物は、それ以上スポーツマンらしくない振る舞いがあっても罰則を受けない。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-2", "body": "38-２  例：A１が著しくスポーツマンらしくない振る舞いにより失格・退場になった。コートを離れるときに審判を侮辱する発言を行なった。\n解説：A１はすでに失格・退場になっており、審判への暴言による罰則は受けない。クルーチーフまたはコミッショナー（同席している場合）は、大会主催者に対して報告書を提出しなければならない。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-3", "body": "38-３  条文：著しくスポーツマンらしくない振る舞いでプレーヤーが失格・退場になったとき、罰則は体の触れ合いのないその他のディスクォリファイングファウルと同様となる。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-4", "body": "38-４  例：A１はトラベリングを宣せられた。いら立ったA１は審判を侮辱する発言を行ない、ディスクォリファイングファウルを宣せられた。\n解説：A１は失格・退場となる。ディスクォリファイングファウルはA１自身に宣せられ「D2」と記入される。誰もリバウンドの位置に着かずに2 本のフリースローがチームB のいずれかのプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-5", "body": "38-５  条文：ヘッドコーチにディスクォリファイングファウルを宣せられたとき、「D2」と記入される。\nチームベンチに座ることを許された人物が失格・退場になった場合は、ヘッドコーチのテクニカルファウルとして「B2」と記入される。罰則は体の触れ合いのないその他のディスクォリファイングファウルと同様となる。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-6", "body": "38-６  例：A１は５個目のパーソナルファウルを宣せられ、このクォーター２個目のチームファウルであった。チームベンチに向かう間に、\n⒜A1 は審判を侮辱する発言を行った。\n⒝A1 がB2 の顔面を殴った。\nどちらの場合においても、A1 はディスクォリファイングファウルを宣せられる。\n解説：5 個目のパーソナルファウルによって、A１は5 個のファウルを宣せられたチームメンバーとなり、さらにA１は審判への暴言またはB1 を殴ったことにより失格・退場となる。A１のディスクォリファイングファウルはスコアシートのA１に「D」、チームA のヘッドコーチに「B２」と記入される。\n⒜誰もリバウンドの位置に着かずに2本のフリースローがチームBのいずれかのプレーヤーに与えられる。\n⒝誰もリバウンドの位置に着かずに2 本のフリースローがB２に与えられる。\nどちらの場合においても、ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-7", "body": "38-７  条文：ディスクォリファイングファウルとは、プレーヤーや、チームのチームベンチに座ることを許された人物による以下の著しくスポーツマンらしくない行為に適用される。\n・相手チーム、審判、テーブルオフィシャルズやコミッショナー（同席している場合）、観客に対する行為。\n・自チームのメンバーに対する行為。\n・意図的に用具・器具を破損する行為。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-8", "body": "38-８  例：以下の著しくスポーツマンらしくない行為が起きた。\n⒜A１がチームメイトのA２を殴った。\n⒝A１がコートを離れて観客を殴った。\n⒞ベンチにいるA６がチームメイトのA７を殴った。\n⒟A６がスコアラーズテーブルを叩き、ショットクロックを破損させた。\n解説：\n⒜と⒝では、A１は失格・退場となる。ディスクォリファイングファウルはA１ 自身に宣せられ「D2」と記入される。\n⒞と⒟では、A６は失格・退場となる。A６のディスクォリファイングファウルはスコアシートのA６に「D」、チームA のヘッドコーチに「B２」と記入される。\n誰もリバウンドの位置に着かずに2本のフリースローがチームBのいずれかのプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-9", "body": "38-９  条文：プレーヤーが失格・退場となり、控室に戻る途中でアンスポーツマンライクファウル、またはディスクォリファイングファウル相当の行為を繰り返したとき、罰則は与えられない。ただし、その大会主催者に対して報告書を提出される。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-10", "body": "38-10  例：A１は審判を侮辱する発言を行ない、ディスクォリファイングファウルを宣せられた。控室に戻る間に\n⒜A１がB１を突き飛ばし、アンスポーツマンライクファウル相当であった。\n⒝A１がB１を殴り、ディスクォリファイングファウル相当であった。\n解説：A１はすでに失格・退場になっており、A1にはそれ以上のファウルは記録されず、また罰則は与えられない。クルーチーフまたはコミッショナー（同席している場合）は、大会主催者に対して報告書を提出しなければならない。\nどちらの場合においても、誰もリバウンドの位置に着かずに2 本のフリースローがチームB のいずれかのプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-1", "body": "39-１  条文：抗争（Fight）のあとで全ての罰則が相殺された場合、抗争が始まったときにボールがあった場所に最も近いアウトオブバウンズから、抗争が始まったときにボールをコントロールしていた、またはボールを与えられることになっていたチームにスローインが与えられる。ショットクロックはゲームが止められたときの残り時間となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-2", "body": "39-２  例：チームA がボールを、\n⒜20 秒間コントロールしたとき、\n⒝５秒間コントロールしたとき、抗争につながりそうな状況が発生した。審判はチームベンチエリアを離れた各チーム２人の交代要員を失格・退場にした。\n解説：抗争につながりそうな状況が始まったときにボールをコントロールしていたチームA に、抗争につながりそうな状況が始まったときにボールがあった場所に最も近いアウトオブバウンズからスローインが与えられる。ショットクロックは、\n⒜４秒となる。\n⒝19 秒となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-3", "body": "39-３  条文：（事態の収拾のために審判に協力しなかったことによって）ヘッドコーチやファーストアシスタントコーチが失格・退場になった場合や、抗争の間にチームベンチエリアを離れたことによって交代要員や5 個のファウルを宣せられたチームメンバー、チーム関係者が失格・退場になった場合、ヘッドコーチは1個のテクニカルファウルを宣せられる。そのテクニカルファウルにヘッドコーチの失格・退場が含まれるとき、スコアシートに「D２」と記入される。そのテクニカルファウルが自チームのチームベンチに座ることを許された人物の失格・退場で、ヘッドコーチは含まれないとき、スコアシートに「B２」と記入される。罰則として、誰もリバウンドの位置に着かずに2 本のフリースローとスローインが相手チームに与えられる。\nまた追加のディスクォリファイングファウルごとに、2本のフリースローとスローインが相手チームに与えられる。\n両チームの等しい罰則が相殺されない限り、全ての罰則が適用される。この場合、ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインから通常のディスクォリファイングファウルの処置と同様に再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-4", "body": "39-４  例：抗争の間にコートに入ったため、交代要員のA６は失格・退場となった。\n解説：A６の失格・退場はスコアシート上のA6 自身に「D」と記入され、残りのファウル欄には「F」\nと記入される。チームAのヘッドコーチはテクニカルファウルを宣せられ「B２」と記入される。誰もリバウンドの位置に着かずに2 本のフリースローがチームB のいずれかのプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームBのスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-5", "body": "39-５  例：コート上にいるA１とB１で抗争が始まり、A６とB６がコートに入ってきたが抗争には加わらなかった。A７はコートに入ってきて、B１の顔面を殴った。\n解説：A１とB１は失格・退場となり「DC」と記入される。A7は失格・退場になり「D2」と記入され、スコアシート上の残りのファウル欄には「F」と記入される。A６とB６は抗争の間にコートに入ったことで失格・退場となり、「D」と記入され、スコアシート上の残りのファウル欄には「F」と記入される。両チームのヘッドコーチはテクニカルファウルを宣せられ「BC」と記入される。A１、B１のディスクォリファイングファウルの罰則とA６、B６ のテクニカルファウルの罰則は相殺される。A7が積極的に抗争に関わり失格・退場となったことでの罰則の処置が行われる。誰もリバウンドの位置に着かずに2 本のフリースローがB１と交代したプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-6", "body": "39-６  例：コート上にいるA１とB１で抗争が始まった。A６とチームA のマネージャーがコートに入り、積極的に抗争に関わった。\n解説：A１とB１は失格・退場となり「DC」と記入される。A１、B１のディスクォリファイングファウルの罰則は互いに相殺される。A６とチームAのマネージャーがチームベンチエリアを離れたことで、チームA のヘッドコーチにテクニカルファウルが宣せられ「B２」と記入される。A６は積極的に抗争に関わったことで失格・退場となり「D2」と記入される。スコアシートのA６の残りのファウル欄には「F」と記入される。チームAのマネージャーが積極的に抗争に関わったことでのディスクォリファイングファウルはチームAのヘッドコーチに宣せられ、「B２」と記入して丸で囲み、累積することで自動的に失格・退場となるヘッドコーチのテクニカルファウルには数えない。\n誰もリバウンドの位置に着かずに６個のフリースローがチームB のいずれかのプレーヤーに与えられる（A６とチームA のマネージャーがチームベンチエリアを離れたことによるチームA のヘッドコーチのテクニカルファウルのため２個、A６が積極的に抗争に関わったことによるディスクォリファイングファウルのため２個、チームA のマネージャーが積極的に抗争に関わり失格・退場になったことによるチームA のヘッドコーチのテクニカルファウルのため２個）。\n【補足】各セットのフリースローを打つプレーヤーは異なるプレーヤーでもよい。\nゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-7", "body": "39-７  例：チームA のヘッドコーチはチームベンチエリアを離れ、コート上で積極的に抗争に関わり、B１を激しく突き飛ばした。\n解説：チームAのヘッドコーチはチームベンチエリアを離れながら事態の収拾のために審判に協力しなかったため、ディスクォリファイングファウルを宣せられ、スコアシートに「D2」と記入される。チームAのヘッドコーチには自身が積極的に抗争に関わったことでの更なるディスクォリファイングファウルは宣せられない。スコアシートのチームAのヘッドコーチの残りのファウル欄には「F」と記入される。誰もリバウンドの位置に着かずに2 本のフリースローがチームB のいずれかのプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームBのスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-8", "body": "39-８  例：タイムアウトの間に、いずれかのチームの交代要員またはチーム関係者の数人が、コートに入り、チームベンチエリアの近くにとどまっていた。このとき、コート上で抗争につながりそうな状況が起き、\n⒜タイムアウトのためにすでにコート上にいた全ての人物が、チームベンチエリアの近くのそれぞれの場所にとどまっていた。\n⒝タイムアウトのためにすでにコート上にいた何人かの人物が、チームベンチエリアの近くのそれぞれの場所から離れ、数名のプレーヤーが抗争につながりそうな状況に積極的に関与した。\n解説：\n⒜タイムアウトのためにすでにコート上にいた人物は、失格・退場とならない。\n⒝タイムアウトのためにすでにコート上にいて、チームベンチエリアの近くのそれぞれの場所から離れた全ての人物と、抗争につながりそうな状況に積極的に関与した全てのプレーヤーは失格・退場となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-1", "body": "42-１  条文：ゲームクロックが止まっている間に複数の反則が起きて特別な処置をする場合、審判はバイオレーションやファウルが起きた順番を把握し、どの罰則を相殺し、どの罰則を適用するのか注意を払って決定しなければならない。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-2", "body": "42-２  例：B１がシューターのA１にアンスポーツマンライクファウルをした。ボールが空中にある間に、ショットクロックのブザーが鳴った。ボールは、\n⒜リングに触れなかった。\n⒝リングに触れたがバスケットには入らなかった。\n⒞バスケットに入った。\n解説：全ての場合において、B１のアンスポーツマンライクファウルは記録される。\n⒜ボールがリングに当たらなかったことによるチームAのショットクロックのバイオレーションは、B1のアンスポーツマンライクファウルの後で起きたとしてなかったものとする。誰もリバウンドの位置に着かずに2 本または3 本のフリースローがA１に与えられる。\n⒝ショットクロックバイオレーションではない。誰もリバウンドの位置に着かずに2本または3本のフリースローがA１に与えられる。\n⒞A１は2点または3点が認められ、誰もリバウンドの位置に着かずに1本のフリースローが与えられる。\n全ての場合において、ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームA のスローインで再開される。チームA のショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-3", "body": "42-３  例：B１はショットの動作（アクトオブシューティング）中のA１にファウルをした。ファウルのあと、同じショットの動作（アクトオブシューティング）中のA1 にB２がファウルをした。\n解説：B２のファウルは、アンスポーツマンライクファウルまたはディスクォリファイングファウルでない限り、なかったものとする。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-4", "body": "42-４  例：B１がドリブルをしているA１に対してアンスポーツマンライクファウルをした。そのファウルのあと、両チームのヘッドコーチはそれぞれテクニカルファウルを宣せられた。\n解説：等しい罰則は起きた順序で相殺される。両チームのヘッドコーチへのテクニカルファウルの罰則は相殺される。誰もリバウンドの位置に着かずに2本のフリースローがA１に与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームAのスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-5", "body": "42-５  例：B１がA１にファウルをし、ショットは成功した。その後A１はテクニカルファウルが宣せられた。\n解説：A１のゴールは認められる。両方のファウルの罰則は等しく、相殺される。ゲームは通常のゲームクロックが動いていて、ボールがライブの状態でのゴールが成功した後と同様に再開される。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-6", "body": "42-６  例：B１がA１にファウルをし、ショットは成功した。その後A１はテクニカルファウルを宣せられた。\nそれに続いてチームB のヘッドコーチはテクニカルファウルを宣せられた。\n解説：A１のゴールは認められる。全ての等しい罰則は起きた順序で相殺される。B１のパーソナルファウルとA１のテクニカルファウルの罰則は相殺される。誰もリバウンドの位置に着かずに、チームBのヘッドコーチのテクニカルファウルによる1本のフリースローがチームAのいずれかのプレーヤーに与えられる。ゲームは通常のゲームクロックが動いていて、ボールがライブの状態でのゴールが成功した後と同様に再開される。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-7", "body": "42-７  例：B１がA１にアンスポーツマンライクファウルをし、ショットは成功した。その後A１はテクニカルファウルを宣せられた。\n解説：A１のゴールは認められる。それぞれのファウルの罰則は等しくなく、互いに相殺することはできない。誰もリバウンドの位置に着かずに1 本のフリースローがチームB のいずれかのプレーヤーに与えられ、誰もリバウンドの位置に着かずに1 本のフリースローがA１に与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームAのスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-8", "body": "42-８  例：チームA のフロントコートで、 B１はドリブルをしているA１にファウルをし、\n⒜チームB のこのクォーター３個目のチームファウルであった。\n⒝チームB のこのクォーター５個目のチームファウルであった。\nその後A１はボールをB１の体（手、脚、胴体など）にぶつけた。\n解説： B１はパーソナルファウル、A１はテクニカルファウルを宣せられる。誰もリバウンドの位置に着かずに１本のフリースローがチームB のいずれかのプレーヤーに与えられる。\n⒜では、ゲームはB１のファウルがあった場所に最も近いアウトオブバウンズからチームAのスローインで再開される。ショットクロックは14秒以上が表示されていた場合は継続となり、13秒以下が表示されていた場合は14 秒となる。\n⒝では、2本のフリースローがA1に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-9", "body": "42-９  例：B１はドリブルをしているA１にファウルをし、\n⒜チームB のこのクォーター３個目のチームファウルであった。\n⒝チームB のこのクォーター５個目のチームファウルであった。\nその後A１はボールを至近距離にいるB１の顔（頭部）に直接ぶつけた。\n解説：B１はパーソナルファウル、A１は体の触れ合いのないディスクォリファイングファウルを宣せられる。\n⒜では、更なる罰則が行われることから、チームA のスローインの権利は取り消される。\n⒝では、誰もリバウンドの位置に着かずに2 本のフリースローがA1と交代したプレーヤーに与えられる。\nどちらの場合においても、誰もリバウンドの位置に着かずに2 本のフリースローがチームB のいずれかのプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-10", "body": "42-10  例：ショットクロック残り8秒で、チームBのバックコートにいるB１はA１にファウルをした。その後B２はテクニカルファウルを宣せられた。\n⒜B１のファウルがチームB のこのクォーター４個目、B２のテクニカルファウルがチームB のこのクォーター５個目のチームファウルであった。\n⒝B１のファウルがチームB のこのクォーター５個目、B２のテクニカルファウルがチームB のこのクォーター６個目のチームファウルであった。\n⒞A１はショットの動作（アクトオブシューティング）中にファウルをされ、ボールはバスケットに入らなかった。\n⒟A１はショットの動作（アクトオブシューティング）中にファウルをされ、ボールはバスケットに入った。\n解説：全ての場合において、誰もリバウンドの位置に着かずに1本のフリースローがチームAのいずれかのプレーヤーに与えられる。フリースローのあと、\n⒜ゲームはフロントコートのA１に対するファウルが起きた場所に最も近いアウトオブバウンズからのチームA のスローインで再開される。ショットクロックは14 秒となる。\n⒝２本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。\n⒞２本または３本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。\n⒟A１のゴールは認められる。１本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-11", "body": "42-11  例：ショットクロック残り８秒で、B１はA１にアンスポーツマンライクファウルをした。そのあと、\n⒜A２が\n⒝B２がテクニカルファウルを宣せられた。\n解説：\n⒜誰もリバウンドの位置に着かずに１本のフリースローがチームBのいずれかのプレーヤーに与えられる。\n⒝誰もリバウンドの位置に着かずに１本のフリースローがチームAのいずれかのプレーヤーに与えられる。\nどちらの場合においても、テクニカルファウルのフリースローのあと、誰もリバウンドの位置に着かずに2本のフリースローがA１に与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームA のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-12", "body": "42-12  条文：フリースローの最中に、ダブルファウルまたは等しい罰則のファウルが起きた場合は、ファウルはスコアシートに記入されるが罰則は与えられない。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-13", "body": "42-13  例：A１に２本のフリースローが与えられた。\n⒜１本目のフリースローのあとに\n⒝2本目のフリースローが成功したあと、エンドラインの後方からスローインのボールをチームBのプレーヤーが持つ前に\n⒞2 本目のフリースローが失敗したあと、いずれかのチームがボールのコントロールを得る前に⒟2 本目のフリースローが失敗し、いずれかのチームがボールのコントロールを得たあとA２とB２がダブルファウル、あるいはともにテクニカルファウルを宣せられた。\n解説：A２とB２のファウルの罰則は相殺される。\n⒜A1 は２本目のフリースローを行い、ゲームは通常の最後のフリースローの後と同様に再開される。\n⒝チームB はエンドラインからスローインを与えられる。\n⒞ジャンプボールシチュエーションとなる。\n⒟ボールのコントロールを得ていたチームはスローインを与えられる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-14", "body": "42-14  条文：テクニカルファウルが宣せられた場合、誰もリバウンドの位置に着かずにフリースローの罰則が速やかに行われる。チームベンチに座ることを許された人物の失格・退場によってヘッドコーチに宣せられたテクニカルファウルでは、この限りではない。そのようなテクニカルファウルの罰則（フリースロー２本とフロントコートのスコアラーズテーブルの反対側のスローインラインからのスローイン）\nは、相殺されない限り全てのファウルやバイオレーションが起こった順番で行われる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-15", "body": "42-15  例：B１がA１にファウルをし、このクォーター５個目のチームファウルであった。コート上で抗争につながりそうな状況が起こった。A６がコートに入ったが積極的に抗争には関わらなかった。\n解説：A６は抗争の間にコートに入ったことで失格・退場となる。チームAのヘッドコーチはテクニカルファウルを宣せられ「B２」と記入される。誰もリバウンドの位置に着かずに2本のフリースローがA１に与えられ、チームAのヘッドコーチのテクニカルファウルにより2本のフリースローがチームBのいずれかのプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームB のスローインで再開される。ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-16", "body": "42-16  条文：ダブルファウルが起きて両チームへの等しい罰則の相殺のあと、適用する罰則が残っていなければ、ボールをコントロールしていたチームあるいは最初のファウルの前にボールを与えられることになっていたチームのスローインで再開される。\nどちらのチームもボールのコントロールがなかった、あるいは最初のファウルの前にボールが与えられることになっていなかった場合はジャンプボールシチュエーションとなり、ゲームはオルタネイティングポゼッションのスローインで再開される。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-17", "body": "42-17  例：第１クォーターと第２クォーターの間のインターバル中に、A１とB１がそれぞれディスクォリファイングファウルを宣せられた、あるいはヘッドコーチA とヘッドコーチB がそれぞれテクニカルファウルを宣せられた。\nオルタネイティングポゼッションアローは：\n⒜チームA を示している。\n⒝チームB を示している。\n解説： 両チームへの等しい重さの罰則は相殺される。\nどちらの場合においても、ゲームはスコアラーズテーブルの反対側のセンターラインの延長線上からオルタネイティングポゼションの権利を持つチームのスローインで再開される。ボールがコート上のプレーヤーに触れる、あるいは正当に触れられた時点でアローは逆向きとなり、相手チームを示す。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置", "sec_no": "42-18", "body": "42-18  例：チームコントロールファウルまたはダブルドリブルがA1に宣せられた。チームBのスローインでゲームが再開されるとき、スローインのボールが\n⒜与えられる前に\n⒝与えられた後にB２がA２にファウルをし、このクォーター3 個目のチームファウルであった。\n解説：\n両方の違反は一度ゲームクロックが止められたあと、再び動かし始められるまでの間で、\n⒜チームBのスローインでボールがライブになる前に起きている。したがって、等しい重さの罰則は相殺される。\n最初の違反が起きる前にチームAがボールをコントロールしており、ゲームはA1のファウルもしくはバイオレーションが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開される。ショットクロックは継続となる。\n⒝チームB のスローインでボールがライブになった後で起きている。最初の違反の罰則は相殺することはできない。\nA1の違反によるスローインの権利はB2のファウルの罰則のスローインにより取り消される。ゲームはB2 のファウルが起きた場所に最も近いアウトオブバウンズからチームA のスローインで再開される。バックコートからのスローインの場合、ショットクロックは24 秒となる。フロントコートからのスローインの場合、ショットクロックは14 秒となる。"}, {"type": "impl", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-1", "body": "43-１  条文：フリースローのリバウンドの位置を占めるプレーヤーはそれぞれのスペースに交互に位置する権利を有する。フリースローのリバウンドの位置を占めないプレーヤーは、フリースローが終わるまでフリースローラインの延長線上より後ろでスリーポイントラインの外側にいなければならない。"}, {"type": "impl", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-2", "body": "43-２  例：A1は最後のフリースローを行う。チームBのプレーヤーは誰も彼らが占めることのできるリバウンドの位置には着かなかった。\n解説：フリースローの間、プレーヤーは自チームのプレーヤーが占めることのできるリバウンドの位置にのみ着くことができる。リバウンドの位置を占めない場合、プレーヤーはフリースローが終わるまでフリースローラインの延長線上より後ろでスリーポイントラインの外側にいなければならない。"}, {"type": "impl", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-3", "body": "43-３  条文：最後のフリースローの間に、両チームのプレーヤーがフリースローのバイオレーションをした場合、ジャンプボールシチュエーションとなる。"}, {"type": "impl", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-4", "body": "43-４  例：B2は、最後のフリースローでA1の手からボールが離れる前に制限区域に入った。A1のフリースローはリングに触れなかった。\n解説：B2 とA1 のフリースローのバイオレーションであり、ジャンプボールシチュエーションとなる。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-1", "body": "44-１  条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。\n・与えてはいけないフリースローを与えたとき\n・与えるべきフリースローを与えなかったとき\n・審判による指定なく誤ったプレーヤーがフリースローを行ったとき\n・審判が誤ったプレーヤーを指定してフリースローを行ったとき\n・誤って得点を与えたり 、取り消したりしたとき\n・誤ったプレーヤー、ヘッドコーチ、またはチームに対するファウルを伝達したとき\n・スコアシートの記録に以下を含む誤りが生じたとき：\nー得点を誤って記録しなかった、あるいは誤って記録したときープレーヤー、ヘッドコーチ、またはチームに対するファウルを誤って記録しなかった、あるいは誤って記録したときータイムアウトを誤って記録しなかった、あるいは誤ったチームに記録したとき\n・ゲームクロックを正しくスタートまたはストップできなかったとき、あるいは誤った競技時間を設定してしまったとき（機材の故障を含む）：\n審判は規則が誤って適用された次の状況でのみカテゴリー2の誤りを訂正することができる。\n・ショットクロックを正しくスタートまたはストップできなかったとき、あるいは誤った秒数を設定してしまったとき（機材の故障を含む）"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-2", "body": "44-２  条文：誤りを訂正するには、次のようにその誤りは審判、コミッショナー（同席している場合）、テーブルオフィシャルによって認識、訂正されなければならない：\n・第4クォーターでゲームクロックが2:00あるいはそれ以下を示す前に誤りが起きた場合、その誤りはゲームクロックが2:00あるいはそれ以下を示す前に認識、訂正されなければならない。\n・第4クォーターでゲームクロックが2:00あるいはそれ以下を示す前に誤りが起き、ゲームクロックが2:00を示して審判が初めてゲームを止めた場合、その誤りはボールが再びライブとなる前に認識、訂正されなければならない。\n・第4クォーターあるいはオーバータイムでゲームクロックが2:00あるいはそれ以下を示した後で誤りが起きた場合、誤りが起きてから何らかの理由により最初に審判がゲームを止めたあと、ボールがライブとなる前にその誤りは認識、訂正されなければならない。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-3", "body": "44-３  例：第2 クォーター残り3:37 で、B1 がA1 にファウルをし、このクォーター4 個目のチームファウルであった。誤って2 本のフリースローがA1 に与えられた。この誤りが\n⒜第4 クォーター残り4:48 に認識された。\n⒝第4 クォーター残り0:39 に認識された。\n解説：\n⒜では、誤りは訂正できる。\n⒝では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-4", "body": "44-４  例：第4 クォーター残り2:13 で、B1 がA1 にファウルをし、このクォーター6 個目のチームファウルであった。2本のフリースローがA1に与えられた。審判はA1ではなくA2にフリースローを行うように指示した。この誤りが\n⒜第4 クォーター残り1:49 で、ゲームが止められたときに認識された。（これは当該フリースローのあと、最初にゲームが止められたタイミングであった。）\n⒝第4 クォーター残り1:23 で、ゲームが止められたときに認識された。（これは当該フリースローのあと、3 度目にゲームが止められたタイミングであった。）\n解説：\n⒜では、誤りは訂正できる。\n⒝では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-5", "body": "44-５  例：第4クォーター残り1:14で、B1がツーポイントゴールのショットの動作（アクトオブシューティング）中のA1にファウルをし、ショットは成功しなかった。審判は誤ってA1に2点と1本のフリースローを与えた。この誤りが\n⒜フリースローのあと、ゲームが再開される前に認識された。\n⒝フリースローに続いてゲームが再開されたあと、第4 クォーター残り0:59 で最初に止められたときに認識された。\n⒞第4 クォーターと最初のオーバータイムの間のプレーのインターバル中に認識された。\n⒟オーバータイム残り3:59 で認識された。\n解説：\n⒜と⒝では、誤りは訂正できる。\n⒞と⒟では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-6", "body": "44-６  条文：審判がフリースローを誤って与えたことが規則で定められた時間制限内に認められた場合、その誤りは次のように訂正されるものとする：\n誤って与えられたフリースローは取り消され、ゲームは次のように再開される：\n・誤りが起きたあと、ゲームクロックが動いていない場合、フリースローを取り消されたチームはフリースローラインの延長線上のアウトオブバウンズからスローインを与えられる。\n・誤りが起きたあと、ゲームクロックがすでに動いていた場合、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-7", "body": "44-７  例：第2 クォーター残り3:37 で、B1 がA1 にファウルをし、このクォーター4 個目のチームファウルであった。審判は誤って2 本のフリースローをA1 に与えた。この誤りが\n⒜最初のフリースローのボールがA1 に与えられた後に認識された。\n⒝A1 が両方のフリースローを終えたあと、ゲームクロックが動き始める前に認識された。\n⒞第4 クォーター残り4:48 で認識された。\n解説：\n全ての場合において、誤りは訂正できる。成否にかかわらず、フリースローは取り消される。\n⒜と⒝では、ゲームはスコアラーズテーブルの反対側のフリースローラインの延長線上のアウトオブバウンズからチームA のスローインで再開され、ショットクロックは14 秒となる。\n⒞では、誤りの訂正のあと、ゲームは誤りの訂正のために止められた場所に最も近いところから再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-8", "body": "44-８  条文：審判が与えるべきフリースローを誤って与えていなかったことが規則で定められた時間制限内に認められた場合、その誤りは次のように訂正されるものとする：\n・誤りが起きたあと、ボールのコントロールが一度も変わっていない場合、誤りの訂正のあと、ゲームは通常の最後のフリースローの後と同様に再開される。\n・誤ってスローインが与えられたあと、そのチームが得点した場合、その誤りはなかったものとする。\n・ゲームクロックがすでに動いていて、ボールのコントロールが変わっていた場合、誤りの訂正のあと、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-9", "body": "44-９  例：第2 クォーターで、B1 がA1 にファウルをし、このクォーター5 個目のチームファウルであった。\nチームA は誤ってスローインを与えられた。A2 が\n⒜フロントコートでドリブルをした直後に\n⒝フロントコートでドリブルをし、B2 がボールをアウトオブバウンズに弾き出した直後に\n⒞ドリブルをし、得点した直後に2 本のフリースローがA1 に与えられていない誤りが認識された。\n解説：\n⒜と⒝では、誤りは訂正できる。2 本のフリースローがA1 に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。\n⒞では、誤りに続いてチームA が得点している。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-10", "body": "44-10  例：第2 クォーターで、B1 がA1 にファウルをし、このクォーター5 個目のチームファウルであった。\nチームAは誤ってスローインを与えられた。誤ってスローインが与えられたあと、A2 が得点した。この誤りが\n⒜A2 の得点のあと、エンドラインからのスローインのボールをB1 が持ったときに認識された。\n⒝3 分間プレーした後で、審判がゲームを止めたときに認識された。\n⒞ハーフタイムの間に認識された。\n⒟第4 クォーター残り2:54 で認識された。\n解説：\n全ての場合において、誤ってスローインが与えられたあと、チームA が得点しているため、誤りはなかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-11", "body": "44-11  例：第2 クォーターで、B1 がショットの動作（アクトオブシューティング）中のA1 にファウルをした。\nその後、チームBのヘッドコーチがテクニカルファウルを宣せられた。チームAは誤ってB1のファウルによる2 本のフリースローのみを与えられた。2 本のフリースローがA1 に与えられ、2 本目を成功させた。この誤りが\n⒜A1の2本目のフリースローのあと、エンドラインからのスローインのボールをB２が持ったときに認識された。\n⒝3 分間プレーした後で、審判がゲームを止めたときに認識された。\n⒞ハーフタイムの間に認識された。\n⒟第4 クォーター残り1:54 で認識された。\n解説：\n⒜と⒝、⒞では、誤りは訂正できる。\n誰もリバウンドの位置に着かずにA1 にフリースローが与えられる。ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。\n⒟では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-12", "body": "44-12  例：第3 クォーターで、B2 がドリブルをしているA1 にファウルをし、このクォーター5 個目のチームファウルであった。2本のフリースローがA1に与えられた。1本目のフリースローを失敗したあと、B1がリバウンドのボールを取り、ゲームは誤って続行された。この誤りが\n⒜B2 がコート上でドリブルをしているときに認識された。\n⒝第4 クォーター残り2:54 で認識された。\n⒞第4 クォーター残り0:39 で認識された。\n⒟オーバータイム残り4:32 で認識された。\n解説：\n⒜と⒝では、誤りは訂正できる。2本目のフリースローがA1に与えられる。A1がチームベンチにいて、プレーをする資格がある場合、A1は再びコートに入り、フリースローを行わなければならない。A1が5個のファウルを宣せられていたり、失格・退場となっていたりした場合、チームAのヘッドコーチはフリースローシューターを指定する。\nフリースローは誰もリバウンドの位置に着かずに行われる。ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。\n⒞と⒟では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-13", "body": "44-13  条文：審判による指定なく誤ったプレーヤーがフリースローを行っていたことが認められた場合、成否にかかわらずそのフリースローは取り消される。まだゲームが再開されていない場合、ゲームはスコアラーズテーブルの反対側のフリースローラインの延長線上から相手チームのスローインで再開される。\nゲームがすでに再開されていた場合、誤りの訂正のために止められる。誤りの訂正のあと、ゲームは止められた場所に最も近いアウトオブバウンズから再開される。\n最初のフリースローのボールがシューターの手を離れる前に誤ったシューターがフリースローを行おうとしていることを審判が認識した場合、罰則を与えられることなく、誤ったシューターは正しいシューターに速やかに交代させられる。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-14", "body": "44-14  例：第3クォーターの終了を知らせるゲームクロックのブザーが鳴ったとき、B1がドリブルをしているA1にファウルをし、このクォーター6個目のチームファウルであった。審判はB1のファウルはゲームクロック残り0.3 秒で起きたと判断した。2 本のフリースローがA1 に与えられたが、A1 ではなく、A2がフリースローを行おうとした。この誤りが最初のフリースローでボールがA2の手を離れた後で認識された。\n解説：A2の2本のフリースローは取り消される。ゲームはバックコートのスコアラーズテーブルの反対側のフリースローラインの延長線上のアウトオブバウンズからチームBのスローインで再開され、ゲームクロックは0.3 秒となる。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-15", "body": "44-15  例：第3クォーター残り3秒で、B1がショットの動作（アクトオブシューティング）中のA1にファウルをした。2 本のフリースローがA1 に与えられたが、A1 の代わりにA2 がフリースローを行った。第3 クォーターが終了し、この誤りが\n⒜第3 クォーターと第4 クォーターの間のプレーのインターバル中に認識された。\n⒝第4 クォーターでボールがライブとなったあと、ゲームクロックに2:00 が表示される前に認識された。\n⒞第4 クォーターでゲームクロックに2:00 が表示された後で認識された。\n解説：\n⒜と⒝では、誤りは訂正できる。A2 の2 本のフリースローは取り消される。\n⒜では、第4クォーターはセンターラインの延長線上のアウトオブバウンズからオルタネイティングポゼッションのスローインで開始される。\n⒝では、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。\n⒞では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。ゲームは続行される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-16", "body": "44-16  条文：審判が誤ったフリースローシューターを指定してフリースローを行っていたことが認められた場合、成否にかかわらずそのフリースローは取り消され、正しいプレーヤーが代わりのフリースローを行う。\nゲームが再開されてこの誤りの訂正のために止められた場合を除いて、ゲームは通常の最後のフリースローの後と同様に再開される。ゲームが再開されてこの誤りの訂正のために止められた場合、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-17", "body": "44-17  例：第3クォーターの終了を知らせるゲームクロックのブザーが鳴ったとき、B1がドリブルをしているA1にファウルをし、このクォーター6個目のチームファウルであった。審判はB1のファウルはゲームクロック残り0.3 秒で起きたと判断した。2 本のフリースローがA1 に与えられた。審判はA1 ではなく、A2をシューターに指定してフリースローを行った。この誤りが最初のフリースローでボールがA2の手を離れた後で認識された。\n解説：A2 の2 本のフリースローは取り消される。2 本のフリースローがA1 に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-18", "body": "44-18  例：B1 がショットの動作（アクトオブシューティング）中のA1 にファウルをした。審判はA1 ではなく、A2をシューターに指定してフリースローを行った。2本目のフリースローでボールがリングに触れたあと、A3がリバウンドのボールを取って2点を得点した。この誤りが、エンドラインの後ろのアウトオブバウンズでチームB がスローインのボールを持つ前に認識された。\n解説：成否にかかわらず、A2 が行った2 本のフリースローは取り消される。A3 の得点は有効なままとなる。誰もリバウンドの位置に着かずに2本のフリースローがA1に与えられる。ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズ（この場面ではエンドラインの後方のアウトオブバウンズ）から再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-19", "body": "44-19  条文：審判が誤って得点を与えたり、取り消したりしていたことが規則で定められた時間制限内に認められた場合、その誤りは次のように訂正されるものとする：\n・得点は状況に応じて取り消される、もしくは与えられる。\n・フリースローが誤って与えられ、成功した場合、誤りの訂正の結果としてそのフリースローは取り消される。\n・フリースローが誤って与えられなかった場合、誤りの訂正の結果として、フリースローが本来のフリースローシューターに与えられる。\n【補足】規則の中で別途規定がある場合を除く。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-20", "body": "44-20  例：第4クォーター残り0:57で、ボールの無いところでA2がファウルをしたとき、ショットのボールがA1の手を離れていた。ボールは正当にバスケットに入ったが、審判は誤って得点を取り消した。\nこの誤りが\n⒜第4 クォーター残り0:43 で、誤りに続いて最初に審判がゲームを止めたときに認識された。\n⒝第4 クォーター残り0:43 でゲームが止められ、再びボールがライブとなった後で認識された。\n解説：\n⒜では、誤りは訂正できる。スコアシートは訂正され、チームA に2 点が追加される。ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。\n⒝では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。ゲームは続行される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-21", "body": "44-21  例：第2 クォーター残り3:32 で、B1 がツーポイントショットの動作（アクトオブシューティング）中のA1 にファウルをした。ボールはバスケットに入らなかった。審判は誤ってA1 に2 点と1 本のフリースローを与えた。この誤りが\n⒜第3 クォーター残り5:21 で、ゲームが止められたときに認識された。\n⒝第4 クォーター残り1:02、もしくはオーバータイムのいずれかの時間帯で認識された。\n解説： 第2 クォーターで誤って与えられたツーポイントゴールは、第4 クォーターでゲームクロックが2:00 を示すまではいつでも訂正できる。\n⒜では、誤りは訂正できる。スコアラーはクルーチーフと相談したあと、誤って与えられた得点を取り消す。第2 クォーターでの1 本目のフリースローの成否にかかわらず、1 本のフリースローがA1 に与えられる。\n5 個のファウルを宣せられていない、もしくは失格・退場となっていない限り、A1 は1 本のフリースローを行うためにコートに入らなければならない。A1 が5 個のファウルを宣せられている、もしくは失格・退場となっている場合、チームA のヘッドコーチに指定されたプレーヤーあるいは交代要員がフリースローを行う。\nゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。\n⒝では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。ゲームは続行される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-22", "body": "44-22  条文：審判が誤ったプレーヤー、ヘッドコーチ、またはチームに対するファウルを伝達していたことが規則で定められた時間制限内に認められた場合、その誤りは次のように訂正されるものとする：\nスコアシートは訂正され、誤った伝達の結果として意図せず５個のファウルを宣せられていた、または失格・退場となっていたプレーヤーやコーチは、再びゲームに参加できる。訂正によって失格・退場となったプレーヤーやコーチは失格・退場となる。罰則は適用されない。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-23", "body": "44-23  例：第1 クォーター残り5:47 で、B1 がA1 にファウルをした。審判はB2 のファウルとして伝達した。この誤りが\n⒜ハーフタイムの間に認識された。\n⒝第4 クォーター残り2:21 でゲームが止められたときに認識された。\n⒞第4クォーター残り2:00、もしくはオーバータイムのいずれかの時間帯でゲームが止められたときに認識された。\n解説：誤ったプレーヤーのファウルを伝達した誤りは、第4 クォーターでゲームクロックが2:00 を示すまではいつでも訂正できる。\n⒜と⒝では、誤りは訂正できる。スコアラーはクルーチーフと相談したあと、誤ってB2 に記録されたファウルを削除し、B1 に正しくファウルを記録することでスコアシートを訂正する。B2 が誤って5個のファウルを宣せられたチームメンバーとなっていた場合、B2は再びゲームに参加できる。B1が本来早い時点で5個のファウルを宣せられたチームメンバーとなるべきであった場合、B1はこの時点で5 個のファウルを宣せられたチームメンバーとなる。追加の罰則は適用されない。\n⒞では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。ゲームは続行される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-24", "body": "44-24  条文：スコアシートの記録の誤りについて、\n・得点が誤って記録されていたこと\n・誤ったプレーヤーやコーチ、チームにファウルが記録されていたこと\n・誤ったチームにタイムアウトが記録されていたことあるいは、これらが誤って記録されていなかったことが規則で定められた時間制限内に認められた場合、スコアシートは訂正され、誤った記録の結果として意図せず5個のファウルを宣せられていた、または失格・退場となっていたプレーヤーやコーチは、再びゲームに参加できる。訂正によって失格・退場となったプレーヤーやコーチは失格・退場となる。罰則は適用されない。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-25", "body": "44-25  例：第4 クォーター残り3:45 で、チームA は後半2 個目のタイムアウトを請求した。スコアラーはこのタイムアウトを誤ってチームB の後半2 個目のタイムアウトとして記録した。第4 クォーター残り2:44 で、ボールがアウトオブバウンズに出て審判がゲームを止めた。\n⒜第4 クォーター残り2:02 で、チームB にタイムアウトが認められた。\n⒝第4 クォーター残り1:45 で、チームB にタイムアウトが認められた。\nチームB はこのタイムアウトが後半3 個目であることを伝えられ、チームB はタイムアウトが残っていない。チームB のヘッドコーチは誤りが起きていることを主張した。スコアラーはクルーチーフと相談し、誤りが認識された。\n解説：\n⒜では、誤りは訂正できる。スコアラーはクルーチーフと相談したあと、誤ってチームBに記録されたタイムアウトを削除し、チームA に正しくタイムアウトを記録することでスコアシートを訂正する。\n⒝では、誤ったチームにタイムアウトが記録されたことは、第4クォーターでゲームクロックが2:00を示すまでに認識されなければならず、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。\nタイムアウトが始まっていた場合、チームB は後半最後のタイムアウトを消費する。タイムアウトが始まっていなかった場合、チームB のヘッドコーチはタイムアウトの請求を取り下げることができる。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-26", "body": "44-26  例：第1 クォーター残り3:34 で、チームA のヘッドコーチはテクニカルファウルを宣せられた。スコアラーはこのテクニカルファウルを誤ってチームB のヘッドコーチに記録した。この誤りが\n⒜ハーフタイムの間に認識された。\n⒝第4 クォーター残り3:31 でゲームが止められたときに認識された。\n⒞第4クォーター残り1:02、もしくはオーバータイムのいずれかの時間帯でゲームが止められたときに認識された。\n解説：誤ったチームに記録されたテクニカルファウルは、第4 クォーターでゲームクロックに2:00 が表示されるまでは訂正できる。\n⒜と⒝では、誤りは訂正できる。スコアラーはクルーチーフと相談したあと、誤ってチームB のヘッドコーチに記録されたテクニカルファウルを削除し、チームAのヘッドコーチに正しくテクニカルファウルを記録することでスコアシートを訂正する。罰則は適用されない。\n⒞では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。\nゲームは誤りの訂正のためにゲームが止められた場所に最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-27", "body": "44-27  条文：機材の故障を含め、ゲームクロックのスタートまたはストップでの誤りがあったこと、あるいは誤った競技時間を設定する誤りがあった場合、その誤りは次のように訂正される：\n誤りが規則で定められた時間制限内に認められた場合、ゲームクロックは誤りを訂正するために必要な時間を増やしたり、減らしたりすることで訂正される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-28", "body": "44-28  例：第1クォーター残り2:44で、アウトオブバウンズのバイオレーションによってゲームクロックが止められた。ショットクロック24 秒からのスローインのあと、ゲームクロックが故障により、何も表示されていない状態となった。ショットクロックに15 秒が表示されたとき、審判はゲームを止めた。\n解説：ゲームクロックが正常に動かなかった誤りは訂正できる。ゲームは止められた場所に最も近いアウトオブバウンズから再開され、ゲームクロックは残り2:35、ショットクロックは15 秒となる。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-29", "body": "44-29  例：第1クォーター残り2:43で、アウトオブバウンズのバイオレーションによってゲームクロックが止められた。スローインの前、ゲームクロックが何も表示されていない状態となった。タイマーは機材をリセットした。機材が再び動くようになったとき、ゲームクロックに誤って1:43 が設定された。この誤りが\n⒜第1 クォーター残り0:27 でゲームが止められたときに認識された。\n⒝ハーフタイムの間に認識された。\n⒞第3 クォーターと第4 クォーターの間のプレーのインターバル中に認識された。\n⒟第4 クォーター残り2:21 でゲームが止められたときに認識された。\n⒠第4クォーター残り1:15、もしくはオーバータイムのいずれかの時間帯でゲームが止められたときに認識された。\n解説：⒜、⒝、⒞、⒟では、誤って設定されたゲームクロックは訂正できる。\n⒜では、ゲームクロックに1分が加えられる。ゲームは止められた場所に最も近いアウトオブバウンズから再開され、ゲームクロックは残り1:27 となる。\n⒝では、ハーフタイムのインターバルのあと、ハーフタイムのためにゲームが止められたときから継続したチームファウルとタイムアウトで、前半で両チームがプレーしていた方向と同じ方向に1 分間プレーする。ゲームクロックは1:00に設定され、オルタネイティングポゼッションのスローインが与えられることになっているチームのスローインで始められる。1分間のプレーのあと、次にオルタネイティングポゼッションのスローインが与えられることになっているチームのスローインで第3 クォーターが始められる。\n⒞では、第4 クォーターは11 分間でプレーされる。\n⒟では、ゲームクロックに1分が加えられる。ゲームは止められた場所に最も近いアウトオブバウンズから再開され、ゲームクロックは残り3:21 となる。\n⒠では、誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-30", "body": "44-30  条文：ショットクロックに関するカテゴリー2の誤りを訂正するには、その誤りは審判、コミッショナー（同席している場合）、テーブルオフィシャルによって次のときに認識され、訂正されなければならない。\n・誤りが起きた直後、ボールがライブで誤りの訂正のために審判がゲームを止めたとき、あるいは\n・審判が何らかの理由で最初にゲームを止め、誤りが起きたときにボールをコントロールしていたチームが、ゲームが止められたときにもボールをコントロールしている、もしくはコントロールが与えられることになっているとき。\nショットクロックは正しい時間に訂正される。\n次の状況のあと、ショットクロックは訂正することはできない：\n・誤りのあと、ライブのボールのコントロールが変わった。\n・ボールをコントロールしているチームが得点した。\n・ゲームの終了を知らせるゲームクロックのブザーが鳴り、ボールがデッドになった。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-31", "body": "44-31  例：ショットクロック残り20秒で、フロントコートでA1がドリブルをしているとき、ショットクロックが突然24 秒にリセットされた。この誤りがその4 秒後の\n⒜審判がゲームを止めたときに認識された。\n⒝B3 がボールをアウトオブバウンズに弾き出して、ゲームが止められたときに認識された。\n解説：どちらの場合においても、ゲームが止められた場所に最も近いアウトオブバウンズからチームAにスローインが与えられる。ショットクロックは16 秒に訂正される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-32", "body": "44-32  例：チームA はフロントコートでスローインを与えられた。ショットクロックは14 秒に設定されるべきところ、誤って24 秒に設定された。A1 がコート上でボールをキャッチし、フロントコートで10 秒間ドリブルをした。この誤りが\n⒜審判がゲームを止めたときに認識された。\n⒝B3 がボールをアウトオブバウンズに弾き出して、ゲームが止められたときに認識された。\n解説：どちらの場合においても、ゲームが止められた場所に最も近いアウトオブバウンズからチームA にスローインが与えられる。ショットクロックは4 秒に訂正される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-33", "body": "44-33  例：チームAはバックコートでスローインを与えられた。ショットクロックは24秒に設定されるべきところ、誤って14秒に設定された。A1がコート上でボールをキャッチし、フロントコートへドリブルをした。この誤りがその8 秒後の\n⒜審判がゲームを止めたときに認識された。\n⒝B1 がボールをアウトオブバウンズに弾き出して、ゲームが止められたときに認識された。\n解説：どちらの場合においても、ゲームが止められた場所に最も近いアウトオブバウンズからチームAにスローインが与えられる。ショットクロックは16 秒に訂正される。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-34", "body": "44-34  例：チームAはバックコートでスローインを与えられた。ショットクロックは24秒に設定されるべきところ、誤って14秒に設定された。A1がコート上でボールをキャッチし、フロントコートへドリブルをして、ショットをした。ボールが空中にある間にショットクロックのブザーが鳴った。ボールは\n⒜リングに触れず、すぐにA2 がリバウンドのボールを取った。審判はショットクロックバイオレーションのためゲームを止めた。\n⒝リングに触れず、すぐにB2 がリバウンドのボールを取った。審判はショットクロックバイオレーションのためゲームを止めた。\nテーブルオフィシャルズはショットクロックが誤って設定されたことを認識した。\n解説：\nどちらの場合においても、ショットクロックのバイオレーションはなかったものとする。\n⒜では、ゲームが止められた場所に最も近いアウトオブバウンズからスローインがチームAに与えられ、ショットクロックは10 秒となる。\n⒝では、チームBが新たなボールのポゼッションを得ているため、ゲームが止められた場所に最も近いアウトオブバウンズからスローインがチームB に与えられ、ショットクロックは24 秒となる。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-35", "body": "44-35  例： チームA はバックコートでスローインを与えられた。ショットクロックは24 秒に設定されるべきところ、誤って14秒に設定された。A1がコート上でボールをキャッチし、フロントコートへドリブルをして、ショットをした。\n⒜A1 のショットは成功せず、B2 がボールのコントロールを得てドリブルを始めた。\n⒝A1 のショットは成功した。\n審判は誤りを認識し、ショットクロックを訂正するためにゲームを止めた。\n解説：どちらの場合においても、誤りのあと、\n⒜ライブのボールのコントロールが変わっているため\n⒝同じチームが得点をしたためこの誤りは訂正できない。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-8", "body": "４-8  例：A6 はユニフォームのシャツの下にコンプレッションウェア（アンダーシャツ）を着用していて、そのウェアは\n⒜肩まで伸びている。\n⒝首まで伸びている。\n解説：コンプレッションウェア（アンダーシャツ）を着用することは正当であり、\n⒜肩の下のいかなる長さでも着用することができる。\n⒝首の下までの長さのものを着用することができる。\n同じチームの全てのプレーヤーは、同じ単色の、アンダーシャツやアンダーパンツを含むコンプレッションウェア、ヘッドギア、リストバンド、ヘッドバンド、テーピングを着用しなければならない。"}];

// ====== ストレージキー ======
var SK  = 'jba_v3';
var SKR = 'jba_rule_v1';

// ====== 状態 ======
var mode = 'order';
var queue = [];
var qi = 0;
var ses = {ok:0,ng:0};
var chosen = null;
var lf = 'all';
var rt = 'rule';
var rfilter = 'all';
var rec = {};
var rchk = {};

// ====== ストレージ ======
function LRec(){
  try{
    var r = JSON.parse(localStorage.getItem(SK)||'{}');
    for(var i=0;i<ALL.length;i++){
      var id=ALL[i].id;
      if(!r[id]) r[id]={c:0,w:0};
    }
    return r;
  }catch(e){
    var r={};
    for(var i=0;i<ALL.length;i++) r[ALL[i].id]={c:0,w:0};
    return r;
  }
}
function SRec(){
  try{ localStorage.setItem(SK,JSON.stringify(rec)); toast(); }catch(e){}
}
function LChk(){
  try{ return JSON.parse(localStorage.getItem(SKR)||'{}'); }catch(e){ return {}; }
}
function SChk(){
  try{ localStorage.setItem(SKR,JSON.stringify(rchk)); }catch(e){}
}
function CLR(){
  if(!confirm('学習記録をリセットしますか？')) return;
  for(var i=0;i<ALL.length;i++) rec[ALL[i].id]={c:0,w:0};
  SRec(); RRC();
}
function toast(){
  var t=document.getElementById('toast');
  t.className='toast show';
  setTimeout(function(){ t.className='toast'; },1500);
}

// ====== タブ切替 ======
function ST(t){
  var tabs=['quiz','list','rule','record'];
  for(var i=0;i<tabs.length;i++){
    document.getElementById('T-'+tabs[i]).style.display = tabs[i]===t?'':'none';
    document.getElementById('tn-'+tabs[i]).className = 'tnb'+(tabs[i]===t?' active':'');
  }
  if(t==='list')  { RLS(); RL(); }
  if(t==='rule')  RRT();
  if(t==='record') RRC();
}

// ====== 学習タブ ======
function GW(){
  var r=[];
  for(var i=0;i<ALL.length;i++){
    var d=rec[ALL[i].id]; var t=d.c+d.w;
    if(t>0 && d.c/t<0.5) r.push(ALL[i].id);
  }
  return r;
}
function BQ(){
  if(mode==='order') queue=ALL.slice();
  else if(mode==='shuffle') queue=ALL.slice().sort(function(){return Math.random()-.5;});
  else{ var w=GW(); queue=ALL.filter(function(c){return w.indexOf(c.id)>=0;}); }
  qi=0; ses={ok:0,ng:0}; chosen=null;
}
function SM(m){
  mode=m;
  ['order','shuffle','wrong'].forEach(function(k){
    document.getElementById('m-'+k).className='mode-tab'+(k===m?' active':'');
  });
  BQ(); RQ();
}
function SAV(v){
  ['quiz','done','empty'].forEach(function(x){
    document.getElementById('A-'+x).style.display=x===v?'':'none';
  });
}
function US(){
  document.getElementById('s-total').textContent=ALL.length;
  document.getElementById('s-ok').textContent=ses.ok;
  document.getElementById('s-ng').textContent=ses.ng;
  document.getElementById('s-left').textContent=Math.max(0,queue.length-qi);
  var p=queue.length>0?Math.round(qi/queue.length*100):0;
  document.getElementById('prog').style.width=p+'%';
  document.getElementById('n-info').textContent='問題 '+(qi+1)+'/'+queue.length;
  document.getElementById('n-pct').textContent=p+'%';
}
function RQ(){
  US();
  if(mode==='wrong'&&queue.length===0){SAV('empty');return;}
  if(qi>=queue.length){
    SAV('done');
    var t=queue.length, p=t>0?Math.round(ses.ok/t*100):0;
    document.getElementById('d-t').textContent=t;
    document.getElementById('d-ok').textContent=ses.ok;
    document.getElementById('d-ng').textContent=ses.ng;
    document.getElementById('d-p').textContent=p+'%';
    return;
  }
  SAV('quiz');
  var c=queue[qi];
  document.getElementById('q-meta').textContent='No.'+c.id+'　'+c.num+'　難易度 '+c.level;
  document.getElementById('q-ref').textContent=c.ref;
  document.getElementById('q-text').textContent=c.q;
  var d=rec[c.id]||{c:0,w:0}; var tot=d.c+d.w;
  var he=document.getElementById('q-hist');
  if(tot>0){
    var rate=Math.round(d.c/tot*100);
    he.innerHTML='<span class="chip">累計 '+tot+' 回</span><span class="chip chip-ok">正解 '+d.c+' 回</span><span class="chip chip-ng">不正解 '+d.w+' 回</span><span class="chip">正答率 '+rate+'%</span>';
  }else{
    he.innerHTML='<span class="chip">初挑戦</span>';
  }
  var bo=document.getElementById('b-o'); var bx=document.getElementById('b-x');
  bo.className='cbtn'; bo.disabled=false;
  bx.className='cbtn'; bx.disabled=false;
  chosen=null;
  document.getElementById('A-res').style.display='none';
  document.getElementById('c-btns').style.display='grid';
}
function CH(ua){
  if(chosen!==null) return;
  chosen=ua;
  var c=queue[qi]; var ok=(ua===c.ans);
  if(ok) ses.ok++; else ses.ng++;
  US();
  var d=rec[c.id]; if(ok) d.c++; else d.w++;
  SRec();
  var bo=document.getElementById('b-o'); var bx=document.getElementById('b-x');
  bo.disabled=true; bx.disabled=true;
  if(ua===true){
    bo.className='cbtn '+(ok?'cbtn-ok':'cbtn-ng');
    if(!ok) bx.className='cbtn cbtn-rv';
  }else{
    bx.className='cbtn '+(ok?'cbtn-ok':'cbtn-ng');
    if(!ok) bo.className='cbtn cbtn-rv';
  }
  var al=c.ans?'○':'×'; var bc=c.ans?'bdg-o':'bdg-x';
  document.getElementById('r-card').innerHTML=
    '<div class="res-hd"><div class="ans-bdg '+bc+'">'+al+'</div>'+(ok?'<span class="res-lbl lbl-ok">✓ 正解！</span>':'<span class="res-lbl lbl-ng">✗ 不正解</span>')+'</div>'
    +'<div class="rsec"><div class="rsec-t">解説</div><div class="rsec-b">'+E(c.explanation)+'</div></div>'
    +'<div class="rsec"><div class="rsec-t">根拠条文</div><div class="rl-box"><div class="rl-src">'+E(c.ruleSrc)+'</div><div class="rl-txt">'+E(c.ruleText).replace(/\n/g,'<br>')+'</div></div></div>';
  document.getElementById('c-btns').style.display='none';
  document.getElementById('A-res').style.display='block';
}
function NQ(){ qi++; RQ(); }
function RS(){ BQ(); RQ(); }

// ====== 一覧タブ ======
function LF(f){
  lf=f;
  ['all','weak','new'].forEach(function(k){
    document.getElementById('lf-'+k).className='fbtn'+(k===f?' active':'');
  });
  RL();
}
function RLS(){
  var tc=0,tw=0; for(var k in rec){ tc+=rec[k].c; tw+=rec[k].w; }
  var tot=tc+tw;
  var ans=0; for(var i=0;i<ALL.length;i++){ var d=rec[ALL[i].id]; if(d.c+d.w>0) ans++; }
  document.getElementById('ls-a').textContent=ans;
  document.getElementById('ls-w').textContent=GW().length;
  document.getElementById('ls-r').textContent=tot>0?Math.round(tc/tot*100)+'%':'0%';
}
function RL(){
  var kw=(document.getElementById('l-srch').value||'').toLowerCase();
  var items=ALL.slice();
  var wids=GW();
  if(lf==='weak') items=items.filter(function(c){return wids.indexOf(c.id)>=0;});
  if(lf==='new')  items=items.filter(function(c){var d=rec[c.id];return !d||(d.c+d.w)===0;});
  if(kw) items=items.filter(function(c){return c.q.toLowerCase().indexOf(kw)>=0||c.num.toLowerCase().indexOf(kw)>=0||String(c.id).indexOf(kw)>=0;});
  var w=document.getElementById('l-wrap');
  if(!items.length){w.innerHTML='<div style="text-align:center;padding:24px;color:#98a2b3;font-size:13px">該当なし</div>';return;}
  w.innerHTML=items.map(function(c){
    var d=rec[c.id]||{c:0,w:0}; var tot=d.c+d.w;
    var isN=tot===0; var rate=isN?-1:Math.round(d.c/tot*100); var isW=!isN&&rate<50;
    var nc=isN?'no-n':isW?'no-w':'no-g';
    var rc=isN?'rt-nw':isW?'rt-ng':'rt-ok';
    var rs=isN?'未回答':rate+'%';
    var cb=isN?0:rate; var wb=isN?0:100-rate;
    return '<div class="ql-c" id="lc-'+c.id+'">'
      +'<div class="ql-hd" onclick="TD('+c.id+')">'
        +'<span class="ql-no '+nc+'">No.'+c.id+'</span>'
        +'<span class="ql-ch">'+E(c.num)+'　'+E(c.ref)+'</span>'
        +'<span class="ql-rt '+rc+'">'+rs+'</span>'
      +'</div>'
      +'<div class="ql-br"><div class="ql-b"><div class="b-c" style="width:'+cb+'%"></div><div class="b-w" style="width:'+wb+'%"></div></div><span class="ql-bn">'+(isN?'—':d.c+'/'+tot+'回')+'</span></div>'
      +'<div class="ql-dt" id="ld-'+c.id+'">'
        +'<div class="q-hist">'+(isN?'<span class="chip">初挑戦</span>':'<span class="chip">累計 '+tot+' 回</span><span class="chip chip-ok">正解 '+d.c+' 回</span><span class="chip chip-ng">不正解 '+d.w+' 回</span><span class="chip">正答率 '+rate+'%</span>')+'</div>'
        +'<div class="ql-qt">'+E(c.q)+'</div>'
        +'<div class="ql-ar"><div class="ql-ab '+(c.ans?'bdg-o':'bdg-x')+'">'+(c.ans?'○':'×')+'</div><div class="ql-al">正解：'+(c.ans?'○ 正しい':'× 誤り')+'</div></div>'
        +'<div class="ql-s"><div class="ql-st">解説</div><div class="ql-sb">'+E(c.explanation)+'</div></div>'
        +'<div class="ql-s"><div class="ql-st">根拠条文</div><div class="ql-rb"><div class="ql-rs">'+E(c.ruleSrc)+'</div><div class="ql-rt2">'+E(c.ruleText).replace(/\n/g,'<br>')+'</div></div></div>'
        +'<button class="ql-sb2" onclick="SFQ('+c.id+')">この問題から学習を始める</button>'
      +'</div>'
    +'</div>';
  }).join('');
}
function TD(id){ var el=document.getElementById('ld-'+id); if(el) el.classList.toggle('open'); }
function SFQ(id){
  mode='order';
  ['order','shuffle','wrong'].forEach(function(k){document.getElementById('m-'+k).className='mode-tab'+(k==='order'?' active':'');});
  queue=ALL.slice(); qi=0;
  for(var i=0;i<ALL.length;i++){ if(ALL[i].id===id){qi=i;break;} }
  ses={ok:0,ng:0}; chosen=null;
  ST('quiz'); RQ();
}

// ====== 競技規則タブ ======
function SRT(t){
  rt=t;
  document.getElementById('rsw-r').className='rswb'+(t==='rule'?' active':'');
  document.getElementById('rsw-i').className='rswb'+(t==='impl'?' active':'');
  RF('all');
}
function RF(f){
  rfilter=f;
  document.getElementById('rf-all').className='rfb'+(f==='all'?' active':'');
