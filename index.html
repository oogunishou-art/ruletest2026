ることは正当であるが、相手チームの\n        プレーヤーが脇を通り抜けようとするときには、腕や肘を自身のシリンダーの中に収めなくてはならない。\n\n        腕や肘をよけないで触れ合いが起こったときは、ブロッキングもしくはホールディングになる。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-10", "body": "33-10   ノーチャージセミサークルエリア\n        ノーチャージセミサークルエリアは、バスケット近辺でのチャージングやブロッキングの特別な規則の適\n        用のため、コート上に指定されたエリアのことをいう。\n\n        ノーチャージセミサークルエリアにペネトレイトしてくるプレーにおいて、空中にいるオフェンスのプレーヤ\n        ーがノーチャージセミサークルエリアにいるディフェンスのプレーヤーと触れ合いを起こしても、オフェンス\n        のプレーヤーが手、腕、脚、その他の体の部位を不当に使って触れ合いを起こした場合を除き、チ\n        ームコントロールファウルは宣せられない。この規則が適用されるのは以下の全ての条件を満たす場合\n        である：\n        ・オフェンスのプレーヤーが空中でボールをコントロールしていること。\n        ・そのオフェンスのプレーヤーがショットあるいはパスをしようとすること。\n        ・そのオフェンスのプレーヤーとの間に触れ合いが生じたディフェンスのプレーヤーの片足あるいは両足\n         が、ノーチャージセミサークルエリア内のフロアあるいはノーチャージセミサークルのラインに触れていること。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-11", "body": "33-11   手や腕で相手チームのプレーヤーに触れること\n        プレーヤーが相手チームのプレーヤーに手や腕で触れることがあっても、必ずしもファウルではない。\n\n        審判は、プレーヤーが相手チームのプレーヤーに手や腕で触れたり触れ続けたりしていることで、触\n        れ合いを起こしたプレーヤーが有利になっているか否かを判断し、相手チームのプレーヤーの自由な\n        動き（フリーダムオブムーブメント）を妨げているときには、ファウルの判定を下す。\n\n        相手チームのプレーヤーがボールを持っていてもいなくても、ディフェンスのプレーヤーが突き出した手\n        や伸ばした腕で、相手に触れ続けて相手の動きを妨げることはファウルである。\n\n        相手チームのプレーヤーがボールを持っているかいないかにかかわらず、繰り返し触れたりする行為\n        は、乱暴なプレーにつながる可能性があるためファウルである。\n\n        ボールを持っているオフェンスのプレーヤーが起こす、以下の触れ合いはファウルである：\n        ・自分が有利になるために、腕や肘でディフェンスのプレーヤーの体を押さえたり（フック）巻きつけ\n        るように回したり（ラップ）すること。\n        ・ディフェンスのプレーヤーがボールにプレーすることを妨げる、あるいはディフェンスのプレーヤーとの間\n        隔（スペース）を広げようとして、相手を押しのけること（プッシュオフ）。\n        ・ドリブルをしているときに、ボールを取ろうとするディフェンスのプレーヤーの動きを前腕や手を使って\n        妨げること。\n\n        ボールを持っていないオフェンスのプレーヤーが起こす、以下の触れ合い（プッシュオフ）はファウルで\n        ある：\n        ・ボールを受け取りやすくしようとして、ディフェンスのプレーヤーを押しのけること。\n        ・ボールにプレーしようとするディフェンスのプレーヤーを妨げようとして、相手を押しのけること。\n        ・自分に有利になるように相手との間隔（スペース）を広げようとして、相手を押しのけること。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-12", "body": "33-12   ポストプレー\n        バーティカリティ（シリンダーの概念）の考え方は、ポストプレーにも適用される。\n\n        ポストにいるオフェンスのプレーヤーもそのディフェンスのプレーヤーも、互いに相手の真上の空間（シ\n        リンダー）の権利を重んじなければならない。\n\n        ポストの位置を占めているオフェンスのプレーヤーあるいはディフェンスのプレーヤーによって、肩や尻で\n        相手チームのプレーヤーを押し出すことや、伸ばした腕、肩、尻、脚、あるいはその他の体の部分を\n        使って相手の自由な動き（フリーダムオブムーブメント）を妨げることはファウルになる。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-13", "body": "33-13   後方からの不当なガード\n        後方からの不当なガードとは、ディフェンスのプレーヤーが、相手チームのプレーヤーの後ろから起こ\n        す不当な体の触れ合いのことをいう。\n\n        ボールにプレーしようとしても、後ろから相手と触れ合いを起こしてよいことにはならない。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-14", "body": "33-14   ホールディング\n        ホールディングとは、相手プレーヤーの自由な動き（フリーダムオブムーブメント）を妨げる不当な体\n        の触れ合いのことをいう。この体の触れ合い（押さえること）はどの部分を使っていてもホールディン\n        グになる。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-15", "body": "33-15   プッシング\n        プッシングとは、相手チームのプレーヤーがボールを持っていてもいなくても、手や体で相手を無理に\n        押しのけたり押して動かそうとしたりする不当な体の触れ合いのことをいう。"}, {"type": "rule", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-16", "body": "33-16   フェイク（ファウルをされたと欺くこと）\n        フェイクとは、状況を有利にするためにファウルをされたふりをする、またはファウルをされたと判断され\n        るために大げさな演技をすることをいう。"}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル                  （Personal foul）", "sec_no": "34-1", "body": "34-１    定義\n34-１-１ パーソナルファウルとは、ボールのライブ、デッドにかかわらず、相手チームのプレーヤーとの不当な\n         体の触れ合いによるプレーヤーファウルのことをいう。\n         プレーヤーは、相手を押さえて動きの自由を妨げたり、押したり、叩いたり、突き当たったり、つま\n         ずかせることをしてはならない。手（腕）や足（脚）、膝などを伸ばしたり広げたり突き出した\n         り、体を不自然に曲げたりして相手の進行や相手の動きを妨げる触れ合いを、自分のシリンダー\n         の外で起こしてはならない。\n         また、その他乱暴な触れ合いを起こすこともしてはならない。\n34-１-２ スローインファウルとは、第 4 クォーターや各オーバータイムで、ゲームクロックが 2:00 あるいはそれ\n         以下を表示していて、アウトオブバウンズからのスローインを行うときに、まだボールが審判あるいは\n         スローインを行うプレーヤーの手にある間に、コート上のディフェンスのプレーヤーが相手プレーヤー\n         に起こすパーソナルファウルである。"}, {"type": "rule", "art_no": "34", "art_title": "パーソナルファウル                  （Personal foul）", "sec_no": "34-2", "body": "34-２    罰則\n        ファウルをしたプレーヤーに１個のパーソナルファウルが記録される。\n34-２-１ ショットの動作（アクトオブシューティング）中ではないプレーヤーがファウルをされたとき：\n         ・ファウルが起こった場所に最も近いアウトオブバウンズから、ファウルをされたチームのスローインに\n         よってゲームを再開する。\n         ・ファウルをしたチームがチームファウルのペナルティシチュエーション（チームファウルの罰則が適用\n         される状況）にある場合は、第 41 条が適用される。\n34-２-２ ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされたときは、ファウルをされ\n         たプレーヤーに以下のとおりフリースローが与えられる：\n\n・そのショットが成功したときは得点が認められ、さらに１本のフリースローが与えられる。\n        ・そのショットがツーポイントゴールエリアからのショットで不成功だったときは、２本のフリースローが\n        与えられる。\n        ・そのショットがスリーポイントゴールエリアからのショットで不成功だったときは、３本のフリースロー\n        が与えられる。\n34-２-３ スローインファウルが宣せられた場合：\n       ・ファウルをしたチームがすでにチームファウルのペナルティシチュエーションかどうかにかかわらず、ファ\n        ウルをされたプレーヤーはフリースローを 1 本のみ与えられる。ゲームはファウルが起きた場所に最\n        も近いアウトオブバウンズからファウルをされたチームのスローインで再開される。"}, {"type": "rule", "art_no": "35", "art_title": "ダブルファウル                     （Double foul）", "sec_no": "35-1", "body": "35-１   定義\n35-１-１ ダブルファウルとは、両チームの２人のプレーヤーがほとんど同時に、互いにパーソナルファウル、あ\n       るいはアンスポーツマンライクファウルやディスクォリファイングファウルをした場合をいう。\n35-１-２ ２つのファウルがダブルファウルであるとみなすためには、以下の条件が求められる：\n        ・両方のファウルが、プレーヤーのファウルであること。\n        ・両方のファウルが、体の触れ合いを伴うファウルであること。\n        ・両方のファウルが、同じ 2 人の対戦プレーヤー間で起きること。\n        ・両方のファウルがともにパーソナルファウル、もしくはアンスポーツマンライクファウルとディスクォリファ\n        イングファウルのいずれかの組み合わせであること。\n        【補足】この条件は２つのファウルが他の条件に当てはまるうえで、「パーソナルファウルとパーソ\n              ナルファウル」「アンスポーツマンライクファウルとアンスポーツマンライクファウル」「ディスクォリ\n              ファイングファウルとディスクォリファイングファウル」「アンスポーツマンライクファウルとディスク\n              ォリファイングファウル」のいずれかの場合にダブルファウルとすることを指す。"}, {"type": "rule", "art_no": "35", "art_title": "ダブルファウル                     （Double foul）", "sec_no": "35-2", "body": "35-２   罰則\n        両プレーヤーにパーソナルファウルが記録される。どちらのチームにもフリースローは与えられず、ゲ\n        ームは、以下の方法で再開する：\n        ダブルファウルとほとんど同時に、\n        ・ゴールや最後のフリースローが成功してどちらかのチームに得点が認められた場合は、得点をさ\n        れたチームが、エンドラインの任意の位置のアウトオブバウンズからスローインをしてゲームを再開\n        する。\n        【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットの\n              ゴールを指す。\n\n・一方のチームがボールをコントロールしていたかボールが与えられることになっていた場合は、その\n        チームが、ダブルファウルが起こった場所に最も近いアウトオブバウンズからスローインをしてゲーム\n        を再開する。\n        ・どちらのチームもボールをコントロールしていなかったかボールが与えられることになっていなかった\n        場合は、ジャンプボールシチュエーションになる。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル               （TF：Technical foul）", "sec_no": "36-1", "body": "36-１   言動や振る舞いに関する規定\n36-１-１ ゲームは、両チームのプレーヤー、ヘッドコーチ、アシスタントコーチ、交代要員、５個のファウルを\n        宣せられたチームメンバー、チーム関係者、審判、テーブルオフィシャルズ、コミッショナー（同席し\n        ている場合）を含むこれら全ての人たちの完全な協力によって成立するものである。\n36-１-２ 両チームは勝利を得るために全力を尽くさなければならないが、これはスポーツマンシップとフェアプ\n        レーの精神に基づいたものでなければならない。\n36-１-３ 競技規則の精神と目的に対して、意図的にあるいは繰り返し行われる非協力的な行為は、テ\n        クニカルファウルとみなされる。\n36-１-４ 審判は、明らかに意図的ではなくゲームに直接的に影響のない軽微な規則の違反（ファウルや\n        バイオレーション）については、テクニカルファウルを科さずに警告を与えることがある。ただし、警\n        告の後もその同じ違反が繰り返し続く場合はその限りではない。\n36-１-５ ボールがいったんライブになってから、前に起こったこの規則に該当する違反が見つかった場合は、\n        見つかったときにテクニカルファウルがあったものとして処置をする。\n        この規則に該当する違反があってからそれが見つけられるまでに起こったことは、全て有効である。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル               （TF：Technical foul）", "sec_no": "36-2", "body": "36-２   定義\n36-２-１ テクニカルファウルは、相手チームのプレーヤーとの体の触れ合いのない振る舞いであり以下が該\n        当するが、これらに限るものではない：\n        ・審判からの警告を無視する。\n        ・審判、コミッショナー（同席している場合）、テーブルオフィシャルズ、相手チーム、あるいはチー\n        ムベンチに座ることを許された人物への敬意を欠く振る舞い、異論表現。\n            【補足】ベンチで立ち上がり異論表現を行うなどの行為を含む。\n        ・観客に対して無作法に振る舞ったり挑発したりする、あるいは煽動するような言動をとる。\n        ・相手チームのプレーヤーを挑発したり侮辱したりする。\n        ・相手チームのプレーヤーの目の前で手を振ったり、手をかざしたりして視野を妨げる。\n        ・肘を激しく振り回す。\n        ・バスケットを通過したボールに故意に触れること、スローインやフリースローが遅延なく行われるの\n        を妨げること、もしくはゲームや後半の開始前にコートに来るのが遅れることで、ゲームの進行を\n        遅らせる。\n        【補足】審判にボールを返さずにゲームの進行を遅らせるような行為等も上記項目に該当する。\n        ・フェイク（ファウルをされたと欺くこと）。\n\n・リングをつかんで体重をかける。ただし、ダンクショットのとき、または自身を含むプレーヤーが怪我\n        をすることを避けるために、やむを得ず瞬間的にリングをつかむことはテクニカルファウルとはしない。\n        ・最後のフリースローでボールがリングに触れる前にゴールテンディングのバイオレーションをしたとき\n        は、オフェンスのチームに１点が与えられ、さらにそのディフェンスのプレーヤーにテクニカルファウル\n        が宣せられる。\n36-２-２ チームベンチに座ることを許された人物によるテクニカルファウルは、審判、コミッショナー（同席し\n       ている場合）、テーブルオフィシャルズ、相手チームに対して失礼な態度で接したり、体に触れた\n       りする行為、またゲームの進行や運営に支障をもたらしたりする規則の違反のことをいう。\n36-２-３ テクニカルファウルを２個あるいはアンスポーツマンライクファウルを２個、もしくはテクニカルファウル\n       とアンスポーツマンライクファウルを１個ずつ記録されたプレーヤーは失格・退場（ゲームディスクォ\n       リフィケーション）になる。\n        【補足】「ゲームディスクォリフィケーション」とは、テクニカルファウルやアンスポーツマンライクファウルの\n            累積による失格・退場を指し、ディスクォリファイングファウルでの失格・退場と区別される。\n36-２-４ ヘッドコーチは以下の場合、失格・退場（ゲームディスクォリフィケーション）になる。\n        ・ヘッドコーチ自身のスポーツマンらしくない振る舞いによるテクニカルファウル「C」が２個記録され\n        た場合。\n        ・チームベンチに座ることを許された人物のスポーツマンらしくない振る舞いによって、ヘッドコーチに\n        テクニカルファウル「B」が３個記録された場合、あるいはそれらのテクニカルファウルとヘッドコーチ\n        自身のテクニカルファウル「C」とを合わせて３個のファウルが記録された場合。\n36-２-５ プレーヤーもしくはヘッドコーチが、36-２-３あるいは 36-２-４に則り失格・退場処分となる場\n       合、テクニカルファウルによる罰則のみが与えられ、失格・退場による追加の罰則は与えられない。"}, {"type": "rule", "art_no": "36", "art_title": "テクニカルファウル               （TF：Technical foul）", "sec_no": "36-3", "body": "36-３   罰則\n36-３-１ テクニカルファウルが宣せられたときは、次のように記録をする：\n        ・プレーヤーの場合は、そのプレーヤーに１個のテクニカルファウルが記録され、チームファウルに数える。\n        ・チームベンチに座ることを許された人物の場合は、ヘッドコーチに１個のテクニカルファウルが記\n        録され、チームファウルに数えない。\n36-３-２ 相手チームに１本のフリースローが与えられ、ゲームは次のように再開される：\n        ・フリースローは直ちに行う。フリースローの後、テクニカルファウルが宣せられたときにボールをコント\n        ロールしていたか、ボールが与えられることになっていたチームに、ゲームが止められたときにボール\n        があった場所から最も近いアウトオブバウンズでスローインが与えられる。\n        ・フリースローは、他のファウルによって適用される罰則の順序にとらわれることなく、さらにすでに行\n        われている罰則の途中であっても、それらに関わらず直ちに行う。テクニカルファウルのフリースロ\n        ーの後は、テクニカルファウルが宣せられたときにボールをコントロールしていたか、ボールが与えら\n\nれることになっていたチームよって、テクニカルファウルの罰則のためにゲームが止められた時点か\n        らゲームを再開する。\n        ・ゴールや最後のフリースローが成功して得点が認められた場合は、エンドラインの任意の位置の\n        アウトオブバウンズからスローインをしてゲームを再開する。\n        【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットの\n              ゴールを指す。\n        ・どちらのチームにもボールのコントロールがない場合は、ジャンプボールシチュエーションになる。\n        ・第１クォーターを始める場合は、センターサークルでのジャンプボールになる。"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル     （UF：Unsportsmanlike foul）", "sec_no": "37-1", "body": "37-１   定義\n37-１-１ アンスポーツマンライクファウルは、プレーヤーによる体の触れ合いを伴うファウルであり、以下が該\n       当する：\n        ・ボールに対するプレーではなく、かつ、正当なバスケットボールのプレーとは認められない相手プレ\n        ーヤーとの触れ合い。\n        ・プレーヤーがボールや相手プレーヤーに正当にプレーしようと努力していたとしても、過度に激し\n        い触れ合い（エクセシブハードコンタクト）。\n        【補足】「相手プレーヤーへの正当なプレー」とはボールを持っていないオフェンスのプレーヤーに\n              対するディフェンスなど、正当なバスケットボールのプレーを指す。\n        ・オフェンスが進行する中で、その進行を妨げることを目的としたディフェンスのプレーヤーによる必要\n        のない触れ合い。これはオフェンスのプレーヤーがショットの動作（アクトオブシューティング）に入\n        るまで適用される。\n        ・以下のいずれかの状況で、相手チームのバスケットに向かって進行しているプレーヤーとそのバス\n        ケットとの間に、進行しているプレーヤーの相手プレーヤーが全くおらず、進行しているプレーヤー\n        の後ろあるいは横から起こす不当な触れ合い。これはオフェンスのプレーヤーがショットの動作\n        （アクトオブシューティング）に入るまで適用される。\n         − 進行しているプレーヤーがボールをコントロールしている状況、もしくは\n         − 進行しているプレーヤーがボールをコントロールしようとしている状況、もしくは\n         − 進行しているプレーヤーへのパスのボールが放たれている状況。\n            【補足】パスされ空中にあるボールは、ファウルがなければ、進行しているプレーヤーによってコ\n               ントロールされることが想定できる場合。\n37-１-２ 審判は、プレーヤーの起こしたアクションのみを基準として、ゲームをとおして一貫性を持ってアンス\n       ポーツマンライクファウルの判断を行わなければならない。"}, {"type": "rule", "art_no": "37", "art_title": "アンスポーツマンライクファウル     （UF：Unsportsmanlike foul）", "sec_no": "37-2", "body": "37-２   罰則\n37-２-１ ファウルをしたプレーヤーに、１個のアンスポーツマンライクファウルが記録される。\n37-２-２ ファウルをされたプレーヤーにフリースローが与えられたあと：\n        ・そのチームのフロントコートのスコアラーズテーブルの反対側にあるスローインラインからのスローイ\n        ンで再開する。\n        ・第１クォーターをはじめる場合は、センターサークルでのジャンプボールになる。\n        フリースローは以下のとおり与えられる：\n        ・ショットの動作（アクトオブシューティング）中ではないプレーヤーがファウルをされたとき：２本のフリースロー。\n        ・ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされ、そのショットが成功し\n        たとき：得点が認められ、さらに１本のフリースロー。\n        ・ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされ、そのショットが不成\n        功だったとき：２本または３本のフリースロー。\n37-２-３ テクニカルファウルを２個あるいはアンスポーツマンライクファウルを２個、もしくはテクニカルファウル\n       とアンスポーツマンライクファウルを１個ずつ記録されたプレーヤーは失格・退場（ゲームディスクォ\n       リフィケーション）になる。\n37-２-４ プレーヤーが 37-２-３に則り失格・退場になる場合、アンスポーツマンライクファウルによる罰則\n       のみが与えられ、失格・退場による追加の罰則は与えられない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル       （DQ：Disqualifying foul）", "sec_no": "38-1", "body": "38-１   定義\n38-１-１ ディスクォリファイングファウルとは、プレーヤー、交代要員、ヘッドコーチ、アシスタントコーチ、5 個\n       のファウルを宣せられたチームメンバー、チーム関係者によって行われる、特に悪質でスポーツマン\n       シップに反する行為に対するファウルのことをいう。\n38-１-２ ヘッドコーチにディスクォリファイングファウルが記録された場合は、スコアシートに記入されているファ\n       ーストアシスタントコーチがヘッドコーチの役目を引き継ぐ。ファーストアシスタントコーチがスコアシ\n       ートに記入されていない場合は、スコアシートに示されたキャプテン（CAP）がヘッドコーチの役\n       目を引き継ぐ。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル       （DQ：Disqualifying foul）", "sec_no": "38-2", "body": "38-２   暴力行為\n38-２-１ ゲーム中に、スポーツマンシップとフェアプレーの精神に反する暴力行為が起きたときは、審判また\n       は必要に応じて警備担当者により、暴力行為を速やかに止めさせなければならない。\n38-２-２ コート上もしくはその付近で、プレーヤーによる暴力行為が発生した場合は、審判は速やかにそ\n       れを止めさせる。\n38-２-３ 審判やテーブルオフィシャルズあるいは相手チームに対し、暴行を加えたプレーヤー、交代要員、\n\nコーチ、アシスタントコーチ、５個のファウルを宣せられたチームメンバー、チーム関係者は、速やか\n       に失格・退場させられる。クルーチーフは、その事象を大会主催者に報告しなければならない。\n38-２-４ 審判が許可をしたときのみ警備担当者はコートに入る。しかし、観客が明らかな暴力的な意図\n       をもってコートに侵入する場合は、チームや審判、テーブルオフィシャルズを守るために、警備担当\n       者は速やかにコートに入らなければならない。\n38-２-５ コートやその周囲、出入口、通路、控室などの全てのエリアは、大会主催者の管理下にある。\n38-２-６ プレーヤー、チームベンチに座ることを許された人物による用具・器具を破損するおそれのある行\n       為は、絶対に許してはならない。\n        このような行為があったときには、審判はそのチームのヘッドコーチにそのような行為をやめさせるよ\n        うに警告をする。\n        その行為が繰り返された場合には、速やかにテクニカルファウルまたはさらにディスクォリファイングフ\n        ァウルを宣さなければならない。"}, {"type": "rule", "art_no": "38", "art_title": "ディスクォリファイングファウル       （DQ：Disqualifying foul）", "sec_no": "38-3", "body": "38-３   罰則\n38-３-１ ファウルをした当該者に１個のディスクォリファイングファウルが記録される。\n38-３-２ 規則により失格・退場処分を受けた当該者は、ゲームが終わるまで自チームの控室にとどまる\n       か、または建物から出なければならない。\n38-３-３ フリースローが以下のとおり与えられる：\n        ・体の触れ合いをともなわないディスクォリファイングファウルが宣せられた場合のフリースローシュー\n        ターは、ヘッドコーチが指定する。\n        【補足】この場合のフリースローシューターはチームメンバーの中から選ばれる。\n        ・体の触れ合いをともなうディスクォリファイングファウルが宣せられた場合は、ファウルをされたプレ\n        ーヤーがフリースローシューターになる。\n        フリースローの後：\n       ・そのチームのフロントコートのスコアラーズテーブルの反対側のスローインラインからのスローインで\n        再開する。\n        ・第１クォーターを始める場合は、センターサークルでのジャンプボールになる。\n38-３-４ 与えられるフリースローの数は以下のとおりである：\n        ・体の触れ合いをともなわないファウル：２本のフリースロー。\n        ・ショットの動作（アクトオブシューティング）中ではないプレーヤーがファウルをされたとき：２本のフリースロー。\n        ・ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされ、そのショットが成功し\n        たとき：得点が認められ、さらに１本のフリースロー。\n        ・ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされ、そのショットが不成\n        功だったとき：２本または３本のフリースロー。\n\n・ヘッドコーチが失格退場になるファウル：２本のフリースロー。\n        ・ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー、チーム関\n        係者が失格退場になるファウル。このファウルはヘッドコーチのテクニカルファウルとして記録され\n        る：２本のフリースロー。\n        さらに、ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー、チ\n        ーム関係者がチームベンチエリアを離れ、積極的に抗争に参加した場合：\n            −ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバーに対す\n             る１回のディスクォリファイングファウルごとに：２本のフリースロー。\n             全てのディスクォリファイングファウルはそれぞれの違反者に対して記録される。\n            −チーム関係者に対する 1 回のディスクォリファイングファウルごとに：2 本のフリースロー。\n             全てのディスクォリファイングファウルはヘッドコーチに対して記録される。\n        相手チームと罰則が等しく相殺されない限り、全ての罰則に含まれるフリースローは行われる。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング                      （Fighting）", "sec_no": "39-1", "body": "39-１   定義\n        抗争（Fight）とは、２人以上の対戦相手のプレーヤーやチームベンチに座ることを許された人\n        物の間で発生する体の触れ合いを伴うやり取りをいう。\n        この規定は、コート上やその周囲で抗争が起こったときや起こりそうなときに、チームベンチエリアか\n        ら出た交代要員、ヘッドコーチ、ファーストアシスタントコーチ、５個のファウルを宣せられたチーム\n        メンバーやチーム関係者のみに適用される。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング                      （Fighting）", "sec_no": "39-2", "body": "39-２   ルール\n39-２-１ 抗争が起こったときや起こりそうなときに、チームベンチエリアを離れた交代要員、５個のファウル\n        を宣せられたチームメンバー、チーム関係者は失格・退場になる。\n39-２-２ ヘッドコーチとファーストアシスタントコーチだけは、審判に協力して争いを止めるためであれば、抗\n        争が起こったときや起こりそうなときでもチームベンチエリアから出てもよい。この場合は、ヘッドコー\n        チ、ファーストアシスタントコーチは失格・退場にはならない。\n39-２-３ ヘッドコーチやファーストアシスタントコーチがチームベンチエリアから出てコートに入ったのに争いを\n        止めようとしなかったときは、失格・退場になる。"}, {"type": "rule", "art_no": "39", "art_title": "ファイティング                      （Fighting）", "sec_no": "39-3", "body": "39-３   罰則\n39-３-１ チームベンチエリアを離れ失格・退場になった人数にかかわらず、罰則はそのチームのヘッドコーチ\n        に１個のテクニカルファウル「B」が記録される。\n39-３-２ 両チームの者がファイティングの規定によって失格・退場になり、他に適用されるファウルの罰則が\n\nない場合は、以下の方法でゲームを再開する。\n      ファイティングによりゲームクロックが止まったのとほとんど同時に：\n      ・ゴールや最後のフリースローが成功してどちらかのチームに得点が認められた場合は、得点をさ\n       れたチームがエンドラインの任意の位置のアウトオブバウンズからスローインをしてゲームを再開す\n       る。\n      ・一方のチームがボールをコントロールしていた、もしくはボールを与えられることになっていた場合\n       は、抗争が始まったときにボールがあった場所に最も近いアウトオブバウンズからそのチームのスロ\n       ーインでゲームを再開する。\n      ・どちらのチームもボールをコントロールしていなかったかボールを与えられることになっていなかった\n       場合は、ジャンプボールシチュエーションになる。\n39-３-３ 全てのディスクォリファイングファウルは別添資料 B８ー３に基づきスコアシートに記入される。ファ\n      イティングの規定によるディスクォリファイングファウルは、チームファウルに数えない。\n39-３-４ 抗争が起こったときや起こりそうなときに、コート上にいたプレーヤーのファウルに対する罰則は全て\n      有効であり、第 42 条「特別な処置をする場合」に則り処置される。\n39-３-５ 抗争が起こったときや起こりそうなときに、ファーストアシスタントコーチ、交代要員、５個のファウル\n      を宣せられたチームメンバーやチーム関係者の失格退場に対するファウルの罰則は全て有効で\n      あり、38-３-４の６項目に則り処置される。\n\n第 ７章 総則                                          （GENERAL PROVISIONS）"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-1", "body": "40-１   審判により５個のファウルを宣せられたプレーヤーは速やかにコートから離れなければならない。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-2", "body": "40-２   プレーヤー兼ヘッドコーチがプレーヤーとして５個のファウルを宣せられた場合、プレーをすることはでき\n       ないが、ヘッドコーチの役割は継続できる。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-3", "body": "40-３   すでに５個のフ ァ ウ ル を宣せられているプレーヤーにさらにファウルが宣せられた場合、ヘッドコーチの\n       ファウルとしてスコアシートに「B」が記録される。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-4", "body": "40-４   2 個のテクニカルファウル、あるいは 2 個のアンスポーツマンライクファウル、もしくは 1 個のテクニカルフ\n       ァウルと 1 個のアンスポーツマンライクファウルを記録されたプレーヤーは、タイマーによってゲームディス\n       クォリフィケーション（GD）マーカーを示され、失格・退場となる。\n       【補足】国内大会ではアシスタントスコアラーがゲームディスクォリフィケーションマーカーを示す。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-5", "body": "40-５   自身のスポーツマンらしくない振 る 舞 い による 2 個のテクニカルファウル「C」、あるいは 3 個の「B」、\n       もしくは 2 個の「B」と 1 個の「C」が記録されたヘッドコーチは、タイマーによってゲームディスクォリフィ\n       ケーション（GD）マーカーを示され、失格・退場となる。\n       【補足】国内大会ではアシスタントスコアラーがゲームディスクォリフィケーションマーカーを示す。"}, {"type": "rule", "art_no": "40", "art_title": "プレーヤー/ヘッドコーチのファウルの上限と失格・退場", "sec_no": "40-6", "body": "40-６   失格・退場となったプレーヤー、交代要員、ヘッドコーチ、アシスタントコーチ、５個のファウルを宣せ\n       られたプレーヤー、その他チームベンチに座ることを許されたメンバーは、直ちにゲームを離れ（30 秒\n       以内）、ゲーム終了までチームの控室にとどまるか、または建物から出なければならない。"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則             （Team fouls：Penalty）", "sec_no": "41-1", "body": "41-１   定義\n41-１-１ チームファウルに数えるファウルとは、プレーヤーに記録されるパーソナルファウル、テクニカルファウ\n        ル、アンスポーツマンライクファウル、ディスクォリファイングファウルのことをいう。１チームに対してクォ\n        ーターごとに４個のチームファウルが記録された後は、チームファウルのペナルティシチュエーションになる。\n41-１-２ プレーのインターバル中に起こった全てのチームファウルは、次のクォーターあるいはオーバータイム\n        に起こったものとみなされる。\n41-１-３ 各オーバータイムに起こった全てのチームファウルは、第４クォーターに起こったものとみなされる。"}, {"type": "rule", "art_no": "41", "art_title": "チームファウル：罰則             （Team fouls：Penalty）", "sec_no": "41-2", "body": "41-２   ルール\n41-２-１ チームファウルのペナルティシチュエーションにあるチームのプレーヤーが、ショットの動作（アクトオブ\n        シューティング）中ではない相手チームのプレーヤーにパーソナルファウルをしたときは、罰則として\n        スローインではなく２本のフリースローが与えられる。このとき、ファウルをされたプレーヤーがフリース\n        ローシューターになる。\n41-２-２ ライブのボールをチームコントロールしている、あるいはボールを与えられることになっていたチームの\n        プレーヤーがパーソナルファウルをしたときは、チームファウルの罰則は適用されず、相手チームのス\n        ローインになる。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合               （Special situations）", "sec_no": "42-1", "body": "42-１   定義\n       規則の違反（ファウルやバイオレーション）の後でゲームクロックが止められている間に、新たに別の\n       事象が起きてファウルやバイオレーションが宣せられたり、ゲームクロックが止められる前に起きていた\n       事象に対してファウルやバイオレーションが宣せられたりした場合は、特別な処置をする。"}, {"type": "rule", "art_no": "42", "art_title": "特別な処置をする場合               （Special situations）", "sec_no": "42-2", "body": "42-２   手順\n42-２-１ 全てのファウルと罰則は記録される。\n42-２-２ 全ての規則の違反（ファウルやバイオレーション）は起こった順序で処置される。\n42-２-３ 両チームに記録された全ての等しい罰則やダブルファウルの罰則は、起きた順序に従って相殺さ\n        れる。一度全ての罰則がスコアシートに記入されると、相殺した罰則は適用されない。\n42-２-４ テクニカルファウルが宣せられたときは、罰則の順序にとらわれることなく、さらにすでに行われてい\n        る罰則の途中であっても、それらに関わらず先にテクニカルファウルの罰則の処置を行う。\n        ファーストアシスタントコーチ、交代要員、5 個のファウルを宣せられたプレーヤー、チーム関係者\n        の失格・退場により、ヘッドコーチへのテクニカルファウルがスコアシートに記入された場合、その罰\n        則は先に適用されない。ファウルやバイオレーションが相殺されない限り、それらの罰則は起こった\n        順に適用される。\n42-２-５ 最後に適用される罰則の一部であるボールのポゼッションの権利のみ適用され、それ以外の罰\n        則にあるボールのポゼッションの権利は無効になる。\n42-２-６ 最初のフリースロー、もしくはスローインによって一度ボールがライブになった後は、それらの罰則は\n        残りの罰則との相殺の対象とはならない。\n        【補足】相殺した結果、残ったフリースローの１本目またはスローインのボールがライブになった後\n             で別のファウルがあったときは、一度ライブになったフリースローやスローインは相殺の対象\n             とならず、スローインは取り消される。\n             フリースローの場合は、残りのフリースローを終わらせてから別のファウルの処置をする。\n\n42-２-７ 全ての残りの罰則は、宣せられた順序で処置される。\n42-２-８ 両チームに記録された罰則が等しく、全て相殺された場合は、ゲームは次の方法で再開される。\n        最初の規則の違反（ファウルやバイオレーション）とほとんど同時に：\n        ・ゴール、あるいは最後のフリースローが成功してどちらかのチームに得点が認められた場合は、得\n        点をされたチームのエンドラインの任意の位置のアウトオブバウンズからのスローインでゲームを再\n        開する。\n         【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットの\n             ゴールを指す。\n        ・一方のチームがボールをコントロールしていたかボールを与えられることになっていた場合は、最\n        初の規則の違反（ファウルやバイオレーション）が起きた場所に最も近いアウトオブバウンズか\n        らのスローインのボールがそのチームに与えられる。\n        ・どちらのチームもボールをコントロールしておらずボールを与えられることになっていなかった場合\n        は、ジャンプボールシチュエーションになる。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー                     （Free throws）", "sec_no": "43-1", "body": "43-１   定義\n43-１-１ フリースローは、フリースローラインの後ろ、かつ半円の中から妨げられることなく１点を得ることが\n        できるように、プレーヤーに与えられる機会のことをいう。\n43-１-２ １個のファウルに対する罰則として与えられるフリースロー、あるいはフリースローとそれに続くスロー\n        インを、フリースローの「セット」という。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー                     （Free throws）", "sec_no": "43-2", "body": "43-２   ルール\n43-２-１ パーソナルファウル、アンスポーツマンライクファウル、体の触れ合いをともなうディスクォリファイングフ\n        ァウルが宣せられたとき、フリースローは次のように与えられる：\n        ・ファウルをされたプレーヤーがフリースローシューターになる。\n        ・ファウルをされたプレーヤーとの交代が請求されたときは、交代をする前にフリースローを打たなけ\n        ればならない。\n        ・ファウルをされたプレーヤーが、怪我、５個のファウルあるいは失格・退場によりゲームを離れな\n        ければならない場合は、そのプレーヤーと交代したプレーヤーがフリースローシューターになる。交\n        代できるプレーヤーがいない場合は、自チームのヘッドコーチが指定したプレーヤーがフリースロー\n        シューターになる。\n43-２-２ テクニカルファウルや体の触れ合いのないディスクォリファイングファウルが宣せられたときは、ファウル\n        をされたチームのヘッドコーチが指定するプレーヤーがフリースローシューターになる。\n\n43-２-３ フリースローシューターは：\n        ・フリースローラインの後ろ、かつ半円の中に立つ。\n        ・ボールが上からバスケットに入る、あるいはリングに触れるようにするために、どのような方法でフリ\n        ースローのショットを行ってもよい。\n        ・審判からボールを与えられたあと、５秒以内にボールを放たなければならない。\n        ・ボールがバスケットに入るかリングに触れるまでは、フリースローラインまたは制限区域内のフロア\n        に触れてはならない。\n        ・フリースローをするふりをして途中でわざとやめてはならない。\n43-２-４ フリースローのとき、リバウンドの位置を占めるプレーヤーは奥行き１m のそれぞれのスペースに交\n       互に位置する権利を有する。（図７参照）\n        これらのプレーヤーは、フリースローが行われている間、次のことをしてはならない：\n        ・自チームに認められていないリバウンドの位置に立つ。\n        ・ボールがフリースローシューターの手から離れる前に、制限区域やニュートラルゾーンに入ったりリ\n        バウンドの位置を離れたりする。\n        ・何らかの言動によってフリースローシューターの邪魔をする。\n\n\n\n\n                図７ フリースロー時のプレーヤーのポジション\n\n\n43-２-５ フリースローのときにリバウンドの位置を占めないプレーヤーは、フリースローが終わるまでフリースロ\n       ーラインの延長線上より後ろでスリーポイントラインの外側にいなければならない。\n43-２-６ あとにフリースローの「セット」が続く場合、あるいはフリースローの後スローインで再開することが決\n       められている場合は、フリースローシューター以外のプレーヤーは、フリースローラインの延長線上よ\n       り後ろでスリーポイントラインの外側にいなければならない。\n        43-２-３、43-２-４、43-２-５、43-２-６に違反することはバイオレーションである。"}, {"type": "rule", "art_no": "43", "art_title": "フリースロー                     （Free throws）", "sec_no": "43-3", "body": "43-３   罰則\n43-３-１ フリースローが成功し、フリースローシューターがバイオレーションを宣せられた場合、得点は認めら\n       れない。\n\nあとにフリースローが続く場合、あるいはファウルの罰則によりスローインのボールが与えられることに\n        なっていた場合を除き、フリースローラインの延長線上からのスローインのボールが相手チームに与\n        えられる。\n43-３-２ フリースローが成功し、フリースローシューター以外のプレーヤーがバイオレーションを宣せられた場合：\n        ・得点は認められる。\n        ・バイオレーションはなかったものとする。\n        最後のフリースローの場合は、フリースローシューターの相手チームによりエンドラインの任意の位\n        置からのスローインになる。\n43-３-３ フリースローが成功せず：\n        ・最後のフリースローで、フリースローシューターあるいはそのチームメイトがバイオレーションを宣せら\n        れた場合、それに続くスローインのボールが与えられることになっていた場合を除き、フリースロー\n        ラインの延長線上からのスローインのボールが相手チームに与えられる。\n        ・フリースローシューターの相手チームのプレーヤーがバイオレーションを宣せられた場合、フリースロ\n        ーシューターにやり直しのフリースローが与えられる。\n        ・最後のフリースローで両チームのプレーヤーがバイオレーションを宣せられた場合、ジャンプボールシ\n        チュエーションになる。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り                （Correctable errors）", "sec_no": "44-1", "body": "44-１   訂正のできる誤り - 基本的な手続き\n       【補足】誤りは、誤りそのものや誤りが起きた時機について、審判に確信がある場合にのみ訂正され\n          る。特にインスタントリプレーシステム（IRS）が導入されていないゲームにおいて、審判に\n          確信がない場合には誤りは訂正されない。\n44-１-１ 審判は訂正できる誤りに気がついたら、どちらのチームにも不利にならない限り速やかにゲームを\n        止めることができる。\n44-１-２ 誤りが起きたあと、それが認識されるまでに起きた宣せられたファウルや経過した競技時間、その\n        他起こった全てのことは有効である。\n44-１-３ 誤りを訂正した後は、誤りを訂正するために審判が止めた時点からゲームを再開する。ボール\n        は、誤りを訂正するためにゲームが止められた時点でボールの権利を有していたチームに与えられる。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り                （Correctable errors）", "sec_no": "44-2", "body": "44-２   訂正のできる誤り カテゴリー1 - 定義\n       以下の誤りをカテゴリー1 とし、規則が誤って適用された場合に、審判は訂正することができる。\n       ・与えてはいけないフリースローを与えたとき。\n       ・与えるべきフリースローを与えなかったとき。\n       ・審判による指定なく誤ったプレーヤーがフリースローを行ったと\n       ・審判が誤ったプレーヤーを指定してフリースローを行ったとき。\n\n・誤って得点を与えたり 、取り消したりしたとき。\n       ・誤ったプレーヤー、ヘッドコーチ、またはチームに対するファウルを伝達したとき。\n       ・スコアシートの記録に誤りが生じたとき：\n        −得点を誤って記録しなかった、あるいは誤って記録したとき。\n        −プレーヤー、ヘッドコーチ、またはチームに対するファウルを誤って記録しなかった、あるいは誤って\n         記録したとき。\n        −タイムアウトを誤って記録しなかった、あるいは誤ったチームに記録したとき。\n       ・ゲームクロックを正しくスタートまたはストップできなかったとき、あるいは誤った競技時間を設定して\n       しまったとき（機材の故障を含む）。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り                （Correctable errors）", "sec_no": "44-3", "body": "44-３   訂正のできる誤り カテゴリー1 - 基本的な手続き\n44-３-１ 誤りを訂正するには、審判、コミッショナー（同席している場合）、またはテーブルオフィシャルズ\n        が次のように誤りを特定しなければならない：\n        ・第４クォーターでゲームクロックが 2:00 あるいはそれ以下を示す前に誤りが起きた場合、その\n        誤りはゲームクロックが 2:00 あるいはそれ以下を示す前に訂正されなければならない。\n        ・第４クォーターでゲームクロックが 2:00 あるいはそれ以下を示す前に誤りが起き、ゲームクロッ\n        クが 2:00 を示して審判が初めてゲームを止めた場合、その誤りはボールが再びライブとなる前\n        に訂正されなければならない。\n        ・第４クォーターあるいはオーバータイムでゲームクロックが 2:00 あるいはそれ以下を示した後で\n        誤りが起きた場合、誤りが起きてから何らかの理由により最初に審判がゲームを止めたあと、ボ\n        ールがライブとなる前にその誤りは訂正されなければならない。\n44-３-２ これらの誤りはゲームの終了を知らせるゲームクロックのブザーが鳴り、ボールがデッドとなった後で\n        は訂正することはできない。ただし、誤りが、最後に審判が何らかの理由でゲームを止めたときか\n        らゲームの終了を知らせるゲームクロックのブザーが鳴るまでの間に起きた場合、この誤りはゲーム\n        終了後速やかに訂正され、チームはコートもしくはチームベンチエリアにとどまらなければならない。\n44-３-３ まだ訂正可能な誤りが認識されたあと：\n        ・誤りの訂正に関わるチームメンバーが正当に交代した後チームベンチにいる場合、そのチームメ\n        ンバーは誤りの訂正のためにコートに再び入らなければならず、その時点でそのチームメンバーは\n        プレーヤーとなる。\n        ・訂正が完了したとき、再び正当な交代の申し出がない限り、そのプレーヤーはゲームにとどまる\n        ことができる。正当な交代の申し出があった場合、プレーヤーはコートから離れることができる。\n        ・誤りの訂正に関わるチームメンバーが、5 個のファウルを宣せられている場合、失格・退場となっ\n        ている場合、負傷のためプレーできない場合、または特定できない場合、ヘッドコーチは誤りの\n        訂正に対応するチームメンバーを指定する。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り                （Correctable errors）", "sec_no": "44-4", "body": "44-４   訂正のできる誤り カテゴリー１- 特別な手続き\n44-４-１ 与えてはいけないフリースローを与えたとき：\n        誤って与えられたフリースローは取り消され、ゲームは次のように再開される：\n        ・誤りが起きたあと、ゲームクロックが動いていない場合、フリースローを取り消されたチームはフリー\n        スローラインの延長線上のアウトオブバウンズからスローインを与えられる。\n        ・誤りが起きたあと、ゲームクロックがすでに動いていた場合、ゲームは誤りの訂正のために止めら\n        れた場所に最も近いアウトオブバウンズから再開される。\n44-４-２ 与えるべきフリースローを与えていなかった場合：\n        ・誤りが起きたあと、ボールのコントロールが一度も変わっていない場合、誤りの訂正のあと、ゲーム\n        は通常の最後のフリースローの後と同様に再開される。\n        ・誤ってスローインが与えられたあと、そのチームが得点した場合、その誤りはなかったものとする。\n        ・ゲームクロックがすでに動いていて、ボールのコントロールが変わっていた場合、誤りの訂正のあ\n        と、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。\n44-４-３ 審判による指定なく誤ったプレーヤーがフリースローを行ったとき：\n        行われたフリースローとともに、もし罰則の一部としてボールのポゼッションがあればそのポゼッション\n        も取り消される。ゲームが再開されてこの誤りの訂正のために止められた場合を除いて、フリース\n        ローラインの延長線上のアウトオブバウンズから相手チームにスローインが与えられる。ゲームが再\n        開されてこの誤りの訂正のために止められた場合、ゲームは誤りの訂正のために止められた場所\n        に最も近いアウトオブバウンズから再開される。\n44-４-４ 審判が誤ったプレーヤーを指定してフリースローを行ったとき：\n        行われたフリースローは取り消され、正しいプレーヤーが代わりのフリースローを行う。ゲームが再\n        開されてこの誤りの訂正のために止められた場合を除いて、ゲームは通常の最後のフリースロー\n        の後と同様に再開される。ゲームが再開されてこの誤りの訂正のために止められた場合、ゲーム\n        は誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。\n44-４-５ 誤って得点を与えたり 、取り消したりしたとき：\n        得点は訂正され、スコアシートも訂正される。ゲームは誤りの訂正のために止められた場所に最\n        も近いアウトオブバウンズから再開される。\n44-４-６ 誤ったプレーヤー、ヘッドコーチ、またはチームに対するファウルを伝達したとき：\n        スコアシートは訂正される。誤って 5 個のファウルを宣せられたプレーヤーまたは失格・退場となっ\n        たプレーヤーやヘッドコーチは再びゲームに参加できる。本来 5 個のファウルを宣せられるべきであ\n        ったプレーヤーは失格となり、本来失格・退場となるべきであったプレーヤーやヘッドコーチは失\n        格・退場となる。\n\n44-４-７ スコアシートの記録に誤りが生じたとき\n        ・得点を誤って記録しなかった、あるいは誤って記録したとき、\n        ・プレーヤー、ヘッドコーチ、またはチームに対するファウルを誤って記録しなかった、あるいは誤って\n        記録したとき、\n        ・タイムアウトを誤って記録しなかった、あるいは誤ったチームに記録したとき、\n        スコアシートは訂正され、ゲームからの失格・退場や再参加といった訂正の結果に基づく処置が\n        適用される。\n44-４-８ ゲームクロックを正しくスタートまたはストップできなかったとき、あるいは誤った競技時間を設定し\n        てしまったとき（機材の故障を含む）：\n        ゲームクロックは、誤りを訂正するために必要な時間を増やしたり、減らしたりすることで訂正される。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り                （Correctable errors）", "sec_no": "44-5", "body": "44-５   訂正のできる誤り カテゴリー2 - 定義\n       以下の誤りをカテゴリー2 とし、規則が誤って適用された場合に審判は訂正することができる。\n       機材の故障を含むショットクロックを正しくスタートまたはストップできなかった誤りや誤った秒数を設\n       定してしまった誤り。"}, {"type": "rule", "art_no": "44", "art_title": "訂正のできる誤り                （Correctable errors）", "sec_no": "44-6", "body": "44-６   訂正のできる誤り カテゴリー2 - 基本的な手続き\n44-６-１ 誤りを訂正するには、審判、コミッショナー（同席している場合）、またはテーブルオフィシャルズ\n        が誤りを特定しなければならない：\n        ・誤りが起きた直後、ボールがライブで誤りの訂正のために審判がゲームを止めたとき、あるいは\n        ・審判が何らかの理由で最初にゲームを止め、誤りが起きたときにボールをコントロールしていた、\n        もしくはコントロールが与えられることになっていたチームが引き続きボールをコントロールしてい\n        る、もしくはコントロールが与えられることになっているとき。\n        ショットクロックは正しい時間に訂正される。\n44-６-２ 次の状況のあと、ショットクロックは訂正することはできない：\n        ・誤りのあと、ライブのボールのコントロールが変わった。\n        ・ボールをコントロールしているチームが得点した。\n        ・ゲームの終了を知らせるゲームクロックのブザーが鳴り、ボールがデッドになった。\n\n第 ８章 コミッショナー：任務と権限\n     審判、テーブルオフィシャルズ、\n                  （OFFICIALS, TABLE OFFICIALS, COMMISSIONER：DUTIES AND POWERS）"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-1", "body": "45-１   審判は、クルーチーフ１人と１人または２人のアンパイアで構成される。その２人または３人を、テ\n       ーブルオフィシャルズとコミッショナー（同席している場合）が、サポートする。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-2", "body": "45-２   テーブルオフィシャルズは、スコアラー、アシスタントスコアラー、タイマーおよびショットクロックオペレータ\n       ー各１人とする。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-3", "body": "45-３   コミッショナー（同席している場合）は、スコアラーとタイマーの間に座る。\n       コミッショナーのゲーム中の主な任務は、テーブルオフィシャルズの仕事を監督し、クルーチーフとアン\n       パイアがゲームを円滑に進行できるようにサポートすることである。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-4", "body": "45-４   審判は、コート上のどちらのチームに対してもあらゆる面で中立であることが求められる。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-5", "body": "45-５   審判、テーブルオフィシャルズ、コミッショナー（同席している場合）は、競技規則に則りゲームを行\n       わなければならず、それらを変える権限を持たない。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-6", "body": "45-６   審判のユニフォームは、審判用のシャツ、黒色の長ズボン、黒色のソックスおよび黒色のシューズとする。\n       【補足】国内大会においては、\n           ①   原則夏季のゲームに限り、（公財）日本バスケットボール協会公認の「セカンドユニ\n               フォーム上下」の着用を可とする。\n           ②   原則都道府県大会ベスト１６以上の公式大会については、従来の（公財）日本\n               バスケットボール協会公認ユニフォームを着用する。\n          ③「セカンドユニフォーム」着用の場合は上下ともセカンドユニフォームとし、審判クルーで同\n            じユニフォームを着用する。\n           ④「セカンドユニフォーム」着用の際のソックスは黒色とする。\n           ただし、上記①～④について大会主催者の考えにより変更することができる。"}, {"type": "rule", "art_no": "45", "art_title": "審判、テーブルオフィシャルズ、コミッショナー", "sec_no": "45-7", "body": "45-７   審判とテーブルオフィシャルズは、それぞれ服装を統一すること。\n       【補足】国内の対応においては、テーブルオフィシャルズの服装に限り大会主催者の考えにより決定する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-1", "body": "46-１    ゲーム中に使用される全ての用具・器具を点検し、承認する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-2", "body": "46-２    公式のゲームクロック、ショットクロック、ストップウォッチを指定し、テーブルオフィシャルズを確認する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-3", "body": "46-３    ホームチームが用意した２つの使用済みボールから試合球を選ぶ。どちらも試合球として不適当な\n        場合は、可能な限り質のよいボールを選ぶことができる。\n        【補足】国内大会においては大会主催者の考えによって決定する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-4", "body": "46-４    他のプレーヤーに怪我をさせる可能性があると思われるものの着用を禁ずる。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-5", "body": "46-５    第１クォーターを始めるためにセンターサークルでジャンプボールを行う。また、それ以外のクォーター\n        やオーバータイムを始めるためにスローインのボールをプレーヤーに与える。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-6", "body": "46-６    状況に応じてゲームを中断する権限を持つ。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-7", "body": "46-７    ゲームを没収する権限を持つ。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-8", "body": "46-８    ゲーム終了後あるいは必要と思われるときにはいつでも、スコアシートを綿密に点検する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-9", "body": "46-９    ゲーム終了後にスコアシートを承認しサインをする。クルーチーフがスコアシートを承認しサインをした\n        ときに、審判とゲームの関係が終了する。\n        審判が判定を下す権限は、ゲーム開始予定時刻の 20 分前にコートに出たときから始まり、クルー\n        チーフがゲームの終了を知らせるゲームクロックのブザーを承認したときに終わる。\n        【補足】20 分前：国内大会においては、大会主催者の考えによって決定する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-10", "body": "46-10   控室でスコアシートにサインをする前に、スコアシートの裏面に以下の項目を記載する：\n        ・没収ゲーム、ディスクォリファイングファウル。\n        ・ゲーム開始予定時刻の 20 分以上前、またはゲーム終了後からスコアシートを承認しサインする\n        までの間の時間帯に発生した、チームメンバー、ヘッドコーチ、アシスタントコーチやチーム関係者に\n        よる、スポーツマンらしくない行為の有無。\n        そのような場合、クルーチーフ（同席していればコミッショナー）は、大会主催者宛てに報告しなけ\n        ればならない。\n        【補足】20 分以上前：国内大会においては大会主催者の考えによって決定する。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-11", "body": "46-11   審判の意見が一致しないときなど必要なときは、最終的な決定を下す。\n        そのために、アンパイア、コミッショナー（同席している場合）あるいはテーブルオフィシャルズに意見\n        を求めてもよい。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-12", "body": "46-12   インスタントリプレーシステム（IRS）が使用されるゲームについては、別添資料 F を参照すること。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-13", "body": "46-13   第１クォーターおよび第３クォーターが始まる３分前と１分 30 秒前であることをタイマーから知らさ\n        れたあと、クルーチーフは笛を吹く。また、第２クォーター、第４クォーターおよびオーバータイムが始ま\n        る 30 秒前も同様に、笛を吹く。"}, {"type": "rule", "art_no": "46", "art_title": "クルーチーフ：任務と権限      （Crew chief：Duties and powers）", "sec_no": "46-14", "body": "46-14   競技規則に示されていないあらゆる事項に決定を下す権限を持つ。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限           （Officials：Duties and powers）", "sec_no": "47-1", "body": "47-１    審判は、スコアラーズテーブル、チームベンチ、およびそのラインのすぐ後ろのエリアに近いフロアの範\n        囲を含む、境界線の内外で起きた規則の違反（ファウルやバイオレーション）に対して判定を下す\n        権限を持つ。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限           （Officials：Duties and powers）", "sec_no": "47-2", "body": "47-２    規則の違反（ファウルやバイオレーション）が起こったとき、各クォーターまたはオーバータイムが終了\n        したとき、あるいはその他必要と思われるときにゲームを止める場合は、審判は笛を鳴らす。ゴール\n        やフリースローが成功した後あるいはボールがライブになったときには、審判は笛を鳴らさない。\n        【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴー\n            ルを指す。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限           （Officials：Duties and powers）", "sec_no": "47-3", "body": "47-３    規則の違反（ファウルやバイオレーション）を判定するとき、審判は次の基本的な原則を考慮しな\n        ければならない。\n        ・ルールの精神と目的を理解し、公平にゲームを進行させる。\n        ・アドバンテージとディスアドバンテージを見極め、１ゲームをとおして相手のプレーを妨げた体の触れ\n        合いだけにファウルを宣する。触れ合いを起こしたプレーヤーが有利にもならず相手チームのプレー\n        ヤーも不利になっていないような偶然の体の触れ合いにファウルを宣して、不必要にゲームを止め\n        ることは避けなければならない。\n        ・プレーヤーの能力や態度、ゲームの流れなどに気を配り、１ゲームをとおしてそのゲームにふさわし\n        い判定を示す。\n        ・ゲームをとおして、ゲームのコントロール、ゲームの流れを考慮し、参加者それぞれの立場を感じと\n        り、ゲームに何が大切なのかを考えながら判定を示す。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限           （Officials：Duties and powers）", "sec_no": "47-4", "body": "47-４    どちらか一方のチームから抗議の申し立てがあった場合は、クルーチーフ（同席していればコミッショ\n        ナー）は、申し立ての理由を受理した後で、その件について大会主催者まで書面で報告をする。\n        【補足】国内の対応においては、大会主催者の考えによって決定する。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限           （Officials：Duties and powers）", "sec_no": "47-5", "body": "47-５    審判の１人が怪我またはその他の理由で審判を続けられなくなり、その後５分を経過してもその\n        審判が任務を遂行できない場合は、ゲームを再開する。\n\n怪我をした審判の代わりとなる審判がいない場合は、残りの審判だけでゲーム終了まで任務を遂\n       行する。\n       代わりの審判の起用については、コミッショナーが同席している場合はコミッショナーと協議したあと、\n       残りの審判が決定する。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限           （Officials：Duties and powers）", "sec_no": "47-6", "body": "47-６   国際ゲームにおいて、判定をより明確に伝える必要がある場合は、英語を使う。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限           （Officials：Duties and powers）", "sec_no": "47-7", "body": "47-７   審判はそれぞれ独自に判定を下す権限を持ち、互いに定められた任務の範囲内で他の審判が下\n       した判定に対しては、取り消したり異議を唱えたりする権限は持たない。"}, {"type": "rule", "art_no": "47", "art_title": "審判：任務と権限           （Officials：Duties and powers）", "sec_no": "47-8", "body": "47-８   競技規則に則った審判の判定や決定は、明確な判定がなされたかどうかにかかわらず抗議申し立\n       てが認められている状況（Ｃ-抗議の手続き：参照）を除き、最終的なものであり、異議を唱え\n       たり無視したりすることはできない。"}, {"type": "rule", "art_no": "48", "art_title": "スコアラー、アシスタントスコアラー：任務", "sec_no": "48-1", "body": "48-１   スコアラーは、スコアシートを用意して次のことを記録する：\n       ・ゲーム開始のときに出場するプレーヤーの氏名、番号、および交代要員全員の氏名、番号のチ\n       ーム情報。ゲーム開始のときに出場する５人のプレーヤー、交代要員あるいは番号が違っている\n       ときは、速やかに近くにいる審判に知らせなければならない。\n       ・成功したゴールとフリースローによる得点の合計。\n       【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴー\n              ルを指す。\n       ・各プレーヤーに宣せられたファウル。また、ヘッドコーチのファウルを記録し、ヘッドコーチが失格・退\n       場になる場合は速やかに審判に知らせる。同様に、同じプレーヤーに２個のテクニカルファウル、\n       ２個のアンスポーツマンライクファウル、あるいは１個のテクニカルファウルと１個のアンスポーツマン\n       ライクファウルが宣せられて失格・退場になる場合も速やかに審判に知らせる。\n       ・タイムアウト。チームからタイムアウトの請求があったときは、「タイムアウトが認められる時機」に審\n       判に知らせなければならない。また、前後半や各オーバータイムでそのチームにタイムアウトが残っ\n       ていない場合は、審判を通じてそのチームのコーチに知らせる。\n       ・オルタネイティングポゼッションアローを用いて次のオルタネイティングポゼッションを示す。後半からは\n       チームの攻撃するバスケットが変わるので、スコアラーは前半が終了したときに速やかにオルタネイテ\n       ィングポゼッションアローの向きを変えなければならない。\n       ・認められたヘッドコーチチャレンジ。ヘッドコーチが誤って 2 回目のチャレンジを請求したときは、速や\n       かに近くにいる審判に知らせなければならない。"}, {"type": "rule", "art_no": "48", "art_title": "スコアラー、アシスタントスコアラー：任務", "sec_no": "48-2", "body": "48-２   アシスタントスコアラーは、スコアボードを操作しスコアラーとタイマーをサポートする。スコアボードの表\n       示とスコアシートの記録に相違があり、解決することができない場合は、スコアシートを優先させ、そ\n       れにしたがってスコアボードを訂正する。"}, {"type": "rule", "art_no": "48", "art_title": "スコアラー、アシスタントスコアラー：任務", "sec_no": "48-3", "body": "48-３   スコアシートの記録に誤りが見つかった場合は、次のように処置をする：\n       ・記録の誤りがゲーム中に見つかった場合、タイマーは、ブザーを鳴らして審判に知らせる前に、次に\n       ボールがデッドになるのを待たなければならない。\n       【補足】国内大会においては、次にボールがデッドになったときにスコアラーがブザーを鳴らす。\n       ・スコアラーはクルーチーフと協議し、第 44 条「訂正のできる誤り」の範 囲 内 で 修正できる誤りは\n       修正しなくてはならない。\n       ・記 録 の 誤 り が第 44 条「訂正のできる誤り」で規定されている範囲内で発見されなかった場合、\n       その誤りは訂正することができない。クルーチーフあるいはコミッショナー（同席している場合）は、\n       その事実の詳細な報告を大会主催者に提出しなければならない。"}, {"type": "rule", "art_no": "49", "art_title": "タイマー：任務                   （Timer：Duties）", "sec_no": "49-1", "body": "49-１   タイマーは、ゲームクロックとストップウォッチを操作し、次の任務を行う：\n       ・競技時間、タイムアウト、プレーのインターバルの時間をはかる。\n       ・各クォーター、各オーバータイムの終了時を、ゲームクロックと連動した大きな音のブザーで知らせる。\n       ・ブザーが鳴らなかったり聞こえなかったりした場合は、何らかの方法で速やかに審判に知らせる。\n       ・各プレーヤーに宣せられたファウルの数を、両方のヘッドコーチに見えるように、表示器具を上げて示す。\n       【補足】国内大会においてはアシスタントスコアラーが行う。\n       ・プレーヤーまたはコーチが失格・退場になったときには、「ゲームディスクォリフィケーション・マーカー」\n       を示す。\n       【補足】国内大会においてはアシスタントスコアラーが行う。\n       ・いずれかのプレーヤーが 5 個のファウルを宣せられたとき、速やかに審判に知らせる。\n       【補足】国内大会においてはスコアラーが行う。\n       ・チームのベンチに最も近いスコアラーズテーブルの両側に配置されるチームファウルの表示器具を操作\n       する。チームファウルの表示器具はその時点でのチームファウルの数を表示する。またクォーター内\n       で 4 個目のチームファウルが発生し、ボールが再びライブになった後で、完全に赤く表示し、チーム\n       ファウルの数は表示しない。\n       【補足】国内大会においてはアシスタントスコアラーが行う。\n       ・交代の合図をする。\n       【補足】国内大会においてはスコアラーが行う。\n       ・タイムアウトの合図をする。チームがタイムアウトを請求しているとき、タイムアウトが認められる時機\n\nであることを審判に知らせなければならない。\n       【補足】国内大会においてはスコアラーが行う。\n       ・ブザーは、ボールがデッドになり再びボールがライブになる前までに鳴らす。タイマーのブザーはゲーム\n       クロックやゲームを止めるものではなく、ボールをデッドにするものでもない。\n       【補足】国内大会においてはスコアラーが行う。スコアラーのブザーもゲームクロックやゲームを止め\n           るものではなく、ボールをデッドにするものでもない。"}, {"type": "rule", "art_no": "49", "art_title": "タイマー：任務                   （Timer：Duties）", "sec_no": "49-2", "body": "49-２   タイマーは、次のように競技時間をはかる：\n       ・次の瞬間にゲームクロックを動かし始める。\n        −ジャンプボールの場合、正当にジャンパーがボールをタップしたとき。\n        −最後のフリースローが成功せず、引き続きボールがライブの場合、ボールがコート上のプレーヤー\n          に触れたとき。\n        −スローインの場合、コート上のプレーヤーがスローインされたボールに正当に触れたとき。\n       ・次の瞬間にゲームクロックを止める。\n        −各クォーター、各オーバータイムの競技時間が終了し、ゲームクロックが自動で止まらなかったとき。\n        −ボールがライブで審判が笛を鳴らしたとき。\n        −タイムアウトを請求していたチームの相手チームがゴールで得点したとき。\n          【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショット\n              のゴールを指す。ゴールが成功したあと、得点されたチームがボールをライブにする前\n              にタイムアウトを請求したときも含まれる。\n        −第４クォーター、各オーバータイムの２:00 あるいはそれ以下を表示している場合、ゴールが\n          成功したとき。\n          【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショット\n              のゴールを指す。\n        −チームがボールをコントロールしている状態で、ショットクロックのブザーが鳴ったとき。\n        −チームがボールをコントロールしている状態で、ショットクロックのブ ザ ー が 鳴 り 、審判がバイオ\n          レーションを宣したとき。"}, {"type": "rule", "art_no": "49", "art_title": "タイマー：任務                   （Timer：Duties）", "sec_no": "49-3", "body": "49-３   タイマーは、次のようにタイムアウトの時間をはかる：\n       ・審判が笛を鳴らしてタイムアウトのシグナルを示したときにストップウォッチを動かし始める。\n       ・50 秒が経過したときに、ブザーを鳴らして審判に知らせる。\n       ・タイムアウトが終了したときに、ブザーを鳴らす。\n       【補足】60 秒が経過したとき。"}, {"type": "rule", "art_no": "49", "art_title": "タイマー：任務                   （Timer：Duties）", "sec_no": "49-4", "body": "49-４   タイマーは、次のようにプレーのインターバルの時間をはかる：\n       ・前のクォーター、前のオーバータイムの競技時間が終了したあと、速やかにプレーのインターバルの\n       時間をはかり始める。\n       【補足】クォーター終了後すぐにフリースローを行う場合は、プレーのインターバルの時間はそのフリー\n           スローが終わってからはかり始める。\n       ・第１クォーターおよび第３クォーターが始まる３分前と１分 30 秒前に審判に知らせる。\n       【補足】国内大会ではブザーを鳴らすことを推奨する。\n       ・第２クォーター、第４クォーター、各オーバータイムが始まる 30 秒前に、ブザーを鳴らす。\n       ・プレーのインターバルが終了したときに速やかにブザーを鳴らし、同時にインターバルの時間の計測\n       を終了する。\n       【補足】ゲームクロックを速やかに各クォーターの競技時間にセットする。"}, {"type": "rule", "art_no": "50", "art_title": "ショットクロックオペレーター：任務   （Shot clock operator: Duties）", "sec_no": "50-1", "body": "50-１   次のとき、ショットクロックを動かし始める、あるいは再開する：\n       ・コート上でどちらかのチームがライブのボールを新たにコントロールしたとき。その後相手チームのプレ\n       ーヤーがボールに触れても、引き続き同じチームのボールのコントロールが終わらない限り、ショット\n       クロックは止めないしリセットもしない。\n       【補足】新たにコントロールしたときは速やかにショットクロックをリセットし、改めて24秒をはかり始める。\n       ・スローインのときは、スローインされたボールがコート上のプレーヤーに正当に触れたとき。"}, {"type": "rule", "art_no": "50", "art_title": "ショットクロックオペレーター：任務   （Shot clock operator: Duties）", "sec_no": "50-2", "body": "50-２   次のことが起こった結果、それまでボールをコントロールしていたチームに引き続きスローインが与えら\n       れるときは、残り時間がはっきりと表示されている状態でショットクロックは止めるがリセットはしない：\n       ・ボールがアウトオブバウンズになったとき。\n       ・ボールをコントロールしているチームのプレーヤーの怪我で審判がゲームを止めたとき。\n       ・ボールをコントロールしているチームにテクニカルファウルが宣せられたとき。\n       ・ジャンプボールシチュエーションになったとき（ただし、ボールがリングとバックボードの間に挟まったとき\n        を除く）。\n       ・ダブルファウルが宣せられたとき。\n       ・両チームに等しい罰則の相殺があったとき。\n       【補足】特別な処置をする場合の規定やファイティングの規定を適用し、罰則を相殺したり取り消\n           したりしたときを指す。\n       ファウルやバイオレーションの結果、それまでボールをコントロールしていたチームに引き続きフロントコ\n\nートでスローインが与えられ、ショットクロックに 14 秒以上表示されている場合、残り時間がはっきり\n       と表示されている状態でショットクロックは止めるが、リセットはしない。"}, {"type": "rule", "art_no": "50", "art_title": "ショットクロックオペレーター：任務   （Shot clock operator: Duties）", "sec_no": "50-3", "body": "50-３   次のとき、ショットクロックを止めて 24 秒にリセットし、秒数を表示しない：\n       ・ボールが正当にバスケットに入ったとき。\n       ・ボールが相手チームのバスケットのリングに触れ相手チームがそのボールをコントロールしたとき。\n       ・次のことが起こった結果、チームのバックコートからスローインが与えられるとき。\n         −ファウルやバイオレーション（ボールがアウトオブバウンズになる場合は除く）。\n         −ジャンプボールシチュエーションで、それまでボールをコントロールしていないチームにボールが与\n          えられる。\n         −ボールをコントロールしていないチームに原因がありゲームが中断する。\n         −どちらのチームにも関係のない理由でゲームが中断する。ただし、相手チームが著しく不利に\n          なる場合を除く。\n          【補足】ゲームクロックが動いているときに、ショットクロックが誤ってリセットされてしまった場合も\n              含む。審判が相手チームにとって著しく不利になると判断した場合は、ショットクロック\n              はリセットしない。\n       ・フリースローを行うとき。"}, {"type": "rule", "art_no": "50", "art_title": "ショットクロックオペレーター：任務   （Shot clock operator: Duties）", "sec_no": "50-4", "body": "50-４   次のとき、ショットクロックははっきりと表示されている状態で 14 秒にリセットする：\n       ・次のことが起こった結果、それまでボールをコントロールしていたチームに引き続きフロントコートから\n       のスローインが与えられ、ショットクロックが表示している残りの秒数が 13 秒以下であるとき：\n         −ファウルやバイオレーション（ボールがアウトオブバウンズになる場合は除く）。\n         −ボールをコントロールしていないチームに原因がありゲームが中断する。\n         −どちらのチームにも関係のない理由でゲームが中断する。ただし、相手チームが著しく不利に\n          なる場合を除く。\n         【補足】ゲームクロックが動いているときにショットクロックが誤ってリセットされてしまった場合も含\n             む。審判が相手チームにとって著しく不利になると判断した場合は、ショットクロックはリ\n             セットしない。\n       ・次のことが起こった結果、それまでボールをコントロールしていなかったチームにフロントコートからの\n       スローインが与えられるとき。\n         −パーソナルファウルあるいはバイオレーション（ボールがアウトオブバウンズになる場合を含む）。\n         −ジャンプボールシチュエーション。\n       ・アンスポーツマンライクファウルやディスクォリファイングファウルの結果、フロントコートのスローインライ\n       ンからスローインが与えられるとき。\n       ・ボールがリングとバックボードの間に挟まったときを含めて、成功しなかったゴールや最後のフリースロ\n\nーのボール、あるいはパスのボールがリングに触れたあと、それまでボールをコントロールしていたチー\n       ムが再びボールのコントロールを得るとき。\n       【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴ\n           ールを指す。\n       ・第４クォーターや各オーバータイムでゲームクロックが２:00 あるいはそれ以下を表示しているとき\n       に、バックコートのアウトオブバンズからスローインが与えられたチームにタイムアウトが認められ、その\n       チームのヘッドコーチがフロントコートのスローインラインからゲームを再開することを決め、ショットクロ\n       ックが表示している残りの秒数が 14 秒以上であるとき。"}, {"type": "rule", "art_no": "50", "art_title": "ショットクロックオペレーター：任務   （Shot clock operator: Duties）", "sec_no": "50-5", "body": "50-５   ボールがデッドでゲームクロックが止められ、そのとき各クォーターやオーバータイムの残りが 14 秒未\n       満で、なおかつどちらかのチームにボールのコントロールが新たに始まるとき、ショットクロックの表示装\n       置の表示を切る。\n       ショットクロックのブザーは、チームがボールをコントロールしているときを除いて、ゲームクロックやゲー\n       ムを止めるものではないし、ボールをデッドにするものでもない。\n\n別添資料Ａ－審判のシグナル                 （OFFICIALS’ SIGNALS）\n――――――――――――――――――――――――――――――――――――――――――\nＡ１   図に示してあるシグナルだけが公式である。\n\nＡ２   スコアラーズテーブルにレポートするときには、声を使ってコミュニケーションをとることを強く勧める。\n     （国際ゲームでは英語を用いる）\n\nＡ３   テーブルオフィシャルズがこれらのシグナルによく慣れていることが大切である。\n\n\n                    図８ 審判のシグナル\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n図９ スコアシート\n\n別添資料Ｂ－スコアシート                   （THE SCORESHEET）\n――――――――――――――――――――――――――――――――――――――――――\nＢ１     図９に示されているスコアシートは（公財）日本バスケットボール協会の承認を得たものである。\n\nＢ２     スコアシートは、それぞれ色の異なる４枚の用紙（１枚のオリジナルと３枚のコピー）からなってい\n       る。オリジナルは白色で（公財）日本バスケットボール協会用である。第１のコピーは青色で大会\n       主催者用、第２のコピーはピンク色で勝ちチーム用、最後の（第３の）コピーは黄色で負けチー\n       ム用である。\n       注：１．スコアラーは、異なる２色のペンを使用し、１色（赤色）は第１クォーターおよび第３\n           クォーター用に、もう１色（青色または黒色）は第２クォーターおよび第４クォーター用\n           にする。オーバータイムは、青色または黒色のペンを使用する（第２クォーターおよび第\n           ４クォーターと同色）。\n           【補足】ゲーム開始前およびゲーム終了後に記入する各項目およびスコアシートの最上\n                段の各項目は、全て青色または黒色で記入する。\n         ２．スコアシートは電子入力で作成することもできる。\n\nＢ３     スコアラーは、ゲーム開始予定時刻の遅くとも 40 分前までに、次の項目を記入したスコアシート\n       を用意する：\n       【補足】国内大会においては、ゲームに出場することのできるチームのメンバーリストの提出時間は、\n          大会主催者の考えにより変更することができる。\nＢ３-１    スコアシート上部のスペースに両チームのチーム名を記入する。\n        チームＡはホームチームとするが、大会や中立地域での開催の場合は、プログラムで先に記載さ\n        れているチームをチームＡ、相手チームをチームＢとする。\nＢ３-２    次の事項も記入する：\n        ・大会名\n        ・ゲームナンバー\n        ・年月日、場所、開始時刻\n        ・クルーチーフとアンパイアの氏名および国籍\n        【補足】国内大会においては、事前に記載することが望ましい。ただし国籍の記載は不要とする。\n\n\n                       図 10 スコアシート上部\n\nＢ３-３     チームＡはスコアシートの上の枠を、チームＢは下の枠を使用する。\nＢ３-３-１    １列目に、スコアラーは、プレーヤーとヘッドコーチとファーストアシスタントコーチのライセンスナン\n          バー（最後の３桁）を記入する。トーナメントでは、ライセンスナンバーはそのチームが最初に\n          行うゲームのみ記される。\n          【補足】国内大会においては、大会主催者の考えによりライセンスナンバー（最後の３桁）\n              記載の有無、またトーナメントにおけるそのチームの２ゲーム目以降の記載について\n              変更することができる。\nＢ３-３-２    ２列目には、ヘッドコーチあるいはその他チーム代表者により提出されたプレーヤーリストを使\n          い、各プレーヤーの氏名をユニフォームの番号順に記入する。キャプテンには、氏名のすぐ横に\n          （CAP）と記載する。\nＢ３-３-３    チームに 18 人未満のプレーヤーしかいない場合は、最後に記載されたプレーヤーの下の行の\n          氏名、背番号、プレーヤーインの空白に線を引く。プレーヤーが 17 人未満の場合は、ファウル\n          の欄に達するところまでは水平の横線を引き、そこから斜めに下まで斜線を引く。\n          【補足】国内大会においては、ゲームに登録できるチームメンバーの人数は大会主催者の考\n              えにより変更することができる。\n\n\n                 図 11 スコアシートのチーム（ゲーム開始前）\n\n\n\n\nＢ３-４     各チームの下段のコーチの欄とアシスタントコーチの欄に、それぞれヘッドコーチ、ファーストアシスタ\n         ントコーチの氏名を記入する。\n         【補足】国際ゲームにおいては、各プレーヤー、ヘッドコーチ、ファーストアシスタントコーチの氏名は\n            大文字・ブロック体で姓・名の順で記入する。（例 MAYER,F.）\n\nＢ３-5    スコアシートの下段に、スコアラー、アシスタントスコアラー、タイマー、ショットクロックオペレーターの\n        氏名を記入する。\n        【補足】国内大会においてはゲーム前の氏名の記入は省略し、ゲーム後のサインのみ行う。\n\nＢ４     ゲーム開始予定時刻の遅くとも 10 分前までに、ヘッドコーチは次のことを行う：\nＢ４-１    記入されたチームメンバーの氏名・番号を確認する。\nＢ４-２    ヘッドコーチ、ファーストアシスタントコーチの氏名を確認する。ヘッドコーチとファーストアシスタント\n        コーチがいないときは、キャプテンがプレーヤー兼ヘッドコーチとしてコーチの役割を果たし、氏名の\n        後に（CAP）と記載される。\n\n\n\nＢ４-３    ゲームの最初に出場する 5 人のプレーヤーの、Player in 欄に小さい×印を記入する。\n        【補足】キャプテンがゲームの最初に出場しない場合は、コート上でキャプテンの役目をするプレー\n             ヤーの番号をスコアラーに伝える。\nＢ４-４    スコアシートにサインをする。\n        スコアシートの記載事項の確認とサインは、チームＡのヘッドコーチが先に行う。\n        【補足】国内大会においては、チームメンバーリストを確認・同意する時間は、大会主催者の考\n             えにより変更することができる。\n\nＢ５     スコアラーは、ゲーム開始時に、ゲームに最初に出場する両チームの５人のプレーヤーを確認した\n       のち Player in 欄の×印を○で囲む。\n       【補足】この○は赤色で記入する。\n\nＢ６     ゲーム中、交代要員がゲームに出場したときは、Player in 欄に×印を記入するが○では囲まない。\n\nＢ７     タイムアウト\nＢ７-１    認められたタイムアウトは、スコアシート上のチーム名の下にある所定の欄（前半は H1 の横、\n        後半は H2 の横、オーバータイムは OT の横）に、タイムアウトが認められた時点での各クォータ\n        ーまたはオーバータイムの経過時間（分）を数字で記入する。\nＢ７-２    各ハーフ、各オーバータイムに使用しなかった枠には２本の横線を引く。第４クォーターでゲーム\n        クロックが残り２:00 を表示する前に、チームに後半の最初のタイムアウトが認められなかったとき\n        は、そのチームの後半の最初の枠（後半の左端の枠）に２本の横線を引く。\n        【補足】例えば、「残り３分 12 秒」のときには「７」、「残り０分 45 秒」のときには「10」と記入\n             する。それぞれの数字は、各クォーターで使用している色で記入する。すなわち、第１ク\n             ォーターと第３クォーターは赤色、第２クォーターと第４クォーターおよび各オーバータイム\n             は青色または黒色で記入する。\n\n図 12 スコアシートのチーム（ゲーム終了後）\n\n\n\n\nＢ８     ファウル\nＢ８-１     プレーヤーのファウルには、パーソナル、テクニカル、アンスポーツマンライク、ディスクォリファイングの\n         ファウルがあり、その該当するプレーヤーに記入する。\n         【補足】それぞれのファウルの枠に左から順に記入する。\nＢ８-２     ヘッドコーチ、ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバ\n         ー、チーム関係者のファウルには、テクニカルとディスクォリファイングがあり、そのチームのヘッドコー\n         チに対して記入される。さらに、スコアシートに氏名が記入された人によるファイティングが起きたと\n         きのディスクォリファイングファウルは、これらの人に記入される。\n         【補足】それぞれヘッドコーチの枠に左から順に記録する。ただし、プレーのインターバル中のチー\n              ムメンバーのファウルについては、それぞれのチームメンバー（プレーヤー、交代要員）の\n              ファウルの枠に記入する。\nＢ８-３     ファウルは、次のように記入する。\nＢ８-３-１    パーソナルファウルは「P」と記入する。\nＢ８-３-２    プレーヤーのテクニカルファウルは「T」と記入する。\n          ２個目のテクニカルファウルが記録されてそのプレーヤーが失格・退場となった場合は、すぐ隣\n          の枠に「GD」を記入する。\n          【補足】そのテクニカルファウルがそのプレーヤーの５個目のファウルだった場合は、最後の枠の\n               隣（欄外）に「GD」を記入する。\n\nＢ８-３-３   ヘッドコーチ自身のスポーツマンらしくない振る舞いに対して宣せられるテクニカルファウルは「C」\n         と記入する。同様の２個目のテクニカルファウルは「C」を記入し、すぐ隣の枠に「GD」を記入\n         する。\nＢ８-３-４   それ以外の理由でヘッドコーチに記録されるテクニカルファウルは「B」と記入する。３個目のテ\n         クニカルファウル（そのうちの１個は「C」でも可）は「B」または「C」と記入し、最後の枠の隣\n         （欄外）に「GD」を記入する。\n         【補足】ヘッドコーチに記録されるテクニカルファウル、ディスクォリファイングファウルは、チームファ\n               ウルに数えない。\nＢ８-３-５   アンスポーツマンライクファウルは「U」と記入する。\n         ２個目のアンスポーツマンライクファウルが記録された場合は、すぐ隣の枠に「GD」を記入する。\nＢ８-３-６   すでにアンスポーツマンライクファウルを記録されたプレーヤーがテクニカルファウルを宣せられた\n         場合、またはすでにテクニカルファウルを記録されたプレーヤーがアンスポーツマンライクファウルを\n         宣せられた場合も同様に、「U」もしくは「T」を記入し、すぐ隣の枠に「GD」を記入する。\nＢ８-３-７   プレーヤー兼ヘッドコーチは以下のときに失格・退場となる：\n         ・コーチとしてテクニカルファウル（C）とプレーヤーとしてのアンスポーツマンライクファウルまたは\n         テクニカルファウルが宣せられる。\n         ・コーチとしてテクニカルファウル（B）とコーチとしてテクニカルファウル（C）とプレーヤーとして\n         のアンスポーツマンライクファウルまたはテクニカルファウルが宣せられる。\n         ・コーチとして２個のテクニカルファウル（B）とプレーヤーとしてのアンスポーツマンライクファウル\n         またはテクニカルファウルが宣せられる。\n         最後のテクニカルファウルまたはアンスポーツマンライクファウルが記録されたすぐ隣の枠に「GD」\n         を記入する。\nＢ８-３-８   ディスクォリファイングファウルは「D」と記入する。\nＢ８-３-９   フリースローが与えられるファウルは、P、T、C、B、U、D の後ろにそれぞれのフリースローの数\n         （１、２、３）を小さくつける。\nＢ８-３-10 両チームに科される罰則の重さが等しくて第 42 条「特別な処置をする場合」に従って罰則の\n         適用が相殺され、それぞれのフリースローが与えられなくなったファウルは、P、T、C、B、U、D\n         の後ろに小さい c をつける。\nＢ８-３-11 ファイティングが起きたときにチームベンチエリアを離れたことを含む、ファーストアシスタントコー\n         チ、交代要員、５個のファウルを宣せられたチームメンバー、チーム関係者に宣せられたディス\n         クォリファイングファウルは、ヘッドコーチのテクニカルファウル「B2」として記入する。\nＢ８-３-12 ファイティングが起きたときに失格・退場を宣せられたヘッドコーチ、ファーストアシスタントコー\n         チ、交代要員、５個のファウルを宣せられたチームメンバーは、「D2」または「D」と記入し、残り\n         の全ての枠に「F」と記入する。\n\nＢ８-３-13 ヘッドコーチ、ファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチーム\n       メンバー、チーム関係者のディスクォリファイングファウルの例：\n       ヘッドコーチに宣せられたディスクォリファイングファウルは、次のように記入する：\n\n\n\n\n       ファーストアシスタントコーチに宣せられたディスクォリファイングファウルは、次のように記入する：\n\n\n\n\n       交代要員に宣せられたディスクォリファイングファウルは、次のように記入する：\n\n\n\n\n       そして\n\n\n\n\n       すでに５個のファウルを宣せられていたチームメンバーに宣せられたディスクォリファイングファウル\n       は、次のように記入する：\n\n\n\n       そして\n\n\n\n\n       チーム関係者に宣せられたディスクォリファイングファウルは、次のように記入する：\n\n\n\n\nＢ８-３-14 ヘッドコーチ、ファーストアシスタントコーチ、交代要員、5 個のファウルを宣せられたチームメ\n       ンバー、チーム関係者の、ファイティングが起きたときにチームベンチエリアを離れたことによ\n       るディスクォリファイングファウルの例：\n       チームベンチから離れて失格・退場となった人数にかかわらず、ヘッドコーチに 1 個のテクニカル\n       ファウル「B2」または「D2」が宣せられる。\n       ヘッドコーチとファーストアシスタントコーチに宣せられたディスクォリファイングファウルは、次のよ\n       うに記入する：\n\nヘッドコーチだけが失格・退場を宣せられた場合：\n\n\n\n\nファーストアシスタントコーチだけが失格・退場を宣せられた場合：\n\n\n\n\nヘッドコーチとファーストアシスタントコーチの両者が失格・退場を宣せられた場合：\n\n\n\n\n交代要員に宣せられたディスクォリファイングファウルは、次のように記入する：\n交代要員のファウルが 4 個より少ない場合は、「D」を記入し、残りの全ての枠に「F」を記入\nする：\n\n\n\nそして\n\n\n\n\nそのファウルがその交代要員の 5 個目のファウルだった場合は、「D」を記入し、最後の枠の隣\n（欄外）に「F」を記入する：\n\n\n\nそして\n\n\n\n\n５個のファウルを宣せられたチームメンバーに宣せられたディスクォリファイングファウルは、次の\nように記入する：\n５個のファウルを宣せられたチームメンバーはファウルの枠がないので、その場合は最後の枠の\n隣（欄外）に「D」を記入し、続けて「F」を記入する：\n\n\n\nそして\n\nチーム関係者のディスクォリファイングファウルはヘッドコーチに宣せられ、次のように記入する：\n\n\n\n\n       チーム関係者の失格・退場はヘッドコーチに宣せられ、B と記入されるが、ヘッドコーチ自身の\n       失格・退場の 3 個のテクニカルファウルには数えない。\nＢ８-３-15 ヘッドコーチ、ファーストアシスタントコーチ、交代要員、5 個のファウルを宣せられたチームメ\n       ンバー、チーム関係者の、ファイティングに積極的に関与したことによるディスクォリファイン\n       グファウルの例：\n       チームベンチから離れて失格・退場となった人数にかかわらず、ヘッドコーチに 1 個のテクニカル\n       ファウル「B2」または「D2」が宣せられる。\n       ヘッドコーチが暴力行為に積極的に関与した場合、ヘッドコーチに 1 個のディスクォリファイング\n       ファウル「D2」のみが宣せられる。\n       ヘッドコーチとファーストアシスタントコーチに宣せられたディスクォリファイングファウルは、次の\n       ように記入する：\n       ヘッドコーチだけが失格・退場を宣せられた場合：\n\n\n\n\n       ファーストアシスタントコーチだけが失格・退場を宣せられた場合：\n\n\n\n\n       ヘッドコーチとファーストアシスタントコーチの両者が失格・退場を宣せられた場合：\n\n\n\n\n       交代要員に宣せられたディスクォリファイングファウルは、次のように記入する：\n       交代要員のファウルが４個より少ない場合は、「D2」を記入し、残りの全ての枠に「F」を記入\n       する：\n\n\n\n       そして\n\n\n\n\n       そのファウルがその交代要員の５個目のファウルだった場合は、「D2」を記入し、最後の枠の隣\n       （欄外）に「F」を記入する：\n\nそして\n\n\n\n\n         ５個のファウルを宣せられたチームメンバーに宣せられたディスクォリファイングファウルは、次の\n         ように記入する：\n         ５個のファウルを宣せられたチームメンバーはファウルの枠がないので、その場合は最後の枠の\n         隣（欄外）に「D2」を記入し、続けて「F」を記入する：\n\n\n\n\n         そして\n\n\n\n\n         チーム関係者のディスクォリファイングファウルはヘッドコーチに宣せられ、次のように記入する：\n\n\n\n\n         チーム関係者 2 人のディスクォリファイングファウルはヘッドコーチに宣せられ、次にように記入する：\n\n\n\n\n         チーム関係者の失格・退場はヘッドコーチに宣せられ、B2 と記入されるが、ヘッドコーチ自身の\n         失格・退場の 3 個のテクニカルファウルには数えない。\n         注：第 39 条「ファイティング」によるテクニカルファウルやディスクォリファイングファウルは、チーム\n            ファウルに数えない。\nＢ８-4    第 2 クォーターの終わりに、スコアラーはプレーヤーとコーチのファウル欄のすでに使用した枠と未使\n        用の枠の間に太線を引く。\n        ゲームの終わりに、ファウルの欄で使用しなかった枠に太く横線を引く。\n        【補足】この横線は青色または黒色で記入する。\n\nＢ９     チームファウル\nＢ９-１    各クォーター（Q1、Q２、Q３、Q４）のチームファウルを記録するために、スコアシート上（チ\n        ーム名の下でプレーヤーの氏名の上）に４つの枠がある。\nＢ９-２    プレーヤーがパーソナル、テクニカル、アンスポーツマンライク、ディスクォリファイングのいずれかのファ\n        ウルを宣せられたときは、１から４までの枠に順番に大きい×印を記入する。\n        【補足】プレーのインターバル中に宣せられたチームメンバーのファウルはチームファウルに数え、次\n            のクォーターに起こったものとして記録される。４つの枠が埋められた後は、第 41 条「チ\n\nームファウル：罰則」に従って罰則が適用される。\nＢ９-３     各クォーターの終わりに、ファウルの欄で使用しなかった枠に 2 本の横線を引く。\n\nＢ10     ランニングスコア\nＢ10-１    スコアラーは、両チームのそのときどきの合計得点（ランニングスコア）を記録する。\nＢ10-２    スコアシートには、ランニングスコア用に大きな４列の欄がある。\nＢ10-３    各欄はさらに４列からできている。左側の２列はチーム A に、右側の２列はチーム B に使用す\n         る。中央の２列は得点合計の数字で、各チーム 160 点まで記録できる。\n         スコアラーは：\n         ・まず、ゴールが成功したときは斜線（右利きは／、もしくは、左利きは＼）を、フリースローが成\n         功したときは塗りつぶした丸印（●）を、そのときどきのそのチームの該当する得点合計の欄に\n         記入していく。\n          【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴ\n             ールを指す。\n         ・次に、得点合計（／または＼または●）の隣の欄に得点したプレーヤーの番号を記入する。\n\nＢ11     ランニングスコア：そのほかの記入事項と注意点\nＢ11-１    ゴールで３点が認められたときは、得点したプレーヤーの番号を○で囲む。\n         【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴ\n            ールを指す。\nＢ11-２    誤って自チームのバスケットへ得点したゴールは、相手チームのそのときコート上にいるキャプテン\n         が得点したものとして記入する。\n         【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴ\n            ールを指す。\nＢ11-３    ボールがバスケットに入らなくても得点が認められたときは（第 31 条ゴールテンディング、インタフ\n         ェアレンス）、そのショットをしたプレーヤーの得点として記入する。\nＢ11-４    各クォーターやオーバータイムの終わりに、それぞれのチームの最後の得点を太い○で囲み、最後\n         の得点と得点したプレーヤーの番号のすぐ下に太く横線を一本引く。\nＢ11-５    各クォーターやオーバータイムが始まってからは、前のクォーターに続いて記録を継続する。\nＢ11-６    ゲーム中、スコアボードの得点とスコアシートのランニングスコアは常に照合しなければならない。\n         もしも相違がありスコアシートが正しいときは、速やかにスコアボードを訂正させる。\n         スコアシートに不審な箇所があったり、一方のチームから得点、ファウルやタイムアウトの数などに\n         ついての疑義の申し出があったりしたときは、ボールがデッドでゲームクロックが止められたときにクル\n         ーチーフに知らせなければならない。\n\nＢ11-７    審判、テーブルオフィシャルズは、得点、ファウルの数、タイムアウトの数に関するスコアシートの記\n         録の修正を行うことが規則で認められている。クルーチーフはその修正を確認しサインをする。修\n         正内容が長くなる場合は、スコアシート裏面に記述する。\n\n\n\n        図 13 ランニングスコアと             図 14 スコアシートの下部\n            その最終手続\n\n                             得点合計記入例：オーバータイムが行われなかった場合\n\n\n\n\n                               得点合計記入例：オーバータイムが行われた場合\n\n\n\n\n                     テーブルオフィシャルズと審判のサイン\n\nＢ12     ランニングスコア：最終手続き\nＢ12-１    各クォーター、最後のオーバータイムが終わったとき、両チームのそのクォーターと全てのオーバータイ\n         ムの得点をスコアシートの下段の「スコア」の欄に記入する。\n         【補足】得点は各クォーターで使用したペンで記入する。また、オーバータイムが何回行われても、\n             オーバータイムの得点は 1 行に合計して記入する。\nＢ12-２    ゲーム終了後、速やかに終了時刻を記入する。\nＢ12-３    ゲームが終わったときは、最後の得点と得点したプレーヤーの番号のすぐ下に太く横線を２本引く。\n         各チームで使用しなかったその列のランニングスコアの欄に、左上から右下に向かって斜線を引く。\nＢ12-４    ゲームが終わったときは、両チームの最終得点合計を「最終スコア」の欄に記入し、勝ったチーム\n         のチーム名を「勝者チーム」の欄に記入する。\nＢ12-５    テーブルオフィシャルズは全員スコアシートの氏名の欄にサインをする。\nＢ12-６    アンパイアがサインをしたあと、クルーチーフが最後にスコアシートを点検・承認しサインをする。この\n         行為をもって、そのゲームに対する審判、テーブルオフィシャルズの管理権限と関係が終了する。\n\nＢ13     ヘッドコーチチャレンジ\nＢ13-１    インスタントリプレーシステムが使用されるゲームでは、それぞれのチームは一度だけヘッドコーチチ\n         ャレンジ（HCC）を認められる。HCC が認められた場合、スコアシート上のチーム名の下の\n         HCC の横の枠に記入する。スコアラーは、左側の枠にクォーターもしくはオーバータイム（Q１、\n         Q２、Q３、Q４、OT）を記入し、右側の枠には HCC が認められた時点での各クォーターまた\n         はオーバータイムの経過時間（分）を数字で記入する。\nＢ13-２    ゲーム終了後、スコアラーは使われなかったヘッドコーチチャレンジの枠を二重線で消す。\n\n\n別添資料 C－抗議の手続き                （PROTEST PROCEDURE）\n――――――――――――――――――――――――――――――――――――――――――\n【補足】本項を国内大会において採用しない。ただし、各種条件を満たし適切に抗議の対応を実施できる\n      場合は、（公財）日本バスケットボール協会の承認により採用することができる。\n\nC１    チームは、以下の点について不利益を受けた場合は抗議を申し立てることができる。\n      ａ）審判によって訂正されなかったスコア、ゲームクロックの管理、ショットクロックの操作での誤りのう\n         ち、第 44 条に基づく誤りの訂正ができる客観的証拠があり、事象がおきた時点で審判が認\n         識できた状況にも関わらず行わなかったもの。\n      ｂ）ゲームの没収、中止、延期、再開もしくはプレーをしないことについての決定。\n      ｃ）適用される出場資格に対する違反。\n\nＣ２    抗議が受理されるためには、以下の手順に従わなければならない：\n      ａ）ゲーム終了後 15 分以内に、そのチームのキャプテンは、そのチームがゲーム結果に対して抗議\n\nを行うことをクルーチーフに知らせ、スコアシートの「Captain's signature in case of\n        protest」欄にサインをしなければならない。\n     ｂ）ゲーム終了後１時間以内に、そのチームは抗議の理由を文書にてクルーチーフに提出しなけ\n        ればならない。\n     ｃ）１件の抗議に対し保証金として 1,500 スイスフランを添えなければならず、抗議が棄却された\n        場合はそれを支払わなければならない。\n\nＣ３   クルーチーフあるいはコミッショナー（同席している場合）は抗議の理由を受け取ったあと、抗議に至\n     った事象を FIBA の代表者（大会主催者）もしくは裁定機関（裁定委員会等）に文書で提出\n     しなければならない。また、クルーチーフあるいはコミッショナー（同席している場合）は抗議の理由\n     を受け取った時刻について書面にて記録しなければならない。\n\nＣ４   裁定機関は必要な手続き上の要求を行い、ゲーム終了後 24 時間以内に速やかにその抗議に関\n     する決定を下す。裁定機関はあらゆる確かな証拠に基づいて、一部あるいはフルゲームの再試合の\n     実施を含め、適切な決定を下すことができる。裁定機関は、抗議の対象となった誤りに限らず、ゲー\n     ムの結果が確実に変わるという明らかで決定的な証拠が存在しない限りゲームの結果を変える決\n     定はできない。\n\nＣ５   裁定機関の決定は現場での決定とみなされ、その後の再審査や抗議は受け付けない。例外とし\n     て、出場資格に関する決定は規定に則り抗議することができる。\n\nＣ６   FIBA の大会や別途定めのないその他の大会での特別な規定:\n     ａ）トーナメント形式の大会では、全ての抗議の管轄機関はテクニカルコミッティー（技術委員\n        会）とする（FIBA Internal Regurations, Book ２参照）。\n        【補足】国内大会においては、大会主催者が設置した機関とする。\n     ｂ）ホーム&アウェーの大会では、出場資格に関する抗議の裁定機関は FIBA Disciplinary\n        Panel（FIBA 懲罰委員会）とする。その他の抗議に関する裁定機関は FIBA とし、競技規\n        則 の 遂 行 と 解 釈 に 関 す る 専 門 知 識 を 有 す る １ 名 以 上 が 担 当 す る （ FIBA Internal\n        Regurations, Book ２参照）。\n        【補足】国内大会においては、大会主催者が設置した機関とする。\n\n\n別添資料 D－チームの順位決定方法         （CLASSIFICATION OF TEAMS）\n――――――――――――――――――――――――――――――――――――――――――\n【補足】以下、本項を国内大会において採用するか否かについては、大会主催者の考えにより変更・決定す\n     ることができる。\n\nＤ１     手順\nＤ１-１       チームの順位は勝敗記録によって決定されなければならない。各ゲームに勝ったチームに勝ち点\n       2、各ゲームに負けたチームに勝ち点 1（ゲームの途中終了を含む）、各ゲームの没収によって\n       負けたチームに勝ち点 0 が与えられる。\nＤ１-２       この手順は、総当たり方式の大会に適用される。\nＤ１-３       グループ内で、全ゲームの勝敗記録が２チーム以上で同じ場合、その２チーム以上のチーム間\n       での対戦成績によって順位を決定する。２チーム以上のチーム間での勝敗記録が同じ場合、\n       次の順序で更なる基準が適用される：\n            ・当該チームの対戦での得失点差の大きい方。\n            ・当該チームの対戦での得点数の大きい方。\n            ・グループ内の全ゲームでの得失点差の大きい方。\n            ・グループ内の全ゲームでの得点数の大きい方。\n           これらの基準を適用してもグループフェーズの終了時に最終決定に至らない場合は、各国の代\n           表チームの大会の最終順位は関連する FIBA ランキングによって決定される。FIBA ランキング\n           が存在しないその他の全ての大会では最終順位は抽選で決定される。\nＤ１-４       これらの基準の各段階で順位を決定していき、まだ順位決定されていない当該チーム間の対戦\n       成績でＤ１-３の手順を初めから繰り返すことで最終的な順位を決定する。\n\nＤ２     例\nＤ２-１\n\n\n\n\nＤ２-２\n\nＤ２-３\n\n\n\n\nＤ２-４\n\n\n\n\nＤ２-５\n\nＤ２-６\n\n\n\n\nＤ２-７\n\nＤ３     没収\nＤ３-１    正当な理由なく、予定されたゲームに現れなかったり、ゲームの終了前にコートから立ち去ったり\n        したチームは没収による負けとなり、勝ち点は 0 ポイントになる。\nＤ３-２    チームが２回目の没収となった場合には、このチームの対戦結果は全て無効になる。\nＤ３-３    チームがグループ内で行われた対戦で 2 回目の没収となり、各グループの上位チームが次のラウ\n        ンドに進む場合は、一方のグループ最下位チームの対戦成績は全て無効になる。\n       例\n       グループ A のチーム 4A は 2 回目の没収となったため、全てのゲームは無効になる。\n\n\n\n\nＤ４     グループ間の順位決定方法\nＤ４-１    複数のグループでの２位や３位のチームの中で最も上位のチームを決定するなど、グループ間で\n        チームの順位を決定するために、次の基準を適用する。\n       全てのグループの全てのチームが同じゲーム数を行なっている場合、各グループの同じ順位のチー\n       ムを１つのグループに編成し、次の基準が次の順序で適用される：\n        ・編成された最終グループの順位内で、行なった全てのゲームの勝敗記録が優れている方。\n        ・編成された最終グループの順位内で、全てのゲームの得失点差の大きい方。\n        ・編成された最終グループの順位内で、全てのゲームの得点数の大きい方。\n       ・これらの基準によっても順位が決定できない場合は、関連する FIBA ランキングによって最終順\n        位を決定する。\n\n各グループの２位のチームの中で最も上位のチームを決定する方法：\n\n\n\n\nＤ４-２   それぞれのグループの同じ順位のチームを１つのグループに編成したあと、これらのチームがそれぞ\n       れのグループで異なる数のゲームを行なっている場合、グループ内での最下位のチームのゲーム、\n       もしくは最もゲーム数の多いチームのグループが無効になる。この手順はゲーム数が全てのグルー\n       プで同じになるまで全てのグループで繰り返される。その場合、次の基準が適用される：\n       ・編成された最終グループの順位内で、行なった全てのゲームの勝敗記録が優れている方\n       ・編成された最終グループの順位内で、全てのゲームの得失点差の大きい方。\n       ・編成された最終グループの順位内で、全てのゲームの得点数の大きい方。\n       ・これらの基準によっても順位が決定できない場合は、関連する FIBA ランキングによって最終\n        順位を決定する。\n       注：\n       疑義を避けるための注として、上記のゲームの無効化はグループ間での順位決定の目的で行う\n       ものであり、特定のグループ内のチームの最初の順位を変更するものではない。\n\n       例：\n\n\n\n\n       各グループの３位のチームの中で最も上位のチームを決定するため、全ての３位チームを１つの\n       グループとして編成する：\n\n\n\n\n       しかしながら、３B と３A のチームは 5 ゲーム、３D と３C のチームは４ゲームを行なっている。\n\n全ての３位チームのゲーム数を 4 ゲームとするため、グループ A とグループ B の最下位のチームの\n        ゲームを無効とし、新たな表を編成する。\n        グループ A とグループ B のゲームの結果は以下の通りとなる：\n\n\n\n\n        ６A と６B のチームのゲームの無効化し、各グループの３位のチームの中で最も上位のチームを\n        決定するために編成されたグループの順位は以下の通りとなる：\n\n\n\n\nＤ５     大会中のフェーズでのチームの順位決定方法\nＤ５-１    グループでのゲームの結果があるフェーズから他のフェーズへ持ち越される大会で、チームが大会\n        から棄権となったり、あらゆる理由によって 2 回目の没収となったりすると、全ての関連するフェーズ\n        からそのチームの全てのゲームの結果が無効となる。その場合、次の基準が適用される：\n        ・編成された最終グループの順位内で、行った全てのゲームの勝敗記録が優れている方。\n        ・編成された最終グループの順位内で、全てのゲームの得失点差の大きい方。\n        ・編成された最終グループの順位内で、全てのゲームの得点数の大きい方。\n        ・これらの基準によっても順位が決定できない場合は、関連する FIBA ランキングによって最終順\n        位を決定する。\n\n        例：\n        １次ラウンド\n        ホーム＆アウェーで行われる各 4 チームの 2 つのグループの順位が以下の場合：\n\n2 次ラウンド\nグループ A とグループ B の上位 3 チームが、ゲームの結果と勝ち点を持ち越してグループ C へと\n進出する。最初の順位は以下の通りとなる：\n\n\n\n\nチームがホーム＆アウェーでそれ以前に同じグループではなかったチームとゲームを行い、結果が\n以下の場合：\n\nチーム２B が 2 回の没収によって、（両ラウンドでの）チーム２B の全 て の ゲ ー ム の結果が、\n        以下の通り無効となる：\n\n        改訂された１次ラウンドの結果：\n\n\n\n\n       改訂された２次ラウンドの結果：\n\n\n\n\n        最終順位：\n\n\n\n\nＤ６     ホーム＆アウェーゲーム（総得点）\nＤ６-１    ２ゲームのホーム＆アウェー合計得点シリーズ（総得点）の大会形式では、２ゲームは 80 分\n        間の１ゲームであるとみなされる。\nＤ６-２    第１戦の終了時に得点が同点の場合、オーバータイムは行われない。\nＤ６-３    両ゲームの総得点が同点の場合、第２戦は同点ではなくなるまで５分のオーバータイムを必要\n        な回数行う。\nＤ６-４    シリーズの勝者は：\n        ・両ゲームに勝ったチーム。\n        ・両チームが１ゲームずつ勝った場合、第２戦終了時に集計された得点がより大きかったチーム。\n\nＤ７     例\nＤ７-１       例１\n           A vs B 80－75\n           B vs A 72－73\n           チーム A がシリーズの勝者（両ゲームの勝者）\nＤ７-２       例２\n           A vs B 80－75\n           B vs A 73－72\n           チーム A がシリーズの勝者（総得点 A152－B148）\nＤ７-３       例３\n           A vs B 80－80\n           B vs A 92－85\n           チーム B がシリーズの勝者（総得点 A165－B172）。第１戦のオーバータイムは行わない。\nＤ７-４       例４\n           A vs B 80－85\n           B vs A 75－75\n           チーム B がシリーズの勝者（総得点 A155－B160）。第２戦のオーバータイムは行わない。\nＤ７-５       例５\n           A vs B 83－81\n           B vs A 79－77\n           総得点 A160－B160。第２戦のオーバータイム後：\n           B vs A 95－88\n           チーム B がシリーズの勝者（総得点 A171－B176）。\nＤ７-６       例６\n       A vs B 76－76\n       B vs A 84－84\n       総得点 A160－B160。第２戦のオーバータイム後：\n       B vs A 94－91\n       チーム B がシリーズの勝者（総得点 A167－B170）。\n\n別添資料 E－メディアタイムアウト              （MEDIA TIME-OUTS）\n――――――――――――――――――――――――――――――――――――――――――\nＥ１     定義\n       大会主催者はメディアタイムアウトを実施するかどうか、またその長さ（60 秒、75 秒、90 秒、100\n       秒のいずれか）を決定することができる。\n\nＥ２     ルール\nＥ２-１    通常のタイムアウトに加えて、各クォーター１回ずつのメディアタイムアウトが認められる。オーバー\n        タイムのメディアタイムアウトは認められない。\nＥ２-２    各クォーターの最初のタイムアウト（通常のタイムアウトあるいはメディアタイムアウト）は 60 秒、\n        75 秒、90 秒、100 秒のいずれかの長さで行う。\nＥ２-３    その他全てのタイムアウトの長さは 60 秒とする。\nＥ２-４    両チームともそれぞれ前半２回、後半３回のタイムアウトをとることができる。\n        これらのタイムアウトはゲーム中いつでも請求することができ、長さは以下のとおりになる：\n        ・メディアタイムアウトとみなされる場合、60 秒、75 秒、90 秒、あるいは 100 秒のいずれかにな\n         る。例えばクォーターの最初のタイムアウトのとき。あるいは、\n        ・メディアタイムアウトとみなされない場合は 60 秒となる。例えば、メディアタイムアウトが認められ\n         たあとどちらかのチームによって請求されたとき。\n\nＥ３     手順\nＥ３-１    理想的には、メディアタイムアウトは各クォーター残り時間５分より前にとられるべきである。ただ\n        し、その限りではない。\nＥ３-２    そのクォーター残り時間５分になるまでに両チームともタイムアウトを請求しない場合は、その後\n        最初にボールがデッドになりゲームクロックが止まっているときに、メディアタイムアウトをとることにな\n        る。このタイムアウトはどちらのチームのタイムアウトにもカウントされない。\nＥ３-３    そのクォーター残り時間５分になるまでにどちらかのチームがタイムアウトを請求した場合は、その\n        タイムアウトがメディアタイムアウトとして使用される。\n        このタイムアウトは、メディアタイムアウトとそれを請求したチームのタイムアウトの両方としてカウント\n        される。\nＥ３-４    この手順により、各クォーター少なくとも１回のタイムアウト、前半最大６回、後半最大８回の\n        タイムアウトがとられることになる。\n\n別添資料 F－インスタントリプレーシステム      （INSTANT REPLAY SYSTEM）\n――――――――――――――――――――――――――――――――――――――――――\nF１     定義\n       インスタントリプレーシステム（IRS）レビューとは、承認されたビデオテクノロジーの画面でゲームの\n       状況を見て、審判が判定を確認するために使用する作業方法である。\n\nF２     手順\nF２-１    審判はこの別添資料に記載されている制限の範囲内で、クルーチーフがスコアシートにサインす\n        るまで IRS を使用することが許可されている。\nF２-２    レビューは、審判がいずれかの理由でゲームを止めたときに行われる。ただし、第 44 条に基づく\n        誤 り の 訂 正 が行われるときは、別途定められた手続きに則り行われる。\nF２-３    IRS の使用にあたっては次の手順が適用される：\n        ・IRS が用意されているゲームでは、クルーチーフはゲームの前に IRS 機器を承認する。\n        ・クルーチーフは、レビューを使用するかどうかを決定する。\n        ・審判の判定についてレビューを行う場合、審判は最初の判定をコート上で示さなければならない。\n        ・他の審判や、テーブルオフィシャル、コミッショナー（同席している場合）から全ての情報を収集\n        したあと、クルーチーフはできる限り速やかにレビューを始める。\n        ・クルーチーフと少なくとも 1 人の（判定を下した）アンパイアがレビューに参加する。クルーチーフ\n        が判定を下した場合、レビューのために同行するアンパイアの 1 人を選択する。\n        ・レビューの間、クルーチーフは許可されていない人が IRS モニターを見られないことを確認する。\n        ・レビューは、タイムアウトや交代が行われる前、プレーのインターバルが始まる前、およびゲームが再\n        開される前に行われる。\n        ・審判がレビューが必要だと判断したときにタイムアウトが始まっていたり、交代が行われていたりした\n        場合、タイムアウトや交代は最終的な判定が示されるまで取り消される。\n        ・最終的な判定が示されたあと、いずれのヘッドコーチもタイムアウトを請求したり、取り下げたりする\n        ことができ、いずれのプレーヤーも交代を申し出ることができる。\n        ・レビューのあと、最初の判定を下した審判は最終的な判定を示し、それに応じてゲームを再開\n        する。\n        ・審判の最初の判定は、審判がレビューによって明確で決定的な映像での証拠を確認できた場\n        合にのみ修正することができる。\n\nF３     ルール\n       ゲーム中の次の状況でレビューを行うことができる：\nF３-１    クォーターもしくはオーバータイムの終了時で\n        ・成功したゴールのショットがクォーターやオーバータイムの終了を知らせるゲームクロックのブザーが\n\n鳴るよりも先に放たれていたかどうか。\n       【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットの\n              ゴールを指す。\n       ・次の状況でゲームクロックの残り時間に何秒が表示されるか：\n         －シューターのアウトオブバウンズのバイオレーションが起こったとき。\n         －ショットクロックのバイオレーションが起こったとき。\n         －８秒のバイオレーションが起こったとき。\n         －クォーターやオーバータイムの終了より先にファウルが起こったとき。\n         IRS レビューによる判定が示されたあと、そのクォーターもしくはオーバータイムの残りの競技時\n         間が修正された場合にはその競技時間が終了するまで、プレーのインターバルは始まらな\n         い。\nF３-２   第４クォーター、各オーバータイムでゲームクロックに２:00 以下が表示されているとき\n       ・成功したゴールのショットがショットクロックのブザーが鳴るよりも先に放たれていたかどうか。\n         －審判は、成功したゴールがショットクロックのブザーが鳴るよりも先に放たれていたかどうかをレビ\n          ューするために速やかにゲームを止めることができる。\n         －レビューは、ゴールのあと、審判がいずれかの理由により最初にゲームを止めたときに行われな\n          ければならず、審判はレビューが必要かどうかを判断しなければならない。\n         【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットのゴ\n              ールを指す。\n       ・ファウルがショットの状況から離れた場所で起きたとき\n         －ゲームクロックもしくはショットクロックが終了しているかどうか\n         －シューターの相手チームのプレーヤーがファウルをしたとき、ショットの動作（アクトオブシュー\n          ティング）が始まっていたかどうか\n         －シューターのチームメイトがファウルをしたとき、ボールがまだシューターの手の中にあったかどうか\n       ・ゴールテンディングもしくはインタフェアレンスのバイオレーションが正しく宣せられたかどうか。\n       レビューによって、ゴールテンディングもしくはインタフェアレンスのバイオレーションが誤って宣せられ\n       ていたと判断されたとき、バイオレーションが宣せられたあと、\n         －ボールが正当にバスケットに入った場合は、ゴールは認められ、ゲームはエンドラインからディ\n          フェンスであったチームのスローインで再開される。\n         －いずれかのチームのプレーヤーが速やかかつ明らかにボールのコントロールを得られていた場\n          合は、ゲームは誤ってバイオレーションが宣せられたときにボールがあった場所に最も近いア\n          ウトオブバウンズからそのチームのスローインで再開される。\n         －いずれのチームも速やかかつ明らかなボールのコントロールを得られていなかった場合、ジャ\n          ンプボールシチュエーションになる。\n\n【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショット\n              のゴールを指す。\n       ・ボールをアウトオブバウンズにしたプレーヤーを特定するため。\nF３-３   ゲーム中のあらゆる時間帯で\n       ・成功したゴールのショットが、ツーポイントエリアとスリーポイントエリアのどちらから放たれたか。\n         －審判は、成功したゴールのショットが、ツーポイントエリアとスリーポイントエリアのどちらから放\n          たれたかをレビューするために速やかにゲームを止めることができる。\n         －レビューは、ゴールのあと、審判がいずれかの理由により最初にゲームを止めたときに行わ\n          れなければならず、審判はレビューが必要かどうかを判断しなければならない。\n        【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットの\n            ゴールを指す。\n       ・成功しなかったゴールのシューターがファウルをされたあと、与えられるフリースローが 2 本か 3 本か。\n        【補足】ここでの「ゴール」とは、ゲームクロックが動いていて、ボールがライブの状態でのショットの\n            ゴールを指す。\n       ・パーソナルファウル、アンスポーツマンライクファウル、ディスクォリファイングファウルがそれぞれの判\n       定基準を満たしているかどうか。あるいはアップグレードまたはダウングレードされるか、テクニカル\n       ファウルとみなされるかどうか。\n       ・テクニカルファウルと判定したものが、アンスポーツマンライクファウルまたはデ ィ ス ク ォ リ フ ァ イ ン グ\n       ファウルに該当するかどうか\n       ・第 44 条「訂正のできる誤り」に基づき、カテゴリー１の誤りの訂正が発生したかどうかを確認\n       し、まだその訂正が可能な時期であるかの確認。\n         －カテゴリー１の誤りの訂正が発生したか否かを確認するため、審判は直ちにゲームを中断\n          することができる。\n         －その誤りは第 44 条「訂正のできる誤り」に基づくものに限定される。\n       ・カテゴリー2 に該当する誤りが起き、第 44 条「訂正のできる誤り」に定められた時間制限内に\n       訂正できるかどうか。訂正できる場合、第 44 条「訂正のできる誤り」に定められたとおりにのみ\n       訂正することができる。（2026 競技規則 67 ページ参照のこと）\n       ・ゲームクロックもしくはショットクロックの誤操作が起こったあと、修正されそれぞれのクロックに表示\n       される時間はどれだけか。\n       ・正しいフリースローシューターを特定するため。\n       ・あらゆる暴力行為や暴力行為の可能性のある事象の間のプレーヤーやチームベンチに座ること\n       を許された人物の関与を特定するため。\n         －審判は、あらゆる暴力行為や暴力行為の可能性のある事象をレビューするために速やか\n          にゲームを止めることができる。\n\n－レビューは、暴力行為や暴力行為の可能性のある事象のあと、審判がいずれかの理由に\n           より最初にゲームを止めたときに行われなければならず、審判はレビューが必要かどうかを\n           判断しなければならない。\n\nF４     ヘッドコーチチャレンジ\nF４-１    インスタントリプレーシステムが使用される全てのゲームでは、ヘッドコーチは、最も近い審判に\n        IRS を使用してゲームの状況をレビューし、審判の判定について確認を依頼するヘッドコーチチャ\n        レンジを請求することができる。\nF４-２    ヘッドコーチチャレンジには、次の手順が適用される：\n        ・チャレンジが成功するかどうかにかかわらず、ヘッドコーチは１ゲームで１度だけヘッドコーチチャレ\n        ンジを認められる。\n        ・別添資料 F3 に規定されているゲームの状況のみがチャレンジの対象となる。\n        ・別添資料 F3-2 および F3-３に規定されている時間帯の制限は適用しない。ヘッドコーチチャ\n        レンジはゲームのあらゆる時間帯で請求できる。\n        【補足】ここでの「時間帯の制限」は、審判が主導するレビューにおいて時間帯ごとに定められて\n            いるレビューの可否の制限を指す。例えば、審判が主導するレビューの場合、「ボールを\n            アウトオブバウンズにしたプレーヤーを特定するため」のレビューは、「第４クォーター、各\n            オーバータイムでゲームクロックに 2:00 もしくはそれ以下が表示されているとき」のみ認\n            められるが、ヘッドコーチはゲーム中のあらゆる時間帯において、この状況についてのチャ\n            レンジを請求することができる。\n        ・ヘッドコーチは、最も近い審判と目で見えるように、はっきりとヘッドコーチチャレンジを依頼する。\n        大きな声で英語で「チャレンジ」と言い、同時にヘッドコーチチャレンジシグナル（手で長方形を描\n        く）を示す。請求は最終的なものであり、撤回することはできない。\n        ・ヘッドコーチによるチャレンジの請求は、審判がヘッドコーチチャレンジのシグナルを示し、認めるま\n        では取り消すことができる。\n        ・ヘッドコーチチャレンジの請求とそのレビューは、ルールの中で別途規定がある場合を除き、遅く\n        とも判定の後で審判が最初にゲームを止めたときに行われなければならない。\n        ・ゲームが中断せずに続いている場合、どちらのチームも不利な状況にならない限り、ヘッドコーチ\n        チャレンジの請求を認識したときに審判は速やかにゲームを止めることができる。\n        ・ヘッドコーチは、最も近い審判にレビューを依頼するゲームの状況を示す。\n        ・審判は 59 番のシグナルを使い、ヘッドコーチチャレンジが認められることをスコアラーに知らせる。\n        ・レビューの間、プレーヤーはコート上にとどまる。\n        ・レビューによって得られる判定が、コート上での判定と異なり、チャレンジを請求したチームの主\n        張に沿ったものであった場合、最初の判定は覆される。\n\n・レビューによって得られる判定が、コート上での判定と同様で、チャレンジを請求したチームの主\n張とは異なるものであった場合、最初の判定は維持される。\n・審判はレビューの規則と同じ手順を使用する。\n・審判が最終的な判定を伝達したあと、ゲームは他のレビュー const IMPL_DATA = [{"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-1", "body": "４-１   条文：同じチームの全てのプレーヤーのアンダーシャツやアンダーショーツを含む腕や脚のコンプレッ\n      ションウェア、ヘッドギア、リストバンド、ヘッドバンド、テーピングは全て同じ単色でなければならない。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-2", "body": "４-２   例：コート上で A１は白色のヘッドバンドを、A２は赤色のヘッドバンドを身につけている。\n      解説：A１と A２が異なる色のヘッドバンドを身につけることは許されていない。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-3", "body": "４-３   例：コート上で A１は白色のヘッドバンドを、A２は赤色のリストバンドを身につけている。\n      解説：A1 が白色のヘッドバンドを身につけ、A2 が赤色のリストバンドを身につけることは許されて\n      いない。\n      【補足】全て同じ単色でなければならない。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-4", "body": "４-４   条文：スカーフスタイルのヘッドバンドを身につけることは認められない。\n\n\n\n\n               図1 スカーフスタイルのヘッドバンドの例"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-5", "body": "４-５   例：A１はスカーフスタイルのヘッドバンドを身につけており、それはチームメイトが身につけている競\n      技規則で認められたその他の装備と同じ単色である。\n      解説：A１の身につけているスカーフスタイルのヘッドバンドは許されていない。ヘッドバンドは開閉\n      する要素やその表面から突き出た部品を持たないものとする。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-6", "body": "４-６   例：A6 が交代を申し出た。審判は A6 がユニフォームのシャツの下にコンプレッション素材ではない\n      T シャツを着用していることに気づいた。\n      解説：交代は認められない。ユニフォームの下に着用することを認められているのは、コンプレッショ\n      ンウェアのみである。"}, {"type": "impl", "art_no": "4", "art_title": "チーム", "sec_no": "4-7", "body": "４-７   例：A6 はユニフォームのパンツの下にコンプレッションウェアを着用していて、そのウェアは\n      ⒜膝上まで伸びている。\n      ⒝くるぶしまで伸びている。\n      解説：コンプレッションウェア（アンダーパンツ）を着用することは正当であり、いかなる長さでも着用\n      することができる。同じチームの全てのプレーヤーは、同じ単色の、アンダーシャツやアンダーパンツを含\n      むコンプレッションウェア、ヘッドギア、リストバンド、ヘッドバンド、テーピングを着用しなければならない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "4-8", "body": "４-8   例：A6 はユニフォームのシャツの下にコンプレッションウェア（アンダーシャツ）を着用していて、その\n      ウェアは\n      ⒜肩まで伸びている。\n      ⒝首まで伸びている。\n      解説：コンプレッションウェア（アンダーシャツ）を着用することは正当であり、\n      ⒜肩の下のいかなる長さでも着用することができる。\n      ⒝首の下までの長さのものを着用することができる。\n      同じチームの全てのプレーヤーは、同じ単色の、アンダーシャツやアンダーパンツを含むコンプレッション\n      ウェア、ヘッドギア、リストバンド、ヘッドバンド、テーピングを着用しなければならない。\n\n\n第５条 プレーヤー：怪我と介助\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-1", "body": "５-１   条文：プレーヤーが怪我をした、怪我をしたように見られた、もしくは介助が必要だと見られ、結果\n      として自チームのチームベンチに座ることを許されたいずれかの人物（自チームのヘッドコーチ、ファ\n      ーストアシスタントコーチ、交代要員、5個のファウルを宣せられたチームメンバー、チーム関係者）\n      がコート内に入った場合、実際に手当てや介助を受けたかどうかにかかわらず、そのプレーヤーは手\n      当てや介助を受けたと見なされる。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-2", "body": "５-２   例：A１が足首を怪我したと見られたため、ゲームが中断された。\n      ⒜チーム A のドクターがコート内に入り、怪我をした A１の足首の手当てをした。\n      ⒝チーム A のドクターがコート内に入ったが、すでに A１は回復していた。\n      ⒞チーム A のヘッドコーチがコート内に入り、A１の怪我の程度を確認した。\n      ⒟チーム A のファーストアシスタントコーチ、交代要員、５個のファウルを宣せられたチームメンバー\n       あるいはその他のチーム関係者がコート内に入ったが、A１の手当てはしなかった。\n      解説：全ての場合において A１は手当てを受けたとみなされ、交代しなければならない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-3", "body": "５-３   例：チーム A の理学療法士がコート内に入り、緩くなったテーピングの補強を A1 に行なった。\n      解説：A１は介助を受けており、交代しなければならない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-4", "body": "５-４   例：チーム A のドクターは A1 のコンタクトレンズを探すためにコート内に入った。\n      解説：A１は介助を受けており、交代しなければならない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-5", "body": "５-５   条文：自チームのチームベンチに座ることを許された人物は、チームベンチエリアに留まっている間\n      に自チームのプレーヤーを介助することができる。介助によって速やかなゲームの再開に遅延をき\n      たさない場合、そのプレーヤーは介助を受けたとはみなされず、交代する必要はない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-6", "body": "５-６    例：チーム A のチームベンチエリアの近くで B１がショットの動作（アクトオブシューティング）中の\n       A１にファウルをした。ボールはバスケットに入らなかった。A１が 2 本もしくは 3 本のフリースローを行\n       っている間に\n       ⒜チーム A のマネージャーあるいは A 6 がチームベンチエリアから、コート上のいずれかの自チームの\n        プレーヤーに、タオル、飲み物のボトルもしくはヘッドバンドを渡した。\n       ⒝チーム A の理学療法士がチームベンチエリアから、コート上のいずれかの自チームのプレーヤーの\n        緩くなったテーピングの補強、脚へのスプレー、もしくは首へのマッサージなどを行った。\n       解説：どちらの場合においても、速やかなゲームの再開に遅延をきたしていないことから、チーム A\n       のプレーヤーは介助を受けたとはみなさない。このチーム A のプレーヤーは交代する必要はない。A\n       １は引き続き 2 本もしくは 3 本のフリースローを行う。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-7", "body": "５-７    例：チーム A のチームベンチエリアの近くで B１がショットの動作（アクトオブシューティング）中の\n       A１にファウルをした。ボールはバスケットに入らなかった。ファウルの後 A１は自チームのチームベンチ\n       エリア内に倒れ込んだ。A６は立ち上がって A１が起き上がるのを助けた。A１は遅くとも約 15 秒\n       以内で、速やかにプレーすることができた。\n       解説：速やかなゲームの再開に遅延をきたしていないことから、A１は介助を受けたとはみなさな\n       い。A１は交代する必要はない。A１は 2 本もしくは 3 本のフリースローを行う。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-8", "body": "５-８    例：A１は 2 本のフリースローを与えられた。審判がスコアラーズテーブルにファウルのレポートを行っ\n       ている間に、A１はエンドライン側のチームのチームベンチエリアの前に行き、タオルもしくは飲み物の\n       ボトルを渡すように頼んだ。チームベンチエリアのいずれかの人物が A１にタオルもしくは飲み物のボ\n       トルを渡した。A１は手を乾かした、もしくは飲み物を飲んだ。A１は遅くとも約 15 秒以内で、速や\n       かにプレーすることができた。\n       解説：速やかなゲームの再開に遅延をきたしていないことから、A１は介助を受けたとはみなさな\n       い。A１は交代する必要はない。A１は 2 本のフリースローを行う。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-9", "body": "５-９    例：ゲームクロックが動いている状態で A1 が得点した。スローインをする B１は審判にボールが濡\n       れていることを伝えた。審判はゲームを止めた。チーム B のチームベンチエリアのいずれかの人物がコ\n       ートに入り、ボールを乾かした、もしくは B１がボールを乾かすためにタオルを渡した。\n       解説：どちらの場合においても、速やかなゲームの再開に遅延をきたしていないことから、B１は介\n       助を受けたとはみなさない。B１は交代する必要はない。ゲームはバックボードの真後ろを除いたエ\n       ンドラインの外の任意のアウトオブバウンズからチーム B のスローインで再開する。審判はスローイン\n       のためにチーム B のプレーヤーにボールを渡す。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-10", "body": "５-10   例：A１はフロントコートからのスローインで、両手でボールを持っている。チーム A の理学療法士\n       はバックコートの自チームのチームベンチエリアを離れ、コートの外で A１のテーピングを補強した。\n\n解説：チーム A の理学療法士は自チームのチームベンチエリアの外で A１を介助している。A１は\n       交代しなければならない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-11", "body": "５-11   例：チーム A のフロントコートからのスローインで A1 はまだ手にボールを持っていない。チーム A の\n       理学療法士はフロントコートの自チームのチームベンチエリアにとどまったまま、A１のテーピングを補\n       強した。\n       解説：チーム A の理学療法士は自チームのチームベンチエリアの中で A１を介助している。介助\n       が 15 秒以内に完了した場合、A１は交代する必要はない。介助に 15 秒以上を要する場合、\n       A１は交代しなければならない。\n\n５-12 条文：ドクターが、重度の怪我をしたプレーヤーをコート外へ搬送することがそのプレーヤーにとって\n       危険だと判断した場合、プレーヤーの搬送ついての時間制限はない。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-13", "body": "５-13   例：A１が重度の怪我を負ったように見え、ドクターが A１を動かすことは危険だと判断したため、\n       約 15 分間ゲームが中断した。\n       解説：怪我をしたプレーヤーのコート外への搬送に必要な時間はドクターの判断で決定される。\n       交代のあと、特に罰則などはなくゲームは再開される。\n\n５-14 条文：プレーヤーが怪我をしたか出血をしている、あるいは傷口が開いていて速やかに（約15秒\n       以内に）プレーを続行することができない、もしくは自チームのチームベンチに座ることを許されたいず\n       れかの人物から介助を受けた場合、そのプレーヤーは交代をしなければならない。ゲームクロックが止\n       まってから再び動き出すまでの間に、タイムアウトがいずれかのチームに認められ、怪我をしたプレーヤ\n       ーがそのタイムアウト中に回復した、あるいは介助を完了した場合は、タイマーがタイムアウト終了の\n       ブザーを鳴らす前に審判が怪我をした、あるいは介助を受けたプレーヤーに代わる交代要員を招き\n       入れていなければ、そのプレーヤーはプレーを続行することができる。"}, {"type": "impl", "art_no": "5", "art_title": "プレーヤー：怪我と介助", "sec_no": "5-15", "body": "５-15   例：A１が怪我をしてゲームは中断された。A１は速やかにプレーを続けることが難しく、審判は笛\n       を吹き、通常の交代の合図をした。どちらかのチームが以下のときにタイムアウトを請求した。\n       ⒜A１と交代をする交代要員がプレーヤーになる前。\n       ⒝A１と交代をする交代要員がプレーヤーになった後。\n       タイムアウト終了後、A１の手当てがすでに終わり引き続きプレーを続けようとした。\n       解説：\n       ⒜A１がタイムアウト中に回復した場合、引き続きプレーを続けることができる。\n       ⒝A１と交代をする交代要員がすでにプレーヤーとなっている。よって A１は、ゲームが再開しゲー\n        ムクロックが動いたあと再び交代が認められる時機になるまでは、コートに戻ることはできない。\n\n５-16 条文：ヘッドコーチによってゲームの最初に出場すると指定されたプレーヤーが怪我をした場合、\n       交代をすることができる。またあらゆる怪我によって複数のフリースローの間に処置を受けるプレーヤ\n\nーは交代しなければならない。\n       どちらの場合においても、相手チームも希望をすれば、同じ人数だけプレーヤーを交代することがで\n       きる。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "5-17", "body": "５-17   例：A１がファウルをされ２本のフリースローを得た。１本目のフリースローの後で審判は\n       ⒜A１が出血していることを認識し、A１は A６と交代した。このときチーム B は２人の交代を申し\n        出た。\n       ⒝B１が出血していることを認識し、B１は B６と交代した。このときチーム A は１人の交代を申し\n        出た。\n       解説：\n       ⒜では、チーム B は１人のみ交代することができる。A６は２本目のフリースローを行う。\n       ⒝では、チーム A は 1 人交代することができる。A１は２本目のフリースローを行う。\n\n\n第７条 ヘッドコーチとファーストアシスタントコーチ：任務と権限\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-1", "body": "７-１    条文：ゲーム開始予定時刻の遅くとも40分前に、各チームのヘッドコーチあるいは代理の関係者\n       はスコアラーに、ゲームに出場するプレーヤーの氏名と番号、キャプテンとするプレーヤーの氏名、ヘ\n       ッドコーチとファーストアシスタントコーチの氏名を提出しなければならない。\n       ヘッドコーチはそのリストの各プレーヤーの番号と実際のユニフォームの番号が合っているかに責任を\n       負う。ゲーム開始予定時刻の遅くとも10分前には、ゲームに出場するプレーヤーの氏名と番号、\n       キャプテンとするプレーヤーの氏名、ヘッドコーチとファーストアシスタントコーチの氏名がスコアシート\n       に正しく記入されていることを確認し、スコアシートにサインをする。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-2", "body": "７-２    例：チーム A は所定の時間内にスコアラーにリストを提出した。２人のプレーヤーの番号が実際の\n       ユニフォームの番号と一致していない、あるいはそのプレーヤーの氏名がスコアシートに記載されてい\n       なかった。この不一致が、\n       ⒜ゲーム開始前に発見された。\n       ⒝ゲーム開始後に発見された。\n       解説：\n       ⒜誤った番号は修正される、あるいは氏名が記載されていなかったプレーヤーはスコアシートに追加\n        される。特に罰則は与えられない。\n       ⒝いずれのチームにも不利にならないタイミングで審判がゲームを中断し、誤った番号は罰則なしに修\n        正される。しかし、記載されていなかったプレーヤーの氏名をスコアシートに追加することはできない。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-3", "body": "７-３    例：チーム A のヘッドコーチは、怪我をしたプレーヤーあるいはプレーすることのないプレーヤーがゲーム\n       中にチームベンチに座ることを望んだ。\n       解説：チームは、最大 8 名のチーム関係者に加え、試合に出場する資格のある最大 12 名のチ\n\nームメンバーのうち、誰をスコアシートに記載し、試合中にチームベンチに座ることを許可するかを自\n      由に決めることができる。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-4", "body": "７-４   条文：遅くともゲーム開始予定時刻の10分前までに、各チームのヘッドコーチは最初に出場する\n      ５人のプレーヤーを申し出る。ゲーム開始までにスコアラーはその５人のプレーヤーに誤りがないか\n      を確認し、もし誤りがある場合は速やかに近くにいる審判に報告する。ゲーム開始までに誤りが発\n      見された場合は、正しいプレーヤーに入れ替えた上でゲームを開始する。ゲーム開始後に発見さ\n      れた場合は、誤りはなかったものとする。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-5", "body": "７-５   例：事前に確認された最初に出場すると指定されていた５人のプレーヤーと異なるプレーヤーが\n      １人、コート上にいることが、\n      ⒜ゲーム開始前に発見された。\n      ⒝ゲーム開始後に発見された。\n      解説：\n      ⒜その１人のプレーヤーは本来出場するべきプレーヤーと交代し、特に罰則は与えられない。\n      ⒝誤りは無視されゲームを続ける。特に罰則は与えられない。"}, {"type": "impl", "art_no": "7", "art_title": "ヘッドコーチとファーストアシスタントコーチ：任務と権限", "sec_no": "7-6", "body": "７-６   例：ヘッドコーチはスコアラーに、最初に出場する５人のプレーヤーのスコアシートに小さい「×」を記\n      入するように依頼をした。\n      解説：ヘッドコーチが自らスコアシートにあるプレーヤーの番号の隣の Player in 欄に小さい「x」を\n      記入することで最初に出場する 5 人のプレーヤーの確認を行う。"}, {"type": "impl",
