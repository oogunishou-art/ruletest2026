<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JBAルールテスト フラッシュカード</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f0f2f5;min-height:100vh;padding:12px}
.app{max-width:520px;margin:0 auto}
/* ヘッダー */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px}
.app-title{font-size:15px;font-weight:700;color:#1a1a2e}
.mode-tabs{display:flex;gap:6px}
.mode-tab{font-size:12px;padding:5px 10px;border-radius:20px;border:1.5px solid #d0d5dd;background:#fff;color:#667085;cursor:pointer;font-weight:500;transition:all .15s}
.mode-tab.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
/* 統計 */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fff;border-radius:12px;padding:10px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.stat-n{font-size:22px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:#98a2b3;margin-top:3px;font-weight:500}
.n-ok{color:#039855}.n-ng{color:#d92d20}
/* プログレス */
.prog-wrap{background:#e4e7ec;height:5px;border-radius:99px;margin-bottom:14px;overflow:hidden}
.prog-fill{height:5px;background:linear-gradient(90deg,#3b5bdb,#845ef7);border-radius:99px;transition:width .4s ease}
/* ナビ */
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px}
.nav-info{font-size:13px;font-weight:600;color:#344054}
.nav-pct{font-size:11px;color:#98a2b3;font-weight:500}
/* 問題カード */
.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.q-meta{font-size:11px;color:#98a2b3;font-weight:600;letter-spacing:.03em;margin-bottom:6px}
.q-ref{display:inline-block;background:#f2f4f7;color:#344054;font-size:11px;padding:3px 10px;border-radius:99px;margin-bottom:10px;font-weight:500}
/* 履歴チップ */
.q-hist{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.chip{font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid #e4e7ec;color:#667085;background:#fff}
.chip-ok{border-color:#a9efc5;color:#039855;background:#ecfdf3}
.chip-ng{border-color:#fda29b;color:#d92d20;background:#fff1f0}
.q-text{font-size:14px;color:#1d2939;line-height:1.85}
/* 選択ボタン */
.choice-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.cbtn{padding:18px 8px;border-radius:14px;border:2px solid #e4e7ec;background:#fff;font-size:28px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.cbtn-lbl{font-size:12px;font-weight:600;color:#667085}
.cbtn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.cbtn:disabled{cursor:default}
.cbtn-correct{background:#ecfdf3;border-color:#6ce9a6}
.cbtn-correct .cbtn-lbl{color:#039855}
.cbtn-wrong{background:#fff1f0;border-color:#fda29b}
.cbtn-wrong .cbtn-lbl{color:#d92d20}
.cbtn-reveal{background:#ecfdf3;border-color:#6ce9a6}
.cbtn-reveal .cbtn-lbl{color:#039855}
/* 結果カード */
.result-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.res-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f2f4f7}
.ans-badge{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0}
.badge-o{background:#ecfdf3;color:#039855}
.badge-x{background:#fff1f0;color:#d92d20}
.res-lbl{font-size:17px;font-weight:700}
.lbl-ok{color:#039855}.lbl-ng{color:#d92d20}
.sec{margin-bottom:12px}
.sec:last-child{margin-bottom:0}
.sec-ttl{font-size:10px;font-weight:700;color:#98a2b3;letter-spacing:.08em;margin-bottom:5px}
.sec-txt{font-size:13px;color:#344054;line-height:1.75}
.rule-box{background:#f9fafb;border-radius:10px;padding:12px;margin-top:6px;border-left:3px solid #3b5bdb}
.rule-src{font-size:10px;font-weight:700;color:#3b5bdb;margin-bottom:4px}
.rule-txt{font-size:12px;color:#475467;line-height:1.7}
/* ボタン */
.next-btn{width:100%;padding:14px;border-radius:12px;border:none;background:#1a1a2e;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px;transition:opacity .15s}
.next-btn:hover{opacity:.85}
/* 完了画面 */
.done-box{background:#fff;border-radius:16px;padding:24px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:14px}
.done-emoji{font-size:40px;margin-bottom:10px}
.done-title{font-size:20px;font-weight:700;color:#1d2939;margin-bottom:16px}
.done-btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.done-btn{flex:1;min-width:120px;padding:12px 8px;border-radius:12px;border:1.5px solid #e4e7ec;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#344054;transition:all .15s}
.done-btn:hover{background:#f9fafb}
/* 空画面 */
.empty-box{background:#fff;border-radius:16px;padding:32px 16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:14px}
.empty-emoji{font-size:40px;margin-bottom:10px}
.empty-title{font-size:16px;font-weight:700;color:#039855;margin-bottom:8px}
.empty-sub{font-size:13px;color:#667085;margin-bottom:18px;line-height:1.6}
/* 記録パネル */
.rec-panel{background:#fff;border-radius:16px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.rec-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;border-bottom:1px solid #f2f4f7}
.rec-head-ttl{font-size:13px;font-weight:700;color:#1d2939}
.rec-toggle{font-size:12px;color:#98a2b3;font-weight:600}
.rec-body{padding:14px 16px}
.rec-totals{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.rec-stat{background:#f9fafb;border-radius:10px;padding:10px 8px;text-align:center}
.rec-stat-n{font-size:20px;font-weight:700}
.rec-stat-l{font-size:10px;color:#98a2b3;margin-top:2px;font-weight:500}
.q-list{display:flex;flex-direction:column;gap:5px;max-height:60vh;overflow-y:auto}
.q-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f9fafb;border-radius:10px}
.q-id{font-weight:700;color:#1d2939;min-width:42px;font-size:11px}
.bar-wrap{flex:1;height:7px;background:#e4e7ec;border-radius:99px;overflow:hidden;display:flex}
.bar-c{height:7px;background:#039855}
.bar-w{height:7px;background:#d92d20}
.q-nums{font-size:11px;color:#667085;white-space:nowrap;min-width:44px;text-align:right}
.q-badge{font-size:10px;padding:2px 7px;border-radius:99px;white-space:nowrap;font-weight:600}
.badge-weak{background:#fff1f0;color:#d92d20}
.badge-good{background:#ecfdf3;color:#039855}
.badge-new{background:#f2f4f7;color:#98a2b3}
.clear-btn{margin-top:12px;font-size:11px;color:#d92d20;background:none;border:1px solid #fda29b;border-radius:8px;padding:6px 14px;cursor:pointer;font-weight:600}
.clear-btn:hover{background:#fff1f0}
/* 保存通知 */
.save-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1d2939;color:#fff;font-size:12px;padding:8px 18px;border-radius:99px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.save-toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">

  <!-- ヘッダー -->
  <div class="header">
    <div class="app-title">🏀 JBAルールテスト</div>
    <div class="mode-tabs">
      <button class="mode-tab active" id="tab-order"   onclick="setMode('order')">番号順</button>
      <button class="mode-tab"        id="tab-shuffle" onclick="setMode('shuffle')">シャッフル</button>
      <button class="mode-tab"        id="tab-wrong"   onclick="setMode('wrong')">苦手</button>
    </div>
  </div>

  <!-- 統計バー -->
  <div class="stats-row">
    <div class="stat"><div class="stat-n"     id="st-total">175</div><div class="stat-l">全問題数</div></div>
    <div class="stat"><div class="stat-n n-ok" id="st-correct">0</div><div class="stat-l">正解</div></div>
    <div class="stat"><div class="stat-n n-ng" id="st-wrong">0</div><div class="stat-l">不正解</div></div>
    <div class="stat"><div class="stat-n"     id="st-left">175</div><div class="stat-l">残り</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>

  <!-- クイズ -->
  <div id="quiz-area">
    <div class="nav">
      <span class="nav-info" id="nav-info">問題 1 / 175</span>
      <span class="nav-pct"  id="nav-pct">0%</span>
    </div>
    <div class="card">
      <div class="q-meta" id="q-meta"></div>
      <span class="q-ref"  id="q-ref"></span>
      <div class="q-hist"  id="q-hist"></div>
      <div class="q-text"  id="q-text"></div>
    </div>
    <div class="choice-btns" id="choice-btns">
      <button class="cbtn" id="btn-o" onclick="choose(true)">
        ○<span class="cbtn-lbl">正しい</span>
      </button>
      <button class="cbtn" id="btn-x" onclick="choose(false)">
        ×<span class="cbtn-lbl">誤り</span>
      </button>
    </div>
    <div id="result-area" style="display:none">
      <div class="result-card" id="result-card"></div>
      <button class="next-btn" onclick="nextQ()">次の問題へ →</button>
    </div>
  </div>

  <!-- 完了 -->
  <div id="done-area" style="display:none">
    <div class="done-box">
      <div class="done-emoji">🏆</div>
      <div class="done-title">セッション完了！</div>
      <div class="stats-row">
        <div class="stat"><div class="stat-n"     id="d-total">0</div><div class="stat-l">出題数</div></div>
        <div class="stat"><div class="stat-n n-ok" id="d-correct">0</div><div class="stat-l">正解</div></div>
        <div class="stat"><div class="stat-n n-ng" id="d-wrong">0</div><div class="stat-l">不正解</div></div>
        <div class="stat"><div class="stat-n"     id="d-pct">0%</div><div class="stat-l">正答率</div></div>
      </div>
      <div class="done-btns">
        <button class="done-btn" onclick="restart()">🔄 もう一度</button>
        <button class="done-btn" onclick="setMode('wrong')">⚠️ 苦手問題へ</button>
        <button class="done-btn" onclick="showView('record')">📊 記録を見る</button>
      </div>
    </div>
  </div>

  <!-- 苦手なし -->
  <div id="empty-area" style="display:none">
    <div class="empty-box">
      <div class="empty-emoji">🎉</div>
      <div class="empty-title">苦手問題はありません！</div>
      <div class="empty-sub">全問題で正答率50%以上です。<br>引き続き全問で復習しましょう。</div>
      <button class="next-btn" onclick="setMode('order')" style="max-width:200px;margin:0 auto;display:block">番号順で復習する</button>
    </div>
  </div>

  <!-- 記録 -->
  <div id="record-area" style="display:none">
    <div class="rec-panel">
      <div class="rec-head" onclick="toggleRec()">
        <div class="rec-head-ttl">📊 学習記録（累計）</div>
        <div class="rec-toggle" id="rec-toggle">▲ 閉じる</div>
      </div>
      <div class="rec-body" id="rec-body">
        <div class="rec-totals" id="rec-totals"></div>
        <div class="q-list"    id="q-list"></div>
        <button class="clear-btn" onclick="clearRecord()">🗑 記録をリセット</button>
      </div>
    </div>
    <button class="next-btn" onclick="setMode('order')">▶ 学習を再開する</button>
  </div>

</div>

<!-- 保存通知トースト -->
<div class="save-toast" id="toast">💾 記録を保存しました</div>

<script>
// ── 問題データ ───────────────────────────────────────
const ALL = [
  {id:1,num:"第1条 定義",level:"D",ref:"ルール 1-2",q:"ゲームに関わる全ての人物（テーブルオフィシャルズ、テクニカルデリゲート/コミッショナー（同席している場合）、プレーをすることができる全てのチームメンバー、ヘッドコーチおよびその他のチーム関係者）は、得点、ファウル、タイムアウトを含む記録や、ゲームクロック、ショットクロックの操作に関わる訂正のできる誤りを認識した場合、本規則に従って誤りが訂正されるようただちに審判に知らせることが求められる。",ans:true,explanation:"問題文のとおり。ゲームに関わる全ての人物に、訂正のできる誤りを認識した場合は審判にただちに知らせることが求められる。",ruleSrc:"第1条 1-2",ruleText:"１-２ ゲームに関わる人々に求められる責任\nゲームに関わる全ての人物は、得点、ファウル、タイムアウトを含む記録や、ゲームクロック、ショットクロックの操作に関わる訂正のできる誤りを認識した場合、本規則に従って誤りが訂正されるようただちに審判に知らせることが求められる。"},
  {id:2,num:"第1条 定義",level:"D",ref:"ルール 1-3",q:"チームが防御するバスケットを「相手チームのバスケット」といい、チームが攻撃するバスケットを「自チームのバスケット」という。",ans:false,explanation:"逆である。チームが攻撃するバスケットを「相手チームのバスケット」といい、防御するバスケットを「自チームのバスケット」という。",ruleSrc:"第1条 1-3",ruleText:"１-３ 相手チームのバスケット/自チームのバスケット\nチームが攻撃するバスケットを「相手チームのバスケット」といい、防御するバスケットを「自チームのバスケット」という。"},
  {id:3,num:"第2条 コート",level:"D",ref:"ルール 2-5-2",q:"センターラインは、両エンドラインと平行に両サイドラインの中央を結ぶ。センターラインはサイドラインより外側に0.15m延長する。センターラインはフロントコートの一部である。",ans:false,explanation:"センターラインはフロントコートではなく「バックコートの一部」である。それ以外の記述は正しい。",ruleSrc:"第2条 2-5-2",ruleText:"２-５-２ センターライン\nセンターラインは、両エンドラインと平行に両サイドラインの中央を結ぶ。センターラインはサイドラインより外側に0.15m延長する。センターラインはバックコートの一部である。"},
  {id:4,num:"第2条 コート",level:"C",ref:"ルール 2-5-6",q:"スローインラインとは、近い方のエンドラインの内側の縁から8.325mの距離に、コートの外側に向かってサイドラインと直角に引いた、長さ0.15ｍの４本のラインをいう。",ans:true,explanation:"問題文のとおり。2026年改定で「２本から４本」に変更された点に注意。",ruleSrc:"第2条 2-5-6（2026年改定：2本→4本）",ruleText:"２-５-６ スローインライン\nスローインラインとは、コートの外側に向かってサイドラインと直角に引いた、長さ0.15mの４本のラインをいう。近い方のエンドラインの内側の縁から8.325mの距離に描く。"},
  {id:5,num:"第3条 用具・器具",level:"D",ref:"第3条 用具・器具",q:"バスケットボールのゲームを行うときには、タイムアウトの時間をはかるためのストップウォッチ、あるいはゲームクロックとは別のよく見える適切な表示装置が用意されていなければならない。",ans:true,explanation:"問題文のとおり。タイムアウト計測用に、ゲームクロックとは別のストップウォッチまたは表示装置が必要とされる。",ruleSrc:"第3条 用具・器具",ruleText:"第３条 用具・器具\n・タイムアウトの時間をはかるためのストップウォッチ、あるいはゲームクロックとは別のよく見える適切な表示装置"},
  {id:6,num:"第4条 チーム",level:"D",ref:"ルール 4-1-3",q:"競技時間中、５個のファウルを宣せられプレーをする資格を失ったチームメンバーは、以降そのゲームに出場することはできないが、チームベンチに座ることは許される。",ans:true,explanation:"問題文のとおり。５個のファウルを宣せられたチームメンバーは出場資格を失うが、チームベンチに座ることは許される。",ruleSrc:"第4条 4-1-3",ruleText:"４-１-３ 競技時間中のチームメンバー\n５個のファウルを宣せられプレーをする資格を失ったチームメンバーは、以降そのゲームに出場することはできないが、チームベンチに座ることは許される。"},
  {id:7,num:"第4条 チーム",level:"B",ref:"ルール 4-1-4",q:"プレーのインターバル中は、プレーをする資格があるチームメンバーは全てプレーヤーであるとみなされる。",ans:true,explanation:"問題文のとおり。プレーのインターバル中は資格あるチームメンバーは全員プレーヤーとみなされる。",ruleSrc:"第4条 4-1-4",ruleText:"４-１-４\nプレーのインターバル中は、プレーをする資格があるチームメンバーは全てプレーヤーであるとみなされる。"},
  {id:8,num:"第4条 チーム",level:"C",ref:"ルール 4-3-2",q:"各チームメンバーはシャツの前面と背面に、シャツの色とはっきりと区別できる色で整数の番号をつける。番号は0、00および1から99のいずれかを用いるが、同一チーム内において、「0」と「00」は同時に使用することができない。",ans:false,explanation:"「0」と「00」は同一チーム内において同時に使用することができる。",ruleSrc:"第4条 4-3-2",ruleText:"４-３-２\n番号は0、00および1から99のいずれかを用いるが、同一チーム内において、「0」と「00」は同時に使用することができる。"},
  {id:9,num:"第4条 チーム",level:"D",ref:"インプリ 4-7",q:"A５はユニフォームのパンツの下にくるぶしまで伸びているコンプレッションウェアを着用したため、審判は着用を認めなかった。",ans:false,explanation:"コンプレッションウェア（アンダーパンツ）を着用することは正当であり、いかなる長さでも着用することができる。",ruleSrc:"インプリ 4-7",ruleText:"コンプレッションウェア（アンダーパンツ）を着用することは正当であり、いかなる長さでも着用することができる。"},
  {id:10,num:"第5条 プレーヤー：怪我と介助",level:"C",ref:"ルール 5-8",q:"怪我をしたプレーヤーに手当てを受けさせる場合は、フリースローの１本目のボールがフリースローシューターに与えられた後であっても、１本目と２本目のフリースローの間、あるいは２本目と３本目のフリースローの間に当該プレーヤーを交代させることができる。",ans:true,explanation:"問題文のとおり。フリースロー間での怪我によるプレーヤー交代が認められる。",ruleSrc:"第5条 ルール 5-8",ruleText:"ルール 5-8\n怪我をしたプレーヤーに手当てを受けさせる場合、フリースローの間に当該プレーヤーを交代させることができる。"},
  {id:11,num:"第5条 プレーヤー：怪我と介助",level:"C",ref:"インプリ 5-1、5-2",q:"A１が足首を怪我したと見られたため、ゲームが中断された。チームAの交代要員がコート内に入ったが、A１の手当てはしなかった。A１は手当てを受けていないため、交代する必要はない。",ans:false,explanation:"交代要員がコートに入ったため、A１は手当てを受けたとみなされ、交代しなければならない。",ruleSrc:"インプリ 5-1、5-2",ruleText:"交代要員がコートに入ったため、A１は手当てを受けたとみなされ、交代しなければならない。"},
  {id:12,num:"第5条 プレーヤー：怪我と介助",level:"C",ref:"インプリ 5-5、5-6",q:"チームAのチームベンチエリアの近くでB１がショットの動作中のA１にファウルをした。ボールはバスケットに入らなかった。A１が２本のフリースローを行っている間にチームAの理学療法士がチームベンチエリアから、コート上にいるA２の緩くなったテーピングの補強と脚へのスプレーを行った。審判はコート上にいるA２がチームAの理学療法士から介助を受けたとみなし、A２を交代させなければならない。",ans:false,explanation:"自チームのチームベンチに座ることを許された人物は、チームベンチエリアに留まっている間に自チームのプレーヤーを介助することができ、そのプレーヤーは介助を受けたとはみなされず、交代する必要はない。",ruleSrc:"インプリ 5-5、5-6",ruleText:"自チームのチームベンチに座ることを許された人物は、チームベンチエリアに留まっている間に自チームのプレーヤーを介助することができ、そのプレーヤーは介助を受けたとはみなされず、交代する必要はない。"},
  {id:13,num:"第5条 プレーヤー：怪我と介助",level:"C",ref:"インプリ 5-14、5-15",q:"A１が怪我をしてゲームは中断された。A１は速やかにプレーを続けることが難しく、審判は笛を吹き、通常の交代の合図をした。A１と交代をする交代要員がプレーヤーになったあと、チームAがタイムアウトを請求し、審判はこれを認めた。タイムアウト終了後、A１はタイムアウト中に回復したため、タイムアウト終了後に審判はA１が引き続きプレーを続けることを認めた。",ans:false,explanation:"A１と交代をする交代要員がすでにプレーヤーとなっている。よってA１は、ゲームが再開しゲームクロックが動いたあと再び交代が認められる時機になるまでは、コートに戻ることはできない。",ruleSrc:"インプリ 5-14、5-15",ruleText:"交代要員がすでにプレーヤーとなっている場合、A１はゲームが再開しゲームクロックが動いたあと再び交代が認められる時機になるまでは、コートに戻ることはできない。"},
  {id:14,num:"第6条 キャプテン：任務と権限",level:"D",ref:"ルール 6-1",q:"キャプテンはゲーム中、いかなる時間帯でも、審判とコミュニケーションを取ることができる。",ans:false,explanation:"キャプテンは、ボールがデッドでゲームクロックが止められているときにのみ、礼儀正しく審判とコミュニケーションを取ることができる。",ruleSrc:"第6条 ルール 6-1",ruleText:"ルール 6-1\nゲーム中、ボールがデッドでゲームクロックが止められているときにのみ、キャプテンは礼儀正しく審判とコミュニケーションを取ることができる。"},
  {id:15,num:"第7条 ヘッドコーチ",level:"C",ref:"インプリ 7-2",q:"チームAは所定の時間内にスコアラーにリストを提出した。２人のプレーヤーの番号が実際のユニフォームの番号と一致していない、あるいはそのプレーヤーの氏名がスコアシートに記載されていなかった。この不一致が、ゲーム開始後に発見された。いずれのチームにも不利にならないタイミングで審判がゲームを中断し、誤った番号は罰則なしに修正される。しかし、記載されていなかったプレーヤーの氏名をスコアシートに追加することはできない。",ans:true,explanation:"問題文のとおり。ゲーム開始後発見の場合、番号は修正できるが、未記載の氏名は追加できない。",ruleSrc:"インプリ 7-2",ruleText:"ゲーム開始後に発見された場合、誤った番号は罰則なしに修正される。しかし、記載されていなかったプレーヤーの氏名をスコアシートに追加することはできない。"},
  {id:16,num:"第7条 ヘッドコーチ",level:"C",ref:"インプリ 7-4、7-5",q:"ゲーム開始前に確認された最初に出場すると指定されていたチームAの５人のプレーヤーと異なるプレーヤーが１人、コート上にいることがゲーム開始後に発見されたが、審判は誤りはなかったものとし、チームAに罰則は与えず、ゲームを続けた。",ans:true,explanation:"ゲーム開始後に発見された場合は、誤りは無視されゲームを続ける。特に罰則は与えられない。",ruleSrc:"インプリ 7-4、7-5",ruleText:"ゲーム開始後に発見された場合は、誤りは無視されゲームを続ける。特に罰則は与えられない。"},
  {id:17,num:"第8条 競技時間",level:"B",ref:"インプリ 8-2、8-3",q:"A１はスリーポイントゴールのショットをした。第３クォーターの終了を知らせるゲームクロックのブザーが鳴ったとき、ボールは空中にあった。ブザーのあと、B１がまだ空中にいるA１にファウルをし、ボールはバスケットに入った。A１に３点が与えられ、B１のファウルがアンスポーツマンライクファウルもしくはディスクォリファイングファウルの判定基準に合致するものであっても、A１に対するB１のファウルは第３クォーター終了後に起きたものとしてなかったものとする。",ans:false,explanation:"B１のファウルがアンスポーツマンライクファウルもしくはディスクォリファイングファウルの判定基準に合致するもので、続いてクォーターやオーバータイムが行われる場合、B１のファウルはなかったことにはせず、次のクォーターやオーバータイムが始まる前にその状況に応じて罰せられる。このファウルは次のクォーターのチームBのチームファウルに数えられる。",ruleSrc:"インプリ 8-2、8-3",ruleText:"B１のファウルがアンスポーツマンライクファウルもしくはディスクォリファイングファウルの判定基準に合致するもので、続いてクォーターやオーバータイムが行われる場合、B１のファウルはなかったことにはせず、次のクォーターやオーバータイムが始まる前にその状況に応じて罰せられる。"},
  {id:18,num:"第8条 競技時間",level:"C",ref:"ルール 8-8",q:"各クォーターやオーバータイムの終了間際にファウルが宣せられた場合、審判は残りの競技時間を決定する。ゲームクロックには最低でも0.1秒が表示される。",ans:true,explanation:"問題文のとおり。ゲームクロックには最低でも0.1秒が表示される。",ruleSrc:"第8条 ルール 8-8",ruleText:"ルール 8-8\n各クォーターやオーバータイムの終了間際にファウルが宣せられた場合、審判は残りの競技時間を決定する。ゲームクロックには最低でも0.1秒が表示される。"},
  {id:19,num:"第9条 ゲームの開始と終了",level:"D",ref:"ルール 9-3",q:"片方もしくは両方のチームがプレーをできる状態の５人のプレーヤーをコート上に揃えることができない場合、ゲームを始めることはできない。",ans:true,explanation:"問題文のとおり。両チームとも５人のプレーヤーが必要。",ruleSrc:"第9条 ルール 9-3",ruleText:"ルール 9-3\n片方もしくは両方のチームがプレーをできる状態の５人のプレーヤーをコート上に揃えることができない場合、ゲームを始めることはできない。"},
  {id:20,num:"第9条 ゲームの開始と終了",level:"B",ref:"インプリ 9-7",q:"ゲームを開始するジャンプボールのトスで、ボールがクルーチーフの手を離れジャンパーがボールをタップする前に、ジャンパーのB１がA１にパーソナルファウルをした。第１クォーターは始められている。したがって、これは第１クォーターの最中でのファウルである。ゲームはバックコートのセンターラインに最も近いアウトオブバウンズからチームAのスローインで再開され、ショットクロックは24秒となる。ファウルはスコアシートに記録され、チームBの第１クォーターのチームファウルに数えられる。",ans:false,explanation:"ゲームは、ボールがクルーチーフの手から離れたときに始められている。ゲームはフロントコートのセンターラインに最も近いアウトオブバウンズからチームAのスローインで再開され、ショットクロックは14秒となる。",ruleSrc:"インプリ 9-7",ruleText:"ゲームはフロントコートのセンターラインに最も近いアウトオブバウンズからチームAのスローインで再開され、ショットクロックは14秒となる。"},
  {id:21,num:"第10条 ボールのステータス",level:"B",ref:"インプリ 10-1",q:"ショットの動作（アクトオブシューティング）中で、シューターのひと続きの動作が始まった後で、ディフェンスのプレーヤーがいずれかの相手プレーヤーにファウルをした、あるいはディフェンスのチームのチームベンチに座ることを許された人物がテクニカルファウルを宣せられ、シューターがそのひと続きの動作でショットを終えたとき、ボールはデッドにならず、ショットが成功した場合はその得点は認められる。",ans:true,explanation:"問題文のとおり。シューターのひと続きの動作が始まった後のファウルやテクニカルファウルでも、ショット完了まではボールはデッドにならない。",ruleSrc:"インプリ 10-1",ruleText:"インプリ 10-1\nシューターのひと続きの動作でショットを終えたとき、ボールはデッドにならず、ショットが成功した場合はその得点は認められる。"},
  {id:22,num:"第11条 プレーヤーと審判の位置",level:"D",ref:"ルール 11-1",q:"プレーヤーの位置は、その触れているフロアによって決められる。プレーヤーが空中にいるときは、最後に触れていたフロアにいるものとみなされる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"第11条 ルール 11-1",ruleText:"ルール 11-1\nプレーヤーの位置は、その触れているフロアによって決められる。プレーヤーが空中にいるときは、最後に触れていたフロアにいるものとみなされる。"},
  {id:23,num:"第12条 ジャンプボール",level:"B",ref:"ルール 12-2-8",q:"ジャンプボールでは、ボールがタップされるまで、ジャンパー以外のプレーヤーは体のどの部分もサークルのラインに触れたり、越えたりしなれば（ライン上のシリンダーを含む）、最初に位置を占めた位置から、ボールがタップされる前に動いてもよい。",ans:true,explanation:"ボールがタップされるまでの間のジャンパー以外のプレーヤーに対する制限は体のどの部分もサークルのラインに触れたり、越えたりしてはならない（ライン上のシリンダーを含む）ことのみ。動くことは可能。",ruleSrc:"ルール 12-2-8",ruleText:"ルール 12-2-8\nジャンパー以外のプレーヤーに対する制限は、体のどの部分もサークルのラインに触れたり、越えたりしてはならないことのみ。最初に位置を占めた位置から動くことは可能。"},
  {id:24,num:"第12条 ジャンプボール",level:"C",ref:"インプリ 12-3",q:"クルーチーフがゲーム開始のジャンプボールのためにボールをトスした。ボールが最高点に達する前にジャンパーのA１がボールに触れた。A１のジャンプボールのバイオレーションであるため、チームBはセンターライン近くのバックコートからスローインを与えられショットクロックは24秒となる。スローインをするチームBのプレーヤーがボールを受け取ったらすぐに、チームAは最初のオルタネイティングポゼッションのスローインの権利を得る。",ans:false,explanation:"チームBはセンターライン近くのフロントコートからスローインを与えられショットクロックは14秒となる。",ruleSrc:"インプリ 12-3",ruleText:"インプリ 12-3\nチームBはセンターライン近くのフロントコートからスローインを与えられショットクロックは14秒となる。"},
  {id:25,num:"第12条 ジャンプボール",level:"B",ref:"インプリ 12-9",q:"チームBはオルタネイティングポゼッションの手順によってスローインを与えられるはずが、審判あるいはスコアラー、もしくはその両方が誤ってスローインをチームAに与えてしまい、スローインのボールをコート内でA２が保持したとき、審判は誤りに気がつきゲームを止めた。審判は誤りを訂正し、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズからチームBのスローインで再開される。",ans:false,explanation:"ボールがコート上のプレーヤーに正当に触れた後は、誤りは訂正することができない。その誤りの結果、チームBは次のジャンプボールシチュエーションでのオルタネイティングポゼッションのスローインの権利を失うことはない。",ruleSrc:"インプリ 12-9",ruleText:"インプリ 12-9\nボールがコート上のプレーヤーに正当に触れた後は、誤りは訂正することができない。チームBは次のオルタネイティングポゼッションのスローインの権利を失うことはない。"},
  {id:26,num:"第12条 ジャンプボール",level:"B",ref:"インプリ 12-24、12-25",q:"チームAのオルタネイティングポゼッションのスローインの間に、スローインをするA１がボールを手離すまでに５秒以上が経過した。A１のバイオレーションであるため、ゲームは元のスローインの位置からチームBのスローインで再開される。オルタネイティングポゼッションアローはチームAを示す。",ans:false,explanation:"オルタネイティングポゼッションのスローインの間にそのチームがバイオレーションを宣せられたとき、そのチームはオルタネイティングポゼッションのスローインの権利を失う。オルタネイティングポゼッションアローは速やかに逆向きになり、チームBを示す。",ruleSrc:"インプリ 12-24、12-25",ruleText:"インプリ 12-24、12-25\nオルタネイティングポゼッションのスローインの間にそのチームがバイオレーションを宣せられたとき、そのチームはオルタネイティングポゼッションのスローインの権利を失う。アローは逆向きになる。"},
  {id:27,num:"第12条 ジャンプボール",level:"C",ref:"インプリ 12-23",q:"ボールを持っているA１は得点をするためにバスケットに向かってひと続きの動作をしている。このときB１が手をしっかりとボールにかけ、A１はトラベリングのルールで定められている範囲を超えてステップを踏んだ。審判はA１のトラベリングのバイオレーションを宣した。",ans:false,explanation:"ジャンプボールシチュエーションとなる。",ruleSrc:"インプリ 12-23",ruleText:"インプリ 12-23\nB１が手をしっかりとボールにかけた場合、ジャンプボールシチュエーションとなる。"},
  {id:28,num:"第13条 ボールの扱い方",level:"D",ref:"インプリ 13-1",q:"A１は故意に拳を使ってA２にパスをした。審判はA１のバイオレーションを宣した。",ans:true,explanation:"問題文のとおり。故意に拳を使ってボールを扱うことはバイオレーションである。",ruleSrc:"インプリ 13-1",ruleText:"インプリ 13-1\n故意に拳を使ってボールを扱うことはバイオレーションである。"},
  {id:29,num:"第14条 ボールのコントロール",level:"C",ref:"インプリ 14-3",q:"チームAは15秒間ボールをコントロールしている。A１はA２にボールをパスし、ボールは境界線を越えた。B１はボールをキャッチしようとコート内からジャンプをして境界線を越え、まだ空中にいる間に両手でボールを弾いた。ボールのチームコントロールが変わったので、ショットクロックはリセットされる。",ans:false,explanation:"弾いた時点ではまだコントロールが変わったとはみなされない。ショットクロックは継続となる。",ruleSrc:"インプリ 14-3",ruleText:"インプリ 14-3\n空中でボールを弾いた時点ではまだコントロールが変わったとはみなされない。ショットクロックは継続となる。"},
  {id:30,num:"第15条 ショットの動作",level:"D",ref:"インプリ 15-1",q:"動きながらではないショットでのショットの動作（アクトオブシューティング）はプレーヤーが片手または両手でボールを支え持ったときに始まる。",ans:false,explanation:"動きながらではないショットでのショットの動作（アクトオブシューティング）はプレーヤーが相手チームのバスケットに向けて、ボールを上方に動かし始めたときに始まる。",ruleSrc:"インプリ 15-1",ruleText:"インプリ 15-1\n動きながらではないショットでのショットの動作は、プレーヤーが相手チームのバスケットに向けて、ボールを上方に動かし始めたときに始まる。"},
  {id:31,num:"第15条 ショットの動作",level:"D",ref:"インプリ 15-8、15-9",q:"B１がショットの動作（アクトオブシューティング）中のA１にファウルをし、このクォーター３個目のチームファウルであった。ファウルのあと、A１はA２にボールをパスした。審判はショットの動作（アクトオブシューティング）中のファウルとし、A１に２本のフリースローを与えた。",ans:false,explanation:"ショットの動作（アクトオブシューティング）中のプレーヤーがファウルをされた後にパスをしたときは、もはやショットの動作中であるとはみなされない。ゲームはファウルが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開される。",ruleSrc:"インプリ 15-8、15-9",ruleText:"インプリ 15-8、15-9\nショットの動作中のプレーヤーがファウルをされた後にパスをしたときは、もはやショットの動作中であるとはみなされない。スローインで再開される。"},
  {id:32,num:"第15条 ショットの動作",level:"C",ref:"インプリ 15-11",q:"ツーポイントゴールのために両手でボールを持ったA１はバスケットに向かってドライブをした。B１はA１にファウルし、その勢いでA１はトラベリングのルールで定められている範囲を超えてステップを踏んだ。ボールはバスケットに入った。A１のゴールは認められず２本のフリースローがA１に与えられる。",ans:true,explanation:"問題文のとおり。ファウルの勢いによるトラベリングは問わず、ゴールは認められないが２本のフリースローが与えられる。",ruleSrc:"インプリ 15-11",ruleText:"インプリ 15-11\nファウルの勢いでトラベリングのルールを超えてステップを踏んだ場合、ゴールは認められず２本のフリースローが与えられる。"},
  {id:33,num:"第16条 得点",level:"B",ref:"インプリ 16-5、16-6",q:"A１はスリーポイントゴールエリアから相手チームのバスケット付近にいるA２に向けてボールをパスした。ボールはパスカットを試みたバスケット付近にいるB２に触れた後、バスケットに入ったため、審判はチームAに３点を認めた。",ans:true,explanation:"ボールが相手チームのバスケットに入った場合、得点はショットまたはパスが放たれたコート上の位置によって定義される。A１のパスはスリーポイントゴールエリアから手離されており、３点がチームAに認められる。",ruleSrc:"インプリ 16-5、16-6",ruleText:"インプリ 16-5、16-6\nボールが相手チームのバスケットに入った場合、得点はショットまたはパスが放たれたコート上の位置によって定義される。"},
  {id:34,num:"第16条 得点",level:"C",ref:"インプリ 16-15",q:"第４クォーター残り2:02で、A１が得点し、ボールがバスケットを通過した。B１がエンドラインでスローインをしようとしていたボールを持ったとき、ゲームクロックは残り2:00となったので、タイマーはゲームクロックを止めた。",ans:false,explanation:"得点されたとき、ゲームクロックは2:01以上を示している。したがって、ゲームクロックは止められない。",ruleSrc:"インプリ 16-15",ruleText:"インプリ 16-15\n得点されたとき、ゲームクロックは2:01以上を示している場合、ゲームクロックは止められない。"},
  {id:35,num:"第17条 スローイン",level:"C",ref:"インプリ 17-37",q:"ゲームクロックが動いていて、ボールがライブの状態で成功したゴールもしくは成功した最後のフリースローに続いてエンドラインからスローインを行うプレーヤーは、エンドラインと平行にあるいは（加えて）後方に動くことができ、エンドラインの外側にいるチームメイトとボールをパスすることができるが、スローインに要する時間が５秒を超えてはならない。これは不当にスローインを妨げたことでディフェンスのチームがバイオレーションを宣せられ、いずれかのチームによってタイムアウトが認められたあと、またはスローインが再度行われるときも適用される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 17-37",ruleText:"インプリ 17-37\nエンドラインからのスローインを行うプレーヤーはエンドラインと平行またはその後方に動くことができ、エンドラインの外側にいるチームメイトとボールをパスすることができる。"},
  {id:36,num:"第17条 スローイン",level:"C",ref:"インプリ 17-43",q:"A２がバックコートでドリブルをしているとき、B１がテクニカルファウルを宣せられた。誰もリバウンドの位置に着かずに１本のフリースローがチームAのいずれかのプレーヤーに与えられる。ゲームはテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズからチームAのスローインで再開される。ショットクロックは継続となる。",ans:false,explanation:"ディフェンスのチームがテクニカルファウルを宣せられ、スローインの位置がバックコートの場合、ショットクロックは24秒となる。",ruleSrc:"インプリ 17-43",ruleText:"インプリ 17-43\nディフェンスのチームがテクニカルファウルを宣せられ、スローインの位置がバックコートの場合、ショットクロックは24秒となる。"},
  {id:37,num:"第18条 タイムアウト、第19条 交代",level:"B",ref:"インプリ 18/19-8",q:"交代が認められる時機がちょうど終わるときに、交代要員のA６がスコアラーズテーブルに走り、大きな声で交代を申し出た。タイマー（国内大会ではスコアラー）が反応し誤ってブザーを鳴らした。審判は笛を吹き、ゲームを止めた。審判がゲームを止めたことにより、ボールはデッドになりゲームクロックは止められたままになるので、審判は交代を認めた。",ans:false,explanation:"審判がゲームを止めたことにより、ボールはデッドになりゲームクロックは止められたままになるので、通常は交代が認められる時機になる。しかしながら請求は遅すぎたので、交代は認められない。ゲームは速やかに再開される。",ruleSrc:"インプリ 18/19-8",ruleText:"インプリ 18/19-8\n請求は遅すぎたので、交代は認められない。ゲームは速やかに再開される。"},
  {id:38,num:"第18条 タイムアウト、第19条 交代",level:"C",ref:"インプリ 18/19-13",q:"ドリブルをしているA１がテクニカルファウルを宣せられた。テクニカルファウルによる罰則のフリースローを行うためにB６が交代を申し出た。審判はこれを認め１本のフリースローをB６に与えた。",ans:true,explanation:"問題文のとおり。テクニカルファウルの罰則のフリースローを行うための交代は認められる。",ruleSrc:"インプリ 18/19-13",ruleText:"インプリ 18/19-13\nテクニカルファウルの罰則のフリースローを行うための交代は認められる。"},
  {id:39,num:"第18条 タイムアウト、第19条 交代",level:"B",ref:"インプリ 18/19-24",q:"テクニカルファウルが宣せられた後にタイムアウトが請求されたときは、テクニカルファウルの罰則によるフリースローが行われた後にタイムアウトが認められる。",ans:false,explanation:"タイムアウトが請求されたときはいつでも、テクニカルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルが宣せられる前後かどうかにかかわらず、フリースローが行われる前にタイムアウトが認められる。",ruleSrc:"インプリ 18/19-24",ruleText:"インプリ 18/19-24\nタイムアウトが請求されたときはいつでも、フリースローが行われる前にタイムアウトが認められる。"},
  {id:40,num:"第23条 アウトオブバウンズ",level:"D",ref:"ルール 23-1-2",q:"ボールが境界線や境界線の外のフロアに触れたとき、または境界線やその外のフロアに触れている物に触れたとき、ボールはアウトオブバウンズになる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"第23条 ルール 23-1-2",ruleText:"ルール 23-1-2\nボールが境界線や境界線の外のフロアに触れたとき、または境界線やその外のフロアに触れている物に触れたとき、ボールはアウトオブバウンズになる。"},
  {id:41,num:"第23条 アウトオブバウンズ",level:"D",ref:"インプリ 23-3",q:"サイドラインの近くで、両手でボールを持ったA１がB１とB２に近接してガードされた。A１が持っているボールに、片足がアウトオブバウンズに触れているB１が触れた。B１のアウトオブバウンズのバイオレーションである。",ans:true,explanation:"境界線上あるいは境界線の外側にいるプレーヤーにボールが触れたことでボールがアウトオブバウンズとなった場合、このプレーヤーがボールをアウトオブバウンズに出したとみなす。",ruleSrc:"インプリ 23-3",ruleText:"インプリ 23-3\n境界線上あるいは境界線の外側にいるプレーヤーにボールが触れたことでボールがアウトオブバウンズとなった場合、このプレーヤーがボールをアウトオブバウンズに出したとみなす。"},
  {id:42,num:"第24条 ドリブル",level:"D",ref:"ルール 24-1-2",q:"コート上でライブのボールをコントロールしたプレーヤーが、ボールをコートに投げ、５歩走ったあと弾んだボールを他のプレーヤーが触れないうちにキャッチした。これはドリブルである。",ans:true,explanation:"問題文のとおり。ボールをコートに投げて弾んだボールをキャッチすることはドリブルである。",ruleSrc:"ルール 24-1-2",ruleText:"ルール 24-1-2\nプレーヤーがボールをコートに投げ、弾んだボールを他のプレーヤーが触れないうちにキャッチした場合、これはドリブルである。"},
  {id:43,num:"第24条 ドリブル",level:"B",ref:"インプリ 24-2",q:"A１はまだドリブルをしておらず、立ち続けながらバックボードをめがけて意図的にボールを投げ、他のプレーヤーが触れる前にボールをキャッチした。そのあと、A１はショットやパスをすることができるが、ドリブルを始めることはできない。",ans:false,explanation:"プレーヤーが相手チームや自チームのバックボードをめがけて意図的にボールを投げた場合、ドリブルとはみなされない。ボールをキャッチしたあと、A１はショットやパス、ドリブルを始めることができる。",ruleSrc:"インプリ 24-2",ruleText:"インプリ 24-2\nバックボードをめがけて意図的にボールを投げた場合、ドリブルとはみなされない。ボールをキャッチしたあと、ショットやパス、ドリブルを始めることができる。"},
  {id:44,num:"第24条 ドリブル",level:"C",ref:"インプリ 24-7",q:"A１はドリブルを終えたあと、B１の脚に意図的にボールを投げて当てた。A１はボールをキャッチし、再びドリブルを始めた。これはA１の正当なプレーである。",ans:false,explanation:"A１のダブルドリブルのバイオレーションである。B１がボールに触れたわけではなく、ボールがB１に触れたとみなし、A１のドリブルは終わっている。A１は再びドリブルをすることはできない。",ruleSrc:"インプリ 24-7",ruleText:"インプリ 24-7\nB１がボールに触れたわけではなく、ボールがB１に触れたとみなし、A１のドリブルは終わっている。A１は再びドリブルをすることはできない。ダブルドリブルのバイオレーションである。"},
  {id:45,num:"第25条 トラベリング",level:"B",ref:"ルール 25-2-2、インプリ 25-2",q:"両手でボールを持ってピボットをしているA１が、バランスを崩しコート上に倒れた。ピボットフットがフロアから離れた場合、トラベリングのバイオレーションである。",ans:false,explanation:"A１の正当なプレーである。コートに倒れることはトラベリングのバイオレーションではない。ただし、ディフェンスを避けるために転がったり、ボールを持ったまま立ち上がろうとしたりした場合、トラベリングのバイオレーションである。",ruleSrc:"ルール 25-2-2、インプリ 25-2",ruleText:"インプリ 25-2\nコートに倒れることはトラベリングのバイオレーションではない。ただし、ディフェンスを避けるために転がったり、ボールを持ったまま立ち上がろうとしたりした場合は、トラベリングのバイオレーションである。"},
  {id:46,num:"第25条 トラベリング",level:"C",ref:"ルール 25-2-1、インプリ 25-5",q:"A１は両手でボールを持ってドリブルを終え、ひと続きの動作で左足でジャンプし、左足、右足の順で着地してショットをした。動きながらまたはドリブルを終えるときにボールをキャッチしたプレーヤーの場合、フロアについている足は０歩目とし、その後２歩までステップを踏むことができる。この場合はA１のトラベリングのバイオレーションではない。",ans:false,explanation:"A１のトラベリングのバイオレーションである。プレーヤーはドリブルを終えたあと、連続して同じ足でコートに触れることはできない。",ruleSrc:"ルール 25-2-1、インプリ 25-5",ruleText:"インプリ 25-5\nプレーヤーはドリブルを終えたあと、連続して同じ足でコートに触れることはできない。"},
  {id:47,num:"第26条 ３秒ルール",level:"C",ref:"インプリ 26-2",q:"相手チームの制限区域内に３秒未満いたA１は、３秒のバイオレーションを避けるためにエンドラインからアウトオブバウンズに移動した。その後A１は再び制限区域に入った。A１の３秒のバイオレーションである。",ans:true,explanation:"問題文のとおり。アウトオブバウンズへ移動してすぐに戻ることは、３秒のカウントをリセットしたとはみなされない。",ruleSrc:"インプリ 26-2",ruleText:"インプリ 26-2\n３秒のバイオレーションを避けるためにアウトオブバウンズに移動した場合、３秒のカウントはリセットされず、バイオレーションとなる。"},
  {id:48,num:"第26条 ３秒ルール",level:"D",ref:"インプリ 26-3",q:"A１がバックコートでドリブルをしているときに、A２は相手チームの制限区域内に３秒以上とどまった。A２の３秒のバイオレーションである。",ans:false,explanation:"フロントコート内でライブのボールをコントロールしているチームのプレーヤーは、ゲームクロックが動いている間は、相手チームのバスケットに近い制限区域内に３秒以上とどまることはできない。A１はバックコートにいるため、フロントコートでのボールコントロールが成立していない。",ruleSrc:"インプリ 26-3",ruleText:"インプリ 26-3\nフロントコート内でライブのボールをコントロールしているチームのプレーヤーは、ゲームクロックが動いている間は、相手チームのバスケットに近い制限区域内に３秒以上とどまることはできない。"},
  {id:49,num:"第26条 ３秒ルール",level:"C",ref:"インプリ 26-5",q:"フロントコートからスローインをするA１がボールを持っている間、A２が相手チームの制限区域内に３秒以上とどまった。A２の３秒のバイオレーションである。",ans:false,explanation:"A２の正当なプレーである。チームAはフロントコート内でライブのボールをコントロールしているが、ゲームクロックはまだ動いていない。",ruleSrc:"インプリ 26-5",ruleText:"インプリ 26-5\nチームAはフロントコート内でライブのボールをコントロールしているが、ゲームクロックはまだ動いていない。３秒のルールは適用されない。"},
  {id:50,num:"第27条 近接してガードされたプレーヤー",level:"C",ref:"ルール 24-1-4、27-2、インプリ 27-2",q:"A１はB１に近接して４秒間ガードされた。その後A１はボールをファンブルし、再びキャッチした。審判はA１がボールをファンブルしたことで再びコントロールを得たことになると判断し、新たに５秒のカウントをはじめた。",ans:false,explanation:"A１は５秒以内にパス、ショットあるいはドリブルをしていないため、５秒のバイオレーションとなる。ドリブルの始まりや終わりにボールをファンブルすることはドリブルではない。",ruleSrc:"ルール 24-1-4、27-2、インプリ 27-2",ruleText:"インプリ 27-2\nドリブルの始まりや終わりにボールをファンブルすることはドリブルではない。A１は５秒以内にパス、ショットあるいはドリブルをしていないため、５秒のバイオレーションとなる。"},
  {id:51,num:"第28条 ８秒ルール",level:"C",ref:"インプリ 28-1、28-2",q:"A１がバックコートで５秒間ドリブルをしたあと、ヘルドボールが起きた。チームA に次のオルタネイティングポゼッションのスローインが与えられた。チームA がフロントコートへボールを進めるための時間は８秒にリセットされる。",ans:false,explanation:"ジャンプボールシチュエーションによってショットクロックが止められた結果、オルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。この場合、チームA は３秒でボールをフロントコートに進めなければならない。",ruleSrc:"インプリ 28-1、28-2",ruleText:"インプリ 28-1、28-2\nオルタネイティングポゼッションのスローインが、ボールをコントロールしていたチームにバックコートで与えられる場合、８秒は継続となる。"},
  {id:52,num:"第28条 ８秒ルール",level:"B",ref:"インプリ 28-5",q:"A１がバックコートからドリブルをし、両足が完全にフロントコートに触れたが、ボールはまだバックコートでドリブルされていた。その後A１は両足をバックコートに戻した。ドリブルをしているA１は両足が完全にフロントコートに触れたため、ボールはフロントコートに進められたとみなされる。８秒はリセットとなる。",ans:false,explanation:"バックコートからフロントコートにドリブルをしているとき、ドリブラーの両足とボールが完全にフロントコートに触れた時点で、ボールがフロントコートに進められたとみなされる。８秒は継続となる。",ruleSrc:"インプリ 28-5",ruleText:"インプリ 28-5\nドリブラーの両足とボールが完全にフロントコートに触れた時点で、ボールがフロントコートに進められたとみなされる。８秒は継続となる。"},
  {id:53,num:"第28条 ８秒ルール",level:"B",ref:"ルール 28-1-3",q:"A１がバックコートでライブのボールをコントロールして４秒経過したときに、チームAのヘッドコーチにテクニカルファウルが宣せられた。チームBに１本のフリースローが与えられた後、ゲームはテクニカルファウルが宣せられたときに、ボールがあったところから最も近いアウトオブバウンズから再開される。チームAは残り４秒でフロントコートにボールを運ばなければならない。",ans:true,explanation:"問題文のとおり。テクニカルファウルの後も、残りの８秒カウントは継続される。",ruleSrc:"ルール 28-1-3",ruleText:"ルール 28-1-3\nテクニカルファウルの後も、残りの８秒カウントは継続される。"},
  {id:54,num:"第28条 ８秒ルール",level:"B",ref:"ルール 28-1-2、30-1-1",q:"A１がバックコートでライブのボールをコントロールしているときに、両足が完全にフロントコートに触れているA２に向かってパスをした。A２はボールをキャッチできず、ボールはA２の体に当たってバックコートに転がり、バックコートにいるA３がキャッチした。このとき、チームAがバックコートでライブのボールをコントロールしてから８秒が経過していた。審判はその前にA２の体にボールが当たっていたためフロントコートにボールが進められたと判断し、A３がキャッチした時点で再び８秒のカウントを始めた。",ans:true,explanation:"ボールは両足が完全にフロントコートに触れているオフェンスのプレーヤーに正当に触れているのでボールをフロントコートに進めたことになる。８秒は数え直され、ボールをバックコートに返すバイオレーションにもならない。",ruleSrc:"ルール 28-1-2、30-1-1",ruleText:"ルール 28-1-2、30-1-1\nボールは両足が完全にフロントコートに触れているオフェンスのプレーヤーに正当に触れているのでボールをフロントコートに進めたことになる。８秒は数え直される。"},
  {id:55,num:"第28条 ８秒ルール",level:"D",ref:"インプリ 28-6、28-8",q:"A１がバックコート内でボールのコントロールを得た。4秒後に、B１がチームAのバックコートのアウトオブバウンズにボールを弾き出した。ゲームはバックコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームAのスローインで再開される。審判はボールをフロントコートに進めるまでの残り時間４秒を把握する必要はあるが、それをプレーヤーに伝える必要はない。",ans:false,explanation:"審判はボールをフロントコートに進めるまでの残り時間が４秒であることをスローインをするチームAのプレーヤーに伝える。",ruleSrc:"インプリ 28-6、28-8",ruleText:"インプリ 28-6、28-8\n審判はボールをフロントコートに進めるまでの残り時間が４秒であることをスローインをするチームAのプレーヤーに伝える。"},
  {id:56,num:"第28条 ８秒ルール",level:"B",ref:"インプリ 28-9、28-10",q:"第４クォーター残り25秒、得点がA 72 - B 72で、チームAがボールのコントロールを得た。A１がバックコートで５秒間ドリブルをしているとき、コート上にボトルが投げ込まれたため、審判はどちらのチームにも関係のない正当な理由でゲームを止めた。チームAは不利な状況になると考えられたため、ゲームが止められた場所に最も近いアウトオブバウンズからチームAのスローインによって新たに８秒をチームAに与え再開する。",ans:false,explanation:"審判がどちらのチームにも関係のない正当な理由でゲームを止め、相手チームが不利な状況になると判断した場合は、８秒は継続となる。新たに８秒がチームAに与えられた場合、チームBは不利な状況になると考えられ、ゲームはバックコートからチームAのスローインによって、８秒のうち３秒を残して再開される。",ruleSrc:"インプリ 28-9、28-10",ruleText:"インプリ 28-9、28-10\n審判がどちらのチームにも関係のない正当な理由でゲームを止め、相手チームが不利な状況になると判断した場合は、８秒は継続となる。"},
  {id:57,num:"第29/50条 ショットクロック",level:"C",ref:"インプリ 29/50-3",q:"A１のショットで、ボールはバックボードに触れたが、リングには触れなかった。そのボールにB１が触れたが、コントロールはできなかった。その後A２がボールのコントロールを得たとき、ショットクロックのブザーが鳴った。審判はショットクロックのブザーはなかったものとし、ゲームを続行させた。",ans:false,explanation:"チームAのショットクロックのバイオレーションである。ボールがリングに触れておらず、相手チームのプレーヤーが速やかかつ明らかなボールのコントロールを得られていない。",ruleSrc:"インプリ 29/50-3",ruleText:"インプリ 29/50-3\nボールがリングに触れておらず、相手チームのプレーヤーが速やかかつ明らかなボールのコントロールを得られていない場合、ショットクロックのバイオレーションとなる。"},
  {id:58,num:"第29/50条 ショットクロック",level:"B",ref:"インプリ 29/50-6",q:"B１はショットの動作（アクトオブシューティング）中のA１にファウルをし、ほとんど同時にショットクロックのブザーが鳴った。ボールはバスケットに入った。ボールがまだA１の手の中にあり、B１のファウルがショットクロックのブザーが鳴る前に起きていた場合、ショットクロックのバイオレーションではない。A１のゴールは認められる。１本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 29/50-6",ruleText:"インプリ 29/50-6\nファウルがショットクロックのブザーが鳴る前に起きていた場合、ショットクロックのバイオレーションではない。"},
  {id:59,num:"第29/50条 ショットクロック",level:"B",ref:"インプリ 29/50-7",q:"ゲームクロック残り25.2秒で、チームAが新たにボールのコントロールを得て、ショットクロックは24秒から開始された。ショットクロック残り１秒で、A１がショットをした。ボールが空中にある間にショットクロックのブザーが鳴った。ボールはリングに触れず、A２がリバウンドのボールを取ったため審判はチームAのショットクロックのバイオレーションを宣した。このときゲームクロックは0.8秒を示していた。審判はゲームクロック残り0.8秒のまま、ゲームが止められた場所に最も近いアウトオブバウンズからチームBのスローインで再開した。",ans:true,explanation:"問題文のとおり。ショットされたボールがリングに触れるかどうか確認するために待つ間のゲームクロックは戻す必要はない。",ruleSrc:"インプリ 29/50-7",ruleText:"インプリ 29/50-7\nショットされたボールがリングに触れるかどうか確認するために待つ間のゲームクロックは戻す必要はない。"},
  {id:60,num:"第29/50条 ショットクロック",level:"B",ref:"インプリ 29/50-8",q:"ゲームクロック残り25.2秒で、チームAが新たにボールのコントロールを得て、ショットクロックは24秒から開始された。ゲームクロック残り1.2秒で、A１が手にボールを持っているとき、ショットクロックのブザーが鳴った。審判はショットクロックバイオレーションを宣しゲームを止めた。そのとき、ゲームクロックは0.8秒を示していた。審判はゲームクロック残り0.8秒のまま、ゲームが止められた場所に最も近いアウトオブバウンズからチームBのスローインで再開した。",ans:false,explanation:"ゲームクロック残り1.2秒でバイオレーションが起きており、審判はゲームクロックを修正する。ゲームクロックは1.2秒で再開する。",ruleSrc:"インプリ 29/50-8",ruleText:"インプリ 29/50-8\nゲームクロック残り1.2秒でバイオレーションが起きており、審判はゲームクロックを修正する。ゲームクロックは1.2秒で再開する。"},
  {id:61,num:"第29/50条 ショットクロック",level:"B",ref:"インプリ 29/50-11",q:"相手チームが得点をしたあと、ゲームクロック25.3秒で、チームAはエンドラインの後方からスローインを行った。ショットクロックの時限の終了間際に、A１がA２にパスをしたボールにB１が触れ、ショットクロックのブザーが鳴った。Bチームが速やかかつ明らかにボールのコントロールを得られなかったため、審判はショットクロックのバイオレーションを宣した。このときゲームクロックは0.8秒が表示されていた。審判は、ゲームクロック残り1.3秒に修正し、ゲームが止められた場所に最も近いアウトオブバウンズからチームBのスローインで再開する。",ans:false,explanation:"ゲームクロックに0.8秒が表示されている状態で起きたチームAのショットクロックのバイオレーションである。ゲームは止められた場所に最も近いアウトオブバウンズからチームBのスローインで再開され、ゲームクロックには引き続き0.8秒が表示される。",ruleSrc:"インプリ 29/50-11",ruleText:"インプリ 29/50-11\nゲームクロックに0.8秒が表示されている状態での違反は、ゲームクロックの修正は行わない。0.8秒のまま再開される。"},
  {id:62,num:"第29/50条 ショットクロック",level:"C",ref:"インプリ 29/50-12、29/50-13",q:"ショットクロック残り10秒で、チームAがフロントコートでボールをコントロールしているとき、ジャンプボールシチュエーションが起きた。オルタネイティングポゼッションのスローインが、チームAに与えられた。ショットクロックは14秒となる。",ans:false,explanation:"ショットクロックは10秒となる。それまでボールをコントロールしていたチームがオルタネイティングポゼッションのスローインを与えられる場合、そのチームのショットクロックはジャンプボールシチュエーションが起きた時点から継続となる。",ruleSrc:"インプリ 29/50-12、29/50-13",ruleText:"インプリ 29/50-12、29/50-13\nそれまでボールをコントロールしていたチームがオルタネイティングポゼッションのスローインを与えられる場合、ショットクロックは継続となる。"},
  {id:63,num:"第29/50条 ショットクロック",level:"C",ref:"インプリ 29/50-16",q:"ショットクロック残り４秒で、チームAがフロントコートでボールをコントロールしているとき、A１が怪我をして、審判がゲームを止めた。ゲームはショットクロック残り４秒で再開される。",ans:true,explanation:"問題文のとおり。チームBのプレーヤーの怪我でゲームを止めた場合、ショットクロックは14秒となる。",ruleSrc:"インプリ 29/50-16",ruleText:"インプリ 29/50-16\nA１（チームA）の怪我でゲームを止めた場合、ショットクロックは継続となる。チームBのプレーヤーの怪我でゲームを止めた場合、ショットクロックは14秒となる。"},
  {id:64,num:"第29/50条 ショットクロック",level:"B",ref:"インプリ 29/50-18",q:"ショットクロック残り５秒で、A１がフロントコートでドリブルをしているときに、B１がテクニカルファウルを宣せられた。その後チームAのヘッドコーチにテクニカルファウルが宣せられた。B１のテクニカルファウルとチームAのヘッドコーチのテクニカルファウルを相殺し、ゲームはショットクロック残り14秒で、ゲームが止められた場所に最も近いアウトオブバウンズからチームAのスローインで再開される。",ans:false,explanation:"等しい罰則を相殺したあと、ゲームはチームAのスローインで再開される。ショットクロックは５秒となる。",ruleSrc:"インプリ 29/50-18",ruleText:"インプリ 29/50-18\n等しい罰則を相殺したあと、ショットクロックは継続（５秒）となる。"},
  {id:65,num:"第29/50条 ショットクロック",level:"C",ref:"インプリ 29/50-14、29/50-19",q:"ショットクロック残り12秒で、フロントコートにいるA１がA２にボールをパスしたとき、B１が足を出して意図的にボールを蹴った。審判はB１のバイオレーションを宣した。ゲームはショットクロック残り12秒で、フロントコートからチームAのスローインで再開される。",ans:false,explanation:"ボールをコントロールしていないチームのファウルあるいはバイオレーションにより審判がゲームを止め、ボールのポゼッションがフロントコートからその前にコントロールしていたチームに与えられる場合ショットクロックが13秒以下の場合、14秒で再開される。",ruleSrc:"インプリ 29/50-14、29/50-19",ruleText:"インプリ 29/50-14、29/50-19\nショットクロックが13秒以下の場合、14秒で再開される。"},
  {id:66,num:"第29/50条 ショットクロック",level:"B",ref:"インプリ 29/50-23",q:"A１のショットのボールがリングに触れた。A２がリバウンドのボールを取りチームAがコントロールした。その９秒後に誤ってショットクロックのブザーが鳴ったため、審判がゲームを止めた。ショットクロックがリセットされなかったという操作の誤りであるため、コミッショナー（同席している場合）、ショットクロックオペレーターと協議したあと、ゲームはチームAのスローインで再開され、ショットクロックは残り14秒となる。",ans:false,explanation:"審判がどちらのチームにも関係のない正当な理由でゲームを止め、相手チームが不利な状況になる場合は、ショットクロックは継続となる。この場合、ショットクロックは残り５秒となる。",ruleSrc:"インプリ 29/50-23",ruleText:"インプリ 29/50-23\n相手チームが不利な状況になる場合は、ショットクロックは継続となる。ショットクロックは残り５秒となる。"},
  {id:67,num:"第29/50条 ショットクロック",level:"B",ref:"インプリ 29/50-27",q:"ショットクロック残り17秒で、A１のショットのボールが空中にあるときにチームBのバックコートにいるB２がA２にファウルをし、このクォーター２個目のチームファウルであった。ボールは、リングに触れたが、バスケットには入らなかった。ゲームはフロントコートのB２のファウルが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開される。ショットクロックは17秒となる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 29/50-27",ruleText:"インプリ 29/50-27\nボールがリングに触れた場合、ショットクロックは継続となる。"},
  {id:68,num:"第29/50条 ショットクロック",level:"B",ref:"インプリ 29/50-31",q:"A１のショットのボールが空中にあるときに、ショットクロックのブザーが鳴った。そのとき、チームAのフロントコートでB２がA２にファウルをし、このクォーター５個目のチームファウルであった。A１のショットのボールはリングに触れなかった。審判はチームAのショットクロックのバイオレーションを宣し、B２に宣したファウルをなかったものとした。ゲームはバックボードの真後ろを除いたエンドラインからチームBのスローインで再開される。",ans:false,explanation:"チームAのショットクロックのバイオレーションではない。ファウルは取り消されず、２本のフリースローがA２に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。",ruleSrc:"インプリ 29/50-31",ruleText:"インプリ 29/50-31\nボールが空中にある間にチームファウルのペナルティシチュエーションにあるチームにファウルが宣せられた場合、ショットクロックのバイオレーションより優先される。"},
  {id:69,num:"第29/50条 ショットクロック",level:"C",ref:"インプリ 29/50-34",q:"ショットクロック残り19秒で、A１がフロントコートでドリブルをしているときにB２がA２にアンスポーツマンライクファウルをした。誰もリバウンドの位置に着かずに２本のフリースローがA２に与えられる。フリースローの成否にかかわらず、ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームAのスローインで再開される。ショットクロックは19秒となる。",ans:false,explanation:"アンスポーツマンライクファウルあるいはディスクォリファイングファウルの後のスローインは、いつでもフロントコートのスコアラーズテーブルの反対側のスローインラインから行われる。ショットクロックは14秒となる。",ruleSrc:"インプリ 29/50-34",ruleText:"インプリ 29/50-34\nアンスポーツマンライクファウルの後のスローインのショットクロックは14秒となる。"},
  {id:70,num:"第29/50条 ショットクロック",level:"C",ref:"インプリ 29/50-37",q:"ショットクロック残り20秒で、A１がショットをした。ボールはリングに触れ、A２がボールのコントロールを得た。A２がコート上でボールのコントロールを得たとき、ショットクロックは14秒となる。",ans:true,explanation:"問題文のとおり。ボールがリングに触れた後、同じチームがコントロールを得た場合、ショットクロックは14秒となる。",ruleSrc:"インプリ 29/50-37",ruleText:"インプリ 29/50-37\nボールがリングに触れた後、同じチームがコントロールを得た場合、ショットクロックは14秒となる。"},
  {id:71,num:"第29/50条 ショットクロック",level:"C",ref:"インプリ 29/50-40",q:"ショットクロック残り４秒で、A１がショットクロックをリセットするためにボールをリングに向かって投げた。ボールはリングに触れ、その後B１がボールに触れて、ボールはチームAのバックコートのアウトオブバウンズに出た。ゲームは、バックコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチームAのスローインで再開される。ショットクロックは24秒となる。",ans:false,explanation:"ショットクロックは14秒となる。",ruleSrc:"インプリ 29/50-40",ruleText:"インプリ 29/50-40\nボールがリングに触れた後B１が触れてアウトオブバウンズになった場合、ショットクロックは14秒となる。"},
  {id:72,num:"第29/50条 ショットクロック",level:"C",ref:"インプリ 29/50-43",q:"ショットクロック残り８秒で、A１がショットをし、ボールがリングとバックボードの間に挟まった。オルタネイティングポゼッションアローはチームAを示している。ゲームはフロントコートのバックボードに最も近いエンドラインからチームAのスローインで再開され、ショットクロックは８秒となる。",ans:false,explanation:"ショットクロックは14秒となる。",ruleSrc:"インプリ 29/50-43",ruleText:"インプリ 29/50-43\nボールがリングとバックボードの間に挟まった場合のショットクロックは14秒となる。"},
  {id:73,num:"第29/50条 ショットクロック・第30条 バックコート",level:"B",ref:"インプリ 29/50-44",q:"フロントコートにいるA１がA２にアリウープのパスをしたがA２はボールをキャッチできなかった。ボールはリングに触れ、その後A３がチームAのバックコートでボールのコントロールを得た。審判はチームAのバックコートバイオレーションを宣した。",ans:true,explanation:"チームAのプレーヤーがバックコートでボールのコントロールを得た場合、チームAはA１のパスでボールのコントロールを失っていないため、チームAのバックコートバイオレーションとなる。",ruleSrc:"インプリ 29/50-44",ruleText:"インプリ 29/50-44\nチームAはA１のパスでボールのコントロールを失っていないため、チームAのバックコートバイオレーションとなる。"},
  {id:74,num:"第29/50条 ショットクロック",level:"D",ref:"インプリ 29/50-47",q:"ゲーム中、ゲームクロックが動いている間に、チームがフロントコートあるいはバックコートで新たなライブのボールのポゼッションを得たとき、ショットクロックは24秒となる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 29/50-47",ruleText:"インプリ 29/50-47\nゲームクロックが動いている間に、チームが新たなライブのボールのポゼッションを得たとき、ショットクロックは24秒となる。"},
  {id:75,num:"第29/50条 ショットクロック",level:"C",ref:"インプリ 29/50-55",q:"ゲームクロック残り23秒で、A１がコート上で新たなボールのコントロールを得た。ショットクロックには何も表示されていない。ゲームクロック残り19秒で、A１がショットをし、ボールはリングに触れた。ゲームクロック残り16秒で、A２がリバウンドのボールを取り、チームAがボールのコントロールを取り戻した。ゲームはゲームクロック残り16秒で続行となり、ショットクロックには引き続き何も表示しない。",ans:false,explanation:"チームAがボールのコントロールを取り戻したとき、ゲームクロックは14秒を超えていたため、ショットクロックは14秒となる。",ruleSrc:"インプリ 29/50-55",ruleText:"インプリ 29/50-55\nチームAがボールのコントロールを取り戻したとき、ゲームクロックは14秒を超えていたため、ショットクロックは14秒となる。"},
  {id:76,num:"第30条 バックコート",level:"C",ref:"インプリ 30-3",q:"A１とB１の間でのゲーム開始のジャンプボールでボールは正当にタップされた。A２はフロントコートからジャンプして空中にいる間にボールをキャッチし、両足でバックコートに着地した。A２のバックコートバイオレーションではない。A２は正当にバックコートにいるとみなされる。",ans:true,explanation:"A２は空中にいる間に最初のボールのチームコントロールを確立し、コート上のどこにでも着地することができる。",ruleSrc:"インプリ 30-3",ruleText:"インプリ 30-3\nA２は空中にいる間に最初のボールのチームコントロールを確立し、コート上のどこにでも着地することができる。"},
  {id:77,num:"第30条 バックコート",level:"C",ref:"インプリ 30-6",q:"A１とB１の間でのゲーム開始のジャンプボールでボールはフロントコートにいるA２に向けて正当にタップされた。A２はジャンプして空中にいる間にボールをキャッチし、コート上に着地する前にバックコートにいるA１にボールをパスした。チームAのバックコートバイオレーションではない。",ans:false,explanation:"チームAのバックコートバイオレーションである。空中にいるA２は両手にボールを持ったままバックコートに着地することができるが、バックコートにいるチームメイトにボールをパスすることはできない。",ruleSrc:"インプリ 30-6",ruleText:"インプリ 30-6\n空中にいるA２はバックコートに着地することができるが、バックコートにいるチームメイトにボールをパスすることはできない。チームAのバックコートバイオレーションとなる。"},
  {id:78,num:"第30条 バックコート",level:"B",ref:"インプリ 30-9",q:"センターラインの近くでバックコートに両足を着けて立っているA１が、同じくセンターラインの近くでバックコートに両足を着けて立っているA２にバウンスパスをした。パスされたボールはチームAのフロントコートに触れたあと、A２に触れた。チームAのプレーヤーは誰もフロントコートでボールをコントロールしていないため、チームAのバックコートバイオレーションではない。しかし、ボールがチームAのフロントコートに触れたとき、８秒は数え終わる。バックコートにいるA２がボールに触れたらすぐに新たな８秒が数え始められる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 30-9",ruleText:"インプリ 30-9\nバックコートのプレーヤーへのパスがフロントコートに触れた後バックコートに戻っても、コントロールがなければバックコートバイオレーションではない。しかし８秒はリセットされる。"},
  {id:79,num:"第30条 バックコート",level:"C",ref:"インプリ 30-14",q:"フロントコートでスローインを行うA１がA２にボールをパスした。A２はフロントコートからジャンプして、空中にいる間にボールをキャッチし、右足をまだ空中に浮かせたまま左足でコート上のフロントコートに着地した。そのあと、A２は右足をバックコートに着いた。チームAのバックコートバイオレーションである。",ans:true,explanation:"スローインを行うA１はすでにフロントコートでボールのチームコントロールを確立している。",ruleSrc:"インプリ 30-14",ruleText:"インプリ 30-14\nスローインを行うA１はすでにフロントコートでボールのチームコントロールを確立しているため、A２がバックコートに足を着いた場合、バックコートバイオレーションとなる。"},
  {id:80,num:"第31条 ゴールテンディング・インタフェアレンス",level:"B",ref:"インプリ 16-5、31-4",q:"コート上のA１がスリーポイントラインの外からリングの上に向かってパスをした。パスのボールがリングよりも上にあるとき、B１がバスケットの下から手を入れてボールに触れた。B１のインタフェアレンスのバイオレーションである。３点がA１に与えられる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 16-5、31-4",ruleText:"インプリ 31-4\nパスのボールがリングよりも上にあるとき、バスケットの下から手を入れてボールに触れた場合、インタフェアレンスのバイオレーションとなる。"},
  {id:81,num:"第31条 ゴールテンディング・インタフェアレンス",level:"B",ref:"インプリ 31-10",q:"A１の最後のフリースローのあと、ボールはリングから跳ね返った。リバウンドでA２がB２にファウルをし、このクォーター５個目のチームファウルであった。ボールはまだバスケットに入る可能性を残している状況で、A３がボールに触れバスケットに入った。２点がA３に与えられ、A２のファウルの結果として、２本のフリースローがB２に与えられる。ゲームは通常の最後のフリースローの後と同様に再開される。",ans:false,explanation:"A３のインタフェアレンスのバイオレーションであり、得点は与えられない。A２のファウルの結果として、２本のフリースローがB２に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。",ruleSrc:"インプリ 31-10",ruleText:"インプリ 31-10\nボールがまだバスケットに入る可能性を残している状況でオフェンスのプレーヤーがボールに触れた場合、インタフェアレンスのバイオレーションとなり、得点は与えられない。"},
  {id:82,num:"第31条 ゴールテンディング・インタフェアレンス",level:"C",ref:"インプリ 31-15",q:"A１のショットのボールが空中にあるときにB１がA１にファウルをした。その後、ボールが上昇している間にB２が正当に触れ、ボールはバスケットに入った。審判はA１の得点を認めた。",ans:false,explanation:"得点は認められない。審判が笛を吹いたあと、B２がボールに触れたことでボールは速やかにデッドとなる。",ruleSrc:"インプリ 31-15",ruleText:"インプリ 31-15\n審判が笛を吹いたあと、B２がボールに触れたことでボールは速やかにデッドとなる。得点は認められない。"},
  {id:83,num:"第31条 ゴールテンディング・インタフェアレンス",level:"B",ref:"インプリ 31-20",q:"ゲームクロックが動いていて、ボールがライブの状態でA１がショットをしたあと、ボールがリングから跳ね返り、リングの上に乗った。ボールがリングの上に乗っている間に、B１がバスケットあるいはバックボードに触れた場合、B１のインタフェアレンスのバイオレーションである。",ans:true,explanation:"ボールがまだバスケットに入る可能性を残しているとき、インタフェアレンスの制限が適用される。ボールに触れることは正当なプレーである。",ruleSrc:"インプリ 31-20",ruleText:"インプリ 31-20\nボールがリングの上に乗っている間に、バスケットあるいはバックボードに触れた場合、インタフェアレンスのバイオレーションとなる。"},
  {id:84,num:"第31条 ゴールテンディング・インタフェアレンス",level:"B",ref:"インプリ 31-25",q:"A１がツーポイントゴールのショットをした。ボールはわずかな部分がバスケットの中にあり、リングの周りを回転しているとき、A２がボールに触れた。A２の正当なプレーであり、ゲームは続行される。",ans:true,explanation:"ボールのわずかな部分がリングの中かつリングよりも下にあるとき、ボールはリングの中にあるとみなす。A２の正当なプレーである。ディフェンスのプレーヤーがボールに触れた場合、インタフェアレンスのバイオレーションとなり、２点がA１に与えられる。",ruleSrc:"インプリ 31-25",ruleText:"インプリ 31-25\nボールのわずかな部分がリングの中かつリングよりも下にあるとき、ボールはリングの中にあるとみなす。オフェンスのプレーヤーはボールに触れることができる。"},
  {id:85,num:"第32条 ファウル",level:"C",ref:"ルール 32-1-3",q:"クォーターやオーバータイムの終了を知らせるゲームクロックのブザーが鳴り、ボールがデッドになった後でファウルまたは、テクニカルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルが宣せられた場合、それらの全てのファウルはなかったものとする。",ans:false,explanation:"ボールがデッドになった後でファウルが宣せられた場合は、テクニカルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルである場合を除いて、そのファウルはなかったものとする。",ruleSrc:"ルール 32-1-3",ruleText:"ルール 32-1-3\nボールがデッドになった後でファウルが宣せられた場合は、テクニカルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルである場合を除いて、そのファウルはなかったものとする。"},
  {id:86,num:"第33条 コンタクト：基本概念",level:"C",ref:"ルール 33-1",q:"ボールを持っているオフェンスのプレーヤーのシリンダーの境界とは、正面は両足、曲げられた膝、腰より上でボールを持っている腕の位置まで、背面は尻の位置まで、側面は肘と脚の外側の位置までと制限されている。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 33-1",ruleText:"ルール 33-1\nボールを持っているオフェンスのプレーヤーのシリンダーの境界：正面は両足・曲げられた膝・腰より上でボールを持っている腕の位置まで、背面は尻の位置まで、側面は肘と脚の外側の位置まで。"},
  {id:87,num:"第33条 コンタクト：基本概念",level:"C",ref:"ルール 33-4",q:"ディフェンスのプレーヤーは、ボールをコントロールしている相手チームのプレーヤーの動きに対して平行あるいは後ろに動くときに、片足または両足が瞬間的にコートから離れても、引き続きリーガルガーディングポジションを維持していることになる。そのため、一連の流れからディフェンスのプレーヤーがボールを持っているプレーヤーに向かって動いたときも同様に、両足をフロアにつけていなくてもリーガルガーディングポジションを維持していることになり、ディフェンスのプレーヤーに触れ合いの責任はなく、罰則が科されることはない。",ans:false,explanation:"相手の動きに対して平行あるいは後ろに動くときに、片足または両足が瞬間的にコートから離れても、引き続きリーガルガーディングポジションを維持していることになるが、ボールを持っているプレーヤーに向かって動いたときは、両足をフロアにつけなければならない。",ruleSrc:"ルール 33-4",ruleText:"ルール 33-4\nボールを持っているプレーヤーに向かって動いたときは、両足をフロアにつけなければならない。"},
  {id:88,num:"第33条 コンタクト：基本概念",level:"C",ref:"ルール 33-6",q:"ジャンプをしたプレーヤーが元の位置と違うところに下りた勢いで、すでに近くにリーガルガーディングポジションを占めていた相手チームのプレーヤーと触れ合いを起こしたときは、ジャンプをしたプレーヤーに触れ合いの責任がある。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 33-6",ruleText:"ルール 33-6\nジャンプをしたプレーヤーが元の位置と違うところに下りた勢いで触れ合いを起こしたときは、ジャンプをしたプレーヤーに触れ合いの責任がある。"},
  {id:89,num:"第33条 コンタクト：基本概念",level:"C",ref:"インプリ 33-5",q:"A１がエンドラインに沿ってドリブルし、バックボードの裏側のエリアからコート上をフリースローラインに向かってジャンプした。A１はセミサークルエリアに触れていて、リーガルガーディングポジションを占めているB１にぶつかった。ノーチャージセミサークルルールは適用されず、A１のチームコントロールファウルである。",ans:true,explanation:"問題文のとおり。バックボードの裏側のエリアからジャンプした場合、ノーチャージセミサークルルールは適用されない。",ruleSrc:"インプリ 33-5",ruleText:"インプリ 33-5\nバックボードの裏側のエリアからジャンプした場合、ノーチャージセミサークルルールは適用されない。"},
  {id:90,num:"第33条 コンタクト：基本概念",level:"C",ref:"インプリ 33-8",q:"A１がバスケットに向かってドライブし、ショットの動作（アクトオブシューティング）をした。A１はショットでドライブを終えるかわりに空中にいる間にコートのコーナーに立っているA２にボールをパスした。その後A１はノーチャージセミサークルエリアに触れているB１にぶつかった。A１はすでにドライブを終えてA２にパスをしており、A１に触れ合いの責任があるためB１の正当なプレーであり、ノーチャージセミサークルルールは適用されない。",ans:false,explanation:"A１の正当なプレーである。ノーチャージセミサークルルールが適用される。",ruleSrc:"インプリ 33-8",ruleText:"インプリ 33-8\nショットの動作中にパスをした後でもノーチャージセミサークルルールが適用される。A１の正当なプレーである。"},
  {id:91,num:"第33条 コンタクト：基本概念",level:"B",ref:"インプリ 33-13",q:"ゲームクロックが動いていて、ボールがライブの状態でA１はスリーポイントゴールのショットをした。B２はA２を押し、A２はチームメイトのA１に不必要な触れ合いを起こしたため、B２にファウルを宣し、ボールはバスケットに入った。これはチームBのこのクォーター３個目のチームファウルであった。３点がA１に与えられチームAはB２のパーソナルファウルが起きた場所に最も近いアウトオブバウンズからスローインを与えられる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 33-13",ruleText:"インプリ 33-13\nショット成功後にファウルが宣せられた場合、得点は認められ、ボールのないところでのファウルの場所に最も近いアウトオブバウンズからスローインで再開される。"},
  {id:92,num:"第33条 コンタクト：基本概念",level:"C",ref:"ルール 33-7",q:"動いている相手チームのプレーヤーにスクリーンをかけるプレーヤーは、相手が止まったり方向を変えたりして触れ合いを避けられるだけの距離をおいて位置を占めなければならない。スクリーンをかけようとする相手チームのプレーヤーとの間に必要とされる距離は通常の１歩から２歩である。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 33-7",ruleText:"ルール 33-7\n動いている相手チームのプレーヤーにスクリーンをかけるプレーヤーは、相手が止まったり方向を変えたりして触れ合いを避けられるだけの距離をおいて位置を占めなければならない。通常の１歩から２歩。"},
  {id:93,num:"第33条 コンタクト：基本概念",level:"C",ref:"ルール 33-7",q:"正当なスクリーンをかけられた場合、スクリーンをかけたプレーヤーとのいかなる触れ合いについても、スクリーンをかけられたプレーヤーに触れ合いの責任がある。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 33-7",ruleText:"ルール 33-7\n正当なスクリーンをかけられた場合、スクリーンをかけられたプレーヤーに触れ合いの責任がある。"},
  {id:94,num:"第34条 パーソナルファウル",level:"B",ref:"インプリ 34-2",q:"第４クォーター残り1:31で、スローインをするA１がボールを手離す前に、チームAのバックコートでB２がA２に不当に触れ合いを起こした。スローインファウルがB２に宣せられた。審判はA２にフリースローを１本与え、ゲームはフロントコートのスローインラインからチームAのスローインで再開される。ショットクロックは14秒となる。",ans:false,explanation:"ゲームはB２のファウルが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開され、ショットクロックは24秒となる。",ruleSrc:"インプリ 34-2",ruleText:"インプリ 34-2\nバックコートでのスローインファウルの場合、ゲームはB２のファウルが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開され、ショットクロックは24秒となる。"},
  {id:95,num:"第34条 パーソナルファウル",level:"B",ref:"インプリ 34-6",q:"第４クォーター残り54秒で、スローインをするA１がボールを手離す前に、チームAのフロントコートでB２がA２に不当な触れ合いを起こした。スローインファウルがB２に宣せられたあと、A１にテクニカルファウルが宣せられた。スローインファウルとテクニカルファウルの罰則は相殺されず、１本のフリースローがチームBのいずれかのプレーヤーに与えられたあと、１本のフリースローがA２に与えられる。ゲームはB２のファウルが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開される。ショットクロックは14秒以上が表示されていた場合は継続となり、1３秒以下が表示されていた場合は14秒となる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 34-6",ruleText:"インプリ 34-6\nスローインファウルとテクニカルファウルの罰則は相殺されない。それぞれの罰則が順番に適用される。"},
  {id:96,num:"第34条 パーソナルファウル",level:"B",ref:"インプリ 34-9",q:"第４クォーター残り48秒、チームA 83 - チームB 80で、スローインをするA１の手からボールが離れたとき、コート上のスローインが行われている場所とは別の場所でB２がA２に触れ合いを起こした。B２はA２に対するスローインファウルを宣せられた。審判はA２にフリースローを１本与え、ゲームはB２のファウルが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開される。",ans:false,explanation:"ボールはスローインをするA１の手からすでに離れているため、スローインファウルではない。A２に対するB２の触れ合いがアンスポーツマンライクファウルあるいはディスクォリファイングファウルの判定基準に合致しない限り、パーソナルファウルとなり、その状況に応じて罰せられる。",ruleSrc:"インプリ 34-9",ruleText:"インプリ 34-9\nボールがスローインをするプレーヤーの手からすでに離れているため、スローインファウルではない。パーソナルファウルとなる。"},
  {id:97,num:"第35条 ダブルファウル",level:"C",ref:"インプリ 35-1、35-2",q:"A１がドリブルをしているとき、A２とB２がテクニカルファウルを宣せられた。テクニカルファウルはダブルファウルの一部ではない。罰則は互いに相殺される。ゲームは最初のテクニカルファウルが起きたとき、ボールがあった場所に最も近いアウトオブバウンズからチームAのスローインで再開され、ショットクロックは継続となる。",ans:true,explanation:"ダブルファウルには身体接触を伴わなければならないため、身体接触を伴わないテクニカルファウルはダブルファウルの一部ではない。",ruleSrc:"インプリ 35-1、35-2",ruleText:"インプリ 35-1、35-2\nダブルファウルには身体接触を伴わなければならないため、身体接触を伴わないテクニカルファウルはダブルファウルの一部ではない。"},
  {id:98,num:"第35条 ダブルファウル",level:"C",ref:"インプリ 35-4",q:"ショットの動作（アクトオブシューティング）中に両手でボールを持っているA１とB１がほとんど同時に互いにファウル（どちらもパーソナルファウル）を宣せられ、ダブルファウルとなった。A１のショットが成功した場合、ゴールは認められずゲームはフリースローラインの延長線上のアウトオブバウンズからチームAのスローインで再開され、チームAのショットクロックは継続となる。",ans:true,explanation:"A１がボールをコントロールしている時にダブルファウルが起こっているため、ゴールは認められない。",ruleSrc:"インプリ 35-4",ruleText:"インプリ 35-4\nA１がボールをコントロールしている時にダブルファウルが起こっているため、ゴールは認められない。"},
  {id:99,num:"第35条 ダブルファウル",level:"C",ref:"インプリ 35-6",q:"チームAのこのクォーターのチームファウルが２個、チームBのこのクォーターのチームファウルが３個であるとき。A２のショットのボールがまだ空中にあるとき、リバウンドの間にA１とB１が互いに押し合ったことでダブルファウルとなった。ゲームはダブルファウルが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開される。",ans:false,explanation:"どちらのチームもボールをコントロールしていないため、ジャンプボールシチュエーションとなり、ゲームはオルタネイティングポゼッションのスローインで再開される。",ruleSrc:"インプリ 35-6",ruleText:"インプリ 35-6\nどちらのチームもボールをコントロールしていない場合、ジャンプボールシチュエーションとなる。"},
  {id:100,num:"第35条 ダブルファウル",level:"B",ref:"インプリ 35-8",q:"B１がドリブルをしているA１を押し、パーソナルファウルを宣せられ、チームBのこのクォーター５個目のチームファウルであった。ほとんど同時にA１がB１に肘打ちをしてアンスポーツマンライクファウルを宣せられた。罰則のうちA１に与えられる２本のフリースローとB１に与えられる２本のフリースローは相殺される。ゲームはアンスポーツマンライクファウルの罰則である、フロントコートのスローインラインからチームBのスローインで再開される。ショットクロックは14秒となる。",ans:false,explanation:"２つのファウルは同じカテゴリーではない（パーソナルファウルとアンスポーツマンライクファウル）ため、ダブルファウルではなく、罰則は互いに相殺されない。パーソナルファウルはいつでも最初に起きたと考えられるため、誰もリバウンドの位置に着かずに２本のフリースローがA１に与えられたあと、誰もリバウンドの位置に着かずに２本のフリースローがB１に与えられる。",ruleSrc:"インプリ 35-8",ruleText:"インプリ 35-8\n２つのファウルは同じカテゴリーではないため、ダブルファウルではなく、罰則は互いに相殺されない。"},
  {id:101,num:"第35条 ダブルファウル",level:"B",ref:"インプリ 35-10",q:"A１がドリブルをしているとき、A１とB１がほとんど同時に互いにファウルを宣せられた。A１のファウルはアンスポーツマンライクファウル、B１のファウルはディスクォリファイングファウルであった。２つのファウルは同じカテゴリーである（パーソナルファウルあるいはアンスポーツマンライクファウル／ディスクォリファイングファウル）ため、ダブルファウルである。ゲームはダブルファウルが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開され、ショットクロックは継続となる。",ans:true,explanation:"問題文のとおり。アンスポーツマンライクファウルとディスクォリファイングファウルは同じカテゴリーとしてダブルファウルとなる。",ruleSrc:"インプリ 35-10",ruleText:"インプリ 35-10\nアンスポーツマンライクファウルとディスクォリファイングファウルは同じカテゴリーとしてダブルファウルとなる。"},
  {id:102,num:"第36条 テクニカルファウル",level:"C",ref:"ルール 36-1-4、36-2-1",q:"バスケットを通過したボールに故意に触れること、スローインやフリースローが遅延なく行われるのを妨げること、もしくはゲームや後半の開始前にコートに来るのが遅れることで、ゲームの進行を遅らせたと見なされる場合、警告またはテクニカルファウルが宣せられる。ただし、バスケットを通過したボールにショットを決めた側のいずれかのプレーヤーが故意に触れ、新たなオフェンスのスローインを遅らせたとしても、審判にボールを返す行為であるならば遅延行為には該当せず、警告やテクニカルファウルの対象には該当しない。",ans:false,explanation:"たとえ審判にボールを返したとしても不必要な行為であり、バスケットを通過したボールに故意に触れることはスローインが遅延されゲームの進行を遅らせる。そのため、警告もしくはテクニカルファウルを宣すことが望ましい。",ruleSrc:"ルール 36-1-4、36-2-1",ruleText:"ルール 36-1-4\nたとえ審判にボールを返したとしても不必要な行為であり、バスケットを通過したボールに故意に触れることはスローインが遅延されゲームの進行を遅らせる。"},
  {id:103,num:"第36条 テクニカルファウル",level:"C",ref:"インプリ 36-4",q:"A１はショットの動作（アクトオブシューティング）中で、まだボールを手に持っているとき、B１がA１の顔（目）の前で手を振ったり、コート上で大声で叫んだり、あるいは両足を強く踏み鳴らしてA１の気を逸らしたりした。A１のショットは成功した。審判はチームBのいずれかのメンバーに同様の振る舞いへの警告を与えずにB１にテクニカルファウルを宣した。誰もリバウンドの位置に着かずに１本のフリースローがチームAのいずれかのプレーヤーに与えられる。ゲームはB１のテクニカルファウルが起きたときにボールがあった場所に最も近いアウトオブバウンズからチームAのスローインで再開される。",ans:false,explanation:"A１のゴールは認められる。B１は警告を与えられ、その警告はチームBのヘッドコーチにも伝達される。ゲームはエンドラインからチームBのスローインで再開される。チームBのいずれかのメンバーがすでに同様の振る舞いへの警告を与えられていた場合、B１はテクニカルファウルを宣せられる。",ruleSrc:"インプリ 36-4",ruleText:"インプリ 36-4\n最初の違反は警告。同様の振る舞いへの警告がすでに与えられていた場合、テクニカルファウルを宣せられる。"},
  {id:104,num:"第36条 テクニカルファウル",level:"C",ref:"ルール 36-3-1",q:"チームベンチに座ることを許された人物にテクニカルファウルが宣せられた場合は、ヘッドコーチに１個のテクニカルファウルが記録される。このファウルはチームファウルに数える。",ans:false,explanation:"チームファウルには数えない。",ruleSrc:"ルール 36-3-1",ruleText:"ルール 36-3-1\nチームベンチに座ることを許された人物へのテクニカルファウルは、ヘッドコーチに記録されるが、チームファウルには数えない。"},
  {id:105,num:"第36条 テクニカルファウル",level:"B",ref:"ルール 4-1-4、36-3-1、41-1-2",q:"第１クォーター残り30秒、プレーヤー兼ヘッドコーチのA１がB１にファウルをし、A１はプレーヤーとして２個目のファウルを宣せられた。A１とA６が交代し、そのまま第１クォーターが終了した。インターバル中にプレーヤー兼ヘッドコーチのA１が自身のスポーツマンらしくない振る舞いによってテクニカルファウルが宣せられた。このファウルは第２クォーターのチームファウルに数えない。",ans:false,explanation:"インターバル中はプレーの資格があるチームメンバーは全てプレーヤーとみなすため、チームファウルに数える。",ruleSrc:"ルール 4-1-4、36-3-1、41-1-2",ruleText:"ルール 4-1-4\nインターバル中はプレーをする資格があるチームメンバーは全てプレーヤーであるとみなされる。そのため、チームファウルに数える。"},
  {id:106,num:"第36条 テクニカルファウル",level:"C",ref:"インプリ 36-6",q:"ゲームクロックが動いている状態で、6人のチームAのプレーヤーがコート上にいた。そのことがチームB（プレーヤー５人）がボールをコントロールしているときに発見された。チームBが不利にならない状況で、ゲームは速やかに止められる。ヘッドコーチに指名された1人のプレーヤーはチームベンチに戻され、ゲームは特に罰則を与えずに再開される。",ans:false,explanation:"チームAのヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B１」と記入する。",ruleSrc:"インプリ 36-6",ruleText:"インプリ 36-6\n６人がコート上にいた場合、チームAのヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B１」と記入する。"},
  {id:107,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-10",q:"ゲームクロックが動いている状態で、５個のファウルを宣せられたチームメンバーであるA１がコート上にいた。A１が不当にゲームに出ていることが、A１がB１にファウルをした後に発見された。チームBが不利にならない状況で、ゲームは速やかに止められる。A１はチームベンチに戻される。チームAのヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B１」と記入される。A１のファウルはプレーヤーとしてのファウルであるため、このファウルはスコアシートのA１の５個目のファウルの横のスペースに記入される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 36-10",ruleText:"インプリ 36-10\n５個のファウルを宣せられたプレーヤーがコート上にいた場合の処置。"},
  {id:108,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-11",q:"第４クォーター残り７秒、チームA 70 - チームB 70で、A１は５個目のファウルを宣せられ「５個のファウルを宣せられたチームメンバー」となった。タイムアウトのあと、チームAがボールのコントロールを得て、A１が得点した。このときA１が不当にコート上にいることが発見され、ゲームクロックは残り1秒であった。A１のゴールは認められない。チームAのヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B１」と記入される。誰もリバウンドの位置に着かずに、１本のフリースローがチームBのいずれかのプレーヤーに与えられる。ゲームはチームBのバックコートのフリースローラインの延長線上のアウトオブバウンズからチームBのスローインで再開され、ゲームクロックは残り１秒となる。",ans:false,explanation:"A１のゴールは認められる。ゲームはエンドラインからチームBのスローインで再開され、ゲームクロックは残り１秒となる。",ruleSrc:"インプリ 36-11",ruleText:"インプリ 36-11\nA１のゴールは認められる。ゲームはエンドラインからチームBのスローインで再開され、ゲームクロックは残り１秒となる。"},
  {id:109,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-43",q:"タイムアウトの間にテクニカルファウルがA２に宣せられた。タイムアウトは最後まで終えられる。タイムアウト後、誰もリバウンドの位置に着かずに１本のフリースローが、チームBのいずれかのプレーヤーに与えられる。このとき交代要員を除いたチームBのいずれかのプレーヤーに与えられる。ゲームはタイムアウトでゲームが中断されたところに最も近いアウトオブバウンズから再開される。",ans:false,explanation:"タイムアウト後、誰もリバウンドの位置に着かずに１本のフリースローが、交代要員を含めたチームBのいずれかのプレーヤーに与えられる。",ruleSrc:"インプリ 36-43",ruleText:"インプリ 36-43\nタイムアウト後のフリースローは、交代要員を含めたチームBのいずれかのプレーヤーに与えられる。"},
  {id:110,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-30",q:"プレーヤー兼ヘッドコーチのA１が、第２クォーターにA１自身のスポーツマンらしくない振る舞いによってヘッドコーチとしてテクニカルファウルを宣せられ「C１」と記録された。第４クォーターでA１にプレーヤーとしてB１に対するアンスポーツマンライクファウルが宣せられた。プレーヤー兼ヘッドコーチのA１は自動的に失格・退場となる。A１のアンスポーツマンライクファウルの罰則のみが与えられ、失格・退場への追加の罰則は与えられない。誰もリバウンドの位置に着かずに２本のフリースローがB１に与えられる。ゲームはフロントコートのスローインラインからチームBのスローインで再開され、ショットクロックは14秒となる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 36-30",ruleText:"インプリ 36-30\nテクニカルファウルとアンスポーツマンライクファウルを各１個記録されたプレーヤー兼ヘッドコーチは自動的に失格・退場となる。"},
  {id:111,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-31",q:"プレーヤー兼ヘッドコーチのA１がコート上でプレーしているとき、交代要員のA６がテクニカルファウルを宣せられた。チームベンチに座ることを許された人物のスポーツマンらしくない振る舞いによるテクニカルファウルは、ファーストアシスタントコーチがスコアシートに記入されていたとしても、プレーヤー兼ヘッドコーチに宣せられる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 36-31",ruleText:"インプリ 36-31\nチームベンチに座ることを許された人物のテクニカルファウルは、プレーヤー兼ヘッドコーチに宣せられる。"},
  {id:112,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-32",q:"プレーのインターバル中に、プレーヤー兼ヘッドコーチのA１がテクニカルファウルを宣せられた。テクニカルファウルは、ファーストアシスタントコーチがスコアシートに記入されていたとしても、プレーヤー兼ヘッドコーチとしてのA１に宣せられる。",ans:false,explanation:"プレーのインターバル中に、プレーヤー兼ヘッドコーチのA１がテクニカルファウルを宣せられた場合、ファーストアシスタントコーチがスコアシートに記入されていたとしても、プレーヤーとしてのA１に宣せられる。",ruleSrc:"インプリ 36-32",ruleText:"インプリ 36-32\nプレーのインターバル中のテクニカルファウルは、プレーヤーとしてのA１に宣せられる。"},
  {id:113,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-40、36-41",q:"ショットクロックが残り21秒で、A１がバックコートでドリブルをしているとき、A２がテクニカルファウルを宣せられた。誰もリバウンドの位置に着かずに１本のフリースローがチームBのいずれかのプレーヤーに与えられる。A２のテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウンズから、チームA のスローインでゲームが再開される。チームA は新たな８秒が与えられ、ショットクロックは24秒にリセットされる。",ans:false,explanation:"オフェンスのチームがテクニカルファウルを宣せられた場合、スローインがバックコートで行われるかフロントコートで行われるかにかかわらず、ショットクロックは継続となり、チームA は５秒でボールをフロントコートに進めなければならず、ショットクロックは21秒からの再開となる。",ruleSrc:"インプリ 36-40、36-41",ruleText:"インプリ 36-40、36-41\nオフェンスのチームがテクニカルファウルを宣せられた場合、ショットクロックは継続となる。"},
  {id:114,num:"第36条 テクニカルファウル・第37条 アンスポーツマンライクファウル",level:"B",ref:"ルール 36-2-3、36-2-5、37-2-3、37-2-4",q:"テクニカルファウルを２個あるいはアンスポーツマンライクファウルを２個、もしくはテクニカルファウルとアンスポーツマンライクファウルを１個ずつ記録されたプレーヤーは失格・退場（ゲームディスクォリフィケーション）になる。これらのプレーヤーが失格・退場になった場合、２個目のテクニカルファウルまたはアンスポーツマンライクファウルによる罰則のみが与えられ、失格・退場による追加の罰則は与えられない。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 36-2-3、36-2-5、37-2-3、37-2-4",ruleText:"ルール 36-2-3等\nテクニカルファウルとアンスポーツマンライクファウルを各１個記録されたプレーヤーは失格・退場となる。"},
  {id:115,num:"第37条 アンスポーツマンライクファウル",level:"C",ref:"インプリ 37-4",q:"速攻の終わりでA１がショットの動作（アクトオブシューティング）中にボールを持ったとき、B１がA１の腕に後ろからボールをブロックしようとして触れ合いを起こした。進行しているプレーヤーの後ろから起こす不当な触れ合いであるため、B１のアンスポーツマンライクファウルである。",ans:false,explanation:"すでにオフェンスのプレイヤーがショットの動作（アクトオブシューティング）に入っているため、B１のパーソナルファウルであり、アンスポーツマンライクファウルの適用とはならない。",ruleSrc:"インプリ 37-4",ruleText:"インプリ 37-4\nすでにショットの動作に入っているため、アンスポーツマンライクファウルの適用とはならない。パーソナルファウルである。"},
  {id:116,num:"第37条 アンスポーツマンライクファウル",level:"B",ref:"インプリ 37-5",q:"A１はバックコートから、フロントコートで相手チームのバスケットに向かって進行しているA２にボールをパスした。A２と相手チームのバスケットの間にはチームBのプレーヤーはいなかった。A２は空中にジャンプをしたが、ボールをキャッチする前に、B１が後ろから触れ合いを起こし、B１はファウルを宣せられた。A２へのパスのボールが放たれたあと、A２とチームBのバスケットとの間にチームBのプレーヤーが全くいない状況で、進行しているプレーヤーの後ろあるいは横から起こす不当な触れ合いであるため、B１のアンスポーツマンライクファウルである。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 37-5",ruleText:"インプリ 37-5\nパスのボールが放たれたあと、進行しているプレーヤーの後ろあるいは横から起こす不当な触れ合いはアンスポーツマンライクファウルである。"},
  {id:117,num:"第37条 アンスポーツマンライクファウル",level:"B",ref:"インプリ 37-6",q:"A１はバックコートでボールを持っている。フロントコートにいるA２は、相手チームのバスケットに向かって進行していて、A２と相手チームのバスケットの間にはチームBのプレーヤーはいなかった。A１からA２へのパスのボールが放たれる前に、B１がA２に後ろから触れ合いを起こした。A１からA２へのパスのボールがまだ放たれていないことから、A２とチームBのバスケットとの間にチームBのプレーヤーが全くいない状況で、進行しているプレーヤーの後ろあるいは横から起こす不当な触れ合いという判定基準では、B１のアンスポーツマンライクファウルではない。",ans:true,explanation:"問題文のとおり。パスのボールがまだ放たれていないため、アンスポーツマンライクファウルの判定基準には合致しない。",ruleSrc:"インプリ 37-6",ruleText:"インプリ 37-6\nパスのボールがまだ放たれていない場合、アンスポーツマンライクファウルの判定基準には合致しない。"},
  {id:118,num:"第37条 アンスポーツマンライクファウル",level:"B",ref:"ルール 37-1-1、インプリ 37-7",q:"チームAのバックコートでB１はドリブルをしているA１のボールを弾き出した。そのあと、B１はボールのコントロールを得ようとした。B１とチームAのバスケットの間にチームAのプレーヤーがいない状況で、A２が後ろあるいは横からB１に触れ合いを起こした。審判はまだB１がボールをコントロールしていなかったため、A２にパーソナルファウルを宣した。",ans:false,explanation:"B１とチームAのバスケットの間にチームAのプレーヤーがいない状況で、コントロールがなくても、コントロールを得ようとしたときに、後ろあるいは横からから触れ合いを起こしているため、A２のアンスポーツマンライクファウルとなる。",ruleSrc:"ルール 37-1-1、インプリ 37-7",ruleText:"インプリ 37-7\nコントロールがなくても、コントロールを得ようとしたときに後ろあるいは横から触れ合いを起こした場合、アンスポーツマンライクファウルとなる。"},
  {id:119,num:"第37条 アンスポーツマンライクファウル",level:"B",ref:"インプリ 37-11",q:"A１はB１にファウルをし、５個目のファウルを宣せられた。これはチームA のこのクォーター２個目のチームファウルであった。A１はチームベンチに向かう間に、B１を突き飛ばした。このときB１もまたA１を突き飛ばしB１はアンスポーツマンライクファウルが宣せられた。５個目のファウルでA１は５個のファウルを宣せられたチームメンバーとなり、A１のスポーツマンらしくない振る舞いはチームAのヘッドコーチにテクニカルファウルとして宣せられ「B１」と記入される。B１のアンスポーツマンライクファウルはB１自身に宣せられ「U２」と記入される。誰もリバウンドの位置に着かずに１本のフリースローがB１に与えられ、誰もリバウンドの位置に着かずに２本のフリースローがA１と交代したプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームAのスローインで再開され、ショットクロックは14秒となる。",ans:false,explanation:"この罰則のフリースローはA１に突き飛ばされたB１ではなく、チームBのいずれかのプレーヤーに誰もリバウンドの位置に着かずに１本のフリースローが与えられる。",ruleSrc:"インプリ 37-11",ruleText:"インプリ 37-11\nテクニカルファウルのフリースローはB１ではなく、チームBのいずれかのプレーヤーに与えられる。"},
  {id:120,num:"第38条 ディスクォリファイングファウル",level:"C",ref:"インプリ 38-7",q:"ディスクォリファイングファウルとは、プレーヤーや、チームベンチに座ることを許された人物による、相手チーム、審判、テーブルオフィシャルズやコミッショナー（同席している場合）、観客に対する行為、自チームのメンバーに対する行為、意図的に用具・器具を破損する行為などの著しくスポーツマンらしくない行為に適用される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 38-7",ruleText:"インプリ 38-7\nディスクォリファイングファウルは著しくスポーツマンらしくない行為に適用される。"},
  {id:121,num:"第38条 ディスクォリファイングファウル",level:"B",ref:"ルール 38-3-3、38-3-4",q:"体の触れ合いをともなわないディスクォリファイングファウルが宣せられた場合のフリースローシューターは、ヘッドコーチが指定する。与えられるフリースローは１本となる。フリースローの後は、ファウルをされたチームのフロントコートのスコアラーズテーブルの反対側のスローインラインからのスローインでゲームは再開する。",ans:false,explanation:"与えられるフリースローは２本。",ruleSrc:"ルール 38-3-3、38-3-4",ruleText:"ルール 38-3-3、38-3-4\n体の触れ合いをともなわないディスクォリファイングファウルのフリースローは２本。"},
  {id:122,num:"第38条 ディスクォリファイングファウル",level:"A",ref:"インプリ 38-10",q:"A１は審判を侮辱する発言を行い、ディスクォリファイングファウルを宣せられた。控室に戻る間にA１がB１を突き飛ばし、アンスポーツマンライクファウル相当であった。A１のスポーツマンらしくない振る舞いはチームAのヘッドコーチにテクニカルファウルとして宣せられ「B１」と記入される。",ans:false,explanation:"A１はすでに失格・退場になっており、A１にはそれ以上のファウルは記録されず、また罰則は与えられない。クルーチーフまたはコミッショナー（同席している場合）は、大会主催者に対して報告書を提出しなければならない。ゲームは誰もリバウンドの位置に着かずに２本のフリースローがチームBのいずれかのプレーヤーに与えられる。",ruleSrc:"インプリ 38-10",ruleText:"インプリ 38-10\nA１はすでに失格・退場になっており、それ以上のファウルは記録されない。大会主催者への報告書提出が必要。"},
  {id:123,num:"第39条 ファイティング",level:"A",ref:"インプリ 39-1、39-2",q:"チームA が自チームのフロントコートでボールを20秒間コントロールしたとき、抗争につながりそうな状況が発生した。審判はチームベンチエリアを離れた各チーム２人の交代要員を失格・退場にした。抗争につながりそうな状況が始まったときにボールをコントロールしていたチームAに、抗争につながりそうな状況が始まったときにボールがあった場所に最も近いアウトオブバウンズからスローインが与えられる。チームAのフロントコートから再開されるため、ショットクロックは14秒となる。",ans:false,explanation:"抗争（Fight）のあとで全ての罰則が相殺された場合、ショットクロックはゲームが止められたときの残り時間となる。この場合、ショットクロックは４秒となる。",ruleSrc:"インプリ 39-1、39-2",ruleText:"インプリ 39-1、39-2\n抗争のあとで全ての罰則が相殺された場合、ショットクロックはゲームが止められたときの残り時間となる。"},
  {id:124,num:"第39条 ファイティング",level:"A",ref:"インプリ 39-7",q:"チームAのヘッドコーチはチームベンチエリアを離れ、コート上で積極的に抗争に関わり、B１を激しく突き飛ばした。チームAのヘッドコーチはチームベンチエリアを離れながら事態の収拾のために審判に協力しなかったため、ディスクォリファイングファウルを宣せられ、スコアシートに「D２」と記入される。チームAのヘッドコーチには自身が積極的に抗争に関わったことでの更なるディスクォリファイングファウルは宣せられない。スコアシートのチームAのヘッドコーチの残りのファウル欄には「F」と記入される。誰もリバウンドの位置に着かずに２本のフリースローがチームBのいずれかのプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームBのスローインで再開される。ショットクロックは14秒となる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 39-7",ruleText:"インプリ 39-7\nヘッドコーチが積極的に抗争に関わった場合のディスクォリファイングファウルの処置。"},
  {id:125,num:"第36条 テクニカルファウル・第40条 失格・退場",level:"A",ref:"ルール 40-3、インプリ 36-22",q:"第１クォーターで、B１はテクニカルファウルを宣せられた。第４クォーターでB１は５個目のファウルを宣せられ、このクォーター２個目のチームファウルであった。チームベンチに向かう間に、B１に対してテクニカルファウルが宣せられたため、B１は退場となる。このファウルはスコアシートのB１の５個目のファウルの横のスペースに「T１」と記入され、続けて「GD」が記入される。",ans:false,explanation:"B１は退場とはならない。５個目のファウルによって、B１は５個のファウルを宣せられたチームメンバーとなる。B１による更なるテクニカルファウルはヘッドコーチに宣せられ「B１」と記入される。",ruleSrc:"ルール 40-3、インプリ 36-22",ruleText:"ルール 40-3\n５個のファウルを宣せられたチームメンバーになったあとのテクニカルファウルはヘッドコーチに宣せられる。"},
  {id:126,num:"第40条 失格・退場",level:"D",ref:"ルール 40-6",q:"失格・退場となったプレーヤー、交代要員、ヘッドコーチ、アシスタントコーチ、５個のファウルを宣せられたプレーヤー、その他チームベンチに座ることを許されたメンバーは、直ちにゲームを離れ（30秒以内）、ゲーム終了までチームの控室にとどまるか、または建物から出なければならない。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 40-6",ruleText:"ルール 40-6\n失格・退場となったプレーヤー等は、直ちにゲームを離れ（30秒以内）、ゲーム終了までチームの控室にとどまるか、または建物から出なければならない。"},
  {id:127,num:"第41条 チームファウル：罰則",level:"B",ref:"ルール 4-1-4、41-1-1、41-1-2",q:"第１クォーター終了後、インターバル中に交代要員のB６にテクニカルファウルが宣せられた。このファウルは第２クォーターのチームBのチームファウルに数える。",ans:true,explanation:"チームファウルに数えるファウルとは、プレーヤーに記録されるパーソナルファウル、テクニカルファウル、アンスポーツマンライクファウル、ディスクォリファイングファウルのことをいう。プレーのインターバル中は、プレーをする資格があるチームメンバーは全てプレーヤーであるとみなされる。",ruleSrc:"ルール 4-1-4、41-1-1、41-1-2",ruleText:"ルール 4-1-4\nプレーのインターバル中は、プレーをする資格があるチームメンバーは全てプレーヤーであるとみなされる。"},
  {id:128,num:"第41条 チームファウル：罰則",level:"C",ref:"ルール 41-2-1",q:"チームファウルのペナルティシチュエーションにあるチームのプレーヤーが、ショットの動作（アクトオブシューティング）中ではない相手チームのプレーヤーに暴言を吐きテクニカルファウルを宣せられた。チームファウルペナルティの罰則として相手チームのプレーヤーに２本のフリースローが与えられる。",ans:false,explanation:"パーソナルファウルの場合は、罰則としてスローインではなく２本のフリースローが与えられるが、テクニカルファウルであるためテクニカルファウルの罰則に従う。１本のフリースローが相手チームのいずれかのプレーヤーに与えられる。",ruleSrc:"ルール 41-2-1",ruleText:"ルール 41-2-1\nテクニカルファウルの場合はテクニカルファウルの罰則に従い、１本のフリースローが与えられる。"},
  {id:129,num:"第42条 特別な処置",level:"B",ref:"インプリ 42-2",q:"B１が２ポイントエリアにいるシューターのA１にアンスポーツマンライクファウルをした。ボールが空中にある間に、ショットクロックのブザーが鳴った。ボールはリングに触れなかった。全ての場合において、B１のアンスポーツマンライクファウルは記録される。チームAのショットクロックのバイオレーションは、B１のアンスポーツマンライクファウルの後で起きたため、A１にアンスポーツマンライクの罰則による２本のフリースローを与え、ゲームはショットクロックのバイオレーションが起こったときにボールがあった場所に最も近いアウトオブバウンズからのチームBのスローインで再開される。",ans:false,explanation:"B１のアンスポーツマンライクファウルは記録される。ボールがリングに当たらなかったことによるチームAのショットクロックのバイオレーションは、B１のアンスポーツマンライクファウルの後で起きたとしてなかったものとする。誰もリバウンドの位置に着かずに２本のフリースローがA１に与えられる。",ruleSrc:"インプリ 42-2",ruleText:"インプリ 42-2\nアンスポーツマンライクファウルの後で起きたショットクロックバイオレーションはなかったものとする。"},
  {id:130,num:"第42条 特別な処置",level:"B",ref:"インプリ 42-5",q:"ショットの動作中（アクトオブシューティング）のA１にB１がパーソナルファウルをしショットは成功した。その後チームAのベンチにテクニカルファウルが宣せられた。審判は、A１のゴールを認めた後、まずチームBのヘッドコーチが指定したプレーヤーに１本のフリースローを与え、次にA１に１本のフリースローを与え、通常の最後のフリースローの後と同様にゲームを再開した。",ans:false,explanation:"両方のファウルの罰則は等しく、相殺される。いずれのフリースローも行われず、ゲームは通常のゲームクロックが動いていて、ボールがライブの状態でのゴールが成功した後と同様に再開される。",ruleSrc:"インプリ 42-5",ruleText:"インプリ 42-5\n等しい罰則は相殺される。フリースローは行われない。"},
  {id:131,num:"第42条 特別な処置",level:"B",ref:"インプリ 42-7",q:"ショットの動作（アクトオブシューティング）中のA１にB１がアンスポーツマンライクファウルをしショットは成功した。その後A１はテクニカルファウルを宣せられた。A１のゴールは認められる。誰もリバウンドの位置に着かずに１本のフリースローがチームBのいずれかのプレーヤーに与えられ、誰もリバウンドの位置に着かずに１本のフリースローがA１に与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームAのスローインで再開される。ショットクロックは14秒となる。",ans:true,explanation:"それぞれのファウルの罰則は等しくなく、互いに相殺することはできない。",ruleSrc:"インプリ 42-7",ruleText:"インプリ 42-7\nアンスポーツマンライクファウルとテクニカルファウルの罰則は等しくなく、相殺されない。"},
  {id:132,num:"第42条 特別な処置",level:"B",ref:"インプリ 42-10",q:"ショットクロック残り８秒で、チームBのバックコートにいるB１はドリブルをしているA１にファウルをした。その後B２はテクニカルファウルを宣せられた。B１のファウルがチームB のこのクォーター４個目、B２のテクニカルファウルがチームB のこのクォーター５個目のチームファウルであった。全ての場合において、誰もリバウンドの位置に着かずに１本のフリースローがチームAのいずれかのプレーヤーに与えられる。フリースローのあと、ゲームはフロントコートのA１に対するファウルが起きた場所に最も近いアウトオブバウンズからのチームAのスローインで再開される。ショットクロックは14秒となる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 42-10",ruleText:"インプリ 42-10\n複数のファウルが宣せられた場合の処置。"},
  {id:133,num:"第42条 特別な処置",level:"B",ref:"インプリ 42-14、42-15",q:"B１がドリブルをしているA１にファウルをし、このクォーター５個目のチームファウルであった。コート上で抗争につながりそうな状況が起こった。A６がコートに入ったが積極的に抗争には関わらなかった。A６は抗争の間にコートに入ったことで失格・退場となる。チームAのヘッドコーチはテクニカルファウルを宣せられ「B２」と記入される。チームAのヘッドコーチのテクニカルファウルにより２本のフリースローがチームBのいずれかのプレーヤーに与えられ、２本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。",ans:false,explanation:"誰もリバウンドの位置に着かずに２本のフリースローがA１に与えられ、チームAのヘッドコーチのテクニカルファウルにより２本のフリースローがチームBのいずれかのプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチームBのスローインで再開される。ショットクロックは14秒となる。",ruleSrc:"インプリ 42-14、42-15",ruleText:"インプリ 42-14、42-15\n抗争に関係したファウルと通常のファウルの処置。"},
  {id:134,num:"第42条 特別な処置",level:"A",ref:"インプリ 42-18",q:"チームAのフロントコートでダブルドリブルがA１に宣せられた。チームBのスローインでゲームが再開されるとき、スローインのボールが与えられる前にB２がA２にファウルをし、このクォーター３個目のチームファウルであった。チームBのスローインでボールがライブになる前に起きているため等しい重さの罰則は相殺される。最初の違反が起きる前にチームAがボールをコントロールしており、ゲームはA１のバイオレーションが起きた場所に最も近いアウトオブバウンズからチームAのスローインで再開となり、ショットクロックは継続となる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 42-18",ruleText:"インプリ 42-18\nスローインのボールがライブになる前のファウルの処置。"},
  {id:135,num:"第43条 フリースロー",level:"C",ref:"ルール 43-3-3",q:"最後のフリースローが成功せず、フリースローシューターのチームメイトがバイオレーションを宣せられた場合、それに続くスローインのボールが与えられることになっていた場合を除き、バックボードの真後ろを除く、エンドラインのアウトオブバウンズから行うスローインのボールが相手チームに与えられる。",ans:false,explanation:"最後のフリースローが成功せず、フリースローシューターあるいはそのチームメイトがバイオレーションを宣せられた場合、それに続くスローインのボールが与えられることになっていた場合を除き、フリースローラインの延長線上からのスローインのボールが相手チームに与えられる。",ruleSrc:"ルール 43-3-3",ruleText:"ルール 43-3-3\n最後のフリースローが成功せずバイオレーションがあった場合、フリースローラインの延長線上からのスローインとなる（エンドラインではない）。"},
  {id:136,num:"第43条 フリースロー",level:"C",ref:"インプリ 43-4",q:"A１の最後のフリースローで、A１の手からボールが離れる前にリバウンドの位置を占めているB２が制限区域に入った。その後、A１のフリースローはリングに触れなかった。審判は、B２のバイオレーションが先に起きたため、A１にやり直しのフリースローを与えた。",ans:false,explanation:"最後のフリースローの間に起きたB２とA１のバイオレーションであり、ジャンプボールシチュエーションとなる。",ruleSrc:"インプリ 43-4",ruleText:"インプリ 43-4\n最後のフリースローの間に両チームのバイオレーションが起きた場合、ジャンプボールシチュエーションとなる。"},
  {id:137,num:"第45条 審判・テーブルオフィシャルズ・コミッショナー",level:"D",ref:"ルール 45-1、45-2",q:"審判は、クルーチーフ１人と１人または２人のアンパイアで構成される。テーブルオフィシャルズは、スコアラー、アシスタントスコアラー、タイマーおよびショットクロックオペレーター各１人とする。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 45-1、45-2",ruleText:"ルール 45-1、45-2\n審判はクルーチーフ１人と１人または２人のアンパイアで構成される。テーブルオフィシャルズはスコアラー、アシスタントスコアラー、タイマーおよびショットクロックオペレーター各１人。"},
  {id:138,num:"第46条 クルーチーフ：任務と権限",level:"C",ref:"ルール 46-6、46-7",q:"クルーチーフは、状況に応じてゲームを中断する権限を持つが、ゲームを没収する権限は持っていない。",ans:false,explanation:"クルーチーフは、ゲームを没収する権限を持つ。",ruleSrc:"ルール 46-6、46-7",ruleText:"ルール 46-6、46-7\nクルーチーフは、ゲームを没収する権限を持つ。"},
  {id:139,num:"第46条 クルーチーフ：任務と権限",level:"D",ref:"ルール 46-13",q:"クルーチーフは、第１クォーターおよび第３クォーターが始まる３分前と１分30秒前であることをタイマーから知らされたあと、笛を吹く。また、第２クォーター、第４クォーターおよびオーバータイムが始まる30秒前も同様に、笛を吹く。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 46-13",ruleText:"ルール 46-13\nクルーチーフは第１・第３クォーター開始３分前と１分30秒前に笛を吹く。第２・第４クォーターおよびオーバータイムは30秒前に笛を吹く。"},
  {id:140,num:"第47条 審判：任務と権限",level:"C",ref:"ルール 47-3",q:"審判が規則の違反（ファウルやバイオレーション）を判定するとき、考慮しなければならない基本的な原則の一つとして次がある。「アドバンテージとディスアドバンテージを見極め、１ゲームをとおして相手のプレーを妨げた体の触れ合いだけにファウルを宣する。触れ合いを起こしたプレーヤーが有利にもならず相手チームのプレーヤーも不利になっていないような偶然の体の触れ合いにファウルを宣して、不必要にゲームを止めることは避けなければならない。」",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 47-3",ruleText:"ルール 47-3\nアドバンテージとディスアドバンテージを見極め、相手のプレーを妨げた体の触れ合いだけにファウルを宣する。"},
  {id:141,num:"第47条 審判：任務と権限",level:"D",ref:"ルール 47-7",q:"審判はそれぞれ独自に判定を下す権限を持ち、互いに定められた任務の範囲内で他の審判が下した判定に対しては、取り消したり異議を唱えたりする権限は持たない。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 47-7",ruleText:"ルール 47-7\n審判はそれぞれ独自に判定を下す権限を持ち、他の審判の判定に異議を唱えたりする権限は持たない。"},
  {id:142,num:"第48条 スコアラー：任務",level:"C",ref:"ルール 48-3",q:"スコアシートの記録に誤りが見つかった場合、スコアラーはクルーチーフと協議し、第44条「訂正のできる誤り」の範囲内で修正できる誤りは修正しなくてはならない。また、記録の誤りが第44条「訂正のできる誤り」で規定されている範囲内で発見されなかった場合、その誤りは訂正することができない。クルーチーフあるいはコミッショナー（同席している場合）は、その事実の詳細な報告を大会主催者に提出しなければならない。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 48-3",ruleText:"ルール 48-3\nスコアシートの記録に誤りが見つかった場合、訂正のできる誤りの範囲内で修正する。"},
  {id:143,num:"第49条 タイマー：任務",level:"C",ref:"ルール 49-2",q:"タイマーは、ゲーム開始のジャンプボールのとき、トスのためにクルーチーフの手からボールが離れたときにゲームクロックを動かし始める",ans:false,explanation:"ジャンプボールの場合、正当にジャンパーがボールをタップしたときに、ゲームクロックを動かし始める。",ruleSrc:"ルール 49-2",ruleText:"ルール 49-2\nジャンプボールの場合、正当にジャンパーがボールをタップしたときにゲームクロックを動かし始める。"},
  {id:144,num:"第49条 タイマー：任務",level:"D",ref:"ルール 49-3",q:"タイマーがタイムアウトの時間をはかり始めるときは、スコアラーがタイムアウトの合図を示したときにストップウォッチを動かし始める。",ans:false,explanation:"審判が笛を鳴らしてタイムアウトのシグナルを示したときにストップウォッチを動かし始める。",ruleSrc:"ルール 49-3",ruleText:"ルール 49-3\n審判が笛を鳴らしてタイムアウトのシグナルを示したときにストップウォッチを動かし始める。"},
  {id:145,num:"第50条 ショットクロックオペレーター：任務",level:"C",ref:"ルール 50-1",q:"第１クォーター残り2:43にチームAのバックコートからのサイドスローインでショットクロックは残り23秒を表示していた。スローインをするA１の手から離れたボールがコート内にいるチームBのプレーヤーの手にわずかに当たり、チームAのバックコートのエンドラインに向かってアウトオブバウンズとなった。ゲームクロックは2:40となり、ショットクロックは動かさずに残り23秒で再開となる。",ans:false,explanation:"スローインのときは、スローインされたボールがコート上のプレーヤーに正当に触れたとき、ゲームクロックもショットクロックも動かし始める。",ruleSrc:"ルール 50-1",ruleText:"ルール 50-1\nスローインのときは、スローインされたボールがコート上のプレーヤーに正当に触れたとき、ゲームクロックもショットクロックも動かし始める。"},
  {id:146,num:"第50条 ショットクロックオペレーター：任務",level:"D",ref:"ルール 50-2",q:"チームAがバックコートでコントロールしていたボールを、B２が弾き出してアウトオブバウンズとなった。このときショットクロックは残り19秒を表示していた。ゲームはチームAのバックコートからスローインで再開されることになったので、ショットクロックオペレーターはショットクロックの表示を24秒にリセットした。",ans:false,explanation:"ボールがアウトオブバウンズになり、それまでボールをコントロールしていたチームに引き続きスローインが与えられるときは、残り時間がはっきりと表示されている状態でショットクロックは止めるがリセットはしない。",ruleSrc:"ルール 50-2",ruleText:"ルール 50-2\nそれまでボールをコントロールしていたチームに引き続きスローインが与えられるときは、ショットクロックは止めるがリセットはしない。"},
  {id:147,num:"第50条 ショットクロックオペレーター：任務",level:"C",ref:"ルール 50-2",q:"チームAがバックコートでボールをコントロールしているとき、A１が怪我のためにプレーをすることができなくなり審判がゲームを止めた。このときショットクロックは残り19秒を表示していた。ゲームはチームAのバックコートからスローインで再開されることになったので、ショットクロックオペレーターはショットクロックの表示を24秒にリセットした。",ans:false,explanation:"ボールをコントロールしているチームのプレーヤーの怪我で審判がゲームを止めたとき、ショットクロックはリセットせず、継続される。",ruleSrc:"ルール 50-2",ruleText:"ルール 50-2\nボールをコントロールしているチームのプレーヤーの怪我で審判がゲームを止めたとき、ショットクロックはリセットせず、継続される。"},
  {id:148,num:"第50条 ショットクロックオペレーター：任務",level:"C",ref:"ルール 50-2",q:"ボールがリングとバックボードの間に挟まりジャンプボールシチュエーションになった。それまでボールをコントロールしていたチームに引き続きスローインが与えられる場合は、ショットクロックは止めるがリセットはしない。",ans:false,explanation:"ジャンプボールシチュエーションになったとき、それまでボールをコントロールしていたチームに引き続きスローインが与えられる場合は、ショットクロックは止めるがリセットはしない。ただし、ボールがリングとバックボードの間に挟まったときは、ショットクロックは14秒となる。",ruleSrc:"ルール 50-2",ruleText:"ルール 50-2\nボールがリングとバックボードの間に挟まったときは、ショットクロックは14秒となる（例外）。"},
  {id:149,num:"第50条 ショットクロックオペレーター：任務",level:"D",ref:"ルール 50-3",q:"フリースローを行うとき、ショットクロックオペレーターはショットクロックを止めて24秒にリセットし、秒数を表示しない。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 50-3",ruleText:"ルール 50-3\nフリースローを行うとき、ショットクロックオペレーターはショットクロックを止めて24秒にリセットし、秒数を表示しない。"},
  {id:150,num:"第50条 ショットクロックオペレーター：任務",level:"C",ref:"ルール 50-4",q:"パスのボールがリングに触れたあと、それまでボールをコントロールしていたチームが再びボールのコントロールを得たとき、ショットクロックははっきりと表示されている状態で14秒にリセットする。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 50-4",ruleText:"ルール 50-4\nパスのボールがリングに触れたあと、同じチームが再びボールのコントロールを得たとき、ショットクロックは14秒にリセットする。"},
  {id:151,num:"別添資料B スコアシート",level:"C",ref:"ルール B8-3-10",q:"両チームに科される罰則の重さが等しくて第42条「特別な処置をする場合」に従って罰則の適用が相殺され、それぞれのフリースローが与えられなくなったファウルは、P、T、C、B、U、Dの後ろに小さい×をつける。",ans:false,explanation:"P、T、C、B、U、Dの後ろに小さい「c」をつける。",ruleSrc:"ルール B8-3-10",ruleText:"ルール B8-3-10\n相殺されたファウルは、P、T、C、B、U、Dの後ろに小さい「c」をつける（×ではなく「c」）。"},
  {id:152,num:"別添資料F IRS F-2 基本原則",level:"A",ref:"インプリ F-2.5、F-2.7",q:"B１はアンスポーツマンライクファウルを宣せられた。チームBのヘッドコーチはタイムアウトを申請した。審判はB１のファウルがアンスポーツマンライクファウルであったかどうかに確証がなかった。B６はB１との交代を申し出た。IRSレビューの間にB６はチームベンチに戻った。B６の交代や、チームBのヘッドコーチのタイムアウトの申請は、審判が最終的な判定を示すまで認められない。レビューの間、審判が最終的な判定を示し、タイムアウトが認められるまでは、交代の申し出をいつでも取り下げることができる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ F-2.5、F-2.7",ruleText:"インプリ F-2.5、F-2.7\nIRSレビューの間は、審判が最終的な判定を示すまで、交代やタイムアウトの申請は認められない。交代の申し出はいつでも取り下げることができる。"},
  {id:153,num:"別添資料F IRS F-3.3",level:"A",ref:"インプリ F-3.3.15",q:"第２クォーター残り57.8秒、ショットクロック残り0.7秒で、A１はスリーポイントのショットをし、成功しなかった。そのあと、A２がバスケットの近くで新たなボールのコントロールを得た。そのとき、審判はショットクロックに何も表示されていないことに気づいたため、速やかにゲームを止めた。IRSレビューで、ボールがリングに触れていた場合、ショットクロックバイオレーションは起きていない。ゲームはフロントコートのエンドラインの外側のアウトオブバウンズからチームAのスローインで再開される。ショットクロックは14秒となる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ F-3.3.15",ruleText:"インプリ F-3.3.15\nIRSレビューでボールがリングに触れていた場合、ショットクロックバイオレーションは起きていない。"},
  {id:154,num:"別添資料F IRS F-3.3",level:"A",ref:"インプリ F-3.3.24",q:"A１がドリブルをしているとき、A２がB２に肘打ちをした。審判はA２のファウルを宣さなかったが、その５秒後A１がドリブルをし続けているときに、暴力行為の可能性のある事象をIRSレビューするため、ゲームを止めた。レビューで、A２がB２に肘打ちをしていたため、審判はA２にアンスポーツマンライクファウルを宣することができる。誰もリバウンドの位置につかずに２本のフリースローがB２に与えられ、ゲームは止められた場所に最も近いアウトオブバウンズからチームAのスローインで再開される。ゲームクロックとチームAのショットクロックは止められた時点から継続となる。",ans:true,explanation:"問題文のとおり。アンスポーツマンライクファウルの罰則の一部であるスローインは、A２のファウルの後で起きた更なる事象によって取り消される。",ruleSrc:"インプリ F-3.3.24",ruleText:"インプリ F-3.3.24\nIRSレビューで暴力行為が確認された場合、アンスポーツマンライクファウルを宣せられる。"},
  {id:155,num:"別添資料F IRS F-4 ヘッドコーチチャレンジ",level:"A",ref:"インプリ F-4.14",q:"A１はスリーポイントゴールで得点した。このとき、チームBはタイムアウトを請求した。タイムアウトの最中でチームBのヘッドコーチはショットが放たれる前にA１はスリーポイントラインを踏んでいたと考え、適切な手続きでヘッドコーチチャレンジを請求した。チームBのヘッドコーチチャレンジは認められる。成功したゴールで２点あるいは３点のどちらが認められるかを判定するためにIRSレビューを行うことができる。タイムアウトは中断され、ヘッドコーチチャレンジのレビューの後にタイムアウトが継続される。",ans:false,explanation:"タイムアウトは中断せずに最後まで続けられる。ヘッドコーチチャレンジのレビューはタイムアウトの後で行われる。",ruleSrc:"インプリ F-4.14",ruleText:"インプリ F-4.14\nタイムアウトは中断せずに最後まで続けられる。ヘッドコーチチャレンジのレビューはタイムアウトの後で行われる。"},
  {id:156,num:"第12条 ジャンプボール",level:"B",ref:"インプリ 12-27",q:"A１のショットのボールが空中にある間にショットクロックのブザーが鳴った。その後ボールはリングに触れず直後にヘルドボールが宣せられた。チームAのショットクロックには時間が残っておらず、ショットクロックバイオレーションを適用した。オルタネイティングポゼッションアローの示す方向は関係なく、ゲームは最初に宣したヘルドボールが起きた場所に最も近いアウトオブバウンズからチームBのスローインで再開される。ショットクロックは24秒となる。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 12-27",ruleText:"インプリ 12-27\nショットクロックバイオレーション後のヘルドボールでは、ショットクロックバイオレーションを優先し、チームBのスローインで再開される。"},
  {id:157,num:"第16条 得点",level:"B",ref:"インプリ 16-10",q:"スローインをするA１がフロントコートでボールをパスした。その後ボールはチームAのフロントコートでスリーポイントエリアにいるいずれかのプレーヤーに正当に触れられ、バスケットに入った。審判はチームAの２点を認めた。",ans:true,explanation:"ボールはスローインから放たれているため、２点が認められる。プレーヤーがボールに触れたことは正当である。３点が認められるのはショットもしくはパスのボールがコート上でスリーポイントラインの外側から放たれたときのみである。",ruleSrc:"インプリ 16-10",ruleText:"インプリ 16-10\nスローインから放たれたボールがバスケットに入った場合、２点が認められる。"},
  {id:158,num:"第17条 スローイン",level:"C",ref:"インプリ 17-21",q:"第４クォーター残り1:18で、チームAはバックコートからのスローインを与えられた。このときタイムアウトがチームAに認められた。タイムアウトのあと、チームAのヘッドコーチはフロントコートのスローインラインからのスローインを選択した。スローインが行われる前に、チームBのヘッドコーチがタイムアウトを請求した。フロントコートからスローインを行うというチームAのヘッドコーチの選択は最終的なものでゲームクロックが再び動き始めるまでは変更することはできない。",ans:true,explanation:"問題文のとおり。フロントコートからスローインを行うというチームAのヘッドコーチの選択は最終的なものでゲームクロックが再び動き始めるまでは変更することはできない。",ruleSrc:"インプリ 17-21",ruleText:"インプリ 17-21\nフロントコートからスローインを行うというヘッドコーチの選択は最終的なものでゲームクロックが再び動き始めるまでは変更することはできない。"},
  {id:159,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-13",q:"B１がドリブルをしているA１をディフェンスした。A１はB１を押した上で、あたかもB１にファウルをされたかのような印象を与えようと頭部を急に動かした。審判はA１にファウルを宣した。すでにA１のファウルを宣しているため、加えてフェイクの警告は与えない。",ans:false,explanation:"A１のファウルに加えて、審判はA１にフェイクの警告（これがチームAの最初のフェイクで、過度なフェイクではない場合）を与える、もしくはテクニカルファウル（チームAがすでにフェイクの警告を与えられている、もしくは最初でも過度なフェイクであった場合）を宣する。",ruleSrc:"インプリ 36-13",ruleText:"インプリ 36-13\nファウルを宣した場合でも、フェイクに対する警告またはテクニカルファウルを加えることができる。"},
  {id:160,num:"第36条 テクニカルファウル",level:"B",ref:"インプリ 36-16",q:"B１がドリブルをしているA１をディフェンスした。B１はあたかもA１にファウルをされたかのような印象を与えようとコート上に倒れた。ほとんど同時にA１はあたかもB１にファウルをされたかのような印象を与えようと頭部を急に動かした。審判はA１とB１の両方にフェイクの警告（これがチームの最初のフェイクで、過度なフェイクではない場合）を与える、もしくはテクニカルファウル（チームがすでにフェイクの警告を与えられている、もしくは最初でも過度なフェイクであった場合）を宣する。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 36-16",ruleText:"インプリ 36-16\n両方のプレーヤーにフェイクの警告またはテクニカルファウルを宣する。"},
  {id:161,num:"第44条 訂正のできる誤り",level:"B",ref:"ルール 44-3-2",q:"カテゴリー1の訂正のできる誤りはゲームの終了を知らせるゲームクロックのブザーが鳴り、ボールがデッドとなった後では訂正することはできない。ただし、誤りが、最後に審判が何らかの理由でゲームを止めたときからゲームの終了を知らせるゲームクロックのブザーが鳴るまでの間に起きた場合、この誤りはゲーム終了後速やかに訂正され、チームはコートもしくはチームベンチエリアにとどまらなければならない。",ans:true,explanation:"問題文のとおり。",ruleSrc:"ルール 44-3-2",ruleText:"ルール 44-3-2\nカテゴリー1の訂正のできる誤りは、最後に審判がゲームを止めてからゲーム終了までの間に起きた場合、ゲーム終了後速やかに訂正できる。"},
  {id:162,num:"第44条 訂正のできる誤り",level:"C",ref:"インプリ 44-5",q:"第４クォーター残り1:14で、B１がツーポイントゴールのショットの動作（アクトオブシューティング）中のA１にファウルをし、ショットは成功しなかった。審判は誤ってA１に２点と１本のフリースローを与えた。この誤りが第４クォーターと最初のオーバータイムの間のプレーのインターバル中に認識された。誤りは訂正できる。",ans:false,explanation:"誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。",ruleSrc:"インプリ 44-5",ruleText:"インプリ 44-5\n誤りを訂正できる時機を過ぎているため、誤りは訂正できない。"},
  {id:163,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-7",q:"第２クォーター残り3:37で、B１がA１にファウルをし、このクォーター４個目のチームファウルであった。審判は誤って２本のフリースローをA１に与えた。この誤りが、第４クォーター残り4:48で認識された。誤りは訂正できる。成否にかかわらず、フリースローは取り消される。ゲームは誤りの訂正のために止められた場所に最も近いところから再開される。",ans:true,explanation:"問題文のとおり。",ruleSrc:"インプリ 44-7",ruleText:"インプリ 44-7\n第２クォーターの誤りが第４クォーター残り4:48で認識された場合は訂正できる。フリースローは取り消される。"},
  {id:164,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-12",q:"第３クォーターで、B２がドリブルをしているA１にファウルをし、このクォーター５個目のチームファウルであった。２本のフリースローがA１に与えられたが、１本目のフリースローを失敗したあと、B１がリバウンドのボールを取り、ゲームは誤って続行された。この誤りが、第４クォーター残り2:54で認識された。審判は誤りを訂正するため、２本目のフリースローがA１に与えられる。しかしA１は５個のファウルを宣せられているため、チームAのヘッドコーチが指定したプレーヤーにフリースロー１本を与えることにした。フリースローは誰もリバウンドの位置に着かずに行われ、ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。",ans:true,explanation:"A１が５個のファウルを宣せられていたり、失格・退場となっていたりした場合、チームAのヘッドコーチはフリースローシューターを指定する。",ruleSrc:"インプリ 44-12",ruleText:"インプリ 44-12\nA１が５個のファウルを宣せられていた場合、チームAのヘッドコーチはフリースローシューターを指定する。"},
  {id:165,num:"第44条 訂正のできる誤り",level:"B",ref:"インプリ 44-15",q:"第３クォーター残り３秒で、B１がショットの動作（アクトオブシューティング）中のA１にファウルをした。２本のフリースローがA１に与えられたが、A１の代わりにA２がフリースローを行った。第３クォーターが終了し、この誤りが第４クォーターでボールがライブとなったあと、ゲームクロックに2:00が表示される前に認識された。誤りを訂正できる時機を過ぎている。誤りは訂正できず、なかったものとする。ゲームは続行される。",ans:false,explanation:"誤りは訂正できる。A２の２本のフリースローは取り消される。ゲームは誤りの訂正のために止められた場所に最も近いアウトオブバウンズから再開される。",ruleSrc:"インプリ 44-15",ruleText:"インプリ 44-15\nゲームクロックに2:00が表示される前に認識された場合は訂正できる。"},
