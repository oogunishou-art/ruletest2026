は 14 秒となる。\n\n29/50-38   例：A１がショットをし、ボールはリングに触れた。そのあと\n           ⒜B1 がボールに触れた。\n           ⒝A2 がボールをタップした。\n           そして、A3 がボールのコントロールを得た。\n\n解説：どちらの場合においても、A３がコート上のいずれかの場所でボールのコントロールを得\n           たとき、ショットクロックは 14 秒となる。\n\n29/50-39   例：A１がショットをし、ボールはリングに触れた。B１がボールに触れ、ボールはアウトオブバウ\n           ンズに出た。\n           解説：ゲームはボールがアウトオブバウンズに出た場所に最も近いアウトオブバウンズからチー\n           ム A のスローインで再開される。スローインが行われる場所にかかわらず、ショットクロックは 14 秒となる。\n\n29/50-40   例：ショットクロック残り 4 秒で、A１がショットクロックをリセットするためにボールをリングに向か\n           って投げた。ボールはリングに触れ、その後 B１がボールに触れて、ボールはチーム A のバックコ\n           ートのアウトオブバウンズに出た。\n           解説：ゲームはバックコートのボールがアウトオブバウンズに出た場所に最も近いアウトオブバウ\n           ンズからチーム A のスローインで再開される。ショットクロックは 14 秒となる。\n\n29/50-41   例：ショットクロック残り 6 秒で、A1 がショットをした。ボールはリングに触れ、A2 がボールのコ\n           ントロールを得た。リバウンドの間に B２が A２にファウルをし、このクォーター3 個目のチームフ\n           ァウルであった。\n           解説：ゲームは B２のファウルが起きた場所に最も近いアウトオブバウンズからチーム A のスロ\n           ーインで再開される。ショットクロックは 14 秒となる。\n\n29/50-42   例：A１がショットをした。ボールはリングに触れ、リバウンドで A２と B２の間でヘルドボールが\n           起きた。オルタネイティングポゼッションアローはチーム A を示している。\n           解説：ゲームはヘルドボールが起きた場所に最も近いアウトオブバウンズからチーム A のスロー\n           インで再開される。ショットクロックは 14 秒となる。\n\n29/50-43   例：ショットクロック残り、\n           ⒜８秒で\n           ⒝17 秒で\n           A１がショットをし、ボールがリングとバックボードの間に挟まった。オルタネイティングポゼッションア\n           ローはチーム A を示している。\n           解説：どちらの場合においても、ゲームはフロントコートのバックボードに最も近いエンドラインか\n           らチーム A のスローインで再開される。ショットクロックは 14 秒となる。\n\n29/50-44   例：フロントコートにいる A１が A２にアリウープのパスをしたが A２はボールをキャッチできな\n           かった。ボールはリングに触れ、その後 A３がチーム A の\n           ⒜フロントコートで\n           ⒝バックコートで\n\nボールのコントロールを得た。\n           解説：\n           ⒜チーム A のショットクロックは 14 秒となる。\n           ⒝チーム A はボールのコントロールを失っていないため、チーム A のバックコートバイオレーション\n            となる。\n\n29/50-45   例：A１のショットのボールがリングに触れた。B１がリバウンドのボールを取り、コートに着地し\n           た。A２が B１の手からボールを弾き、A３がボールをキャッチした。\n           解説：チーム B(B1)がリバウンドの間に明らかなボールのコントロールを得て、そのあとチーム\n           A(A3)が新たにコントロールを得ている。チーム A のショットクロックは 24 秒となる。\n\n29/50-46   例：ショットクロック残り 5 秒で、スローインを行う A１がチーム B のバスケットに向かってボール\n           をパスした。ボールはリングに触れ、その後 A２あるいは B２、もしくはその両方がボールに触れ\n           たが、どちらもコントロールできなかった。\n           解説：ゲームクロックとショットクロックは、ボールがコート上でどちらかのプレーヤーに触れた、も\n           しくは触れられたとき、動かし始められる。\n           その後チーム A がコート上でボールのコントロールを得た場合、ショットクロックは 14 秒となる。\n           その後チーム B がコート上でボールのコントロールを得た場合、ショットクロックは 24 秒となる。\n\n29/50-47 条文：ゲーム中、ゲームクロックが動いている間に、チームがフロントコートあるいはバックコート\n           で新たなライブのボールのポゼッションを得たとき、ショットクロックは24秒となる。\n\n29/50-48   例：ゲームクロックが動いている間に、A１がコート上で新たにボールのポゼッションを得たのは、\n           ⒜バックコートであった。\n           ⒝フロントコートであった。\n           解説：どちらの場合においても、ショットクロックは 24 秒となる。\n\n29/50-49   例：チーム B のスローインのあと、A１がコート上で速やかかつ明らかに新たなボールのポゼッ\n           ションを得た。それはチーム A の\n           ⒜バックコートであった。\n           ⒝フロントコートであった。\n           解説：どちらの場合においても、ショットクロックは 24 秒となる。\n\n29/50-50 条文：ボールをコントロールしているチームのファウルあるいはバイオレーション（ボールがアウト\n           オブバウンズになるバイオレーションを含む）により審判がゲームを止めた。フロントコートからの\n           スローインが相手チームに与えられる場合、ショットクロックは14秒となる。\n\n29/50-51   例：バックコートで A１が A２にボールをパスした。A２はボールに触れたがキャッチできず、ボ\n           ールはチーム A のバックコートのアウトオブバウンズに出た。\n           解説：ゲームはチーム B のフロントコートのボールがアウトオブバウンズに出た場所に最も近い\n           アウトオブバウンズからチーム B のスローインで再開される。ショットクロックは 14 秒となる。\n\n29/50-52 条文：ゲームクロック残り24秒未満で、チームがコート上でライブのボールのコントロールを得\n           たり、取り戻したりした場合、ショットクロックには何も表示しない。\n           ボールが相手チームのバスケットのリングに触れたあと、ゲームクロックの残り時間が24秒未満\n           および14秒以上で、オフェンスのチームがコート上でライブのボールのコントロールを取り戻した\n           場合、ショットクロックは14秒となる。ゲームクロックが14秒以下の場合、ショットクロックには何も\n           表示しない。\n\n29/50-53   例：ゲームクロック残り 12 秒で、スローインをする A1 が新たにボールのポゼッションを得た。\n           解説：ショットクロックには何も表示しない。\n\n29/50-54   例：ゲームクロック残り 23 秒で、A１がコート上で新たなボールのコントロールを得た。ゲーム\n           クロック残り 18 秒で、チーム B のバックコートにいる B１が意図的にボールを蹴った。\n           解説：ゲームはチーム A のフロントコートの B１がボールを蹴った場所に最も近いアウトオブバ\n           ウンズからチーム A のスローインで再開される。ゲームクロックには 18 秒が表示され、ショットクロ\n           ックには何も表示しない。\n\n29/50-55   例：ゲームクロック残り 23 秒で、A１がコート上で新たなボールのコントロールを得た。ショット\n           クロックには何も表示されていない。ゲームクロック残り 19 秒で、A１がショットをし、ボールはリ\n           ングに触れた。ゲームクロック残り 16 秒で、A２がリバウンドのボールを取り、チーム A がボール\n           のコントロールを取り戻した。\n           解説：ゲームはゲームクロック残り 16 秒で続行となる。ショットクロックは表示される。チーム A\n           がボールのコントロールを取り戻したとき、ゲームクロックは 14 秒を超えていたため、ショットクロ\n           ックは 14 秒となる。\n\n29/50-56   例：ゲームクロック残り 23 秒で、A１がコート上で新たなボールのコントロールを得た。ショット\n           クロックには何も表示されていない。ゲームクロック残り 15 秒で、A１がショットをした。ボールは\n           リングに触れ、チーム B のバックコートで B1 がボールをアウトオブバウンズに弾き出した。ゲーム\n           クロックは残り 12 秒であった。\n           解説：ゲームクロック残り 12 秒で、ゲームはチーム A のフロントコートのボールがアウトオブバ\n           ウンズに出た場所に最も近いアウトオブバウンズからチーム A のスローインで再開される。チーム\n           A がボールのコントロールを取り戻したとき、ゲームクロックは 14 秒未満であったため、ショットク\n           ロックには引き続き何も表示しない。\n\n29/50-57   例：ゲームクロック残り 22 秒で、A１がコート上で新たなボールのコントロールを得た。ショット\n           クロックには何も表示されていない。ゲームクロック残り 18 秒で、A１がショットをした。ボールは\n           リングに触れず\n           ⒜ゲームクロック残り 15.5 秒で\n           ⒝ゲームクロック残り 12 秒で\n           チーム B のバックコートで B1 がボールをアウトオブバウンズに弾き出した。\n           解説：ゲームはチーム A のフロントコートのボールがアウトオブバウンズに出た場所に最も近い\n           アウトオブバウンズからチーム A のスローインで再開され、ゲームクロックは継続となる。チーム A\n           はゲームクロック残り 24 秒未満で新たなボールのチームコントロールを得ており、ショットクロック\n           には引き続き何も表示しない。\n\n\n第 30 条 ボールをバックコートに返すこと\n――――――――――――――――――――――――――――――――――――――――――\n30-１ 条文：プレーヤーが空中にいるときは、ジャンプをする前に最後に触れていたコートにいるものとみ\n       なされる。\n       しかし、プレーヤーがフロントコートからジャンプして空中にいる間に新たなボールのチームコントロー\n       ルを得たとき、その後プレーヤーはコート上のどこにでもボールを持って着地することができる。ただ\n       し、着地する前にバックコートにいるチームメイトにボールをパスすることはできない。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-2", "body": "30-２   例：バックコートにいる A１がフロントコートにいる A２にボールをパスした。B１は自チームのフロン\n       トコートからジャンプして空中にいる間にボールをキャッチし、\n       ⒜両足でバックコートに着地した。\n       ⒝センターラインをまたいで着地した。\n       ⒞センターラインをまたいで着地したあと、バックコートに向かってドリブルあるいはパスをした。\n       解説：チーム B のバックコートバイオレーションではない。B１は空中にいる間に新たなボールのチー\n       ムコントロールを確立し、コート上のどこにでも着地することができる。全ての場合において、B１は\n       正当にバックコートにいる。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-3", "body": "30-３   例：A１と B１の間でのゲーム開始のジャンプボールでボールは正当にタップされた。A２はフロント\n       コートからジャンプして空中にいる間にボールをキャッチし、\n       ⒜両足でバックコートに着地した。\n       ⒝センターラインをまたいで着地した。\n       ⒞センターラインをまたいで着地したあと、バックコートに向かってドリブルあるいはパスをした。\n       解説：A２のバックコートバイオレーションではない。A２は空中にいる間に最初のボールのチームコ\n       ントロールを確立し、コート上のどこにでも着地することができる。全ての場合において、A２は正当\n       にバックコートにいるとみなされる。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-4", "body": "30-４   例：フロントコートでスローインを行う A１が A２にボールをパスした。A２はフロントコートからジャン\n       プして空中にいる間にボールをキャッチし、\n       ⒜両足でバックコートに着地した。\n       ⒝センターラインをまたいで着地した。\n       ⒞センターラインをまたいで着地したあと、バックコートに向かってドリブルあるいはパスをした。\n       解説：チーム A のバックコートバイオレーションである。A２が空中にいる間にボールをキャッチしてバ\n       ックコートに着地する前に、スローインを行う A１はフロントコートでボールのチームコントロールを確\n       立している。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-5", "body": "30-５   例：バックコートでスローインを行う A１が A２にボールをパスした。B１はフロントコートからジャンプ\n       して空中にいる間にボールをキャッチし、バックコートに着地する前にバックコートにいる B２にボール\n       をパスした。\n       解説：チーム B のバックコートバイオレーションである。B１がフロントコートからジャンプして空中にい\n       る間に新たなボールのチームコントロールを得たとき、コート上のどこにでも着地することができる。し\n       かし、着地する前にバックコートにいるチームメイトにボールをパスすることはできない。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-6", "body": "30-６   例：A１と B１の間でのゲーム開始のジャンプボールでボールはフロントコートにいる A２に向けて\n       正当にタップされた。A２はジャンプして空中にいる間にボールをキャッチし、コート上に着地する前に\n       バックコートにいる A１にボールをパスした。\n       解説：チーム A のバックコートバイオレーションである。空中にいる A２は両手にボールを持ったまま\n       バックコートに着地することができるが、バックコートにいるチームメイトにボールをパスすることはできない。\n\n30-７ 条文：フロントコートにいるチームAのプレーヤーが明らかなボールのコントロールを得たあと、ボール\n       をバックコートに触れさせ、チームAのプレーヤーがフロントコートまたはバックコートのいずれかでその\n       ボールに最初に触った場合、ライブのボールが不当にバックコートに返ったとみなされる。しかし、バッ\n       クコートにいるチームAのプレーヤーが、ボールをフロントコートに触れさせたあと、チームAのプレーヤ\n       ーがフロントコートまたはバックコートのいずれかでそのボールに最初に触れることは正当である。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-8", "body": "30-８   例：A１と A２がセンターライン近くのフロントコートに両足を着けて立っている。A１は A２にバウ\n       ンスパスをした。パスされたボールはチーム A のバックコートに触れたあと、フロントコートにいる A２に\n       触れた。\n       解説：チーム A のバックコートバイオレーションである。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-9", "body": "30-９   例：センターラインの近くでバックコートに両足を着けて立っている A１が、同じくセンターラインの近\n       くでバックコートに両足を着けて立っている A２にバウンスパスをした。パスされたボールはチーム A の\n       フロントコートに触れたあと、A２に触れた。\n\n解説：チーム A のプレーヤーは誰もフロントコートでボールをコントロールしていないため、チーム A\n        のバックコートバイオレーションではない。しかし、ボールがチーム A のフロントコートに触れたとき、8\n        秒は数え終わる。バックコートにいる A２がボールに触れたらすぐに新たな 8 秒が数え始められる。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-10", "body": "30-10   例：バックコートにいる A１がフロントコートに向かってボールをパスした。ボールはコート上でセンター\n        ラインをまたいで立っている審判に触れ、まだバックコートにいる A２がボールに触れた。\n        解説：チーム A のプレーヤーは誰もフロントコートでボールをコントロールしていないため、チーム A\n        のバックコートバイオレーションではない。しかし、ボールがセンターラインをまたいでいる審判に触れた\n        とき、8 秒は数え終わる。バックコートにいる A２がボールに触れたらすぐに新たな 8 秒が数え始めら\n        れる。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-11", "body": "30-11   例：チーム A がフロントコートでボールをコントロールしているとき、A１と B１が同時にボールに触れ\n        た。その後ボールはチーム A のバックコートに転がり、A２が最初にボールに触れた。\n        解説：チーム A のバックコートバイオレーションである。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-12", "body": "30-12   例：A１はバックコートからフロントコートへドリブルをし、両足はフロントコートに入ったが、ボールは\n        まだバックコートでドリブルをしていた。その後ボールは A１の脚に触れて転がり、バックコートで A２\n        がドリブルを始めた。\n        解説：チーム A の正当なプレーである。A１はまだフロントコートでボールのコントロールを確立して\n        いない。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-13", "body": "30-13   例：バックコートにいる A１がフロントコートにいる A２にボールをパスした。A２はボールに触れたが\n        コントロールせず、ボールはまだバックコートにいる A１に戻った。\n        解説：チーム A の正当なプレーである。A２はまだフロントコートでボールのコントロールを確立して\n        いない。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-14", "body": "30-14   例：フロントコートでスローインを行う A１が A２にボールをパスした。A２はフロントコートからジャン\n        プして、空中にいる間にボールをキャッチし、右足をまだ空中に浮かせたまま左足でコート上のフロン\n        トコートに着地した。そのあと、A２は右足をバックコートに着いた。\n        解説：チーム A のバックコートバイオレーションである。スローインを行う A１はすでにフロントコート\n        でボールのチームコントロールを確立している。"}, {"type": "impl", "art_no": "30", "art_title": "ボールをバックコートに返すこと", "sec_no": "30-15", "body": "30-15   例：A１がセンターライン近くのフロントコートでドリブルをしているとき、B１がボールをチーム A のバ\n        ックコートに弾いた。まだフロントコートに両足を着いている A１がバックコートでドリブルを続けた。\n        解説：チーム A の正当なプレーである。A１はフロントコートでボールに触れた最後のプレーヤーで\n        はない。A１は完全にバックコートに入ってドリブルを続けることもでき、新たな 8 秒が数え始められる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "30-16", "body": "30-16   例：バックコートにいる A１が A２にボールをパスした。A２はフロントコートからジャンプして空中に\n        いる間にボールをキャッチし、\n        ⒜両足でバックコートに着地した。\n        ⒝センターラインに触れて着地した。\n        ⒞センターラインをまたいで着地した。\n        解説：全ての場合において、チーム A のバックコートバイオレーションである。A２は空中にいる間に\n        フロントコートでボールのチームコントロールを確立している。\n\n\n第 31 条 ゴールテンディング、インタフェアレンス\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-1", "body": "31-１    条文：ゲームクロックが動いていて、ボールがライブの状態でのショットあるいはフリースローの間に\n        ボールがリングよりも上にあるとき、プレーヤーがバスケットの下から手を入れてボールに触れること\n        は、インタフェアレンスである。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-2", "body": "31-２    例：A１の最後のフリースローで、\n        ⒜ボールがリングに触れる前に、\n        ⒝ボールがリングに触れたあと、まだバスケットに入る可能性を残している状況で、\n        B１がバスケットの下から手を入れてボールに触れた。\n        解説：どちらの場合においても、B１のインタフェアレンスのバイオレーションである。A１は 1 点を与\n        えられる。\n        ⒜B１はテクニカルファウルを宣せられる。\n        ⒝B１はテクニカルファウルを宣せられない。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-3", "body": "31-３    条文：パスの間あるいはボールがリングに触れた後で、ボールがリングよりも上にあるとき、プレーヤ\n        ーがバスケットの下から手を入れてボールに触れることは、インタフェアレンスである。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-4", "body": "31-４    例：コート上の A１がパスをしたボールがリングよりも上にあり、B１がバスケットの下から手を入れ\n        てボールに触れた。\n        解説：B１のインタフェアレンスのバイオレーションである。2 点もしくは 3 点が A１に与えられる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-5", "body": "31-５    条文：最後のフリースローが不成功でボールがリングに触れた。その後いずれかのプレーヤーが正\n        当にボールに触れ、ボールがバスケットに入った場合、フリースローはツーポイントゴールとなる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-6", "body": "31-６    例：A１の最後のフリースローで、ボールはリングから跳ね返った。B１がボールを弾き出そうとした\n        が、ボールはバスケットに入った。\n        解説：自チームのバスケットにボールを誤ってタップすることは正当なプレーである。2 点がチーム A\n        のコート上のキャプテンに与えられる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-7", "body": "31-７    条文：\n        ・ゲームクロックが動いていて、ボールがライブの状態でのショットで\n        ・不成功の最後のフリースローで\n        ・クォーターやオーバータイムの終了を知らせるゲームクロックのブザーが鳴ったあと\n        ボールがリングに触れ、まだバスケットに入る可能性を残している状況でファウルが宣せられた。\n        その後いずれかのプレーヤーがボールに触れた場合、バイオレーションである。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-8", "body": "31-８    例：A１の最後のフリースローのあと、ボールはリングから跳ね返った。リバウンドで B２が A２にファ\n        ウルをし、このクォーター3 個目のチームファウルであった。ボールはまだバスケットに入る可能性を残\n        している状況で、\n        ⒜A３がボールに触れた。\n        ⒝B３がボールに触れた。\n        解説：どちらの場合においても、A３あるいは B３のインタフェアレンスのバイオレーションである。\n        ⒜得点は与えられない。両方のスローインの罰則は互いに相殺される。ゲームはバックボードの真\n         後ろを除いたファウルが起きた場所に最も近いエンドラインからオルタネイティングポゼッションのスロ\n         ーインで再開される。\n        ⒝1 点が A１に与えられる。B２のファウルの結果として、ゲームはバックボードの真後ろを除いたフ\n         ァウルが起きた場所に最も近いエンドラインからチーム A のスローインで再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-9", "body": "31-９    例：A１の最後のフリースローのあと、ボールはリングから跳ね返った。リバウンドで B２が A２にファ\n        ウルをし、このクォーター5 個目のチームファウルであった。ボールはまだバスケットに入る可能性を残\n        している状況で、\n        ⒜A３がボールに触れた。\n        ⒝B３がボールに触れた。\n        解説：どちらの場合においても、A３あるいは B３のインタフェアレンスのバイオレーションである。\n        ⒜得点は与えられない。\n        ⒝1 点が A１に与えられる。\n        どちらの場合においても、B2 のファウルの罰則として 2 本のフリースローが A2 に与えられる。ゲーム\n        は通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-10", "body": "31-10   例：A１の最後のフリースローのあと、ボールはリングから跳ね返った。リバウンドで A２が B２にファ\n        ウルをし、このクォーター5 個目のチームファウルであった。ボールはまだバスケットに入る可能性を残\n        している状況で、\n        ⒜A３がボールに触れた。\n        ⒝B３がボールに触れた。\n\n解説：どちらの場合においても、A３あるいは B３のインタフェアレンスのバイオレーションである。\n        ⒜得点は与えられない。\n        ⒝1 点が A１に与えられる。\n        どちらの場合においても、A２のファウルの結果として、2 本のフリースローが B２に与えられ、ゲーム\n        は通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-11", "body": "31-11   例：A１の最後のフリースローのあと、ボールはリングから跳ね返った。リバウンドで A２と B２の間\n        でダブルファウルが起きた。ボールはまだバスケットに入る可能性を残している状況で、\n        ⒜A３がボールに触れた。\n        ⒝B３がボールに触れた。\n        解説：どちらの場合においても、A３あるいは B３のインタフェアレンスのバイオレーションである。ファ\n        ウルはスコアシートの各プレーヤーに記入される。\n        ⒜得点は与えられない。ゲームはバ ッ ク ボ ー ド の真後ろを除いたファウルが起きた場所に最も近い\n         エンドラインからオルタネイティングポゼッションのスローインで再開される。\n        ⒝1 点が A１に与えられる。ゲームは通常の最後のフリースローが成功した後と同様にエンドライン\n         の後方の任意のアウトオブバウンズからチーム B のスローインで再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-12", "body": "31-12   例：ゲームクロックが動いていて、ボールがライブの状態で A１がショットをした。ボールがリングから\n        跳ね返り、まだバスケットに入る可能性を残しているときに第 3 クォーターの終了を知らせるゲームク\n        ロックのブザーが鳴った。その後、\n        ⒜A２がボールに触れ、ボールはバスケットに入った。\n        ⒝B２がボールに触れ、ボールはバスケットに入った。\n        ⒞A２がボールに触れ、ボールはバスケットに入らなかった。\n        ⒟B２がボールに触れ、ボールはバスケットに入らなかった。\n        解説：全ての場合において、A２あるいは B２のインタフェアレンスのバイオレーションである。クォー\n        ターの終了を知らせるゲームクロックのブザーが鳴った後は、ボールがリングに触れた後でもまだバスケ\n        ットに入る可能性を残している間はいずれのプレーヤーもボールに触れてはならない。\n        ⒜A１のゴールは認められない。\n        ⒝2 点もしくは 3 点が A１に与えられる。\n        ⒞クォーターは終了となる。\n        ⒟2 点もしくは 3 点が A１に与えられる。\n        全ての場合において、第 3 クォーターは終了となる。ゲームはセンターラインの延長線上からオルタネ\n        イティングポゼッションのスローインで再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-13", "body": "31-13   条文：ゲームクロックが動いていて、ボールがライブの状態でのショットでバスケットに向かって飛ん\n        でいるボールにプレーヤーが触れた場合は、ゴールテンディングとインタフェアレンスに関する全ての\n        規定が適用される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-14", "body": "31-14   例：A１はツーポイントゴールのショットをした。上昇しているボールに A２あるいは B２が触れた。\n        その後バスケットへ下降しているボールに、\n        ⒜A３が触れた。\n        ⒝B３が触れた。\n        解説：A２あるいは B２が上昇しているボールに触れることは正当なプレーである。A３あるいは B\n        ３が下降しているボールに触れることはゴールテンディングのバイオレーションである。\n        ⒜チーム B はフリースローラインの延長線上からスローインを与えられる。\n        ⒝2 点が A１に与えられる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-15", "body": "31-15   例：A1 のショットのボールが空中にあるときに B1 が A1 にファウルをした。その後、ボールが上昇し\n        ている間に B2 が正当に触れ、ボールはバスケットに入った。\n        解説：得点は認められない。審判が笛を吹いたあと、B2 がボールに触れたことでボールは速やか\n        にデッドとなる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-16", "body": "31-16   例：ゲームクロックが動いていて、ボールがライブの状態で A1 がショットをした。ボールがリングよりも\n        上の最高点にあるとき、A２あるいは B２がボールに触れた。\n        解説：A２あるいは B２の正当なプレーである。ボールが最高点に到達し、下降を開始した後で\n        のみ不当に触れられたとみなす。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-17", "body": "31-17   条文：プレーヤーがバスケットを揺らしたり、バスケット（リングまたはネットあるいはその両方）を\n        掴んだりして、ボールに不自然な跳ね返りやその方向の変化を生じさせ、その結果ボールがバス\n        ケットに入ることを妨げる、あるいはバスケットに入るようにした場合、インタフェアレンスのバイオレー\n        ションである。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-18", "body": "31-18   例：ゲームの終了間際に A１がスリーポイントゴールのショットをした。ボールが空中にあるときにゲ\n        ームの終了を知らせるゲームクロックのブザーが鳴った。ブザーのあと、\n        ⒜B1 がバスケットを揺らしたことで、ボールが不自然に弾み、あるいはその方向が変わり、バ ス ケ ッ\n         ト に 入ることが妨げられた。\n        ⒝A2 がバスケットを揺らしたことで、ボールの方向が変わり、バスケットに入った。\n        解説：ゲームの終了を知らせるゲームクロックのブザーが鳴った後であってもボールはライブのままで\n        ある。\n        ⒜B1 のインタフェアレンスのバイオレーションである。3 点が A1 に与えられる。\n        ⒝A2 のインタフェアレンスのバイオレーションである。A1 のゴールは認められない。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-19", "body": "31-19   条文：ゲームクロックが動いていて、ボールがライブの状態でのショットで、ボールがリングに触れて\n        いて、まだバスケットに入る可能性を残している間に、プレーヤーがバスケット（リングあるいはネッ\n        ト）もしくはバックボードに触れた場合、そのディフェンスあるいはオフェンスのプレーヤーのインタフェ\n        アレンスのバイオレーションである。\n\n\n\n\n                      図３ リングに触れているボール"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-20", "body": "31-20   例：ゲームクロックが動いていて、ボールがライブの状態で A1 がショットをしたあと、ボールがリングか\n        ら跳ね返り、リングの上に乗った。ボールがリングの上に乗っている間に、B１がバスケットあるいはバ\n        ックボードに触れた。\n        解説：B１のインタフェアレンスのバイオレーションである。ボールがまだバスケットに入る可能性を残\n        しているとき、インタフェアレンスの制限が適用される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-21", "body": "31-21   例：ゲームクロックが動いていて、ボールがライブの状態で A1 のショットのボールが下降していて、完\n        全にリングよりも上にあるときに A２と B２が同時にボールに触れた。ボールは、\n        ⒜バスケットに入った。\n        ⒝バスケットに入らなかった。\n        解説：A２と B２のゴールテンディングのバイオレーションである。どちらの場合においても、得点は\n        与えられない。ゲームはオルタネイティングポゼッションのスローインで再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-22", "body": "31-22   条文：プレーヤーがバスケット（リングあるいはネット）をつかんでボールにプレーしたとき、インタフ\n        ェアレンスのバイオレーションである。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-23", "body": "31-23   例：ゲームクロックが動いていて、ボールがライブの状態で A1 がショットをした。ボールがリングから跳\n        ね返ったとき、\n        ⒜A２がリングをつかみ、ボールをタップしてバスケットに入れた。\n        ⒝ボールがまだバスケットに入る可能性を残している状態で A２がリングをつかんだ。ボールはバスケ\n         ットに入った。\n        ⒞B２がリングをつかみ、ボールをタップしてバスケットに入らないようにした。\n\n⒟ボールがまだバスケットに入る可能性を残している状態で B２がリングをつかんだ。ボールはバスケ\n         ットに入らなかった。\n        解説：全ての場合において、A２あるいは B２のインタフェアレンスのバイオレーションである。\n        ⒜,⒝得点は与えられない。ゲームはフリースローラインの延長線上からチーム B のスローインで再\n         開される。\n        ⒞,⒟2 点もしくは 3 点が A１に与えられる。ゲームは通常のゲームクロックが動いていて、ボールがライ\n         ブの状態でのゴールが成功した後と同様にエンドラインからチーム B のスローインで再開される。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-24", "body": "31-24   条文：ボールがバスケットの中にある間にディフェンスのプレーヤーがボールに触れた場合、インタフ\n        ェアレンスのバイオレーションである。\n\n\n\n\n                       図４ バスケットの中にあるボール"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-25", "body": "31-25   例：A１がツーポイントゴールのショットをした。ボールはわずかな部分がバスケットの中にあり、リング\n        の周りを回転しているとき、\n        ⒜B１がボールに触れた。\n        ⒝A２がボールに触れた。\n        解説：ボールのわずかな部分がリングの中かつリングよりも下にあるとき、ボールはリングの中にあると\n        みなす。\n        ⒜B1 のインタフェアレンスのバイオレーションである。2 点が A1 に与えられる。\n        ⒝A2 の正当なプレーである。オフェンスのプレーヤーはボールに触れることができる。"}, {"type": "impl", "art_no": "31", "art_title": "ゴールテンディング、インタフェアレンス", "sec_no": "31-26", "body": "31-26   例：A1 がツーポイントゴールのショットをした。ボールはわずかな部分がバスケットの中にあり、リング\n        の周りを回転している間に、クォーターの終了を知らせるゲームクロックのブザーが鳴った。ゲームクロ\n        ックのブザーのあと、\n        ⒜A２が\n        ⒝B２が\n        ボールに触れた。\n\n解説：これはインタフェアレンスのバイオレーションである。\n        ⒜A２がボールに触れた場合、得点は認められない。\n        ⒝B２がボールに触れた場合、2 点が認められる。\n        クォーターの終了を知らせるゲームクロックのブザーが鳴ったあと、ボールはいずれかのチームのプレー\n        ヤーに触れられたとき、速やかにデッドとなる。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "31-27", "body": "31-27   例：A1 が最後のフリースローを行った。ボールはリングに弾んでバックボードに触れたあと、リングの\n        周りを回っていて、わずかな部分がバスケットの中にあった。このとき、\n        ⒜B２が\n        ⒝A２が\n        まだリングの上にあるボールに触れた。\n        解説：\n        ⒜これは B2 のインタフェアレンスのバイオレーションである。\n        ⒝これは A2 の正当なプレーである。\n        どちらの場合においても、A1 に 1 点が与えられる。\n\n\n第 33 条 コンタクト（体の触れ合い）：基本概念\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-1", "body": "33-１    条文：シリンダーの概念はプレーヤーがオフェンスかディフェンスかにかかわらず、全てのプレーヤー\n        に適用される。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-2", "body": "33-２    例：A１はスリーポイントゴールのショットで空中にいる。A１が脚を広げ、ディフェンスの B１に触れ\n        合いを起こした。\n        解説：自身のシリンダーの境界の外に脚を動かし、ディフェンスの B１に触れ合いを起こした A１の\n        ファウルである。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-3", "body": "33-３    条文：ノーチャージセミサークルルール（競技規則33.10）は、ボールをコントロールしてバスケット\n        に向かってドライブするオフェンスのプレーヤーからチャージングのファウルを引き出すために、ディフェンス\n        のプレーヤーが自チームのバスケットの真下でポジションを取ることを防ぐためのものである。\n        ノーチャージセミサークルルールが適用されるためには、以下の基準を満たさなくてはならない。\n        ⒜ディフェンスのプレーヤーの片足あるいは両足が、セミサークルエリア（図 5）に触れていること。セ\n         ミサークルのラインはセミサークルエリアの一部とみなす。\n        ⒝オフェンスのプレーヤーが、セミサークルラインを越えてバスケットにドライブしており、空中にいる間に\n         ショットやパスをすること。\n        以下の場合にはノーチャージセミサークルルールの基準は適用されず、触れ合いは規則によって判\n        断される。（例：シリンダーの概念、チャージング／ブロッキングの原則）\n        ⒜ノーチャージセミサークルエリアの外で起きた全てのプレー、また、セミサークルエリアとエンドラインの\n\n間のエリアから展開された全てのプレー。\n        【補足】セミサークルエリアとエンドラインの間とはバックボードの裏側のエリアのことをいう。\n       ⒝ショットのあと、ボールがリングから跳ね返り、不当なコンタクトが起きた全てのリバウンドのプレー。\n       ⒞オフェンスあるいはディフェンスのプレーヤーによる手、腕、脚、体によるファウル。\n\n\n\n\n                  図5 ノーチャージセミサークルエリアの内側/外側のプレーヤー"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-4", "body": "33-4   例：A１がセミサークルエリアの外側からジャンプショットをした。A１はセミサークルエリアに触れてい\n       る B１にぶつかった。\n       解説：A１の正当なプレーである。ノーチャージセミサークルルールが適用される。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-5", "body": "33-５   例：A１がエンドラインに沿ってドリブルし、バックボードの裏側のエリアからコート上をフリースローライ\n       ンに向かってジャンプした。A１はセミサークルエリアに触れていて、リーガルガーディングポジションを占\n       めている B１にぶつかった。\n       解説：A１のチームコントロールファウルである。ノーチャージセミサークルルールは適用されない。A\n       １はバックボードとそこから延長された仮想のラインの真後ろのコートからノーチャージセミサークルエリ\n       アに入っている。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-6", "body": "33-６   例：ゲームクロックが動いていて、ボールがライブの状態での A1 のショットのボールがリングから跳ね返\n       った。A２はジャンプしてボールをキャッチし、その後セミサークルエリアに触れていて、リーガルガーディン\n       グポジションを占めている B１にぶつかった。\n       解説：A２のチームコントロールファウルである。ノーチャージセミサークルルールは適用されない。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-7", "body": "33-７   例：A１がバスケットに向かってドライブし、ショットの動作（アクトオブシューティング）をした。A１\n       はショットでドライブを終えるかわりに真後ろにいる A２にボールをパスした。その後 A１はノーチャー\n       ジセミサークルエリアに触れている B１に無理にぶつかっていった。ほとんど同時に、ボールを持ってい\n       る A２は得点するために直接バスケットにドライブをした。\n       解説：A１のチームコントロールファウルである。ノーチャージセミサークルルールは適用されない。A\n       ２のバスケットへの進路をあけるために A１は不当に体を使っている。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-8", "body": "33-８   例：A１がバスケットに向かってドライブし、ショットの動作（アクトオブシューティング）をした。A１\n       はショットでドライブを終えるかわりに空中にいる間にコートのコーナーに立っている A２にボールをパ\n\nスした。その後 A１はノーチャージセミサークルエリアに触れている B１にぶつかった。\n        解説：A１の正当なプレーである。ノーチャージセミサークルルールが適用される。\n\n33-９ 例：A1 がバスケットに向かってドライブし、ショットの動作（アクトオブシューティング）をした。A1 は\n        ショットのボールを手放す前にノーチャージセミサークルエリアに触れている B1 を腕を使って押しのけた。\n        解説：A1 のチームコントロールファウルである。A1 は不当に腕を使っており、ノーチャージセミサーク\n        ルルールは適用されない。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-10", "body": "33-10   例：A1 がノーチャージセミサークルの外からジャンプショットをしようとし、ノーチャージセミサークルから\n        垂直に飛んだ B1 に触れ合いを起こした。\n        解説：B1 の正当なプレーであり、ノーチャージセミサークルルールは適用されない。B1 と A1 が触\n        れ合いを起こしたとき、B1 は空中におり、セミサークルエリアに片足、または両足を触れていない。\n        触れ合いは通常の規則によって判定される。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-11", "body": "33-11   条文：パーソナルファウルとはプレーヤーによる相手プレーヤーとの不当な触れ合いである。相手\n        プレーヤーと不当な触れ合いを起こしたプレーヤーはその状況に応じて罰せられる。"}, {"type": "impl", "art_no": "33", "art_title": "コンタクト（体の触れ合い）：基本概念", "sec_no": "33-12", "body": "33-12   例：ゲームクロックが動いていて、ボールがライブの状態で A1 はショットをした。B１はチームメイトの\n        B２を押し、B２はショットの動作（アクトオブシューティング）中の A1 に不当な触れ合いを起こし\n        た。ボールはバスケットに入った。\n        解説：2 点もしくは 3 点が A1 に与えられる。A1 に触れ合いを起こしたのは B２であり、B２にフ\n        ァウルが宣せられる。1 本のフリースローが A1 に与えられ、ゲームは通常の最後のフリースローの後\n        と同様に再開される。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "33-13", "body": "33-13   例：ゲームクロックが動いていて、ボールがライブの状態で A1 はショットをした。B2 は A2 を押し、\n        A2 はチームメイトの A1 に不必要な触れ合いを起こした。ボールはバスケットに入った。これはチー\n        ム B のこのクォーター3 個目のチームファウルであった。\n        解説：2 点あるいは 3 点が A1 に与えられる。チーム A は B2 のパーソナルファウルが起きた場所\n        に最も近いアウトオブバウンズからスローインを与えられる。\n\n第 34 条 パーソナルファウル\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-1", "body": "34-１   条文：第4クォーターや各オーバータイムで、ゲームクロックに2:00あるいはそれ以下が表示され\n       ていて、ボールがまだ審判の手の中にある、あるいはスローインを行うプレーヤーに手渡されてい\n       る。このとき、コート上のディフェンスのプレーヤーがオフェンスのプレーヤーに不当に触れ合いを起こ\n       した場合、触れ合いがアンスポーツマンライクファウルの判定基準に合致しない限り、スローインファ\n       ウルとなる。第4クォーターのチームファウルの数にかかわらず、誰もリバウンドの位置に着かずに、1\n       本のフリースローがファウルをされたプレーヤーに与えられる。ゲームはファウルが起きた場所に最も\n       近いアウトオブバウンズからファウルをされたチームのスローインで再開される。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-2", "body": "34-２   例：第 4 クォーター残り 1:31 で、スローインをする A1 がボールを手放す前に、コート上で B2 が\n       A2 に不当に触れ合いを起こした。スローインファウルが B2 に宣せられた。\n       解説：第 4 クォーターのチーム B のチームファウルの数にかかわらず、誰もリバウンドの位置に着か\n       ずに 1 本のフリースローが A2 に与えられる。ゲームは B2 のファウルが起きた場所に最も近いアウト\n       オブバウンズからチーム A のスローインで再開され、\n       ⒜バックコートから再開される場合、ショットクロックは 24 秒となる。\n       ⒝フロントコートから再開される場合、ショットクロックは 14 秒以上が表示されていた場合は継続と\n        なり、13 秒以下が表示されていた場合は 14 秒となる。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-3", "body": "34-３   例：第 4 クォーター残り 1:24 で、ゲームクロックが動いている状態での B1 のショットまたは B1 の\n       最後のフリースローが成功したあと、スローインをする A1 はエンドラインの外側でボールを持ってい\n       る。A1 がボールを手放す前にコート上で B2 が A2 に不当に触れ合いを起こした。これはチーム B\n       のこのクォーター５個目のファウルだった。\n       解説：B2 の不当な触れ合いがアンスポーツマンライクファウルの基準に当てはまらない限り、スロー\n       インファウルとなる。第 4 クォーターのチーム B のチームファウルの数にかかわらず、誰もリバウンドの位\n       置に着かずに 1 本のフリースローが A2 に与えられる。ゲームはバックボードの真後ろを除いた B2 の\n       ファウルが起きた場所に最も近いアウトオブバウンズからチーム A のスローインで再開される。このスロ\n       ーインでチーム A は、ゲームクロックが動いている状態でのショットまたは最後のフリースローが成功し\n       た後のように、コート上にボールを投げ入れる前に、指定されたスローインの位置からエンドラインに\n       沿って動いて位置を変えたり、エンドライン側のアウトオブバウンズにいるチームメイトにボールをパス\n       したりする権利を持たない。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-4", "body": "34-４   例：第 4 クォーター残り 58 秒で、スローインをする A1 がボールを手放す前に、コート上で B2 は\n       A2 に不当に触れ合いを起こした。\n       解説：A2 に対する B2 の触れ合いがアンスポーツマンライクファウルの判定基準に合致しない限\n       り、スローインファウルとなる。誰もリバウンドの位置に着かずに 1 本のフリースローが A2 に与えられ\n\nる。ゲームは B2 のファウルが起きた場所に最も近いアウトオブバウンズからチーム A のスローインで\n       再開される。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-5", "body": "34-５   例：第 4 クォーター残り 55 秒で、スローインをする A1 がボールを手放す前に、コート上で B2 が\n       A2 にアンスポーツマンライクファウルの判定基準に合致する方法で触れ合いを起こした。アンスポー\n       ツマンライクファウルが B2 に宣せられた。\n       解説：誰もリバウンドの位置に着かずに 2 本のフリースローが A2 に与えられる。ゲームはフロントコ\n       ートのスローインラインからチーム A のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-6", "body": "34-６   例：第 4 クォーター残り 54 秒で、スローインをする A1 がボールを手放す前に、コート上で B2 が\n       A2 に不当な触れ合いを起こした。スローインファウルが B2 に宣せられたあと、A1 にテクニカルファウ\n       ルが宣せられた。\n       解説：1 本のフリースローがチーム B のいずれかのプレーヤーに与えられたあと、1 本のフリースロー\n       が A2 に与えられる。ゲームは B2 のファウルが起きた場所に最も近いアウトオブバウンズからチーム\n       A のスローインで再開される。バックコートからのスローインの場合、ショットクロックは 24 秒となる。フ\n       ロントコートからのスローインの場合、ショットクロックは 14 秒以上が表示されていた場合は継続とな\n       り、13 秒以下が表示されていた場合は 14 秒となる。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-7", "body": "34-７   例：第 4 クォーター残り 53 秒で、スローインをする A1 がボールを手放す前に、コート上で A2 が\n       B2 に触れ合いを起こした。チームコントロールファウルが A2 に宣せられた。\n       解説：チーム A は A2 のチームコントロールファウルによって有利となっていない。触れ合いがアンス\n       ポーツマンライクファウルあるいはディスクォリファイングファウルの判定基準に合致しない限り、A2 は\n       パーソナルファウルを宣せられる。ゲームは A2 のファウルが起きた場所に最も近いアウトオブバウンズ\n       からチーム B のスローインで再開される。"}, {"type": "impl", "art_no": "34", "art_title": "パーソナルファウル", "sec_no": "34-8", "body": "34-８   例：第 4 クォーター残り 51 秒、チーム A 83 - チーム B 80 で、スローインをする A1 がボールを\n       持っているとき、コート上のスローインが行われている場所とは別の場所で B2 が A2 に触れ合いを\n       起こした。B2 は A2 に対するファウルを宣せられた。\n       解説：A2 に対する B2 の触れ合いがアンスポーツマンライクファウルの判定基準に合致しない限\n       り、スローインファウルとなる。誰もリバウンドの位置に着かずに 1 本のフリースローが A2 に与えられ\n       る。ゲームは B2 のファウルが起きた場所に最も近いアウトオブバウンズからチーム A のスローインで\n       再開される。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "34-9", "body": "34-９   例：第 4 クォーター残り 48 秒、チーム A 83 - チーム B 80 で、スローインをする A1 の手からボ\n       ールが離れたとき、コート上のスローインが行われている場所とは別の場所で B2 が A2 に触れ合い\n       を起こした。B2 は A2 に対するファウルを宣せられた。\n\n解説：ボールはスローインをする A1 の手からすでに離れているため、スローインファウルではない。\n       A2 に対する B2 の触れ合いがアンスポーツマンライクファウルあるいはディスクォリファイングファウルの\n       判定基準に合致しない限り、パーソナルファウルとなり、その状況に応じて罰せられる。\n\n\n第 35 条 ダブルファウル\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-1", "body": "35-１   条文：ファウルには、パーソナルファウル、アンスポーツマンライクファウル、ディスクォリファイングファウ\n       ル、テクニカルファウルがある。ダブルファウルとみなされるためには、2人の対戦プレーヤー間で互い\n       にファウルをしていて、同じカテゴリー（ともにパーソナルファウル、もしくはアンスポーツマンライクファ\n       ウルとディスクォリファイングファウルのいずれかの組み合わせ）でなければならない。チームファウル\n       の数にかかわらずフリースローは与えられない。ダブルファウルには身体接触を伴わなければならな\n       いため、身体接触を伴わないテクニカルファウルはダブルファウルの一部ではない。\n       ほとんど同時に起きた両方のファウルが同じカテゴリー（ともにパーソナルファウル、もしくはアンスポ\n       ーツマンライクファウルとディスクォリファイングファウルのいずれかの組み合わせ）でない場合、ダブル\n       ファウルではなく、罰則は互いに相殺されない。パーソナルファウルはいつでも最初に起き、アンスポ\n       ーツマンライクファウルあるいはディスクォリファイングファウルは2番目に起きたと考えられる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-2", "body": "35-２   例：A１がドリブルをしているとき、A２と B２がテクニカルファウルを宣せられた。\n       解説：テクニカルファウルはダブルファウルの一部ではない。罰則は互いに相殺される。ゲームは最\n       初のテクニカルファウルが起きたとき、ボールがあった場所に最も近いアウトオブバウンズからチーム A\n       のスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-3", "body": "35-３   例：ドリブルをしている A１と B１がほとんど同時に互いにファウルをし、チーム A のこのクォーター2\n       個目、チーム B のこのクォーター5 個目のチームファウルであった。\n       解説：両方のファウルは同じカテゴリーである（パーソナルファウル）ため、ダブルファウルである。こ\n       のクォーターでのチームファウルの数の違いは関係しない。ゲームはダブルファウルが起きた場所に最\n       も近いアウトオブバウンズからチーム A のスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-4", "body": "35-４   例：ショットの動作（アクトオブシューティング）中に両手でボールを持っている A１と B１がほとん\n       ど同時に互いにファウル（どちらもパーソナルファウル）を宣せられた。\n       解説：両方のファウルは同じカテゴリーであるため、ダブルファウルである。\n       A１のショットが成功した場合、ゴールは認められない。ゲームはフリースローラインの延長線上のア\n       ウトオブバウンズからチーム A のスローインで再開される。\n       A１のショットが成功しなかった場合、ゲームはダブルファウルが起きた場所に最も近いアウトオブバウ\n       ンズからチーム A のスローインで再開される。ショットクロックは継続となる。\n       どちらの場合においても、チーム A のショットクロックは継続となる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-5", "body": "35-５   例：ゲームクロックが動いていて、ボールがライブの状態での A1 のショットのボールが空中にあると\n       き、A１と B１がほとんど同時に互いにファウル（どちらもパーソナルファウル）を宣せられた。\n       解説：両方のファウルは同じカテゴリーであるため、ダブルファウルである。\n       A1 のショットが成功した場合、ゴールは認められる。ゲームは通常のゲームクロックが動いていて、ボ\n       ールがライブの状態でのゴールが成功した後と同様にエンドラインからチームBのスローインで再開される。\n       A1 のショットが成功しなかった場合、ジャンプボールシチュエーションとなる。ゲームはオルタネイティン\n       グポゼッションのスローインで再開される。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-6", "body": "35-６   例：チーム A のこのクォーターのチームファウルが 2 個、チーム B のこのクォーターのチームファウルが\n       3 個であるとき、\n       ⒜A２がドリブルをしている間に、A１と B１がポストの位置で互いに押し合った。\n       ⒝リバウンドの間に、A１と B１が互いに押し合った。\n       ⒞A１が A２からパスを受け取る間に、A１と B１が互いに押し合った。\n       解説：全ての場合において、ダブルファウルである。\n       ⒜,⒞ゲームはダブルファウルが起きた場所に最も近いアウトオブバウンズからチーム A のスローインで\n        再開される。\n       ⒝ゲームはオルタネイティングポゼッションのスローインで再開される。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-7", "body": "35-７   例：B１がドリブルをしている A１を押し、パーソナルファウルを宣せられ、チーム B のこのクォーター\n       3 個目のチームファウルであった。ほとんど同時に A１が B１に肘打ちをしてアンスポーツマンライクフ\n       ァウルを宣せられた。\n       解説：2 つのファウルは同じカテゴリーではない（パーソナルファウルとアンスポーツマンライクファウ\n       ル）ため、ダブルファウルではない。罰則は互いに相殺されない。パーソナルファウルはいつでも先に\n       起きたとみなされる。更なるファウルの罰則があるため、チーム A のスローインの罰則は取り消され\n       る。誰もリバウンドの位置に着かずに 2 本のフリースローが B１に与えられる。ゲームはフロントコート\n       のスローインラインからチーム B のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-8", "body": "35-８   例：B１がドリブルをしている A１を押し、パーソナルファウルを宣せられ、チーム B のこのクォーター\n       5 個目のチームファウルであった。ほとんど同時に A１が B１に肘打ちをしてアンスポーツマンライクフ\n       ァウルを宣せられた。\n       解説：2 つのファウルは同じカテゴリーではない（パーソナルファウルとアンスポーツマンライクファウ\n       ル）ため、ダブルファウルではない。罰則は互いに相殺されない。パーソナルファウルはいつでも最初\n       に起きたと考えられる。誰もリバウンドの位置に着かずに 2 本のフリースローが A１に与えられたあ\n       と、誰もリバウンドの位置に着かずに 2 本のフリースローが B１に与えられる。ゲームはフロントコート\n       のスローインラインからチーム B のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "35", "art_title": "ダブルファウル", "sec_no": "35-9", "body": "35-９    例：ドリブルをしている A１が B１にチームコントロールファウルをし、このクォーター5 個目のチームフ\n        ァウルであった。ほとんど同時に B１が A１に肘打ちをしてアンスポーツマンライクファウルを宣せられた。\n        解説：2 つのファウルは同じカテゴリーではない（パーソナルファウルとアンスポーツマンライクファウ\n        ル）ため、ダブルファウルではない。罰則は互いに相殺されない。パーソナルファウルはいつでも最初\n        に起きたと考えられる。更なるファウルの罰則があるため、チーム B のスローインの罰則は取り消され\n        る。誰もリバウンドの位置に着かずに 2 本のフリースローが A１に与えられる。ゲームはフロントコート\n        のスローインラインからチーム A のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "35-10", "body": "35-10   例：A１がドリブルをしているとき、A１と B１がほとんど同時に互いにファウルを宣せられた。\n        ⒜両方のファウルはパーソナルファウルであった。\n        ⒝両方のファウルはアンスポーツマンライクファウルであった。\n        ⒞A１のファウルはアンスポーツマンライクファウル、B１のファウルはディスクォリファイングファウルであった。\n        ⒟A１のファウルはディスクォリファイングファウル、B１のファウルはアンスポーツマンライクファウルであった。\n        解説：全ての場合において、2 つのファウルは同じカテゴリーである（パーソナルファウルあるいはア\n        ンスポーツマンライクファウル／ディスクォリファイングファウル）ため、ダブルファウルである。ゲームはダ\n        ブルファウルが起きた場所に最も近いアウトオブバウンズからチーム A のスローインで再開される。ショ\n        ットクロックは継続となる。\n\n\n第 36 条 テクニカルファウル\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-1", "body": "36-１    条文：繰り返された場合にテクニカルファウルとなる行為や振る舞いには、オフィシャルワーニング\n        （警告）が当該プレーヤーに与えられる。この警告は当該チームのヘッドコーチにも伝達され、そ\n        のゲームの残り時間、当該チームのいずれかのメンバーによる同様の行為に適用される。オフィシ\n        ャルワーニングは、ボールがデッドになりゲームクロックが止められたときにのみ与えられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-2", "body": "36-２    例：A１はスローインを妨げたこと、あるいはその他の繰り返された場合にテクニカルファウルとなる行\n        為で警告を与えられた。\n        解説：A１の警告はチーム A のヘッドコーチにも伝達され、そのゲームの残り時間、チーム A の全\n        てのメンバーによる同様の行為に適用される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-3", "body": "36-３    条文：プレーヤーがショットの動作（アクトオブシューティング）をしている間に相手プレーヤーは\n        手をシューターの目の近くにかざしたり、大声で叫んだり、両足を強く踏み鳴らしたり、シューターの\n        近くで両手を叩いたりしてシューターを当惑させることはできない。そのような行為によってシュータ\n        ーが不利になった場合はテクニカルファウルとなり、シューターが不利にならなかった場合は警告が\n        与えられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-4", "body": "36-４   例：A１はショットの動作（アクトオブシューティング）中で、まだボールを手に持っているとき、B１\n       が A1 の顔（目）の前で手を振ったり、コート上で大声で叫んだり、あるいは両足を強く踏み鳴ら\n       して A１の気を逸らしたりした。A１のショットは、\n       ⒜成功した。\n       ⒝成功しなかった。\n       解説：\n       ⒜A１のゴールは認められる。B１は警告を与えられ、その警告はチーム B のヘッドコーチにも伝達\n        される。ゲームはエンドラインからチーム B のスローインで再開される。\n        チーム B のいずれかのメンバーがすでに同様の振る舞いへの警告を与えられていた場合、B１は\n        テクニカルファウルを宣せられる。誰もリバウンドの位置に着かずにチーム A のいずれかのプレーヤ\n        ーに 1 本のフリースローが与えられる。\n       ⒝B１はテクニカルファウルを宣せられる。誰もリバウンドの位置に着かずに 1 本のフリースローがチー\n        ム A のいずれかのプレーヤーに与えられる。ゲームは B１のテクニカルファウルが起きたときにボー\n        ルがあった場所に最も近いアウトオブバウンズからチーム A のスローインで再開される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-5", "body": "36-５   条文：ゲームクロックが動いている間に同じチームの 6 人以上のプレーヤーが同時にコート上にい\n       ることを審判が発見したとき、少なくとも 1 人のプレーヤーは不当にコート上に戻ってきたか、ある\n       いはとどまったことになる。\n       相手チームに不利にならない状況で、できる限りすぐにその誤りは訂正されなければならない。\n       6 人以上のプレーヤーが不当にゲームに出てから、そのことが発見されてゲームが止められるまで\n       の間に起きた全ての事象は有効なままとなる。\n       少なくとも 1 人のプレーヤーはチームベンチに戻される。テクニカルファウルがそのチームのヘッドコー\n       チに宣せられ、スコアシートに「B１」と記入される。ヘッドコーチは交代が正しく行われたかを確認\n       する責任がある。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-6", "body": "36-６   例：ゲームクロックが動いている状態で、6 人のチーム A のプレーヤーがコート上にいた。\n       そのことが発見されたとき、\n       ⒜チーム B（プレーヤー5 人）がボールをコントロールしていた。\n       ⒝チーム A（プレーヤー6 人以上）がボールをコントロールしていた。\n       解説：チーム B が不利にならない状況で、ゲームは速やかに止められる。ヘッドコーチに指名された\n       1 人のプレーヤーはチームベンチに戻される。チーム A のヘッドコーチはテクニカルファウルを宣せられ、\n       スコアシートに「B１」と記入する。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-7", "body": "36-７   例：ゲームクロックが動いている状態で、6 人のチーム A のプレーヤーがコート上にいた。これは、\n       ⒜A１がチームコントロールファウルを宣せられた後で発見された。\n       ⒝A１が得点をした後で発見された。\n\n⒞B1 がショットの動作（アクトオブシューティング）中の A1 にファウルをした後で発見された。ショッ\n       トは成功しなかった。\n       ⒟チーム A の 6 人目のプレーヤーがコートを離れた後で発見された。\n       解説：\n       全ての場合において、チーム A のヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B1」と\n       記入される。\n       ⒜,⒝,⒞では、ヘッドコーチが指名したチーム A のプレーヤーはチームベンチに戻される。誰もリバウ\n       ンドの位置に着かずに 1 本のフリースローがチーム B のいずれかのプレーヤーに与えられる。\n       ゲームは\n       ⒜A1 のファウルが起きた場所に最も近いアウトオブバウンズからチーム B のスローインで再開される。\n       ⒝通常のショットが成功した後と同様にエンドラインの後方からチーム B のスローインで再開される。\n       ⒞A1 の 2 本もしくは 3 本のフリースローで再開される。\n       ⒟止められた場所に最も近いところから再開される。どちらのチームもボールのコントロールがなかった、\n        あるいはボールが与えられることになっていなかった場合はジャンプボールとなる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-8", "body": "36-８   条文：5 個目のファウルを宣せられたあと、そのプレーヤーは「5 個のファウルを宣せられたチームメ\n       ンバー」となり、チームベンチに座ることができる。\n       ゲームクロックが動いている間に 5 個のファウルを宣せられたチームメンバーがコート上にいることを\n       審判が発見したとき、そのチームメンバーは不当にコート上に戻ってきたか、あるいはとどまったこと\n       になる。\n       相手チームに不利にならない状況で、できる限り速やかにその誤りは訂正されなければならない。\n       5 個のファウルを宣せられたチームメンバーが不当にゲームに出てから、そのことが発見されてゲー\n       ムが止められるまでの間に起きた全ての事象は有効なままとなる。\n       5 個のファウルを宣せられたチームメンバーはチームベンチに戻される。テクニカルファウルがそのチー\n       ムのヘッドコーチに宣せられ、スコアシートに「B1」と記入される。ヘッドコーチはプレーをする資格の\n       あるプレーヤーだけが、ゲームクロックが動いている間にコート上でプレーしていることを確認する責\n       任がある。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-9", "body": "36-９   例：ゲームクロックが動いている状態で、5 個のファウルを宣せられたチームメンバーである B1 がコ\n       ート上にいた。B１が不当にゲームに出ていることが、\n       ⒜ボールが再びライブになったあと、チーム A がボールをコントロールしている間に発見された。\n       ⒝ボールが再びライブになったあと、チーム B がボールをコントロールしている間に発見された。\n       ⒞B１がまだコート上にいて、ボールが再びデッドになったあとに発見された。\n       解説：\n       チーム A が不利にならない状況で、ゲームは速やかに止められる。B1 はチームベンチに戻される。\n       チーム B のヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B1」と記入する。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-10", "body": "36-10   例：ゲームクロックが動いている状態で、5 個のファウルを宣せられたチームメンバーである A1 がコ\n        ート上にいた。A１が不当にゲームに出ていることが、\n        ⒜A１が得点した後に発見された。\n        ⒝A１が B１にファウルをした後に発見された。\n        ⒞B１がドリブルをしている A１にファウルをした後に発見された。これはチーム B のこのクォーター5\n        個目のチームファウルであった。\n        解説：\n        チーム B が不利にならない状況で、ゲームは速やかに止められる。A1 はチームベンチに戻される。\n        チーム A のヘッドコーチはテクニカルファウルを宣せられ、スコアシートに「B1」と記入する。\n        ⒜A１のゴールは認められる。\n        ⒝A１のファウルはプレーヤーとしてのファウルである。このファウルはスコアシートの A１の 5 個目のフ\n         ァウルの横のスペースに記入される。\n        ⒞2 本のフリースローが A１と交代したプレーヤーに与えられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-11", "body": "36-11   例：第 4 クォーター残り 7 秒、チーム A 70 - チーム B 70 で、A1 は 5 個目のファウルを宣せら\n        れ「5 個のファウルを宣せられたチームメンバー」となった。タイムアウトのあと、チーム A がボールのコン\n        トロールを得て、A1 が得点した。このとき A1 が不当にコート上にいることが発見され、ゲームクロッ\n        クは残り 1 秒であった。\n        解説：A1 のゴールは認められる。チーム A のヘッドコーチはテクニカルファウルを宣せられ、スコアシ\n        ートに「B1」と記入される。誰もリバウンドの位置に着かずに、1 本のフリースローがチーム B のいずれ\n        かのプレーヤーに与えられる。ゲームはエンドラインからチーム B のスローインで再開され、ゲームクロ\n        ックは残り 1 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-12", "body": "36-12   条文：プレーヤーがフェイクをしたときには、以下の手順を適用する。\n        ・ゲームを止めずに「前腕を上にあげる（ローワー・ザ・フォアアーム）」シグナルを 2 回示す。\n        ・いずれかの理由でゲームが止められたとき、警告が当該プレーヤーとそのチームのヘッドコーチに\n         伝達される。両チームはそれぞれ 1 度まで警告を与えられる。\n         ・次にそのチームのプレーヤーがフェイクをしたとき、テクニカルファウルが宣せられる。これはゲーム\n         が止まらず、最初の警告が当該プレーヤーあるいはそのチームのヘッドコーチに伝達される前であ\n         っても適用される。\n        ・体の触れ合いのない過度なフェイクを行った場合、警告は与えられず、速やかにテクニカルファウ\n         ルが宣せられる。\n        ・同じシチュエーションでファウルやバイオレーションが宣せられたかどうかにかかわらず、プレーヤーが\n         フェイクをした状況は対処される。\n        ・フ ァ ウ ル を 宣 せ ら れ たプレーヤーがあわせてフェイクの警告を与えられることや、ファウルをされた\n         プレーヤーがフェイクの警告を与えられることもある。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-13", "body": "36-13   例：B1 がド リ ブ ル を し て い る A1 をディフェンスした。A1 は B1 を押した上で、あたかも B1 にフ\n        ァウルをされたかのような印象を与えようと頭部を急に動かした。審判は A1 にファウルを宣した。\n        解説：A１のファウルに加えて、審判は A1 にフェイクの警告（これがチーム A の最初のフェイクで、\n        過度なフェイクではない場合）を与える、もしくはテクニカルファウル（チーム A がすでにフェイクの警\n        告を与えられている、もしくは最初でも過度なフェイクであった場合）を宣する。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-14", "body": "36-14   例：B1 がドリブルをしている A1 をディフェンスした。B1 が A1 を押したとき、A1 はあたかも B1 に\n        ファウルをされたかのような印象を与えようと頭部を急に動かした。審判は B1 にファウルを宣した。\n        解説：B１のファウルに加えて、審判は A1 にフェイクの警告（これがチーム A の最初のフェイクで、\n        過度なフェイクではない場合）を与える、もしくはテクニカルファウル（チーム A がすでにフェイクの警\n        告を与えられている、もしくは最初でも過度なフェイクであった場合）を宣する。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-15", "body": "36-15   例：B１がドリブルをしている A１をディフェンスした。A１はあたかも B１にファウルをされたかのよう\n        な印象を与えようと頭部を急に動かした。審判は A1 に「ローワー・ザ・フォアアーム」のシグナルを 2\n        回示した。その後ゲームクロックが 1 度も止められずに動き続けている状態で、\n        ⒜A1 があたかも B1 に押されたかのような印象を与えようとコート上に倒れた。\n        ⒝B2 があたかも A2 に押されたかのような印象を与えようとコート上に倒れた。\n        解説：\n        ⒜審判は A1 の頭部での最初のフェイクに対して、「ローワー・ザ・フォアアーム」シグナルを 2 回示し\n         てすでに警告を与えている。ゲームが止められず、A1 あるいはチーム A のヘッドコーチに A1 の最\n         初のフェイクの警告が伝達されていなかった場合でも、コート上に倒れた 2 度目のフェイクによって\n         A1 はテクニカルファウルを宣せられる。\n        ⒝審判は B2 のフェイクに対して、「ローワー・ザ・フォアアーム」シグナルを 2 回示して最初の警告を\n         与える。いずれかの理由で次にゲームが止められたとき、警告が B2 とチーム B のヘッドコーチに\n         伝達される。A1 のフェイクのあと、これが最初にゲームが止められた時点であるため、その警告も\n         A1 とチーム A のヘッドコーチに伝達される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-16", "body": "36-16   例：B1 がドリブルをしている A1 をディフェンスした。B1 はあたかも A1 にファウルをされたかのような\n        印象を与えようとコート上に倒れた。ほとんど同時に A1 はあたかも B1 にファウルをされたかのような\n        印象を与えようと頭部を急に動かした。\n        解説：審判は A1 と B1 の両方にフェイクの警告（これがチームの最 初 の フ ェ イ ク で、過度なフェ\n        イクではない場合）を与える、もしくはテクニカルファウル（チームがすでにフェイクの警告を与えられ\n        ている、もしくは最初でも過度なフェイクであった場合）を宣する。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-17", "body": "36-17   条文：特にリバウンド争いやディフェンスがオフェンスに近接してガードしている場合などで、過度に\n        肘を振り回すことは、重大な怪我につながる可能性がある。そのような行為で体の触れ合いがあ\n        った場合、パーソナルファウルやアンスポーツマンライクファウル、ディスクォリファイングファウルが宣せ\n        られる。触れ合いがない場合、テクニカルファウルが宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-18", "body": "36-18   例：A１がリバウンドのボールを取ってコートに着地した。その後 B１が A1 を近接してガードした。\n        A１が B１を威嚇するため、またはピボットやパス、ドリブルをするための十分なスペースを確保する\n        ために、過度に肘を振り回したが B１には当たらなかった。\n        解説：A１の行為はルールの精神や目的に反するものである。A１にテクニカルファウルが宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-19", "body": "36-19   条文：2 個のテクニカルファウル、あるいは 2 個のアンスポーツマンライクファウル、もしくは 1 個の\n        テクニカルファウルと 1 個のアンスポーツマンライクファウルを記 録 さ れ た プ レ ー ヤ ー は、自動的に\n        失格・退場となる。\n        自身のスポーツマンらしくない振る舞いによる 2 個のテクニカルファウル「C」、あるいは 3 個の「B」、\n        もしくは 2 個の「B」と 1 個の「C」が記録されたヘッドコーチは、自動的に失格・退場となる。\n        失格・退場となった人物は、直ちにゲームを離れ（30 秒以内）、ゲーム終了までチームの控室\n        にとどまるか、または建物から出なければならない。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-20", "body": "36-20   例：A１は前半にリングにぶらさがった行為で 1 個目のテクニカルファウルを宣せられた。そして後半\n        にスポーツマンらしくない行為があったとして２個目のテクニカルファウルを宣せられた。\n        解説：A１は自動的に失格・退場となる。2 個目のテクニカルファウルではテクニカルファウルの罰\n        則のみが与えられ、失格・退場への追加の罰則は与えられない。スコアラーはプレーヤーが 2 個のテク\n        ニカルファウルを宣せられ、自動的に失格・退場となることを速やかに審判に知らせなければならない。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-21", "body": "36-21   条文：5 個目のファウルを宣せられたあと、そのプレーヤーは「5 個のファウルを宣せられたチームメ\n        ンバー」となる。5 個目のファウルのあと、そのプレーヤーの行為に対する更なるテクニカルファウルは\n        ヘッドコーチに宣せられ「B1」と記入される。\n        5 個のファウルを宣せられたプレーヤーは失格・退場となるプレーヤーではなく、チームベンチエリア\n        にとどまることを許される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-22", "body": "36-22   例：第 1 クォーターで、B1 は\n        ⒜テクニカルファウル\n        ⒝アンスポーツマンライクファウル\n        を宣せられた。第 4 クォーターで B1 は 5 個目のファウルを宣せられ、このクォーター2 個目のチーム\n        ファウルであった。チームベンチに向かう間に、B1 に対してテクニカルファウルが宣せられた。\n        解説：どちらの場合においても、B1 は退場とはならない。5 個目のファウルによって、B1 は 5 個の\n        ファウルを宣せられたチームメンバーとなる。B1 による更なるテクニカルファウルはヘッドコーチに宣せら\n        れ「B1」と記入される。誰もリバウンドの位置に着かずに 1 本のフリースローがチーム A のいずれかの\n\nプレーヤーに与えられる。ゲームは B１の最後のテクニカルファウルが起きたときにボールがあった場所\n        に最も近いアウトオブバウンズからチーム A のスローインで再開される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-23", "body": "36-23   例：B１がドリブルをしている A１にファウルをした。これは B１の５個目のパーソナルファウル、チー\n        ム B の２個目のチームファウルであった。チームベンチに向かう間に、B１がディスクォリファイングファ\n        ウルを宣せられた。\n        解説：B１は失格・退場となり、自チームの控室に戻るか、あるいは建物から出なければならな\n        い。B１のディスクォリファイングファウルはスコアシートの B１の 5 個目のファウルの横のスペースに\n        「D」、チーム B のヘッドコーチに「B２」と記入される。誰もリバウンドの位置に着かずに 2 本のフリー\n        スローがチーム A のいずれかのプレーヤーに与えられる。ゲームはフロントコートのスローインラインから\n        チーム A のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-24", "body": "36-24   例：B１がドリブルをしている A１にファウルをした。これは B１の５個目のパーソナルファウル、チー\n        ム B のこのクォーターの５個目のチームファウルであった。チームベンチに向かう間に、B１がディスク\n        ォリファイングファウルを宣せられた。\n        解説：B１は失格・退場となり、自チームの控室に戻るか、あるいは建物から出なければならな\n        い。B１のディスクォリファイングファウルはスコアシートの B１の 5 個目のファウルの横のスペースに\n        「D」、チーム B のヘッドコーチに「B２」と記入される。誰もリバウンドの位置に着かずに 2 本のフリー\n        スローが A１に与えられる。そのあと、誰もリバウンドの位置に着かずに 2 本のフリースローがチーム\n        A のいずれかのプレーヤーに与えられる。ゲームはフロントコートのスローインラインからチーム A のスロ\n        ーインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-25", "body": "36-25   例：前半に A１がゲームの遅延行為（ディレイオブゲーム）によるテクニカルファウルを宣せられ\n        た。後半に A１は B１に対するアンスポーツマンライクファウルの判定基準に合致する触れ合いでア\n        ンスポーツマンライクファウルを宣せられた。\n        解説：タイマー（国内大会ではスコアラー）はプレーヤーが 1 個のテクニカルファウルと 1 個のアン\n        スポーツマンライクファウルを宣せられ、自動的に失格・退場となることを速やかに審判に知らせなけ\n        ればならない。A1 のアンスポーツマンライクファウルの罰則のみが与えられ、A1 の失格・退場への追\n        加の罰則は与えられない。誰もリバウンドの位置に着かずに 2 本のフリースローが B1 に与えられ\n        る。ゲームはフロントコートのスローインラインからチーム B のスローインで再開される。ショットクロック\n        は 14 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-26", "body": "36-26   例：A１は前半にオフェンスの進行を妨げるための不必要なファウルによりアンスポーツマンライクファ\n        ウルを宣せられた。後半に A２がバックコートでドリブルをしているとき、A１はボールの無い場所でフ\n        ァウルをされたとみせかけるフェイクにより、テクニカルファウルを宣せられた。\n\n解説：タイマー（国内大会ではスコアラー）はプレーヤーが 1 個のアンスポーツマンライクファウルと\n        1 個のテクニカルファウルを宣せられ、自動的に失格・退場となることを速やかに審判に知らせなけ\n        ればならない。A1 のテクニカルファウルの罰則のみが与えられ、A1 の失格・退場への追加の罰則\n        は与えられない。誰もリバウンドの位置に着かずに 1 本のフリースローがチーム B のいずれかのプレー\n        ヤーに与えられる。ゲームは A１のテクニカルファウルが宣せられたときにボールがあった場所に最も\n        近いアウトオブバウンズからチーム A のスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-27", "body": "36-27   条文：プレーヤー兼ヘッドコーチが自動的に失格・退場となるのは以下のファウルを宣せられたと\n        きである。\n        ・プレーヤーとして２個のテクニカルファウル\n        ・プレーヤーとして２個のアンスポーツマンライクファウル\n        ・プレーヤーとして１個のテクニカルファウルと１個のアンスポーツマンライクファウル\n        ・ヘッドコーチとして１個のテクニカルファウル「Ｃ１」とプレーヤーとして１個のテクニカルファウルまた\n         はアンスポーツマンライクファウル\n        ・ヘッドコーチとして１個のテクニカルファウル「B１」または「B２」と、ヘッドコーチとして１個のテクニ\n         カルファウル「Ｃ１」、そしてプレーヤーとして１個のアンスポーツマンライクファウルまたはテクニカル\n         ファウル\n        ・ヘッドコーチとして２個のテクニカルファウル「B１」または「B２」とプレーヤーとして１個のテクニカル\n         ファウルまたはアンスポーツマンライクファウル\n        ・ヘッドコーチとして２個のテクニカルファウル「Ｃ１」\n        ・ヘッドコーチとして１個のテクニカルファウル「Ｃ１」と、ヘッドコーチとして２個のテクニカルファウル\n         「B１」または「B２」\n        ・ヘッドコーチとして３個のテクニカルファウル「B１」または「B２」\n        プレーヤー兼ヘッドコーチが失格・退場となった場合は、スコアシートの自動的な失格・退場の原\n        因となったファウルの後に「GD」と記入される。新たにキャプテンに指名されたプレーヤーが新たなプ\n        レーヤー兼ヘッドコーチとなる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-28", "body": "36-28   例：プレーヤー兼ヘッドコーチの A１が、第１クォーターにプレーヤーとしてフェイクによるテクニカルフ\n        ァウルを宣せられた。第４クォーターで A２がドリブルをしているとき、A１自身のスポーツマンらしくな\n        い振る舞いによって、ヘッドコーチとして A１にテクニカルファウルが宣せられ「Ｃ1」と記入された。\n        解説：プレーヤー兼ヘッドコーチの A１は自動的に失格・退場となる。A１の 2 個目のテクニカルフ\n        ァウルの罰則のみが与えられ、失格・退場への追加の罰則は与えられない。タイマー（国内大会で\n        はスコアラー）はプレーヤー兼ヘッドコーチの A１がプレーヤーとして 1 個のテクニカルファウル、その\n        後ヘッドコーチとして自身の振る舞いによって 1 個のテクニカルファウルを宣せられ、自動的に失格・\n        退場となることを速やかに審判に知らせなければならない。誰もリバウンドの位置に着かずに 1 本の\n        フリースローがチーム B のいずれかのプレーヤーに与えられる。ゲームは A１のテクニカルファウルが起\n\nきたとき、ボールがあった場所に最も近いアウトオブバウンズからチーム Aのスローインで再開される。ショ\n        ットクロックは継続となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-29", "body": "36-29   例：プレーヤー兼ヘッドコーチの A１が、第２クォーターにプレーヤーとして B１に対するアンスポー\n        ツマンライクファウルを宣せられた。第３クォーターで A２がドリブルをしているとき、チーム A の理学\n        療法士のスポーツマンらしくない振る舞いによってヘッドコーチとしてテクニカルファウルが宣せられ「B\n        １」と記入された。更に第４クォーターで A２がドリブルをしているとき、A６がテクニカルファウルを宣\n\n        せられた。A６のテクニカルファウルは A１ にヘッドコーチとして「B１」と記入された。\n        解説：プレーヤー兼ヘッドコーチの A１は自動的に失格・退場となる。（A６の行為による）A１\n        の 2 個目のテクニカルファウルの罰則のみが与えられ、失格・退場への追加の罰則は与えられな\n        い。タイマー（国内大会ではスコアラー）はプレーヤー兼ヘッドコーチの A１がプレーヤーとして 1 個\n        のアンスポーツマンライクファウル、その後ヘッドコーチとしてチームメンバーの振る舞いの結果による 2\n        個のテクニカルファウルを宣せられ、自動的に失格・退場となることを速やかに審判に知らせなけれ\n        ばならない。誰もリバウンドの位置に着かずに 1 本のフリースローがチーム B のいずれかのプレーヤー\n        に与えられる。ゲームは A６のテクニカルファウルが起きたとき、ボールがあった場所に最も近いアウト\n        オブバウンズからチーム A のスローインで再開される。ショットクロックは継続となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-30", "body": "36-30   例：プレーヤー兼ヘッドコーチの A１が、第２クォーターに A１自身のスポーツマンらしくない振る舞\n        いによってヘッドコーチとしてテクニカルファウルを宣せられ「C1」と記録された。第４クォーターで A１\n        にプレーヤーとして B１に対するアンスポーツマンライクファウルが宣せられた。\n        解説：プレーヤー兼ヘッドコーチの A１は自動的に失格・退場となる。A１のアンスポーツマンライク\n        ファウルの罰則のみが与えられ、失格・退場への追加の罰則は与えられない。タイマー（国内大会\n        ではスコアラー）はプレーヤー兼ヘッドコーチの A１が自身の振る舞いによってヘッドコーチとして 1 個\n        のテクニカルファウル、その後プレーヤーとして１個のアンスポーツマンライクファウルを宣せられ、自動\n        的に失格・退場となることを速やかに審判に知らせなければならない。誰もリバウンドの位置に着か\n        ずに 2 本のフリースローが B１に与えられる。ゲームはフロントコートのスローインラインからチーム B\n        のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-31", "body": "36-31   例：プレーヤー兼ヘッドコーチの A1 がコート上でプレーしているとき、交代要員の A6 がテクニカル\n        ファウルを宣せられた。\n        解説：チームベンチに座ることを許された人物のスポーツマンらしくない振る舞いによるテクニカルファ\n        ウルは、ファーストアシスタントコーチがスコアシートに記入されていたとしても、プレーヤー兼ヘッドコー\n        チに宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-32", "body": "36-32   例：プレーのインターバル中に、\n        ⒜交代要員の A6\n\n⒝プレーヤー兼ヘッドコーチの A1\n        ⒞チーム A のドクター\n        がテクニカルファウルを宣せられた。\n        解説：テクニカルファウルは、ファーストアシスタントコーチがスコアシートに記入されていたとしても、\n        ⒜プレーヤーとして A6\n        ⒝プレーヤーとしての A1\n        ⒞プレーヤー兼ヘッドコーチとして A1\n        に宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-33", "body": "36-33   例：プレーヤー兼ヘッドコーチの A1 が４個のプレーヤーとしてのファウルと１個のヘッドコーチとして\n        のテクニカルファウルを宣せられた。\n        解説：プレーヤー兼ヘッドコーチの A1 は、あわせて 5 個のファウルを宣せられており、プレーを続け\n        ることはできない。A1 はヘッドコーチとして役割を続けることができる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-34", "body": "36-34   例：プレーヤー兼ヘッドコーチの A1 が 1 個のプレーヤーとしてのテクニカルファウルと 1 個のヘッドコ\n        ーチとしてのテクニカルファウルを宣せられた。\n        解説：プレーヤー兼ヘッドコーチは個人として 2 個のテクニカルファウルを宣せられているため、自動\n        的に失格・退場となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-35", "body": "36-35   条文：第４クォーター、各オーバータイムでゲームクロックが２:00 あるいはそれ以下を表示して\n        いて、審判がスローインのボールを与えるとき、スローインをするプレーヤーがディフェンスをされてい\n        る場合は次の手順が適用される。\n        ・審判はスローインのボールを与える前に、ディフェンスのプレーヤーへの警告として「イリーガルバウ\n         ンダリラインクロッシング」のシグナルを示す。\n        ・その後、スローインを妨げようとしてディフェンスプレーヤーの体の一部が境界線を越えた場合、そ\n         れ以上の警告はなくテクニカルファウルが宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-36", "body": "36-36   例：第４クォーター残り１:08 で、\n        ⒜フロントコート\n        ⒝バックコート\n        のサイドラインにいる A1 がスローインのボールを持っていた。審判は B1 に警告として「イリーガルバ\n        ウンダリラインクロッシング」のシグナルを示した。B1 が A1 のスローインを妨げようと境界線を越えて\n        手を動かした。\n        解説：審判は A１にボールを与える前に B１に警告のシグナルを示しており、B１はスローインを\n        妨げたとしてテクニカルファウルを宣せられる。誰もリバウンドの位置に着かずに 1 本のフリースローが\n        チーム A のいずれかのプレーヤーに与えられる。ゲームは B１のテクニカルファウルが起きたときにボー\n        ルがあった場所に最も近いアウトオブバウンズから、チーム A のスローインで再開される。ショットクロックは\n\n⒜14 秒以上が表示されていた場合は継続となり、13 秒以下が表示されていた場合は 14 秒\n        ⒝24 秒\n        となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-37", "body": "36-37   条文：最初の 3 クォーターと、第 4 クォーター、各オーバータイムでゲームクロックが 2:01 以上を\n        表示していている間のスローインで、スローインを妨げようとしてディフェンスプレーヤーの体の一部\n        が境界線を越えた場合、次の手順が適用される：\n        ・審判は速やかにゲームを止め、そのディフェンスのプレーヤーとそのチームのヘッドコーチに口頭で\n         警告を与える。この警告はゲームの残り時間中、そのチームの全てのプレーヤーに適用される。\n        ・その後、スローインを妨げようとしてディフェンスプレーヤーの体の一部が境界線を越えた場合、そ\n         れ以上の警告はなくテクニカルファウルが宣せられる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-38", "body": "36-38   例：第 2 クォーター残り 4:27 で、B1 のゴールのあと、A1 がエンドラインの外側でスローインのボー\n        ルを持っている。B1 が A1 のスローインを妨げようと境界線を越えて手を動かした。\n        解説：\n        ⒜チーム B のプレーヤーがゲーム中で初めてスローインを妨げた場合、審判は速やかにゲームを止\n         め、B1 とチーム B のヘッドコーチに口頭で警告を与える。この警告はゲームの残り時間中、チー\n         ム B の全てのプレーヤーに適用される。\n        ⒝いずれかのチーム B のプレーヤーがスローインを妨げたことで、ゲーム中に審判がすでに口頭で警\n         告を与えていた場合、B1 はテクニカルファウルを宣せられる。誰もリバウンドの位置に着かずに 1\n         本のフリースローがチーム A のいずれかのプレーヤーに与えられる。ゲームはエンドラインからチーム\n         A のスローインで再開され、ショットクロックは 24 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-39", "body": "36-39   条文：テクニカルファウルが宣せられたとき、罰則として誰もリバウンドの位置に着かずに 1 本のフ\n        リースローが速やかに行われる。フリースローが行われたあと、ゲームはテクニカルファウルが起きたと\n        きにボールがあった場所に最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-40", "body": "36-40   例：ショットクロックが残り 21 秒で、A１がバックコートでドリブルをしているとき、B１がテクニカルファ\n        ウルを宣せられた。\n        解説：誰もリバウンドの位置に着かずに 1 本のフリースローがチーム A のいずれかのプレーヤーに与\n        えられる。B１のテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウ\n        ンズから、チーム A のスローインでゲームが再開される。チーム A に新たな８秒が与えられ、ショット\n        クロックは 24 秒にリセットされる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-41", "body": "36-41   例：ショットクロックが残り 21 秒で、A１がバックコートでドリブルをしているとき、A２がテクニカルファ\n        ウルを宣せられた。\n        解説：誰もリバウンドの位置に着かずに 1 本のフリースローがチーム B のいずれかのプレーヤーに与\n        えられる。A2 のテクニカルファウルが宣せられたときにボールがあった場所に最も近いアウトオブバウン\n\nズから、チーム A のスローインでゲームが再開される。チーム A は５秒でボールをフロントコートに進\n        めなければならず、ショットクロックは 21 秒となる。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-42", "body": "36-42   例：A１がツーポイントショットを打とうとしたとき、B１にファウルをされた。ボールはバスケットに入ら\n        なかった。\n        ⒜A1 の 2 本のフリースローのうち、最初のフリースローが行われる前に A2 がテクニカルファウルを宣\n         せられた。\n        ⒝A1 の 2 本のフリースローのうち、最初のフリースローが行われた後に A2 がテクニカルファウルを宣\n         せられた。\n        解説：\n        ⒜誰もリバウンドの位置に着かずに 1 本のフリースローが、チーム B のいずれかのプレーヤーに与え\n         られたあと、2 本のフリースローが A1 に与えられる。\n        ⒝誰もリバウンドの位置に着かずに 1 本のフリースローが、チーム B のいずれかのプレーヤーに与え\n         られたあと、2 本目のフリースローが A1 に与えられる。\n        どちらの場合においても、ゲームは通常の最後のフリースローの後と同様に再開される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-43", "body": "36-43   例：タイムアウトの間にテクニカルファウルが A２に宣せられた。\n        解説：タイムアウトは最後まで終えられる。タイムアウト後、誰もリバウンドの位置に着かずに 1 本\n        のフリースローが、交代要員を含めたチーム B のいずれかのプレーヤーに与えられる。ゲームはタイム\n        アウトでゲームが中断されたところに最も近いアウトオブバウンズから再開される。"}, {"type": "impl", "art_no": "36", "art_title": "テクニカルファウル", "sec_no": "36-44", "body": "36-44   例：ゲームクロックが動いている状態で A1 のショットのボールが空中にあるとき、テクニカルファウルが、\n        ⒜B１またはチーム B のドクターに宣せられた。\n        ⒝A２またはチーム A のドクターに宣せられた。\n        解説：\n        ⒜1 本のフリースローがチーム A のいずれかのプレーヤーに与えられる。\n        ⒝1 本のフリースローがチーム B のいずれかのプレーヤーに与えられる。\n        A１のショットのボールがバスケットに入った場合、ゴールは認められる。ゲームはエンドラインの外の\n        任意のアウトオブバウンズから、チーム B のスローインでゲームが再開される。\n        A1 のショットのボールがバスケットに入らなかった場合、ゲームはテクニカルファウルが起きたときにボール\n        があった場所に最も近いアウトオブバウンズからオルタネイティングポゼッションのスローインでゲームが再\n        開される。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "36-45", "body": "36-45   例：A１がショットの動作（アクトオブシューティング）中にボールを手に持ったとき、テクニカルファウ\n        ルが、\n        ⒜B１またはチーム B のドクターに宣せられた。\n\n⒝A２またはチーム A のドクターに宣せられた。\n       解説：\n       ⒜1 本のフリースローがチーム A のいずれかのプレーヤーに与えられる。A1 のショットのボールがバス\n        ケットに入った場合、ゴールは認められる。ゲームはエンドラインの任意のアウトオブバウンズからチ\n        ーム B のスローインで再開される。\n       ⒝1 本のフリースローがチーム B のいずれかのプレーヤーに与えられる。A1 のショットのボールがバス\n        ケットに入った場合、ゴールは認められない。ゲームはフリースローラインの延長線上のアウトオブ\n        バウンズからチーム A のスローインで再開される。\n       どちらの場合においても、A1 のショットのボールがバスケットに入らなかった場合、ゲームはテクニカル\n       ファウルが起きたときにボールがあった場所に最も近いアウトオブバウンズからチーム A のスローインで\n       再開される。\n\n\n第 37 条 アンスポーツマンライクファウル\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-1", "body": "37-１   条文：相手チームのバスケットに向かって進行しているプレーヤーと、その相手チームのバスケット\n       との間に相手チームのプレーヤーが全くいない状況で、進行しているプレーヤーの後ろあるいは横\n       から起こす不当な触れ合いに対しては、オフェンスのプレーヤーがショットの動作（アクトオブシュー\n       ティング）を始める前であれば、アンスポーツマンライクファウルが宣せられる。しかし、アンスポーツ\n       マンライクファウルの判定基準に合致する、ボールに対するプレーではなく、かつ、正当なバスケット\n       ボールのプレーとは認められないプレーでの触れ合いや過度に激しい触れ合いについてはゲーム\n       中のいかなる状況においてもアンスポーツマンライクファウルが宣せられる。\n【補足】「相手チームのプレーヤーが全くいない状況」とは、速攻などで確実にその後得点をできる状況（ク\n       リアパス）を指す。また「相手チームのバスケットとの間」には、バスケットの真下は含まれない。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-2", "body": "37-２   例：A１が速攻でバスケットに向かってドリブルをしているとき、A１とそのチームが攻めるバスケット\n       の間に相手のプレーヤーが全くいない状況で、B１は A１に後ろから触れ合いを起こし、ファウルを\n       宣せられた。\n       解説：B１のアンスポーツマンライクファウルである。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-3", "body": "37-３   例：速攻の終わりで A１がショットの動作（アクトオブシューティング）を始めるためにボールを持つ\n       前に、B１が A１の腕に後ろから、\n       ⒜ボールをスティールしようとして触れ合いを起こした。\n       ⒝アンスポーツマンライクファウルの判定基準に合致する触れ合いを起こした。\n       【補足】この項目での「速攻」とはクリアパスの状況を指す。\n       解説：どちらの場合においても、B１のアンスポーツマンライクファウルが宣せられる。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-4", "body": "37-４   例：速攻の終わりで A１がショットの動作（アクトオブシューティング）中にボールを持ったとき、B1\n       が A1 の腕に後ろから：\n       ⒜ボールをブロックしようとして触れ合いを起こした。\n       ⒝アンスポーツマンライクファウルの判定基準に合致する触れ合いを起こした。\n       【補足】この項目での「速攻」とはクリアパスの状況を指す\n       解説：\n       ⒜B１のパーソナルファウルである。\n       ⒝B１のアンスポーツマンライクファウルである。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-5", "body": "37-５   例：A1 はバックコートから、フロントコートで相手チームのバスケットに向かって進行している A2 に\n       ボールをパスした。A2 と相手チームのバスケットの間にはチーム B のプレーヤーはいなかった。A2 は\n       空中にジャンプをしたが、ボールをキャッチする前に、B1 が後ろから触れ合いを起こし、B1 はファウルを\n       宣せられた。\n       解説：A2 へのパスのボールが放たれたあと、A2 とチーム B のバスケットとの間にチーム B のプレー\n       ヤーが全くいない状況で、進行しているプレーヤーの後ろあるいは横から起こす不当な触れ合いで\n       あるため、B1 のアンスポーツマンライクファウルである。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-6", "body": "37-６   例：A1 はバックコートでボールを持っている。フロントコートにいる A2 は、相手チームのバスケットに\n       向かって進行していて、A2 と相手チームのバスケットの間にはチーム B のプレーヤーはいなかった。\n       A1 から A2 へのパスのボールが放たれる前に、B1 が A2 に後ろから触れ合いを起こした。\n       解説：A1 から A2 へのパスのボールがまだ放たれていないことから、A2 とチーム B のバスケットとの\n       間にチーム B のプレーヤーが全くいない状況で、進行しているプレーヤーの後ろあるいは横から起こ\n       す不当な触れ合いという判定基準では、B1 のアンスポーツマンライクファウルではない。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-7", "body": "37-７   例：バックコートにいる B1 はドリブルをしている A1 のボールを弾き出した。そのあと、B1 はボール\n       のコントロールを得ようとした。B1 とチーム A のバスケットの間にチーム A のプレーヤーがいない状況\n       で、A2 が後ろあるいは横から B1 に触れ合いを起こした。\n       解説：B1 とチーム A のバスケットの間にチーム A のプレーヤーがいない状況で、B1 がボールのコ\n       ントロールを得ようとしているときに、後ろあるいは横から B1 に触れ合いを起こしているため、B1 に\n       対する A2 のアンスポーツマンライクファウルである。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-8", "body": "37-８   条文：5 個目のファウルを宣せられたあと、そのプレーヤーは「5 個のファウルを宣せられたチームメ\n       ンバー」となる。更にこのプレーヤーに生じたテクニカルファウルやアンスポーツマンライクファウル、ディ\n       スクォリファイングファウルは、ヘッドコーチに対し宣せられ、その状況に応じて罰せられる。スコアシー\n       トには「B」と記入される。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-9", "body": "37-９    例：B１はドリブルをしていた A１にファウルをし、５個目のファウルを宣せられた。これはチーム B の\n        このクォーター２個目のファウルであった。B１はチームベンチに向かう間に、B１は A２を突き飛ば\n        した。\n        解説：5 個目のファウルで B１は 5 個のファウルを宣せられたチームメンバーとなる。B１のスポーツ\n        マンらしくない振る舞いはチーム B のヘッドコーチにテクニカルファウルとして宣せられ「B１」と記入され\n        る。誰もリバウンドの位置に着かずに 1 本のフリースローがチーム A のいずれかのプレーヤーに与えら\n        れる。ゲームは B１のスポーツマンらしくない振る舞いが起きたときにボールがあった場所に最も近い\n        アウトオブバウンズからチーム A のスローインで再開される。"}, {"type": "impl", "art_no": "37", "art_title": "アンスポーツマンライクファウル", "sec_no": "37-10", "body": "37-10   例：ドリブルをしている A１は B１にファウルをし、５個目のファウルを宣せられた。A１はチームベン\n        チに向かう間に、審判を侮辱する発言を行ない、テクニカルファウルを宣せられた。\n        解説：5 個目のファウルで A１は 5 個のファウルを宣せられたチームメンバーとなる。A１のテクニカ\n        ルファウルはチーム A のヘッドコーチに宣せられ「B１」と記入される。誰もリバウンドの位置に着かずに\n        1 本のフリースローがチーム B のいずれかのプレーヤーに与えられる。ゲームは A１のチームコントロ\n        ールファウルが起きた場所に最も近いアウトオブバウンズからチーム B のスローインで再開される。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "37-11", "body": "37-11   例：A１は B１にファウルをし、５個目のファウルを宣せられた。これはチーム A のこのクォーター２\n        個目のチームファウルであった。A１はチームベンチに向かう間に、B１を突き飛ばした。このとき B１\n        もまた A１を突き飛ばし B１はアンスポーツマンライクファウルが宣せられた。\n        解説：5 個目のファウルで A１は 5 個のファウルを宣せられたチームメンバーとなる。A１のスポーツ\n        マンらしくない振る舞いはチーム A のヘッドコーチにテクニカルファウルとして宣せられ「B１」と記入され\n        る。B１のアンスポーツマンライクファウルは B１自身に宣せられ「U２」と記入される。誰もリバウンド\n        の位置に着かずに 1 本のフリースローがチーム B のいずれかのプレーヤーに与えられ、誰もリバウンド\n        の位置に着かずに 2 本のフリースローが A１と交代したプレーヤーに与えられる。ゲームはフロントコ\n        ートのスコアラーズテーブルの反対側のスローインラインからチーム A のスローインで再開される。ショ\n        ットクロックは 14 秒となる。\n\n\n第 38 条 ディスクォリファイングファウル\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-1", "body": "38-１    条文：失格・退場となった人物は、チームベンチに座ることを許された人物ではない。したがって\n        その人物は、それ以上スポーツマンらしくない振る舞いがあっても罰則を受けない。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-2", "body": "38-２    例：A１が著しくスポーツマンらしくない振る舞いにより失格・退場になった。コートを離れるときに審\n        判を侮辱する発言を行なった。\n        解説：A１はすでに失格・退場になっており、審判への暴言による罰則は受けない。クルーチーフまた\n        はコミッショナー（同席している場合）は、大会主催者に対して報告書を提出しなければならない。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-3", "body": "38-３   条文：著しくスポーツマンらしくない振る舞いでプレーヤーが失格・退場になったとき、罰則は体の\n       触れ合いのないその他のディスクォリファイングファウルと同様となる。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-4", "body": "38-４   例：A１はトラベリングを宣せられた。いら立った A１は審判を侮辱する発言を行ない、ディスクォリ\n       ファイングファウルを宣せられた。\n       解説：A１は失格・退場となる。ディスクォリファイングファウルは A１自身に宣せられ「D2」と記入さ\n       れる。誰もリバウンドの位置に着かずに 2 本のフリースローがチーム B のいずれかのプレーヤーに与え\n       られる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチーム B のスロ\n       ーインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-5", "body": "38-５   条文：ヘッドコーチにディスクォリファイングファウルを宣せられたとき、「D2」と記入される。\n       チームベンチに座ることを許された人物が失格・退場になった場合は、ヘッドコーチのテクニカルファ\n       ウルとして「B2」と記入される。罰則は体の触れ合いのないその他のディスクォリファイングファウルと\n       同様となる。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-6", "body": "38-６   例：A１は５個目のパーソナルファウルを宣せられ、このクォーター２個目のチームファウルであっ\n       た。チームベンチに向かう間に、\n       ⒜A1 は審判を侮辱する発言を行った。\n       ⒝A1 が B2 の顔面を殴った。\n       どちらの場合においても、A1 はディスクォリファイングファウルを宣せられる。\n\n解説：5 個目のパーソナルファウルによって、A１は 5 個のファウルを宣せられたチームメンバーとなり、さらに A\n       １は審判への暴言または B1 を殴ったことにより失格・退場となる。A１のディスクォリファイングファウ\n       ルはスコアシートの A１に「D」、チーム A のヘッドコーチに「B２」と記入される。\n       ⒜誰もリバウンドの位置に着かずに 2 本のフリースローがチーム B のいずれかのプレーヤーに与えら\n        れる。\n       ⒝誰もリバウンドの位置に着かずに 2 本のフリースローが B２に与えられる。\n       どちらの場合においても、ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインか\n       らチーム B のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-7", "body": "38-７   条文：ディスクォリファイングファウルとは、プレーヤーや、チームのチームベンチに座ることを許された\n       人物による以下の著しくスポーツマンらしくない行為に適用される。\n       ・相手チーム、審判、テーブルオフィシャルズやコミッショナー（同席している場合）、観客に対す\n        る行為。\n       ・自チームのメンバーに対する行為。\n       ・意図的に用具・器具を破損する行為。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-8", "body": "38-８    例：以下の著しくスポーツマンらしくない行為が起きた。\n        ⒜A１がチームメイトの A２を殴った。\n        ⒝A１がコートを離れて観客を殴った。\n        ⒞ベンチにいる A６がチームメイトの A７を殴った。\n        ⒟A６がスコアラーズテーブルを叩き、ショットクロックを破損させた。\n        解説：\n        ⒜と⒝では、A１は失格・退場となる。ディスクォリファイングファウルは A１ 自身に宣せられ「D2」と\n         記入される。\n        ⒞と⒟では、A６は失格・退場となる。A６のディスクォリファイングファウルはスコアシートの A６に「D」、\n         チーム A のヘッドコーチに「B２」と記入される。\n        誰もリバウンドの位置に着かずに 2 本のフリースローがチーム B のいずれかのプレーヤーに与えられ\n        る。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチーム B のスローイ\n        ンで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "38", "art_title": "ディスクォリファイングファウル", "sec_no": "38-9", "body": "38-９    条文：プレーヤーが失格・退場となり、控室に戻る途中でアンスポーツマンライクファウル、または\n        ディスクォリファイングファウル相当の行為を繰り返したとき、罰則は与えられない。ただし、その大\n        会主催者に対して報告書を提出される。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "38-10", "body": "38-10   例：A１は審判を侮辱する発言を行ない、ディスクォリファイングファウルを宣せられた。控室に戻る間に\n        ⒜A１が B１を突き飛ばし、アンスポーツマンライクファウル相当であった。\n        ⒝A１が B１を殴り、ディスクォリファイングファウル相当であった。\n        解説：A１はすでに失格・退場になっており、A1 にはそれ以上のファウルは記録されず、また罰則\n        は与えられない。クルーチーフまたはコミッショナー（同席している場合）は、大会主催者に対して\n        報告書を提出しなければならない。\n        どちらの場合においても、誰もリバウンドの位置に着かずに 2 本のフリースローがチーム B のいずれか\n        のプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインライン\n        からチーム B のスローインで再開される。ショットクロックは 14 秒となる。\n\n\n第 39 条 ファイティング\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-1", "body": "39-１    条文：抗争（Fight）のあとで全ての罰則が相殺された場合、抗争が始まったときにボールが\n        あった場所に最も近いアウトオブバウンズから、抗争が始まったときにボールをコントロールしてい\n        た、またはボールを与えられることになっていたチームにスローインが与えられる。ショットクロックはゲ\n        ームが止められたときの残り時間となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-2", "body": "39-２   例：チーム A がボールを、\n       ⒜20 秒間コントロールしたとき、\n       ⒝５秒間コントロールしたとき、\n       抗争につながりそうな状況が発生した。審判はチームベンチエリアを離れた各チーム２人の交代要\n       員を失格・退場にした。\n       解説：抗争につながりそうな状況が始まったときにボールをコントロールしていたチーム A に、抗争に\n       つながりそうな状況が始まったときにボールがあった場所に最も近いアウトオブバウンズからスローイン\n       が与えられる。ショットクロックは、\n       ⒜４秒となる。\n       ⒝19 秒となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-3", "body": "39-３   条文：（事態の収拾のために審判に協力しなかったことによって）ヘッドコーチやファーストアシス\n       タントコーチが失格・退場になった場合や、抗争の間にチームベンチエリアを離れたことによって交\n       代要員や 5 個のファウルを宣せられたチームメンバー、チーム関係者が失格・退場になった場合、\n       ヘッドコーチは 1 個のテクニカルファウルを宣せられる。そのテクニカルファウルにヘッドコーチの失格・\n       退場が含まれるとき、スコアシートに「D２」と記入される。そのテクニカルファウルが自チームのチー\n       ムベンチに座ることを許された人物の失格・退場で、ヘッドコーチは含まれないとき、スコアシートに\n       「B２」と記入される。罰則として、誰もリバウンドの位置に着かずに 2 本のフリースローとスローイン\n       が相手チームに与えられる。\n       また追加のディスクォリファイングファウルごとに、2 本のフリースローとスローインが相手チームに与え\n       られる。\n       両チームの等しい罰則が相殺されない限り、全ての罰則が適用される。この場合、ゲームはフロ\n       ントコートのスコアラーズテーブルの反対側のスローインラインから通常のディスクォリファイングファウ\n       ルの処置と同様に再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-4", "body": "39-４   例：抗争の間にコートに入ったため、交代要員の A６は失格・退場となった。\n       解説：A６の失格・退場はスコアシート上の A6 自身に「D」と記入され、残りのファウル欄には「F」\n       と記入される。チーム A のヘッドコーチはテクニカルファウルを宣せられ「B２」と記入される。誰もリバ\n       ウンドの位置に着かずに 2 本のフリースローがチーム B のいずれかのプレーヤーに与えられる。ゲーム\n       はフロントコートのスコアラーズテーブルの反対側のスローインラインからチーム B のスローインで再開\n       される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-5", "body": "39-５   例：コート上にいる A１と B１で抗争が始まり、A６と B６がコートに入ってきたが抗争には加わら\n       なかった。A７はコートに入ってきて、B１の顔面を殴った。\n       解説：A１と B１は失格・退場となり「DC」と記入される。A7 は失格・退場になり「D2」と記入さ\n       れ、スコアシート上の残りのファウル欄には「F」と記入される。A６と B６は抗争の間にコートに入っ\n\nたことで失格・退場となり、「D」と記入され、スコアシート上の残りのファウル欄には「F」と記入され\n       る。両チームのヘッドコーチはテクニカルファウルを宣せられ「BC」と記入される。A１、B１のディスクォ\n       リファイングファウルの罰則と A６、B６ のテクニカルファウルの罰則は相殺される。A7 が積極的に\n       抗争に関わり失格・退場となったことでの罰則の処置が行われる。誰もリバウンドの位置に着かずに\n       2 本のフリースローが B１と交代したプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテ\n       ーブルの反対側のスローインラインからチーム B のスローインで再開される。ショットクロックは 14 秒と\n       なる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-6", "body": "39-６   例：コート上にいる A１と B１で抗争が始まった。A６とチーム A のマネージャーがコートに入り、\n       積極的に抗争に関わった。\n       解説：A１と B１は失格・退場となり「DC」と記入される。A１、B１のディスクォリファイングファウル\n       の罰則は互いに相殺される。A６とチーム A のマネージャーがチームベンチエリアを離れたことで、チ\n       ーム A のヘッドコーチにテクニカルファウルが宣せられ「B２」と記入される。A６は積極的に抗争に関\n       わったことで失格・退場となり「D2」と記入される。スコアシートの A６の残りのファウル欄には「F」と\n       記入される。チーム A のマネージャーが積極的に抗争に関わったことでのディスクォリファイングファウ\n       ルはチーム A のヘッドコーチに宣せられ、「B２」と記入して丸で囲み、累積することで自動的に失\n       格・退場となるヘッドコーチのテクニカルファウルには数えない。\n       誰もリバウンドの位置に着かずに６個のフリースローがチーム B のいずれかのプレーヤーに与えられる\n       （A６とチーム A のマネージャーがチームベンチエリアを離れたことによるチーム A のヘッドコーチのテ\n       クニカルファウルのため２個、A６が積極的に抗争に関わったことによるディスクォリファイングファウル\n       のため２個、チーム A のマネージャーが積極的に抗争に関わり失格・退場になったことによるチーム\n       A のヘッドコーチのテクニカルファウルのため２個）。\n       【補足】各セットのフリースローを打つプレーヤーは異なるプレーヤーでもよい。\n       ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインからチーム B のスローインで\n       再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "39", "art_title": "ファイティング", "sec_no": "39-7", "body": "39-７   例：チーム A のヘッドコーチはチームベンチエリアを離れ、コート上で積極的に抗争に関わり、B１を\n       激しく突き飛ばした。\n       解説：チーム A のヘッドコーチはチームベンチエリアを離れながら事態の収拾のために審判に協力\n       しなかったため、ディスクォリファイングファウルを宣せられ、スコアシートに「D2」と記入される。チーム A\n       のヘッドコーチには自身が積極的に抗争に関わったことでの更なるディスクォリファイングファウルは宣\n       せられない。スコアシートのチーム A のヘッドコーチの残りのファウル欄には「F」と記入される。誰もリ\n       バウンドの位置に着かずに 2 本のフリースローがチーム B のいずれかのプレーヤーに与えられる。ゲー\n       ムはフロントコートのスコアラーズテーブルの反対側のスローインラインからチーム B のスローインで再\n       開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "39-8", "body": "39-８   例：タイムアウトの間に、いずれかのチームの交代要員またはチーム関係者の数人が、コートに入\n       り、チームベンチエリアの近くにとどまっていた。このとき、コート上で抗争につながりそうな状況が起き、\n       ⒜タイムアウトのためにすでにコート上にいた全ての人物が、チームベンチエリアの近くのそれぞれの\n        場所にとどまっていた。\n       ⒝タイムアウトのためにすでにコート上にいた何人かの人物が、チームベンチエリアの近くのそれぞれ\n        の場所から離れ、数名のプレーヤーが抗争につながりそうな状況に積極的に関与した。\n       解説：\n       ⒜タイムアウトのためにすでにコート上にいた人物は、失格・退場とならない。\n       ⒝タイムアウトのためにすでにコート上にいて、チームベンチエリアの近くのそれぞれの場所から離れた\n        全ての人物と、抗争につながりそうな状況に積極的に関与した全てのプレーヤーは失格・退場と\n        なる。\n\n\n第 42 条 特別な処置をする場合\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-1", "body": "42-１   条文：ゲームクロックが止まっている間に複数の反則が起きて特別な処置をする場合、審判は\n       バイオレーションやファウルが起きた順番を把握し、どの罰則を相殺し、どの罰則を適用するのか\n       注意を払って決定しなければならない。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-2", "body": "42-２   例：B１がシューターの A１にアンスポーツマンライクファウルをした。ボールが空中にある間に、ショッ\n       トクロックのブザーが鳴った。ボールは、\n       ⒜リングに触れなかった。\n       ⒝リングに触れたがバスケットには入らなかった。\n       ⒞バスケットに入った。\n       解説：全ての場合において、B１のアンスポーツマンライクファウルは記録される。\n       ⒜ボールがリングに当たらなかったことによるチーム A のショットクロックのバイオレーションは、B1 のア\n        ンスポーツマンライクファウルの後で起きたとしてなかったものとする。誰もリバウンドの位置に着かず\n        に 2 本または 3 本のフリースローが A１に与えられる。\n       ⒝ショットクロックバイオレーションではない。誰もリバウンドの位置に着かずに 2 本または 3 本のフリ\n        ースローが A１に与えられる。\n       ⒞A１は 2 点または 3 点が認められ、誰もリバウンドの位置に着かずに 1 本のフリースローが与え\n        られる。\n       全ての場合において、ゲームはフロントコートのスコアラーズテーブルの反対側のスローインラインから\n       チーム A のスローインで再開される。チーム A のショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-3", "body": "42-３   例：B１はショットの動作（アクトオブシューティング）中の A１にファウルをした。ファウルのあと、同\n       じショットの動作（アクトオブシューティング）中の A1 に B２がファウルをした。\n       解説：B２のファウルは、アンスポーツマンライクファウルまたはディスクォリファイングファウルでない限\n       り、なかったものとする。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-4", "body": "42-４   例：B１がドリブルをしている A１に対してアンスポーツマンライクファウルをした。そのファウルのあと、\n       両チームのヘッドコーチはそれぞれテクニカルファウルを宣せられた。\n       解説：等しい罰則は起きた順序で相殺される。両チームのヘッドコーチへのテクニカルファウルの罰\n       則は相殺される。誰もリバウンドの位置に着かずに 2 本のフリースローが A１に与えられる。ゲーム\n       はフロントコートのスコアラーズテーブルの反対側のスローインラインからチーム A のスローインで再開\n       される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-5", "body": "42-５   例：B１が A１にファウルをし、ショットは成功した。その後 A１はテクニカルファウルが宣せられた。\n       解説：A１のゴールは認められる。両方のファウルの罰則は等しく、相殺される。ゲームは通常のゲ\n       ームクロックが動いていて、ボールがライブの状態でのゴールが成功した後と同様に再開される。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-6", "body": "42-６   例：B１が A１にファウルをし、ショットは成功した。その後 A１はテクニカルファウルを宣せられた。\n       それに続いてチーム B のヘッドコーチはテクニカルファウルを宣せられた。\n       解説：A１のゴールは認められる。全ての等しい罰則は起きた順序で相殺される。B１のパーソナ\n       ルファウルと A１のテクニカルファウルの罰則は相殺される。誰もリバウンドの位置に着かずに、チーム\n       B のヘッドコーチのテクニカルファウルによる 1 本のフリースローがチーム A のいずれかのプレーヤーに\n       与えられる。ゲームは通常のゲームクロックが動いていて、ボールがライブの状態でのゴールが成功し\n       た後と同様に再開される。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-7", "body": "42-７   例：B１が A１にアンスポーツマンライクファウルをし、ショットは成功した。その後 A１はテクニカルフ\n       ァウルを宣せられた。\n       解説：A１のゴールは認められる。それぞれのファウルの罰則は等しくなく、互いに相殺することはで\n       きない。誰もリバウンドの位置に着かずに 1 本のフリースローがチーム B のいずれかのプレーヤーに与\n       えられ、誰もリバウンドの位置に着かずに 1 本のフリースローが A１に与えられる。ゲームはフロントコ\n       ートのスコアラーズテーブルの反対側のスローインラインからチーム A のスローインで再開される。ショ\n       ットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-8", "body": "42-８   例：チーム A のフロントコートで、 B１はドリブルをしている A１にファウルをし、\n       ⒜チーム B のこのクォーター３個目のチームファウルであった。\n       ⒝チーム B のこのクォーター５個目のチームファウルであった。\n       その後 A１はボールを B１の体（手、脚、胴体など）にぶつけた。\n\n解説： B１はパーソナルファウル、A１はテクニカルファウルを宣せられる。誰もリバウンドの位置に\n        着かずに１本のフリースローがチーム B のいずれかのプレーヤーに与えられる。\n        ⒜では、ゲームは B１のファウルがあった場所に最も近いアウトオブバウンズからチーム A のスローイ\n         ンで再開される。ショットクロックは 14 秒以上が表示されていた場合は継続となり、13 秒以下\n         が表示されていた場合は 14 秒となる。\n        ⒝では、2 本のフリースローが A1 に与えられる。ゲームは通常の最後のフリースローの後と同様に\n         再開される。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-9", "body": "42-９    例：B１はドリブルをしている A１にファウルをし、\n        ⒜チーム B のこのクォーター３個目のチームファウルであった。\n        ⒝チーム B のこのクォーター５個目のチームファウルであった。\n        その後 A１はボールを至近距離にいる B１の顔（頭部）に直接ぶつけた。\n        解説：B１はパーソナルファウル、A１は体の触れ合いのないディスクォリファイングファウルを宣せられる。\n        ⒜では、更なる罰則が行われることから、チーム A のスローインの権利は取り消される。\n        ⒝では、誰もリバウンドの位置に着かずに 2 本のフリースローがA1と交代したプレーヤーに与えられる。\n        どちらの場合においても、誰もリバウンドの位置に着かずに 2 本のフリースローがチーム B のいずれか\n        のプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローインライン\n        からチーム B のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-10", "body": "42-10   例：ショットクロック残り 8 秒で、チーム B のバックコートにいる B１は A１にファウルをした。その後\n        B２はテクニカルファウルを宣せられた。\n        ⒜B１のファウルがチーム B のこのクォーター４個目、B２のテクニカルファウルがチーム B のこのクォ\n         ーター５個目のチームファウルであった。\n        ⒝B１のファウルがチーム B のこのクォーター５個目、B２のテクニカルファウルがチーム B のこのクォ\n         ーター６個目のチームファウルであった。\n        ⒞A１はショットの動作（アクトオブシューティング）中にファウルをされ、ボールはバスケットに入らなかった。\n        ⒟A１はショットの動作（アクトオブシューティング）中にファウルをされ、ボールはバスケットに入った。\n        解説：全ての場合において、誰もリバウンドの位置に着かずに 1 本のフリースローがチーム A のい\n        ずれかのプレーヤーに与えられる。フリースローのあと、\n        ⒜ゲームはフロントコートの A１に対するファウルが起きた場所に最も近いアウトオブバウンズからの\n         チーム A のスローインで再開される。ショットクロックは 14 秒となる。\n        ⒝２本のフリースローがA１に与えられ、ゲームは通常の最後のフリースローの後と同様に再開される。\n        ⒞２本または３本のフリースローが A１に与えられ、ゲームは通常の最後のフリースローの後と同様\n         に再開される。\n        ⒟A１のゴールは認められる。１本のフリースローが A１に与えられ、ゲームは通常の最後のフリー\n\nスローの後と同様に再開される。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-11", "body": "42-11   例：ショットクロック残り８秒で、B１は A１にアンスポーツマンライクファウルをした。そのあと、\n        ⒜A２が\n        ⒝B２が\n        テクニカルファウルを宣せられた。\n        解説：\n        ⒜誰もリバウンドの位置に着かずに１本のフリースローがチームBのいずれかのプレーヤーに与えられる。\n        ⒝誰もリバウンドの位置に着かずに１本のフリースローがチームAのいずれかのプレーヤーに与えられる。\n        どちらの場合においても、テクニカルファウルのフリースローのあと、誰もリバウンドの位置に着かずに 2\n        本のフリースローが A１に与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスロ\n        ーインラインからチーム A のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-12", "body": "42-12   条文：フリースローの最中に、ダブルファウルまたは等しい罰則のファウルが起きた場合は、ファウル\n        はスコアシートに記入されるが罰則は与えられない。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-13", "body": "42-13   例：A１に２本のフリースローが与えられた。\n        ⒜１本目のフリースローのあとに\n        ⒝2 本目のフリースローが成功したあと、エンドラインの後方からスローインのボールをチーム B のプレー\n         ヤーが持つ前に\n        ⒞2 本目のフリースローが失敗したあと、いずれかのチームがボールのコントロールを得る前に\n        ⒟2 本目のフリースローが失敗し、いずれかのチームがボールのコントロールを得たあと\n        A２と B２がダブルファウル、あるいはともにテクニカルファウルを宣せられた。\n        解説：A２と B２のファウルの罰則は相殺される。\n        ⒜A1 は２本目のフリースローを行い、ゲームは通常の最後のフリースローの後と同様に再開される。\n        ⒝チーム B はエンドラインからスローインを与えられる。\n        ⒞ジャンプボールシチュエーションとなる。\n        ⒟ボールのコントロールを得ていたチームはスローインを与えられる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-14", "body": "42-14   条文：テクニカルファウルが宣せられた場合、誰もリバウンドの位置に着かずにフリースローの罰則\n        が速やかに行われる。チームベンチに座ることを許された人物の失格・退場によってヘッドコーチに\n        宣せられたテクニカルファウルでは、この限りではない。そのようなテクニカルファウルの罰則（フリー\n        スロー２本とフロントコートのスコアラーズテーブルの反対側のスローインラインからのスローイン）\n        は、相殺されない限り全てのファウルやバイオレーションが起こった順番で行われる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-15", "body": "42-15   例：B１が A１にファウルをし、このクォーター５個目のチームファウルであった。コート上で抗争につ\n        ながりそうな状況が起こった。A６がコートに入ったが積極的に抗争には関わらなかった。\n\n解説：A６は抗争の間にコートに入ったことで失格・退場となる。チーム A のヘッドコーチはテクニカ\n        ルファウルを宣せられ「B２」と記入される。誰もリバウンドの位置に着かずに 2 本のフリースローが A\n        １に与えられ、チーム A のヘッドコーチのテクニカルファウルにより 2 本のフリースローがチーム B のい\n        ずれかのプレーヤーに与えられる。ゲームはフロントコートのスコアラーズテーブルの反対側のスローイ\n        ンラインからチーム B のスローインで再開される。ショットクロックは 14 秒となる。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-16", "body": "42-16   条文：ダブルファウルが起きて両チームへの等しい罰則の相殺のあと、適用する罰則が残ってい\n        なければ、ボールをコントロールしていたチームあるいは最初のファウルの前にボールを与えられるこ\n        とになっていたチームのスローインで再開される。\n        どちらのチームもボールのコントロールがなかった、あるいは最初のファウルの前にボールが与えられ\n        ることになっていなかった場合はジャンプボールシチュエーションとなり、ゲームはオルタネイティングポ\n        ゼッションのスローインで再開される。"}, {"type": "impl", "art_no": "42", "art_title": "特別な処置をする場合", "sec_no": "42-17", "body": "42-17   例：第１クォーターと第２クォーターの間のインターバル中に、A１と B１がそれぞれディスクォリファ\n        イングファウルを宣せられた、あるいはヘッドコーチ A とヘッドコーチ B がそれぞれテクニカルファウルを\n        宣せられた。\n        オルタネイティングポゼッションアローは：\n        ⒜チーム A を示している。\n        ⒝チーム B を示している。\n        解説： 両チームへの等しい重さの罰則は相殺される。\n        どちらの場合においても、ゲームはスコアラーズテーブルの反対側のセンターラインの延長線上からオ\n        ルタネイティングポゼションの権利を持つチームのスローインで再開される。ボールがコート上のプレー\n        ヤーに触れる、あるいは正当に触れられた時点でアローは逆向きとなり、相手チームを示す。"}, {"type": "impl", "art_no": "43", "art_title": "フリースロー", "sec_no": "42-18", "body": "42-18   例：チームコントロールファウルまたはダブルドリブルが A1 に宣せられた。チーム B のスローインでゲ\n        ームが再開されるとき、スローインのボールが\n        ⒜与えられる前に\n        ⒝与えられた後に\n        B２が A２にファウルをし、このクォーター3 個目のチームファウルであった。\n        解説：\n        両方の違反は一度ゲームクロックが止められたあと、再び動かし始められるまでの間で、\n        ⒜チーム B のスローインでボールがライブになる前に起きている。したがって、等しい重さの罰則は相\n         殺される。\n         最初の違反が起きる前にチーム A がボールをコントロールしており、ゲームは A1 のファウルもしく\n         はバイオレーションが起きた場所に最も近いアウトオブバウンズからチーム A のスローインで再開さ\n         れる。ショットクロックは継続となる。\n\n⒝チーム B のスローインでボールがライブになった後で起きている。最初の違反の罰則は相殺するこ\n        とはできない。\n        A1 の違反によるスローインの権利は B2 のファウルの罰則のスローインにより取り消される。ゲー\n        ムは B2 のファウルが起きた場所に最も近いアウトオブバウンズからチーム A のスローインで再開さ\n        れる。バックコートからのスローインの場合、ショットクロックは 24 秒となる。フロントコートからのスロ\n        ーインの場合、ショットクロックは 14 秒となる。\n\n\n第 43 条 フリースロー\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-1", "body": "43-１   条文：フリースローのリバウンドの位置を占めるプレーヤーはそれぞれのスペースに交互に位置す\n       る権利を有する。フリースローのリバウンドの位置を占めないプレーヤーは、フリースローが終わるま\n       でフリースローラインの延長線上より後ろでスリーポイントラインの外側にいなければならない。"}, {"type": "impl", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-2", "body": "43-２   例：A1 は最後のフリースローを行う。チーム B のプレーヤーは誰も彼らが占めることのできるリバウ\n       ンドの位置には着かなかった。\n       解説：フリースローの間、プレーヤーは自チームのプレーヤーが占めることのできるリバウンドの位置\n       にのみ着くことができる。リバウンドの位置を占めない場合、プレーヤーはフリースローが終わるまでフ\n       リースローラインの延長線上より後ろでスリーポイントラインの外側にいなければならない。"}, {"type": "impl", "art_no": "43", "art_title": "フリースロー", "sec_no": "43-3", "body": "43-３   条文：最後のフリースローの間に、両チームのプレーヤーがフリースローのバイオレーションをした場\n       合、ジャンプボールシチュエーションとなる。"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "43-4", "body": "43-４   例：B2 は、最後のフリースローで A1 の手からボールが離れる前に制限区域に入った。A1 のフリ\n       ースローはリングに触れなかった。\n       解説：B2 と A1 のフリースローのバイオレーションであり、ジャンプボールシチュエーションとなる。\n\n\n第 44 条 訂正のできる誤り\n――――――――――――――――――――――――――――――――――――――――――"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-1", "body": "44-１   条文：審判は規則が誤って適用された次の状況でのみカテゴリー1の誤りを訂正することができる。\n       ・与えてはいけないフリースローを与えたとき\n       ・与えるべきフリースローを与えなかったとき\n       ・審判による指定なく誤ったプレーヤーがフリースローを行ったとき\n       ・審判が誤ったプレーヤーを指定してフリースローを行ったとき\n       ・誤って得点を与えたり 、取り消したりしたとき\n       ・誤ったプレーヤー、ヘッドコーチ、またはチームに対するファウルを伝達したとき\n       ・スコアシートの記録に以下を含む誤りが生じたとき：\n        ー得点を誤って記録しなかった、あるいは誤って記録したとき\n        ープレーヤー、ヘッドコーチ、またはチームに対するファウルを誤って記録しなかった、あるいは誤って\n\n記録したとき\n        ータイムアウトを誤って記録しなかった、あるいは誤ったチームに記録したとき\n       ・ゲームクロックを正しくスタートまたはストップできなかったとき、あるいは誤った競技時間を設定して\n        しまったとき（機材の故障を含む）：\n\n       審判は規則が誤って適用された次の状況でのみカテゴリー2の誤りを訂正することができる。\n       ・シ ョ ッ ト ク ロ ッ ク を正しくスタートまたはストップできなかったとき、あるいは誤った秒数を設定して\n        しまったとき（機材の故障を含む）"}, {"type": "impl", "art_no": "44", "art_title": "訂正のできる誤り", "sec_no": "44-2", "body": "44-２   条文：誤りを訂正するには、次のようにその誤りは審判、コミッショナー（同席している場合）、\n       テーブルオフィシャルによって認識、訂正されなければならない：\n       ・第4クォーターでゲームクロックが2:00あるいはそれ以下を示す前に誤りが起きた場合、その誤り\n        はゲームクロックが2
